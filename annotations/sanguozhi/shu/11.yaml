  type: pei
  text: 《汉晋春秋》曰：霍弋闻魏军来，弋欲赴成都，后主以备敌既定，不听。及成都不守，弋素服号哭，大临三日。诸将咸劝宜速降，弋曰：“今道路隔塞，未详主之安危，大故去就，不可苟也。若主上与魏和，见遇以礼，则保境而降，不晚也。若万一危辱，吾将以死拒之，何论迟速邪！”得后主东迁之问，始率六郡将守上表曰：“臣闻人生於三，事之如一，惟难所在，则致其命。今臣国败主附，守死无所，是以委质，不敢有贰。”晋文王善之，又拜南中都督，委以本任。后遣将兵救援吕兴，平交阯、日南、九真三郡，功封列侯，进号崇赏焉。弋孙彪，晋越巂太守。
