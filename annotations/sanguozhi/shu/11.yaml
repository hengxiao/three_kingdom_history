  text: 《襄阳记》曰：朗遗言戒子曰：“传称师克在和不在众，此言天地和则万物生，君臣和则国家平，九族和则动得所求，静得所安，是以圣人守和，以存以亡也。吾，楚国之小子耳，而早丧所天，为二兄所诱养，使其性行不随禄利以堕。今但贫耳；贫非人患，惟和为贵，汝其勉之！”
