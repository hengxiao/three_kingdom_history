  type: pei
  text: 《襄阳记》曰：魏咸熙元年六月，镇西将军卫瓘至於成都，得璧玉印各一枚，文似“成信”字，魏人宣示百官，藏于相国府。充闻之曰：“吾闻谯周之言，先帝讳备，其训具也，后主讳禅，其训授也，如言刘已具矣，当授与人也。今中抚军名炎，而汉年极於炎兴，瑞出成都，而藏之於相国府，此殆天意也。”是岁，拜充为梓潼太守，明年十二月而晋武帝即尊位，炎兴於是乎徵焉。孙盛曰：昔公孙自以起成都，号曰成氏，二玉之文，殆述所作乎！
