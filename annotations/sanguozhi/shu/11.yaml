- id: shu.11.p13.a1
  anchor: shu.11.p13
  at: 53
  length: 0
  type: pei
  text: 益部耆旧传杂记曰：每朝会，祗次洪坐。嘲祗曰：“君马何驶？”祗曰：“故吏马不敢驶，但明府未著鞭耳。”众传之以为笑。祗字君肃，少寒贫，为人宽厚通济，体甚壮大，又能饮食，好声色，不持节俭，故时人少贵之者。尝梦井中生桑，以问占梦赵直，直曰：“桑非井中之物，会当移植；然桑字四十下八，君寿恐不过此。”祗笑言“得此足矣”。初仕郡，后为督军从事。时诸葛亮用法峻密，阴闻祗游戏放纵，不勤所职，尝奄往录狱。众人咸为祗惧。祗密闻之，夜张灯火见囚，读诸解状。诸葛晨往，祗悉已闇诵，答对解释，无所凝滞，亮甚异之。出补成都令，时郫县令缺，以祗兼二县。二县户口猥多，切近都治，饶诸奸秽，每比人，常眠睡，值其觉寤，辄得奸诈，众咸畏祗之发摘，或以为有术，无敢欺者。使人投算，祗听其读而心计之，不差升合，其精如此。汶山夷不安，以祗为汶山太守，民夷服信。迁广汉。后夷反叛，辞“令得前何府君，乃能安我耳”！时难屈祗，拔祗族人为，汶山复得安。转祗为犍为。年四十八卒，如直所言。后有广汉王离，字伯元，亦以才幹显。为督军从事，推法平当，稍迁，代祗为犍为太守，治有美绩，虽聪明不及祗，而文采过之也。
