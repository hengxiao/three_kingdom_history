- id: shu.11.p2.a1
  anchor: shu.11.p2
  at: 244
  length: 0
  type: pei
  text: 《汉晋春秋》曰：霍弋闻魏军来，弋欲赴成都，后主以备敌既定，不听。及成都不守，弋素服号哭，大临三日。诸将咸劝宜速降，弋曰：“今道路隔塞，未详主之安危，大故去就，不可苟也。若主上与魏和，见遇以礼，则保境而降，不晚也。若万一危辱，吾将以死拒之，何论迟速邪！”得后主东迁之问，始率六郡将守上表曰：“臣闻人生於三，事之如一，惟难所在，则致其命。今臣国败主附，守死无所，是以委质，不敢有贰。”晋文王善之，又拜南中都督，委以本任。后遣将兵救援吕兴，平交阯、日南、九真三郡，功封列侯，进号崇赏焉。弋孙彪，晋越巂太守。
- id: shu.11.p4.a1
  anchor: shu.11.p4
  at: 13
  length: 0
  type: pei
  text: 《襄阳记》曰：朗少师事司马德操，与徐元直、韩德高、庞士元皆亲善。
- id: shu.11.p4.a2
  anchor: shu.11.p4
  at: 215
  length: 0
  type: pei
  text: 臣松之案：朗坐马谡免长史，则建興六年中也。朗至延熙十年卒，整二十年耳，此云“三十”，字之误也。
- id: shu.11.p4.a3
  anchor: shu.11.p4
  at: 300
  length: 0
  type: pei
  text: 《襄阳记》曰：朗遗言戒子曰：“传称师克在和不在众，此言天地和则万物生，君臣和则国家平，九族和则动得所求，静得所安，是以圣人守和，以存以亡也。吾，楚国之小子耳，而早丧所天，为二兄所诱养，使其性行不随禄利以堕。今但贫耳；贫非人患，惟和为贵，汝其勉之！”
- id: shu.11.p4.a4
  anchor: shu.11.p4
  at: 313
  length: 0
  type: pei
  text: 《襄阳记》曰：条字文豹，亦博学多识，入晋为江阳太守、南中军司马。
- id: shu.11.p5.a1
  anchor: shu.11.p5
  at: 153
  length: 0
  type: pei
  text: 《襄阳记》曰：魏咸熙元年六月，镇西将军卫瓘至於成都，得璧玉印各一枚，文似“成信”字，魏人宣示百官，藏于相国府。充闻之曰：“吾闻谯周之言，先帝讳备，其训具也，后主讳禅，其训授也，如言刘已具矣，当授与人也。今中抚军名炎，而汉年极於炎兴，瑞出成都，而藏之於相国府，此殆天意也。”是岁，拜充为梓潼太守，明年十二月而晋武帝即尊位，炎兴於是乎徵焉。孙盛曰：昔公孙自以起成都，号曰成氏，二玉之文，殆述所作乎！
- id: shu.11.p8.a1
  anchor: shu.11.p8
  at: 166
  length: 0
  type: pei
  text: 臣松之以为谈啁贵於机捷，书疏可容留意。今因书疏之巧，以著谈啁之速，非其理也。
- id: shu.11.p8.a2
  anchor: shu.11.p8
  at: 261
  length: 0
  type: pei
  text: 毣音忙角反，见《字林》，曰“毣，思貌也”。
- id: shu.11.p13.a1
  anchor: shu.11.p13
  at: 53
  length: 0
  type: pei
  text: 益部耆旧传杂记曰：每朝会，祗次洪坐。嘲祗曰：“君马何驶？”祗曰：“故吏马不敢驶，但明府未著鞭耳。”众传之以为笑。祗字君肃，少寒贫，为人宽厚通济，体甚壮大，又能饮食，好声色，不持节俭，故时人少贵之者。尝梦井中生桑，以问占梦赵直，直曰：“桑非井中之物，会当移植；然桑字四十下八，君寿恐不过此。”祗笑言“得此足矣”。初仕郡，后为督军从事。时诸葛亮用法峻密，阴闻祗游戏放纵，不勤所职，尝奄往录狱。众人咸为祗惧。祗密闻之，夜张灯火见囚，读诸解状。诸葛晨往，祗悉已闇诵，答对解释，无所凝滞，亮甚异之。出补成都令，时郫县令缺，以祗兼二县。二县户口猥多，切近都治，饶诸奸秽，每比人，常眠睡，值其觉寤，辄得奸诈，众咸畏祗之发摘，或以为有术，无敢欺者。使人投算，祗听其读而心计之，不差升合，其精如此。汶山夷不安，以祗为汶山太守，民夷服信。迁广汉。后夷反叛，辞“令得前何府君，乃能安我耳”！时难屈祗，拔祗族人为，汶山复得安。转祗为犍为。年四十八卒，如直所言。后有广汉王离，字伯元，亦以才幹显。为督军从事，推法平当，稍迁，代祗为犍为太守，治有美绩，虽聪明不及祗，而文采过之也。
- id: shu.11.p15.a1
  anchor: shu.11.p15
  at: 132
  length: 0
  type: pei
  text: 习凿齿曰：夫创本之君，须大定而后正己，纂统之主，俟速建以系众心，是故惠公朝虏而子圉夕立，更始尚存而光武举号，夫岂忘主徼利，社稷之故也。今先主纠合义兵，将以讨贼。贼强祸大，主没国丧，二祖之庙，绝而不祀，苟非亲贤，孰能绍此？嗣祖配天，非咸阳之譬，杖正讨逆，何推让之有？於此时也，不知速尊有德以奉大统，使民欣反正，世睹旧物，杖顺者齐心，附逆者同惧，可谓闇惑矣。其黜降也宜哉！臣松之以为凿齿论议，惟此论最善。
- id: shu.11.p17.a1
  anchor: shu.11.p17
  at: 40
  length: 0
  type: pei
  text: 孙盛蜀世谱曰：诗子立，晋散骑常侍。自后益州诸费有名位者，多是诗之后也。
