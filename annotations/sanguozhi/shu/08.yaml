- id: shu.8.p22.a1
  anchor: shu.8.p22
  at: 53
  length: 0
  type: pei
  text: 《河图括地象》曰：岷山之地，上为东井络，帝以会昌，神以建福，上为天井。左思蜀都赋曰：远则岷山之精，上为井络，天地运期而会昌，景福（肸）蚃而兴作。
- id: shu.8.p22.a2
  anchor: shu.8.p22
  at: 82
  length: 0
  type: pei
  text: 《帝王世紀》曰：鯀納有莘氏女曰志，是為脩己。上山行，見流星貫昴，夢接意感，又吞神珠，臆圮胸折，而生禹於石紐。譙周《蜀本紀》曰：禹本汶山廣柔縣人也，生於石紐，其地名刳兒坪，見《世帝紀》。
- id: shu.8.p22.a3
  anchor: shu.8.p22
  at: 159
  length: 0
  type: pei
  text: 蜀記曰：三皇乘祗車出谷口。未詳宓所由知為斜谷也。
