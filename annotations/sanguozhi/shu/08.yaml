- id: shu.8.p20.a1
  anchor: shu.8.p20
  at: 78
  length: 0
  type: pei
  text: 劉向《七略》曰：孔子三見哀公，作三朝記七篇，今在大戴禮。臣松之案：中經部有孔子三朝八卷，一卷目錄，餘者所謂七篇。
- id: shu.8.p20.a2
  anchor: shu.8.p20
  at: 195
  length: 0
  type: pei
  text: 臣松之案：今論語作棘子成。子成曰：「君子質而已矣，何以文為！」屈於子貢之言，故謂之誤也。
