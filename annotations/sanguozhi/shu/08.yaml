  type: pei
  text: 益州耆舊傳曰：商字文表，廣漢人，以才學稱，聲問著於州里。劉璋辟為治中從事。是時王塗隔絕，州之牧伯猶七國之諸侯也，而璋懦弱多疑，不能黨信大臣。商奏記諫璋，璋頗感悟。初，韓遂與馬騰作亂關中，數與璋父焉交通信，至騰子超復與璋相聞，有連蜀之意。商謂璋曰：「超勇而不仁，見得不思義，不可以為脣齒。老子曰：『國之利器，不可以示人。』今之益部，士美民豐，寶物所出，斯乃狡夫所欲傾覆，超等所以西望也。若引而近之，則由養虎，將自遺患矣。」璋從其言，乃拒絕之。荊州牧劉表及儒者宋忠咸聞其名，遺書與商敘致殷勤。許靖號為臧否，至蜀，見商而稱之曰：「設使商生於華夏，雖王景興無以加也。」璋以商為蜀郡太守。成都禽堅有至孝之行，商表其墓，追贈孝廉。又與嚴君平、李弘立祠作銘，以旌先賢。脩學廣農，百姓便之。在郡十載，卒於官，許靖代之。
