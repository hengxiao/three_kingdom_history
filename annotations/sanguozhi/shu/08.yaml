  at: 352
  length: 0
  type: pei
  text: 臣松之以為孔子稱「賢者避世，其次避地」，蓋貴其識見安危，去就得所也。許靖羈客會稽，閭閻之士，孫策之來，於靖何為？而乃泛萬里之海，入疫癘之鄉，致使尊弱塗炭，百罹備經，可謂自貽矣。謀臣若斯，難以言智。孰若安時處順，端拱吳、越，與張昭、張紘之儔同保元吉者哉？
