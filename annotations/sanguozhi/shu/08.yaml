  type: pei
  text: 《搜神記》曰：竺嘗從洛歸，未達家數十里，路傍見一婦人，從竺求寄載。行可數里，婦謝去，謂竺曰：「我天使也，當往燒東海麋竺家，感君見載，故以相語。」竺因私請之，婦曰：「不可得不燒。如此，君可馳去，我當緩行，日中火當發。」竺乃還家，遽出財物，日中而火大發。
