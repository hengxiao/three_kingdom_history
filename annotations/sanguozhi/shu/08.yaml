- id: shu.8.p15.a1
  anchor: shu.8.p15
  at: 327
  length: 0
  type: pei
  text: 益部耆舊傳曰：安，廣漢人。少事聘士楊厚，究極圖籍，遊覽京師，還家講授，與董扶俱以學行齊聲。郡請功曹，州辟治中別駕，終不久居。舉孝廉茂才，太尉載辟，除博士，公車徵，皆稱疾不就。州牧劉焉表薦安味精道度，厲節高邈，揆其器量，國之元寶，宜處弼疑之輔，以消非常之咎。玄纁之禮，所宜招命。王塗隔塞，遂無聘命。年七十九，建安七年卒，門人慕仰，為立碑銘。後丞相亮問秦宓以安所長，宓曰：「記人之善，忘人之過。」
