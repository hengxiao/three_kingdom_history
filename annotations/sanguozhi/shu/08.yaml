- id: shu.8.p8.a1
  anchor: shu.8.p8
  at: 122
  length: 0
  type: pei
  text: 《魏略》：王朗與文休書曰：「文休足下：消息平安，甚善甚善。豈意脫別三十餘年而無相見之緣乎！詩人比一日之別於歲月，豈況悠悠歷累紀之年者哉！自與子別，若沒而復浮，若絕而復連者數矣。而今而後，居昇平之京師，攀附於飛龍之聖主；儕輩略盡，幸得老與足下併為遺種之叟，而相去數千里，加有邅蹇之隔，時聞消息於風聲，託舊情於思想，眇眇異處，與異世無以異也。往者隨軍到荊州，見鄧子孝、桓元將，粗聞足下動靜，云夫子既在益州，執職領郡，德素規矩，老而不墮。是時侍宿武皇帝於江陵劉景升聽事之上，共道足下於通夜，拳拳饑渴，誠無已也。自天子在東宮，及即位之後，每會群賢，論天下髦雋之見在者，豈獨人盡易為英，士鮮易取最，故乃猥以原壤之朽質，感夫子之情聽；每敘足下，以為謀首，豈其注意，乃復過於前世，書曰『人惟求舊』，易稱『同聲相應，同氣相求』，劉將軍之與大魏，兼而兩之，總此二義。前世邂逅，以同為睽，非武皇帝之旨；頃者蹉跌，其泰而否，亦非足下之意也。深思書、易之義，利結分於宿好，故遣降者送吳所獻致名馬、貂、罽，得因無嫌。道初開通，展敘舊情，以達聲問。久闊情慉，非夫筆墨所能寫陳，亦想足下同其志念。今者，親生男女凡有幾人？年並幾何？僕連失一男一女，今有二男：大兒名肅，年二十九，生於會稽；小兒裁歲餘。臨書愴悢，有懷緬然。」又曰：「過聞『受終於文祖』之言於尚書。又聞『曆數在躬，允執其中』之文於論語。豈自意得於老耄之齒，正值天命受於聖主之會，親見三讓之弘辭，觀眾瑞之總集，睹升堂穆穆之盛禮，瞻燔燎焜曜之青煙；於時忽自以為處唐、虞之運，際於紫微之天庭也。徒慨不得攜子之手，共列於（世）有二子之數，以聽有唐『欽哉』之命也。子雖在裔土，想亦極目而回望，側耳而遐聽，延頸而鶴立也。昔汝南陳公初拜，不依故常，讓上卿於李元禮。以此推之，吾宜退身以避子位也。苟得避子以竊讓名，然後（綬）帶委質，游談於平、勃之間，與子共陳往時避地之艱辛，樂酒酣宴，高談大噱，亦足遺憂而忘老。捉筆陳情，隨以喜笑。」又曰：「前夏有書而未達，今重有書，而並致前問。皇帝既深悼劉將軍之早世，又愍其孤之不易，又惜使足下孔明等士人氣類之徒，遂沈溺於羌夷異種之間，永與華夏乖絕，而無朝聘中國之期緣，瞻睎故土桑梓之望也，故復運慈念而勞仁心，重下明詔以發德音，申敕朗等，使重為書與足下等。以足下聰明，揆殷勤之聖意，亦足悟海岱之所常在，知百川之所宜注矣。昔伊尹去夏而就殷，陳平違楚而歸漢，猶曜德於阿衡，著功於宰相。若足下能弼人之遺孤，定人之猶豫，去非常之偽號，事受命之大魏，客主兼不世之榮名，上下蒙不朽之常耀，功與事並，聲與勛著，考績效，足以超越伊、呂矣。既承詔（直），且服舊之情，情不能已。若不言足下之所能，陳足下之所見，則無以宣明詔命，弘光大之恩，敘宿昔夢想之思。若天啟眾心，子導蜀意，誠此意有攜手之期。若險路未夷，子謀不從，則懼聲問或否，復面何由！前後二書，言每及斯，希不切然有動於懷。足下周游江湖，以暨南海，歷觀夷俗，可謂遍矣；想子之心，結思華夏，可謂深矣。為身擇居，猶原中土；為主擇（居）安，豈可以不系意於京師，而持疑於荒裔乎？詳思愚言，速示還報也。」
