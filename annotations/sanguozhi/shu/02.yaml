  type: pei
  text: 《益部耆舊雜記》曰：劉璋遣張任、劉璝率精兵拒捍先主於涪，為先主所破，退與璋子循守雒城。任勒兵出於雁橋，戰复敗。禽任。先主聞任之忠勇，令軍降之，任厲聲曰：「老臣終不復事二主矣。」乃殺之。先主嘆惜焉。
- id: shu.2.p16.a2
  anchor: shu.2.p16
  at: 21
  length: 0
  type: pei
  text: 《傅子》曰：初，劉備襲蜀，丞相掾趙戩曰：「劉備其不濟乎？拙於用兵，每戰則敗，奔亡不暇，何以圖人？蜀雖小區，險固四塞，獨守之國，難卒並也。」徵士傅幹曰：「劉備寬仁有度，能得人死力。諸葛亮達治知變，正而有謀，而為之相；張飛、關羽勇而有義，皆萬人之敵，而為之將：此三人者，皆人傑也。以備之略，三傑佐之，何為不濟也？」《典略》曰：趙戩，字叔茂，京兆長陵人也。質而好學，言稱詩書，愛卹於人，不論疏密。闢公府，入為尚書選部郎。董卓欲以所私並充臺閣，戩拒不聽。卓怒，召戩欲殺之，觀者皆為戩懼，而戩自若。及見卓，引辭正色，陳說是非，卓雖凶戾，屈而謝之遷平陵令。故將王允被害，莫敢近者，戩棄官收斂之。三輔亂，戩客荊州，劉表以為賓客。曹公平荊州，執戩手曰：「何相見之晚也！」遂闢為掾。後為五官將司馬，相國鍾繇長史，年六十餘卒。
