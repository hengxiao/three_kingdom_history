  text: 胡沖《吳歷》曰：曹公數遣親近密覘諸將有賓客酒食者，輒因事害之。備時閉門，將人種蕪菁，曹公使人闚門。既去，備謂張飛、關羽曰：「吾豈種菜者乎？曹公必有疑意，不可復留。」其夜開後柵，與飛等輕騎俱去，所得賜遺衣服，悉封留之，乃往小沛收合兵眾。臣松之案：魏武帝遣先主統諸將要擊袁術，郭嘉等並諫，魏武不從，其事顯然，非因種菜遁逃而去。如胡沖所云，何乖僻之甚乎！
