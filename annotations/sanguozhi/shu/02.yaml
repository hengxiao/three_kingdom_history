- id: shu.2.p32.a1
  anchor: shu.2.p32
  at: 44
  length: 0
  type: pei
  text: 臣松之以為先主雖云出自孝景，而世數悠遠，昭穆難明，既紹漢祚，不知以何帝為元祖以立親廟。於時英賢作輔，儒生在宮，宗廟制度，必有憲章，而載記闕略，良可恨哉！
- id: shu.2.p33.a1
