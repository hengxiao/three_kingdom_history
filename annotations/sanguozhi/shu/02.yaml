- id: shu.2.p9.a1
  anchor: shu.2.p9
  at: 68
  length: 0
  type: pei
  text: 《九州春秋》曰：備住荊州數年，嘗於表坐起至廁，見髀裡肉生，慨然流涕。還坐，表怪問備，備曰：「吾常身不離鞍，髀肉皆消。今不復騎，髀裏肉生。日月若馳，老將至矣，而功業不建，是以悲耳。」《世語》曰：備屯樊城，劉表禮焉，憚其為人，不甚信用。曾請備宴會，蒯越、蔡瑁欲因會取備，備覺之，偽如廁，潛遁出。所乘馬名的盧，騎的盧走，墮襄陽城西檀溪水中，溺不得出。備急曰：「的盧：今日厄矣，可努力！」的盧乃一踴三丈，遂得過，乘桴渡河，中流而追者至，以表意謝之，曰：「何去之速乎！」孫盛曰：此不然之言。備時羈旅，客主勢殊，若有此變，豈敢晏然終表之世而無釁故乎？此皆世俗妄說，非事實也。
