  era: 建安
  era_year: 1
  year_ad: 196
- id: shu.2.p4.a2
  anchor: shu.2.p4
  at: 448
  length: 0
  type: pei
  text: 《英雄記》曰：備留張飛守下邳，引兵與袁術戰於淮陰石亭，更有勝負。陶謙故將曹豹在下邳，張飛欲殺之。豹眾堅營自守，使人招呂布。布取下邳，張飛敗走。備聞之，引兵還，比至下邳，兵潰。收散卒東取廣陵，與袁術戰，又敗。
- id: shu.2.p5.a1
  anchor: shu.2.p5
  at: 6
  length: 0
  type: pei
  text: 《英雄記》曰：備軍在廣陵，飢餓困踧，吏士大小自相噉食，窮餓侵逼，欲還小沛，遂使吏請降布。布令備還州，并勢擊術。具刺史車馬僮僕，發遣備妻子部曲家屬於泗水上，祖道相樂。魏書曰：諸將謂布曰：「備數反覆難養，宜早圖之。」布不聽，以狀語備。備心不安而求自託，使人說布，求屯小沛，布乃遣之。
- id: shu.2.p5.a2
  anchor: shu.2.p5
  at: 106
  length: 0
  type: pei
  text: 英雄記曰：建安三年春，布使人齎金欲詣河內買馬，為備兵所鈔。布由是遣中郎將高順、北地太守張遼等攻備。九月，遂破沛城，備單身走，獲其妻息。十月，曹公自征布，備於梁國界中與曹公相遇，遂隨公俱東征。
- id: shu.2.p6.a1
  anchor: shu.2.p6
  at: 15
  length: 0
  type: pei
  text: 臣松之案：董承，漢靈帝母董太后之侄，於獻帝為丈人。蓋古無丈人之名，故謂之舅也。
- id: shu.2.p6.a2
  anchor: shu.2.p6
  at: 79
  length: 0
  type: pei
  text: 《華陽國志》云：于時正當雷震，備因謂操曰：「聖人云『迅雷風烈必變』，良有以也。一震之威，乃可至於此也！」
- id: shu.2.p6.a3
  anchor: shu.2.p6
  at: 119
  length: 0
  type: pei
  text: 《獻帝起居注》曰：承等與備謀未發，而備出。承謂服曰：「郭多有數百兵，壞李傕數万人，但足下與我同不耳！昔呂不韋之門，須子楚而後高，今吾與子由是也。」服曰：「惶懼不敢當，且兵又少。」承曰：「舉事訖，得曹公成兵，顧不足邪？」服曰：「今京師豈有所任乎？」承曰：「長水校尉种輯、議郎吳碩是我腹心辦事者。」遂定計。
- id: shu.2.p7.a1
  anchor: shu.2.p7
  at: 34
  length: 0
  type: pei
  text: 胡沖《吳歷》曰：曹公數遣親近密覘諸將有賓客酒食者，輒因事害之。備時閉門，將人種蕪菁，曹公使人闚門。既去，備謂張飛、關羽曰：「吾豈種菜者乎？曹公必有疑意，不可復留。」其夜開後柵，與飛等輕騎俱去，所得賜遺衣服，悉封留之，乃往小沛收合兵眾。臣松之案：魏武帝遣先主統諸將要擊袁術，郭嘉等並諫，魏武不從，其事顯然，非因種菜遁逃而去。如胡沖所云，何乖僻之甚乎！
- id: shu.2.p7.a2
  anchor: shu.2.p7
  at: 93
  length: 0
  type: pei
  text: 《魏書》曰：是時，公方有急於官渡，乃分留諸將屯官渡，自勒精兵征備。備初謂公與大敵連，不得東，而候騎卒至，言曹公自來。備大驚，然猶未信。自將數十騎出望公軍，見麾旌，便棄眾而走。
- id: shu.2.p8.a1
  anchor: shu.2.p8
  at: 62
  length: 0
  type: pei
  text: 魏書曰：備歸紹，紹父子傾心敬重。
- id: shu.2.p9.a1
  anchor: shu.2.p9
  at: 68
  length: 0
  type: pei
  text: 《九州春秋》曰：備住荊州數年，嘗於表坐起至廁，見髀裡肉生，慨然流涕。還坐，表怪問備，備曰：「吾常身不離鞍，髀肉皆消。今不復騎，髀裏肉生。日月若馳，老將至矣，而功業不建，是以悲耳。」《世語》曰：備屯樊城，劉表禮焉，憚其為人，不甚信用。曾請備宴會，蒯越、蔡瑁欲因會取備，備覺之，偽如廁，潛遁出。所乘馬名的盧，騎的盧走，墮襄陽城西檀溪水中，溺不得出。備急曰：「的盧：今日厄矣，可努力！」的盧乃一踴三丈，遂得過，乘桴渡河，中流而追者至，以表意謝之，曰：「何去之速乎！」孫盛曰：此不然之言。備時羈旅，客主勢殊，若有此變，豈敢晏然終表之世而無釁故乎？此皆世俗妄說，非事實也。
- id: shu.2.p10.a1
  anchor: shu.2.p10
  at: 23
  length: 0
  type: pei
  text: 《漢晉春秋》曰：曹公自柳城還，表謂備曰：「不用君言，故為失此大會。」備曰：「今天下分裂，日尋干戈，事會之來，豈有終極乎？若能應之於後者，則此未足為恨也。」
- id: shu.2.p10.a2
  anchor: shu.2.p10
  at: 33
  length: 0
  type: pei
  text: 《英雄記》曰：表病，上備領荊州刺史。魏書曰：表病篤，託國於備，顧謂曰：「我兒不才，而諸將並零落，我死之後，卿便攝荊州。」備曰：「諸子自賢，君其憂病。」或勸備宜從表言，備曰：「此人待我厚，今從其言，人必以我為薄，所不忍也。」臣松之以為表夫妻素愛琮，捨適立庶，情計久定，無緣臨終舉荊州以授備，此亦不然之言。
- id: shu.2.p10.a3
  anchor: shu.2.p10
  at: 96
  length: 0
  type: pei
  text: 孔衍《漢魏春秋》曰：劉琮乞降，不敢告備。備亦不知，久之乃覺，遣所親問琮。琮令宋忠詣備宣旨。是時曹公在宛，備乃大驚駭，謂忠曰：「卿諸人作事如此，不早相語，今禍至方告我，不亦太劇乎！」引刀向忠曰：「今斷卿頭，不足以解忿，亦恥大丈夫臨別復殺卿輩！」遣忠去，乃呼部曲議。或勸備劫將琮及荊州吏士徑南到江陵，備答曰：「劉荊州臨亡託我以孤遺，背信自濟，吾所不為，死何面目以見劉荊州乎！」
- id: shu.2.p10.a4
  anchor: shu.2.p10
  at: 120
  length: 0
  type: pei
  text: 《典略》曰：備過辭表墓，遂涕泣而去。
- id: shu.2.p10.a5
  anchor: shu.2.p10
  at: 221
  length: 0
  type: pei
  text: 習鑿齒曰：先主雖顛沛險難而信義愈明，勢偪事危而言不失道。追景升之顧，則情感三軍；戀赴義之士，則甘與同敗。觀其所以結物情者，豈徒投醪撫寒含蓼問疾而已哉！其終濟大業，不亦宜乎！
- id: shu.2.p11.a1
  anchor: shu.2.p11
  at: 142
  length: 0
  type: pei
  text: 《江表傳》曰：孫權遣魯肅弔劉表二子，并令與備相結。肅未至而曹公已濟漢津。肅故進前，與備相遇於當陽。因宣權旨，論天下事勢，致殷勤之意。且問備曰：「豫州今欲何至？」備曰：「與蒼梧太守〔吳巨〕有舊，欲往投之。」肅曰：「孫討虜聰明仁惠，敬賢禮士，江表英豪，咸歸附之，已據有六郡，兵精糧多，足以立事。今為君計，莫若遣腹心使自結於東，崇連和之好，共濟世業，而云欲投〔吳巨〕，〔巨〕是凡人，偏在遠郡，行將為人所併，豈足託乎？」備大喜，進住鄂縣，即遣諸葛亮隨肅詣孫權，結同盟誓。
- id: shu.2.p11.a2
  anchor: shu.2.p11
  at: 161
  length: 0
  type: pei
  text: 江表傳曰：備從魯肅計，進住鄂縣之樊口。諸葛亮詣吳未還，備聞曹公軍下，恐懼，日遣邏吏於水次候望權軍。吏望見瑜船，馳往白備，備曰：「何以知（之）非青徐軍邪？」吏對曰：「以船知之。」備遣人慰勞之。瑜曰：「有軍任，不可得委署，儻能屈威，誠副其所望。」備謂關羽、張飛曰：「彼欲致我，我今自結託於東而不往，非同盟之意也。」乃乘單舸往見瑜，問曰：「今拒曹公，深為得計。戰卒有幾？」瑜曰：「三萬人。」備曰：「恨少。」瑜曰：「此自足用，豫州但觀瑜破之。」備欲呼魯肅等共會語，瑜曰：「受命不得妄委署，若欲見子敬，可別過之。又孔明已俱來，不過三兩日到也。」備雖深愧異瑜，而心未許之能必破北軍也，故差池在後，將二千人與羽、飛俱，未肯係瑜，蓋為進退之計也。孫盛曰：劉備雄才，處必亡之地，告急於吳，而獲奔助，無緣復顧望江渚而懷後計。江表傳之言，當是吳人欲專美之辭。
- id: shu.2.p11.a3
  anchor: shu.2.p11
  at: 208
  length: 0
  type: pei
  text: 《江表傳》曰：周瑜為南郡太守，分南岸地以給備。備別立營於油江口，改名為公安。劉表吏士見從北軍，多叛來投備。備以瑜所給地少，不足以安民，（後）〔復〕從權借荊州數郡。
- id: shu.2.p12.a1
  anchor: shu.2.p12
  at: 46
  length: 0
  type: pei
  text: 《三輔決錄注》曰：金旋字元機，京兆人，歷位黃門郎，漢陽太守，徵拜議郎，遷中郎將，領武陵太守，為備所攻劫死。子禕，事見《魏武本紀》。
- id: shu.2.p12.a2
  anchor: shu.2.p12
  at: 99
  length: 0
  type: pei
  text: 《山陽公載記》曰：備還，謂左右曰：「孫車騎長上短下，其難為下，吾不可以再見之。」乃晝夜兼行。臣松之案：魏書載劉備與孫權語，與蜀志述諸葛亮與權語正同。劉備未破魏軍之前，尚未與孫權相見，不得有此說。故知蜀志為是。
- id: shu.2.p12.a3
  anchor: shu.2.p12
  at: 233
  length: 0
  type: pei
  text: 《獻帝春秋》曰：孫權欲與備共取蜀，遣使報備曰：「米賊張魯居王巴、漢，為曹操耳目，規圖益州。劉璋不武，不能自守。若操得蜀，則荊州危矣。今欲先攻取璋，進討張魯，首尾相連，一統吳、楚，雖有十操，無所憂也。」備欲自圖蜀，拒答不聽，曰：
- id: shu.2.p14.a1
  anchor: shu.2.p14
  at: 174
  length: 0
  type: pei
  text: 《吳書》曰：備前見張松，後得法正，皆厚以恩意接納，盡其殷勤之歡。因問蜀中闊狹，兵器府庫人馬眾寡，及諸要害道里遠近，松等具言之，又畫地圖山川處所，由是盡知益州虛實也。
- id: shu.2.p15.a1
  anchor: shu.2.p15
  at: 121
  length: 0
  type: pei
  text: 《魏書》曰：備因激怒其眾曰：「吾為益州徵強敵，師徒勤瘁，不遑寧居；今積帑藏之財而吝於賞功，望士大夫為出死力戰，其可得乎！」
- id: shu.2.p15.a2
  anchor: shu.2.p15
  at: 180
  length: 0
  type: pei
  text: 《益部耆舊雜記》曰：張肅有威儀，容貌甚偉。松為人短小，放蕩不治節操，然識達精果，有才幹。劉璋遣詣曹公，曹公不甚禮；公主簿楊脩深器之，白公闢松，公不納。脩以公所撰兵書示松，松宴飲之間一看便闇誦。脩以此益異之。
- id: shu.2.p15.a3
  anchor: shu.2.p15
  at: 280
  length: 0
  type: pei
  text: 《益部耆舊雜記》曰：張任，蜀郡人，家世寒門。少有膽勇，有志節，仕州為從事。
- id: shu.2.p16.a1
  anchor: shu.2.p16
  at: 9
  length: 0
  type: pei
  text: 《益部耆舊雜記》曰：劉璋遣張任、劉璝率精兵拒捍先主於涪，為先主所破，退與璋子循守雒城。任勒兵出於雁橋，戰复敗。禽任。先主聞任之忠勇，令軍降之，任厲聲曰：「老臣終不復事二主矣。」乃殺之。先主嘆惜焉。
- id: shu.2.p16.a2
  anchor: shu.2.p16
  at: 21
  length: 0
  type: pei
  text: 《傅子》曰：初，劉備襲蜀，丞相掾趙戩曰：「劉備其不濟乎？拙於用兵，每戰則敗，奔亡不暇，何以圖人？蜀雖小區，險固四塞，獨守之國，難卒並也。」徵士傅幹曰：「劉備寬仁有度，能得人死力。諸葛亮達治知變，正而有謀，而為之相；張飛、關羽勇而有義，皆萬人之敵，而為之將：此三人者，皆人傑也。以備之略，三傑佐之，何為不濟也？」《典略》曰：趙戩，字叔茂，京兆長陵人也。質而好學，言稱詩書，愛卹於人，不論疏密。闢公府，入為尚書選部郎。董卓欲以所私並充臺閣，戩拒不聽。卓怒，召戩欲殺之，觀者皆為戩懼，而戩自若。及見卓，引辭正色，陳說是非，卓雖凶戾，屈而謝之遷平陵令。故將王允被害，莫敢近者，戩棄官收斂之。三輔亂，戩客荊州，劉表以為賓客。曹公平荊州，執戩手曰：「何相見之晚也！」遂闢為掾。後為五官將司馬，相國鍾繇長史，年六十餘卒。
- id: shu.2.p21.a1
  anchor: shu.2.p21
  at: 49
  length: 0
  type: pei
  text: 《三輔決錄注》曰：援字文雄，扶風人也。其先本姓謝，與北地諸謝同族。始祖謝服為將軍出征，天子以謝服非令名，改為射，子孫氏焉。兄堅，字文固，少有美名，闢公府為黃門侍郎。獻帝之初，三輔飢亂，堅去官，與弟援南入蜀依劉璋，璋以堅為長史。劉備代璋，以堅為廣漢、蜀郡太守。援亦少有名行，太尉皇甫嵩賢其才而以女妻之，丞相諸葛亮以援為祭酒，遷從事中郎，卒官。
- id: shu.2.p21.a2
  anchor: shu.2.p21
  at: 416
  length: 0
  type: pei
  text: 趙高使閻樂殺二世。王莽廢孺子以為定安公。
- id: shu.2.p24.a1
  anchor: shu.2.p24
  at: 258
  length: 0
  type: pei
  text: 鄭玄注曰：庶，眾也；勵，作也；敘，次序也。序九族而親之，以眾明作羽翼之臣也。
- id: shu.2.p25.a1
  anchor: shu.2.p25
  at: 18
  length: 0
  type: pei
  text: 《典略》曰：備於是起館舍，築亭障，從成都至白水關，四百餘區。
- id: shu.2.p30.a1
  anchor: shu.2.p30
  at: 12
  length: 0
  type: pei
  text: 《蜀本紀》曰：武都有丈夫化為女子，顏色美好，蓋山精也。蜀王娶以為妻，不習水土，疾病欲歸國，蜀王留之，無幾物故。蜀王發卒之武都擔土，於成都郭中葬，蓋地數畝，高十丈，號曰武擔也。臣松之案：武擔，山名，在成都西北，蓋以乾位在西北，故就之以即阼。
