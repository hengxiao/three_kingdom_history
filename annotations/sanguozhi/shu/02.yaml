  at: 56
  length: 0
  type: pei
  text: 猇，許交反。
- id: shu.2.p33.a2
  anchor: shu.2.p33
  at: 62
  length: 0
  type: pei
  text: 佷，音恆。
- id: shu.2.p34.a1
  anchor: shu.2.p34
  at: 33
  length: 0
  type: pei
  text: 音笏。
- id: shu.2.p34.a2
  anchor: shu.2.p34
  at: 100
  length: 0
  type: pei
  text: 諸葛亮集載先主遺詔敕後主曰：朕初疾但下痢耳，後轉雜他病，殆不自濟。人五十不稱夭，年已六十有餘，何所复恨，不復自傷，但以卿兄弟為念。射君到，說丞相嘆卿智量，甚大增脩，過於所望，審能如此，吾復何憂！勉之，勉之！勿以惡小而為之，勿以善小而不為。惟賢惟德，能服於人。汝父德薄，勿效之。可讀漢書、禮記，間暇歷觀諸子及六韜、商君書，益人意智。聞丞相為寫申、韓、管子、六韜一通已畢，未送，道亡，可自更求聞達。臨終時，呼魯王與語：「吾亡之後，汝兄弟父事丞相，令卿與丞相共事而已。」
- id: shu.2.p37.a1
  anchor: shu.2.p37
  at: 28
  length: 0
  type: pei
  text: 葛洪《神仙傳》曰：仙人李意其，蜀人也。傳世見之，云是漢文帝時人。先主欲伐吳，遣人迎意其。意其到，先主禮敬之，問以吉凶。意其不答而求紙筆，畫作兵馬器仗數十紙已，便一一以手裂壞之，又畫作一大人，掘地埋之，便徑去。先主大不喜。而自出軍徵吳，大敗還，忿恥發病死，眾人乃知其意。其畫作大人而埋之者，即是言先主死意。
