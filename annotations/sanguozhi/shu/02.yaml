  anchor: shu.2.p37
  at: 28
  length: 0
  type: pei
  text: 葛洪《神仙傳》曰：仙人李意其，蜀人也。傳世見之，云是漢文帝時人。先主欲伐吳，遣人迎意其。意其到，先主禮敬之，問以吉凶。意其不答而求紙筆，畫作兵馬器仗數十紙已，便一一以手裂壞之，又畫作一大人，掘地埋之，便徑去。先主大不喜。而自出軍徵吳，大敗還，忿恥發病死，眾人乃知其意。其畫作大人而埋之者，即是言先主死意。
