  length: 0
  type: pei
  text: 《漢晉春秋》曰：涿人李定云：「此家必出貴人。」
- id: shu.2.p3.a1
  anchor: shu.2.p3
  at: 37
  length: 0
  type: pei
  text: 《典略》曰：平原劉子平知備有武勇，時張純反叛，青州被詔，遣從事將兵討純，過平原，子平薦備於從事，遂與相隨，遇賊於野，備中創陽死，賊去後，故人以車載之，得免。後以軍功，為中山安喜尉。
- id: shu.2.p3.a2
  anchor: shu.2.p3
  at: 72
  length: 0
  type: pei
  text: 五葬反。
- id: shu.2.p3.a3
  anchor: shu.2.p3
  at: 77
  length: 0
  type: pei
  text: 《典略》曰：其後州郡被詔書，其有軍功為長吏者，當沙汰之，備疑在遣中。督郵至縣，當遣備，備素知之。聞督郵在傳舍，備欲求見督郵，督郵稱疾不肯見備，備恨之，因還治，將吏卒更詣傳舍，突入門，言「我被府君密教收督郵」。遂就床縛之，將出到界，自解其綬以繫督郵頸，縛之著樹，鞭杖百餘下，欲殺之。督郵求哀，乃釋去之。
- id: shu.2.p3.a4
  anchor: shu.2.p3
  at: 134
  length: 0
  type: pei
  text: 《英雄記》云：靈帝末年，備嘗在京師，後與曹公俱還沛國，募召合眾。會靈帝崩，天下大亂，備亦起軍從討董卓。
- id: shu.2.p3.a5
  anchor: shu.2.p3
  at: 225
  length: 0
  type: pei
  text: 《魏書》曰：劉平結客刺備，備不知而待客甚厚，客以狀語之而去。是時人民饑饉，屯聚鈔暴。備外禦寇難，內豐財施，士之下者，必與同席而坐，同簋而食，無所簡擇。眾多歸焉。
- id: shu.2.p4.a1
  anchor: shu.2.p4
  at: 362
  length: 0
  type: pei
  text: 《獻帝春秋》曰：陳登等遣使詣袁紹曰：「天降災沴，禍臻鄙州，州將殂殞，生民無主，恐懼姦雄一旦承隙，以貽盟主日昃之憂，輒共奉故平原相劉備府君以為宗主，永使百姓知有依歸。方今寇難縱橫，不遑釋甲，謹遣下吏奔告于執事。」紹答曰：「劉玄德弘雅有信義，今徐州樂戴之，誠副所望也。」
- id: shu.2.p4.t1
  anchor: shu.2.p4
