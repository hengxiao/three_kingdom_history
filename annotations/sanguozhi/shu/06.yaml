- id: shu.6.p16.a2
  anchor: shu.6.p16
  at: 106
  length: 0
  type: pei
  text: 雲別傳曰：初，先主之敗，有人言雲已北去者，先主以手戟擿之曰：「子龍不棄我走也。」頃之，雲至。從平江南，以為偏將軍，領桂陽太守，代趙範。範寡嫂曰樊氏，有國色，範欲以配雲。雲辭曰：「相與同姓，卿兄猶我兄。」固辭不許。時有人勸雲納之，雲曰：「範迫降耳，心未可測；天下女不少。」遂不取。範果逃走，雲無纖介。先是，與夏侯惇戰於博望，生獲夏侯蘭。蘭是雲鄉里人，少小相知，雲白先主活之，薦蘭明於法律，以為軍正。雲不用自近，其慎慮類如此。先主入益州，雲領留營司馬。此時先主孫夫人以權妹驕豪，多將吳吏兵，縱橫不法。先主以雲嚴重，必能整齊，特任掌內事。權聞備西徵，大遣舟船迎妹，而夫人內欲將後主還吳，雲與張飛勒兵截江，乃得後主還。
