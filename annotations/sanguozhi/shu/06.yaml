- id: shu.6.p17.a3
  anchor: shu.6.p17
  at: 276
  length: 0
  type: pei
  text: 雲別傳載後主詔曰：「雲昔從先帝，功積既著。朕以幼沖，涉塗艱難，賴恃忠順，濟於危險。夫諡所以敘元勳也，外議雲宜諡。」大將軍姜維等議，以為雲昔從先帝，勞績既著，經營天下，遵奉法度，功效可書。當陽之役，義貫金石，忠以衛上，君念其賞，禮以厚下，臣忘其死。死者有知，足以不朽；生者感恩，足以殞身。謹按諡法，柔賢慈惠曰順，執事有班曰平，克定禍亂曰平，應諡雲曰順平侯。
