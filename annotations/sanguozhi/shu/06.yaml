  text: 雲別傳曰：雲身長八尺，姿顏雄偉，為本郡所舉，將義從吏兵詣公孫瓚。時袁紹稱冀州牧，瓚深憂州人之從紹也，善雲來附，嘲雲曰：「聞貴州人皆原袁氏，君何獨回心，迷而能反乎？」雲答曰：「天下訩訩，未知孰是，民有倒縣之厄，鄙州論議，從仁政所在，不為忽袁公私明將軍也。」遂與瓚征討。時先主亦依讬瓚，每接納雲，雲得深自結讬。雲以兄喪，辭瓚暫歸，先主知其不反，捉手而別，雲辭曰：「終不背德也。」先主就袁紹，雲見於鄴。先主與雲同床眠臥，密遣雲合募得數百人，皆稱劉左將軍部曲，紹不能知。遂隨先主至荊州。
