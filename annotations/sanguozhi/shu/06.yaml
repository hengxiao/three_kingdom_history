- id: shu.6.p3.a1
  anchor: shu.6.p3
  at: 65
  length: 0
  type: pei
  text: 蜀記曰：初，劉備在許，與曹公共獵。獵中，眾散，羽勸備殺公，備不從。及在夏口，飄颻江渚，羽怒曰：「往日獵中，若從羽言，可無今日之困。」備曰：「是時亦為國家惜之耳；若天道輔正，安知此不為福邪！」臣松之以為備後與董承等結謀，但事泄不克諧耳，若為國家惜曹公，其如此言何！羽若果有此勸而備不肯從者，將以曹公腹心親戚，實繁有徒，事不宿構，非造次所行；曹雖可殺，身必不免，故以計而止，何惜之有乎！既往之事，故讬為雅言耳。
