  type: pei
  text: 蜀記曰：曹公與劉備圍呂布於下邳，關羽啟公，布使秦宜祿行求救，乞娶其妻，公許之。臨破，又屢啟於公。公疑其有異色，先遣迎看，因自留之，羽心不自安。此與魏氏春秋所說無異也。
