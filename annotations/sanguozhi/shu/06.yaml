  at: 218
  length: 0
  type: pei
  text: 《傅子》曰：遼欲白太祖，恐太祖殺羽，不白，非事君之道，乃歎曰：「公，君父也；羽，兄弟耳。」遂白之。太祖曰：「事君不忘其本，天下義士也。度何時能去？」遼曰：「羽受公恩，必立效報公而後去也。」
