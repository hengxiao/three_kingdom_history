  type: pei
  text: 《典略》曰：建安十六年，超與關中諸將侯選、程銀、李堪、張橫、梁興、成宜、馬玩、楊秋、韓遂等，凡十部，俱反，其眾十萬，同據河、潼，建列營陳。是歲，曹公西征，與超等戰於河、渭之交，超等敗走。超至安定，遂奔涼州。詔收滅超家屬。超復敗於隴上。後奔漢中，張魯以為都講祭酒，欲妻之以女，或諫魯曰：「有人若此不愛其親，焉能愛人？」魯乃止。初，超未反時，其小婦弟種留三輔，及超敗，種先入漢中。正旦，種上壽於超，超搥胸吐血曰：「闔門百口，一旦同命，今二人相賀邪？」後數從魯求兵，欲北取涼州，魯遣往，無利。又魯將楊白等欲害其能，超遂從武都逃入氐中，轉奔往蜀。是歲建安十九年也。
