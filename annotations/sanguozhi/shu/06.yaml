- id: shu.6.p17.a2
  anchor: shu.6.p17
  at: 177
  length: 0
  type: pei
  text: 雲別傳曰：亮曰：「街亭軍退，兵將不復相錄，箕穀軍退，兵將初不相失，何故？」芝答曰：「雲身自斷後，軍資什物，略無所棄，兵將無緣相失。」雲有軍資餘絹，亮使分賜將士，雲曰：「軍事無利，何為有賜？其物請悉入赤岸府庫，須十月為冬賜。」亮大善之。
