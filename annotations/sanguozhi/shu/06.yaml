  type: pei
  text: 蜀記曰：權遣將軍擊羽，獲羽及子平。權欲活羽以敵劉、曹，左右曰：「狼子不可養，後必為害。曹公不即除之，自取大患，乃議徙都。今豈可生！」乃斬之。臣松之按吳書：孫權遣將潘璋逆斷羽走路，羽至即斬，且臨沮去江陵二三百里，豈容不時殺羽，方議其生死乎？又云「權欲活羽以敵劉、曹」，此之不然，可以絕智者之口。吳曆曰：權送羽首於曹公，以諸侯禮葬其屍骸。
