  text: 山陽公載記曰：初，曹公軍在蒲阪，欲西渡，超謂韓遂曰：「宜於渭北拒之，不過二十日，河東穀盡，彼必走矣。」遂曰：「可聽令渡，蹙於河中，顧不快耶！」超計不得施。曹公聞之曰：「馬兒不死，吾無葬地也。」
