- id: shu.6.p5.a1
  anchor: shu.6.p5
  at: 186
  length: 0
  type: pei
  text: 《典略》曰：羽圍樊，權遣使求助之，敕使莫速進，又遣主簿先致命於羽。羽忿其淹遲，又自已得於禁等，乃罵曰：「鰂子敢爾，如使樊城拔，吾不能滅汝邪！」權聞之，知其輕己，偽手書以謝羽，許以自往。臣松之以為荊、吳雖外睦，而內相猜防，故權之襲羽，潛師密發。按呂蒙傳云：「伏精兵於𦩷𦪇之中，使白衣搖櫓，作商賈服。」以此言之，羽不求助於權，權必不語羽當往也。若許相援助，何故匿其形跡乎？
