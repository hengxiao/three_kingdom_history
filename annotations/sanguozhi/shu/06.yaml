  anchor: shu.6.p17
  at: 67
  length: 0
  type: pei
  text: 雲別傳曰：益州既定，時議欲以成都中屋舍及城外園地桑田分賜諸將。雲駮之曰：「霍去病以匈奴未滅，無用家為，令國賊非但匈奴，未可求安也。須天下都定，各反桑梓，歸耕本土，乃其宜耳。益州人民，初罹兵革，田宅皆可歸還，今安居複業，然後可役調，得其歡心。」先主即從之。夏侯淵敗，曹公爭漢中地，運米北山下，數千萬囊。黃忠以為可取，雲兵隨忠取米。忠過期不還，雲將數十騎輕行出圍，迎視忠等。值曹公揚兵大出，雲為公前鋒所擊，方戰，其大眾至，勢偪，遂前突其陳，且鬥且卻。公軍散，已復合，雲陷敵，還趣圍。將張著被創，雲復馳馬還營迎著。公軍追至圍，此時沔陽長張翼在雲圍內，翼欲閉門拒守，而雲入營，更大開門，偃旗息鼓。公軍疑雲有伏兵，引去。雲雷鼓震天，惟以戎弩於後射公軍，公軍驚駭，自相蹂踐，墮漢水中死者甚多。先主明旦自來至雲營圍視昨戰處，曰：「子龍一身都是膽也。」作樂飲宴至暝，軍中號雲為虎威將軍。孫權襲荊州，先主大怒，欲討權。雲諫曰：「國賊是曹操，非孫權也，且先滅魏，則吳自服。操身雖斃，子丕篡盜，當因眾心，早圖關中，居河、渭上流以討凶逆，關東義士必裹糧策馬以迎王師。不應置魏，先與吳戰；兵勢一交，不得卒解。」先主不聽，遂東征，留雲督江州。先主失利於秭歸，雲進兵至永安，吳軍已退。
