- id: shu.6.p10.a1
  anchor: shu.6.p10
  at: 170
  length: 0
  type: pei
  text: 《典略》曰：騰字壽成，馬援後也。桓帝時，其父字子碩，嘗為天水蘭幹尉。後失官，因留隴西，與羌錯居。家貧無妻，遂娶羌女，生騰。騰少貧無產業，常從彰山中斫材木，負販詣城市，以自供給。騰為人長八尺餘，身體洪大，面鼻雄異，而性賢厚，人多敬之。靈帝末，涼州刺史耿鄙任信奸吏，民王國等及氐、羌反叛。州郡募發民中有勇力者，欲討之，騰在募中。州郡異之，署為軍從事，典領部眾。討賊有功，拜軍司馬，後以功遷偏將軍，又遷征西將軍，常屯汧、隴之間。初平中，拜征東將軍。是時，西州少穀，騰自表軍人多乏，求就谷於池陽，遂移屯長平岸頭。而將王承等恐騰為己害，乃攻騰營。時騰近出無備，遂破走，西上。會三輔亂，不復來東，而與鎮西將軍韓遂結為異姓兄弟，始甚相親，後轉以部曲相侵入，更為讎敵。騰攻遂，遂走，合眾還攻騰，殺騰妻子，連兵不解。建安之初，國家綱紀殆弛，乃使司隸校尉鍾繇、涼州牧韋端和解之。徵騰還屯槐裏，轉拜為前將軍，假節，封槐裏侯。北備胡寇，東備白騎，待士進賢，矜救民命，三輔甚安愛之。十（五）年，徵為衛尉，騰自見年老，遂入宿衛。初，曹公為丞相，辟騰長子超，不就。超後為司隸校尉督軍從事，討郭援，為飛矢所中，乃以囊囊其足而戰，破斬援首。詔拜徐州刺史，後拜諫議大夫。及騰之入，因詔拜為偏將軍，使領騰營。又拜超弟休奉車都尉，休弟鐵騎都尉，徙其家屬皆詣鄴，惟超獨留。
