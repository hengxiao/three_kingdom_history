  anchor: shu.6.p12
  at: 44
  length: 0
  type: pei
  text: 山陽公載記曰：超因見備待之厚，與備言，常呼備字，關羽怒，請殺之。備曰：「人窮來歸我，卿等怒，以呼我字故而殺之，何以示於天下也！」張飛曰：「如是，當示之以禮。」明日大會，請超入，羽、飛並杖刀立直，超顧坐席，不見羽、飛，見其直也，乃大驚，遂一不復呼備字。明日歎曰：「我今乃知其所以敗。為呼人主字，幾為關羽、張飛所殺。」自後乃尊事備。臣松之按以為超以窮歸備，受其爵位，何容傲慢而呼備字？且備之入蜀，留關羽鎮荊州，羽未嘗在益土也。故羽聞馬超歸降，以書問諸葛亮「超人才可誰比類」，不得如書所云。羽焉得與張飛立直乎？凡人行事，皆謂其可也，知其不可，則不行之矣。超若果呼備字，亦謂於理宜爾也。就令羽請殺超，超不應聞，但見二子立直，何由便知以呼字之故，云幾為關、張所殺乎？言不經理，深可忿疾也。袁暐、樂資等諸所記載，穢雜虛謬，若此之類，殆不可勝言也。
