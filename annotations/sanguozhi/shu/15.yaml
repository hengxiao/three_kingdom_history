  type: pei
  text: 吳歷曰：預臨別，謂孫權曰：「蜀土僻小，雖云鄰國，東西相賴，吳不可無蜀，蜀不可無吳，君臣憑恃，唯陛下重垂神慮。」又自說「年老多病，恐不復得奉聖顏」。孫盛曰：夫帝王之保，唯道與義，道義既建，雖小可大，殷、周是也。苟任詐力，雖強必敗，秦、項是也。況乎居偏鄙之城，恃山水之固，而欲連橫萬里，永相資賴哉？昔九國建合從之計，而秦人卒並六合；囂、述營輔車之謀，而光武終兼隴、蜀。夫以九國之強，隴、漢之大，莫能相救，坐觀屠覆。何者？道德之基不固，而強弱之心難一故也。而云「吳不可無蜀，蜀不可無吳」，豈不諂哉！
