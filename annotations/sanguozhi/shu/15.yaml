  anchor: shu.15.p26
  at: 131
  length: 0
  type: pei
  text: 《華陽國志》曰：邵兄邈，字漢南，劉璋時為牛鞞長。先主領牧，為從事，正旦命行酒，得進見，讓先主曰：「振威以將軍宗室肺腑，委以討賊，元功未效，先寇而滅；邈以將軍之取鄙州，甚為不宜也。」先主曰：「知其不宜，何以不助之？」邈曰：「匪不敢也，力不足耳。」有司將殺之，諸葛亮為請，得免。久之，為犍為太守、丞相參軍、安漢將軍。建興六年，亮西征。馬謖在前敗績，亮將殺之，邈諫以「秦赦孟明，用伯西戎，楚誅子玉，二世不競」，失亮意，還蜀。十二年，亮卒，後主素服發哀三日，邈上疏曰：「呂祿、霍禹未必懷反叛之心，孝宣不好為殺臣之君，直以臣懼其偪，主畏其威，故姦萌生。亮身杖強兵，狼顧虎視，五大不在邊，臣常危之。今亮殞沒，蓋宗族得全，西戎靜息，大小為慶。」後主怒，下獄誅之。
