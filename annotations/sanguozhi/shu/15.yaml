- id: shu.15.p19.a1
  anchor: shu.15.p19
  at: 243
  length: 0
  type: pei
  text: 《襄陽記》曰：楊顒字子昭，楊儀宗人也。入蜀，為巴郡太守，丞相諸葛亮主簿。亮嘗自校簿書，顒直入諫曰：「為治有體，上下不可相侵，請為明公以作家譬之。今有人使奴執耕稼，婢典炊爨，雞主司晨，犬主吠盜，牛負重載，馬涉遠路，私業無曠，所求皆足，雍容高枕，飲食而已，忽一旦盡欲以身親其役，不復付任，勞其體力，為此碎務，形疲神困，終無一成。豈其智之不如奴婢雞狗哉？失為家主之法也。是故古人稱坐而論道謂之三公，作而行之謂之士大夫。故邴吉不問橫道死人而憂牛喘，陳平不肯知錢穀之數，云自有主者，彼誠達於位分之體也。今明公為治，乃躬自校簿書，流汗竟日，不亦勞乎！」亮謝之。後為東曹屬典選舉。顒死，亮垂泣三日。
