  type: pei
  text: 益部耆舊雜記曰：諸葛亮於武功病篤，後主遣福省侍，遂因諮以國家大計。福往具宣聖旨，聽亮所言，至別去數日，忽馳思未盡其意，遂卻騎馳還見亮。亮語福曰：「孤知君還意。近日言語，雖彌日有所不盡，更來一決耳。君所問者，公琰其宜也。」福謝：「前實失不諮請公，如公百年後，誰可任大事者？故輒還耳。乞復請，蔣琬之後，誰可任者？」亮曰：「文偉可以繼之。」又復問其次，亮不答。福還，奉使稱旨。福為人精識果銳，敏於從政。子驤，字叔龍，亦有名，官至尚書郎、廣漢太守。
