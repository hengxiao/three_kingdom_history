- id: shu.15.p5.a1
  anchor: shu.15.p5
  at: 34
  length: 0
  type: pei
  text: 《益部耆舊傳》曰：浩字叔明，治律、春秋，遊學京師，與廣漢鐔粲、漢中李郃、蜀郡張霸共結為友善。大將軍鄧騭闢浩，稍遷尚書僕射，出為彭城相，薦隱士閭丘邈等，徵拜廷尉。延光三年，安帝議廢太子，唯浩與太常桓焉、太僕來歷議以為不可。順帝初立，拜浩司空，年八十三卒。《續漢書》曰：綱字文紀，少以三公子經明行脩舉孝廉，不就司徒闢，以高第為侍御史。漢安元年，拜光祿大夫，與侍中杜喬等八人同日受詔，持節分出，案行天下貪廉，墨綬有罪便收，刺史二千石以驛表聞，威惠清忠，名振郡國，號曰八雋。是時，大將軍梁冀侵擾百姓，喬等七人皆奉命四出，唯綱獨埋車輪於洛陽都亭不去，曰：「豺狼當路，安問狐狸？」遂上書曰：「大將軍梁冀、河南尹不疑，蒙外戚之援，荷國厚恩，以芻蕘之姿，安居阿保，不能敷揚五教，翼贊日月，而專為封豕長蛇，肆其貪饕，甘心好貨，縱恣無厭，多樹諂諛以害忠良，誠天威所不赦，大辟所宜加也。謹條其無君之心十五事於左，皆忠臣之所切齒也。」書奏禦，京師震悚。時冀妹為皇后，內寵方盛，冀兄弟權重於人主，順帝雖知綱言不誣，然無心治冀。冀深恨綱。會廣陵賊張嬰等眾數万人殺刺史二千石，冀欲陷綱，乃諷尚書以綱為廣陵太守；若不為嬰所殺，則欲以法中之。前太守往，輒多請兵，及綱受拜，詔問當得兵馬幾何，綱對曰無用兵馬，遂單車之官，徑詣嬰壘門，示以禍福。嬰大驚懼，走欲閉門。綱又於門外罷遣吏兵，留所親者十餘人，以書語其長老素為嬰所信者，請與相見，問以本變，因示以詔恩，使還請嬰。嬰見綱意誠，即出見綱。綱延置上坐，問其疾苦，禮畢，乃謂之曰：「前後二千石，多非其人，杜塞國恩，肆其私求。鄉郡遠，天子不能朝夕聞也，故民人相聚以避害。二千石信有罪矣；為之者乃非義也。忠臣不欺君以自榮，孝子不損父以求福，天子聖（人），欲文德以來之，故使太守來，思以爵祿相榮，不原以刑也。今誠轉禍為福之時也；若聞義不服，天子赫然發怒，大兵雲合，豈不危乎！宜深計其利害。」嬰聞，泣曰：「荒裔愚人，數為二千石所侵枉，不堪其困，故遂相聚偷生。明府仁及草木，乃嬰等更生之澤，但恐投兵之日，不免孥戮耳。」綱曰：「豈其然乎！要之以天地，誓之以日月，方當相顯以爵位，何禍之有乎？」嬰曰：「苟赦其罪，得全首領以就農畝，則抱戴沒齒，爵祿非所望也。」嬰雖為大賊，起於狂暴，自以為必死，及得綱言，曠然開明，乃辭還營。明日，遂將所部萬餘人，與妻子麵縛詣綱降。綱悉釋縛慰納，謂嬰曰：「卿諸人一旦解散，方垂蕩然，當條名上之，必受封賞。」嬰曰：「乞歸故業，不原以穢名汙明時也。」綱以其至誠，乃各從其意，親為安處居宅。子弟欲為吏者，隨才任職，欲為民者，勸以農桑，田業並豐，南州晏然。論功，綱當封，為冀所遏絕，故不得侯。天子美其功，徵欲用之。嬰等上書，乞留在郡二歲。建康元年，病卒官，時年三十六。嬰等三百餘人，皆衰杖送綱喪至洛陽，葬訖，為起塚立祠，四時奉祭，思慕如喪考妣。天子追念不已，下詔褒揚，除一子為郎。
