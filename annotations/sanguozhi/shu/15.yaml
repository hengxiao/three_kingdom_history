  type: pei
  text: 《華陽國志》曰：芝徵涪陵，見玄猿緣山。芝性好弩，手自射猿，中之。猿拔其箭，卷木葉塞其創。芝曰：「嘻，吾違物之性，其將死矣！」一曰：芝見猿抱子在樹上，引弩射之，中猿母，其子為拔箭，以木葉塞創。芝乃嘆息，投弩水中，自知當死。
