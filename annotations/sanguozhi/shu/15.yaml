- id: shu.15.p14.a1
  anchor: shu.15.p14
  at: 38
  length: 0
  type: pei
  text: 戲同縣後進有李密者，字令伯。《華陽國志》曰：密祖父光，硃提太守。父早亡。母何氏，更適人。密見養於祖母。治春秋左氏傳，博覽多所通涉，機警辯捷。事祖母以孝聞，其侍疾則泣涕側息，日夜不解帶，膳飲湯藥，必自口嘗。本郡禮命不應，州闢從事尚書郎，大將軍主簿，太子洗馬，奉使聘吳。吳主問蜀馬多少，對曰：「官用有餘，人間自足。」吳主與群臣汎論道義，謂寧為人弟，密曰：「原為人兄矣。」吳主曰：「何以為兄？」密曰：「為兄供養之日長。」吳主及群臣皆稱善。蜀平後，征西將軍鄧艾聞其名，請為主簿，及書招，欲與相見，皆不往。以祖母年老，心在色養。晉武帝立太子，徵為太子洗馬，詔書累下，郡縣偪遣，於是密上書曰：「臣以險釁，夙遭閔兇，生孩六月，慈父見背，行年四歲，舅奪母志。祖母劉，愍臣孤弱，躬見撫養。臣少多疾病，九歲不行，零丁孤苦，至於成立，既無伯叔，終鮮兄弟，門衰祚薄，晚有兒息。外無期功強近之親，內無應門五尺之童，煢煢孑立，形影相吊。而劉早嬰疾病，常在床蓐，臣侍湯藥，未曾廢離。逮奉聖朝，沐浴清化，前太守臣逵察臣孝廉，後刺史臣榮舉臣秀才，臣以供養無主，辭不赴命。詔書特下，拜臣郎中，尋蒙國恩，除臣洗馬，猥以微賤，當侍東宮，非臣隕首所能上報。臣具表聞，辭不就職。詔書切峻，責臣逋慢，郡縣偪迫，催臣上道，州司臨門，急於星火。臣欲奉詔奔馳，則劉病日篤，苟順私情，則告訴不許，臣之進退，實為狼狽。伏惟聖朝以孝治天下，凡在故老，猶蒙矜愍，況臣孤苦，特為尤甚。且臣少仕偽朝，歷職郎署，本圖宦達，不矜名節。今臣亡國賤俘，至微至陋，猥蒙拔擢，寵命優渥，豈敢盤桓，有所希冀？但以劉日薄西山，氣息奄奄，人命危淺，朝不慮夕。臣無祖母，無以至今日，祖母無臣，亦無以終餘年，母孫二人，更相為命，是以區區不敢廢遠。臣今年四十有四，祖母劉今年九十有六，是臣盡節於陛下之日長，報養劉之日短也。烏鳥私情，原乞終養。臣之辛苦，非徒蜀之人士及二州牧伯所見明知，皇天后土，實所共鑑。原陛下矜愍愚誠，聽臣微志，庶劉僥倖，保卒餘年。臣生當隕首，死當結草，臣不勝犬馬怖懼之情！」武帝覽表曰：「密不空有名也。」嘉其誠款，賜奴婢二人，下郡縣供養其祖母奉膳。及祖母卒，服終，從尚書郎為河內溫縣令，政化嚴明。中山諸王每過溫縣，必責求供給，溫吏民患之。及密至，中山王過縣，欲求芻茭薪蒸，密箋引高祖過沛，賓禮老幼，桑梓之供，一無煩擾，「伏惟明王孝思惟則，動識先戒，本國望風，式歌且舞，誅求之碎，所未聞命。」自後諸王過，不敢有煩。隴西王司馬子舒深敬友密，而貴勢之家憚其公直。密去官，為州大中正，性方直，不曲意勢位。後失荀勖、張華指，左遷漢中太守，諸王多以為冤。一年去官，年六十四卒。著述理論十篇，安東將軍胡熊與皇甫士安並善之。
