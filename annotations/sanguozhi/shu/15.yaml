  text: 《益部耆舊雜記》曰：朝又有一弟，早亡，各有才望，時人號之李氏三龍。《華陽國志》曰：群下上先主為漢中王；其文，朝所造也。臣松之案耆舊所記，以朝、邵及早亡者為三龍。邈之狂直，不得在此數。
