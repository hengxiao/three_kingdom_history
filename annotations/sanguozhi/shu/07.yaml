- id: shu.7.p1.a1
  anchor: shu.7.p1
  at: 80
  length: 0
  type: pei
  text: 《襄陽記》曰：諸葛孔明為臥龍，龐士元為鳳雛，司馬德操為水鏡，皆龐德公語也。德公，襄陽人。孔明每至其家，獨拜床下，德公初不令止。德操嘗造德公，值其渡沔，上祀先人墓，德操徑入其室，呼德公妻子，使速作黍，「徐元直向云有客當來就我與龐公譚。」其妻子皆羅列拜於堂下，奔走供設。須臾，德公還，直入相就，不知何者是客也。德操年小德公十歲，兄事之，呼作龐公，故世人遂謂龐公是德公名，非也。德公子山民，亦有令名，娶諸葛孔明小姊，為魏黃門吏部郎，早卒。子渙，字世文，晉太康中為牂牁太守。統，德公從子也，少未有識者，惟德公重之，年十八，使往見德操。德操與語，既而嘆曰：「德公誠知人，此實盛德也。」
- id: shu.7.p1.a2
  anchor: shu.7.p1
  at: 289
  length: 0
  type: pei
  text: 張勃吳錄曰：或問統曰：「如所目，陸子為勝乎？」統曰：「駑馬雖精，所致一人耳。駑牛一日行三百里，所致豈一人之重哉！」劭就統宿，語，因問：「卿名知人，吾與卿孰愈？」統曰：「陶冶世俗，甄綜人物，吾不及卿；論帝王之秘策，攬倚伏之要最，吾似有一日之長。」劭安其言而親之。
- id: shu.7.p1.a3
  anchor: shu.7.p1
  at: 309
  length: 0
  type: pei
  text: 蔣濟《萬機論》云許子將褒貶不平，以拔樊子昭而抑許文休。劉曄曰：「子昭拔自賈豎，年至耳順，退能守靜，進能不苟。」濟答曰：「子昭誠自長幼完潔，然觀其臿齒牙，樹頰胲，吐脣吻，自非文休敵也。」胲音改。
- id: shu.7.p2.a1
  anchor: shu.7.p2
  at: 90
  length: 0
  type: pei
  text: 江表傳曰：先主與統從容宴語，問曰：「卿為周公瑾功曹，孤到吳，聞此人密有白事，勸仲謀相留，有之乎？在君為君，卿其無隱。」統對曰：「有之。」備嘆息曰：「孤時危急，當有所求，故不得不往，殆不免周瑜之手！天下智謀之士，所見略同耳。時孔明諫孤莫行，其意獨篤，亦慮此也。孤以仲謀所防在北，當賴孤為援，故決意不疑。此誠出於險塗，非萬全之計也。」
- id: shu.7.p2.a2
  anchor: shu.7.p2
  at: 109
  length: 0
  type: pei
  text: 《九州春秋》曰：統說備曰：「荊州荒殘，人物殫盡，東有吳孫，北有曹氏，鼎足之計，難以得志。今益州國富民強，戶口百萬，四部兵馬，所出必具，寶貨無求於外，今可權藉以定大事。」備曰：「今指與吾為水火者，曹操也，操以急，吾以寬；操以暴，吾以仁；操以譎，吾以忠；每與操反，事乃可成耳。今以小故而失信義於天下者，吾所不取也。」統曰：「權變之時，固非一道所能定也。兼弱攻昧，五伯之事。逆取順守，報之以義，事定之後，封以大國，何負於信？今日不取，終為人利耳。」備遂行。
- id: shu.7.p3.a1
  anchor: shu.7.p3
  at: 452
  length: 0
  type: pei
  text: 習鑿齒曰：夫霸王者，必體仁義以為本，仗信順以為宗，一物不具，則其道乖矣。今劉備襲奪璋土，權以濟業，負信違情，德義俱愆，雖功由是隆，宜大傷其敗，譬斷手全軀，何樂之有？龐統懼斯言之泄宣，知其君之必悟，故眾中匡其失，而不脩常謙之道，矯然太當，盡其蹇諤之風。夫上失而能正，是有臣也，納勝而無執，是從理也；有臣則陛隆堂高，從理則群策畢舉；一言而三善兼明，暫諫而義彰百代，可謂達乎大體矣。若惜其小失而廢其大益，矜此過言，自絕遠讜，能成業濟務者，未之有也。臣松之以為謀襲劉璋，計雖出於統，然違義成功，本由詭道，心既內疚，則歡情自戢，故聞備稱樂之言，不覺率爾而對也。備宴酣失時，事同樂禍，自比武王，曾無愧色，此備有非而統無失，其云「君臣俱失」，蓋分謗之言耳。習氏所論，雖大旨無乖，然推演之辭，近為流宕也。
- id: shu.7.p4.a1
  anchor: shu.7.p4
  at: 143
  length: 0
  type: pei
  text: 《襄陽記》曰：林婦，同郡習禎妺。禎事在楊戲《輔臣贊》。曹公之破荊州，林婦與林分隔，守養弱女十有餘年，後林隨黃權降魏，始復集聚。魏文帝聞而賢之，賜床帳衣服，以顯其義節。
- id: shu.7.p5.a1
  anchor: shu.7.p5
  at: 25
  length: 0
  type: pei
  text: 三輔決錄注曰：真字高卿，少明五經，兼通讖緯，學無常師，名有高才。常幅巾見扶風守，守曰：「哀公雖不肖，猶臣仲尼，柳下惠不去父母之邦，欲相屈為功曹何如？」真曰：「以明府見待有禮，故四時朝覲，若欲吏使之，真將在北山之北南山之南矣。」扶風守遂不敢以為吏。初，真年未弱冠，父在南郡，步往候父，已欲去，父留之待正旦，使觀朝吏會。會者數百人，真於窗中闚其與父語。畢，問真「孰賢」？真曰：「曹掾胡廣有公卿之量。」其後廣果歷九卿三公之位，世以服真之知人。前後徵辟，皆不就，友人郭正等美之，號曰玄德先生。年八十九，中平五年卒。正父衍，字季謀，司徒掾、廷尉左監。
- id: shu.7.p6.a1
  anchor: shu.7.p6
  at: 6
  length: 0
  type: pei
  text: 《華陽國志》曰：度，廣漢人，為州從事。
- id: shu.7.p6.a2
  anchor: shu.7.p6
  at: 1197
  length: 0
  type: pei
  text: 孫盛曰：夫禮賢崇德，為邦之要道，封墓式閭，先王之令軌，故必以體行英邈，高義蓋世，然後可以延視四海，振服群黎。苟非其人，道不虛行。靖處室則友於不穆，出身則受位非所，語信則夷險易心，論識則殆為釁首，安在其可寵先而有以感致者乎？若乃浮虛是崇，偷薄斯榮，則秉直仗義之士，將何以禮之？正務眩惑之術，違貴尚之風，譬之郭隗，非其倫矣。臣松之以為郭隗非賢，猶以權計蒙寵，況文休名聲夙著，天下謂之英偉，雖末年有瑕，而事不彰徹，若不加禮，何以釋遠近之惑乎？法正以靖方隗，未為不當，而盛以封墓式閭為難，何其迂哉！然則燕昭亦非，豈唯劉翁？至於友於不穆，失由子將，尋蔣濟之論，知非文休之尤。盛又譏其受（任）非所，將謂仕於董卓。卓初秉政，顯擢賢俊，受其策爵者森然皆是。文休為選官。在卓未至之前，後遷中丞，不為超越。以此為貶，則荀爽、陳紀之儔皆應擯棄於世矣。
- id: shu.7.p6.a3
  anchor: shu.7.p6
  at: 1420
  length: 0
  type: pei
  text: 孫盛曰：夫威福自下，亡家害國之道，刑縱於寵，毀政亂理之源，安可以功臣而極其陵肆，嬖幸而藉其國柄者哉？故顛頡雖勤，不免違命之刑，楊干雖親，猶加亂行之戮，夫豈不愛，王憲故也。諸葛氏之言，於是乎失政刑矣。
- id: shu.7.p7.a1
  anchor: shu.7.p7
  at: 290
  length: 0
  type: pei
  text: 臣松之以為蜀與漢中，其由脣齒也。劉主之智，豈不及此？將計略未展，正先發之耳。夫聽用嘉謀以成功業，霸王之主，誰不皆然？魏武以為人所教，亦豈劣哉！此蓋恥恨之餘辭，非測實之當言也。
- id: shu.7.p8.a1
  anchor: shu.7.p8
  at: 167
  length: 0
  type: pei
  text: 先主與曹公爭，勢有不便，宜退，而先主大怒不肯退，無敢諫者。矢下如雨，正乃往當先主前，先主云：「孝直避箭。」正曰：「明公親當矢石，況小人乎？」先主乃曰：「孝直，吾與汝俱去。」遂退。
