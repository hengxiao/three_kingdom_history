- id: shu.4.p2.a1
  anchor: shu.4.p2
  at: 271
  length: 0
  type: pei
  text: 《禮》云：上古無合葬，中古後因時方有。
- id: shu.4.p3.a1
  anchor: shu.4.p3
  at: 87
  length: 0
  type: pei
  text: 《漢晉春秋》云：先主入益州，吳遣迎孫夫人。夫人欲將太子歸吳，諸葛亮使趙雲勒兵斷江留太子，乃得止。
- id: shu.4.p3.a2
  anchor: shu.4.p3
  at: 133
  length: 0
  type: pei
  text: 習鑿齒曰：夫婚姻，人倫之始，王化之本，匹夫猶不可以無禮，而況人君乎？晉文廢禮行權，以濟其業，故子犯曰，有求於人，必先從之，將奪其國，何有於妻，非無故而違禮教者也。今先主無權事之偪，而引前失以為譬，非導其君以堯、舜之道者。先主從之，過矣。
- id: shu.4.p3.a3
  anchor: shu.4.p3
  at: 255
  length: 0
  type: pei
  text: 孫盛《蜀世譜》曰：壹孫喬，沒李雄中三十年，不為雄屈也。
- id: shu.4.p5.a1
  anchor: shu.4.p5
  at: 109
  length: 0
  type: pei
  text: 《漢晉春秋》曰：魏以蜀宮人賜諸將之無妻者，李昭儀曰：「我不能二三屈辱。」乃自殺。
- id: shu.4.p8.a1
  anchor: shu.4.p8
  at: 163
  length: 0
  type: pei
  text: 孫盛《蜀世譜》曰：璿弟，瑤、琮、瓚、諶、恂、璩六人。蜀敗，諶自殺，餘皆內徙。值永嘉大亂，子孫絕滅。唯永孫玄奔蜀，李雄偽署安樂公以嗣禪後。永和三年討李勢，盛參戎行，見玄於成都也。
