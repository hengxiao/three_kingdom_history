  type: pei
  text: 揚雄《方言》曰：悈、鰓、乾、都、耇、革，老也。郭璞注曰：皆老者皮毛枯瘁之形也。臣松之以為皮去毛曰革。古者以革為兵，故語稱兵革，革猶兵也。羕罵備為老革，猶言老兵也。
