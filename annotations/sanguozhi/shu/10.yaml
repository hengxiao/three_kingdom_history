  anchor: shu.10.p21
  at: 34
  length: 0
  type: pei
  text: 習鑿齒曰：昔管仲奪伯氏駢邑三百，沒齒而無怨言，聖人以為難。諸葛亮之使廖立垂泣，李平致死，豈徒無怨言而已哉！夫水至平而邪者取法，鏡至明而醜者無怒，水鏡之所以能窮物而無怨者，以其無私也。水鏡無私，猶以免謗，況大人君子懷樂生之心，流矜恕之德，法行於不可不用，刑加乎自犯之罪，爵之而非私，誅之而不怒，天下有不服者乎！諸葛亮於是可謂能用刑矣，自秦、漢以來未之有也。
