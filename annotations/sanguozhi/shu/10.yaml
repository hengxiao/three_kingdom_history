  type: pei
  text: 《魏略》載達辭先主表曰：「伏惟殿下將建伊、呂之業，追桓、文之功，大事草創，假勢吳、楚，是以有為之士深睹歸趣。臣委質已來，愆戾山積，臣猶自知，況於君乎！今王朝以興，英俊鱗集，臣內無輔佐之器，外無將領之才，列次功臣，誠自愧也。臣聞范蠡識微，浮於五湖；咎犯謝罪，逡巡於河上。夫際會之間，請命乞身。何則？欲絜去就之分也。況臣卑鄙，無元功巨勳，自系於時，竊慕前賢，早思遠恥。昔申生至孝見疑於親，子胥至忠見誅於君，蒙恬拓境而被大刑，樂毅破齊而遭讒佞，臣每讀其書，未嘗不慷慨流涕，而親當其事，益以傷絕。何者？荊州覆敗，大臣失節，百無一還。惟臣尋事，自致房陵、上庸，而復乞身，自放於外。伏想殿下聖恩感悟，愍臣之心，悼臣之舉。臣誠小人，不能始終，知而為之，敢謂非罪！臣每間交絕無惡聲，去臣無怨辭，臣過奉教於君子，原君王勉之也。」
- id: shu.10.p3.a1
  anchor: shu.10.p3
  at: 454
  length: 0
  type: pei
  text: 國語曰：智宣子將以瑤為後，智果曰：「不如霄也。」宣子曰：「霄也佷。」對曰：「霄也佷在面，瑤之賢於人者五，其不逮者一也。美須長大則賢，射禦足力則賢，技藝畢給則賢，巧文辯惠則賢，強毅果敢則賢，如是而甚不仁；以五者賢陵人，而不仁行之，其誰能待之！若果立瑤也。智宗必滅。」不聽。智果別族於太史氏為輔氏。及智氏亡，惟輔果在焉。
- id: shu.10.p5.a1
  anchor: shu.10.p5
  at: 52
  length: 0
  type: pei
  text: 《魏略》曰：申儀兄名耽，字義舉。初在西平、上庸間聚眾數千家，後與張魯通，又遣使詣曹公，曹公加其號為將軍，因使領上庸都尉。至建安末，為蜀所攻，以其郡西屬。黃初中，儀復來還，詔即以兄故號加儀，因拜魏興太守，封列侯。太和中，儀與孟達不和，數上言達有貳心於蜀，及達反，儀絕蜀道，使救不到。達死後，儀詣宛見司馬宣王，宣王勸使來朝。儀至京師，詔轉拜儀樓船將軍，在禮請中。
- id: shu.10.p6.a1
