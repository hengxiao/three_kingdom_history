  at: 16
  length: 0
  type: pei
  text: 封子林為牙門將，咸熙元年內移河東。達子興為議督軍，是歲徙還扶風。
- id: shu.10.p10.a1
  anchor: shu.10.p10
  at: 80
  length: 0
  type: pei
  text: 揚雄《方言》曰：悈、鰓、乾、都、耇、革，老也。郭璞注曰：皆老者皮毛枯瘁之形也。臣松之以為皮去毛曰革。古者以革為兵，故語稱兵革，革猶兵也。羕罵備為老革，猶言老兵也。
- id: shu.10.p12.a1
