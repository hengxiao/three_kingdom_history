- id: shu.10.p2.a1
  anchor: shu.10.p2
  at: 270
  length: 0
  type: pei
  text: 《魏略》載達辭先主表曰：「伏惟殿下將建伊、呂之業，追桓、文之功，大事草創，假勢吳、楚，是以有為之士深睹歸趣。臣委質已來，愆戾山積，臣猶自知，況於君乎！今王朝以興，英俊鱗集，臣內無輔佐之器，外無將領之才，列次功臣，誠自愧也。臣聞范蠡識微，浮於五湖；咎犯謝罪，逡巡於河上。夫際會之間，請命乞身。何則？欲絜去就之分也。況臣卑鄙，無元功巨勳，自系於時，竊慕前賢，早思遠恥。昔申生至孝見疑於親，子胥至忠見誅於君，蒙恬拓境而被大刑，樂毅破齊而遭讒佞，臣每讀其書，未嘗不慷慨流涕，而親當其事，益以傷絕。何者？荊州覆敗，大臣失節，百無一還。惟臣尋事，自致房陵、上庸，而復乞身，自放於外。伏想殿下聖恩感悟，愍臣之心，悼臣之舉。臣誠小人，不能始終，知而為之，敢謂非罪！臣每間交絕無惡聲，去臣無怨辭，臣過奉教於君子，原君王勉之也。」
