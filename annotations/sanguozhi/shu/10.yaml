- id: shu.10.p19.a1
  anchor: shu.10.p19
  at: 179
  length: 0
  type: pei
  text: 諸葛亮集有嚴與亮書，勸亮宜受九錫，進爵稱王。亮答書曰：「吾與足下相知久矣，可不復相解！足下方誨以光國，戒之以勿拘之道，是以未得默已。吾本東方下士，誤用於先帝，位極人臣，祿賜百億，今討賊未效，知己未答，而方寵齊、晉，坐自貴大，非其義也。若滅魏斬叡，帝還故居，與諸子併升，雖十命可受，況於九邪！」
- id: shu.10.p20.a1
  anchor: shu.10.p20
  at: 368
  length: 0
  type: pei
  text: 亮公文上尚書曰：「平為大臣，受恩過量，不思忠報，橫造無端，危恥不辦，迷罔上下，論獄棄科，導人為奸，（狹情）〔情狹〕志狂，若無天地。自度姦露，嫌心遂生，聞軍臨至，西鄉託疾還沮、漳，軍臨至沮，復還江陽，平參軍狐忠勤諫乃止。今篡賊未滅，社稷多難，國事惟和，可以克捷，不可苞含，以危大業。輒與行中軍師車騎將軍都鄉侯臣劉琰，使持節前軍師征西大將軍領涼州刺史南鄭侯臣魏延、前將軍都亭侯臣袁綝、左將軍領荊州刺史高陽鄉侯臣吳壹、督前部右將軍玄鄉侯臣高翔、督後部後將軍安樂亭侯臣吳班、領長史綏軍將軍臣楊儀、督左部行中監軍揚武將軍臣鄧芝、行前監軍征南將軍臣劉巴、行中護軍偏將軍臣費禕、行前護軍偏將軍漢成亭侯臣許允、行左護軍篤信中郎將臣丁咸、行右護軍偏將軍臣劉敏、行護軍征南將軍當陽亭侯臣姜維、行中典軍討虜將軍臣上官雝、行中參軍昭武中郎將臣胡濟、行參軍建義將軍臣閻晏、行參軍偏將軍臣爨習、行參軍裨將軍臣杜義、行參軍武略中郎將臣杜祺、行參軍綏戎都尉盛勃、領從事中郎武略中郎將臣樊岐等議，輒解平任，免官祿、節傳、印綬、符策，削其爵土。」
- id: shu.10.p20.a2
  anchor: shu.10.p20
  at: 379
  length: 0
  type: pei
  text: 諸葛亮又與平子豐教曰：「吾與君父子戮力以獎漢室，此神明所聞，非但人知之也。表都護典漢中，委君於東關者，不與人議也。謂至心感動，終始可保，何圖中乖乎！昔楚卿屢絀，亦乃克復，思道則福，應自然之數也。原寬慰都護，勤追前闕。今雖解任，形業失故，奴婢賓客百數十人，君以中郎參軍居府，方之氣類，猶為上家。若都護思負一意，君與公琰推心從事者，否可複通，逝可複還也。詳思斯戒，明吾用心，臨書長嘆，涕泣而已。」
- id: shu.10.p21.a1
  anchor: shu.10.p21
  at: 34
  length: 0
  type: pei
  text: 習鑿齒曰：昔管仲奪伯氏駢邑三百，沒齒而無怨言，聖人以為難。諸葛亮之使廖立垂泣，李平致死，豈徒無怨言而已哉！夫水至平而邪者取法，鏡至明而醜者無怒，水鏡之所以能窮物而無怨者，以其無私也。水鏡無私，猶以免謗，況大人君子懷樂生之心，流矜恕之德，法行於不可不用，刑加乎自犯之罪，爵之而非私，誅之而不怒，天下有不服者乎！諸葛亮於是可謂能用刑矣，自秦、漢以來未之有也。
- id: shu.10.p21.a2
  anchor: shu.10.p21
  at: 42
  length: 0
  type: pei
  text: 蘇林《漢書音義》曰：硃音銖；提音如北方人名匕曰提也。
