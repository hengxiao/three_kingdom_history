  at: 141
  length: 0
  type: pei
  text: 亮集有亮表曰：「立奉先帝無忠孝之心，守長沙則開門就敵，領巴郡則有闇昧闟茸其事，隨大將軍則誹謗譏訶，侍梓宮則挾刃斷人頭於梓宮之側。陛下即位之後，普增職號，立隨比為將軍，面語臣曰：『我何宜在諸將軍中！不表我為卿，上當在五校！』臣答：『將軍者，隨大比耳。至於卿者，正方亦未為卿也。且宜處五校。』自是之後，怏怏懷恨。」詔曰：「三苗亂政，有虞流宥，廖立狂惑，朕不忍刑，亟徙不毛之地。」
