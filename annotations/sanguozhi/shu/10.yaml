- id: shu.10.p25.a1
  anchor: shu.10.p25
  at: 50
  length: 0
  type: pei
  text: 魏略曰：「夏侯楙爲安西將軍，鎮長安，亮於南鄭與群下計議，延曰：『聞夏侯楙少，主婿也，怯而無謀。今假延精兵五千，負糧五千，直從褒中出，循秦嶺而東，當子午而北，不過十日可到長安。楙聞延奄至，必乘船逃走。長安中惟有御史、京兆太守耳，橫門邸閣與散民之穀足週食也。比東方相合聚，尚二十許日，而公從斜谷來，必足以達。如此，則一舉而咸陽以西可定矣。』亮以爲此縣危，不如安從坦道，可以平取隴右，十全必克而無虞，故不用延計。」
- id: shu.10.p26.a1
  anchor: shu.10.p26
  at: 518
  length: 0
  type: pei
  text: 魏略曰：「諸葛亮病，謂延等云：『我之死後，但謹自守，慎勿復來也。』令延攝行己事，密持喪去。延遂匿之，行至褒口，乃發喪。亮長史楊儀宿與延不和，見延攝行軍事，懼爲所害，乃張言延欲舉眾北附，遂率其眾攻延。延本無此心，不戰軍走，追而殺之。」臣松之以爲此蓋敵國傳聞之言，不得與本傳爭審。
