  anchor: shu.10.p26
  at: 518
  length: 0
  type: pei
  text: 魏略曰：「諸葛亮病，謂延等云：『我之死後，但謹自守，慎勿復來也。』令延攝行己事，密持喪去。延遂匿之，行至褒口，乃發喪。亮長史楊儀宿與延不和，見延攝行軍事，懼爲所害，乃張言延欲舉眾北附，遂率其眾攻延。延本無此心，不戰軍走，追而殺之。」臣松之以爲此蓋敵國傳聞之言，不得與本傳爭審。
