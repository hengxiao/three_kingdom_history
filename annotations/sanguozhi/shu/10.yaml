  at: 454
  length: 0
  type: pei
  text: 國語曰：智宣子將以瑤為後，智果曰：「不如霄也。」宣子曰：「霄也佷。」對曰：「霄也佷在面，瑤之賢於人者五，其不逮者一也。美須長大則賢，射禦足力則賢，技藝畢給則賢，巧文辯惠則賢，強毅果敢則賢，如是而甚不仁；以五者賢陵人，而不仁行之，其誰能待之！若果立瑤也。智宗必滅。」不聽。智果別族於太史氏為輔氏。及智氏亡，惟輔果在焉。
- id: shu.10.p5.a1
  anchor: shu.10.p5
  at: 52
  length: 0
  type: pei
  text: 《魏略》曰：申儀兄名耽，字義舉。初在西平、上庸間聚眾數千家，後與張魯通，又遣使詣曹公，曹公加其號為將軍，因使領上庸都尉。至建安末，為蜀所攻，以其郡西屬。黃初中，儀復來還，詔即以兄故號加儀，因拜魏興太守，封列侯。太和中，儀與孟達不和，數上言達有貳心於蜀，及達反，儀絕蜀道，使救不到。達死後，儀詣宛見司馬宣王，宣王勸使來朝。儀至京師，詔轉拜儀樓船將軍，在禮請中。
