  type: pei
  text: 禕别傳曰：孙权每别酌好酒以饮禕，视其已醉，然后問以国事，并论当世之务，辞难累至。禕辄辞以醉，退而撰次所問，事事条答，无所遗失。
- id: shu.14.p11.a2
  anchor: shu.14.p11
  at: 161
  length: 0
  type: pei
  text: 禕别傳曰：权乃以手中常所执宝刀赠之，禕答曰：“臣以不才，何以堪明命？然刀所以讨不庭、禁暴乱者也，但原大王勉建功业，同奖汉室，臣虽闇弱，终不负东顾。”
