  type: pei
  text: 《华阳国志》曰；维恶黄皓恣擅，启后主欲杀之。后主曰：“皓趋走小臣耳，往董允切齿，吾常恨之，君何足介意！”维见皓枝附叶连，惧於失言，逊辞而出。后主敕皓诣维陈谢。维说皓求沓中种麦，以避内逼耳。
- id: shu.14.p21.a2
  anchor: shu.14.p21
  at: 289
  length: 0
  type: pei
  text: 汉晋春秋曰：蒋舒将出降，乃诡谓傅佥曰：“今贼至不击而闭城自守，非良图也。”佥曰：“受命保城，惟全为功，今违命出战，若丧师负国，死无益矣。”舒曰：“子以保城获全为功，我以出战克敌为功，请各行其志。”遂率众出。佥谓其战也，至阴平，以降胡烈。烈乘虚袭城，佥格斗而死，魏人义之。蜀记曰：蒋舒为武兴督，在事无称。蜀命人代之，因留舒助汉中守。舒恨，故开城出降。
- id: shu.14.p21.a3
  anchor: shu.14.p21
  at: 540
  length: 0
  type: pei
  text: 干寶《晋纪》云：会谓维曰；“来何迟也？”维正色流涕曰：“今日见此为速矣！”会甚奇之。
- id: shu.14.p22.a1
  anchor: shu.14.p22
  at: 106
  length: 0
  type: pei
  text: ○《漢晉春秋》曰：會陰懷異圖，維見而知其心，謂可構成擾亂以圖克復也，乃詭說會曰：「聞君自淮南已來，算無遺策，晉道克昌，皆君之力。今復定蜀，威德振世，民高其功，主畏其謀，欲以此安歸乎！夫韓信不背漢於擾攘，以見疑於既平，大夫種不從范蠡於五湖，卒伏劍而妄死，彼豈闇主愚臣哉？利害使之然也。今君大功既立，大德已著，何不法陶硃公泛舟絕跡，全功保身，登峨嵋之嶺，而從赤松游乎？」會曰：「君言遠矣，我不能行，且為今之道，或未盡於此也。」維曰：「其他則君智力之所能，無煩於老夫矣。」由是情好歡甚。○《華陽國志》曰：維教會誅北來諸將，既死，徐欲殺會，盡坑魏兵，還復蜀祚，密書與後主曰：「原陛下忍數日之辱，臣欲使社稷危而復安，日月幽而復明。」○孫盛《晉陽秋》曰：盛以永和初從安西將軍平蜀，見諸故老，及姜維既降之後密與劉禪表疏，說欲偽服事鍾會，因殺之以復蜀土，會事不捷，遂至泯滅，蜀人於今傷之。盛以為古人云，非所困而困焉名必辱，非所據而據焉身必危，既辱且危，死其將至，其姜維之謂乎！鄧艾之入江由，士眾鮮少，維進不能奮節綿竹之下，退不能總帥五將，擁衛蜀主，思後圖之計，而乃反覆於逆順之間，希違情於難冀之會，以衰弱之國，而屢觀兵於三秦，已滅之邦，冀理外之奇舉，不亦闇哉！○臣松之以為盛之譏維，又為不當。於時鍾會大眾既造劍閣，維與諸將列營守險，會不得進，已議還計，全蜀之功，幾乎立矣。但鄧艾詭道傍入，出於其後，諸葛瞻既敗，成都自潰。維若回軍救內，則會乘其背。當時之勢，焉得兩濟？而責維不能奮節綿竹，擁衛蜀主，非其理也。會欲盡坑魏將以舉大事，授維重兵，使為前驅。若令魏將皆死，兵事在維手，殺會復蜀，不為難矣。夫功成理外，然後為奇，不可以事有差牙，而抑謂不然。設使田單之計，邂逅不會，復可謂之愚闇哉！
- id: shu.14.p22.a2
  anchor: shu.14.p22
  at: 137
  length: 0
  type: pei
  text: 《世語》曰：維死時見剖，膽如（斗）大。
- id: shu.14.p23.a1
  anchor: shu.14.p23
  at: 187
  length: 0
  type: pei
  text: 孫盛曰：異哉郤氏之論也！夫士雖百行，操業萬殊，至於忠孝義節，百行之冠冕也。姜維策名魏室，而外奔蜀朝，違君徇利，不可謂忠；捐親苟免，不可謂孝；害加舊邦，不可謂義；敗不死難，不可謂節；且德政未敷而疲民以逞，居禦侮之任而致敵喪守，於夫智勇，莫可云也：凡斯六者，維無一焉。實有魏之逋臣，亡國之亂相，而云人之儀表，斯亦惑矣。縱維好書而微自藻潔，豈異夫盜者分財之義，而程、鄭降階之善也？臣松之以為郤正此論，取其可稱，不謂維始終行事皆可準則也。所云「一時儀表」，止在好學與儉素耳。本傳及魏略皆云維本無叛心，以急逼歸蜀。盛相譏貶，惟可責其背母。餘既過苦，又非所以難郤正也。
- id: shu.14.p24.a1
  anchor: shu.14.p24
  at: 60
  length: 0
  type: pei
  text: 臣松之以為蔣、費為相，克遵畫一，未嘗徇功妄動，有所虧喪，外卻駱谷之師，內保寧緝之實，治小之宜，居靜之理，何以過於此哉！今譏其未盡而不著其事，故使覽者不知所謂也。
- id: shu.14.p24.a2
  anchor: shu.14.p24
  at: 118
  length: 0
  type: pei
  text: 干寶曰：姜維為蜀相，國亡主辱弗之死，而死於鍾會之亂，惜哉！非死之難，處死之難也。是以古之烈士，見危授命，投節如歸，非不愛死也，固知命之不長而懼不得其所也。
