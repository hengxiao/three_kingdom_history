  text: 殷基通語曰：司马懿诛曹爽，禕设甲乙论平其是非。甲以为曹爽兄弟凡品庸人，苟以宗子枝属，得蒙顾命之任，而骄奢僭逸，交非其人，私树朋黨，謀以乱国。懿奋诛讨，一朝殄尽，此所以称其任，副士民之望也。乙以为懿感曹仲付己不一，岂爽与相干？事勢不專，以此陰成疵瑕。初无忠告侃尔之訓，一朝屠戮，攙其不意，岂大人經國篤本之事乎！若爽信有謀主之心，大逆已构，而发兵之日，更以芳委爽兄弟。懿父子从後閉門舉兵，蹙而向芳，必无悉寧，忠臣为君深虑之谓乎？以此推之，爽无大恶明矣。若懿以爽奢僭，废之刑之可也，灭其尺口，被以不义，绝子丹血食，及何晏子魏之亲甥，亦与同戮，为僭滥不当矣。
