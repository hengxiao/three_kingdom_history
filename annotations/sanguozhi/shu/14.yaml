  text: 《汉晋春秋》曰：费禕谓维曰：“吾等不如丞相亦已远矣；丞相犹不能定中夏，况吾等乎！且不如保国治民，敬守社稷，如其功业，以俟能者，无以为希冀徼倖而决成败於一举。若不如志，悔之无及。”
