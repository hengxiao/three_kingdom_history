  text: 《魏略》曰：天水太守马遵将维及诸官属随雍州刺史郭淮偶自西至洛门案行，会闻亮已到祁山，淮顾遵曰：“是欲不善！”遂驱东还上邽。遵念所治冀县界在西偏，又恐吏民乐乱，遂亦随淮去。时维谓遵曰：“明府当还冀。”遵谓维等曰：“卿诸人（回）复信，皆贼也。”各自行。维亦无如遵何，而家在冀，遂与郡吏上官子脩等还冀。冀中吏民见维等大喜，便推令见亮。二人不获已，乃共诣亮。亮见，大悦。未及遣迎冀中人，会亮前锋为张郃、费繇等所破，遂将维等卻缩。维不得还，遂入蜀。诸军攻冀，皆得维母妻子，亦以维本无去意，故不没其家，但系保官以延之。此语与本傳不同。
- id: shu.14.p15.a3
  anchor: shu.14.p15
  at: 367
  length: 0
  type: pei
  text: 孙盛杂记曰：初，姜维诣亮，与母相失，复得母书，令求当归。维曰：“良田百顷，不在一亩，但有远志，不在当归也。”
