  text: 禕别傳曰：于时军国多事，公务烦猥，禕识悟过人，每省读书记，举目暂视，已究其意旨，其速数倍於人，终亦不忘。常以朝晡听事，其间接纳宾客，饮食嬉戏，加之博弈，每尽人之欢，事亦不废。董允代禕为尚书令，欲斅禕之所行，旬日之中，事多愆滞。允乃叹曰：“人才力相县若此甚远，此非吾之所及也。听事终日，犹有不暇尔。”
