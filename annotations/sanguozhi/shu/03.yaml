  type: pei
  text: 斜，余奢反。
- id: shu.3.p10.a1
  anchor: shu.3.p10
  at: 70
  length: 0
  type: pei
  text: 《漢晉春秋》曰：冬十月，江陽至江州有鳥從江南飛渡江北，不能達，墮水死者以千數。
- id: shu.3.p15.a1
  anchor: shu.3.p15
  at: 12
  length: 0
  type: pei
  text: 臣松之案：湔，縣名也，屬蜀郡，音翦。
- id: shu.3.p24.a1
  anchor: shu.3.p24
  at: 29
  length: 0
  type: pei
  text: 《魏略》曰：琬卒，禪乃自攝國事。
- id: shu.3.p43.a1
  anchor: shu.3.p43
  at: 22
  length: 0
  type: pei
  text: 《漢晉春秋》曰：後主將從譙周之策，北地王諶怒曰：「若理窮力屈，禍敗必及，便當父子君臣背城一戰，同死社稷，以見先帝可也。」後主不納，遂送璽緩。是日，諶哭於昭烈之廟，先殺妻子，而後自殺，左右無不為涕泣者。
- id: shu.3.p43.a2
  anchor: shu.3.p43
  at: 44
  length: 0
  type: pei
  text: 王隱《蜀記》曰：艾報書云：「王綱失道，群英並起，龍戰虎爭，終歸真主，此蓋天命去就之道也。自古聖帝，爰逮漢、魏，受命而王者，莫不在乎中土。河出圖，洛出書，聖人則之，以興洪業，其不由此，未有不顛覆者也。隗囂憑隴而亡，公孫述據蜀而滅，此皆前世覆車之鑑也。聖上明哲，宰相忠賢，將比隆黃軒，侔功往代。銜命來徵，思聞嘉響，果煩來使，告以德音，此非人事，豈天啟哉！昔微子歸周，實為上賓，君子豹變，義存大易，來辭謙衝，以禮輿櫬，皆前哲歸命之典也。全國為上，破國次之，自非通明智達，何以見王者之義乎！」禪又遣太常張峻、益州別駕汝超受節度，遣太僕蔣顯有命敕姜維。又遣尚書郎李虎送士民簿，領戶二十八萬，男女口九十四萬，帶甲將士十萬二千，吏四萬人，米四十餘萬斛，金銀各二千斤，錦綺採絹各二十萬匹，餘物稱此。
- id: shu.3.p43.a3
  anchor: shu.3.p43
  at: 78
  length: 0
  type: pei
  text: 《晉諸公贊》曰：劉禪乘騾車詣艾，不具亡國之禮。
- id: shu.3.p45.a1
  anchor: shu.3.p45
  at: 68
  length: 0
  type: pei
  text: 《漢晉春秋》曰：司馬文王與禪宴，為之作故蜀技，旁人皆為之感愴，而禪喜笑自若。王謂賈充曰：「人之無情，乃可至於是乎！雖使諸葛亮在，不能輔之久全，而況姜維邪？」充曰：「不如是，殿下何由並之。」他日，王問禪曰：「頗思蜀否？」禪曰：「此間樂，不思蜀。」郤正聞之，求見禪曰：「若王後問，宜泣而答曰『先人墳墓遠在隴、蜀，乃心西悲，無日不思』，因閉其目。」會王復問，對如前，王曰：「何乃似郤正語邪！」禪驚視曰：「誠如尊命。」左右皆笑。
- id: shu.3.p45.a2
  anchor: shu.3.p45
  at: 78
  length: 0
  type: pei
  text: 《蜀記》云：諡曰思公，子恂嗣。
