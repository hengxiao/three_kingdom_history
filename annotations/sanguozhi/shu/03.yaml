  at: 144
  length: 0
  type: pei
  text: 《禮記》曰：行一物而三善者，惟世子而已，其齒於學之謂也。鄭玄日：物猶事也。
- id: shu.3.p1.a2
  anchor: shu.3.p1
  at: 197
  length: 0
  type: pei
  text: 《魏略》曰：初備在小沛，不意曹公卒至，遑遽棄家屬，後奔荊州。禪時年數歲，竄匿，隨人西入漢中，為人所賣。及建安十六年，關中破亂，扶風人劉括避亂入漢中，買得禪，問知其良家子，遂養為子，與娶婦，生一子。初禪與備相失時，識其父字玄德。比舍人有姓簡者，及備得益州而簡為將軍，備遣簡到漢中，舍都邸。禪乃詣簡，簡相檢訊，事皆符驗。簡喜，以語張魯，魯（乃）洗沐送詣益州，備乃立以為太子。初備以諸葛亮為太子太傅，及禪立，以亮為丞相，委以諸事，謂亮曰：「政由葛氏，祭則寡人。」亮亦以禪未閒於政，遂總內外。臣松之案：〈二主妃子傳〉曰“後主生於荊州”，〈後主傳〉云「初即帝位，年十七」，則建安十二年生也。十三年敗於長阪，備棄妻子走，〈趙雲傳〉曰「雲身抱弱子以免」，即後主也。如此，備與禪未嘗相失也。又諸葛亮以禪立之明年領益州牧，其年與主簿杜微書曰「朝廷今年十八」，與禪傳相應，理當非虛。而魚豢云備敗於小沛，禪時年始生，及奔荊州，能識其父字玄德，計當五六歲。備敗於小沛時，建安五年也，至禪初立，首尾二十四年，禪應過二十矣。以事相驗，理不得然。此則《魏略》之妄說，乃至二百餘言，異也！又案諸書記及《諸葛亮集》，亮亦不為太子太傅。
- id: shu.3.p2.a1
  anchor: shu.3.p2
  at: 16
  length: 0
  type: pei
  text: 《魏氏春秋》曰：初，益州從事常房行部，聞褒將有異志，收其主簿案問，殺之。褒怒，攻殺房，誣以謀反。諸葛亮誅房諸子，徙其四弟於越雋，欲以安之。褒猶不悛改，遂以郡叛應雍闓。臣松之案：以為房為褒所誣，執政所宜澄察，安有妄殺不辜以悅姦慝？斯殆妄矣！
- id: shu.3.p5.a1
  anchor: shu.3.p5
  at: 20
  length: 0
  type: pei
  text: 今巴郡故城是。
- id: shu.3.p6.a1
  anchor: shu.3.p6
  at: 20
  length: 0
  type: pei
  text: 諸葛亮集載禪三月下詔曰：「朕聞天地之道，福仁而禍淫；善積者昌，惡積者喪，古今常數也。是以湯、武脩德而王，桀、紂極暴而亡。曩者漢祚中微，網漏兇慝，董卓造難，震盪京畿。曹操階禍，竊執天衡，殘剝海內，懷無君之心。子丕孤豎，敢尋亂階，盜據神器，更姓改物，世濟其凶。當此之時，皇極幽昧，天下無主，則我帝命隕越於下。昭烈皇帝體明叡之德，光演文武，應乾坤之運，出身平難，經營四方，人鬼同謀，百姓與能。兆民欣戴。奉順符讖，建位易號，丕承天序，補弊興衰，存复祖業，誕膺皇綱，不墜於地。萬國未定，早世遐殂。朕以幼衝，繼統鴻基，未習保傅之訓，而嬰祖宗之重。六合壅否，社稷不建，永惟所以，念在匡救，光載前緒，未有攸濟，朕甚懼焉。是以夙興夜寐，不敢自逸，每從菲薄以益國用，勸分務穡以阜民財，授方任能以參其聽，斷私降意以養將士。欲奮劍長驅，指討凶逆，硃旗未舉，而丕复隕喪，斯所謂不燃我薪而自焚也。殘類餘醜，又支天禍，恣睢河、洛，阻兵未弭。諸葛丞相弘毅忠壯，忘身憂國，先帝託以天下，以勗朕躬。今授之以旄鉞之重，付之以專命之權，統領步騎二十萬眾，董督元戎，龔行天罰，除患寧亂，克復舊都，在此行也。昔項籍總一強眾，跨州兼土，所務者大，然卒敗垓下，死於東城，宗族如焚，為笑千載，皆不以義，陵上虐下故也。今賊效尤，天人所怨，奉時宜速，庶憑炎精祖宗威靈相助之福，所向必克。吳王孫權同卹災患，潛軍合謀，掎角其後。涼州諸國王各遣月支、康居胡侯支富、康植等二十餘人詣受節度，大軍北出，便欲率將兵馬，奮戈先驅。天命既集，人事又至，師貞勢並，必無敵矣。夫王者之兵，有徵無戰，尊而且義，莫敢抗也，故鳴條之役，軍不血刃，牧野之師，商人倒戈。今旍麾首路，其所經至，亦不欲窮兵極武。有能棄邪從正，簞食壺漿以迎王師者，國有常典，封寵大小，各有品限。及魏之宗族、支葉、中外，有能規利害、審逆順之數，來詣降者，皆原除之。昔輔果絕親於智氏，而蒙全宗之福，微子去殷，項伯歸漢，皆受茅土之慶。此前世之明驗也。若其迷沈不反，將助亂人，不式王命，戮及妻孥，罔有攸赦。廣宣恩威，貸其元帥，吊其殘民。他如詔書律令，丞相其露布天下，使稱朕意焉。」
