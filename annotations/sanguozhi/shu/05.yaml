  at: 151
  length: 0
  type: pei
  text: 漢書地理志曰：瀘惟水出牂牁郡句町县。
- id: shu.5.p12.a1
  anchor: shu.5.p12
  at: 8
  length: 0
  type: pei
  text: 郭沖《三事》曰：亮屯于陽平，遣魏延諸軍並兵東下，亮惟留萬人守城。晉宣帝率二十萬眾拒亮，而與延軍錯道，徑至前，當亮六十里所，偵候白宣帝說亮在城中兵少力弱。亮亦知宣帝垂至，已與相偪，欲前赴延軍，相去又遠，回跡反追，勢不相及，將士失色，莫知其計。亮意氣自若，敕軍中皆臥旗息鼓，不得妄出菴幔，又令大開四城門，埽地卻洒。宣帝常謂亮持重，而猥見勢弱，疑其有伏兵，於是引軍北趣山。明日食時，亮謂參佐拊手大笑曰：「司馬懿必謂吾怯，將有彊伏，循山走矣。」候邏還白，如亮所言。宣帝後知，深以為恨。◇難曰：案陽平在漢中。亮初屯陽平，宣帝尚為荊州都督，鎮宛城，至曹真死後，始與亮於關中相抗禦耳。魏嘗遣宣帝自宛由西城伐蜀，值霖雨，不果。此之前後，無復有於陽平交兵事。就如沖言，宣帝既舉二十萬眾，已知亮兵少力弱，若疑其有伏兵，正可設防持重，何至便走乎？案《魏延傳》云：「延每隨亮出，輒欲請精兵萬人，與亮異道會于潼關，亮制而不許；延常謂亮為怯，歎己才用之不盡也。」亮尚不以延為萬人別統，豈得如沖言，頓使將重兵在前，而以輕弱自守乎？且沖與扶風王言，顯彰宣帝之短，對子毀父，理所不容，而云「扶風王慨然善沖之言」，故知此書舉引皆虛。
- id: shu.5.p13.a1
  anchor: shu.5.p13
  at: 80
  length: 0
  type: pei
  text: 《魏略》曰：始，國家以蜀中惟有劉備。備既死，數歲寂然無聲，是以略無備預；而卒聞亮出，朝野恐懼，隴右、祁山尤甚，故三郡同時應亮。
- id: shu.5.p13.a2
  anchor: shu.5.p13
  at: 142
  length: 0
  type: pei
  text: 郭沖《四事》曰：亮出祁山，隴西、南安二郡應時降，圍天水，拔冀城，虜姜維，驅略士女數千人還蜀。人皆賀亮，亮顏色愀然有戚容，謝曰：「普天之下，莫非漢民，國家威力未舉，使百姓困於豺狼之吻。一夫有死，皆亮之罪，以此相賀，能不為愧。」於是蜀人咸知亮有吞魏之志，非惟拓境而已。◇難曰：亮有吞魏之志久矣，不始於此眾人方知也，且於時師出無成，傷缺而反者眾，三郡歸降而不能有。姜維，天水之匹夫耳，獲之則於魏何損？拔西縣千家，不補街亭所喪，以何為功，而蜀人相賀乎？
- id: shu.5.p13.a3
  anchor: shu.5.p13
  at: 264
  length: 0
  type: pei
  text: 《漢晉春秋》曰：或勸亮更發兵者，亮曰：「大軍在祁山、箕谷，皆多於賊，而不能破賊、為賊所破者，則此病不在兵少也，在一人耳。今欲減兵省將，明罰思過，校變通之道於將來；若不能然者，雖兵多何益！自今已後，諸有忠慮於國，但勤攻吾之闕，則事可定，賊可死，功可蹻足而待矣。」於是考微勞，甄烈壯，引咎責躬，布所失於天下，厲兵講武，以為後圖，戎士簡練，民忘其敗矣。亮聞孫權破曹休，魏兵東下，關中虛弱。十一月，上言曰：先帝慮漢、賊不兩立，王業不偏安，故託臣以討賊也。以先帝之明，量臣之才，故知臣伐賊才弱敵強也；然不伐賊，王業亦亡，惟坐待亡，孰與伐之？是故託臣而弗疑也。臣受命之日，寢不安席，食不甘味，思惟北征，宜先入南，故五月渡瀘，深入不毛，並日而食。臣非不自惜也，顧王業不得偏全於蜀都，故冒危難以奉先帝之遺意也，而議者謂為非計。今賊適疲於西，又務於東，兵法乘勞，此進趨之時也。謹陳其事如左：高帝明並日月，謀臣淵深，然涉險被創，危然後安。今陛下未及高帝，謀臣不如良、平，而欲以長計取勝，坐定天下，此臣之未解一也。劉繇、王朗各據州郡，論安言計，動引聖人，群疑滿腹，眾難塞胸，今歲不戰，明年不徵，使孫策坐大，遂並江東，此臣之未解二也。曹操智計殊絕於人，其用兵也，彷彿孫、吳，然困於南陽，險於烏巢，危於祁連，偪於黎陽，幾敗北山，殆死潼關，然後偽定一時耳，況臣才弱，而欲以不危而定之，此臣之未解三也。曹操五攻昌霸不下，四越巢湖不成，任用李服而李服圖之，委夏侯而夏侯敗亡，先帝每稱操為能，猶有此失，況臣駑下，何能必勝？此臣之未解四也。自臣到漢中，中間期年耳，然喪趙雲、陽群、馬玉、閻芝、丁立、白壽、劉郃、鄧銅等及曲長屯將七十餘人，突將無前。賨、叟、青羌散騎、武騎一千餘人，此皆數十年之內所糾合四方之精銳，非一州之所有，若復數年，則損三分之二也，當何以圖敵？此臣之未解五也。今民窮兵疲，而事不可息，事不可息，則住與行勞費正等，而不及今圖之，欲以一州之地與賊持久，此臣之未解六也。夫難平者，事也。昔先帝敗軍於楚，當此時，曹操拊手，謂天下以定。然後先帝東連吳、越，西取巴、蜀，舉兵北征，夏侯授首，此操之失計而漢事將成也。然後吳更違盟，關羽毀敗，秭歸蹉跌，曹丕稱帝。凡事如是，難可逆見。臣鞠躬儘力，死而後已，至於成敗利鈍，非臣之明所能逆睹也。於是有散關之役。此表，亮集所無，出張儼《默記》。
- id: shu.5.p14.a1
  anchor: shu.5.p14
  at: 212
  length: 0
  type: pei
  text: 《漢晉春秋》曰：是歲，孫權稱尊號，其群臣以並尊二帝來告。議者咸以為交之無益，而名體弗順，宜顯明正義，絕其盟好。亮曰：「權有僭逆之心久矣，國家所以略其釁情者，求掎角之援也。今若加顯絕，讎我必深，便當移兵東（戍），與之角力，須並其土，乃議中原。彼賢才尚多，將相緝穆，未可一朝定也。頓兵相持，坐而須老，使北賊得計，非算之上者。昔孝文卑辭匈奴，先帝優與吳盟，皆應權通變，弘思遠益，非匹夫之為（分）者也。今議者咸以權利在鼎足，不能並力，且志望以滿，無上岸之情，推此，皆似是而非也。何者？其智力不侔，故限江自保；權之不能越江，猶魏賊之不能渡漢，非力有餘而利不取也。若大軍致討，彼高當分裂其地以為後規，下當略民廣境，示武於內，非端坐者也。若就其不動而睦於我，我之北伐，無東顧之憂，河南之眾不得盡西，此之為利，亦已深矣。權僭之罪，未宜明也。」乃遣衛尉陳震慶權正號。
- id: shu.5.p15.a1
  anchor: shu.5.p15
  at: 14
  length: 0
  type: pei
  text: 《漢晉春秋》曰：亮圍祁山，招鮮卑軻比能，比能等至故北地石城以應亮。於是魏大司馬曹真有疾，司馬宣王自荊州入朝，魏明帝曰：「西方事重，非君莫可付者。」乃使西屯長安，督張郃、費曜、戴陵、郭淮等。宣王使曜、陵留精兵四千守上邽，餘眾悉出，西救祁山。郃欲分兵駐雍、郿，宣王曰：「料前軍能獨當之者，將軍言是也；若不能當而分為前後，此楚之三軍所以為黥布禽也。」遂進。亮分兵留攻，自逆宣王於上邽。郭淮、費曜等徼亮，亮破之，因大芟刈其麥，與宣王遇於上邽之東，斂兵依險，軍不得交，亮引而還。宣王尋亮至於鹵城。張郃曰：「彼遠來逆我，請戰不得，謂我利在不戰，欲以長計制之也。且祁山知大軍以在近，人情自固，可止屯於此，分為奇兵，示出其後，不宜進前而不敢偪，坐失民望也。今亮縣軍食少，亦行去矣。」宣王不從，故尋亮。既至，又登山掘營，不肯戰。賈栩、魏平數請戰，因曰：「公畏蜀如虎，奈天下笑何！」宣王病之。諸將咸請戰。五月辛巳，乃使張郃攻無當監何平於南圍，自案中道向亮。亮使魏延、高翔、吳班赴拒，大破之，獲甲首三千級，玄鎧五千領，角弩三千一百張，宣王還保營。
- id: shu.5.p15.a2
  anchor: shu.5.p15
  at: 31
  length: 0
  type: pei
  text: 郭沖《五事》曰：魏明帝自徵蜀，幸長安，遣宣王督張郃諸軍，雍、涼勁卒三十餘萬，潛軍密進，規向劍閣。亮時在祁山，旌旗利器，守在險要，十二更下，在者八萬。時魏軍始陳，幡兵適交，參佐咸以賊眾強盛，非力不制，宜權停下兵一月，以並聲勢。亮曰：「吾統武行師，以大信為本，得原失信，古人所惜；去者束裝以待期，妻子鶴望而計日，雖臨徵難，義所不廢。」皆催遣令去。於是去者感悅，原留一戰，住者憤踴，思致死命。相謂曰：「諸葛公之恩，死猶不報也。」臨戰之日，莫不拔刃爭先，以一當十，殺張郃，卻宣王，一戰大剋，此信之由也。◇難曰：臣松之案：亮前出祁山，魏明帝身至長安耳，此年不復自來。且亮大軍在關、隴，魏人何由得越亮徑向劍閣？亮既在戰場，本無久住之規，而方休兵還蜀，皆非經通之言。孫盛、習鑿齒搜求異同，罔有所遺，而並不載沖言，知其乖剌多矣。
- id: shu.5.p16.a1
  anchor: shu.5.p16
  at: 84
  length: 0
  type: pei
  text: 《漢晉春秋》曰：亮自至，數挑戰。宣王亦表固請戰。使衛尉辛毗持節以制之。姜維謂亮曰：「辛佐治仗節而到，賊不復出矣。」亮曰：「彼本無戰情，所以固請戰者，以示武於其眾耳。將在軍，君命有所不受，苟能制吾，豈千里而請戰邪！」《魏氏春秋》曰：亮使至，問其寢食及其事之煩簡，不問戎事。使對曰：「諸葛公夙興夜寐，罰二十以上，皆親攬焉；所啖食不至數升。」宣王曰：「亮將死矣。」
- id: shu.5.p16.a2
  anchor: shu.5.p16
  at: 109
  length: 0
  type: pei
  text: 《魏書》曰：亮糧盡勢窮，憂恚歐血，一夕燒營遁走，入谷，道發病卒。漢晉春秋曰：亮卒于郭氏塢。《晉陽秋》曰：有星赤而芒角，自東北西南流，投于亮營，三投再還，往大還小。俄而亮卒。臣松之以為亮在渭濱，魏人躡跡，勝負之形，未可測量，而云歐血，蓋因亮自亡而自誇大也。夫以孔明之略，豈為仲達歐血乎？及至劉琨喪師，與晉元帝箋亦云「亮軍敗歐血」，此則引虛記以為言也。其云入谷而卒，緣蜀人入谷發喪故也。
- id: shu.5.p16.a3
  anchor: shu.5.p16
  at: 133
  length: 0
  type: pei
  text: 《漢晉春秋》曰：楊儀等整軍而出，百姓奔告宣王，宣王追焉。姜維令儀反旗鳴鼓，若將向宣王者，宣王乃退，不敢偪。於是儀結陳而去，入谷然後發喪。宣王之退也，百姓為之諺曰：「死諸葛走生仲達。」或以告宣王，宣王曰：「吾能料生，不便料死也。」
- id: shu.5.p20.a1
  anchor: shu.5.p20
  at: 38
  length: 0
  type: pei
  text: 《魏氏春秋》曰：亮作八務、七戒、六恐、五懼，皆有條章，以訓厲臣子。又損益連弩，謂之元戎，以鐵為矢，矢長八寸，一弩十矢俱發。《亮集》載作木牛流馬法曰：「木牛者，方腹曲頭，一腳四足，頭入領中，舌著於腹。載多而行少，宜可大用，不可小使；特行者數十里，群行者二十里也。曲者為牛頭，雙者為牛腳，橫者為牛領，轉者為牛足，覆者為牛背，方者為牛腹，垂者為牛舌，曲者為牛肋，刻者為牛齒，立者為牛角，細者為牛鞅，攝者為牛鞦軸。牛仰雙轅，人行六尺，牛行四步。載一歲糧，日行二十里，而人不大勞。流馬尺寸之數，肋長三尺五寸，廣三寸，厚二寸二分，左右同。前軸孔分墨去頭四寸，徑中二寸。前腳孔分墨二寸，去前軸孔四寸五分，廣一寸。前杠孔去前腳孔分墨二寸七分，孔長二寸，廣一寸。後軸孔去前杠分墨一尺五分，大小與前同。後腳孔分墨去後軸孔三寸五分，大小與前同。後杠孔去後腳孔分墨二寸七分，後載剋去後杠孔分墨四寸五分。前杠長一尺八寸，廣二寸，厚一寸五分。後杠與等版方囊二枚，厚八分，長二尺七寸，高一尺六寸五分，廣一尺六寸，每枚受米二斛三斗。從上杠孔去肋下七寸，前後同。上杠孔去下杠孔分墨一尺三寸，孔長一寸五分，廣七分，八孔同。前後四腳，廣二寸，厚一寸五分。形制如象，靬長四寸，徑面四寸三分。孔徑中三腳杠，長二尺一寸，廣一寸五分，厚一寸四分，同杠耳。」
- id: shu.5.p21.a1
  anchor: shu.5.p21
  at: 15
  length: 0
  type: pei
  text: 《襄陽記》曰：亮初亡，所在各求為立廟，朝議以禮秩不聽，百姓遂因時節私祭之於道陌上。言事者或以為可聽立廟於成都者，後主不從。步兵校尉習隆、中書郎向充等共上表曰：「臣聞周人懷召伯之德，甘棠為之不伐；越王思范蠡之功，鑄金以存其像。自漢興以來，小善小德而圖形立廟者多矣。況亮德范遐邇，勛蓋季世，王室之不壞，實斯人是賴，而蒸嘗止於私門，廟像闕而莫立，使百姓巷祭，戎夷野祀，非所以存德念功，述追在昔者也。今若盡順民心，則瀆而無典，建之京師，又偪宗廟，此聖懷所以惟疑也。臣愚以為宜因近其墓，立之於沔陽，使所親屬以時賜祭，凡其臣故吏欲奉祠者，皆限至廟。斷其私祀，以崇正禮。」於是始從之。
- id: shu.5.p21.a2
  anchor: shu.5.p21
  at: 70
  length: 0
  type: pei
  text: 《襄陽記》曰：黃承彥者，高爽開列，為沔南名士，謂諸葛孔明曰：「聞君擇婦；身有醜女，黃頭黑色，而才堪相配。」孔明許，即載送之。時人以為笑樂，鄉里為之諺曰：「莫作孔明擇婦，正得阿承醜女。」
- id: shu.5.p37.a1
  anchor: shu.5.p37
  at: 93
  length: 0
  type: pei
  text: 亮與兄瑾書曰：「喬本當還成都，今諸將子弟皆得傳運，思惟宜同榮辱。今使喬督五六百兵，與諸子弟傳於谷中。」書在亮集。
- id: shu.5.p38.a1
  anchor: shu.5.p38
  at: 296
  length: 0
  type: pei
  text: 干寶曰：瞻雖智不足以扶危，勇不足以拒敵，而能外不負國，內不改父之志，忠孝存焉。《華陽國志》曰：尚嘆曰：「父子荷國重恩，不早斬黃皓，以致傾敗，用生何為！」乃馳赴魏軍而死。
- id: shu.5.p38.a2
  anchor: shu.5.p38
  at: 314
  length: 0
  type: pei
  text: 案《諸葛氏譜》云：京字行宗。《晉泰始起居注》載詔曰：「諸葛亮在蜀，盡其心力，其子瞻臨難而死義，天下之善一也。」其孫京，隨才署吏，後為郿令。尚書僕射山濤《啟事》曰：「郿令諸葛京，祖父亮，遇漢亂分隔，父子在蜀，雖不達天命，要為盡心所事。京治郿自復有稱，臣以為宜以補東宮舍人，以明事人之理，副梁、益之論。」京位至江州刺史。
- id: shu.5.p39.a1
  anchor: shu.5.p39
  at: 81
  length: 0
  type: pei
  text: 案《晉百官表》：董厥字龔襲，亦義陽人。建字長元。
- id: shu.5.p39.a2
  anchor: shu.5.p39
  at: 188
  length: 0
  type: pei
  text: 孫盛《異同記》曰：瞻、厥等以維好戰無功，國內疲弊，宜表後主，召還為益州刺史，奪其兵權；蜀長老猶有瞻表以閻宇代維故事。晉永和三年，蜀史常璩說蜀長老云：「陳壽嘗為瞻吏，為瞻所辱，故因此事歸惡黃皓，而云瞻不能匡矯也。」
- id: shu.5.p39.a3
  anchor: shu.5.p39
  at: 235
  length: 0
  type: pei
  text: 《漢晉春秋》曰：樊建為給事中，晉武帝問諸葛亮之治國，建對曰：「聞惡必改，而不矜過，賞罰之信，足感神明。」帝曰：「善哉！使我得此人以自輔，豈有今日之勞乎！」建稽首曰：「臣竊聞天下之論，皆謂鄧艾見枉，陛下知而不理，此豈馮唐之所謂『雖得頗、牧而不能用』者乎！」帝笑曰：「吾方欲明之，卿言起我意。」於是發詔治艾焉。
