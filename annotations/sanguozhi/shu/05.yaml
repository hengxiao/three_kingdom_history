  type: pei
  text: 《獻帝春秋》曰：初，豫章太守周術病卒，劉表上諸葛玄為豫章太守，治南昌。漢朝聞周術死，遣朱皓代玄。皓從揚州刺史劉繇求兵擊玄，玄退屯西城，皓入南昌。建安二年正月，西城民反，殺玄，送首詣繇。此書所云，與本傳不同。
- id: shu.5.p1.a2
  anchor: shu.5.p1
  at: 109
  length: 0
  type: pei
  text: 《漢晉春秋》曰：亮家于南陽之鄧縣，在襄陽城西二十里，號曰隆中。
- id: shu.5.p1.a3
  anchor: shu.5.p1
  at: 154
  length: 0
  type: pei
  text: 按《崔氏譜》：州平，太尉烈子，均之弟也。《魏略》曰：亮在荊州，以建安初與潁川石廣元、徐元直、汝南孟公威等俱游學，三人務於精熟，而亮獨觀其大略。每晨夜從容，常抱膝長嘯，而謂三人曰：「卿三人仕進可至刺史郡守也。」三人問其所至，亮但笑而不言。後公威思鄉里，欲北歸，亮謂之曰：「中國饒士大夫，遨遊何必故鄉邪！」臣松之以為《魏略》此言，謂諸葛亮為公威計者可也，若謂兼為己言，可謂未達其心矣。老氏稱知人者智，自知者明，凡在賢達之流，固必兼而有焉。以諸葛亮之鑒識，豈不能自審其分乎？夫其高吟俟時，情見乎言，志氣所存，既已定於其始矣。若使游步中華，騁其龍光，豈夫多士所能沈翳哉！委質魏氏，展其器能，誠非陳長文、司馬仲達所能頡頏，而況於餘哉！苟不患功業不就，道之不行，雖志恢宇宙而終不北向者，蓋以權御已移，漢祚將傾，方將翊贊宗傑，以興微繼絕克復為己任故也。豈其區區利在邊鄙而已乎！此相如所謂「鵾鵬已翔於遼廓，而羅者猶視於藪澤」者矣。公威名建，在魏亦貴達。
- id: shu.5.p2.a1
  anchor: shu.5.p2
  at: 43
  length: 0
  type: pei
  text: 《襄陽記》曰：劉備訪世事於司馬德操。德操曰：「儒生俗士，豈識時務？識時務者在乎俊傑。此間自有伏龍、鳳雛。」備問為誰，曰：「諸葛孔明、龐士元也。」
- id: shu.5.p2.a2
  anchor: shu.5.p2
  at: 580
  length: 0
  type: pei
  text: 《魏略》曰：劉備屯於樊城。是時曹公方定河北，亮知荊州次當受敵，而劉表性緩，不曉軍事。亮乃北行見備，備與亮非舊，又以其年少，以諸生意待之。坐集既畢，眾賓皆去，而亮獨留，備亦不問其所欲言。備性好結毦，時適有人以髦牛尾與備者，備因手自結之。亮乃進曰：「明將軍當復有遠志，但結毦而已邪！」備知亮非常人也，乃投毦而答曰：「是何言與！我聊以忘憂耳。」亮遂言曰：「將軍度劉鎮南孰與曹公邪？」備曰：「不及。」亮又曰：「將軍自度何如也？」備曰：「亦不如。」曰：「今皆不及，而將軍之眾不過數千人，以此待敵，得無非計乎！」備曰：「我亦愁之，當若之何？」亮曰：「今荊州非少人也，而著籍者寡，平居發調，則人心不悅；可語鎮南，令國中凡有游戶，皆使自實，因錄以益眾可也。」備從其計，故眾遂強。備由此知亮有英略，乃以上客禮之。九州春秋所言亦如之。臣松之以為亮表云「先帝不以臣卑鄙，猥自枉屈，三顧臣於草廬之中，諮臣以當世之事」，則非亮先詣備，明矣。雖聞見異辭，各生彼此，然乖背至是，亦良為可怪。
- id: shu.5.p3.a1
  anchor: shu.5.p3
  at: 263
  length: 0
  type: pei
  text: 《魏略》曰：庶先名福，本單家子，少好任俠擊劍。中平末，嘗為人報讎，白堊突面，被髪而走，為吏所得，問其姓字，閉口不言。吏乃於車上立柱維磔之，擊鼓以令於市鄽，莫敢識者，而其黨伍共篡解之，得脫。於是感激，棄其刀戟，更疏巾單衣，折節學問。始詣精舍，諸生聞其前作賊，不肯與共止。福乃卑躬早起，常獨掃除，動靜先意，聽習經業，義理精熟。遂與同郡石韜相親愛。初平中，中州兵起，乃與韜南客荊州，到，又與諸葛亮特相善。及荊州內附，孔明與劉備相隨去，福與韜俱來北。至黃初中，韜仕歷郡守、典農校尉，福至右中郎將、御史中丞。逮大和中，諸葛亮出隴右，聞元直、廣元仕財如此，嘆曰：「魏殊多士邪！何彼二人不見用乎？」庶後數年病卒，有碑在彭城，今猶存焉。
- id: shu.5.p4.a1
  anchor: shu.5.p4
  at: 560
  length: 0
  type: pei
  text: 袁子曰：張子布薦亮於孫權，亮不肯留。人問其故，曰：「孫將軍可謂人主，然觀其度，能賢亮而不能盡亮，吾是以不留。」臣松之以為袁孝尼著文立論，甚重諸葛之為人，至如此言則失之殊遠。觀亮君臣相遇，可謂希世一時，終始以分，誰能間之？寧有中違斷金，甫懷擇主，設使權盡其量，便當翻然去就乎？葛生行己，豈其然哉！關羽為曹公所獲，遇之甚厚，可謂能盡其用矣，猶義不背本，曾謂孔明之不若雲長乎！
- id: shu.5.p4.a2
  anchor: shu.5.p4
  at: 611
  length: 0
  type: pei
  text: 《零陵先賢傳》云：亮時住臨烝。
- id: shu.5.p5.a1
  anchor: shu.5.p5
  at: 366
  length: 0
  type: pei
  text: 《蜀記》曰：晉初扶風王駿鎮關中，司馬高平劉寶、長史滎陽桓隰諸官屬士大夫共論諸葛亮，于時譚者多譏亮託身非所，勞困蜀民，力小謀大，不能度德量力。金城郭沖以為亮權智英略，有踰管、晏，功業未濟，論者惑焉，條亮五事隱沒不聞於世者，寶等亦不能復難。扶風王慨然善沖之言。臣松之以為亮之異美，誠所願聞，然沖之所說，實皆可疑，謹隨事難之如左：其《一事》曰：亮刑法峻急，刻剝百姓，自君子小人咸懷怨歎，法正諫曰：「昔高祖入關，約法三章，秦民知德，今君假借威力，跨據一州，初有其國，未垂惠撫；且客主之義，宜相降下，願緩刑弛禁，以慰其望。」亮答曰；「君知其一，未知其二。秦以無道，政苛民怨，匹夫大呼，天下土崩，高祖因之，可以弘濟。劉璋暗弱，自焉已來有累世之恩，文法羈縻，互相承奉，德政不舉，威刑不肅。蜀土人士，專權自恣，君臣之道，漸以陵替；寵之以位，位極則賤，順之以恩，恩竭則慢。所以致弊，實由於此。吾今威之以法，法行則知恩，限之以爵，爵加則知榮；榮恩並濟，上下有節。為治之要，於斯而著。」◇難曰：案法正在劉主前死，今稱法正諫，則劉主在也。諸葛職為股肱，事歸元首，劉主之世，亮又未領益州，慶賞刑政，不出於己。尋沖所述亮答，專自有其能，有違人臣自處之宜。以亮謙順之體，殆必不然。又云亮刑法峻急，刻剝百姓，未聞善政以刻剝為稱。其《二事》曰：曹公遣刺客見劉備，方得交接，開論伐魏形勢，甚合備計。稍欲親近，刺者尚未得便會，既而亮入，魏客神色失措。亮因而察之，亦知非常人。須臾，客如廁，備謂亮曰；「向得奇士，足以助君補益。」亮問所在，備曰：「起者其人也。」亮徐歎曰：「觀客色動而神懼，視低而忤數，姦形外漏，邪心內藏，必曹氏刺客也。」追之，已越牆而走。◇難曰：凡為刺客，皆暴虎馮河，死而無悔者也。劉主有知人之鑒，而惑於此客，則此客必一時之奇士也。又語諸葛云「足以助君補益」，則亦諸葛之流亞也。凡如諸葛之儔，鮮有為人作刺客者矣，時主亦當惜其器用，必不投之死地也。且此人不死，要應顯達為魏，竟是誰乎？何其寂蔑而無聞！
- id: shu.5.p6.a1
  anchor: shu.5.p6
  at: 117
  length: 0
  type: pei
  text: 孫盛曰：夫杖道扶義，體存信順，然後能匡主濟功，終定大業。語曰弈者舉釭不定猶不勝其偶，況量君之才否而二三其節，可以摧服強鄰囊括四海者乎？備之命亮，亂孰甚焉！世或有謂備欲以固委付之誠，且以一蜀人之志。君子曰，不然；苟所寄忠賢，則不須若斯之誨，如非其人，不宜啟篡逆之塗。是以古之顧命，必貽話言；詭偽之辭，非託孤之謂。幸值劉禪闇弱，無猜險之性，諸葛威略，足以檢衛異端，故使異同之心無由自起耳。不然，殆生疑隙不逞之釁。謂之為權，不亦惑哉！
- id: shu.5.p7.a1
  anchor: shu.5.p7
  at: 75
  length: 0
  type: pei
  text: 亮集曰：是歲，魏司徒華歆、司空王朗、尚書令陳群、太史令許芝、謁者僕射諸葛璋各有書與亮，陳天命人事，欲使舉國稱籓。亮遂不報書，作正議曰：「昔在項羽，起不由德，雖處華夏，秉帝者之勢，卒就湯鑊，為後永戒。魏不審鑒，今次之矣；免身為幸，戒在子孫。而二三子各以耆艾之齒，承偽指而進書，有若崇、竦稱莽之功，亦將偪於元禍苟免者邪！昔世祖之創跡舊基，奮羸卒數千，摧莽彊旅四十餘萬於昆陽之郊。夫據道討淫，不在眾寡。及至孟德，以其譎勝之力，舉數十萬之師，救張郃於陽平，勢窮慮悔，僅能自脫，辱其鋒銳之眾，遂喪漢中之地，深知神器不可妄獲，旋還未至，感毒而死。子桓淫逸，繼之以篡。縱使二三子多逞蘇、張詭靡之說，奉進驩兜滔天之辭，欲以誣毀唐帝，諷解禹、稷，所謂徒喪文藻煩勞翰墨者矣。夫大人君子之所不為也。又軍誡曰：『萬人必死，橫行天下。』昔軒轅氏整卒數萬，制四方，定海內，況以數十萬之眾，據正道而臨有罪，可得干擬者哉！」
- id: shu.5.p8.a1
  anchor: shu.5.p8
  at: 10
  length: 0
  type: pei
  text: 詔賜亮金鈇鉞一具，曲蓋一，前後羽葆鼓吹各一部，虎賁六十人。事在亮集。
- id: shu.5.p8.a2
  anchor: shu.5.p8
  at: 25
  length: 0
  type: pei
  text: 《漢晉春秋》曰：亮至南中，所在戰捷。聞孟獲者，為夷、漢所服，募生致之。既得，使觀於營陳之間，問曰：「此軍何如？」獲對曰：「向者不知虛實，故敗。今蒙賜觀看營陳，若祇如此，即定易勝耳。」亮笑，縱使更戰，七縱七禽，而亮猶遣獲。獲止不去，曰：「公，天威也，南人不復反矣。」遂至滇池。南中平，皆即其渠率而用之。或以諫亮，亮曰：「若留外人，則當留兵，兵留則無所食，一不易也；加夷新傷破，父兄死喪，留外人而無兵者，必成禍患，二不易也；又夷累有廢殺之罪，自嫌釁重，若留外人，終不相信，三不易也；今吾欲使不留兵，不運糧，而綱紀粗定，夷、漢粗安故耳。」
- id: shu.5.p10.a1
  anchor: shu.5.p10
  at: 100
  length: 0
  type: pei
  text: 臣松之案：劉備以建安十三年敗，遣亮使吳，亮以建興五年抗表北伐，自傾覆至此整二十年。然則備始與亮相遇，在敗軍之前一年時也。
- id: shu.5.p10.a2
