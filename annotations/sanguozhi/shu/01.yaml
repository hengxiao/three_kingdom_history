  at: 22
  length: 0
  type: pei
  text: 臣松之案：祝公，司徒祝恬也。
- id: shu.1.p3.a1
  anchor: shu.1.p3
  at: 17
  length: 0
  type: pei
  text: 儉，郤正祖也。
- id: shu.1.p3.a2
  anchor: shu.1.p3
  at: 62
  length: 0
  type: pei
  text: 《續漢書》曰：是時用劉虞為幽州，劉焉為益州，劉表為荊州，賈琮為冀州。虞等皆海內清名之士，或從列卿尚書以選為牧伯，各以本秩居任。舊典：傳車參駕，施赤為帷裳。臣松之按：靈帝崩後，義軍起，孫堅殺荊州刺史王叡，然後劉表為荊州，不與焉同時也。《漢靈帝紀》曰：帝引見焉，宣示方略，加以賞賜，敕焉為益州刺史。前刺史劉雋、郤儉皆貪殘放濫，取受狼籍，元元無聊，呼嗟充野，焉到便收攝行法，以示萬姓，勿令漏露，使癰疽決潰，為國生梗。焉受命而行，以道路不通，住荊州東界。
- id: shu.1.p3.a3
  anchor: shu.1.p3
  at: 93
  length: 0
  type: pei
  text: 陳壽《益部耆舊傳》曰：董扶字茂安。少從師學，兼通數經，善歐陽尚書，又事聘士楊厚，究極圖讖。遂至京師，遊覽太學，還家講授，弟子自遠而至。永康元年，日有蝕之，詔舉賢良方正之士，策問得失。左馮翊趙謙等舉扶，扶以病不詣，遙於長安上封事，遂稱疾篤歸家。前後宰府十闢，公車三徵，再舉賢良方正、博士、有道皆不就，名稱尤重。大將軍何進表薦扶曰：「資遊、夏之德，述孔氏之風，內懷焦、董消復之術。方今並、涼騷擾，西戎蠢叛，宜敕公車特召，待以異禮，諮謀奇策。」於是靈帝徵扶，即拜侍中。在朝稱為儒宗，甚見器重。求為蜀郡屬國都尉。扶出一歲而靈帝崩，天下大亂。後去官，年八十二卒於家。始扶發辭抗論，益部少雙，故號曰（致止）〔至止〕，言人莫能當，所至而談止也。後丞相諸葛亮問秦宓以扶所長，宓曰：「董扶褒秋毫之善，貶纖芥之惡。」
- id: shu.1.p4.a1
  anchor: shu.1.p4
  at: 251
  length: 0
  type: pei
  text: 《益部耆舊雜記》曰：李權字伯豫，為臨邛長。子福。見犍為楊戲《輔臣贊》。
- id: shu.1.p4.a2
  anchor: shu.1.p4
  at: 273
  length: 0
  type: pei
  text: 《英雄記》曰：劉焉起兵，不與天下討董卓，保州自守。犍為太守任岐自稱將軍，與從事陳超舉兵擊焉，焉擊破之。董卓使司徒趙謙將兵向州，說校尉賈龍，使引兵還擊焉，焉出青羌與戰，故能破殺。岐、龍等皆蜀郡人。
- id: shu.1.p5.a1
  anchor: shu.1.p5
  at: 67
  length: 0
  type: pei
  text: 《英雄記》曰：範（聞）父焉為益州牧，董卓所徵發，皆不至。收范兄弟三人，鎖械於郿塢，為陰獄以系之。
- id: shu.1.p5.a2
  anchor: shu.1.p5
  at: 95
  length: 0
  type: pei
  text: 《典略》曰：時璋為奉車都尉，在京師。焉託疾召璋，璋自表省焉，焉遂留璋不還。
- id: shu.1.p5.a3
  anchor: shu.1.p5
  at: 150
  length: 0
  type: pei
  text: 《英雄記》曰：範從長安亡之馬騰營，從焉求兵。焉使校尉孫肇將兵往助之，敗於長安。
