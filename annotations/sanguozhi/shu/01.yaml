  type: pei
  text: 《吳書》曰：闡一名緯，為人恭恪，輕財愛義，有仁讓之風，後疾終於家。
- id: shu.1.p11.a1
  anchor: shu.1.p11
  at: 18
  length: 0
  type: pei
  text: 孔衍《漢魏春秋》曰：許負，河內溫縣之婦人，漢高祖封為明雌亭侯。臣松之以為今東人呼母為負，衍以許負為婦人，如為有似，然漢高祖時封皆列侯，未有鄉亭之爵，疑此封為不然。
- id: shu.1.p11.a2
  anchor: shu.1.p11
  at: 138
  length: 0
  type: pei
  text: 張璠曰：劉璋愚弱而守善言，斯亦宋襄公、徐偃王之徒，未為無道之主也。張松、法正，雖有君臣之義不正，然固以委名附質，進不顯陳事勢，若韓嵩、（劉光）〔劉先〕之說劉表，退不告絕奔亡，若陳平、韓信之去項羽，而兩端攜貳，為謀不忠，罪之次也。
