  type: pei
  text: 《英雄記》曰：焉死，子璋代為刺史。會長安拜潁川扈瑁為刺史，入漢中。荊州別駕劉闔，璋將沈彌、婁發、甘寧反，擊璋不勝，走入荊州。璋使趙韙進攻荊州，屯朐䏰。上蠢，下如振反。
- id: shu.1.p7.a1
  anchor: shu.1.p7
  at: 72
  length: 0
  type: pei
  text: 《英雄記》曰：龐羲與璋有舊，又免璋諸子於難，故璋厚德羲，以羲為巴西太守，遂專權勢。
- id: shu.1.p7.a2
  anchor: shu.1.p7
  at: 106
  length: 0
  type: pei
  text: 《英雄記》曰：先是，南陽、三輔人流入益州數万家，收以為兵，名曰東州兵。璋性寬柔，無威略，東州人侵暴舊民，璋不能禁，政令多闕，益州頗怨。趙韙素得人心，璋委任之。韙因民怨謀叛，乃厚賂荊州請和，陰結州中大姓，與俱起兵，還擊璋。蜀郡、廣漢、犍為皆應韙。璋馳入成都城守，東州人畏（威），咸同心並力助璋，皆殊死戰，遂破反者，進攻韙於江州。韙將龐樂、李異反殺韙軍，斬韙。《漢獻帝春秋》曰：漢朝聞益州亂，遣五官中郎將牛亶為益州刺史；徵璋為卿，不至。
- id: shu.1.p8.a1
  anchor: shu.1.p8
  at: 44
  length: 0
  type: pei
  text: 臣松之案：魏台訪「物故」之義，高堂隆答曰：「聞之先師：物，無也；故，事也；言無復所能於事也。」
- id: shu.1.p8.a2
  anchor: shu.1.p8
  at: 141
  length: 0
  type: pei
  text: 《漢書春秋》曰：張松見曹公，曹公方自矜伐，不存錄松。松歸，乃勸璋自絕。習鑿齒曰：昔齊桓一矜其功而叛者九國，曹操暫自驕伐而天下三分，皆勤之於數十年之內而棄之於俯仰之頃，豈不惜乎！是以君子勞謙日昃，慮以下人，功高而居之以讓，勢尊而守之以卑。情近於物，故雖貴而人不厭其重；德洽群生，故業廣而天下愈欣其慶。夫然，故能有其富貴，保其功業，隆顯當時，傳福百世，何驕矜之有哉！君子是以知曹操之不能遂兼天下者也。
