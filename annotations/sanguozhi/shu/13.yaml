  at: 182
  length: 0
  type: pei
  text: 徐眾評曰：權既忠諫於主，又閉城拒守，得事君之禮。武王下車，封比干之墓，表商容之閭，所以大顯忠賢之士，而明示所貴之旨。先主假權將軍，善矣，然猶薄少，未足彰忠義之高節，而大勸為善者之心。
- id: shu.13.p2.a1
  anchor: shu.13.p2
  at: 171
  length: 0
  type: pei
  text: 臣松之以為漢武用虛罔之言，滅李陵之家，劉主拒憲司所執，宥黃權之室，二主得失縣邈遠矣。詩云「樂只君子，保艾爾後」，其劉主之謂也。
- id: shu.13.p2.a2
  anchor: shu.13.p2
  at: 289
  length: 0
  type: pei
  text: 《漢魏春秋》曰：文帝詔令發喪，權答曰：「臣與劉、葛推誠相信，明臣本志。疑惑未實，請須後問。」
