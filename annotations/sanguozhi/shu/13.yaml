- id: shu.13.p17.a2
  anchor: shu.13.p17
  at: 286
  length: 0
  type: pei
  text: 《益部耆舊傳》曰：嶷受兵馬三百人，隨馬忠討叛羌。嶷別督數營在先，至他裡。邑所在高峻，嶷隨山立上四五里。羌於要厄作石門，於門上施床，積石於其上，過者下石槌擊之，無不糜爛。嶷度不可得攻，乃使譯告曉之曰：「汝汶山諸種反叛，傷害良善，天子命將討滅惡類。汝等若稽顙過軍，資給糧費，福祿永隆，其報百倍。若終不從，大兵致誅，雷擊電下，雖追悔之，亦無益也。」耆帥得命，即出詣嶷，給糧過軍。軍前討餘種，餘種聞他裡已下，悉恐怖失所，或迎軍出降，或奔竄山谷，放兵攻擊，軍以克捷。後南夷劉冑又反，以馬忠為督庲降討冑，嶷复屬焉，戰鬥常冠軍首，遂斬冑。平南事訖，牂牁興古獠種復反，忠令嶷領諸營往討，嶷內招降得二千人，悉傳詣漢中。
