  type: pei
  text: 孫盛《蜀世譜》曰：初，秦徙呂不韋子弟宗族於蜀漢。漢武帝時，開西南夷，置郡縣，徙呂氏以充之，因曰不韋縣。
- id: shu.13.p10.a1
  anchor: shu.13.p10
  at: 129
  length: 0
  type: pei
  text: 《蜀世譜》曰：呂祥後為晉南夷校尉，祥子及孫世為永昌太守。李雄破寧州，諸呂不肯附，舉郡固守。王伉等亦守正節。
