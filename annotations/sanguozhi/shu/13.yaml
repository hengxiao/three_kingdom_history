  at: 110
  length: 0
  type: pei
  text: 《蜀記》曰：魏明帝問權：「天下鼎立，當以何地為正？」權對曰：「當以天文為正。往者熒惑守心而文皇帝崩，吳、蜀二主平安，此其徵也。」
