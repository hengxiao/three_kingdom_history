  type: pei
  text: 《益部耆舊傳》曰：余觀張嶷儀貌辭令，不能駭人，而其策略足以入算，果烈足以立威，為臣有忠誠之節，處類有亮直之風，而動必顧典，後主深崇之。雖古之英士，何以遠逾哉！《蜀世譜》曰：嶷孫奕，晉梁州刺史。
