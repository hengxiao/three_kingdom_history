- id: shu.13.p26.a2
  anchor: shu.13.p26
  at: 136
  length: 0
  type: pei
  text: 《益部耆舊傳》曰：嶷風濕固疾，至都浸篤，扶杖然後能起。李簡請降，眾議狐疑，而嶷曰必然。姜維之出，時論以嶷初還，股疾不能在行中，由是嶷自乞肆力中原，致身敵庭。臨發，辭後主曰：「臣當值聖明，受恩過量，加以疾病在身，常恐一朝隕沒，辜負榮遇。天不違原，得豫戎事。若涼州克定，臣為籓表守將；若有未捷，殺身以報。」後主慨然為之流涕。
- id: shu.13.p26.a3
  anchor: shu.13.p26
  at: 224
  length: 0
  type: pei
  text: 《益部耆舊傳》曰：余觀張嶷儀貌辭令，不能駭人，而其策略足以入算，果烈足以立威，為臣有忠誠之節，處類有亮直之風，而動必顧典，後主深崇之。雖古之英士，何以遠逾哉！《蜀世譜》曰：嶷孫奕，晉梁州刺史。
- id: shu.13.p27.a1
  anchor: shu.13.p27
  at: 31
  length: 0
  type: pei
  text: 《尚書》曰：擾而毅。鄭玄注曰：擾，馴也。致果曰毅。
