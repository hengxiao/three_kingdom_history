  type: pei
  text: 音髀。
- id: shu.9.p2.a1
  anchor: shu.9.p2
  at: 290
  length: 0
  type: pei
  text: 偉度者，姓胡，名濟，義陽人。為亮主簿，有忠藎之效，故見褒述。亮卒，為中典軍，統諸軍，封成陽亭侯，遷中監軍前將軍，督漢中，假節領兗州刺史，至右驃騎將軍。濟弟博，歷長水校尉尚書。
- id: shu.9.p3.a1
  anchor: shu.9.p3
  at: 17
  length: 0
  type: pei
  text: 零陵先賢傳曰：巴祖父曜，蒼梧太守。父祥，江夏太守、蕩寇將軍。時孫堅舉兵討董卓，以南陽太守張諮不給軍糧，殺之。祥與同心，南陽士民由此怨祥，舉兵攻之，與戰，敗亡。劉表亦素不善祥，拘巴，欲殺之，數遣祥故所親信人密詐謂巴曰：「劉牧欲相危害，可相隨逃之。」如此再三，巴輒不應。具以報表，表乃不殺巴。年十八，郡署戶曹史主記主簿。劉先（主）欲遣週不疑就巴學，巴答曰：「昔遊荊北，時涉師門，記問之學，不足紀名，內無楊朱守靜之術，外無墨翟務時之風，猶天之南箕，虛而不用。賜書乃欲令賢甥摧鸞鳳之艷，遊燕雀之宇，將何以啟明之哉？愧於‘有若無，實若虛’，何以堪之！」
- id: shu.9.p3.a2
  anchor: shu.9.p3
  at: 84
  length: 0
  type: pei
  text: 零陵先賢傳曰：曹公敗於烏林，還北時，欲遣桓階，階辭不如巴。巴謂曹公曰：「劉備據荊州，不可也。」公曰：「備如相圖，孤以六軍繼之也。」
- id: shu.9.p3.a3
  anchor: shu.9.p3
  at: 104
  length: 0
  type: pei
  text: 零陵先賢傳云：巴往零陵，事不成，欲遊交州，道還京師。時諸葛亮在臨烝，巴與亮書曰：「乘危歷險，到值思義之民，自與之眾，承天之心，順物之性，非餘身謀所能勸動。若道窮數盡，將託命於滄海，不復顧荊州矣。」亮追謂曰：「劉公雄才蓋世，據有荊土，莫不歸德，天人去就，已可知矣。足下欲何之？」巴曰：「受命而來，不成當還，此其宜也。足下何言邪！」
- id: shu.9.p4.a1
  anchor: shu.9.p4
  at: 8
  length: 0
  type: pei
  text: 零陵先賢傳曰：巴入交阯，更姓為張。與交阯太守士燮計議不合，乃由牂牁道去。為益州郡所拘留，太守欲殺之。主簿曰：「此非常人，不可殺也。」主簿請自送至州，見益州牧劉璋，璋父焉昔為巴父祥所舉孝廉，見巴驚喜，每大事輒以諮訪。臣松之案：劉焉在漢靈帝時已經宗正太常，出為益州牧，祥始以孫堅作長沙時為江夏太守，不得舉焉為孝廉，明也。
- id: shu.9.p4.a2
  anchor: shu.9.p4
  at: 27
  length: 0
  type: pei
  text: 零陵先賢傳曰：璋遣法正迎劉備，巴諫曰：「備，雄人也，入必為害，不可內也。」既入，巴复諫曰：「若使備討張魯，是放虎於山林也。」璋不聽。巴閉門稱疾。備攻成都，令軍中曰：「其有害巴者，誅及三族。」及得巴，甚喜。
- id: shu.9.p4.a3
  anchor: shu.9.p4
  at: 48
  length: 0
  type: pei
  text: 零陵先賢傳曰：張飛嘗就巴宿，巴不與語，飛遂忿恚。諸葛亮謂巴曰：「張飛雖實武人，敬慕足下。主公今方收合文武，以定大事；足下雖天素高亮，宜少降意也。」巴曰：「大丈夫處世，當交四海英雄，如何與兵子共語乎？」備聞之，怒曰：「孤欲定天下，而子初專亂之。其欲還北，假道於此，豈欲成孤事邪？」備又曰：「子初才智絕人，如孤，可任用之，非孤者難獨任也。」亮亦曰：「運籌策於帷幄之中，吾不如子初遠矣！若提枹鼓，會軍門，使百姓喜勇，當與人議之耳。」初攻劉璋，備與士眾約：「若事定，府庫百物，孤無預焉。」及拔成都，士眾皆舍干戈，赴諸藏競取寶物。軍用不足，備甚憂之。巴曰：「易耳，但當鑄直百錢，平諸物賈，令吏為官巿。」備從之，數月之間，府庫充實。
