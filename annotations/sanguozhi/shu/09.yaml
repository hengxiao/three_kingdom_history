- id: shu.9.p8.a2
  anchor: shu.9.p8
  at: 275
  length: 0
  type: pei
  text: 襄陽記曰：謖臨終與亮書曰：「明公視謖猶子，謖視明公猶父，原深惟殛鯀興禹之義，使平生之交不虧於此，謖雖死無恨於黃壤也。」於時十萬之眾為之垂涕。亮自臨祭，待其遺孤若平生。蔣琬後詣漢中，謂亮曰：「昔楚殺得臣，然後文公喜可知也。天下未定而戮智計之士，豈不惜乎！」亮流涕曰：「孫武所以能製勝於天下者，用法明也。是以楊乾亂法，魏絳戮其僕。四海分裂，兵交方始，若復廢法，何用討賊邪！」習鑿齒曰：諸葛亮之不能兼上國也，豈不宜哉！夫晉人規林父之後濟，故廢法而收功；楚成闇得臣之益己，故殺之以重敗。今蜀僻陋一方，才少上國，而殺其俊傑，退收駑下之用，明法勝才，不師三敗之道，將以成業，不亦難乎！且先主誡謖之不可大用，豈不謂其非才也？亮受誡而不獲奉承，明謖之難廢也。為天下宰匠，欲大收物之力，而不量才節任，隨器付業；知之大過，則違明主之誡，裁之失中，即殺有益之人，難乎其可與言智者也。
