  anchor: shu.9.p17
  at: 10
  length: 0
  type: pei
  text: 臣松之以為陳群子泰，陸遜子抗，傳皆以子系父，不別載姓，及王肅、杜恕、張承、顧劭之流，莫不皆然，惟董允獨否，未詳其意，當以允名位優重，事蹟逾父故邪？夏侯玄、陳表並有騂角之美，而亦如泰者，《魏書》總名此卷云《諸夏侯曹傳》，故不復稍加品藻。陳武與表俱至偏將軍，以位不相過故也。
