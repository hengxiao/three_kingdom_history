  text: 楚國先賢傳曰：攸之，南陽人，以器業知名於時。
- id: shu.9.p14.a1
  anchor: shu.9.p14
  at: 124
  length: 0
  type: pei
  text: 《襄陽記》曰：董恢字休緒，襄陽人。入蜀，以宣信中郎副費禕使吳。孫權嘗大醉問禕曰：「楊儀、魏延，牧豎小人也。雖嘗有鳴吠之益於時務，然既已任之，勢不得輕，若一朝無諸葛亮，必為禍亂矣。諸君憒憒，曾不知防慮於此，豈所謂貽厥孫謀乎？」禕愕然四顧視，不能即答。恢目禕曰：「可速言儀、延之不協起於私忿耳，而無黥、韓難御之心也。今方掃除強賊，混一區夏，功以才成，業由才廣，若捨此不任，防其後患，是猶備有風波而逆廢舟楫，非長計也。」權大笑樂。諸葛亮聞之，以為知言。還未滿三日，闢為丞相府屬，遷巴郡太守。臣松之案：《漢晉春秋》亦載此語，不云董恢所教，辭亦小異，此二書俱出習氏而不同若此。本傳云「恢年少官微」，若已為丞相府屬，出作巴郡，則官不微矣。以此疑習氏之言為不審的也。
