- id: shu.9.p8.a1
  anchor: shu.9.p8
  at: 169
  length: 0
  type: pei
  text: 《襄陽記》曰：建興三年，亮征南中，謖送之數十里。亮曰：「雖共謀之歷年，今可更惠良規。」謖對曰：「南中恃其險遠，不服久矣，雖今日破之，明日復反耳。今公方傾國北伐以事強賊。彼知官勢內虛，其叛亦速。若殄盡遺類以除後患，既非仁者之情，且又不可倉卒也。夫用兵之道，攻心為上，攻城為下，心戰為上，兵戰為下，原公服其心而已。」亮納其策，赦孟獲以服南方。故終亮之世，南方不敢復反。
