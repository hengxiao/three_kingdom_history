  at: 67
  length: 0
  type: pei
  text: 零陵先賢傳曰：是時中夏人情未一，聞備在蜀，四方延頸。而備銳意欲即真，巴以為如此示天下不廣，且欲緩之。與主簿雍茂諫備，備以他事殺茂，由是遠人不復至矣。
