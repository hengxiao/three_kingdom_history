  type: pei
  text: 零陵先賢傳曰：張飛嘗就巴宿，巴不與語，飛遂忿恚。諸葛亮謂巴曰：「張飛雖實武人，敬慕足下。主公今方收合文武，以定大事；足下雖天素高亮，宜少降意也。」巴曰：「大丈夫處世，當交四海英雄，如何與兵子共語乎？」備聞之，怒曰：「孤欲定天下，而子初專亂之。其欲還北，假道於此，豈欲成孤事邪？」備又曰：「子初才智絕人，如孤，可任用之，非孤者難獨任也。」亮亦曰：「運籌策於帷幄之中，吾不如子初遠矣！若提枹鼓，會軍門，使百姓喜勇，當與人議之耳。」初攻劉璋，備與士眾約：「若事定，府庫百物，孤無預焉。」及拔成都，士眾皆舍干戈，赴諸藏競取寶物。軍用不足，備甚憂之。巴曰：「易耳，但當鑄直百錢，平諸物賈，令吏為官巿。」備從之，數月之間，府庫充實。
