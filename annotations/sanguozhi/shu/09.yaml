  at: 8
  length: 0
  type: pei
  text: 零陵先賢傳曰：巴入交阯，更姓為張。與交阯太守士燮計議不合，乃由牂牁道去。為益州郡所拘留，太守欲殺之。主簿曰：「此非常人，不可殺也。」主簿請自送至州，見益州牧劉璋，璋父焉昔為巴父祥所舉孝廉，見巴驚喜，每大事輒以諮訪。臣松之案：劉焉在漢靈帝時已經宗正太常，出為益州牧，祥始以孫堅作長沙時為江夏太守，不得舉焉為孝廉，明也。
