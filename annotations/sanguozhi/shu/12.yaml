  type: pei
  text: 臣松之曰：按此謂孟嘗君田文下坐客，能作雞鳴以濟其厄者也。凡作雞鳴，必先拊髀，以傚雞之拊翼也。
- id: shu.12.p43.a6
  anchor: shu.12.p43
  at: 732
  length: 0
  type: pei
  text: 《淮南子》曰：楚將子發好求技道之士。楚有善為偷者，往見曰：「聞君求技道之士，臣偷也，原以技備一卒。」子發聞之，衣不及帶，冠不暇正，出見而禮之。左右諫曰：「偷者，天下之盜也，何為禮之？」君曰：「此非左右之所得與。」後無幾何，齊興兵伐楚。子發將師以當之，兵三卻。楚賢大夫皆盡其計而悉其誠，齊師愈強。於是卒偷進請曰：「臣有薄技，原為君行之。」君曰「諾」。偷即夜出，解齊將軍之帳，而獻之子發。子發使人歸之，曰：「卒有出採薪者，得將軍之帳，使使歸於執事。」明日又復往取枕，子發又使歸之。明日又復往取簪，子發又使歸之。齊師聞之大駭，將軍與軍吏謀曰：「今日不去，楚軍恐取吾頭矣！」即旋師而去。
- id: shu.12.p43.a7
  anchor: shu.12.p43
  at: 740
  length: 0
  type: pei
  text: 桓譚《新論》曰：雍門周以琴見，孟嘗君曰：「先生鼓琴，亦能令文悲乎？」對曰：「臣之所能令悲者，先貴而後賤，昔富而今貧，擯壓窮巷，不交四鄰；不若身材高妙，懷質抱真，逢讒罹謗，怨結而不得信；不若交歡而結愛，無怨而生離，遠赴絕國，無相見期；不若幼無父母，壯無妻兒，出以野澤為鄰，入用堀穴為家，困於朝夕，無所假貸：若此人者，但聞飛烏之號，秋風鳴條，則傷心矣，臣一為之援琴而長太息，未有不淒惻而涕泣者也。今若足下，居則廣廈高堂，連闥洞房，下羅帷，來清風；倡優在前，諂諛侍側，揚激楚，舞鄭妾，流聲以娛耳，練色以淫目；水戲則舫龍舟，建羽旗，鼓釣乎不測之淵；野遊則登平原，馳廣囿，強弩下高鳥，勇士格猛獸；置酒娛樂，沈醉忘歸：方此之時，視天地曾不若一指，雖有善鼓琴，未能足下也。」孟嘗君曰：「固然！」雍門周曰：「然臣竊為足下有所常悲。夫角帝而困秦者君也，連五國而伐楚者又君也。天下未嘗無事，不從即衡；從成則楚王，衡成則秦帝。夫以秦、楚之強而報弱薛，猶磨蕭斧而伐朝菌也，有識之士，莫不為足下寒心。天道不常盛，寒暑更進退，千秋萬歲之後，宗廟必不血食；高台既已傾，曲池又已平，墳墓生荊棘，狐狸穴其中，遊兒牧豎躑躅其足而歌其上曰：『孟嘗君之尊貴，亦猶若是乎！』」於是孟嘗君喟然太息，涕淚承睫而未下。雍門周引琴而鼓之，徐動宮徵，叩角羽，終而成曲，孟嘗君遂歔欷而就之曰：「先生鼓琴，令文立若亡國之人也。」
- id: shu.12.p43.a8
  anchor: shu.12.p43
  at: 748
  length: 0
  type: pei
  text: 《呂氏春秋》曰：韓哀作禦。王褒聖主得賢臣頌曰：及至駕齧膝，參乘旦，王良執靶，韓哀附輿，縱馳騁騖，忽如景靡，過都越國，蹶如歷塊，追奔電，逐遺風，周流八極，萬里一息，何其遼哉！人馬相得也。
- id: shu.12.p43.a9
  anchor: shu.12.p43
  at: 764
  length: 0
  type: pei
  text: 《淮南子》曰：盧敖遊乎北海，經乎太陰，入乎玄闕，至於蒙轂之上，見一士焉，深目而玄準，戾頸而鳶肩，豐上而殺下，軒軒然方迎風而舞，顧見盧敖慢然下其臂，遯逃乎碑下。盧敖俯而視之，方卷龜殼而食合梨。盧敖乃與之語曰：「惟敖為背羣離黨，窮觀於六合之外者，非敖而已乎！敖幼而好遊，長不喻解，周行四極，惟北陰之不闚，今卒睹夫子於是，子殆可與敖為交乎！」若士者蠤然而笑曰：「嘻乎！子中州民，寧肯而遠至此？此猶光乎日月而戴列星，陰陽之所行，四時之所生，此其比夫不名之地，猶突奧也。若我南游乎罔{罒良}之野，北息於沈墨之鄉，西窮冥冥之黨，東貫鴻濛之光，此其下無地而上無天，聽焉無聞，視焉則眴，此其外猶有沈沈之汜，其餘一舉而千萬里，吾猶未能之在。今子遊始至於此，乃語窮觀，豈不亦遠哉！然子處矣，吾與汗漫期於九垓之上，吾不可以久。」若士舉臂而竦身，遂入雲中。盧敖仰而視之，弗見乃止，曰：「吾比夫子也，猶黃鵠之與壤蟲，終日行不離咫尺，自以為遠，不亦悲哉！」
