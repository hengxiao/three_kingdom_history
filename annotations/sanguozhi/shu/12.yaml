  text: 《華陽國志》曰：文立字廣休，少治毛詩、三禮，兼通羣書。刺史費禕命為從事，入為尚書郎，復辟禕大將軍東曹掾，稍遷尚書。蜀並於魏，梁州建，首為別駕從事，舉秀才。晉泰始二年，拜濟陰太守，遷太子中庶子。立上言：「故蜀大官及盡忠死事者子孫，雖仕郡國，或有不才，同之齊民為劇；又諸葛亮、蔣琬、費禕等子孫流徙中畿，各宜量才敘用，以慰巴、蜀之心，傾吳人之望。」事皆施行。轉散騎常侍，獻可替否，多所補納。稍遷衛尉，中朝服其賢雅，為時名卿。咸寧末卒。立章奏詩詩賦論頌凡數十篇。
