  text: 孫綽評曰：譙周說後主降魏，可乎？曰：自為天子而乞降請命，何恥之深乎！夫為社稷死則死之，為社稷亡則亡之。先君正魏之篡，不與同天矣。推過於其父，俛首而事讎，可謂苟存，豈大居正之道哉！孫盛曰：春秋之義，國君死社稷，卿大夫死位，況稱天子而可辱於人乎！周謂萬乘之君偷生苟免，亡禮希利，要冀微榮，惑矣。且以事勢言之，理有未盡。何者？禪雖庸主，實無桀、紂之酷，戰雖屢北，未有土崩之亂，縱不能君臣固守，背城借一，自可退次東鄙以思後圖。是時羅憲以重兵據白帝，霍弋以強卒鎮夜郎。蜀土險狹，山水峻隔，絕巘激湍，非步卒所涉。若悉取舟楫，保據江州，徵兵南中，乞師東國，如此則姜、廖五將自然雲從，吳之三師承命電赴，何投寄之無所而慮於必亡邪？魏師之來，褰國大舉，欲追則舟楫靡資，欲留則師老多虞。且屈伸有會，情勢代起，徐因思奮之民，以攻驕惰之卒，此越王所以敗闔閭，田單所以摧騎劫也，何為匆匆遽自囚虜，下堅壁於敵人，致斫石之至恨哉？葛生有云：「事之不濟則已耳，安能復為之下！」壯哉斯言，可以立懦夫之志矣。觀古燕、齊、荊、越之敗，或國覆主滅，或魚縣鳥竄，終能建功立事，康復社稷，豈曰天助，抑亦人謀也。向使懷苟存之計，納譙周之言，何邦基之能構，令名之可獲哉？禪既闇主，周實駑臣，方之申包、田單、范蠡、大夫種，不亦遠乎！
