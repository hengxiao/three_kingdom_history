- id: shu.12.p7.a1
  anchor: shu.12.p7
  at: 182
  length: 0
  type: pei
  text: 《續漢書》曰：建安七年，越巂有男子化為女人，時羣言哀帝時亦有此，將易代之祥也。至二十五年，獻帝果封於山陽。十二年十月，有星孛於鶉尾，荊州分野，羣以為荊州牧將死而失土。明年秋，劉表卒，曹公平荊州。十七年十二月，星孛於五諸侯，羣以為西方專據土地者皆將失土。是時，劉璋據益州，張魯據漢中，韓遂據涼州，宋建據枹罕。明年冬，曹公遣偏將擊涼州。十九年，獲宋建，韓遂逃於羌中，被殺。其年秋，璋失益州。二十年秋，曹公攻漢中，張魯降。
