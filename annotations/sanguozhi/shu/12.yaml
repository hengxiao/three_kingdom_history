  text: 《淮南子》曰：禹為水，以身請於陽盱之河，湯苦旱，以身禱於桑林之際，聖人之憂民，如此其明也。《呂氏春秋》曰：昔殷湯克夏桀而天下大旱，三年不收，湯乃以身禱於桑林曰：「余一人有罪，無及萬方，萬方有罪，在余一人，無以一人之不敏，使上帝毀傷民之大命。」湯於是剪其髮，攦其爪，自以為犧牲，用祈福於上帝。民乃甚悅。雨乃大至。
- id: shu.12.p43.a2
  anchor: shu.12.p43
  at: 700
  length: 0
  type: pei
  text: 《淮南子》曰：秦穆公謂伯樂曰：「子之年長矣，子姓有可使求馬者乎？」對曰：「良馬者，可以形容筋骨相也。相天下之馬者，若滅若沒，若失若亡，其一若此馬者，絕塵卻轍。臣之子皆下才也，可告以良馬而不可告以天下之馬。天下之馬，臣有所與共儋纏採薪九方堙，此其相馬，非臣之下也，請見之。」穆公見之，使之求馬，三月而反，報曰：「已得馬矣，在於沙丘。」穆公曰：「何馬也？」對曰：「牝而黃。」使人往取之，牡而驪。穆公不悅，召伯樂而問之曰：「敗矣，子之所使求馬者也！毛物牝牡尚弗能知，又何馬之能知？」伯樂喟然太息曰：「一至此乎！是乃所以千萬（里）臣而無數者也。若堙之所觀者天機也，得其精而忘其粗，在其內而忘其外，見其所見而不見其所不見，視其所視而遺其所不視，若彼之所相者，乃有貴乎馬者。」馬至，而果天下之馬也。淮南子又曰：伯樂、寒風、秦牙、葛青，所相各異，其知馬一也；蓋九方觀其精，秦牙察其形。
- id: shu.12.p43.a3
  anchor: shu.12.p43
  at: 708
  length: 0
  type: pei
  text: 《越絕書》曰：昔越王句踐有寶劍五枚，聞於天下。客有能相劍者名薛燭，王召而問之：「吾有寶劍五，請以示子。」乃取豪曹、臣闕，薛燭曰：「皆非也。」又取純鉤、湛盧，燭曰：「觀其劍鈔，爛爛如列宿之行，觀其光，渾渾如水之將溢於塘，觀其文，渙渙如冰將釋，此所謂純鉤邪？」王曰：「是也。」王曰：「客有直之者，有市之鄉三，駿馬千匹，千戶之都二，可乎？」薛燭曰：「不可。當造此劍之時，赤堇之山破而出錫，若邪之谿涸而出銅，雨師掃灑，雷公擊鼓，太一下觀，天精下之，歐冶乃因天之精，悉其伎巧，一曰純鉤，二曰湛盧。今赤堇之山已合，若邪之谿深而不測，歐冶子已死，雖傾城量金，珠玉竭河，獨不得此一物。有市之鄉三，駿馬千匹，千戶之都二，亦何足言與！」
