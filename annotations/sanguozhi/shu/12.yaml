  text: 《晉陽秋》載詔曰：「朕甚悼之，賜朝服一具，衣一襲，錢十五萬。」周息熙上言，周臨終屬熙曰：「久抱疾，未曾朝見，若國恩賜朝服衣物者，勿以加身。當還舊墓，道險行難，豫作輕棺。殯斂已畢，上還所賜。」詔還衣服，給棺直。
