- id: shu.12.p17.a2
  anchor: shu.12.p17
  at: 244
  length: 0
  type: pei
  text: 傅暢《裴氏家記》曰：儁字奉先，魏尚書令潛弟也。儁姊夫爲蜀中長史，儁送之，時年十餘歲，遂遭漢末大亂，不復得還。既長知名，爲蜀所推重也。子越，字令緒，爲蜀督軍。蜀破，遷還洛陽，拜議郎。
