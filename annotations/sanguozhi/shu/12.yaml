  text: 益部耆舊傳曰：益州刺史董榮圖畫周像於州學，命從事李通頌之曰：「抑抑譙侯，好古述儒，寶道懷真，鑑世盈虛，雅名美跡，終始是書。我後欽賢，無言不譽，攀諸前哲，丹青是圖。嗟爾來葉，鑑茲顯模。」
- id: shu.12.p38.a1
