- id: shu.12.p20.a1
  anchor: shu.12.p20
  at: 186
  length: 0
  type: pei
  text: 宋仲子後在魏。《魏略》曰：其子與魏諷謀反，伏誅。魏太子答王朗書曰：「昔石厚與州吁遊，父碏知其與亂；韓子暱田蘇，穆子知其好仁：故君子遊必有方，居必就士，誠有以也。嗟乎！宋忠無石子先識之明，老罹此禍。今雖欲原行滅親之誅，立純臣之節，尚可得邪！」
