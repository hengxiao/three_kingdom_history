  text: 張璠以為譙周所陳降魏之策，蓋素料劉禪懦弱，心無害戾，故得行也。如遇忿肆之人，雖無他算，然矜殉鄙恥，或發怒妄誅，以立一時之威，快其斯須之意者，此亦夷滅之禍云。
