- id: shu.12.p19.a2
  anchor: shu.12.p19
  at: 162
  length: 0
  type: pei
  text: 亮集有教曰：「將軍來敏對上官顯言『新人有何功德而奪我榮資與之邪？諸人共憎我，何故如是』？敏年老狂悖，生此怨言。昔成都初定，議者以為來敏亂羣，先帝以新定之際，故遂含容，無所禮用。後劉子初選以為太子家令，先帝不悅而不忍拒也。後主既位，吾闇於知人，遂復擢為將軍祭酒，違議者之審見，背先帝所疏外，自謂能以敦厲薄俗，帥之以義。今既不能，表退職，使閉門思愆。」
