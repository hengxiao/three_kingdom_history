  type: pei
  text: 周長子熙。熙子秀，字元彥。《晉陽秋》曰：秀性清靜，不交於世，知將大亂，豫絕人事，從兄弟及諸親裡不與相見。州郡辟命，及李雄盜蜀，安車徵秀，又雄叔父驤、驤子壽辟命，皆不應。常冠鹿皮，躬耕山藪。永和三年，安西將軍桓溫平蜀，表薦秀曰：「臣聞大樸既虧，則高尚之標顯；道喪時昏，則忠貞之義彰。故有洗耳投淵以振玄邈之風，亦有秉心矯跡以惇在三之節。是以上代之君，莫不崇重斯軌，所以篤俗訓民，靜一流競。伏惟大晉應符禦世，運無常通，時有屯蹇，神州丘墟，三方圮裂，兔罝絕響於中林，白駒無聞於空谷，斯有識之所悼心，大雅之所嘆息者也。陛下聖德嗣興，方恢天緒。臣昔奉役，有事西土，鯨鯢既縣，思宣大化；訪諸故老，搜楊潛逸，庶武羅於羿、浞之墟，想王蠋於亡齊之境。竊聞巴西譙秀，植操貞固，抱德肥遁，揚清渭波。於時皇極遘道消之會，羣黎蹈顛沛之艱，中華有顧瞻之哀，幽谷無遷喬之望；凶命屢招，姦威仍偪，身寄虎吻，危同朝露，而能抗節玉立，誓不降辱，杜門絕跡，不面偽庭，進免龔勝亡身之禍，退無薛方詭之譏；雖園、綺之棲商、洛，管寧之默遼海，方之於秀，殆無以過。於今西土，以為美談。夫旌德禮賢，化道之所先，崇表殊節，聖哲之上務。方今六合未康，豺狼當路，遺黎偷薄，義聲弗聞，益宜振起道義之徒，以敦流遁之弊。若秀蒙薄帛之徵，足以鎮靜頹風，軌訓囂俗；幽遐仰流，九服知化矣。」及蕭敬叛亂，避難宕渠川中，鄉人宗族馮依者以百數。秀年八十，眾人以其薦老，欲代之負擔，秀拒曰：「各有老弱，當先營救。吾氣力自足堪此，不以垂朽之年累諸君也。」後十餘年，卒於家。
