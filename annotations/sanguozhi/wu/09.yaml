  text: 《江表傳》曰：初，權謂蒙及蔣欽曰：「卿今並當塗掌事，宜學問以自開益。」蒙曰：「在軍中常苦多務，恐不容復讀書。」權曰：「孤豈欲卿治經為博士邪？但當令涉獵見往事耳。卿言多務孰若孤，孤少時歷《詩》《書》《禮記》《左傳》《國語》，惟不讀《易》。至統事以來，省三史、諸家兵書，自以為大有所益。如卿二人，意性朗悟，學必得之，寧當不為乎？宜急讀《孫子》《六韜》《左傳》《國語》及三史。孔子言『終日不食，終夜不寢以思，無益，不如學也』。光武當兵馬之務，手不釋卷。孟德亦自謂老而好學。卿何獨不自勉勗邪？」蒙始就學，篤志不倦，其所覽見，舊儒不勝。後魯肅上代周瑜，過蒙言議，常欲受屈。肅拊蒙背曰：「吾謂大弟但有武略耳，至於今者，學識英博，非復吳下阿蒙。」蒙曰：「士別三日，即更刮目相待。大兄今論，何一稱穰侯乎。兄今代公瑾，既難為繼，且與關羽為鄰。斯人長而好學，讀左傳略皆上口，梗亮有雄氣，然性頗自負，好陵人。今與為對，當有單複以卿待之。」。密為肅陳三策，肅敬受之，秘而不宣。權常歎曰：「人長而進益，如呂蒙、蔣欽，蓋不可及也。富貴榮顯，更能折節好學，耽悅書傳，輕財尚義，所行可跡，並作國士，不亦休乎！」
- id: wu.9.p29.a1
  anchor: wu.9.p29
  at: 94
  length: 0
  type: pei
  text: 《吳錄》曰：權欲作塢，諸將皆曰：「上岸擊賊，洗足入船，何用塢為？」呂蒙曰：「兵有利鈍，戰無百勝，如有邂逅，敵步騎蹙人，不暇及水，其得入船乎？」權曰：「善。」遂作之。
- id: wu.9.p30.a1
  anchor: wu.9.p30
  at: 93
  length: 0
  type: pei
  text: 《吳書》曰：諸將皆勸作土山，添攻具，蒙趨進曰：「治攻具及土山，必曆日乃成，城備既脩，外救必至，不可圖也。且乘雨水以入，若留經日，水必向盡，還道艱難，蒙竊危之。今觀此城，不能甚固，以三軍銳氣，四面並攻，不移時可拔，及水以歸，全勝之道也。」權從之。
- id: wu.9.p36.a1
  anchor: wu.9.p36
  at: 237
  length: 0
  type: pei
  text: 《吳書》曰：將軍士仁在公安拒守，蒙令虞翻說之。翻至城門，謂守者曰：「吾欲與汝將軍語。」仁不肯相見。乃為書曰：「明者防禍於未萌，智者圖患於將來，知得知失，可與為人，知存知亡，足別吉凶。大軍之行，斥候不及施，烽火不及舉，此非天命，必有內應。將軍不先見時，時至又不應之，獨守縈帶之城而不降，死戰則毀宗滅祀，為天下譏笑。呂虎威欲徑到南郡，斷絕陸道，生路一塞，案其地形，將軍為在箕舌上耳，奔走不得免，降則失義，竊為將軍不安，幸熟思焉。」仁得書，流涕而降。翻謂蒙曰：「此譎兵也，當將仁行，留兵備城。」遂將仁至南郡。南郡太守麋芳城守，蒙以仁示之，遂降。《吳錄》曰：初，南郡城中失火，頗焚燒軍器。羽以責芳，芳內畏懼，權聞而誘之，芳潛相和。及蒙攻之，乃以牛酒出降。
- id: wu.9.p37.a1
  anchor: wu.9.p37
  at: 13
  length: 0
  type: pei
  text: 《江表傳》曰：權於公安大會，呂蒙以疾辭，權笑曰：「禽羽之功，子明謀也，今大功已捷，慶賞未行，豈邑邑邪？」乃增給步騎鼓吹，敕選虎威將軍官屬，並南郡、廬江二郡威儀。拜畢還營，兵馬導從，前後鼓吹，光燿於路。
