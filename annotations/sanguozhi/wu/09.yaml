  type: pei
  text: 臣松之案：劉備與權並力，共拒中國，皆肅之本謀。又語諸葛亮曰「我子瑜友也」，則亮已亟聞肅言矣。而〈蜀書亮傳〉曰：「亮以連橫之略說權，權乃大喜。」如似此計始出於亮。若二國史官，各記所聞，競欲稱揚本國容美，各取其功。今此二書，同出一人，而舛互若此，非載述之體也。
- id: wu.9.p22.a1
  anchor: wu.9.p22
  at: 212
  length: 0
  type: pei
  text: 《魏書》及《九州春秋》曰：曹公徵荊州，孫權大懼，魯肅實欲勸權拒曹公，乃激說權曰：「彼曹公者，實嚴敵也，新並袁紹，兵馬甚精，乘戰勝之威，伐喪亂之國，克可必也。不如遣兵助之，且送將軍家詣鄴；不然，將危。」權大怒，欲斬肅，肅因曰：「今事已急，即有他圖，何不遣兵助劉備，而欲斬我乎？」權然之，乃遣周瑜助備。孫盛曰：吳書及江表傳，魯肅一見孫權便說拒曹公而論帝王之略，劉表之死也，又請使觀變，無緣方復激說勸迎曹公也。又是時勸迎者眾，而云獨欲斬肅，非其論也。
- id: wu.9.p23.a1
  anchor: wu.9.p23
  at: 25
  length: 0
  type: pei
  text: 《漢晉春秋》曰：呂範勸留備，肅曰：「不可。將軍雖神武命世，然曹公威力實重，初臨荊州，恩信未洽，宜以藉備，使撫安之。多操之敵，而自為樹黨，計之上也。」權即從之。
- id: wu.9.p23.a2
  anchor: wu.9.p23
  at: 144
  length: 0
  type: pei
  text: 《江表傳》載：初瑜疾困，與權箋曰：「瑜以凡才，昔受討逆殊特之遇，委以腹心，遂荷榮任，統御兵馬，志執鞭弭，自效戎行。規定巴蜀，次取襄陽，憑賴威靈，謂若在握。至以不謹，道遇暴疾，昨自醫療，日加無損。人生有死，修短命矣，誠不足惜，但恨微志未展，不復奉教命耳。方今曹公在北，疆埸未靜，劉備寄寓，有似養虎，天下之事，未知終始，此朝士旰食之秋，至尊垂慮之日也。魯肅忠烈，臨事不苟，可以代瑜。人之將死，其言也善，儻或可採，瑜死不朽矣。」案此箋與本傳所載，意旨雖同，其辭乖異耳。
- id: wu.9.p24.a1
  anchor: wu.9.p24
  at: 344
  length: 0
  type: pei
  text: 《吳書》曰：肅欲與羽會語，諸將疑恐有變，議不可往。肅曰：「今日之事，宜相開譬。劉備負國，是非未決，羽亦何敢重欲幹命！」乃趨就羽。羽曰：「烏林之役，左將軍身在行間，寢不脫介，戮力破魏，豈得徒勞，無一塊壤，而足下來欲收地邪？」肅曰：「不然。始與豫州觀於長阪，豫州之眾不當一校，計窮慮極，志勢摧弱，圖欲遠竄，望不及此。主上矜愍豫州之身，無有處所，不愛土地士人之力，使有所庇廕以濟其患，而豫州私獨飾情，愆德隳好。今已藉手於西州矣，又欲翦並荊州之土，斯蓋凡夫所不忍行，而況整領人物之主乎！肅聞貪而棄義，必為禍階。吾子屬當重任，曾不能明道處分，以義輔時，而負恃弱眾以圖力爭，師曲為老，將何獲濟？」羽無以答。
