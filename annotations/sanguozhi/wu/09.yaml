- id: wu.9.p36.a1
  anchor: wu.9.p36
  at: 237
  length: 0
  type: pei
  text: 《吳書》曰：將軍士仁在公安拒守，蒙令虞翻說之。翻至城門，謂守者曰：「吾欲與汝將軍語。」仁不肯相見。乃為書曰：「明者防禍於未萌，智者圖患於將來，知得知失，可與為人，知存知亡，足別吉凶。大軍之行，斥候不及施，烽火不及舉，此非天命，必有內應。將軍不先見時，時至又不應之，獨守縈帶之城而不降，死戰則毀宗滅祀，為天下譏笑。呂虎威欲徑到南郡，斷絕陸道，生路一塞，案其地形，將軍為在箕舌上耳，奔走不得免，降則失義，竊為將軍不安，幸熟思焉。」仁得書，流涕而降。翻謂蒙曰：「此譎兵也，當將仁行，留兵備城。」遂將仁至南郡。南郡太守麋芳城守，蒙以仁示之，遂降。《吳錄》曰：初，南郡城中失火，頗焚燒軍器。羽以責芳，芳內畏懼，權聞而誘之，芳潛相和。及蒙攻之，乃以牛酒出降。
