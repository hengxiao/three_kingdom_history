  text: 《江表傳》曰：策又給瑜鼓吹，為治館舍，贈賜莫與為比。策令曰：「周公瑾英俊異才，與孤有總角之好，骨肉之分。如前在丹楊，發眾及船糧以濟大事，論德酬功，此未足以報者也。」
