  type: pei
  text: 《魏書》及《九州春秋》曰：曹公徵荊州，孫權大懼，魯肅實欲勸權拒曹公，乃激說權曰：「彼曹公者，實嚴敵也，新並袁紹，兵馬甚精，乘戰勝之威，伐喪亂之國，克可必也。不如遣兵助之，且送將軍家詣鄴；不然，將危。」權大怒，欲斬肅，肅因曰：「今事已急，即有他圖，何不遣兵助劉備，而欲斬我乎？」權然之，乃遣周瑜助備。孫盛曰：吳書及江表傳，魯肅一見孫權便說拒曹公而論帝王之略，劉表之死也，又請使觀變，無緣方復激說勸迎曹公也。又是時勸迎者眾，而云獨欲斬肅，非其論也。
