  text: 《江表傳》曰：權於公安大會，呂蒙以疾辭，權笑曰：「禽羽之功，子明謀也，今大功已捷，慶賞未行，豈邑邑邪？」乃增給步騎鼓吹，敕選虎威將軍官屬，並南郡、廬江二郡威儀。拜畢還營，兵馬導從，前後鼓吹，光燿於路。
