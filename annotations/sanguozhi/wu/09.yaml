  type: pei
  text: 臣松之案：劉備與權並力，共拒中國，皆肅之本謀。又語諸葛亮曰「我子瑜友也」，則亮已亟聞肅言矣。而〈蜀書亮傳〉曰：「亮以連橫之略說權，權乃大喜。」如似此計始出於亮。若二國史官，各記所聞，競欲稱揚本國容美，各取其功。今此二書，同出一人，而舛互若此，非載述之體也。
