  type: pei
  text: 謝承《後漢書》曰：景字仲鄉，少以廉能見稱，以明學察孝廉，辟公府。後為豫州刺史，辟汝南陳蕃為別駕，潁川李膺、荀緄、杜密、沛國硃寓為從事，皆天下英俊之士也。稍遷至尚書令，遂登太尉。張璠《漢紀》曰：景父榮，章、和世為尚書令。初景歷位牧守，好善愛士，每歲舉孝廉，延請入，上後堂，與家人宴會，如此者數四。及贈送既備，又選用其子弟，常稱曰：「移臣作子，於政何有？」先是，司徒韓縯為河內太守，在公無私，所舉一辭而已，後亦不及其門戶，曰：「我舉若可矣，不令恩偏稱一家也。」當時論者，或兩譏焉。
