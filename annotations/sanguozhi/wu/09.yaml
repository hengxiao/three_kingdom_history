  text: 《吳書》曰：諸將皆勸作土山，添攻具，蒙趨進曰：「治攻具及土山，必曆日乃成，城備既脩，外救必至，不可圖也。且乘雨水以入，若留經日，水必向盡，還道艱難，蒙竊危之。今觀此城，不能甚固，以三軍銳氣，四面並攻，不移時可拔，及水以歸，全勝之道也。」權從之。
