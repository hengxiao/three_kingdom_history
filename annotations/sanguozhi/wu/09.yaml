- id: wu.9.p11.a1
  anchor: wu.9.p11
  at: 64
  length: 0
  type: pei
  text: 《江表傳》曰：普頗以年長，數陵侮瑜。瑜折節容下，終不與校。普後自敬服而親重之，乃告人曰：「與周公瑾交，若飲醇醪，不覺自醉。」時人以其謙讓服人如此。初曹公聞瑜年少有美才，謂可遊說動也，乃密下揚州，遣九江蔣幹往見瑜。幹有儀容，以才辯見稱，獨步江、淮之間，莫與為對。乃布衣葛巾，自託私行詣瑜。瑜出迎之，立謂幹曰：「子翼良苦，遠涉江湖為曹氏作說客邪？」幹曰：「吾與足下州里，中間別隔，遙聞芳烈，故來敘闊，並觀雅規，而云說客，無乃逆詐乎？」瑜曰：「吾雖不及夔、曠，聞弦賞音，足知雅曲也。」因延幹入，為設酒食。畢，遣之曰：「適吾有密事，且出就館，事了，別自相請。」後三日，瑜請幹與周觀營中，行視倉庫軍資器仗訖，還宴飲，示之侍者服飾珍玩之物，因謂幹曰：「丈夫處世，遇知己之主，外託君臣之義，內結骨肉之恩，言行計從，禍福共之，假使蘇張更生，酈叟復出，猶撫其背而折其辭，豈足下幼生所能移乎？」幹但笑，終無所言。幹還，稱瑜雅量高致，非言辭所間。中州之士，亦以此多之。劉備之自京還也，權乘飛雲大船，與張昭、秦松、魯肅等十餘人共追送之，大宴會敘別。昭、肅等先出，權獨與備留語，因言次，嘆瑜曰：「公瑾文武籌略，萬人之英，顧其器量廣大，恐不久為人臣耳。」瑜之破魏軍也，曹公曰：「孤不羞走。」後書與權曰：「赤壁之役，值有疾病，孤燒船自退，橫使周瑜虛獲此名。」瑜威聲遠著，故曹公、劉備咸欲疑譖之。及卒，權流涕曰：「公瑾有王佐之資，今忽短命，孤何賴哉！」後權稱尊號，謂公卿曰：「孤非周公瑾，不帝矣。」
