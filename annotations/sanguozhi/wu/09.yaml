- id: wu.9.p17.a1
  anchor: wu.9.p17
  at: 188
  length: 0
  type: pei
  text: 《吳書》曰：肅體貌魁奇，少有壯節，好為奇計。天下將亂，乃學擊劍騎射，招聚少年，給其衣食，往來南山中射獵，陰相部勒，講武習兵。父老咸曰：「魯氏世衰，乃生此狂兒！」後雄傑並起，中州擾亂，肅乃命其屬曰：「中國失綱，寇賊橫暴，淮、泗間非遺種之地，吾聞江東沃野萬里，民富兵強，可以避害，寧肯相隨俱至樂土，以觀時變乎？」其屬皆從命。乃使細弱在前，強壯在後，男女三百餘人行。州追騎至，肅等徐行，勒兵持滿，謂之曰：「卿等丈夫，當解大數。今日天下兵亂，有功弗賞，不追無罰，何為相偪乎？」又自植盾，引弓射之，矢皆洞貫。騎既嘉肅言，且度不能制，乃相率還。肅渡江往見策，策亦雅奇之。
