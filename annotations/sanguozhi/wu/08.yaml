  text: 吳錄曰：崇字子和，治《易》《春秋左氏傳》，兼善內術。本姓李，遭亂更姓，遂隱於會稽，躬耕以求其志。好尚者從學，所教不過數人輒止，欲令其業必有成也。所交結如丞相步騭等，咸親焉。嚴畯薦崇行足以厲俗，學足以為師。初見太子登，以疾賜不拜。東宮官僚皆從諮詢。太子數訪以異聞。年七十而卒。
