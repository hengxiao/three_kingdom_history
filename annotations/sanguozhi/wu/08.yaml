  type: pei
  text: 吳書曰：纮至，與在朝公卿及知舊述策材略絕異，平定三郡，風行草偃，加以忠敬款誠，乃心王室。時曹公為司空，欲加恩厚，以悅遠人，至乃優文褒崇，改號加封，辟纮為掾，舉高第，補侍御吏，後以纮為九江太守。纮心戀舊恩，思還反命，以疾固辭。
