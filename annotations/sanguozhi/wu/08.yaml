  type: pei
  text: 干寶《晉紀》曰：武帝從容問瑩曰：「孫皓之所以亡者何也？」瑩對曰：「歸命侯臣皓之君吳也，暱近小人，刑罰妄加，大臣大將，無所親信，人人憂恐，各不自保，危亡之釁，實由於此。」帝遂問吳士存亡者之賢愚，瑩各以狀對。
- id: wu.8.p27.a2
