  length: 0
  type: pei
  text: 《江表傳》曰：纮謂權曰：「秣陵，楚武王所置，名為金陵。地勢岡阜連石頭，訪問故老，雲昔秦始皇東巡會稽經此縣，望氣者云金陵地形有王者都邑之氣，故掘斷連岡，改名秣陵。今處所具存，地有其氣，天之所命，宜為都邑。」權善其議，未能從也。後劉備之東，宿於秣陵，周觀地形，亦勸權都之。權曰：「智者意同。」遂都焉。獻帝春秋云：劉備至京，謂孫權曰：「吳去此數百里，即有警急，赴救為難，將軍無意屯京乎？」權曰：「秣陵有小江百餘里，可以安大船，吾方理水軍，當移據之。」備曰：「蕪湖近濡須，亦佳也。」權曰：「吾欲圖徐州，宜近下也。」臣松之以為秣陵之與蕪湖，道里所校無幾，於北侵利便，亦有何異？而云欲闚徐州，貪秣陵近下，非其理也。諸書皆云劉備勸都秣陵，而此獨雲權自欲都之，又為虛錯。
- id: wu.8.p4.a2
  anchor: wu.8.p4
  at: 157
  length: 0
  type: pei
  text: 《周禮太宰職》曰：以八柄詔王馭群臣。一曰爵，以馭其貴。二曰祿，以馭其富。三曰予，以馭其幸。四曰置，以馭其行。五曰生，以馭其福。六曰奪，以馭其貧。七曰廢，以馭其罪。八曰誅，以馭其過。
- id: wu.8.p5.a1
  anchor: wu.8.p5
  at: 10
  length: 0
  type: pei
  text: 《吳書》曰：纮見柟榴枕，愛其文，為作賦。陳琳在北見之，以示人曰：「此吾鄉里張子綱所作也。」後纮見陳琳作武庫賦、應機論，與琳書深嘆美之。琳答曰：「自僕在河北，與天下隔，此間率少於文章，易為雄伯，故使僕受此過差之譚，非其實也。今景興在此，足下與子佈在彼，所謂小巫見大巫，神氣盡矣。」纮既好文學，又善楷篆，與孔融書，自書。融遺纮書曰：「前勞手筆，多篆書。每舉篇見字，欣然獨笑，如復睹其人也。」
