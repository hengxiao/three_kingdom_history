  text: 王隱《晉書》曰：瑩子兼，字令長，清素有器宇，資望故如上國，不似吳人。歷位二宮丞相長史。元帝踐阼，累遷丹楊尹、尚書，又為太子少傅。自綜至兼，三世傅東宮。
