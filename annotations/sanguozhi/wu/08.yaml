  type: pei
  text: 吳錄曰：虜翻稱澤曰：「闞生矯傑，蓋蜀之揚雄。」又曰：「闞子儒術德行，亦今之仲舒也。」初，魏文帝即位，權嘗從容問群臣曰：「曹丕以盛年即位，恐孤不能及之，諸卿以為如何？」群臣未對，澤曰：「不及十年，丕其沒矣，大王勿憂也。」權曰：「何以知之？」澤曰：「以字言之，不十為丕，此其數也。」文帝果七年而崩。臣松之計孫權年大文帝五歲，其為長幼也微矣。
