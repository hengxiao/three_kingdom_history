  text: 《漢晉春秋》曰：孫休時，珝為五宮中郎將，遣至蜀求馬。及還，休問蜀政得失，對曰：「主闇而不知其過，臣下容身以求免罪，入其朝不聞正言，經其野民皆菜色。臣聞燕雀處堂，子母相樂，自以為安也，突決棟焚，而燕雀怡然不知禍之將及，其是之謂乎！」
