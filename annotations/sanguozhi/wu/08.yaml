  type: pei
  text: 《江表傳》曰：費禕聘於吳，陛見，公卿待臣皆在坐。酒酣，禕與諸葛恪相對嘲難，言及吳、蜀。禕問曰：「蜀字云何？」恪曰：「有水者濁，無水者蜀。橫目苟身，蟲入其腹。」禕復問：「吳字云何？」恪曰：「無口者天，有口者吴，下臨滄海，天子帝都。」與本傳不同。
