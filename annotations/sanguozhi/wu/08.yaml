  type: pei
  text: 環氏《吳紀》曰：皓嘗問：「詩云『汎彼栢舟』，惟栢中舟乎？」尚對曰：「詩言『檜楫松舟』，則松亦中舟也。」又問：「鳥之大者惟鶴，小者惟雀乎？」尚對曰：「大者有禿鶖，小者有鷦鷯。」皓性忌勝己，而尚談論每出其表，積以致恨。後問：「孤飲酒以方誰？」尚對曰：「陛下有百觚之量。」皓云：「尚知孔丘之不王，而以孤方之！」因此發怒收尚。尚書岑昬率公卿已下百餘人，詣宮叩頭請，尚罪得減死。
