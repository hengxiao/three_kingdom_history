- id: wu.8.p3.a2
  anchor: wu.8.p3
  at: 115
  length: 0
  type: pei
  text: 《吳書》曰：權初承統，春秋方富，太夫人以方外多難，深懷憂勞，數有優令辭謝，付屬以輔助之義。纮輒拜箋答謝，思惟補察。每有異事密計及章表書記，與四方交結，常令纮與張昭草創撰作。纮以破虜有破走董卓，扶持漢室之勳；討逆平定江外，建立大業，宜有紀頌以昭公義。既成，呈權，權省讀悲感，曰：「君真識孤家門閥閱也。」乃遣纮之部。或以纮本受北任，嫌其志趣不止於此，權不以介意。初，琅邪趙昱為廣陵太守，察纮孝廉，昱後為笮融所殺，纮甚傷憤，而力不能討。昱門戶絕滅，及纮在東部，遣主簿至琅邪設祭，並求親戚為之後，以書屬琅邪相臧宣，宣以趙宗中五歲男奉昱祀，權聞而嘉之。及討江夏，以東部少事，命纮居守，遙領所職。孔融遺纮書曰：「聞大軍西征，足下留鎮。不有居者，誰守社稷？深固折衝，亦大勳也。無乃李廣之氣，倉發益怒，樂一當單于，以盡餘憤乎？南北並定，世將無事，孫叔投戈，絳、灌俎豆，亦在今日，但用離析，無緣會面，為愁嘆耳。道直途清，相見豈复難哉？」權以纮有鎮守之勞，欲論功加賞。纮厚自挹損，不敢蒙寵，權不奪其志。每從容侍燕，微言密指，常有以規諷。《江表傳》曰：初，權於群臣多呼其字，惟呼張昭曰張公，纮曰東部，所以重二人也。
- id: wu.8.p3.a3
  anchor: wu.8.p3
  at: 128
  length: 0
  type: pei
  text: 吳書曰：合肥城久不拔，纮進計曰：「古之圍城，開其一面，以疑眾心。今圍之甚密，攻之又急，誠懼並命戮力。死戰之寇，固難卒拔，及救未至，可小寬之，以觀其變。」議者不同。會救騎至，數至圍下，馳騁挑戰。
