  type: pei
  text: 吳書曰：纮與張昭並與參謀，常令一人居守，一人從征討，後呂布襲取徐州，因為之牧，不欲令纮與策從事。追舉茂才，移書發遣纮。纮心惡布，恥為之屈。策亦重惜纮，欲以自輔。答記不遣，曰：「海產明珠，所在為寶，楚雖有才，晉實用之。英偉君子，所遊見珍，何必本州哉？」
