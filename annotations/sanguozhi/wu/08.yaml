  text: 吳錄曰：其先齊孟嘗君封於薛。秦滅六國，而失其祀，子孫分散。漢祖定天下，過齊，求孟嘗後，得其孫陵、國二人，欲復其封。陵、國兄弟相推，莫適受，乃去之竹邑，因家焉，故遂氏薛。自國至綜，世典州郡，為著姓。綜少明經，善屬文，有秀才。
