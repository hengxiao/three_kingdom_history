  type: pei
  text: 《吳書》曰：才字君業，為人精敏，善騎射，權愛異之，常侍從遊戲。少以父任為武衛校尉，領兵隨從征伐，屢有功捷。本郡議者以才少處榮貴，未留意於鄉黨，才乃嘆曰：「我初為將，謂跨馬蹈敵，當身履鋒，足以揚名，不知鄉黨復追跡其舉措乎！」於是更折節為恭，留意於賓客，輕財尚義，施不望報，又學兵法，名聲始聞於遠近。會疾卒。
