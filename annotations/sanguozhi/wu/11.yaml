  text: 《襄陽記》曰：柤音如租稅之租。柤中在上黃界，去襄陽一百五十里。魏時夷王梅敷兄弟三人，部曲萬餘家屯此，分布在中廬宜城西山鄢、沔二谷中，土地平敞，宜桑麻，有水陸良田，沔南之膏腴沃壤，謂之柤中。
