  type: pei
  text: 《江表傳》載治說賁曰：「破虜將軍昔率義兵入討董卓，聲冠中夏，義士壯之。討逆繼世，廓定六郡，特以君侯骨肉至親，器為時生，故表漢朝，剖符大郡，兼建將校，仍關綜兩府，榮冠宗室，為遠近所瞻。加討虜聰明神武，繼承洪業，攬結英雄，周濟世務，軍眾日盛，事業日隆，雖昔蕭王之在河北，無以加也，必克成王基，應運東南。故劉玄德遠布腹心，求見拯救，此天下所共知也。前在東聞道路之言，雲將軍有異趣，良用憮然。今曹公阻兵，傾覆漢室，幼帝流離，百姓元元未知所歸。而中國蕭條，或百里無煙，城邑空虛，道殣相望，士嘆於外，婦怨乎室，加之以師旅，因之以饑饉，以此料之，豈能越長江與我爭利哉？將軍當斯時也，而欲背骨肉之親，違萬安之計，割同氣之膚，啖虎狼之口，為一女子，改慮易圖，失機毫釐，差以千里，豈不惜哉！」
