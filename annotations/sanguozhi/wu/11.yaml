  text: 《九州春秋》曰：初平三年，揚州刺史陳禕死，袁術使瑀領揚州牧。後術為曹公所敗於封丘，南人叛瑀，瑀拒之。術走陰陵，好辭以下瑀，瑀不知權，而又怯，不即攻術。術於淮北集兵向壽春。瑀懼，使其弟公琰請和於術。術執之而進，瑀走歸下邳。
