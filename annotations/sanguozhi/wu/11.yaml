  text: 《文士傳》曰：張惇子純與張儼及異俱童少，往見驃騎將軍朱據。據聞三人才名，欲試之，告曰：「老鄙相聞，饑渴甚矣。夫騕褭以迅驟為功，鷹隼以輕疾為妙，其為吾各賦一物，然後乃坐。」儼乃賦犬曰：「守則有威，出則有獲，韓盧、宋鵲，書名竹帛。」純賦席曰：「席以冬設，簟為夏施，揖讓而坐，君子攸宜。」異賦弩曰：「南嶽之幹，鍾山之銅，應機命中，獲隼高墉。」三人各隨其目所見而賦之，皆成而後坐，據大歡悅。
