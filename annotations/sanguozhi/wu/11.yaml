  length: 0
  type: pei
  text: 《江表傳》曰：策從容獨與範釭，範曰：「今將軍事業日大，士眾日盛，範在遠，聞綱紀猶有不整者，範原蹔領都督，佐將軍部分之。」策曰：「子衡，卿既士大夫，加手下已有大眾，立功於外，豈宜復屈小職，知軍中細碎事乎！」範曰：「不然。今舍本土而託將軍者，非為妻子也，欲濟世務。猶同舟涉海，一事不牢，即俱受其敗。此亦範計，非但將軍也。」策笑，無以答。範出，更釋褠，著袴褶，執鞭，詣閤下啟事，自稱領都督，策乃授傳，委以眾事。由是軍中肅睦，威禁大行。
