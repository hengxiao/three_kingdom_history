  text: 《江表傳》曰：初，權移都建業，大會將相文武，時謂嚴畯曰：「孤昔嘆魯子敬比鄧禹，呂子衡方吳漢，間卿諸人未平此論，今定云何？」畯退席曰：「臣未解指趣，謂肅、範受饒，褒嘆過實。」權曰：「昔鄧仲華初見光武，光武時受更始使，撫河北，行大司馬事耳，未有帝王志也。禹勸之以復漢業，是禹開初議之端矣。子敬英爽有殊略，孤始與一語，便及大計，與禹相似，故比之。呂子衡忠篤亮直，性雖好奢，然以憂公為先，不足為損，避袁術自歸於兄，兄作大將，別領部曲，故憂兄事，乞為都督，辦護脩整，加之恪勤，與吳漢相類，故方之。皆有指趣，非孤私之也。」畯乃服。
