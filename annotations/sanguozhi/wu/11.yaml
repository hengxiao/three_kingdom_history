  length: 0
  type: pei
  text: 孫氏異同評曰：〔魏書〕及《江表傳》云，然以景初元年、正始二年再出為寇，所破胡質、蒲忠在景初元年。魏志承魏書，依違不說質等為然所破，而直云然退耳。吳志說赤烏五年，於魏為正始三年，魏將蒲忠與朱然戰，忠不利，質等皆退。按魏少帝紀及孫權傳，是歲並無事，當是陳壽誤以吳嘉禾六年為赤烏五年耳。
