  type: pei
  text: 吳書曰：初，張彌、許晏等俱到襄平，官屬從者四百許人。淵欲圖彌、晏，先分其人眾，置遼東諸縣，以中使秦旦、張群、杜德、黃疆等及吏兵六十人，置玄菟郡。玄菟郡在遼東北，相去二百里，太守王贊領戸二百，兼重可三四百人。旦等皆舍於民家，仰其飲食。積四十許日，旦與疆等議曰：「吾人遠辱國命，自棄於此，與死亡何異？今觀此郡，形勢甚弱。若一旦同心，焚燒城郭，殺其長吏，爲國報恥，然後伏死，足以無恨。孰與偷生苟活長爲囚虜乎？」疆等然之。於是陰相約結，當用八月十九日夜發。其日中時，爲部中張松所告，贊便會士眾閉城門。旦、群、德、疆等皆逾城得走。時群病疽創著膝，不及輩旅，德常扶接與俱，崎嶇山谷。行六七百里，創益困，不復能前，臥草中，相守悲泣。群曰：「吾不幸創甚，死亡無日，卿諸人宜速進道，冀有所達。空相守，俱死於窮谷之中，何益也？」德曰：「萬里流離，死生共之，不忍相委。」於是推旦、疆使前，德獨留守群，捕菜果食之。旦、疆別數日，得達句驪（王宮），因宣詔於句驪王宮及其主簿，詔言有賜爲遼東所攻奪。宮等大喜，即受詔，命使人隨旦還迎群、德。其年，宮遣皁衣二十五人送旦等還，奉表稱臣，貢貂皮千枚，鶡雞皮十具。旦等見權，悲喜不能自勝。權義之，皆拜校尉。間一年，遣使者謝宏、中書陳恂拜宮爲單於，加賜衣物珍寶。恂等到安平口，先遣校尉陳奉前見宮，而宮受魏幽州刺史諷旨，令以吳使自效。奉聞之，倒還。宮遣主簿笮咨、帶固等出安平，與宏相見。宏即縛得三十餘人質之，宮於是謝罪，上馬數百匹。宏乃遣咨、固奉詔書賜物與宮。是時宏船小，載馬八十匹而還。
