  at: 310
  length: 0
  type: pei
  text: 《江表傳》曰：初策表用李術爲廬江太守，策亡之後，術不肯事權，而多納其亡叛。權移書求索，術報曰：「有德見歸，無德見叛，不應復還。」權大怒，乃以狀白曹公曰：「嚴刺史昔爲公所用，又是州舉將，而李術兇惡，輕犯漢制，殘害州司，肆其無道，宜速誅滅，以懲醜類。今欲討之，進爲國朝掃除鯨鯢，退爲舉將報塞怨仇，此天下達義，夙夜所甘心。術必懼誅，復詭説求救。明公所居，阿衡之任，海內所瞻，原敕執事，勿復聽受。」是歳舉兵攻術於皖城。術閉門自守，求救於曹公。曹公不救。糧食乏盡，婦女或丸泥而吞之。遂屠其城，梟術首，徙其部曲三萬餘人。
