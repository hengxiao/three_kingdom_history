  type: pei
  text: 吳錄曰：邵字長緒，北海人，長八尺。爲孔融功曹，融稱曰「廊廟才也」。從劉繇於江東。及權統事，數陳便宜，以爲應納貢聘，權即從之。拜廬江太守，遷車騎長史。黃武初爲丞相，威遠將軍，封陽羨侯。張温、暨艷奏其事，邵辭位請罪，權釋令復職，年六十三卒。志林曰：吳之創基，邵爲首相，史無其傳，竊常怪之。嘗問劉聲叔。聲叔，博物君子也，云：「推其名位，自應立傳。項竣、（吳孚）〔丁孚〕時已有注記，此云與張惠恕不能。後韋氏作史，蓋惠恕之黨，故不見書。」
