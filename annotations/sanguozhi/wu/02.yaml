  text: 《傅子》曰：孫策爲人明果獨斷，勇蓋天下，以父堅戰死，少而合其兵將以報讎，轉鬬千里，盡有江南之地，誅其名豪，威行鄰國。及權繼其業，有張子布以爲腹心，有陸議、諸葛瑾、步騭以爲股肱，有呂範、朱然以爲爪牙，分任授職，乘間伺隙，兵不妄動，故戰少敗而江南安。
