  text: 《江表傳》曰：權推五德之運，以爲土行用未祖辰臘。志林曰：土行以辰臘，得其數矣。土盛於戌，而以未祖，其義非也。土生於未，故未爲坤初。是以月令：建未之月，祀黃精於郊，祖用其盛。今祖用其始，豈應運乎？
