  text: 吳錄曰；是冬魏文帝至廣陵，臨江觀兵，兵有十餘萬，旌旗彌數百里，有渡江之志。權嚴設固守。時大寒冰，舟不得入江。帝見波濤洶涌，嘆曰：「嗟乎！固天所以隔南北也！」遂歸。孫韶又遣將髙壽等率敢死之士五百人於徑路夜要之，帝大驚，壽等獲副車羽蓋以還。
