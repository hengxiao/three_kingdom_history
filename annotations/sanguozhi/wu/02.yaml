  text: 《江表傳》曰：堅爲下邳丞時，權生，方頤大口，目有精光，堅異之，以爲有貴象。及堅亡，策起事江東，權常隨從。性度弘朗，仁而多斷，好俠養士，始有知名，侔於父兄矣。每參同計謀，策甚奇之，自以爲不及也。每請會賓客，常顧權曰：「此諸君，汝之將也。」
