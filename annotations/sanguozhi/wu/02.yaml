- id: wu.2.p13.a2
  anchor: wu.2.p13
  at: 400
  length: 0
  type: pei
  text: 《獻帝春秋》曰：張遼問吳降人：「向有紫髥將軍，長上短下，便馬善射，是誰？」降人答曰：「是孫會稽。」遼及樂進相遇，言不早知之，急追自得，舉軍嘆恨。《江表傳》曰：權乘駿馬上津橋，橋南已見徹，丈餘無版。谷利在馬後，使權持鞍緩控，利於後著鞭，以助馬勢，遂得超度。權旣得免，即拜利都亭侯。谷利者，本左右給使也，以謹直爲親近監，性忠果亮烈，言不苟且，權愛信之。
