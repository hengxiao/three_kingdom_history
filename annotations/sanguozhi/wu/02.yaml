  length: 0
  type: pei
  text: 《魏略》曰：浩周字孔異，上黨人。建安中仕爲蕭令，至徐州刺史。後領護於禁軍，軍沒，爲關羽所得。權襲羽，幷得周，甚禮之。及文帝即王位，權乃遣周，爲箋魏王曰：「昔討關羽，獲於將軍，即白先王，當發遣之。此乃奉款之心，不言而發。先王未深留意，而謂權中間復有異圖，愚情慺慺，用未果決。遂値先王委離國祚，殿下承統，下情始通。公私契闊，未獲備舉，是令本誓未即昭顯。梁寓傳命，委曲周至，深知殿下以爲意望。權之赤心，不敢有他，原垂明恕，保權所執。謹遣浩周、東裏衮，至情至實，皆周等所具。」又曰：「權本性空薄，文武不昭，昔承父兄成軍之緒，得爲先王所見奬飾，遂因國恩，撫綏東土。而中間寡慮，庶事不明，畏威忘德，以取重戾。先王恩仁，不忍遐棄，旣釋其宿罪，且開明信。雖致命虜廷，梟獲關羽，功效淺薄，未報萬一。事業未究，先王即世。殿下踐阼，威仁流邁，私懼情原未蒙昭察。梁寓來到，具知殿下不遂疏遠，必欲撫錄，追本先緒。權之得此，欣然踊躍，心開目明，不勝其慶。權世受寵遇，分義深篤，今日之事，永執一心，惟察慺慺，重垂含覆。」又曰：「先王以權推誠已驗，軍當引還，故除合肥之守，著南北之信，令權長驅不復後顧。近得守將周泰、全琮等白事，過月六日，有馬步七百，徑到橫江，又督將馬和復將四百人進到居巢，琮等聞有兵馬渡江，視之，爲兵馬所擊，臨時交鋒，大相殺傷。卒得此問，情用恐懼。權實在遠，不豫聞知，約敕無素，敢謝其罪。又聞張征東、朱橫海今復還合肥，先王盟要，由來未久，且權自度未獲罪衅，不審今者何以發起，牽軍遠次？事業未訖，甫當爲國討除賊備，重聞斯問，深使失圖。凡遠人所恃，在於明信，原殿下克卒前分，開示坦然，使權誓命，得卒本規。凡所原言，周等所當傳也。」初東裏衮爲于禁軍司馬，前與周俱沒，又俱還到，有詔皆見之。帝問周等，周以爲權必臣服，而東裏衮謂其不可必服。帝悅周言，以爲有以知之。是歳冬，魏王受漢禪，遣使以權爲吳王，詔使周與使者俱往。周旣致詔命，時與權私宴，謂權曰：「陛下未信王遣子入侍也，周以闔門百口明之。」權因字謂周曰：「浩孔異，卿乃以舉家百口保我，我當何言邪？」遂流涕沾襟。及與周別，又指天爲誓。周還之後，權不遣子而設辭，帝乃久留其使。到八月，權上書謝，又與周書曰：「自道路開通，不忘脩意。旣新奉國命，加知起居，假歸河北，故使情問不獲果至。望想之勞，曷雲其已。孤以空闇，分信不昭，中間招罪，以取棄絶，幸蒙國恩，復見赦宥，喜乎與君克卒本圖。傳不云乎，雖不能始，善終可也。」又曰：「昔君之來，欲令遣子入侍，於時傾心歡以承命，徒以登年幼，欲假年歳之間耳。而赤情未蒙昭信，遂見討責，常用慚怖。自頃國恩，復加開導，忘其前愆，取其後效，喜得因此尋竟本誓。前已有表具説遣子之意，想君假還，已知之也。」又曰：「今子當入侍，而未有妃耦，昔君念之，以爲可上連綴宗室若夏侯氏，雖中間自棄，常奉戢在心。當垂宿念，爲之先後，使獲攀龍附驥，永自固定。其爲分惠，豈有量哉！如是欲遣孫長緒與小兒俱入，奉行禮聘，成之在君。」又曰：「小兒年弱，加教訓不足，念當與別，爲之緬然，父子恩情，豈有已邪！又欲遣張子布追輔護之。孤性無餘，凡所欲爲，今盡宣露。惟恐赤心不先暢達，是以具爲君説之，宜明所以。」於是詔曰：「權前對浩周，自陳不敢自遠，樂委質長爲外臣，又前後辭旨，頭尾擊地，此鼠子自知不能保爾許地也。又今與周書，請以十二月遣子，復欲遣孫長緒、張子布隨子俱來，彼二人皆權股肱心腹也。又欲爲子於京師求婦，此權無異心之明效也。」帝旣信權甘言，且謂周爲得其眞，而權但華僞，竟無遣子意。自是之後，帝旣彰權罪，周亦見疏遠，終身不用。
