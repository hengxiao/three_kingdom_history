  type: pei
  text: 《吳歷》曰：權以使聘魏，具上破備獲印綬及首級、所得土地，幷表將吏功勤宜加爵賞之意。文帝報使，致鼲子裘、明光鎧、騑馬，又以素書所作《典論》及詩賦與權。《魏書》載詔答曰：「老虜邊窟，越險深入，曠日持久，內迫罷弊，外困智力，故見身於雞頭，分兵擬西陵，其計不過謂可轉足前迹以搖動江東。根未著地，摧折其支，雖未刳備五臟，使身首分離，其所降誅，亦足使虜部眾兇懼。昔吳漢先燒荆門，後發夷陵，而子陽無所逃其死；來歙始襲略陽，文叔喜之，而知隗囂無所施其巧。今討此虜，正似其事，將軍勉建方略，務全獨克。」
