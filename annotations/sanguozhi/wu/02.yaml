  at: 23
  length: 0
  type: pei
  text: 吳錄曰：是時權大會官寮，沈友有所是非，令人扶出，謂曰：「人言卿欲反。」友知不得脫，乃曰：「主上在許，有無君之心者，可謂非反乎？」遂殺之。友字子正，吳郡人。年十一，華歆行風俗，見而異之，因呼曰：「沈郎，可登車語乎？」友逡巡卻曰：「君子講好，會宴以禮，今仁義陵遲，聖道漸壞，先生銜命，將以裨補先王之教，整齊風俗，而輕脫威儀，猶負薪救火，無乃更崇其熾乎！」歆慚曰：「自桓、靈以來，雖多英彥，未有幼童若此者。」弱冠博學，多所貫綜，善屬文辭。兼好武事，注孫子兵法。又辯於口，每所至，眾人皆默然，莫與爲對，咸言其筆之妙，舌之妙，刀之妙，三者皆過絶於人。權以禮聘，旣至，論王霸之略，當時之務，權斂容敬焉。陳荆州宜幷之計，納之。正色立朝，清議峻厲，爲庸臣所譖，誣以謀反。權亦以終不爲己用，故害之，時年二十九。
