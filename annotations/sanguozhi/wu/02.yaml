  text: 《江表傳》曰：權於武昌新裝大船，名爲長安，試泛之釣臺圻。時風大盛，谷利令柂工取樊口。權曰：「當張頭取羅州。」利拔刀向柂工曰：「不取樊口者斬。」工即轉柂入樊口，風遂猛不可行，乃還。權曰：「阿利畏水何怯也？」利跪曰：「大王萬乘之主，輕於不測之淵，戲於猛浪之中，船樓裝髙，邂逅顛危，奈社稷何？是以利輒敢以死爭。」權於是貴重之，自此後不復名之，常呼曰谷。
