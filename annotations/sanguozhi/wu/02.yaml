  text: 《江表傳》載權正月詔曰：「郎吏者，宿衞之臣，古之命士也。間者所用頗非其人。自今選三署皆依四科，不得以虛辭相飾。」
- id: wu.2.p50.a2
  anchor: wu.2.p50
  at: 39
  length: 0
  type: pei
  text: 文士傳曰：胄字敬先，沛國人。父札，才學博達，權爲驃騎將軍，以札爲從事中郎，與張昭、孫邵共定朝儀。胄其少子，有文武姿局，少知名，舉賢良，稍遷建安太守。呂壹賓客於郡犯法，胄收付獄，考竟。壹懷恨，後密譖胄。權大怒，召胄還，潘濬、陳表幷爲請，得釋。後拜宣信校尉，往救公孫淵，已爲魏所破，還遷執金吾。子豐，字曼季，有文學操行，與陸雲善，與雲詩相往反。司空張華辟，未就，卒。臣松之聞孫怡者，東州人，非權之宗也。
