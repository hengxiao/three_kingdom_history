  type: pei
  text: 吳書曰：咨字德度，南陽人，博聞多識，應對辯捷，權爲吳王，擢中大夫，使魏。魏文帝善之，嘲咨曰：「吳王頗知學乎？」答曰：「吳王浮江萬艘，帶甲百萬，任賢使能，志存經略，雖有餘間，博覽書傳歷史，藉采奇異，不效諸生尋章摘句而已。」帝曰：「吳可征不？」咨對曰：「大國有征伐之兵，小國有備御之固。」又曰：「吳難魏不？」咨曰：「帶甲百萬，江、漢爲池，何難之有？」又曰：「吳如大夫者幾人？」咨曰：「聰明特達者八九十人，如臣之比，車載斗量，不可勝數。」咨頻載使北，人敬異。權聞而嘉之，拜騎都尉。咨言曰：「觀北方終不能守盟，今日之計，朝廷承漢四百之際，應東南之運，宜改年號，正服色，以應天順民。」權納之。
