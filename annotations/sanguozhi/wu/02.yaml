  text: 《漢晉春秋》曰：零陵太守殷禮言於權曰：「今天棄曹氏，喪誅累見，虎爭之際而幼童莅事。陛下身自御戎，取亂侮亡，宜滌荆、揚之地，舉強羸之數，使強者執戟，羸者轉運，西命益州軍於隴右，授諸葛瑾、朱然大眾，指事襄陽、陸遜、朱桓別征壽春，大駕入淮陽，歷靑、徐。襄陽、壽春困於受敵，長安以西務對蜀軍，許、洛之眾勢必分離；掎角瓦解，民必內應，將帥對嚮，或失便宜；一軍敗績，則三軍離心，便當秣馬脂車，陵蹈城邑，乘勝逐北，以定華夏。若不悉軍動眾，循前輕舉，則不足大用，易於屢退。民疲威消，時往力竭，非出兵之策也。」權弗能用之。
