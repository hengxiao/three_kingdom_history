  length: 0
  type: pei
  text: 《江表傳》載權詔曰：「故魏使持節車騎將軍遼東太守平樂侯：天地失序，皇極不建，元惡大憝，作害於民，海內分崩，群生堙滅，雖周餘黎民，靡有孑遺，方之今日，亂有甚焉。朕受歷數，君臨萬國，夙夜戰戰，念在弭難，若涉淵水，罔知攸濟。是以把旄仗鉞，翦除凶虐，自東徂西，靡遑寧處，苟力所及，民無災害。雖賊虜遺種，未伏辜誅，猶繫囚枯木，待時而斃。惟將軍天姿特達，兼包文武，觀時睹變，審於去就，逾越險阻，顯致赤心，肇建大計，爲天下先，元勛巨績，侔於古人。雖昔竇融背棄隴右，卒佔河西，以定光武，休名美實，豈復是過？欽嘉雅尚，朕實欣之。自古聖帝明王，建化垂統，以爵褒德，以祿報功；功大者祿厚，德盛者禮崇。故周公有夾輔之勞，太師有鷹揚之功，幷啓土宇，兼受備物。今將軍規萬年之計，建不世之略，絶僭逆之虜，順天人之肅，濟成洪業，功無與比，齊魯之事，奚足言哉！詩不云乎，『無言不讎，無德不報』。今以幽、靑二州十七郡七十縣，封君爲燕王，使持節守太常張彌授君璽綬策書、金虎符第一至第五、竹使符第一至第十。錫君玄土，苴以白茅，爰契爾龜，用錫冢社。方有戎事，典統兵馬，以大將軍曲蓋麾幢，督幽州、靑州牧遼東太守如故。今加君九錫，其敬聽後命。以君三世相承，保綏一方，寧集四郡，訓及異俗，民夷安業，無或攜貳，是用錫君大輅、戎輅、玄牡二駟。君務在勸農，嗇人成功，倉庫盈積，官民俱豐，是用錫君衮冕之服，赤舄副焉。君正化以德，敬下以禮，敦義崇謙，內外咸和，是用錫君軒縣之樂。君宣導休風，懷保邊遠，遠人回面，莫不影附，是用錫君硃戸以居，君運其才略，官方任賢，顯直錯枉，群善必舉，是用錫君虎賁之士百人。君戎馬整齊，威震遐方，糾虔天刑，彰厥有罪，是用錫君鈇鉞各一。君文和於內，武信於外，禽討逆節，折衝掩難，是用錫君彤弓一、彤矢百、玈弓十、玈矢千。君忠勤有效，温恭爲德，明允篤誠，感於朕心，是用錫君秬鬯一卣，珪瓚副焉。欽哉！敬茲訓典，寅亮天工，相我國家，永終爾休。」
