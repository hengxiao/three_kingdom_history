- id: wu.2.p64.a2
  anchor: wu.2.p64
  at: 106
  length: 0
  type: pei
  text: 臣松之以爲孫權橫廢無罪之子，雖爲兆亂，然國之傾覆，自由暴皓。若權不廢和，皓爲世適，終至滅亡，有何異哉？此則喪國由於昏虐，不在於廢黜也。設使亮保國祚，休不早死，則皓不得立。皓不得立，則吳不亡矣。
