- id: wu.2.p23.a2
  anchor: wu.2.p23
  at: 173
  length: 0
  type: pei
  text: 《魏略》載魏三公奏曰：「臣聞枝大者披心，尾大者不掉，有國有家之所愼也。昔漢承秦弊，天下新定，大國之王，臣節未盡，以蕭、張之謀不備錄之，至使六王前後反叛，已而伐之，戎車不輟。又文、景守成，忘戰戢役，驕縱吳、楚，養虺成蛇，旣爲社稷大憂，蓋前事之不忘，後事之師也。吳王孫權，幼竪小子，無尺寸之功，遭遇兵亂，因父兄之緒，少蒙翼卵昫伏之恩，長含鴟梟反逆之性，背棄天施，罪惡積大。復與關羽更相覘伺，逐利見便，挾爲卑辭。先帝知權奸以求用，時以于禁敗於水災，等當討羽，因以委權。先帝委裘下席，權不盡心，誠在惻怛，欲因大喪，寡弱王室，希託董桃傳先帝令，乘未得報許，擅取襄陽，及見驅逐，乃更折節。邪辟之態，巧言如流，雖重驛累使，發遣禁等，內包隗囂顧望之姦，外欲緩誅，支仰蜀賊。聖朝含弘，旣加不忍，優而赦之，與之更始，猥乃割地王之，使南面稱孤，兼官累位，禮備九命，名馬百駟，以成其勢，光寵顯赫，古今無二。權爲犬羊之姿，橫被虎豹之文，不思靖力致死之節，以報無量不世之恩。臣每見所下權前後章表，又以愚意采察權旨，自以阻帶江湖，負固不服，狃𢗗累世，詐僞成功，上有尉佗、英布之計，下誦伍被屈強之辭，終非不侵不叛之臣。以爲晁錯不發削弱王侯之謀，則七國同衡，禍久而大；蒯通不決襲歷下之策，則田橫自慮，罪深變重。臣謹考之周禮九伐之法，平權兇惡，逆節萌生，見罪十五。昔九黎亂德，黃帝加誅；項羽罪十，漢祖不捨。權所犯罪衅明白，非仁恩所養，宇宙所容。臣請免權官，鴻臚削爵土，捕治罪。敢有不從，移兵進討，以明國典好惡之常，以靜三州元元之苦。」其十五條，文多不載。
