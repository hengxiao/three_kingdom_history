  anchor: wu.2.p26
  at: 54
  length: 0
  type: pei
  text: 干寶《晉紀》曰：魏文帝之在廣陵，吳人大駭，乃臨江爲疑城，自石頭至於江乘，車以木楨，衣以葦席，加采飾焉，一夕而成。魏人自江西望，甚憚之，遂退軍。權令趙達算之，曰：「曹丕走矣，雖然，吳衰庚子歳。」權曰：「幾何？」達屈指而計之，曰：「五十八年。」權曰：「今日之憂，不暇及遠，此子孫事也。」吳錄曰：是歳蜀主又遣鄧芝來聘，重結盟好。權謂芝曰：「山民作亂，江邊守兵多徹，慮曹丕乘空弄態，而反求和。議者以爲內有不暇，幸來求和，於我有利，宜當與通，以自辨定。恐西州不能明孤赤心，用致嫌疑。孤土地邊外，間隙萬端，而長江巨海，皆當防守。丕觀衅而動，惟不見便，寧得忘此，復有他圖。」
