  text: 臣松之按《禮記》曾子問子夏曰：『三年之喪，金革之事無避也者，禮與？初有司與？』孔子曰：『吾聞諸老摐曰，昔者魯公伯禽有爲爲之也。』鄭玄注曰：『周人卒哭而致事。時有徐戎作難，伯禽卒哭而徵之，急王事也。』昭所云『伯禽不師』，蓋謂此也。
