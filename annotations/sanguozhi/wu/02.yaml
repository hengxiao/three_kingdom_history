  length: 0
  type: pei
  text: 吳書曰：以尚書令陳化爲太常。化字元耀，汝南人，博覽眾書，氣幹剛毅，長七尺九寸，雅有威容。爲郎中令使魏，魏文帝因酒酣，嘲問曰：「吳、魏峙立，誰將平一海內者乎？」化對曰：「易稱帝出乎震，加聞先哲知命，舊説紫蓋黃旗，運在東南。」帝曰：「昔文王以西伯王天下，豈復在東乎？」化曰：「周之初基，太伯在東，是以文王能興於西。」帝笑，無以難，心奇其辭。使畢當還，禮送甚厚。權以化奉命光國，拜犍爲太守，置官屬。頃之，遷太常，兼尚書令。正色立朝，敕子弟廢田業，絶治産，仰官廩祿，不與百姓爭利。妻早亡，化以古事爲鑑，乃不復娶。權聞而貴之，以其年壯，敕宗正妻以宗室女，化固辭以疾，權不違其志。年出七十，乃上疏乞骸骨，遂爰居章安，卒於家。長子熾，字公熙，少有志操，能計算。衞將軍全琮表稱熾任大將軍，赴召，道卒。
