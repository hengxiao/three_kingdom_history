  text: 《江表傳》曰：權群臣議，以爲宜稱上將軍九州伯，不應受魏封。權曰：「九州伯，於古未聞也。昔沛公亦受項羽拜爲漢王，此蓋時宜耳，復何損邪？」遂受之。孫盛曰：「昔伯夷、叔齊不屈有周，魯仲連不爲秦民。夫以匹夫之志，猶義不辱，況列國之君三分天下，而可二三其節，或臣或否乎？餘觀吳、蜀，咸稱奉漢，至於漢代，莫能固秉臣節，君子是以知其不能克昌厥後，卒見吞於大國也。曏使權從群臣之議，終身稱漢將，豈不義悲六合，仁感百世哉！」
