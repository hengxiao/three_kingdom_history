  text: 《江表傳》曰：是冬，群臣以權未郊祀，奏議曰：「頃者嘉瑞屢臻，遠國慕義，天意人事，前後備集，宜脩郊祀，以承天意。」權曰：「郊祀當於土中，今非其所，於何施此？」重奏曰：「普天之下，莫非王土；王者以天下爲家。昔周文、武郊於酆、鎬，非必土中。」權曰：「武王伐紂，即阼於鎬京，而郊其所也。文王未爲天子，立郊於酆，見何經典？」復書曰：「伏見漢書郊祀志，匡衡奏徙甘泉河東，郊於長安，言文王郊於酆。」權曰：「文王性謙讓，處諸侯之位，明未郊也。經傳無明文，匡衡俗儒意説，非典籍正義，不可用也。」志林曰：吳王糾駮郊祀之奏，追貶匡衡，謂之俗儒。凡在見者，莫不慨然以爲統盡物理，達於事宜。至於稽之典籍，乃更不通。毛氏之説云：「堯見天因邰而生後稷，故國之於邰，命使事天。」故詩曰：「后稷肇祀，庶無罪悔，以迄於今。」言自后稷以來皆得祭天，猶魯人郊祀也。是以棫樸之作，有積燎之薪。文王郊酆，經有明文，匡衡豈俗，而枉之哉？文王雖未爲天子，然三分天下而有其二，伐崇戡黎，祖伊奔告。天旣棄殷，乃眷西顧，太伯三讓，以有天下。文王爲王，於義何疑？然則匡衡之奏，有所未盡。按世宗立甘泉、汾陰之祠，皆出方士之言，非據經典者也。方士以甘泉、汾陰黃帝祭天地之處，故孝武因之，遂立二畤。漢治長安，而甘泉在北，謂就乾位，而衡云「武帝居甘泉，祭於南宮」，此旣誤矣。祭汾陰在水之脽，呼爲澤中，而衡云「東之少陽」，失其本意。此自吳事，於傳無非，恨無辨正之辭，故矯之云。脽，音誰，見漢書音義。
