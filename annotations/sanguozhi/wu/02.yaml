  anchor: wu.2.p12
  at: 33
  length: 0
  type: pei
  text: 《吳歷》曰：曹公出濡須，作油船，夜渡洲上。權以水軍圍取，得三千餘人，其沒溺者亦數千人。權數挑戰，公堅守不出。權乃自來，乘輕船，從灞須口入公軍。諸將皆以爲是挑戰者，欲擊之。公曰：「此必孫權欲身見吾軍部伍也。」敕軍中皆精嚴，弓弩不得妄發。權行五六里，回還作鼓吹。公見舟船器仗軍伍整肅，喟然嘆曰：「生子當如孫仲謀，劉景升兒子若豚犬耳！」權爲箋與曹公，説：「春水方生，公宜速去。」別紙言：「足下不死，孤不得安。」曹公語諸將曰：「孫權不欺孤。」乃徹軍還。魏略曰：權乘大船來觀軍，公使弓弩亂發，箭著其船，船偏重將覆，權因回船，復以一面受箭，箭均船平，乃還。
