  text: 《吳錄》載權告天文曰：「皇帝臣權敢用玄牡昭告於皇皇后帝：漢享國二十有四世，歷年四百三十有四，行氣數終，祿祚運盡，普天弛絶，率土分崩。孼臣曹丕遂奪神器，丕子叡繼世作慝，淫名亂制。權生於東南，遭値期運，承乾秉戎，志在平世，奉辭行罰，舉足爲民。群臣將相，州郡百城，執事之人，咸以爲天意已去於漢，漢氏已絶祀於天，皇帝位虛，郊祀無主。休徵嘉瑞，前後雜沓，歷數在躬，不得不受。權畏天命，不敢不從，謹擇元日，登壇燎祭，即皇帝位。惟爾有神饗之，左右有吳，永終天祿。」
