  text: 《江表傳》曰：權辭讓曰：「漢家堙替，不能存救，亦何心而競乎？」群臣稱天命符瑞，固重以請。權未之許，而謂將相曰：「往年孤以玄德方嚮西鄙，故先命陸遜選眾以待之。聞北部分，欲以助孤，孤內嫌其有挾，若不受其拜，是相折辱而趣其速發，便當與西俱至，二處受敵，於孤爲劇，故自抑按，就其封王。低屈之趣，諸君似未之盡，今故以此相解耳。」
