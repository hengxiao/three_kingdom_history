  type: pei
  text: 《江表傳》曰：權云：「近得玄德書，已深引咎，求復舊好。前所以名西爲蜀者，以漢帝尚存故耳，今漢已廢，自可名爲漢中王也。」吳書曰：鄭泉字文淵，陳郡人。博學有奇志，而性嗜酒，其間居每曰：「原得美酒滿五百斛船，以四時甘脆置兩頭，反覆沒飲之，憊即住而啖肴膳。酒有斗升減，隨即益之，不亦快乎！」權以爲郎中。嘗與之言：「卿好於眾中面諫，或失禮敬，寧畏龍鱗乎？」對曰：「臣聞君明臣直，今値朝廷上下無諱，實恃洪恩，不畏龍鱗。」後侍宴，權乃怖之，使提出付有司促治罪。泉臨出屢顧，權呼還，笑曰：「卿言不畏龍鱗，何以臨出而顧乎？」對曰：「實侍恩覆，知無死憂，至當出閤，感惟威靈，不能不顧耳。」使蜀，劉備問曰：「吳王何以不答吾書，得無以吾正名不宜乎？」泉曰：「曹操父子陵轢漢室，終奪其位。殿下旣爲宗室，有維城之責，不荷戈執殳爲海內率先，而於是自名，未合天下之議，是以寡君未復書耳。」備甚慚恧。泉臨卒，謂同類曰：「必葬我陶家之側，庶百歳之後化而成土，幸見取爲酒壺，實獲我心矣。」
