- id: wu.2.p20.a2
  anchor: wu.2.p20
  at: 224
  length: 0
  type: pei
  text: 吳書曰：珩字仲山，吳郡人，少綜經藝，尤善春秋內、外傳。權以珩有智謀，能專對，乃使至魏。魏文帝問曰：「吳嫌魏東向乎？」珩曰：「不嫌。」曰：「何以？」曰：「信恃舊盟，言歸於好，是以不嫌。若魏渝盟，自有豫備。」又問：「聞太子當來，寧然乎？」珩曰：「臣在東朝，朝不坐，宴不與，若此之議，無所聞也。」文帝善之，乃引珩自近，談語終日。珩隨事響應，無所屈服。珩還言曰：「臣密參侍中劉曄，數爲賊設奸計，終不久愨。臣聞兵家舊論，不恃敵之不我犯，恃我之不可犯，今爲朝廷慮之。且當省息他役，惟務農桑以廣軍資；脩繕舟車，增作戰具，令皆兼盈；撫養兵民，使各得其所；攬延英俊，奬勵將士，則天下可圖矣。」以奉使有稱，封永安鄉侯，官至少府。
- id: wu.2.p20.a3
  anchor: wu.2.p20
  at: 231
  length: 0
  type: pei
  text: 《江表傳》曰：是歳魏文帝遣使求雀頭香、大貝、明珠、象牙、犀角、玳瑁、孔雀、翡翠、鬬鴨、長鳴雞。群臣奏曰：「荆、揚二州，貢有常典，魏所求珍玩之物非禮也，宜勿與。」權曰：「昔惠施尊齊爲王，客難之曰：『公之學去尊，今王齊，何其倒也？』惠子曰：『有人於此，欲擊其愛子之頭，而石可以代之，子頭所重而石所輕也，以輕代重，何爲不可乎？』方有事於西北，江表元元，恃主爲命，非我愛子邪？彼所求者，於我瓦石耳，孤何惜焉？彼在諒闇之中，而所求若此，寧可與言禮哉！」皆具以與之。
