  type: pei
  text: 吳書曰：權遣立信都尉馮熙聘於蜀，弔備喪也。熙字子柔，潁川人，馮異之後也。權之爲車騎，熙歷東曹掾，使蜀還，爲中大夫。後使於魏，文帝問曰：「吳王若欲脩宿好，宜當厲兵江關，縣旍巴蜀，而聞復遣脩好，必有變故。」熙曰：「臣聞西使直報問，且以觀衅，非有謀也。」又曰：「聞吳國比年災旱，人物彫損，以大夫之明，觀之何如？」熙對曰：「吳王體量聰明，善於任使，賦政施役，每事必咨，教養賓旅，親賢愛士，賞不擇怨仇，而罰必加有罪，臣下皆感恩懷德，惟忠與義。帶甲百萬，穀帛如山，稻田沃野，民無饑歳，所謂金城湯池，強富之國也。以臣觀之，輕重之分，未可量也。」帝不悅，以陳群與熙同郡，使群誘之，啗以重利。熙不爲回。送至摩陂，欲困苦之。後又召還，未至，熙懼見迫不從，必危身辱命，乃引刀自刺。御者覺之，不得死。權聞之，垂涕曰：「此與蘇武何異？」竟死於魏。
