- id: wu.20.p16.a1
  anchor: wu.20.p16
  at: 118
  length: 0
  type: pei
  text: 邵子循，字彦先。虞预《晋书》曰：循丁家祸，流放海滨，吴平，还乡里。节操高厉，童齔不群，言行举动，必以礼让。好学博闻，尤善三礼。举秀子，除阳羡、武康令。顾荣、陆机、陆云表荐循曰：“伏见吴兴武康令贺循德量邃茂，才鉴清远，服膺道素，风操凝峻，历践三城，刑政肃穆，守职下县，编名凡萃，出自新邦，朝无知己，恪居遐外，志不自营，年时倏忽，而邈无阶绪，实州党愚智所为怅然。臣等并以凡才，累授饰进，被服恩泽，忝豫朝末，知良士后时，而守局无言，惧有蔽贤之咎，是以不胜愚管，谨冒死表闻。”久之，召为太子舍人。石冰破扬州，循亦合众，事平，杜门不出。陈敏作乱，以循为丹杨内史，循称疾固辞，敏不敢逼。于时江东豪右无不受敏爵位，惟循与同郡硃诞不挂贼网。后除吴国内史，不就。元皇帝为镇东将军，请循为军司马，帝为晋王，以循为中书令，固让不受，转太常，领太子太傅。时朝廷初建，动有疑议，宗庙制度皆循所定，朝野谘询，为一时儒宗。年六十，太興二年卒。追赠司空，谥曰穆。循诸所著论，并传於世。子隰，临海太守。
