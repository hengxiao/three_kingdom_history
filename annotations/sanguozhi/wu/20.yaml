- id: wu.20.p4.a1
  anchor: wu.20.p4
  at: 86
  length: 0
  type: pei
  text: 《江表傳》曰：皓用巫史之言，谓建业宫不利，乃西巡武昌，仍有迁都之意，恐群臣不从，乃大请会，赐将吏。问蕃“射不主皮，为力不同科，其义云何”？蕃思惟未答，即於殿上斩蕃。出登来山，使亲近将（跳）蕃首，作虎跳狼争咋齧之，头皆碎坏，欲以示威，使众不敢犯也。此与本传不同。吴录曰：皓每於会，因酒酣，辄令侍臣嘲谑公卿，以为笑乐。万彧既为左丞相，蕃嘲彧曰：“鱼潜於渊，出水煦沫。何则？物有本性，不可横处非分也。彧出自谿谷，羊质虎皮，虚受光赫之宠，跨越三九之位，犬马犹能识养，将何以报厚施乎！”彧曰：“唐虞之朝无谬举之才，造父之门无驽蹇之质，蕃上诬明选，下讪桢幹，何伤於日月，適多见其不知量耳。”臣松之按本传云丁忠使晋还，皓为大会，於会中杀蕃，检忠从北还在此年之春，彧时尚未为丞相，至秋乃为相耳。吴录所言为乖互不同。
- id: wu.20.p9.a1
  anchor: wu.20.p9
  at: 87
  length: 0
  type: pei
  text: 江表傳曰：皓遣將張奕追賜玄鴆，奕以玄賢者，不忍即宣詔致藥，玄陰知之，謂奕曰：「當早告玄，玄何惜邪？」即服藥死。臣松之以玄之清高，必不以安危易操，无緣驟拜張奕，以虧其節。且祸機既發，豈百拜所免？江表傳所言，於理為長。
- id: wu.20.p10.a1
  anchor: wu.20.p10
  at: 13
  length: 0
  type: pei
  text: 《吳書》曰：邵，賀齊之孫，景之子。
- id: wu.20.p16.a1
  anchor: wu.20.p16
  at: 118
  length: 0
  type: pei
  text: 邵子循，字彦先。虞预《晋书》曰：循丁家祸，流放海滨，吴平，还乡里。节操高厉，童齔不群，言行举动，必以礼让。好学博闻，尤善三礼。举秀子，除阳羡、武康令。顾荣、陆机、陆云表荐循曰：“伏见吴兴武康令贺循德量邃茂，才鉴清远，服膺道素，风操凝峻，历践三城，刑政肃穆，守职下县，编名凡萃，出自新邦，朝无知己，恪居遐外，志不自营，年时倏忽，而邈无阶绪，实州党愚智所为怅然。臣等并以凡才，累授饰进，被服恩泽，忝豫朝末，知良士后时，而守局无言，惧有蔽贤之咎，是以不胜愚管，谨冒死表闻。”久之，召为太子舍人。石冰破扬州，循亦合众，事平，杜门不出。陈敏作乱，以循为丹杨内史，循称疾固辞，敏不敢逼。于时江东豪右无不受敏爵位，惟循与同郡硃诞不挂贼网。后除吴国内史，不就。元皇帝为镇东将军，请循为军司马，帝为晋王，以循为中书令，固让不受，转太常，领太子太傅。时朝廷初建，动有疑议，宗庙制度皆循所定，朝野谘询，为一时儒宗。年六十，太興二年卒。追赠司空，谥曰穆。循诸所著论，并传於世。子隰，临海太守。
- id: wu.20.p17.a1
  anchor: wu.20.p17
  at: 13
  length: 0
  type: pei
  text: 裴松之曰：曜本名昭，史爲晉諱，改之。
