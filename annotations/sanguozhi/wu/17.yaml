- id: wu.17.p2.a1
  anchor: wu.17.p2
  at: 56
  length: 0
  type: pei
  text: 徐众评曰：古之建姓，或以所生，或以官号，或以祖名，皆有义体，以明氏族。故曰胙之以土而命之氏，此先王之典也，所以明本重始，彰示功德，子孙不忘也。今离文析字，横生忌讳，使仪易姓，忘本诬祖，不亦谬哉！教人易姓，从人改族，融既失之，仪又不得也。
- id: wu.17.p3.a1
  anchor: wu.17.p3
  at: 201
  length: 0
  type: pei
  text: 徐众评曰：是仪以羁旅异方，客仕吴朝，值谗邪殄行，当严毅之威，命县漏刻，祸急危机，不雷同以害人，不苟免以伤义，可谓忠勇公正之士，虽祁奚之免叔向，庆忌之济硃云，何以尚之？忠不谄君，勇不慑耸，公不存私，正不党邪，资此四德，加之以文敏，崇之以谦约，履之以和顺，保傅二宫，存身爱名，不亦宜乎！
