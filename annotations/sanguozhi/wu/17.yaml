- id: wu.17.p16.a1
  anchor: wu.17.p16
  at: 263
  length: 0
  type: pei
  text: 吴录曰：蕃有口才，魏明帝使诈叛如吴，令求作廷尉职，重案大臣以离间之。既为廷尉监，众人以据、普与蕃亲善，常车马云集，宾客盈堂。及至事觉，蕃亡走，捕得，考问党与，蕃无所言。吴主使将入，谓曰：“何乃以肌肉为人受毒乎？”蕃曰：“孙君，丈夫图事，岂有无伴！烈士死，不足相牵耳。”遂闭口而死。吴历曰：权问普：“卿前盛称蕃，又为之怨望朝廷，使蕃反叛，皆卿之由。”
