  at: 172
  length: 0
  type: pei
  text: 《襄陽記》曰：衡字叔平，本襄陽卒家子也，漢末入吳爲武昌庶民。聞羊衜有人物之鑒，往干之，衜曰：「多事之世，尚書劇曹郎才也。」是時校事呂壹操弄權柄，大臣畏偪，莫有敢言，衜曰：「非李衡無能困之者。」遂共薦爲郎。權引見，衡口陳壹姦短數千言，權有愧色。數月，壹被誅，而衡大見顯擢。後常爲諸葛恪司馬，幹恪府事。恪被誅，求爲丹楊太守。時孫休在郡治，衡數以法繩之。妻習氏每諫衡，衡不從。會休立，衡憂懼，謂妻曰：「不用卿言，以至於此。」遂欲奔魏。妻曰：「不可。君本庶民耳，先帝相拔過重，旣數作無禮，而復逆自猜嫌，逃叛求活，以此北歸，何面見中國人乎？」衡曰：「計何所出？」妻曰：「琅邪王素好善慕名，方欲自顯於天下，終不以私嫌殺君明矣。可自囚詣獄，表列前失，顯求受罪。如此，乃當逆見優饒，非但直活而已。」衡從之，果得無患，又加威遠將軍，援以棨戟。衡每欲治家，妻輙不聽，後密遣客十人於武陵龍陽汎洲上作宅，種甘橘千株。臨死，勑兒曰：「汝母惡我治家，故窮如是。然吾州里有千頭木奴，不責汝衣食，歲上一匹絹，亦可足用耳。」衡亡後二十餘日，兒以白母，母曰：「此當是種甘橘也，汝家失十戶客來七八年，必汝父遣爲宅。汝父恒稱太史公言，『江陵千樹橘，當封君家』。吾荅曰：『且人患無德義，不患不富，若貴而能貧，方好耳，用此何爲！』」吳末，衡甘橘成，歲得絹數千匹，家道殷足。晉咸康中，其宅止枯樹猶在。
- id: wu.3.p13.a2
  anchor: wu.3.p13
  at: 195
  length: 0
  type: pei
  text: 《江表傳》曰：羣臣奏立皇后、太子，詔曰：「朕以寡德，奉承洪業，莅事日淺，恩澤未敷，加后妃之號，嗣子之位，非所急也。」有司又固請，休謙虛不許。
