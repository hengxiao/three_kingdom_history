  type: pei
  text: 《搜神記》曰：吳以草創之國，信不堅固，邊屯守將皆質其妻子，名曰保質。童子少年，以類相與嬉游者，日有十數。永安二年三月，有一異兒，長四尺餘，年可六七歲，衣青衣，來從羣兒戲，諸兒莫之識也。皆問曰：「爾誰家小兒，今日忽來？」荅曰：「見爾羣戲樂，故來耳。」詳而視之，眼有光芒，爚爚外射。諸兒畏之，重問其故。兒乃荅曰：「爾惡我乎？我非人也，乃熒惑星也。將有以告爾：三公鉏，司馬如。」諸兒大驚，或走告大人，大人馳往觀之。兒曰：「舍爾去乎！」竦身而躍，即以化矣。仰而視之，若引一匹練以登天。大人來者，猶及見焉，飄飄漸高，有頃而沒。時吳政峻急，莫敢宣也。後五年而蜀亡，六年而晉興，至是而吳滅，司馬如矣。干寶《晉紀》曰：王濬治船於蜀，吳彥取其流柹以呈孫皓，曰：「晉必有攻吳之計，宜增建平兵。建平不下，終不敢渡江。」皓弗從。陸抗之克步闡，皓意張大，乃使尚廣筮并天下，遇同人之頤，對曰：「吉。庚子歲，青蓋當入洛陽。」故皓不脩其政，而恒有窺上國之志。是歲也，實在庚子。
