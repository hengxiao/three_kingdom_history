  type: pei
  text: 《江表傳》曰：皓書兩頭言白，稱名言而不著姓。《吳錄》曰：陟字子上，丹楊人。初爲中書郎，孫峻使詰南陽王和，令其引分。陟密使令正辭自理，峻怒。陟懼，閉門不出。孫休時，父亮爲尚書令，而陟爲中書令，每朝會，詔以屏風隔其座。出爲豫章太守。干寶《晉紀》曰：陟、璆奉使如魏，入境而問諱，入國而問俗。壽春將王布示之馬射，旣而問之曰：「吳之君子亦能斯乎？」陟曰：「此軍人騎士肄業所及，士大夫君子未有爲之者矣。」布大慙。旣至，魏帝見之，使儐問曰：「來時吳王何如？」陟對曰：「來時皇帝臨軒，百寮陪位，御膳無恙。」晉文王饗之，百寮畢會，使儐者告曰：「某者安樂公也，某者匈奴單于也。」陟曰：「西主失土，爲君王所禮，位同三代，莫不感義，匈奴邊塞難羈之國，君王懷之，親在坐席，此誠威恩遠著。」又問：「吳之戍備幾何？」對曰：「自西陵以至江都，五千七百里。」又問曰：「道里甚遠，難爲堅固？」對曰：「疆界雖遠，而其險要必爭之地，不過數四，猶人雖有八尺之軀靡不受患，其護風寒亦數處耳。」文王善之，厚爲之禮。臣松之以爲人有八尺之體靡不受患，防護風寒豈唯數處？取譬若此，未足稱能。若曰譬如金城萬雉，所急防者四門而已。方陟此對，不猶愈乎！《吳錄》曰：皓以諸父與和相連及者，家屬皆徙東冶，唯陟以有密旨，特封子孚都亭侯。孚弟瞻，字思遠，入仕晉驃騎將軍。弘璆，曲阿人，弘咨之孫，權外甥也。璆後至中書令、太子少傅。
