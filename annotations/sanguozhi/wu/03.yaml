  type: pei
  text: 《吳錄》曰：永安今武康縣也。
- id: wu.3.p25.a3
  anchor: wu.3.p25
  at: 338
  length: 0
  type: pei
  text: 《漢晉春秋》曰：初望氣者云荊州有王氣破揚州而建業宮不利，故皓徙武昌，遣使者發民掘荊州界大臣名家冢與山岡連者以厭之。旣聞但反，自以爲徙土得計也。使數百人鼓譟入建業，殺但妻子，云天子使荊州兵來破揚州賊，以厭前氣。
- id: wu.3.p25.a4
  anchor: wu.3.p25
  at: 356
  length: 0
  type: pei
  text: 皓詔曰：「古者分土建國，所以襃賞賢能，廣樹藩屏。秦毀五等爲三十六郡，漢室初興，闓立乃至百五，因事制宜，蓋無常數也。今吳郡陽羨、永安、餘杭、臨水及丹楊故鄣、安吉、原鄉、於潛諸縣，地勢水流之便，悉注烏程，旣宜立郡以鎮山越，且以藩衞明陵，奉承大祭，不亦可乎！其亟分此九縣爲吳興郡，治烏程。」
