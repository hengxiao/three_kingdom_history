  text: 《漢晉春秋》載晉文王與皓書曰：「聖人稱有君臣然後有上下禮義，是故大必字小，小必事大，然後上下安服，羣生獲所。逮至末塗，純德旣毀，勦民之命，以爭彊於天下，違禮順之至理，則仁者弗由也。方今主上聖明，覆帱無外，僕備位宰輔，屬當國重。唯華夏乖殊，方隅圮裂，六十餘載，金革亟動，無年不戰，暴骸喪元，困悴罔定，每用悼心，坐以待旦。將欲止戈興仁，爲百姓請命，故分命偏師，平定蜀漢，役未經年，全軍獨克。于時猛將謀夫，朝臣庶士，咸以奉天時之宜，就旣征之軍，藉吞敵之勢，宜遂回旗東指，以臨吳境。舟師汎江，順流而下，陸軍南轅，取徑四郡，兼成都之械，漕巴漢之粟，然後以中軍整旅，三方雲會，未及浹辰，可使江表厎平，南夏順軌。然國朝深惟伐蜀之舉，雖有靜難之功，亦悼蜀民獨罹其害，戰於緜竹者，自元帥以下並受斬戮，伏尸蔽地，血流丹野。一之於前，猶追恨不忍，況重之於後乎？是故旋師案甲，思與南邦共全百姓之命。夫料力忖勢，度資量險，遠考古昔廢興之理，近鑒西蜀安危之効，隆德保祚，去危即順，屈己以寧四海者，仁哲之高致也；履危偷安，隕德覆祚，而不稱於後世者，非智者之所居也。今朝廷遣徐紹、孫彧獻書喻懷，若書御於前，必少留意，回慮革筭，結歡弭兵，共爲一家，惠矜吳會，施及中土，豈不泰哉！此昭心之大願也，敢不承受。若不獲命，則普天率土，期於大同，雖重干戈，固不獲已也。」
