  type: pei
  text: 干寶《晉紀》曰：皓殿中親近數百人叩頭請皓曰：「北軍日近，而兵不舉刃，陛下將如之何！」皓曰：「何故？」對曰：「坐岑昏。」皓獨言：「若爾，當以奴謝百姓。」衆因曰：「唯！」遂並起收昏。皓駱驛追止，已屠之也。
- id: wu.3.p44.a1
  anchor: wu.3.p44
  at: 240
