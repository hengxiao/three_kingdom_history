  text: 《吳錄》載休詔曰：「人之有名，以相紀別，長爲作字，憚其名耳。禮，名子欲令難犯易避，五十稱伯仲，古或一字。今人競作好名好字，又令相配，所行不副，此瞽字伯明者也，孤常哂之。或師友父兄所作，或自己爲；師友尚可，父兄猶非，自爲最不謙。孤今爲四男作名字：太子名𩅦，𩅦音如『湖水灣澳』之灣，字莔，莔音如『迄今』之迄；次子名𩃙，𩃙音如『兕觥』之觥，字𧟨，𧟨音如『玄礥首』之礥；次子名壾，壾音如『草莽』之莽，字昷，昷音如『舉物』之舉；次子名𠅬，𠅬音如『襃衣下寬大』之襃，字㷏，㷏音如『有所擁持』之擁。此都不與世所用者同，故鈔舊文會合作之。夫書八體損益，因事而生，今造此名字，旣不相配，又字但一，庶易棄避，其普告天下，使咸聞知。」臣松之以爲傳稱「名以制義，義以出禮，禮以體政，政以正民。是以政成而民聽，易則生亂」。斯言之作，豈虛也哉！休欲令難犯，何患無名，而乃造無況之字，制不典之音，違明誥於前脩，垂嗤騃於後代，不亦異乎！是以墳土未乾而妻子夷滅。師服之言，於是乎徵矣。
