  type: pei
  text: 《吳歷》曰：亮數出中書視孫權舊事，問左右侍臣：「先帝數有特制，今大將軍問事，但令我書可邪！」亮後出西苑，方食生梅，使黃門至中藏取蜜漬梅，蜜中有鼠矢，召問藏吏，藏吏叩頭。亮問吏曰：「黃門從汝求蜜邪？」吏曰：「向求，實不敢與。」黃門不服，侍中刁玄、張邠啟：「黃門、藏吏辭語不同，請付獄推盡。」亮曰：「此易知耳。」令破鼠矢，矢裏燥。亮大笑謂玄、邠曰：「若矢先在蜜中，中外當俱溼，今外溼裏燥，必是黃門所爲。」黃門首服，左右莫不驚悚。《江表傳》曰：亮使黃門以銀碗并蓋就中藏吏取交州所獻甘蔗餳。黃門先恨藏吏，以鼠矢投餳中，啟言藏吏不謹。亮呼吏持餳器入，問曰：「此器旣蓋之，且有掩覆，無緣有此，黃門將有恨於汝邪？」吏叩頭曰：「嘗從某求宮中莞席，宮席有數，不敢與。」亮曰：「必是此也。」覆問黃門，具首伏。即於目前加髠鞭，斥付外署。臣松之以爲鼠矢新者，亦表裏皆溼。黃門取新矢則無以得其姦也，緣遇燥矢，故成亮之惠。然猶謂吳曆此言，不如《江表傳》爲實也。
