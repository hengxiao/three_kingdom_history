  text: 《江表傳》曰：俶父，會稽山陰縣卒也，知俶不良，上表云：「若用俶爲司直，有罪乞不從坐。」皓許之。俶表正彈曲二十人，專糾司不法，於是愛惡相攻，互相謗告。彈曲承言，收繫囹圄，聽訟失理，獄以賄成。人民窮困，無所措手足。俶奢淫無厭，取小妻三十餘人，擅殺無辜，衆姦並發，父子俱見車裂。
