  text: 《吳錄》曰：儼字子節，吳人也。弱冠知名，歷顯位，以博聞多識，拜大鴻臚。使于晉，皓謂儼曰：「今南北通好，以君爲有出境之才，故相屈行。」對曰：「皇皇者華，蒙其榮耀，無古人延譽之美，磨厲鋒鍔，思不辱命。」旣至，車騎將軍賈充、尚書令裴秀、侍中荀勗等欲傲以所不知而不能屈。尚書僕射羊祜、尚書何楨並結縞帶之好。
