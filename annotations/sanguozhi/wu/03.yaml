  text: 《江表傳》曰：歷陽縣有石山臨水，高百丈，其三十丈所，有七穿駢羅，穿中色黃赤，不與本體相似，俗相傳謂之石印。又云，石印封發，天下當太平。下有祠屋，巫祝言石印神有三郎。時歷陽長表上言石印發，皓遣使以太牢祭歷山。巫言，石印三郎說「天下方太平」。使者作高梯，上看印文，詐以朱書石作二十字，還以啟皓。皓大喜曰：「吳當爲九州作都、渚乎！從大皇帝逮孤四世矣，太平之主，非孤復誰？」重遣使，以印綬拜三郎爲王，又刻石立銘，襃贊靈德，以荅休祥。
