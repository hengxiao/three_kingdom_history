  type: pei
  text: 《江表傳》曰：初皓游華里，彧與丁奉、留平密謀曰：「此行不急，若至華里不歸，社稷事重，不得不自還。」此語頗泄。皓聞知，以彧等舊臣，且以計忍而陰銜之。後因會，以毒酒飲彧，傳酒人私減之。又飲留平，平覺之，服他藥以解，得不死。彧自殺。平憂懣，月餘亦死。
- id: wu.3.p31.a2
  anchor: wu.3.p31
  at: 100
  length: 0
  type: pei
  text: 《江表傳》曰：定，汝南人，本孫權給使也，後出補吏。定佞邪僭媚，自表先帝舊人，求還內侍，皓以爲樓下都尉，典知酤糴事，專爲威福。而皓信任，委以衆事。定爲子求少府李勗女，不許。定挾忿譖勗於皓，皓尺口誅之，焚其尸。定又使諸將各上好犬，皆千里遠求，一犬至直數千匹。御犬率具纓，直錢一萬。一犬一兵，養以捕兎供厨。所獲無幾。吳人皆歸罪於定，而皓以爲忠勤，賜爵列侯。《吳歷》曰：中書郎奚熙譖宛陵令賀惠。惠，劭弟也。遣使者徐粲訊治，熙又譖粲顧護不即決斷。皓遣使就宛陵斬粲，收惠付獄。會赦得免。
