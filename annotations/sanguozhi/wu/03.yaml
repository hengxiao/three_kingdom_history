  type: pei
  text: 干寶《晉紀》曰：吳丞相軍師張悌、護軍孫震、丹楊太守沈瑩帥衆三萬濟江，圍成陽都尉張喬於楊荷橋，衆才七千，閉柵自守，舉白接告降。吳副軍師諸葛靚欲屠之，悌曰：「彊敵在前，不宜先事其小；且殺降不祥。」靚曰：「此等以救兵未至而力少，故且僞降以緩我，非來伏也。因其無戰心而盡阬之，可以成三軍之氣。若舍之而前，必爲後患。」悌不從，撫之而進。與討吳護軍張翰、揚州刺史周浚成陣相對。沈瑩領丹楊銳卒刀楯五千，號曰青巾兵，前後屢陷堅陣，於是以馳淮南軍，三衝不動。退引亂，薛勝、蔣班因其亂而乘之，吳軍以次土崩，將帥不能止，張喬又出其後，大敗吳軍于阪橋，獲悌、震、瑩等。《襄陽記》曰：悌字巨先，襄陽人，少有名理，孫休時爲屯騎校尉。魏伐蜀，吳人問悌曰：「司馬氏得政以來，大難屢作，智力雖豐，而百姓未服也。今又竭其資力，遠征巴蜀，兵勞民疲而不知恤，敗於不暇，何以能濟？昔夫差伐齊，非不克勝，所以危亡，不憂其本也，況彼之爭地乎！」悌曰：「不然。曹操雖功蓋中夏，威震四海，崇詐杖術，征伐無已，民畏其威，而不懷其德也。丕、叡承之，係以慘虐，內興宮室，外懼雄豪，東西驅馳，無歲獲安，彼之失民，爲日乆矣。司馬懿父子，自握其柄，累有大功，除其煩苛而布其平惠，爲之謀主而救其疾，民心歸之，亦已乆矣。故淮南三叛而腹心不擾，曹髦之死，四方不動，摧堅敵如折枯，蕩異同如反掌，任賢使能，各盡其心，非智勇兼人，孰能如之？其威武張矣，本根固矣，羣情服矣，姦計立矣。今蜀閹宦專朝，國無政令，而玩戎黷武，民勞卒弊，競於外利，不脩守備。彼彊弱不同，智筭亦勝，因危而伐，殆其克乎！若其不克，不過無功，終無退北之憂，覆軍之慮也，何爲不可哉？昔楚劒利而秦昭懼，孟明用而晉人憂，彼之得志，故我之大患也。」吳人笑其言，而蜀果降于魏。晉來伐吳，皓使悌督沈瑩、諸葛靚，率衆三萬渡江逆之。至牛渚，沈瑩曰：「晉治水軍於蜀乆矣，今傾國大舉，萬里齊力，必悉益州之衆浮江而下。我上流諸軍，無有戒備，名將皆死，幼少當任，恐邊江諸城，盡莫能禦也。晉之水軍，必至于此矣！宜畜衆力，待來一戰。若勝之日，江西自清，上方雖壞，可還取之。今渡江逆戰，勝不可保，若或摧喪，則大事去矣。」悌曰：「吳之將亡，賢愚所知，非今日也。吾恐蜀兵來至此，衆心必駭懼，不可復整。今宜渡江，可用決戰力爭。若其敗喪，則同死社稷，無所復恨。若其克勝，則北敵奔走，兵勢萬倍，便當乘威南上，逆之中道，不憂不破也。若如子計，恐行散盡，相與坐待敵到，君臣俱降，無復一人死難者，不亦辱乎！」遂渡江戰，吳軍大敗。諸葛靚與五六百人退走，使過迎悌，悌不肯去，靚自往牽之，謂曰：「且夫天下存亡有大數，豈卿一人所知，如何故自取死爲？」悌垂涕曰：「仲思，今日是我死日也。且我作兒童時，便爲卿家丞相所拔，常恐不得其死，負名賢知顧。今以身徇社稷，復何遁邪？莫牽曳之如是。」靚流涕放之，去百餘步，已見爲晉軍所殺。《吳錄》曰：悌少知名，及處大任，希合時趣，將護左右，清論譏之。《搜神記》曰：臨海松陽人柳榮從悌至楊府，榮病死船中二日，時軍已上岸，無有埋之者，忽然大呼，言「人縛軍師！人縛軍師！」聲激揚，遂活。人問之，榮曰：「上天北斗門下卒見人縛張悌，意中大愕，不覺大呼，言『何以縛張軍師。』門下人怒榮，叱逐使去。榮便去，怖懼，口餘聲發揚耳。」其日，悌戰死。榮至晉元帝時猶在。
