  text: 葛洪《抱朴子》曰：吳景帝時，戍將於廣陵掘諸冢，取版以治城，所壞甚多。後發一大冢，內有重閤，戶扇皆樞轉可開閉，四周爲徼道通車，其高可以乘馬。又鑄銅爲人數十枚，長五尺，皆大冠朱衣，執劒列侍靈座，皆刻銅人背後石壁，言殿中將軍，或言侍郎、常侍。似公王之冢。破其棺，棺中有人，髮已班白，衣冠鮮明，面體如生人。棺中雲母厚尺許，以白玉璧三十枚藉尸。兵人輩共舉出死人，以倚冢壁。有一玉長一尺許，形似冬瓜，從死人懷中透出墮地。兩耳及鼻孔中，皆有黃金如棗許大，此則骸骨有假物而不朽之効也。
