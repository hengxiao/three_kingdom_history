  type: pei
  text: 《江表傳》曰：初丹楊刁玄使蜀，得司馬徽與劉廙論運命歷數事。玄詐增其文以誑國人曰：「黃旗紫蓋見於東南，終有天下者，荊、揚之君乎！」又得中國降人，言壽春下有童謠曰「吳天子當上」。皓聞之，喜曰：「此天命也。」即載其母妻子及後宮數千，從牛渚陸道西上，云青蓋入洛陽，以順天命。行遇大雪，道塗陷壞，兵士被甲持仗，百人共引一車，寒凍殆死。兵人不堪，皆曰：「若遇敵便當倒戈耳。」皓聞之，乃還。
