  text: 《漢晉春秋》曰：先是，吳有說讖者曰：「吳之敗，兵起南裔，亡吳者公孫也。」皓聞之，文武職位至于卒伍有姓公孫者，皆徙於廣州，不令停江邊。及聞馬反，大懼曰：「此天亡也。」
