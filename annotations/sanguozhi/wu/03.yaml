  length: 0
  type: pei
  text: 吳平後，晉侍中庾峻等問皓侍中李仁曰：「聞吳主披人面，刖人足，有諸乎？」仁曰：「以告者過也。君子惡居下流，天下之惡皆歸焉。蓋此事也，若信有之，亦不足能恠。昔唐、虞五刑，三代七辟，肉刑之制，未爲酷虐。皓爲一國之主，秉殺生之柄，罪人陷法，加之以懲，何足多罪！夫受堯誅者不能無怨，受桀賞者不能無慕，此人情也。」又問曰：「云歸命侯乃惡人橫睛逆視，皆鑿其眼，有諸乎？」仁曰：「亦無此事，傳之者謬耳。曲禮曰視天子由袷以下，視諸侯由頤以下，視大夫由衡，視士則平面，得游目五步之內；視上於衡則傲，下於帶則憂，旁則邪。以禮視瞻，高下不可不慎，況人君乎哉？視人君相迕，是乃禮所謂傲慢；傲慢則無禮，無禮則不臣，不臣則犯罪，犯罪則陷不測矣。正使有之，將有何失？」凡仁所荅，峻等皆善之，文多不悉載。
