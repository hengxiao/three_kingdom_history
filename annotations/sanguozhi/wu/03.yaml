  length: 0
  type: pei
  text: 《漢晉春秋》曰：初霍弋遣楊稷、毛炅等戍，與之誓曰：「若賊圍城，未百日而降者，家屬誅；若過百日而城沒者，刺史受其罪。」稷等日未滿而糧盡，乞降於璜。璜不許，而給糧使守。吳人並諫，璜曰：「霍弋已死，無能來者，可須其糧盡，然後乃受，使彼來無罪，而我取有義，內訓吾民，外懷鄰國，不亦可乎！」稷、炅糧盡，救不至，乃納之。華陽國志曰：稷，犍爲人。炅，建寧人。稷等城中食盡，死亡者半，將軍王約反降，吳人得入城，獲稷、炅，皆囚之。孫皓使送稷下都，稷至合浦，歐血死。晉追贈交州刺史。初，毛炅與吳軍戰，殺前部督脩則。陶璜等以炅壯勇，欲赦之。而則子允固求殺炅，炅亦不爲璜等屈，璜等怒，靣縛炅詰之，曰：「晉兵賊！」炅厲聲曰：「吳狗，何等爲賊？」吳人生剖其腹，允割其心肝，罵曰：「庸復作賊？」炅猶罵不止，曰：「尚欲斬汝孫皓，汝父何死狗也！」乃斬之。晉武帝聞而哀矜，即詔使炅長子襲爵，餘三子皆關內侯。此與漢晉春秋所說不同。
- id: wu.3.p30.a3
  anchor: wu.3.p30
  at: 107
  length: 0
  type: pei
  text: 《吳錄》曰：仁字恭武，江夏人也，本名宗，避皓字，易焉。少從南陽李肅學。其母爲作厚褥大被，或問其故，母曰：「小兒無德致客，學者多貧，故爲廣被，庶可得與氣類接也。」其讀書夙夜不懈，肅奇之，曰：「卿宰相器也。」初爲驃騎將軍朱據軍吏，將母在營。旣不得志，又夜雨屋漏，因起涕泣，以謝其母，母曰：「但當勉之，何足泣也？」據亦稍知之，除爲塩池司馬。自能結網，手以捕魚，作鮓寄母，母因以還之，曰：「汝爲魚官，而以鮓寄我，非避嫌也。」遷吳令。時皆不得將家之官，每得時物，來以寄母，常不先食。及聞母亡，犯禁委官，語在權傳。特爲減死一等，復使爲官，蓋優之也。楚國先賢傳曰：宗母嗜筍，冬節將至。時筍尚未生，宗入竹林哀歎，而筍爲之出，得以供母，皆以爲至孝之所致感。累遷光祿勳，遂至公矣。
