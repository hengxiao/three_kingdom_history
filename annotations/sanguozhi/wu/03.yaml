  text: 太康三年〈地記〉曰：吳有太初宮，方三百丈，權所起也。昭明宮方五百丈，皓所作也。避晉諱，故曰顯明。《吳歷》云：顯明在太初之東。《江表傳》曰：皓營新宮，二千石以下皆自入山督攝伐木。又破壞諸營，大開園囿，起土山樓觀，窮極伎巧，功役之費以億萬計。陸凱固諫，不從。
