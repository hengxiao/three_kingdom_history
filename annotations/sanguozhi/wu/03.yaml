  type: pei
  text: 《江表傳》載皓將敗，與舅何植書曰：「昔大皇帝以神武之略，奮三千之卒，割據江南，席卷交、廣，開拓洪基，欲祚之萬世。至孤末德，嗣守成緒，不能懷集黎元，多爲咎闕，以違天度。闇昧之變，反謂之祥，致使南蠻逆亂，征討未克。聞晉大衆，遠來臨江，庶竭勞瘁，衆皆摧退，而張悌不反，喪軍過半。孤甚愧悵，于今無聊。得陶濬表云武昌以西並復不守。不守者，非糧不足，非城不固，兵將背戰耳。兵之背戰，豈怨兵邪？孤之罪也。天文縣變於上，士民憤歎於下，觀此事勢，危如累卵，吳祚終訖，何其局哉！天匪亡吳，孤所招也。瞑目黃壤，當復何顏見四帝乎！公其勗勉奇謨，飛筆以聞。」皓又遺羣臣書曰：「孤以不德，忝繼先軌。處位歷年，政教凶勃，遂令百姓乆困塗炭，至使一朝歸命有道，社稷傾覆，宗廟無主，慙愧山積，沒有餘罪。自惟空薄，過偷尊號，才瑣質穢，任重王公，故周易有折鼎之誡，詩人有彼其之譏。自居宮室，仍抱篤疾，計有不足，思慮失中，多所荒替。邊側小人，因生酷虐，虐毒橫流，忠順被害。闇昧不覺，尋其壅蔽，孤負諸君，事已難圖，覆水不可收也。今大晉平治四海，勞心務於擢賢，誠是英俊展節之秋也。管仲極讎，桓公用之，良、平去楚，入爲漢臣，舍亂就理，非不忠也。莫以移朝改朔，用損厥志。嘉勗休尚，愛敬動靜。夫復何言，投筆而已！」
