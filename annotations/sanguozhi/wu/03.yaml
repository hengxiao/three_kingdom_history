  text: 《楚國先賢傳》曰：石偉字公操，南郡人。少好學，脩節不怠，介然獨立，有不可奪之志。舉茂才、賢良方正，皆不就。孫休即位，特徵偉，累遷至光祿勳。及皓即位，朝政昏亂，偉乃辭老耄痼疾乞身，就拜光祿大夫。吳平，建威將軍王戎親詣偉。太康二年，詔曰：「吳故光祿大夫石偉，秉志清白，皓首不渝，難處危亂，廉節可紀。年已過邁，不堪遠涉，其以偉爲議郎，加二千石秩，以終厥世。」偉遂陽狂及盲，不受晉爵。年八十三，太熙元年卒。
