- id: wu.12.p9.a1
  anchor: wu.12.p9
  at: 199
  length: 0
  type: pei
  text: 《翻别传》曰：权即尊号，翻因上书曰：“陛下膺明圣之德，体舜、禹之孝，历运当期，顺天济物。奉承策命，臣独抃舞。罪弃两绝，拜贺无阶，仰瞻宸极，且喜且悲。臣伏自刻省，命轻雀鼠，性輶毫釐，罪恶莫大，不容於诛，昊天罔极，全宥九载，退当念戮，频受生活，复偷视息。臣年耳顺，思咎忧愤，形容枯悴，发白齿落，虽未能死，自悼终没，不见宫阙百官之富，不睹皇舆金轩之饰，仰观巍巍众民之谣，傍听锺鼓侃然之乐，永陨海隅，弃骸绝域，不胜悲慕，逸豫大庆，悦以忘罪。”
- id: wu.12.p10.a1
  anchor: wu.12.p10
  at: 40
  length: 0
  type: pei
  text: 《会稽典录》曰：◎览字孝连，八岁而孤，家又单微，清身立行，用意不苟，推财从弟，以义让称。仕郡至功曹，守始平长。为人精微絜净，门无杂宾。孙权深贵待之，未及擢用，会病卒，甚见痛惜，殊其门户。览子固，字子贱，本名密，避滕密，改作固。固在襁褓中，阚泽见而异之，曰：“此兒后必致公辅。”固少丧父，独与母居，家贫守约，色养致敬，族弟孤弱，与同寒温。翻与固同僚书曰：“丁子贱塞渊好德，堂构克举，野无遗薪，斯之为懿，其美优矣。令德之后，惟此君嘉耳。”历显位，孙休时固为左御史大夫，孙皓即位，迁司徒。皓悖虐，固与陆凯、孟宗同心忧国，年七十六卒。子弥，字钦远，仕晋，至梁州刺史。孙潭，光禄大夫。◎徐陵字元大，历三县长，所在著称，迁零陵太守。时朝廷俟以列卿之位，故翻书曰：“元大受上卿之遇，叔向在晋，未若於今。”其见重如此。陵卒，僮客土田或见侵夺，骆统为陵家讼之，求与丁览、卜清等为比，权许焉。陵子平，字伯先，童龀知名，翻甚爱之，屡称叹焉。诸葛恪为丹杨太守，讨山越，以平威重思虑，可与效力，请平为丞，稍迁武昌左部督，倾心接物，士卒皆为尽力。初，平为恪从事，意甚薄，及恪辅政，待平益疏。恪被害，子建亡走，为平部曲所得，平使遣去，别为佗军所获。平两妇归宗，敬奉情过乎厚。其行义敦笃，皆此类也。
- id: wu.12.p10.a2
  anchor: wu.12.p10
  at: 51
  length: 0
  type: pei
  text: 《吴书》曰：翻虽在徙弃，心不忘国，常忧五谿宜讨，以辽东海绝，听人使来属，尚不足取，今去人财以求马，既非国利，又恐无获。欲谏不敢，作表以示吕岱，岱不报，为爱憎所白，复徙苍梧猛陵。《江表传》曰：后权遣将士至辽东，於海中遭风，多所没失，权悔之，乃令曰：“昔赵简子称诸君之唯唯，不如周舍之谔谔。虞翻亮直，善於尽言，国之周舍也。前使翻在此，此役不成。”促下问交州，翻若尚存者，给其人船，发遣还都；若以亡者，送丧还本郡，使兒子仕宦。会翻已终。
- id: wu.12.p11.a1
  anchor: wu.12.p11
  at: 43
  length: 0
  type: pei
  text: 《会稽典录》曰：汜字世洪，生南海，年十六，父卒，还乡里。孙綝废幼主，迎立琅邪王休。休未至，綝欲入宫，图为不轨，召百官会议，皆惶怖失色，徒唯唯而已。汜对曰：“明公为国伊周，处将相之位，擅废立之威，将上安宗庙，下惠百姓，大小踊跃，自以伊霍复见。今迎王未至，而欲入宫，如是，群下摇荡，众听疑惑，非所以永终忠孝，扬名后世也。”綝不怿，竟立休。休初即位，汜与贺邵、王蕃、薛莹俱为散骑中常侍。以讨扶严功拜交州刺史、冠军将军、餘姚侯，寻卒。
- id: wu.12.p11.a2
  anchor: wu.12.p11
  at: 52
  length: 0
  type: pei
  text: 《会稽典录》曰：忠字世方，翻第五子。贞固幹事，好识人物，造吴郡陆机於童龀之年，称上虞魏迁於无名之初，终皆远致，为著闻之士。交同县王岐於孤宦之族，仕进先至宜都太守，忠乃代之。晋征吴，忠与夷道监陆晏、晏弟中夏督景坚守不下，城溃被害。忠子谭，字思奥。《晋阳秋》称谭清贞有检操，外如退弱，内坚正有胆幹。仕晋，历位内外，终於卫将军，追赠侍中左光禄大夫，开府仪同三司。
- id: wu.12.p11.a3
  anchor: wu.12.p11
  at: 72
  length: 0
  type: pei
  text: 《会稽典录》曰：耸字世龙，翻第六子也。清虚无欲，进退以礼，在吴历清官，入晋，除河间相，王素闻耸名，厚敬礼之。耸抽引人物，务在幽隐孤陋之中。时王岐难耸，以高士所达，必合秀异，耸书与族子察曰：“世之取士，曾不招未齿於丘园，索良才於总猥，所誉依已成，所毁依已败，此吾所以叹息也。”耸疾俗丧祭无度，弟昺卒，祭以少牢，酒饭而已，当时族党并遵行之。
- id: wu.12.p11.a4
  anchor: wu.12.p11
  at: 84
  length: 0
  type: pei
  text: 《会稽典录》曰：昺字世文，翻第八子也。少有倜傥之志，仕吴黄门郎，以捷对见异，超拜尚书侍中。晋军来伐，遣昺持节都督武昌已上诸军事，昺先上还节盖印绶，然后归顺。在济阴，抑强扶弱，甚著威风。
