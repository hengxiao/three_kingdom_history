  type: pei
  text: 《吴书》曰：后权与魏和，欲遣禁还归北，翻复谏曰：“禁败数万众，身为降虏，又不能死。北习军政，得禁必不如所规。还之虽无所损，犹为放盗，不如斩以令三军，示为人臣有二心者。”权不听。群臣送禁，翻谓禁曰：“卿勿谓吴无人，吾谋適不用耳。”禁虽为翻所恶，然犹盛叹翻，魏文帝常为翻设虚坐。
