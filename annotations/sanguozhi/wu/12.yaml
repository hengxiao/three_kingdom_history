  type: pei
  text: 《吴书》曰：策薨，权统事。定武中郎将暠，策之从兄也，屯乌程，整帅吏士，欲取会稽。会稽闻之，使民守城以俟嗣主之命，因令人告谕暠。《会稽典录》载翻说暠曰：“讨逆明府，不竟天年。今摄事统众，宜在孝廉，翻已与一郡吏士，婴城固守，必欲出一旦之命，为孝廉除害，惟执事图之。”於是暠退。臣松之案：此二书所说策亡之时，翻犹为功曹，与本传不同。
