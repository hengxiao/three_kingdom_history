  text: 《会稽典录》曰：餘姚虞俊叹曰：“张惠恕才多智少，华而不实，怨之所聚，有覆家之祸，吾见其兆矣。”诸葛亮闻俊忧温，意未之信，及温放黜，亮乃叹俊之有先见。亮初闻温败，未知其故，思之数日，曰：“吾已得之矣，其人於清浊太明，善恶太分。”臣松之以为庄周云“名者公器也，不可以多取”，张温之废，岂其取名之多乎！多之为弊，古贤既知之矣。是以远见之士，退藏於密，不使名浮於德，不以华伤其实，既不能被褐韫宝，挫廉逃誉，使才映一世，声盖人上，冲用之道，庸可暂替！温则反之，能无败乎？权既疾温名盛，而骆统方骤言其美，至云“卓跞冠群，炜晔曜世，世人未有及之者也”。斯何异燎之方盛，又捴膏以炽之哉！《文士传》曰：温姊妹三人皆有节行，为温事，已嫁者皆见录夺。其中妹先適顾承，官以许嫁丁氏，成婚有日，遂饮药而死。吴朝嘉叹，乡人图画，为之赞颂云。
