  text: 谢承《后汉书》曰：俊字孝远，有文武才幹，少为郡吏，察孝廉，补尚书郎，擢拜陈相。值袁术僭号，兄弟忿争，天下鼎沸，群贼并起，陈与比界，奸慝四布，俊厉威武，保疆境，贼不敢犯。养济百姓，灾害不生，岁获丰稔。后术军众饥困，就俊求粮。俊疾恶术，初不应答。术怒，密使人杀俊。
