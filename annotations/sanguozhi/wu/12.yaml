  at: 130
  length: 0
  type: pei
  text: 《吴书》曰：策讨山越，斩其渠帅，悉令左右分行逐贼，独骑与翻相得山中。翻问左右安在，策曰：“悉行逐贼。”翻曰：“危事也！”令策下马：“此草深，卒有惊急，马不及萦策，但牵之，执弓矢以步。翻善用矛，请在前行。”得平地，劝策乘马。策曰：“卿无马奈何？”答曰：“翻能步行，日可二百里，自征讨以来，吏卒无及翻者，明府试跃马，翻能疏步随之。”行及大道，得一鼓吏，策取角自鸣之，部曲识声，小大皆出，遂从周旋，平定三郡。《江表传》曰：策讨黄祖，旋军欲过取豫章，特请翻语曰：“华子鱼自有名字，然非吾敌也。加闻其战具甚少，若不开门让城，金鼓一震，不得无所伤害，卿便在前具宣孤意。”翻即奉命辞行，径到郡，请被褠葛巾与（敌）相见，谓歆曰：“君自料名声之在海内，孰与鄙郡故王府君？”歆曰：“不及也。”翻曰：“豫章资粮多少？器仗精否？士民勇果孰与鄙郡？”又曰：“不如也。”翻曰：“讨逆将军智略超世，用兵如神，前走刘扬州，君所亲见，南定鄙郡，亦君所闻也。今欲守孤城，自料资粮，已知不足，不早为计，悔无及也。今大军已次椒丘，仆便还去，明日日中迎檄不到者，与君辞矣。”翻既去，歆明旦出城，遣吏迎策。策既定豫章，引军还吴，飨赐将士，计功行赏，谓翻曰：“孤昔再至寿春，见马日磾，及与中州士大夫会，语我东方人多才耳，但恨学问不博，语议之间，有所不及耳。孤意犹谓未耳。卿博学洽闻，故前欲令卿一诣许，交见朝士，以折中国妄语兒。卿不原行，便使子纲；恐子纲不能结兒辈舌也。”翻曰：“翻是明府家宝，而以示人，人倘留之，则去明府良佐，故前不行耳。”策笑曰：“然。”因曰：“孤有征讨事，未得还府，卿复以功曹为吾萧何，守会稽耳。”后三日，便遣翻还郡。臣松之以为王、华二公於扰攘之时，抗猛锐之锋，俱非所能。歆之名德，实高於朗，而《江表传》述翻说华，云“海内名声，孰与於王”，此言非也。然王公拒战，华逆请服，实由孙策初起，名微众寡，故王能举兵，岂武胜哉？策后威力转盛，势不可敌，华量力而止，非必用仲翔之说也。若使易地而居，亦华战王服耳。按吴历载翻谓歆曰：“窃闻明府与王府君齐名中州，海内所宗，虽在东垂，常怀瞻仰。”歆答曰：“孤不如王会稽。”翻复问：“不审豫章精兵，何如会稽？”对曰：“大不如也。”翻曰：“明府言不如王会稽，谦光之谭耳；精兵不如会稽，实如尊教。”因述孙策才略殊异，用兵之奇，歆乃答云当去。翻出，歆遣吏迎策。二说有不同，〔此说为胜也〕。
