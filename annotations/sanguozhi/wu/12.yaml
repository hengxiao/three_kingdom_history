  text: 绩於鬱林所生女，名曰鬱生，適张温弟白。姚信《集》有表称之曰：“臣闻唐、虞之政，举善而教，旌德擢异，三王所先，是以忠臣烈士，显名国朝，淑妇贞女，表迹家闾。盖所以阐崇化业，广殖清风，使苟有令性，幽明俱著，苟怀懿姿，士女同荣。故王蠋建寒松之节而齐王表其里，义姑立殊绝之操而鲁侯高其门。臣切见故鬱林太守陆绩女子鬱生，少履贞特之行，幼立匪石之节，年始十三，適同郡张白。侍庙三月，妇礼未卒，白遭罹家祸，迁死异郡。鬱生抗声昭节，义形於色，冠盖交横，誓而不许，奉白姊妹嶮巇之中，蹈履水火，志怀霜雪，义心固於金石，体信贯於神明，送终以礼，邦士慕则。臣闻昭德以行，显行以爵，苟非名爵，则劝善不严，故士之有诔，鲁人志其勇，杞妇见书，齐人哀其哭。乞蒙圣朝，斟酌前训，上开天聪，下垂坤厚，褒鬱生以义姑之号，以厉两髦之节，则皇风穆暢，士女改视矣。”
