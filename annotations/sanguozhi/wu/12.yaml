  text: 殷基《通语》载据争曰：“臣闻太子国之本根，雅性仁孝，天下归心，今卒责之，将有一朝之虑。昔晋献用骊姬而申生不存，汉武信江充而戾太子冤死。臣窃惧太子不堪其忧，虽立思子之宫，无所复及矣。”
