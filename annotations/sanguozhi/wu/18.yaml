  type: pei
  text: 《吳錄》曰：範獨心計，所以見重者術，術亡則身棄矣，故終不言。
- id: wu.18.p9.a1
  anchor: wu.18.p9
  at: 246
  length: 0
  type: pei
  text: 《會稽典錄》曰：滕字周林，祖父河內太守朗，字少英，列在八俊。滕性剛直，行不苟合，雖遭困偪，終不迴撓。初亦迕策，幾殆，賴太妃救得免，語見《妃嬪傳》。歷歷山、潘陽、山陰三縣令，鄱陽太守。
