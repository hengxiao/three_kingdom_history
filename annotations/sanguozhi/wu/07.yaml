  text: 吴录曰：全琮父子屡言芍陂之役为典军陈恂诈增张休、顾承之功，而休、承与恂通情。休坐系狱，权为谭故，沉吟不决，欲令谭谢而释之。及大会，以问谭，谭不谢，而曰：「陛下，谗言其兴乎！」江表传曰：有司奏谭诬罔大不敬，罪应大辟。权以雍故，不致法，皆徙之。
