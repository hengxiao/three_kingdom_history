  type: pei
  text: 吳書曰：肅字偉恭，南陽人。少以才聞，善論議，臧否得中，甄奇錄異，薦述後進，題目品藻，曲有條貫，眾人以此服之。權擢以為〔選曹尚書〕，選舉號為得才。求出補吏，為桂陽太守，吏民悅服。徵為卿。會卒，知與不知，並痛惜焉。
