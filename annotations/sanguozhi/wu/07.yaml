  text: 典略曰：余曩闻刘荆州尝自作书欲与孙伯符，以示祢正平，正平蚩之，言：「如是为欲使孙策帐下兒读之邪，将使张子布见乎？」如正平言，以为子布之才高乎？虽然，犹自蕴藉典雅，不可谓之无笔迹也。加闻吴中称谓之仲父，如此，其人信一时之良幹，恨其不於嵩岳等资，而乃播殖於会稽。
