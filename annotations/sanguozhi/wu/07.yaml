  text: 吴录曰：裕一名穆，终宜都太守。裕子荣。晋书曰：荣字彦先，为东南名士，仕吴为黄门郎，在晋历显位。元帝初镇江东，以荣为军司马，礼遇甚重。卒，表赠侍中、骠骑将军、仪同三司。荣兄子禺，字孟著，少有名望，为散骑侍郎，早卒。吴书曰：雍母弟徽。字子叹，少游学，有脣吻。孙权统事，闻徽有才辩，召署主簿。尝近出行，见营军将一男子至巿行刑，问之何罪，云盗百钱，徽语使住。须臾，驰诣阙陈启：「方今畜养士众以图北虏，视此兵丁壮健兒，且所盗少，愚乞哀原。」权许而嘉之。转东曹掾。或传曹公欲东，权谓徽曰：「卿孤腹心，今传孟德怀异意，莫足使揣之，卿为吾行。」拜辅义都尉，到北与曹公相见。公具问境内消息，徽应对婉顺，因说江东大丰，山薮宿恶，皆慕化为善，义出作兵。公笑曰：「孤与孙将军一结婚姻，共辅汉室，义如一家，君何为道此？」徽曰：「正以明公与主将义固磐石，休戚共之，必欲知江表消息，是以及耳。」公厚待遣还。权问定云何，徽曰：「敌国隐情，卒难探察。然徽潜采听，方与袁谭交争，未有他意。」乃拜徽巴东太守，欲大用之，会卒。子裕，字季则，少知名，位至镇东将军。雍族人悌，字子通，以孝悌廉正闻於乡党。年十五为郡吏，除郎中，稍迁偏将军。权末年，嫡庶不分，悌数与骠骑将军硃据共陈祸福，言辞切直，朝廷惮之。待妻有礼，常夜入晨出，希见其面。尝疾笃，妻出省之，悌命左右扶起，冠帻加袭，起对，趣令妻还，其贞洁不渎如此。悌父向历四县令，年老致仕，悌每得父书，常洒扫，整衣服，更设几筵，舒书其上，拜跪读之，每句应诺，毕，复再拜。若父有疾耗之问至，则临书垂涕，声语哽咽。父以寿终，悌饮浆不入口五日。权为作布衣一袭，皆摩絮著之，强令悌释服。悌虽以公议自割，犹以不见父丧，常画壁作棺柩象，设神座於下，每对之哭泣，服未阕而卒。悌四子：彦、礼、谦、祕。秘，晋交州刺史。祕子众，尚书仆射。
