  at: 139
  length: 0
  type: pei
  text: 吴书曰：是时天下分裂，擅命者众。孙策莅事日浅，恩泽未洽，一旦倾陨，士民狼狈，颇有同异。及昭辅权，绥抚百姓，诸侯宾旅寄寓之士，得用自安。权每出征，留昭镇守，领幕府事。后黄巾贼起，昭讨平之。权征合肥，命昭别讨匡琦，又督领诸将，攻破豫章贼率周凤等於南城。自此希复将帅，常在左右，为谋谟臣。权以昭旧臣，待遇尤重。
