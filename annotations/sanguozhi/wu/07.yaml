  text: 吴书曰：初，瑾为大将军，而弟亮为蜀丞相，二子恪、融皆典戎马，督领将帅，族弟诞又显名於魏，一门三方为冠盖，天下荣之。谨才略虽不及弟，而德行尤纯。妻死不改娶，有所爱妾，生子不举，其笃慎皆如此。
