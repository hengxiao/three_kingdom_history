  text: 时汝南主簿应劭议宜为旧君讳，论者皆互有异同，事在《风俗通》。昭著论曰：「客有见大国之议，士君子之论，云起元建武已来，旧君名讳五十六人，以为后生不得协也。取乎经论，譬诸行事，义高辞丽，甚可嘉羡。愚意褊浅，窃有疑焉。盖乾坤剖分，万物定形，肇有父子君臣之经。故圣人顺天之性，制礼尚敬，在三之义，君实食之，在丧之哀，君亲临之，厚莫重焉，恩莫大焉，诚臣子所尊仰，万夫所天恃，焉得而同之哉？然亲亲有衰，尊尊有杀，故礼服上不尽高祖，下不尽玄孙。又传记四世而缌麻，服之穷也；五世袒免，降杀同姓也；六世而亲属竭矣。又曲礼有不逮事之义则不讳，不讳者，盖名之谓，属绝之义，不拘於协，况乃古君五十六哉！邾子会盟，季友来归，不称其名，咸书字者，是时鲁人嘉之也。何解臣子为君父讳乎？周穆王讳满，至定王时有王孙满者，其为大夫，是臣协君也。又厉王讳胡，及庄王之子名胡，其比众多。夫类事建议，经有明据，传有徵案，然后进攻退守，万无奔北，垂示百世，永无咎失。今应劭虽上尊旧君之名，而下无所断齐，犹归之疑云。曲礼之篇，疑事无质，观省上下，阙义自证，文辞可为，倡而不法，将来何观？言声一放，犹拾瀋也，过辞在前，悔其何追！」
