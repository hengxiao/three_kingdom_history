  text: 吴录曰：曹真、夏侯尚等围硃然於江陵，又分据中州，瑾以大兵为之救援。瑾性弘缓，推道理，任计画，无应卒倚伏之术，兵久不解，权以此望之。及春水生，潘璋等作水城於上流，瑾进攻浮桥，真等退走。虽无大勋，亦以全师保境为功。
