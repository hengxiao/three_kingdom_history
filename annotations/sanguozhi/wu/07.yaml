  anchor: wu.7.p39
  at: 46
  length: 0
  type: pei
  text: 吳錄云：騭表言曰：「北降人王潛等說，北相部伍，圖以東向，多作布囊，欲以盛沙塞江，以大向荊州。夫備不豫設，難以應卒，宜為之防。」權曰：「此曹衰弱，何能有圖？必不敢來。若不如孤言，當以牛千頭，為君作主人。」後有呂範、諸葛恪為說騭所言，云：「每讀歩騭表，輒失笑。此江與開闢俱生，寧有可以沙囊塞理也！」
