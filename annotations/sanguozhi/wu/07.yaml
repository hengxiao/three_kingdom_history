  text: 江表传曰：权既即尊位，请会百官，归功周瑜。昭举笏欲褒赞功德，未及言，权曰：「如张公之计，今已乞食矣。」昭大惭，伏地流汗。昭忠謇亮直，有大臣节，权敬重之，然所以不相昭者，盖以昔駮周瑜、鲁肃等议为非也。臣松之以为张昭劝迎曹公，所存岂不远乎？夫其扬休正色，委质孙氏，诚以厄运初遘，涂炭方始，自策及权，才略足辅，是以尽诚匡弼，以成其业，上籓汉室，下保民物；鼎峙之计，本非其志也。曹公仗顺而起，功以义立，冀以清一诸华，拓平荆郢，大定之机，在於此会。若使昭议获从，则六合为一，岂有兵连祸结，遂为战国之弊哉！虽无功於孙氏，有大当於天下矣。昔窦融归汉，与国升降；张鲁降魏，赏延于世。况权举全吴，望风顺服，宠灵之厚，其可测量哉！然则昭为人谋，岂不忠且正乎！
