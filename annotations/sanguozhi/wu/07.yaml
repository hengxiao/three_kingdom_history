  length: 0
  type: pei
  text: 吳書曰：晉有大夫楊食採於歩，後有歩叔，與七十子師事仲尼。秦漢之際有為將軍者，以功封淮陰侯，騭其後也。
- id: wu.7.p28.a2
  anchor: wu.7.p28
  at: 53
  length: 0
  type: pei
  text: 吳書曰：騭博研道藝，靡不貫覽，性寬雅沈深，能降志辱身。
- id: wu.7.p29.a1
  anchor: wu.7.p29
  at: 11
  length: 0
  type: pei
  text: 吳錄曰：征羌名矯，嘗為征羌令。
- id: wu.7.p29.a2
  anchor: wu.7.p29
  at: 217
  length: 0
  type: pei
  text: 吳錄曰：衛旌字子旗，官至尚書。
