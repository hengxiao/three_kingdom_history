  text: 礼子基作通语曰：礼字德嗣，弱不好弄，潜识过人。少为郡吏，年十九，守吴县丞。孙权为王，召除郎中。后与张温俱使蜀，诸葛亮甚称叹之。稍迁至零陵太守，卒官。文士传曰：礼子基，无难督，以才学知名，著通语数十篇。有三子。巨字元大，有才器，初为吴偏将军，统家部曲，城夏口，吴平后，为苍梧太守。少子祐，字庆元，吴郡太守。
