  type: pei
  text: 吳書曰：歲餘，騭以疾免，與琅邪諸葛瑾、彭城嚴畯俱遊吳中，並著聲名，為當時英俊。
- id: wu.7.p30.a2
  anchor: wu.7.p30
  at: 29
  length: 0
  type: pei
  text: 吳書曰：權為徐州牧，以騭為治中從事，舉茂才。
