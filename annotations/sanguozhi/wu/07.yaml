  length: 0
  type: pei
  text: 臣松之以为魏明帝一时明主，政自己出，孙权此论，竟为无徵，而史载之者，将以主幼国疑，威柄不一，乱亡之形，有如权言，宜其存录以为鉴戒。或当以虽失之於明帝，而事著於齐王，齐王之世，可不谓验乎！不敢显斥，抑足表之微辞。
