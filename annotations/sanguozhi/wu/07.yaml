  text: 吴书曰：融字叔长，生於宠贵，少而骄乐，学为章句，博而不精，性宽容，多技艺，数以巾褐奉朝请，后拜骑都尉。赤乌中，诸郡出部伍，新都都尉陈表、吴郡都尉顾承各率所领人会佃毗陵，男女各数万口。表病死，权以融代表，后代父瑾领摄。
