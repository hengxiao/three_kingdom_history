  text: 陆机为谭传曰：宣太子正位东宫，天子方隆训导之义，妙简俊彦，讲学左右。时四方之杰毕集，太傅诸葛恪等雄奇盖众，而谭以清识绝伦，独见推重。自太尉范慎、谢景、羊徽之徒，皆以秀称其名，而悉在谭下。
