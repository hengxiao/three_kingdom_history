  text: 吴书曰：其先葛氏，本琅邪诸县人，后徙阳都。阳都先有姓葛者，时人谓之诸葛，因以为氏。瑾少游京师，治毛诗、尚书、左氏春秋。遭母忧，居丧至孝，事继母恭谨，甚得人子之道。风俗通曰：葛婴为陈涉将军，有功而诛，孝文帝追录，封其孙诸县侯，因并氏焉。此与吴书所说不同。
