  at: 304
  length: 0
  type: pei
  text: 江表传曰：灌常令中书郎诣雍，有所咨访。若合雍意，事可施行，即与相反覆，究而论之，为设酒食。如不合意，雍即正色改容，默然不言，无所施设，即退告。权曰：「顾公欢悦，是事合宜也；其不言者，是事未平也，孤当重思之。」其见敬信如此。江边诸将，各欲立功自效，多陈便宜，有所掩袭。权以访雍，雍曰：「臣闻兵法戒於小利，此等所陈，欲邀功名而为其身，非为国也，陛下宜禁制。苟不足以曜威损敌，所不宜听也。」权从之。军国得失，行事可不，自非面见，口未尝言之。
- id: wu.7.p13.a2
  anchor: wu.7.p13
  at: 470
  length: 0
  type: pei
  text: 江表传曰：权嫁从女，女顾氏甥，故请雍父子及孙谭，谭时为选曹尚书，见任贵重。是日，权极欢。谭醉酒，三起舞，舞不知止。雍内怒之。明日，召谭，诃责之曰：「君王以含垢为德，臣下以恭谨为节。昔萧何、吴汉并有大功，何每见高帝，似不能言；汉奉光武，亦信恪勤。汝之於国，宁有汗马之劳，可书之事邪？但阶门户之资，遂见宠任耳，何有舞不复知止？虽为酒后，亦由恃恩忘敬，谦虚不足。损吾家者必尔也。」因背向壁卧，谭立过一时，乃见遣。徐众评曰：雍不以吕壹见毁之故，而和颜悦色，诚长者矣。然开引其意，问所欲道，此非也。壹奸险乱法，毁伤忠贤，吴国寒心，自太子登、陆逊已下，切谏不能得，是以潘濬欲因会手剑之，以除国患，疾恶忠主，义形於色，而今乃发起令言。若壹称枉邪，不申理，则非录狱本旨；若承辞而奏之，吴主傥以敬丞相所言，而复原宥，伯言、承明不当悲慨哉！怀叙本无私恨，无所为嫌，故詈辱之，疾恶意耳，恶不仁者，其为仁也。季武子死，曾点倚其门而歌；子晳创发，子产催令自裁。以此言之，雍不当责怀叙也。
