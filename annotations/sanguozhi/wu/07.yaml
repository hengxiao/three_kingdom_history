  length: 0
  type: pei
  text: 臣松之云：以为刘后以庸蜀为关河，荆楚为维翰，关羽扬兵沔、汉，志陵上国，虽匡主定霸，功未可必，要为威声远震，有其经略。孙权潜包祸心，助魏除害，是为翦宗子勤王之师，行曹公移都之计，拯汉之规，於兹而止。义旗所指，宜其在孙氏矣。瑾以大义责备，答之何患无辞；且备、羽相与，有若四体，股肱横亏，愤痛已深，岂此奢阔之书所能回驻哉！载之於篇，实为辞章之费。
