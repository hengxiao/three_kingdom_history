  anchor: wu.7.p23
  at: 227
  length: 0
  type: pei
  text: 江表传曰：瑾之在南郡，人有密谗瑾者。此语颇流闻於外，陆逊表保明瑾无此，宜以散其意。权报曰：「子瑜与孤从事积年，恩如骨肉，深相明究，其为人非道不行，非义不言。玄德昔遣孔明至吴，孤尝语子瑜曰：‘卿与孔明同产，且弟随兄，於义为顺，何以不留孔明？孔明若留从卿者，孤当以书解玄德，意自随人耳。’子瑜答孤言：‘弟亮以失身於人，委质定分，义无二心。弟之不留，犹瑾之不往也。’其言足贯神明。今岂当有此乎？孤前得妄语文疏，即封示子瑜，并手笔与子瑜，即得其报，论天下君臣大节，一定之分。孤与子瑜，可谓神交，非外言所间也。知卿意至，辄封来表，以示子瑜，使知卿意。」
