  at: 322
  length: 0
  type: pei
  text: 习凿齿曰：张昭於是乎不臣矣！夫臣人者，三谏不从则奉身而退，身苟不绝，何忿懟之有？且秦穆违谏，卒霸西戎，晋文暂怒，终成大业。遗誓以悔过见录，狐偃无怨绝之辞，君臣道泰，上下俱荣。今权悔往之非而求昭，后益回虑降心，不远而复，是其善也。昭为人臣，不度权得道，匡其后失，夙夜匪懈，以延来誉，乃追忿不用，归罪於君，闭户拒命，坐待焚灭，岂不悖哉！
