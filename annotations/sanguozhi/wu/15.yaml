  text: 《会稽典录》曰：景为灭贼校尉，御众严而有恩，兵器精饰，为当时冠绝，早卒。达颇任气，多所犯迕，故虽有征战之劳，而爵位不至，然轻财贵义，胆烈过人。子质，位至虎牙将军。景子邵，别有传。
