- id: wu.15.p45.a1
  anchor: wu.15.p45
  at: 386
  length: 0
  type: pei
  text: 会稽典录曰：牧之在濡须，深以进取可图，而不敢陈其策，与侍中东观令硃育宴，慨然叹息。育谓牧恨於策爵未副，因谓牧曰：「朝廷诸君，以际会坐取高官，亭侯功无与比，不肯在人下，见顾者犹以於邑，况於侯也！」牧笑而答曰：「卿之所言，未获我心也。马援有言，人当功多而赏薄。吾功不足录，而见宠已过当，岂以为恨？国家不深相知，而见害朝人，是以默默不敢有所陈。若其不然，当建进取之计，以报所受之恩，不徒自守而已，愤叹以此也。」育复曰：「国家已自知侯，以侯之才，无为不成。愚谓自可陈所怀。」牧曰：「武安君谓秦王云：『非成业难，得贤难；非得贤难，用之难；非用之难，任之难。』武安君欲为秦王并兼六国，恐授事而不见任，故先陈此言。秦王既许而不能，卒陨将成之业，赐剑杜邮。今国家知吾，不如秦王之知武安，而害吾者有过范睢。大皇帝时，陆丞相讨鄱阳，以二千人授吾，潘太常讨武陵，吾又有三千人，而朝廷下议，弃吾於彼，使江渚诸督，不复发兵相继。蒙国威灵自济，今日何为常。向使吾不料时度宜，苟有所陈，至见委以事，不足兵势，终有败绩之患，何无不成之有？」
- id: wu.15.p46.a1
  anchor: wu.15.p46
  at: 21
  length: 0
  type: pei
  text: 会稽典录曰：牧次子盛，亦履恭让，为尚书郎。弟徇领兵为将，拜偏将军，戍西陵，与监军使者唐盛论地形势，谓宜城、信陵为建平援，若不先城，敌将先入。盛以施绩、留平，智略名将，屡经於彼，無云當城之者，不然徇计。后半年，晋果遣将脩信陵城。晋军平吴，徇领水军督，临陈战死。
