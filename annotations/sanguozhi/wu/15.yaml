  text: 吴书曰：初，琮为将甚勇决，当敌临难，奋不顾身。及作督帅，养威持重，每御军，常任计策，不营小利。江表传曰：权使子登出征，已出军，次于安乐，群臣莫敢谏。琮密表曰：“古来太子未尝偏征也，故从曰抚军，守曰监国。今太子东出，非古制也，臣窃忧疑。”权即从之，命登旋军，议者咸以为琮有大臣之节也。
