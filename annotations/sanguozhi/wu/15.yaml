  text: 《吴书》曰：权谓齐曰：“今定天下，都中国，使殊俗贡珍，狡兽卒舞，非君谁与？”齐曰：“殿下以神武应期，廓开王业，臣幸遭际会，得驱驰风尘之下，佐助末行，效鹰犬之用，臣之原也。若殊俗贡珍，狡兽率舞，宜在圣德，非臣所能。”
