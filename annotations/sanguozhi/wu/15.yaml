  text: 《抱朴子》曰：昔吴遣贺将军讨山贼，贼中有善禁者，每当交战，官军刀剑不得拔，弓弩射矢皆还自向，辄致不利。贺将军长情有思，乃曰：“吾闻金有刃者可禁，虫有毒者可禁，其无刃之物，无毒之虫，则不可禁。彼必是能禁吾兵者也，必不能禁无刃物矣。”乃多作劲木白棓，选有力精卒五千人为先登，尽捉棓。彼山贼恃其有善禁者，了不严备。於是官军以白棓击之，彼禁者果不复行，所击杀者万计。
