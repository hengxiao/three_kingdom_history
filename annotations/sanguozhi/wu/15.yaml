  text: 徐众评曰：礼，子事父无私财，又不敢私施，所以避尊上也。弃命专财而以邀名，未尽父子之礼。臣松之以为子路问“闻斯行诸？”子曰“有父兄在”。琮辄散父财，诚非子道，然士类县命，忧在朝夕，权其轻重，以先人急，斯亦冯暖市义、汲黯振救之类，全谓邀名，或负其心。
