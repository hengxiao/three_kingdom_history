- id: wu.15.p42.a1
  anchor: wu.15.p42
  at: 40
  length: 0
  type: pei
  text: 虞预《晋书》曰：处入晋，为御史中丞，多所弹纠，不避强御。齐万年反，以处为建威将军，西征，众寡不敌，处临陈慷慨，奋不顾身，遂死於战场，追赠平西将军。处子玘、札，皆有才力，中兴之初，并见宠任。其诸子侄悉处列位，为扬土豪右，而札凶淫放恣，为百姓所苦。泰宁中，王敦诛之，灭其族。
- id: wu.15.p43.h1
  anchor: wu.15.p43
  at: 0
  length: 3
  type: person
