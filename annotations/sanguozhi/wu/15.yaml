- id: wu.15.p44.a1
  anchor: wu.15.p44
  at: 22
  length: 0
  type: pei
  text: 会稽典录曰：高凉贼率仍弩等破略百姓，残害吏民，牧越界扑讨，旬日降服。又揭阳县贼率曾夏等众数千人，历十馀年，以侯爵杂缯千匹，下书购募，绝不可得。牧遣使慰譬，登皆首服，自改为良民。始兴太守羊衜与太常滕胤书曰：“锺离子幹吾昔知之不熟，定见其在南海，威恩部伍，智勇分明，加操行清纯，有古人之风。”其见贵如此。在郡四年，以疾去职。
- id: wu.15.p45.t1
  anchor: wu.15.p45
  at: 0
