  text: 虞预《晋书》曰：贺氏本姓庆氏。齐伯父纯，儒学有重名，汉安帝时为侍中、江夏太守，去官，与江夏黄琼、〔广汉〕杨厚俱公车徵。避安帝父孝德皇（帝）讳，改为贺氏。齐父辅，永宁长。
