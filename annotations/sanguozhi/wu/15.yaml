  text: 鍾離牧
  via: primary
- id: wu.15.p43.a1
  anchor: wu.15.p43
  at: 22
  length: 0
  type: pei
  text: 会稽典录曰：牧父绪，楼船都尉，兄骃，上计吏，少与同郡谢赞、吴郡顾谭齐名。牧童龀时号为迟讷，骃常谓人曰：“牧必胜我，不可轻也。”时人皆以为不然。
- id: wu.15.p43.a2
  anchor: wu.15.p43
  at: 106
  length: 0
  type: pei
  text: 《续汉书》曰：宫字少子，琅邪人，尝在蒙阴山中耕种禾黍，临熟，人就认之，宫便推与而去，由是发名，位至左中郎将、侍中。
- id: wu.15.p43.a3
  anchor: wu.15.p43
  at: 225
  length: 0
  type: pei
  text: 徐众评曰：牧蹈长者之规。问者曰：“如牧所行，犯而不校，又从而救之，直而不有，又还而不受，可不谓之仁让乎哉？”答曰：“异乎吾所闻。原宪之问於孔子曰：‘克伐怨欲不行焉，可以为仁乎？’孔子曰：‘可以为难矣，仁则吾不知也。’‘恶不仁者，其为仁矣。’今小民不展四体，而认人之稻，不仁甚矣，而牧推而与之，又救其罪，斯为让非其义，所救非人，非所谓恶不仁者。苟不恶不仁，安得为仁哉！苍梧浇娶妻而美，让於其兄；尾生笃信，水至不去而死；直躬好直，证父攘羊；申鸣奉法，尽忠於君而执其父。忠信直让，此四行者，圣贤之所贵也。然不贵苍梧之让，非让道也；不取尾生之信，非信所也；不许直躬之直，非直体也；不嘉申鸣之忠，非忠意也。今牧犯而不校，还而不取，可以为难矣，未得为仁让也。夫圣人以德报德，以直报怨，而牧欲以德报怨，非也。必不得已，二者何从？吾从孔子也。”
