  text: 《江表传》曰：权征合肥还，为张辽所掩袭於津北，几至危殆。齐时率三千兵在津南迎权。权既入大船，会诸将饮宴，齐下席涕泣而言曰：“至尊人主，常当持重。今日之事，几至祸败，群下震怖，若无天地，原以此为终身诫。”权自前收其泪曰：“大惭！谨以克心，非但书诸绅也。”
