- id: wu.15.p41.a1
  anchor: wu.15.p41
  at: 96
  length: 0
  type: pei
  text: 徐众评曰：夫人臣立功效节，虽非一涂，然各有分也。为将执桴鼓，则有必死之义，志守则有不假器之义，死必得所，义在不苟。鲂为郡守，职在治民，非君所命，自占诱敌，髡剔发肤，以徇功名，虽事济受爵，非君子所美。
