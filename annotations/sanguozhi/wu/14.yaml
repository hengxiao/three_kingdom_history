  type: pei
  text: 《吳書》曰：和少岐嶷有智意，故權尤愛幸，常在左右，衣服禮秩雕玩珍異之賜，諸子莫得比焉。好文學，善騎射，承師涉學，精識聦敏，尊敬師傅，愛好人物。穎等每朝見進賀，和常降意，歡以待之。講校經義，綜察是非，及訪諮朝臣，考績行能，以知優劣，各有條貫。後諸葛壹僞叛以誘魏將諸葛誕，權潛軍待之。和以權暴露外次，又戰者凶事，常憂勞憯怛，不復會同飲食，數上諫，戒令持重，務在全勝，權還，然後敢安。張純字元基，敦之子。《吳錄》曰：純少厲操行，學博才秀，切問捷對，容止可觀。拜郎中，補廣德令，治有異績，擢爲太子輔義都尉。
