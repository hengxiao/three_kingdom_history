  text: 《江表傳》載亮詔曰：「齊王奮前坐殺吏，廢爲庶人，連有赦令，獨不見原，縱未宜復王，何以不侯？又諸孫兄弟作將，列在江渚，孤有兄獨爾云何？」有司奏可，就拜爲侯。
