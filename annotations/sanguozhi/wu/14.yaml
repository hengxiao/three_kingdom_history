  text: 《吳書》載權詔曰：「期運擾亂，凶邪肆虐，威罰有序，干戈不戢。以慮氣志休懿，武略夙昭，必能爲國佐定大業，故授以上將之位，至以殊特之榮，寵以兵馬之勢，委以偏方之任。外欲威振敵虜，厭難萬里，內欲鎮撫遠近，慰卹將士，誠慮建功立事竭命之秋也。慮其內脩文德，外經武訓，持盈若沖，則滿而不溢。敬慎乃心，無忝所受。」
