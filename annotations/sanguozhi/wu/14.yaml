  at: 163
  length: 0
  type: pei
  text: 殷基《通語》曰：初權旣立和爲太子，而封霸爲魯王，初拜猶同宮室，禮秩未分。羣公之議，以爲太子、國王上下有序，禮秩宜異，於是分宮別僚，而隙端開矣。自侍御賔客造爲二端，仇黨疑貳，滋延大臣。丞相陸遜、大將軍諸葛恪、太常顧譚、驃騎將軍朱據、會稽太守滕胤、大都督施績、尚書丁密等奉禮而行，宗事太子，驃騎將軍步隲、鎮南將軍呂岱、大司馬全琮、左將軍呂據、中書令孫弘等附魯王，中外官僚將軍大臣舉國中分。權患之，謂侍中孫峻曰：「子弟不睦，臣下分部，將有袁氏之敗，爲天下笑。一人立者，安得不亂？」於是有改嗣之規矣。臣松之以爲袁紹、劉表謂尚、琮爲賢，本有傳後之意，異於孫權旣以立和而復寵霸，坐生亂階，自構家禍，方之袁、劉，昏悖甚矣。步隲以德度著稱，爲吳良臣，而阿附於霸，事同楊笁，何哉？和旣正位，適庶分定，就使才德不殊，猶將義不黨庶，況霸實無聞，而和爲令嗣乎？夫邪僻之人，豈其舉體無善，但一爲不善，衆美皆亡耳。隲若果有此事，則其餘不足觀矣！呂岱、全琮之徒，蓋所不足論耳。
- id: wu.14.p11.a2
  anchor: wu.14.p11
  at: 290
  length: 0
  type: pei
  text: 《吳歷》曰：晃入，口諫曰：「太子仁明，顯聞四海。今三方鼎跱，實不宜搖動太子，以生衆心。願陛下少垂聖慮，老臣雖死，猶生之年。」叩頭流血，辭氣不撓。權不納晃言，斥還田里。孫皓即位，詔曰：「故僕射屈晃，志匡社稷，忠諫亡身。封晃子緒爲東陽亭侯，弟幹、恭爲立義都尉。」緒後亦至尚書僕射。晃，汝南人，見胡沖荅問。《吳書》曰：張純亦盡言極諫，權幽之，遂棄市。
- id: wu.14.p11.a3
  anchor: wu.14.p11
  at: 312
  length: 0
  type: pei
  text: 《吳書》曰：權寢疾，意頗感寤，欲徵和還立之，全公主及孫峻、孫弘等固爭之，乃止。
