  type: pei
  text: 《吳歷》曰：和四子：皓、德、謙、俊。孫休即位，封德錢唐侯，謙永安侯，俊拜騎都尉。皓在武昌，吳興施但因民之不堪命，聚萬餘人，劫謙，將至秣陵，欲立之。未至三十里住，擇吉日，但遣使以謙命詔丁固、諸葛靚。靚即斬其使。但遂前到九里，固、靚出擊，大破之。但兵裸身無鎧甲，臨陣皆披散。謙獨坐車中，遂生獲之。固不敢殺，以狀告皓，皓酖之，母子皆死。俊，張承外孫，聦明辨惠，爲遠近所稱，皓又殺之。
