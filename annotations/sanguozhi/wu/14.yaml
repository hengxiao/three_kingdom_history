- id: wu.14.p19.a1
  anchor: wu.14.p19
  at: 99
  length: 0
  type: pei
  text: 《江表傳》曰：豫章吏十人乞代俊死，皓不聽。奮以此見疑，本在章安，徙還吳城禁錮，使男女不得通婚，或年三十四十不得嫁娶。奮上表乞自比禽獸，使男女自相配偶。皓大怒，遣察戰齎藥賜奮，奮不受藥，叩頭千下，曰：「老臣自將兒子治生求治，無豫國事，乞丐餘年。」皓不聽，父子皆飲藥死。臣松之案：建衡二年至奮之死，孫皓即位，尚猶未乆。若奮未被疑之前，兒女年二十左右，至奮死時，不得年三十四十也。若先已長大，自失時未婚娶，則不由皓之禁錮矣。此雖欲增皓之惡，然非實理。
