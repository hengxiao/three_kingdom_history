  type: pei
  text: 《吳錄》曰：慎字孝敬，廣陵人，竭忠知己之君，纏綿三益之友，時人榮之。著論二十篇，名曰《矯非》。後爲侍中，出補武昌左部督，治軍整頓。孫皓移都，甚憚之，詔曰：「慎勳德俱茂，朕所敬憑，宜登上公，以副衆望。」以爲太尉。慎自恨久爲將，遂託老耄。軍士戀之，舉營爲之隕涕。鳳凰三年卒，子耀嗣。玄，丹楊人。衜，南陽人。《吳書》曰：衜初爲中庶子，年二十。時廷尉監隱蕃交結豪傑，自衞將軍全琮等皆傾心敬待，惟衜及宣詔郎豫章楊迪拒絕不與通，時人咸怪之。而蕃後叛逆，衆乃服之。《江表傳》曰：登使侍中胡綜作賔友目曰：「英才卓越，超踰倫匹，則諸葛恪。精識時機，達幽究微，則顧譚。凝辨宏達，言能釋結，則謝景。究學甄微，游夏同科，則范慎。」衜乃私駁綜曰：「元遜才而疏，子嘿精而狠，叔發辯而浮，孝敬深而狹。」所言皆有指趣。而衜卒以此言見咎，不爲恪等所親。後四人皆敗，吳人謂衜之言有徵。位至桂陽太守，卒。
