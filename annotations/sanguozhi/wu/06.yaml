  text: 《江表傳》曰：初權在武昌，欲還都建業，而慮水道溯流二千里，一旦有警，不相赴及，以此懷疑。及至夏口，於塢中大會百官議之，詔曰：「諸將吏勿拘位任，其有計者，為國言之。」諸將或陳宜立柵柵夏口，或言宜重設鐵鎖者，權皆以為非計。時梁為小將，未有知名，乃越席而進曰：「臣聞香餌引泉魚，重幣購勇士，今宜明樹賞罰之信，遣將入沔，與敵爭利，形勢既成，彼不敢干也。使武昌有精兵萬人，付智略者任將，常使嚴整。一旦有警，應聲相赴。作甘水城，輕艦數千，諸所宜用，皆使備具。如此開門延敵，敵自不來矣。」權以梁計為最得，即超增梁位。後稍以功進至沔中督。
