  text: 《江表传》曰：皓大怒，追改秀姓曰厉。干宝《晋纪》曰：秀在晋朝，初闻皓降，群臣毕贺，秀称疾不与，南向流涕曰：“昔讨逆弱冠以一校尉创业，今后主举江南而弃之，宗庙山陵，於此为墟。悠悠苍天，此何人哉！”朝廷美之。《晋诸公赞》曰：吴平，降为伏波将军，开府如故。永宁中卒，追赠骠骑、开府。子俭，字仲节，给事中。
- id: wu.6.p15.a1
  anchor: wu.6.p15
  at: 39
  length: 0
  type: pei
  text: 《吴书》曰：河，坚族子也，出后姑俞氏，后复姓为孙。河质性忠直，讷言敏行，有气幹，能服勤。少从坚征讨，常为前驱，后领左右兵，典知内事，待以腹心之任。又从策平定吴、会，从权讨李术，术破，拜威寇中郎将，领庐江太守。
- id: wu.6.p16.a1
  anchor: wu.6.p16
  at: 12
  length: 0
  type: pei
  text: 《会稽典录》曰：宪字孝章，器量雅伟，举孝廉，补尚书郎，稍迁吴郡太守，以疾去官。孙策平定吴、会，诛其英豪，宪素有高名，策深忌之。初，宪与少府孔融善，融忧其不免祸，乃与曹公书曰：“岁月不居，时节如流，五十之年，忽焉已至。公为始满，融又过二，海内知识，零落殆尽，惟会稽盛孝章尚存。其人困於孙氏，妻孥湮没，单孑独立，孤危愁苦，若使忧能伤人，此子不得复永年矣。春秋传曰：‘诸侯有相灭亡者，桓公不能救，则桓公耻之。’今孝章实丈夫之雄也，天下谭士依以扬声，而身不免於幽执，命不期於旦夕，是吾祖不当复论损益之友，而硃穆所以绝交也。公诚能驰一介之使，加咫尺之书，则孝章可致，友道可弘也。今之少年，喜谤前辈，或能讥平皮柄反。孝章；孝章要为有天下大名，九牧之民所共称叹。燕君市骏马之骨，非欲以骋道里，乃当以招绝足也。惟公匡复汉室，宗社将绝，又能正之，正之之术，实须得贤。珠玉无胫而自至者，以人好之也，况贤者之有足乎？昭王筑台以尊郭隗，隗虽小才，而逢大遇，竟能发明主之至心，故乐毅自魏往，剧辛自赵往，邹衍自齐往。乡使郭隗倒县而王不解，临溺而王不拯，则士亦将高翔远引，莫有北首燕路者矣。凡所称引，自公所知，而有云者，欲公崇笃斯义也，因表不悉。”由是徵为骑都尉。制命未至，果为权所害。子匡奔魏，位至征东司马。
- id: wu.6.p17.a1
  anchor: wu.6.p17
  at: 106
  length: 0
  type: pei
  text: 《吴历》曰：妫览、戴员亲近边洪等，数为翊所困，常欲叛逆，因吴主出征，遂其奸计。时诸县令长并会见翊，翊以妻徐氏颇晓卜，翊入语徐：“吾明日欲为长吏作主人，卿试卜之。”徐言：“卦不能佳，可须异日。”翊以长吏来久，宜速遣，乃大请宾客。翊出入常持刀，尔时有酒色，空手送客，洪从后斫翊，郡中扰乱，无救翊者，遂为洪所杀，迸走入山。徐氏购募追捕，中宿乃得，览、员归罪杀洪。诸将皆知览、员所为，而力不能讨。览入居军府中，悉取翊嫔妾及左右侍御，欲复取徐。恐逆之见害，乃绐之曰：“乞须晦日设祭除服。”时月垂竟，览听须祭毕。徐潜使所亲信语翊亲近旧将孙高、傅婴等，说：“览已虏略婢妾，今又欲见偪，所以外许之者，欲安其意以免祸耳。欲立微计，原二君哀救。”高、婴涕泣答言：“受府君恩遇，所以不即死难者，以死无益，欲思惟事计，事计未立，未敢启夫人耳。今日之事，实夙夜所怀也。”乃密呼翊时侍养者二十餘人，以徐意语之，共盟誓，合谋。到晦日，设祭，徐氏哭泣尽哀毕，乃除服，薰香沐浴，更於他室，安施帏帐，言笑欢悦，示无戚容。大小凄怆，怪其如此。览密觇视，无复疑意。徐呼高、婴与诸婢罗住户内，使人报览，说已除凶即吉，惟府君敕命。览盛意入，徐出户拜。览適得一拜，徐便大呼：“二君可起！”高、婴俱出，共得杀览，餘人即就外杀员。夫人乃还缞绖，奉览、员首以祭翊墓。举军震骇，以为神异。吴主续至，悉族诛览、员餘党，擢高、婴为牙门，其餘皆加赐金帛，殊其门户。
