- id: wu.6.p13.a3
  anchor: wu.6.p13
  at: 79
  length: 0
  type: pei
  text: 《吴录》曰：松善与人交，轻财好施。镇巴丘，数咨陆逊以得失。尝有小过，逊面责松，松意色不平，逊观其少释，谓曰：“君过听不以某鄙，数见访及，是以承来意进尽言，便变色，何也？”松笑曰：“属亦自忿行事有此，岂有望邪！”
