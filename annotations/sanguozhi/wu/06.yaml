  text: 《吳歷》曰：鄰又有子曰述，為武昌督，平荊州事。震，無難督。諧，城門校尉。歆，樂鄉督。震後御晉軍，與張悌俱死。賁曾孫惠，字德施。《惠別傳》曰：惠好學有才智，晉永寧元年，赴齊王冏義，以功封晉興侯，辟大司馬賊曹屬。冏驕矜僭侈，天下失望。惠獻言於冏，諷以五難、四不可，勸令委讓萬機，歸籓青岱，辭甚深切。冏不能納，頃之果敗。成都王穎召為大將軍參軍。是時穎將有事於長沙，以陸機為前鋒都督。惠與機鄉里親厚，憂其致禍，謂之曰：「子盍讓都督於王粹乎？」機曰：「將謂吾避賊首鼠，更速其害。」機尋被戮，二弟雲、耽亦見殺，惠甚傷恨之。永興元年，乘輿幸鄴，司空東海王越治兵下邳，惠以書干越，詭其姓名，自稱南嶽逸民秦祕之，勉以勤王匡世之略，辭義甚美。越省其書，榜題道衢，招求其人。惠乃出見，越即以為記室參軍，專掌文疏，豫參謀議。每造書檄，越或驛馬催之，應命立成，皆有辭旨。累遷顯職，後為廣武將軍、安豐內史。年四十七卒。惠文翰凡數十首。
- id: wu.6.p12.a1
  anchor: wu.6.p12
  at: 64
  length: 0
  type: pei
  text: 《江表传》曰：策既平定江东，逐袁胤。袁术深怨策，乃阴遣间使赍印绶与丹杨宗帅陵阳祖郎等，使激动山越，大合众，图共攻策。策自率将士讨郎，生获之。策谓郎曰：“尔昔袭击孤，斫孤马鞍，今创军立事，除弃宿恨，惟取能用，与天下通耳。非但汝，汝莫恐怖。”郎叩头谢罪。即破械，赐衣服，署门下贼曹。及军还，郎与太史慈俱在前导军，人以为荣。
- id: wu.6.p12.a2
  anchor: wu.6.p12
  at: 135
  length: 0
  type: pei
  text: 《典略》曰：辅恐权不能保守江东，因权出行东冶，乃遣人赍书呼曹公。行人以告，权乃还，伪若不知，与张昭共见辅，权谓辅曰：“兄厌乐邪，何为呼他人？”辅云无是。权因投书与昭，昭示辅，辅惭无辞。乃悉斩辅亲近，分其部曲，徒辅置东。
- id: wu.6.p13.a1
  anchor: wu.6.p13
  at: 32
  length: 0
  type: pei
  text: 《典略》曰：翊名俨，性似策。策临卒，张昭等谓策当以兵属俨，而策呼权，佩以印绶。
