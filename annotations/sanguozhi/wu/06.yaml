  text: 《江表傳》曰：袁術以吳景守廣陵，策族兄香亦為術所用，作汝南太守，而令賁為將軍，領兵在壽春。策與景等書曰：「今征江東，未知二三君意云何耳？」景即棄守歸，賁困而後免，香以道遠獨不得還。《吳書》曰：香字文陽。父孺，字仲孺，堅再從弟也，仕郡主簿功曹。香從堅征伐有功，拜郎中。後為袁術驅馳，加征南將軍，死於壽春。
- id: wu.6.p10.a2
  anchor: wu.6.p10
  at: 302
