  text: 《江表传》曰：曹休出洞口，吕范率军御之。时匡为定武中郎将，（遣）范令放火，烧损茅芒，以乏军用，范即启送匡还吴。权别其族为丁氏，禁固终身。臣松之案本传曰：“匡未试用卒，时年二十餘。”而《江表传》云吕范在洞口，匡为定武中郎将。既为定武，非为未试用。且孙坚以初平二年卒，洞口之役在黃初三年，坚卒至此合三十一年，匡时若尚在，本传不得云卒时年二十餘也。此盖权别生弟朗，《江表传》误以为匡也。朗之名位见《三朝录》及虞喜《志林》也。
