  text: 《會稽典錄》曰：昕字大明。少游京師，師事太傅陳蕃，博覽群書，明於風角，善推災異。辟太尉府，舉高第，稍遷丹楊太守。曹公起義兵，昕前後遣兵萬餘人助公征伐。袁術之在淮南也，昕惡其淫虐，絕不與通。《獻帝春秋》曰：袁術遣吳景攻昕，未拔，景乃募百姓敢從周昕者死不赦。昕曰：「我則不德，百姓何罪？」遂散兵，還本郡。
