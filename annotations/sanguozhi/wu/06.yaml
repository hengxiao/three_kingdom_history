  type: pei
  text: 《江表傳》曰：時丹楊僮芝自署廬陵太守，策留賁弟輔領兵住南昌，策謂賁曰：「兄今據豫章，是扼僮芝咽喉而守其門戶矣。但當伺其形便，因令國儀杖兵而進，使公瑾為作勢援，一舉可定也。」後賁聞芝病，即如策計。周瑜到巴兵，輔遂得進據廬陵。
