  text: 《晋诸公赞》曰：吴平，降为渡辽将军，永安元年卒。《吴录》曰：楷处事严整不如孙秀，而人间知名，过也。
- id: wu.6.p19.a1
  anchor: wu.6.p19
  at: 11
  length: 0
  type: pei
  text: 《吴书》曰：河有四子。长助，曲阿长。次谊，海盐长。并早卒。次桓，仪容端正，器怀聪朗，博学强记，能论议应对，权常称为宗室颜渊，擢为武卫都尉。从讨关羽於华容，诱羽餘党，得五千人，牛马器械甚众。
- id: wu.6.p19.a2
  anchor: wu.6.p19
  at: 140
  length: 0
  type: pei
  text: 《吴书》曰：桓弟俊，字叔英，性度恢弘，才经文武，为定武中郎将，屯戍薄落，赤烏十三年卒。长子建袭爵，平虏将军。少子慎，镇南将军。慎子丞，字显世。《文士传》曰：丞好学，有文章，作萤火赋行於世。为黄门侍郎，与顾荣俱为侍臣。归命世内侍多得罪尤，惟荣、丞独获全。常使二人记事，丞答顾问，乃下诏曰：“自今已后，用侍郎皆当如今宗室丞、顾荣畴也。”吴平赴洛，为范阳涿令，甚有称绩。永安中，陆机为成都王大都督，请丞为司马，与机俱被害。
