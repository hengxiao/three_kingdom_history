  text: 续汉书曰：繇祖父本，师受经传，博学群书，号为通儒。举贤良方正，为般长，卒官。宠字祖荣，受父业，以经明行修，举孝廉，光禄（大夫）察四行，除东平陵令。视事数年，以母病弃官，百姓士民攀舆拒轮，充塞道路，车不得前，乃止亭，轻服潜遁，归脩供养。后辟大将军府，稍迁会稽太守，正身率下，郡中大治。徵入为将作大匠。山阴县民去治数十里有若邪中在山谷间，五六老翁年皆七八十，闻宠迁，相率共送宠，人赍百钱。宠见，劳来曰：“父老何乃自苦远来！”皆对曰：“山谷鄙老，生未尝至郡县。他时吏发求不去，民间或夜不绝狗吠，竟夕民不得安。自明府下车以来，狗不夜吠，吏稀至民间，年老遭值圣化，今闻当见弃去，故戮力来送。”宠谢之，为选受一大钱，故会稽号宠为取一钱太守。其清如是。宠前后历二郡，八居九列，四登三事。家不藏贿，无重宝器，恆菲饮食，薄衣服，弊车羸马，号为窭陋。三去相位，辄归本土。往来京师，常下道脱骖过，人莫知焉。宠尝欲止亭，亭吏止之曰：“整顿传舍，以待刘公，不可得止。”宠因过去。其廉俭皆此类也。以老病卒于家。
