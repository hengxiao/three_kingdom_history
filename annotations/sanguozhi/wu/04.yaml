- id: wu.4.p10.a1
  anchor: wu.4.p10
  at: 132
  length: 0
  type: pei
  text: 《吴历》云：慈於神亭战败，为策所执。策素闻其名，即解缚请见，咨问进取之术。慈答曰：“破军之将，不足与论事。”策曰：“昔韩信定计於广武，今策决疑於仁者，君何辞焉？”慈曰：“州军新破，士卒离心，若傥分散，难复合聚；欲出宣恩安集，恐不合尊意。”策长跪答曰：“诚本心所望也。明日中，望君来还。”诸将皆疑，策曰：“太史子义，青州名士，以信义为先，终不欺策。”明日，大请诸将，豫设酒食，立竿视影。日中而慈至，策大悦，常与参论诸军事。臣松之案；吴历云慈於神亭战败，为策所得，与本传大异，疑为谬误。《江表传》曰：策问慈曰：“闻卿昔为太守劫州章，赴文举，请诣玄德，皆有烈义，天下智士也，但所讬未得其人。射钩斩袪，古人不嫌。孤是卿知己，勿忧不如意也。”出教曰：“龙欲腾翥，先阶尺木者也。”
