  anchor: wu.4.p19
  at: 313
  length: 0
  type: pei
  text: 孙盛曰：夫柔远能迩，莫善於信；保大定功，莫善於义。故齐桓创基，德彰於柯会；晋文始伯，义显於伐原。故能九合一匡，世主夏盟，令问长世，贻范百王。吕岱师友士匡，使通信誓，徽兄弟肉袒，推心委命，岱因灭之，以要功利，君子是以知孙权之不能远略，而吕氏之祚不延者也。
