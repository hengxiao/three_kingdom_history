  at: 239
  length: 0
  type: pei
  text: 江表传曰：策初遣慈，议者纷纭，谓慈未可信，或云与华子鱼州里，恐留彼为筹策，或疑慈西讬黄祖，假路还北，多言遣之非计。策曰：“诸君语皆非也，孤断之详矣。太史子义虽气勇有胆烈，然非纵横之人。其心有士谟，志经道义，贵重然诺，一以意许知己，死亡不相负，诸君勿复忧也。”慈从豫章还，议者乃始服。慈见策曰：“华子鱼良德也，然非筹略才，无他方规，自守而已。又丹杨僮芝自擅庐陵，诈言被诏书为太守。鄱阳民帅别立宗部，阻兵守界，不受子鱼所遣长吏，言‘我以别立郡，须汉遣真太守来，当迎之耳’。子鱼不但不能谐庐陵、鄱阳，近自海昬有上缭壁，有五六千家相结聚作宗伍，惟输租布於郡耳，发召一人遂不可得，子鱼亦睹视之而已。”策拊掌大笑，（仍）有兼并之志矣。顷之，遂定豫章。
