  text: 《献帝春秋》曰：是岁，繇屯彭泽，又使融助皓讨刘表所用太守诸葛玄。许子将谓繇曰：“笮融出军，不顾（命）名义者也。硃文明善推诚以信人，宜使密防之。”融到，果诈杀皓，代领郡事。
