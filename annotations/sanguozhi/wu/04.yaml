  at: 176
  length: 0
  type: pei
  text: 江表传曰：策谓慈曰：“刘牧往责吾为袁氏攻庐江，其意颇猥，理恕不足。何者？先君手下兵数千餘人，尽在公路许。孤志在立事，不得不屈意於公路，求索故兵，再往才得千餘人耳。仍令孤攻庐江，尔时事势，不得不为行。但其后不遵臣节，自弃作邪僭事，谏之不从。丈夫义交，苟有大故，不得不离，孤交求公路及绝之本末如此。今刘繇丧亡，恨不及其生时与共论辩。今兒子在豫章，不知华子鱼待遇何如，其故复曲复依随之否？卿则州人，昔又从事，宁能往视其兒子，并宣孤意於其部曲？部曲乐来者便与俱来，不乐来者且安慰之。并观察子鱼所以牧御方规何似，视庐陵、鄱阳人民亲附之否？卿手下兵，宜将多少，自由意。”慈对曰：“慈有不赦之罪，将军量同桓、文，待遇过望。古人报生以死，期於尽节，没而后已。今并息兵，兵不宜多，将数十人，自足以往还也。”
