  type: pei
  text: 袁宏《汉纪》曰：刘繇将奔会稽，许子将曰：“会稽富实，策之所贪，且穷在海隅，不可往也。不如豫章，北连豫壤，西接荆州。若收合吏民，遣使贡献，与曹兗州相闻，虽有袁公路隔在其间，其人豺狼，不能久也。足下受王命，孟德、景升必相救济。”繇从之。
