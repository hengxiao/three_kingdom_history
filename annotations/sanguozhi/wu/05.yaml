- id: wu.5.p2.a1
  anchor: wu.5.p2
  at: 100
  length: 0
  type: pei
  text: 《搜神記》曰：初，夫人孕而夢月入其懷，既而生策。及權在孕，又夢日入其懷，以告堅曰：「昔妊策，夢月入我懷，今也又夢日入我懷，何也？」堅曰：「日月者陰陽之精，極貴之象，吾子孫其興乎！」
- id: wu.5.p3.a1
  anchor: wu.5.p3
  at: 220
  length: 0
  type: pei
  text: 音普。
- id: wu.5.p4.a1
  anchor: wu.5.p4
  at: 19
  length: 0
  type: pei
  text: 《會稽典錄》曰：策功曹魏騰，以迕意見譴，將殺之，士大夫憂恐，計無所出。夫人乃倚大井而謂策曰：「汝新造江南，其事未集，方當優賢禮士，舍過錄功。魏功曹在公盡規，汝今日殺之，則明日人皆叛汝。吾不忍見禍之及，當先投此井中耳。」策大驚，遽釋騰。夫人智略權譎，類皆如此。
- id: wu.5.p4.a2
  anchor: wu.5.p4
  at: 43
  length: 0
  type: pei
  text: 《志林》曰：按會稽貢舉簿，建安十二年到十三年闕，無舉者，云府君遭憂，此則吳后以十二年薨也。八年九年皆有貢舉，斯甚分明。
- id: wu.5.p5.a1
  anchor: wu.5.p5
  at: 21
  length: 0
  type: pei
  text: 《吳書》曰：權徵荊州，拜奮吳郡都督，以鎮東方。《吳書》曰：祺與張溫、顧譚友善，權令關平辭訟事。
- id: wu.5.p6.a1
  anchor: wu.5.p6
  at: 25
  length: 0
  type: pei
  text: 煚子承撰《後漢書》，稱煚幼以仁孝為行，明達有令才。煚弟貞，履蹈法度，篤學尚義，舉孝廉，建昌長，卒官。
- id: wu.5.p6.a2
  anchor: wu.5.p6
  at: 104
  length: 0
  type: pei
  text: 《會稽典錄》曰：承字偉平，博學洽聞，嘗所知見，終身不忘。子崇揚威將軍，崇弟勗吳郡太守，竝知名。
- id: wu.5.p7.a1
  anchor: wu.5.p7
  at: 143
  length: 0
  type: pei
  text: 泭音敷。郭璞注《方言》曰：「泭，水中簰也。」
- id: wu.5.p7.a2
  anchor: wu.5.p7
  at: 199
  length: 0
  type: pei
  text: 《江表傳》曰：初，袁術遣從弟胤為丹楊，策令琨討而代之。會景還，以景前在（仕）丹楊，寬仁得眾，吏民所思，而琨手下兵多，策嫌其太重，且方攻伐，宜得琨眾，乃復用景，召琨還吳。
- id: wu.5.p9.a1
  anchor: wu.5.p9
  at: 102
  length: 0
  type: pei
  text: 《吳曆》曰：纂先尚權中女，早卒，故又以小虎為繼室。
- id: wu.5.p12.a1
  anchor: wu.5.p12
  at: 12
  length: 0
  type: pei
  text: 《吳書》曰：夫人父名盧九。
- id: wu.5.p14.a1
  anchor: wu.5.p14
  at: 125
  length: 0
  type: pei
  text: 《吳錄》曰：袁夫人者，袁術女也，有節行而無子。權數以諸姬子與養之，輒不育。及步夫人薨，權欲立之。夫人自以無子，固辭不受。
- id: wu.5.p15.a1
  anchor: wu.5.p15
  at: 234
  length: 0
  type: pei
  text: 《吳錄》曰：亮妻惠解有容色，居候官，吳平乃歸，永寧中卒。
- id: wu.5.p16.a1
  anchor: wu.5.p16
  at: 18
  length: 0
  type: pei
  text: 臣松之以為休妻其甥，事同漢惠。荀悅譏之已當，故不復廣言。
- id: wu.5.p16.a2
  anchor: wu.5.p16
  at: 289
  length: 0
  type: pei
  text: 《搜神記》曰：孫峻殺朱主，埋於石子岡。歸命即位，將欲改葬之。塚墓相亞，不可識別，而宮人頗識主亡時所著衣服，乃使兩巫各住一處以伺其靈，使察鑑之，不得相近。久時，二人俱白：見一女人年可三十餘，上著青錦束頭，紫白袷裳，丹綈絲履，從石子岡上半岡，而以手抑膝長太息，小住須臾，進一塚上便住，徘徊良久，奄然不見。二人之言，不謀而同，於是開塚，衣服如之。
- id: wu.5.p17.a1
  anchor: wu.5.p17
  at: 167
  length: 0
  type: pei
  text: 《吳錄》曰：皓初尊和為昭獻皇帝，俄改曰文皇帝。
- id: wu.5.p17.a2
  anchor: wu.5.p17
  at: 268
  length: 0
  type: pei
  text: 《江表傳》曰：皓以張布女為美人，有寵，皓問曰：「汝父所在？」答曰：「賊以殺之。」皓大怒，棒殺之。後思其顏色，使巧工刻木作美人形象，恆置座側。問左右：「布復有女否？」答曰：「布大女適故衛尉馮朝子純。」即奪純妻入宮，大有寵，拜為左夫人，晝夜與夫人房宴，不聽朝政，使尚方以金作華燧、步搖、假髻以千數。令宮人著以相撲，朝成夕敗，輒出更作，工匠因緣偷盜，府藏為空。會夫人死，皓哀愍思念，葬於苑中，大作塚，使工匠刻柏作木人，內塚中以為兵衛，以金銀珍玩之物送葬，不可稱計。已葬之後，皓治喪於內，半年不出。國人見葬太奢麗，皆謂皓已死，所葬者是也。皓舅子何都顏狀似皓，云都代立。臨海太守奚熙信訛言，舉兵欲還誅都，都叔父植時為備海督，擊殺熙，夷三族，訛言乃息，而人心猶疑。
- id: wu.5.p18.a1
  anchor: wu.5.p18
  at: 212
  length: 0
  type: pei
  text: 《江表傳》曰：皓又使黃門備行州郡，科取將吏家女。其二千石大臣子女，皆當歲歲言名，年十五六一簡閱，簡閱不中，乃得出嫁。后宮千數，而採擇無已。
