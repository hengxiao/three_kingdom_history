  at: 95
  length: 0
  type: pei
  text: 孫盛曰：「孫氏兄弟皆明略絶群。創基立事，策之由也，自臨終之日，顧命委權。夫意氣之間，猶有刎頸，況天倫之篤愛，豪達之英鑑，豈吝名號於旣往，違本情之至實哉？抑將遠思虛盈之數，而愼其名器者乎？夫正本定名，爲國之大防；杜絶疑貳，消釁之良謨。是故魯隱矜義，終致羽父之禍；宋宣懷仁，卒有殤公之哀。皆心存小善，而不達經綸之圖；求譽當年，而不思貽厥之謀。可謂輕千乘之國，蹈道則未也。孫氏因擾攘之際，得奮其縱橫之志，業非積德之基，邦無磐石之固，勢一則祿祚可終，情乖則禍亂塵起，安可不防微於未兆，慮難於將來？壯哉！策爲首事之君，有呉開國之主；將相在列，皆其舊也，而嗣子弱劣，析薪弗荷，奉援則魯桓、田巿之難作，崇之則與夷、子馮之禍興。是以正名定本，使貴賤殊邈，然後國無陵肆之責，後嗣罔猜忌之嫌，群情絶異端之論，不逞杜覬覦之心；於情雖違，於事雖儉，至於括囊遠圖，永保維城，可謂爲之於其未有，治之於其未亂者也。陳氏之評，其未達乎！」
