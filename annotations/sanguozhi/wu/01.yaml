  length: 0
  type: pei
  text: 江表傳曰：「策説術云：『家有舊恩在東，原助舅討橫江；橫江拔，因投本土召募，可得三萬兵，以佐明使君匡濟漢室。』術知其恨，而以劉繇據曲阿，王朗在會稽，謂策未必能定，故許之。」
- id: wu.1.p12.a2
  anchor: wu.1.p12
  at: 234
  length: 0
  type: pei
  text: 江表傳曰：「策渡江攻繇牛渚營，盡得邸閣糧穀、戰具，是歳興平二年也。時彭城相薛禮、下邳相笮融依繇爲盟主，禮據秣陵城，融屯縣南。策先攻融，融出兵交戰，斬首五百餘級，融卽閉門不敢動。因渡江攻禮，禮突走，而樊能、于麋等復合衆襲奪牛渚屯。策聞之，還攻破能等，獲男女萬餘人。復下攻融，爲流矢所中，傷股，不能乘馬，因自輿還牛渚營。或叛告融曰：『孫郎被箭已死。』融大喜，卽遣將于茲鄕策。策遣歩騎數百挑戰，設伏於後，賊出擊之，鋒刃未接而僞走，賊追入伏中，乃大破之，斬首千餘級。策因往到融營下，令左右大呼曰：『孫郎竟云何！』賊於是驚怖夜遁。融聞策尙在，更深溝高壘，繕治守備。策以融所屯地勢險固，乃捨去，攻破繇別將於海陵，轉攻湖孰、江乘，皆下之。」
- id: wu.1.p13.a1
  anchor: wu.1.p13
  at: 57
  length: 0
  type: pei
  text: 江表傳曰：「策時年少，雖有位號，而士民皆呼爲孫郎。百姓聞孫郎至，皆失魂魄；長吏委城郭，竄伏山草。及至，軍士奉令，不敢虜略，鷄犬菜茹，一無所犯，民乃大悅，競以牛酒詣軍。劉繇旣走，策入曲阿勞賜將士，遣將陳寶詣阜陵迎母及弟。發恩布令，告諸縣：『其劉繇、笮融等故鄕部曲來降首者，一無所問；樂從軍者，一身行，復除門戸；不樂者，勿強也。』旬日之間，四面雲集，得見兵二萬餘人，馬千餘匹，威震江東，形勢轉盛。」
- id: wu.1.p13.a2
  anchor: wu.1.p13
  at: 130
  length: 0
  type: pei
  text: 呉録曰：「時有烏程鄒他、錢銅及前合浦太守嘉興王晟等，各聚衆萬餘或數千。引兵撲討，皆攻破之。策母呉氏曰：『晟與汝父有昇堂見妻之分，今其諸子兄弟皆已梟夷，獨餘一老翁，何足復憚乎？』乃捨之，餘咸族誅。策自討虎，虎高壘堅守，使其弟輿請和。許之。輿請獨與策會面約。旣會，策引白刃斫席，輿體動，策笑曰：『聞卿能坐躍，勦捷不常，聊戲卿耳！』輿曰：『我見刃乃然。』策知其無能也，乃以手戟投之，立死。輿有勇力，虎衆以其死也，甚懼。進攻破之。虎奔餘杭，投許昭於虜中。程普請擊昭，策曰：『許昭有義於舊君，有誠於故友，此丈夫之志也。』乃捨之。」臣松之案：許昭有義於舊君，謂濟盛憲也，事見後注。有誠於故友，則受嚴白虎也。
- id: wu.1.p13.a3
  anchor: wu.1.p13
  at: 212
  length: 0
  type: pei
  text: 江表傳曰：「策遣奉正都尉劉由、五官掾高承奉章詣許，拜獻方物。」
- id: wu.1.p14.a1
  anchor: wu.1.p14
  at: 14
  length: 0
  type: pei
  text: 呉録載策使張紘爲書曰：「蓋上天垂司過之星，聖王建敢諫之鼓，設非謬之備，急箴闕之言，何哉？凡有所長，必有所短也。去冬傳有大計，無不悚懼；旋知供備貢獻，萬夫解惑。頃聞建議，復欲追遵前圖，卽事之期，便有定月。益使憮然，想是流妄；設其必爾，民何望乎？曩日之舉義兵也，天下之士所以響應者，董卓擅廢置，害太后、弘農王，略烝宮人，發掘園陵，暴逆至此，故諸州郡雄豪聞聲慕義。神武外振，卓遂內殲。元惡旣斃，幼主東顧，俾保傅宣命，欲令諸軍振旅，（於）河北通謀黑山，曹操放毒東徐，劉表稱亂南荆，公孫瓚炰烋北幽，劉繇決力江滸，劉備爭盟淮隅，是以未獲承命櫜弓戢戈也。今備繇旣破，操等飢餒，謂當與天下合謀，以誅醜類。舍而不圖，有自取之志，非海內所望，一也。昔成湯伐桀，稱有夏多罪；武王伐紂，曰殷有罪罰重哉。此二王者，雖有聖德，宜當君世；如使不遭其時，亦無繇興矣。幼主非有惡於天下，徒以春秋尙少，脅於強臣，若無過而奪之，懼未合於湯武之事，二也。卓雖狂狡，至廢主自與，亦猶未也，而天下聞其桀虐，攘臂同心而疾之，以中土希戰之兵，當邊地勁悍之虜，所以斯須遊魂也。今四方之人，皆玩敵而便戰鬬矣，可得而勝者，以彼亂而我治，彼逆而我順也。見當世之紛若，欲大舉以臨之，適足趣禍，三也。天下神器，不可虛干，必須天贊與人力也。殷湯有白鳩之祥，周武有赤烏之瑞，漢高有星聚之符，世祖有神光之徵，皆因民困悴於桀紂之政，毒苦於秦莽之役，故能芟去無道，致成其志。今天下非患於幼主，未見受命之應驗，而欲一旦卒然登卽尊號，未之或有，四也。天子之貴，四海之富，誰不欲焉？義不可，勢不得耳。陳勝、項籍、王莽、公孫述之徒，皆南面稱孤，莫之能濟。帝王之位，不可橫冀，五也。幼主岐嶷，若除其偪，去其鯁，必成中興之業。夫致主於周成之盛，自受旦奭之美，此誠所望於尊明也。縱使幼主有他改異，猶望推宗室之譜屬，論近親之賢良，以紹劉統，以固漢宗。皆所以書功金石，圖形丹靑，流慶無窮，垂聲管紘。舍而不爲，爲其難者，想明明之素，必所不忍，六也。五世爲相，權之重，勢之盛，天下莫得而比焉。忠貞者必曰宜夙夜思惟，所以扶國家之躓頓，念社稷之危殆，以奉祖考之志，以報漢室之恩。其忽履道之節而強進取之欲者，將曰天下之人非家吏則門生也，孰不從我？四方之敵非吾匹則吾役也，誰能違我？盍乘累世之勢，起而取之哉？二者殊數，不可不詳察，七也。所貴於聖哲者，以其審於機宜，愼於舉措。若難圖之事，難保之勢，以激群敵之氣，以生衆人之心，公義故不可，私計又不利，明哲不處，八也。世人多惑於圖緯而牽非類，比合文字以悅所事，苟以阿上惑衆，終有後悔者，自往迄今，未嘗無之，不可不深擇而熟思，九也。九者，尊明所見之餘耳，庶備起予，補所遺忘。忠言逆耳，幸留神聽！」典略云張昭之辭。臣松之以爲張昭雖名重，然不如紘之文也，此書必紘所作。
- id: wu.1.p15.a1
  anchor: wu.1.p15
  at: 15
  length: 0
  type: pei
  text: 江表傳曰：「建安二年夏，漢朝遣議郎王誧奉戊辰詔書曰：『董卓逆亂，凶國害民。先將軍堅念在平討，雅意未遂，厥美著聞。策遵善道，求福不回。今以策爲騎都尉，襲爵烏程侯，領會稽太守。』又詔敕曰：『故左將軍袁術不顧朝恩，坐創凶逆，造合虛僞，欲因兵亂，詭詐百姓，聞其言以爲不然。定得使持節、平東將軍、領徐州牧、温侯布上術所造惑衆妖妄，知術鴟梟之性，遂其無道，修治王宮，署置公卿，郊天祀地，殘民害物，爲禍深酷。布前後上策乃心本朝，欲還討術，爲國效節，乞加顯異。夫縣賞俟功，惟勤是與，故便寵授，承襲前邑，重以大郡，榮耀兼至，是策輸力竭命之秋也。其亟與布及行呉郡太守、安東將軍陳瑀戮力一心，同時赴討。』策自以統領兵馬，但以騎都尉領郡爲輕，欲得將軍號，（及）使人諷誧，誧便承制假策明漢將軍。是時，陳瑀屯海西，策奉詔治嚴，當與布瑀參同形勢。行到錢塘，瑀陰圖襲策，遣都尉萬演等密渡江，使持印傳三十餘紐與賊丹楊、宣城、涇、陵陽、始安、黟、歙諸險縣大帥祖郎、焦已及呉郡烏程嚴白虎等，使爲內應，伺策軍發，欲攻取諸郡。策覺之，遣呂範、徐逸攻瑀於海西，大破瑀，獲其吏士妻子四千人。山陽公載記曰：『瑀單騎走冀州，自歸袁紹，紹以爲故安都尉。』呉録載策上表謝曰：『臣以固陋，孤持邊陲。陛下廣播高澤，不遺細節，以臣襲爵，兼典名郡。仰榮顧寵，所不克堪。興平二年十二月二十日，於呉郡曲阿得袁術所呈表，以臣行殄寇將軍；至被詔書，乃知詐擅。雖輒捐廢，猶用悚悸。臣年十七，喪失所怙，懼有不任堂構之鄙，以忝析薪之戒，誠無去病十八建功，世祖列將弱冠佐命。臣初領兵，年未弱冠，雖駑懦不武，然思竭微命。惟術狂惑，爲惡深重。臣憑威靈，奉辭罰罪，庶必獻捷，以報所授。』臣松之案：本傳云孫堅以初平三年卒，策以建安五年卒，策死時年二十六，計堅之亡，策應十八，而此表云十七，則爲不符。張璠漢紀及呉歷並以堅初平二年死，此爲是而本傳誤也。江表傳曰：『建安三年，策又遣使貢方物，倍於元年所獻。其年，制書轉拜討逆將軍，改封呉侯。』
- id: wu.1.p16.a1
  anchor: wu.1.p16
  at: 110
  length: 0
  type: pei
  text: 江表傳曰：「策被詔敕，與司空曹公、衞將軍董承、益州牧劉璋等並力討袁術、劉表。軍嚴當進，會術死，術從弟胤、女婿黃猗等畏懼曹公，不敢守壽春，乃共舁術棺柩，扶其妻子及部曲男女，就劉勛於皖城。勛糧食少，無以相振，乃遣從弟偕告糴於豫章太守華歆。歆郡素少穀，遣吏將偕就海昏上繚，使諸宗帥共出三萬斛米以與偕。偕往歷月，纔得數千斛。偕乃報勛，具説形狀，使勛來襲取之。勛得偕書，使潛軍到海昏邑下。宗帥知之，空壁逃匿，勛了無所得。時策西討黃祖，行及石城，聞勛輕身詣海昏，便分遣從兄賁、輔率八千人於彭澤待勛，自與周瑜率二萬人歩襲皖城，卽克之，得術百工及鼓吹部曲三萬餘人，並術勛妻子。表用汝南李術爲廬江太守，給兵三千人以守皖，皆徙所得人東詣呉。賁、輔又於彭澤破勛。勛走入楚江，從尋陽歩上到置馬亭，聞策等已克皖，乃投西塞。至沂，築壘自守，告急於劉表，求救於黃祖。祖遣太子射船軍五千人助勛。策復就攻，大破勛。勛與偕北歸曹公，射亦遁走。策收得勛兵二千餘人，船千艘，遂前進夏口攻黃祖。時劉表遣從子虎、南陽韓晞將長矛五千，來爲黃祖前鋒。策與戰，大破之。」呉録載策表曰：「臣討黃祖，以十二月八日到祖所屯沙羨縣。劉表遣將助祖，並來趣臣。臣以十一日平旦部所領江夏太守、行建威中郎將周瑜、領桂陽太守、行征虜中郎將呂範、領零陵太守、行蕩寇中郎將程普、行奉業校尉孫權、行先登校尉韓當、行武鋒校尉黃蓋等同時俱進。身跨馬櫟陳，手擊急鼓，以齊戰勢。吏士奮激，踊躍百倍，心精意果，各競用命。越渡重塹，迅疾若飛。火放上風，兵激烟下，弓弩並發，流矢雨集，日加辰時，祖乃潰爛。鋒刃所截，猋火所焚，前無生寇，惟祖逬走。獲其妻息男女七人，斬虎、（狼）韓晞已下二萬餘級，其赴水溺者一萬餘口，船六千餘艘，財物山積。雖表未禽，祖宿狡猾，爲表腹心，出作爪牙，表之鴟張，以祖氣息，而祖家屬部曲，掃地無餘，表孤特之虜，成鬼行屍。誠皆聖朝神武遠振，臣討有罪，得效微勤。」
