  at: 32
  length: 0
  type: pei
  text: 江表傳曰：「廣陵太守陳登治射陽，登卽瑀之從兄子也。策前西征，登陰復遣間使，以印綬與嚴白虎餘黨，圖爲後害，以報瑀見破之辱。策歸，復討登。軍到丹徒，須待運糧。策性好獵，將歩騎數出。策驅馳逐鹿，所乘馬精駿，從騎絶不能及。初，呉郡太守許貢上表於漢帝曰：『孫策驍雄，與項籍相似，宜加貴寵，召還京邑。若被詔不得不還，若放於外必作世患。』策候吏得貢表，以示策。策請貢相見，以責讓貢。貢辭無表，策卽令武士絞殺之。貢奴客潛民間，欲爲貢報讎。獵日，卒有三人卽貢客也。策問：『爾等何人？』答云：『是韓當兵，在此射鹿耳。』策曰：『當兵吾皆識之，未嘗見汝等。』因射一人，應弦而倒。餘二人怖急，便舉弓射策，中頰。後騎尋至，皆刺殺之。」九州春秋曰：「策聞曹公北征柳城，悉起江南之衆，自號大司馬，將北襲許，恃其勇，行不設備，故及於難。」孫盛異同評曰：「凡此數書，各有所失。孫策雖威行江外，略有六郡，然黃祖乘其上流，陳登間其心腹，且深險強宗，未盡歸復，曹袁虎爭，勢傾山海，策豈暇遠師汝潁，而遷帝於呉越哉？斯蓋庸人之所鑑見，況策達於事勢者乎？又案袁紹以建安五年至黎陽，而策以四月遇害，而志云策聞曹公與紹相拒於官渡，謬矣。伐登之言，爲有證也。又江表傳説策悉識韓當軍士，疑此爲詐，便射殺一人。夫三軍將士或有新附，策爲大將，何能悉識？以所不識，便射殺之，非其論也，又策見殺在五年，柳城之役在十二年，九州春秋乖錯尤甚矣。」臣松之案：「傅子亦云曹公征柳城，將襲許。記述若斯，何其疏哉！然孫盛所譏，未爲悉是。黃祖始被策破，魂氣未反，（但）劉表君臣本無兼併之志，雖在上流，何辦規擬呉會？策之此舉，理應先圖陳登，但舉兵所在，不止登而已。於時強宗驍帥，祖郎、嚴虎之徒，禽滅已盡，所餘山越，蓋何足慮？然則策之所規，未可謂之不暇也。若使策志獲從，大權在手，淮泗之間，所在皆可都，何必畢志江外，其當遷帝於揚越哉？案魏武紀，武帝以建安四年已出屯官渡，乃策未死之前，久與袁紹交兵，則國志所云不爲謬也。許貢客，無聞之小人，而能感識恩遇，臨義忘生，卒然奮發，有侔古烈矣。詩云：『君子有徽猷，小人與屬。』貢客其有焉。」
