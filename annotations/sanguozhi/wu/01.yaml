  at: 76
  length: 0
  type: pei
  text: 獻帝春秋曰：「角稱天公將軍，角弟寶稱地公將軍，寶弟梁稱人公將軍。」
- id: wu.1.p3.a2
  anchor: wu.1.p3
  at: 150
  length: 0
  type: pei
  text: 呉書曰：「堅乘勝深入，於西華失利。堅被創墮馬，臥草中。軍衆分散，不知堅所在。堅所騎驄馬馳還營，踣地呼鳴，將士隨馬於草中得堅。堅還營十數日，創少愈，乃復出戰。」
- id: wu.1.p3.a3
  anchor: wu.1.p3
  at: 196
  length: 0
  type: pei
  text: 續漢書曰：「儁字公偉，會稽人，少好學，爲郡功曹，察孝廉，舉進士。漢朝以討黃巾功拜車騎將軍，累遷河南尹。董卓見儁，外甚親納，而心忌之，儁亦陰備焉。關東兵起，卓議移都，儁輒止卓。卓雖憚儁，然貪其名重，乃表拜太僕以自副。儁被召不肯受拜，因進曰：「國不宜遷，必孤天下望，成山東之結，臣不見其可也。」有司詰曰：「召君受拜而君拒之，不問徙事而君陳之，何也？」儁曰：「副相國，非臣所堪也。遷都非計，臣之所急也。辭所不堪，進臣所急，臣之所宜也。」有司曰：「遷都之事，初無此計也，就有，未露，何所受聞？」儁曰：「相國董卓爲臣説之，臣聞之於相國。」有司不能屈，朝廷稱服焉。後爲太尉。李傕、郭汜相攻，劫質天子公卿，儁性剛，卽發病而卒。
