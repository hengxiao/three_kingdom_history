  at: 19
  length: 0
  type: pei
  text: 呉書曰：「堅世仕呉，家於富春，葬於城東。塚上數有光怪，雲氣五色，上屬於天，曼延數里。衆皆往觀視。父老相謂曰：『是非凡氣，孫氏其興矣！』及母懷妊堅，夢腸出繞呉昌門，寤而懼之，以告鄰母。鄰母曰：『安知非吉徵也。』堅生，容貌不凡，性闊達，好奇節。」
