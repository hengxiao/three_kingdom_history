- id: wu.1.p11.a1
  anchor: wu.1.p11
  at: 69
  length: 0
  type: pei
  text: 呉暦曰：「初策在江都時，張紘有母喪。策數詣紘，咨以世務，曰：『方今漢祚中微，天下擾攘，英雄俊傑各擁衆營私，未有能扶危濟亂者也。先君與袁氏共破董卓，功業未遂，卒爲黃祖所害。策雖暗稚，竊有微志，欲從袁揚州求先君餘兵，就舅氏於丹楊，收合流散，東據呉會，報讎雪恥，爲朝廷外籓。君以爲何如？』紘答曰：『旣素空劣，方居衰絰之中，無以奉贊盛略。』策曰：『君高名播越，遠近懷歸。今日事計，決之於君，何得不紆慮啓告，副其高山之望？若微志得展，血讎得報，此乃君之勛力，策心所望也。』因涕泣橫流，顔色不變。紘見策忠壯內發，辭令慷慨，感其志言，乃答曰：『昔周道陵遲，齊晉並興；王室已寧，諸侯貢職。今君紹先侯之軌，有驍武之名，若投丹楊，收兵呉會，則荆揚可一，讎敵可報。據長江，奮威德，誅除群穢，匡輔漢室，功業侔於桓文，豈徒外籓而已哉？方今世亂多難，若功成事立，當與同好俱南濟也。』策曰：『一與君同符合契，（同）有永固之分，今便行矣，以老母弱弟委付於君，策無復回顧之憂。』」江表傳曰：「策徑到壽春見袁術，涕泣而言曰：『亡父昔從長沙入討董卓，與明使君會於南陽，同盟結好；不幸遇難，勛業不終。策感惟先人舊恩，欲自憑結，原明使君垂察其誠。』術甚貴異之，然未肯還其父兵。術謂策曰：『孤始用貴舅爲丹楊太守，賢從伯陽爲都尉，彼精兵之地，可還依召募。』策遂詣丹楊依舅，得數百人，而爲涇縣大帥祖郎所襲，幾至危殆。於是復往見術，術以堅餘兵千餘人還策。」
- id: wu.1.p12.a1
