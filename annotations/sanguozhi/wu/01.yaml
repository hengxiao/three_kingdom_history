  at: 141
  length: 0
  type: pei
  text: 呉暦曰：「策旣被創，醫言可治，當好自將護，百日勿動。策引鏡自照，謂左右曰：『面如此，尙可復建功立事乎？』椎几大奮，創皆分裂，其夜卒。」搜神記曰：「策旣殺于吉，每獨坐，彷彿見吉在左右，意深惡之，頗有失常。後治創方差，而引鏡自照，見吉在鏡中，顧而弗見，如是再三，因扑鏡大叫，創皆崩裂，須臾而死。」
- id: wu.1.p20.a1
