  type: pei
  text: 魏書曰：「堅到郡，郡中震服，任用良吏。敕吏曰：『謹遇良善，治官曹文書，必循治，以盜賊付太守。』」
- id: wu.1.p4.a2
  anchor: wu.1.p4
  at: 466
  length: 0
  type: pei
  text: 呉録曰：「是時廬江太守陸康從子作宜春長，爲賊所攻，遣使求救於堅。堅整嚴救之。主簿進諫，堅答曰：『太守無文德，以征伐爲功，越界攻討，以全異國。以此獲罪，何愧海內乎？』」乃進兵往救，賊聞而走。」
- id: wu.1.p5.a1
  anchor: wu.1.p5
  at: 27
  length: 0
  type: pei
  text: 江表傳曰：「堅聞之，拊膺嘆曰：『張公昔從吾言，朝廷今無此難也。』」
- id: wu.1.p5.a2
  anchor: wu.1.p5
  at: 49
  length: 0
  type: pei
  text: 案王氏譜，叡字通耀，晉太保祥伯父也。呉録曰：「叡先與堅共擊零桂賊，以堅武官，言頗輕之。及叡舉兵欲討卓，素與武陵太守曹寅不相能，楊言當先殺寅。寅懼，詐作案行使者光祿大夫温毅檄，移堅，説叡罪過，令收行刑訖，以狀上。堅卽承檄勒兵襲叡。叡聞兵至，登樓望之，遣問欲何爲，堅前部答曰：『兵久戰勞苦，所得賞，不足以爲衣服，詣使君更乞資直耳。』叡曰：『刺史豈有所吝？』便開庫藏，使自入視之，知有所遺不。兵進及樓下，叡見堅，驚曰：『兵自求賞，孫府君何以在其中？』堅曰：『被使者檄誅君。』叡曰：『我何罪？』堅曰：『坐無所知。』叡窮迫，刮金飲之而死。」
- id: wu.1.p5.a3
  anchor: wu.1.p5
  at: 74
  length: 0
  type: pei
  text: 英雄記曰：「咨字子議，潁川人，亦知名。」獻帝春秋曰：「袁術表堅假中郎將。堅到南陽，移檄太守請軍糧。咨以問綱紀，綱紀曰：「堅鄰郡二千石，不應調發。」咨遂不與。」
- id: wu.1.p5.a4
  anchor: wu.1.p5
  at: 196
  length: 0
  type: pei
  text: 呉歷曰：「初堅至南陽，咨旣不給軍糧，又不肯見堅。堅欲進兵，恐有後患，乃詐得急疾，舉軍震惶，迎呼巫醫，禱祀山川。遣所親人説咨，言病困，欲以兵付咨。咨聞之，心利其兵，卽將歩騎五六百人詣營省堅。堅臥與相見。無何，卒然而起，按劍駡咨，遂執斬之。」此語與本傳不同。
- id: wu.1.p6.a1
  anchor: wu.1.p6
  at: 176
  length: 0
  type: pei
  text: 英雄記曰：「初堅討董卓，到梁縣之陽人。卓亦遣兵歩騎五千迎之，陳郡太守胡軫爲大督護，呂布爲騎督，其餘歩騎將校都督者甚衆。軫字文才，性急，預宣言曰：『今此行也，要當斬一靑綬，乃整齊耳。』諸將聞而惡之。軍到廣成，去陽人城數十里。日暮，士馬疲極，當止宿，又本受卓節度宿廣成，秣馬飲食，以夜進兵，投曉攻城。諸將惡憚軫，欲賊敗其事，布等宣言『陽人城中賊已走，當追尋之；不然失之矣』，便夜進軍。城中守備甚設，不可掩襲。於是吏士飢渴，人馬甚疲，且夜至，又無塹壘。釋甲休息，而布又宣言相驚，云「城中賊出來」。軍衆擾亂奔走，皆棄甲，失鞍馬。行十餘里，定無賊，會天明，便還，拾取兵器，欲進攻城。城守已固，穿塹已深，軫等不能攻而還。」
- id: wu.1.p6.a2
  anchor: wu.1.p6
  at: 314
  length: 0
  type: pei
  text: 江表傳曰：「或謂術曰：『堅若得洛，不可復制，此爲除狼而得虎也』，故術疑之。」
- id: wu.1.p6.a3
  anchor: wu.1.p6
  at: 387
  length: 0
  type: pei
  text: 江表傳載堅語曰：「大勛垂捷而軍糧不繼，此呉起所以嘆泣於西河，樂毅所以遺恨於垂成也。原將軍深思之。」
- id: wu.1.p6.a4
  anchor: wu.1.p6
  at: 493
  length: 0
  type: pei
  text: 山陽公載記曰：「卓謂長史劉艾曰：『關東軍敗數矣，皆畏孤，無能爲也。惟孫堅小戇，頗能用人，當語諸將，使知忌之。孤昔與周愼西征，愼圍邊韓於金城。孤語張温，求引所將兵爲愼作後駐。温不聽。孤時上言其形勢，知愼必不克。臺今有本末。事未報，温又使孤討先零叛羌，以爲西方可一時蕩定。孤皆知其不然而不得止，遂行，留別部司馬劉靖將歩騎四千屯安定，以爲聲勢。叛羌便還，欲截歸道，孤小擊輒開，畏安定有兵故也。虜謂安定當數萬人，不知但靖也。時又上章言狀，而孫堅隨周愼行，謂愼求將萬兵造金城，使愼以二萬作後駐，邊韓城中無宿穀，當於外運，畏愼大兵，不敢輕與堅戰，而堅兵足以斷其運道，兒曹用必還羌谷中，涼州或能定也。温旣不能用孤，愼又不用堅，自攻金城，壞其外垣，馳使語温，自以克在旦夕，温時亦自以計中也。而渡遼兒果斷（蔡園）〔葵園〕，愼棄輜重走，果如孤策。臺以此封孤都鄕侯。堅以佐軍司馬，所見與人同，自爲可耳。』艾曰：『堅雖時見計，故自不如李傕、郭汜。聞在美陽亭北，將千騎歩與虜合，殆死，亡失印綬，此不爲能也。』卓曰：『堅時烏合義從，兵不如虜精，且戰有利鈍。但當論山東大勢，終無所至耳。』艾曰：『山東兒驅略百姓，以作寇逆，其鋒不如人，堅甲利兵強弩之用又不如人，亦安得久？』卓曰：『然，但殺二袁、劉表、孫堅，天下自服從孤耳。』」
- id: wu.1.p7.a1
  anchor: wu.1.p7
  at: 18
  length: 0
  type: pei
  text: 江表傳曰：「舊京空虛，數百里中無煙火。堅前入城，惆悵流涕。」吳書曰：「堅入洛，掃除漢宗廟，祠以太牢。堅軍城南甄官井上，旦有五色氣，舉軍驚怪，莫有敢汲。堅令人入井，探得漢傳國璽，文曰『受命於天，旣壽永昌』，方圜四寸，上紐交五龍，上一角缺。初，黃門張讓等作亂，劫天子出奔，左右分散，掌璽者以投井中。」山陽公載記曰：「袁術將僭號，聞堅得傳國璽，乃拘堅夫人而奪之。」江表傳曰：「案漢獻帝起居注云『天子從河上還，得六璽於閣上』，又太康之初孫皓送金璽六枚，無有玉，明其僞也。」虞喜志林曰：「天子六璽者，文曰『皇帝之璽』、『皇帝行璽』、『皇帝信璽』、『天子之璽』、『天子行璽」、『天子信璽』。此六璽所封事異，故文字不同。獻帝起注云『從河上還，得六玉璽於閣上』，此之謂也。傳國璽者，乃漢高祖所佩秦皇帝璽，世世傳受，號曰傳國璽。案傳國璽不在六璽之數，安得總其説乎？應氏漢官、皇甫世紀，其論六璽，文義皆符。漢宮傳國璽，文曰『受命於天，旣壽且康』。『且康』『永昌』，二字爲錯，未知兩家何者爲得。金玉之精，率有光氣，加以神器祕寶，輝耀益彰，蓋一代之奇觀，將來之異聞，而以不解之故，強謂之僞，不亦誣乎！陳壽爲破虜傳亦除此説，俱惑起居注，不知六璽殊名，與傳國爲七者也。呉時無能刻玉，故天子以金爲璽。璽雖以金，於文不異。呉降而送璽者送天子六璽，曩所得玉璽，乃古人遺印，不可施用。天子之璽，今以無有爲難，不通其義者耳。」臣松之以爲孫堅於興義之中最有忠烈之稱，若得漢神器而潛匿不言，此爲陰懷異志，豈所謂忠臣者乎？呉史欲以爲國華，而不知損堅之令德。如其果然，以傳子孫，縱非六璽之數，要非常人所畜，孫皓之降，亦不得但送六璽，而寶藏傳國也。受命於天，奚取於歸命之堂，若如喜言，則此璽今尙在孫門。匹夫懷璧，猶曰有罪，而況斯物哉！
- id: wu.1.p7.a2
  anchor: wu.1.p7
  at: 28
  length: 0
  type: pei
  text: 呉録曰：「是時關東州郡，務相兼併以自強大。袁紹遣會稽周㬂爲豫州刺史，來襲取州。堅慨然嘆曰：『同舉義兵，將救社稷。逆賊垂破而各若此，吾當誰與戮力乎！』言發涕下。㬂字仁明，周昕之弟也。」會稽典録曰：「初曹公興義兵，遣人要㬂，㬂卽收合兵衆，得二千人，從公征伐，以爲軍師。後與堅爭豫州，屢戰失利。會次兄九江太守昂爲袁術所攻，㬂往助之。軍敗，還鄕里，爲許貢所害。」
