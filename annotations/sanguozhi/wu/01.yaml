- id: wu.1.p8.a1
  anchor: wu.1.p8
  at: 56
  length: 0
  type: pei
  text: 典略曰：「堅悉其衆攻表，表閉門，夜遣將黃祖潛出發兵。祖將兵欲還，堅逆與戰。祖敗走，竄峴山中。堅乘勝夜追祖，祖部兵從竹木間暗射堅，殺之。」呉録曰：「堅時年三十七。」英雄記曰：「堅以初平四年正月七日死。」又云：「劉表將呂公將兵緣山向堅，堅輕騎尋山討公。公兵下石。中堅頭，應時腦出物故。其不同如此也。」
- id: wu.1.p9.a1
  anchor: wu.1.p9
  at: 26
  length: 0
  type: pei
  text: 呉録曰：「尊堅廟曰始祖，墓曰高陵。」志林曰：「堅有五子：策、權、翊、匡，呉氏所生；少子朗，庶生也，一名仁。」
- id: wu.1.p10.a1
  anchor: wu.1.p10
  at: 38
  length: 0
  type: pei
  text: 江表傳曰：「堅爲朱儁所表，爲佐軍，留家著壽春。策年十餘歳，已交結知名，聲譽發聞。有周瑜者，與策同年，亦英達夙成，聞策聲聞，自舒來造焉。便推結分好，義同斷金，勸策徙居舒，策從之。」
- id: wu.1.p10.a2
  anchor: wu.1.p10
  at: 54
  length: 0
  type: pei
  text: 魏書曰：「策當嗣侯，讓與弟匡。」
