  text: 呉録曰：「時有高岱者，隱於餘姚，策命出，使會稽丞陸昭逆之，策虛己候焉。聞其善左傳，乃自玩讀，欲與論講。或謂之曰：『高岱以將軍但英武而已，無文學之才，若與論傳而或云不知者，則某言符矣。』又謂岱曰：『孫將軍爲人，惡勝己者，若每問，當言不知，乃合意耳。如皆辨義，此必危殆。』岱以爲然，及與論傳，或答不知。策果怒，以爲輕己，乃囚之。知交及時人皆露坐爲請。策登樓，望見數里中塡滿。策惡其收衆心，遂殺之。岱字孔文，呉郡人也。受性聰達，輕財貴義。其友士拔奇，取於未顯，所友八人，皆世之英偉也。太守盛憲以爲上計，舉孝廉。許貢來領郡，岱將憲避難於許昭家，求救於陶謙。謙未卽救，岱憔悴泣血，水漿不入口。謙感其忠壯，有申包胥之義，許爲出軍，以書與貢。岱得謙書以還，而貢已囚其母。呉人大小皆爲危竦，以貢宿忿，往必見害。岱言在君則爲君，且母在牢獄，期於當往，若得入見，事自當解。遂通書自白，貢卽與相見。才辭敏捷，好自陳謝，貢登時出其母。岱將見貢，語友人張允、沈䁕令豫具船，以貢必悔，當追逐之。出便將母乘船易道而逃。貢須臾遣人追之，令追者若及於船，江上便殺之，已過則止。使與岱錯道，遂免。被誅時，年三十餘。」《江表傳》曰：「時有道士琅邪于吉，先寓居東方，往來呉會，立精舍，燒香讀道書，製作符水以治病，呉會人多事之。策嘗於郡城門樓上，集會諸將賓客，吉乃盛服杖小函，漆畫之，名爲仙人鏵，趨度門下。諸將賓客三分之二下樓迎拜之，掌賓者禁呵不能止。策卽令收之。諸事之者，悉使婦女入見策母，請救之。母謂策曰：『于先生亦助軍作福，醫護將士，不可殺之。』策曰：『此子妖妄，能幻惑衆心，遠使諸將不復相顧君臣之禮，盡委策下樓拜之，不可不除也。』諸將復連名通白事陳乞之，策曰：『昔南陽張津爲交州刺史，舍前聖典訓，廢漢家法律，嘗著絳帕頭，鼓琴燒香，讀邪俗道書，云以助化，卒爲南夷所殺。此甚無益，諸君但未悟耳。今此子已在鬼籙，勿復費紙筆也。』卽催斬之，縣首於巿。諸事之者，尙不謂其死而云屍解焉，復祭祀求福。」志林曰：『初順帝時，琅邪宮崇詣闕上師于吉所得神書於曲陽泉水上，白素朱界，號太平靑領道，凡百餘卷。順帝至建安中，五六十歳，于吉是時近已百年，年在耄悼，禮不加刑。又天子巡狩，問百年者，就而見之，敬齒以親愛，聖王之至教也。吉罪不及死，而暴加酷刑，是乃謬誅，非所以爲美也。喜推考桓王之薨，建安五年四月四日。是時曹袁相攻，未有勝負。案夏侯元讓與石威則書，袁紹破後也。書云：「授孫賁以長沙，業張津以零桂。」此爲桓王於前亡，張津於後死，不得相讓，譬言津之死意矣。』臣松之案：「太康八年，廣州大中正王範上交廣二州春秋。建安六年，張津猶爲交州牧。江表傳之虛如志林所云。搜神記曰：『』策欲渡江襲許，與吉俱行。時大旱，所在熇厲。策催諸將士使速引船，或身自早出督切，見將吏多在吉許，策因此激怒，言：「我爲不如于吉邪，而先趨務之？」便使收吉。至，呵問之曰：「天旱不雨，道塗艱澀，不時得過，故自早出，而卿不同憂戚，安坐船中作鬼物態，敗吾部伍，今當相除。」令人縛置地上暴之，使請雨，若能感天日中雨者，當原赦，不爾行誅。俄而雲氣上蒸，膚寸而合，比至日中，大雨總至，溪澗盈溢。將士喜悅，以爲吉必見原，並往慶慰。策遂殺之。將士哀惜，共藏其屍。天夜，忽更興雲覆之；明旦往視，不知所在。案江表傳、搜神記于吉事不同，未詳孰是。」
- id: wu.1.p18.a1
