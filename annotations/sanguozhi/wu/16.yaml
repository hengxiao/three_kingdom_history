- id: wu.16.p29.a1
  anchor: wu.16.p29
  at: 71
  length: 0
  type: pei
  text: 《吴录》曰：太子自惧黜废，而鲁王觊觎益甚。权时见杨竺，辟左右而论霸之才，竺深述霸有文武英姿，宜为嫡嗣，於是权乃许立焉。有给使伏于床下，具闻之，以告太子。胤当至武昌，往辞太子。太子不见，而微服至其车上，与共密议，欲令陆逊表谏。既而逊有表极谏，权疑竺泄之，竺辞不服。权使竺出寻其由，竺白顷惟胤西行，必其所道。又遣问逊何由知之，逊言胤所述。召胤考问，胤为太子隐曰：「杨竺向臣道之。」遂共为狱。竺不胜痛毒，服是所道。初权疑竺泄之，及服，以为果然，乃斩竺。
