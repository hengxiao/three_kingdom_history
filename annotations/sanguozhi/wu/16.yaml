  at: 160
  length: 0
  type: pei
  text: 《吴录》曰：旧拜庙，选兼大将军领三千兵为卫，凯欲因此兵以图之，令选曹白用丁奉。皓偶不欲，曰：「更选。」凯令执据，虽蹔兼，然宜得其人。皓曰：「用留平。」凯令其子祎谋语平。平素与丁奉有隙，祎未及得宣凯旨，平语祎曰：「闻野猪入丁奉营，此凶徵也。」有喜色。祎乃不敢言，还，因具启凯，故辍止。
- id: wu.16.p21.a1
