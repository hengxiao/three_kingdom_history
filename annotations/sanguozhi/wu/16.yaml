- id: wu.16.p2.a1
  anchor: wu.16.p2
  at: 22
  length: 0
  type: pei
  text: 江表传曰：权克荆州，将吏悉皆归附，而濬独称疾不见。权遣人以床就家舆致之，濬伏面著床席不起，涕泣交横，哀咽不能自胜。权慰劳与语，呼其字曰：「承明，昔观丁父，鄀俘也，武王以为军帅；彭仲爽，申俘也，文王以为令尹。此二人，卿荆国之先贤也，初虽见囚，后皆擢用，为楚名臣。卿独不然，未肯降意，将以孤异古人之量邪？」使亲近以手巾拭其面，濬起下地拜谢。即以为治中，荆州诸军事一以谘之。武陵部从事樊伷诱导诸夷，图以武陵属刘备，外白差督督万人往讨之。权不听，特召问濬，濬答：「以五千兵往，足可以擒伷。」权曰：「卿何以轻之？」濬曰：「伷是南阳旧姓，颇能弄脣吻，而实无辩论之才。臣所以知之者，伷昔尝为州人设馔，比至日中，食不可得，而十餘自起，此亦侏儒观一节之验也。」权大笑而纳其言，即遣濬将五千往，果斩平之。
- id: wu.16.p2.a2
  anchor: wu.16.p2
  at: 34
  length: 0
  type: pei
  text: 吴书曰：芮玄卒，濬并领玄兵，屯夏口。玄字文表，丹杨人。父祉，字宣嗣，从孙坚征伐有功，坚荐祉为九江太守，后转吴郡，所在有声。玄兄良，字文鸾，随孙策平定江东，策以为会稽东部都尉，卒，玄领良兵，拜奋武中郎将，以功封溧阳侯。权为子登拣择淑媛，群臣咸称玄父祉兄良并以德义文武显名三世，故遂娉玄女为妃焉。黄武五年卒，权甚愍惜之。
