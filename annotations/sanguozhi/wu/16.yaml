- id: wu.16.p4.a1
  anchor: wu.16.p4
  at: 21
  length: 0
  type: pei
  text: 吴书曰：翥字文龙，拜骑都尉，后代领兵，早卒。翥弟祕，权以姊陈氏女妻之，调湘乡令。《襄阳记》曰：襄阳习温为荆州大公平。大公平，今之州都。祕过辞於温，问曰：「先君昔曰君侯当为州里议主，今果如其言，不审州里谁当复相代者？」温曰：「无过於君也。」后祕为尚书僕射，代温为公平，甚得州里之誉。
