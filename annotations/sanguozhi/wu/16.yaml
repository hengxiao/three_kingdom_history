  at: 50
  length: 0
  type: pei
  text: 江表传曰：权数射雉，濬谏权，权曰：「相与别后，时时蹔出耳，不复如往日之时也。」濬曰：「天下未定，万机务多，射雉非急，弦绝括破，皆能为害，乞特为臣故息置之。」濬出，见雉翳故在，乃手自撤坏之。权由是自绝，不复射雉。
