- id: wu.16.p2.a4
  anchor: wu.16.p2
  at: 106
  length: 0
  type: pei
  text: 吴书曰：骠骑将军步骘屯沤口，求召募诸郡以增兵。权以问濬，濬曰：「豪将在民间，耗乱为害，加骘有名势，在所所媚，不可听也。」权从之。中郎将豫章徐宗，有名士也，尝到京师，与孔融交结，然儒生诞节，部曲宽纵，不奉节度，为众作殿，濬遂斩之。其奉法不惮私议，皆此类也。归义隐蕃，以口辩为豪杰所善，濬子翥亦与周旋，馈饷之。濬闻大怒，疏责翥曰：「吾受国厚恩，志报以命，尔辈在都，当念恭顺，亲贤慕善，何故与降虏交，以粮饷之？在远闻此，心震面热，惆怅累旬。疏到，急就往使受杖一百，促责所饷。」当时人咸怪濬，而蕃果图叛诛夷，众乃归服。江表传曰：时濬姨兄零陵蒋琬为蜀大将军，或有间濬於武陵太守卫旌者，云濬遣密使与琬相闻，欲有自讬之计。旌以启权，权曰：「承明不为此也。」即封旌表以示於濬，而召旌还，免官。
