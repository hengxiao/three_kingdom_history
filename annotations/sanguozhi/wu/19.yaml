  anchor: wu.19.p22
  at: 358
  length: 0
  type: pei
  text: 《吳錄》曰：峻提刀稱詔收恪，亮起立曰：「非我所為！非我所為！」乳母引亮還內。《吳曆》云：峻先引亮入，然後出稱詔。與本傳同。臣松之以為峻欲稱詔，宜如本傳及《吳曆》，不得如《吳錄》所言。
- id: wu.19.p22.a3
  anchor: wu.19.p22
  at: 429
  length: 0
  type: pei
  text: 《搜神記》曰：恪入，已被殺，其妻在室，語使婢曰：「汝何故血臭？」婢曰：「不也。」有頃愈劇，又問婢曰：「汝眼目視瞻，何以不常？」婢蹶然起躍，頭至於棟，攘臂切齒而言曰：「諸葛公乃為孫峻所殺！」於是大小知恪死矣，而吏兵尋至。《志林》曰：初權病篤，召恪輔政。臨去，大司馬呂岱戒之曰：「世方多難，子每事必十思。」恪答曰：「昔季文子三思而後行，夫子曰『再思可矣』，今君令恪十思，明恪之劣也。」岱無以答，當時咸謂之失言。虞喜曰：夫託以天下至重也，以人臣行主威至難也，兼二至而管萬機，能勝之者鮮矣。自非採納群謀，詢於芻蕘，虛己受人，恆若不足，則功名不成，勳績莫著。況呂侯國之先耆，智度經遠，而甫以十思戒之，而便以示劣見拒，此元遜之疏，乃機神不俱者也。若因十思之義，廣諮當世之務，聞善速於雷動，從諫急於風移，豈得隕首殿堂，死兇豎之刃？世人奇其英辯，造次可觀，而哂呂侯無對為陋，不思安危終始之慮，是樂春藻之繁華，而忘秋實之甘口也。昔魏人伐蜀，蜀人御之，精嚴垂發，六軍雲擾，士馬擐甲，羽檄交馳，費禕時為元帥，荷國任重，而與來敏圍棋，意無厭倦。敏臨別謂禕：「君必能辦賊者也。」言其明略內定，貌無憂色，況長寧以為君子臨事而懼，好謀而成者。且蜀為蕞爾之國，而方向大敵，所規所圖，唯守與戰，何可矜己有餘，晏然無戚？斯乃性之寬簡，不防細微，卒為降人郭脩所害，豈非兆見於彼而禍成於此哉？往聞長寧之甄文偉，今睹元遜之逆呂侯，二事體同，故並而載之，可以鏡誡於後，永為世鑑。
