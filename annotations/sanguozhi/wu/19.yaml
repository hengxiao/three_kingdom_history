  text: 《江表傳》曰：恪少有才名，發藻岐嶷，辯論應機，莫與為對。權見而奇之，謂瑾曰：「藍田生玉，真不虛也。」《吳錄》曰：恪長七尺六寸，少鬚眉，折頞廣額，大口高聲。
