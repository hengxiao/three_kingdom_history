  type: pei
  text: 《吳書》曰：權寢疾，議所付託。時朝臣咸皆注意於恪，而孫峻表恪器任輔政，可付大事。權嫌恪剛很自用，峻以當今朝臣皆莫及，遂固保之，乃徵恪。後引恪等見臥內，受詔床下，權詔曰：「吾疾困矣，恐不復相見，諸事一以相委。」恪歔欷流涕曰：「臣等皆受厚恩，當以死奉詔，原陛下安精神，損思慮，無以外事為念。」權詔有司諸事一統於恪，惟殺生大事然後以聞。為治第館，設陪衛。群官百司拜揖之儀，各有品敘。諸法令有不便者，條列以聞，權輒聽之。中外翕然，人懷歡欣。
