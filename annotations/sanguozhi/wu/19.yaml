  type: pei
  text: 《吳曆》曰：張約、朱恩密疏告恪，恪以示滕胤，胤勸恪還，恪曰：「峻小子何能為邪！但恐因酒食中人耳。」乃以藥酒入。孫盛評曰：恪與胤親厚，約等疏，非常大事，勢應示胤，共謀安危。然恪性強梁，加素侮峻，自不信，故入，豈胤微勸，便為之冒禍乎？吳曆為長。
