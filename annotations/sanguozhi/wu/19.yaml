  type: pei
  text: 文士傳曰：華融字德蕤，廣陵江都人。祖父避亂，居山陰蕊山下。時皇象亦寓居山陰，吳郡張溫來就像學，欲得所舍。或告溫曰：「蕊山下有華德蕤者，雖年少，美有令志，可舍也。」溫遂止融家，朝夕談講。俄而溫為選部尚書，乃擢融為太子庶子，遂知名顯達。融子諝，黃門郎，與融並見害。次子譚，以才辯稱，晉秘書監。
