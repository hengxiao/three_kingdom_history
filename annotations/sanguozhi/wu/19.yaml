  length: 0
  type: pei
  text: 江表傳曰：亮召全尚息黃門侍郎紀密謀，曰：「孫綝專勢，輕小於孤。孤見敕之，使速上岸，為唐諮等作援，而留湖中，不上岸一步。又委罪硃異，擅殺功臣，不先表聞。築第橋南，不復朝見。此為自在，無復所畏，不可久忍。今規取之，卿父作中軍都督，使密嚴整士馬，孤當自出臨橋，帥宿衛虎騎、左右無難一時圍之。作版詔敕綝所領皆解散，不得舉手，正爾自得之。卿去，但當使密耳。卿宣詔語卿父，勿令卿母知之，女人既不曉大事，且綝同堂姊，邂逅洩漏，誤孤非小也。」紀承詔，以告尚，尚無遠慮，以語紀母。母使人密語綝。綝夜發嚴兵廢亮，比明，兵已圍宮。亮大怒，上馬，帶鞬執弓欲出，曰：「孤大皇帝之適子，在位已五年，誰敢不從者？」侍中近臣及乳母共牽攀止之，乃不得出，嘆吒二日不食，罵其妻曰：「爾父憒憒，敗我大事！」又呼紀，紀曰：「臣父奉詔不謹，負上，無面目復見。」因自殺。孫盛曰：亮傳稱亮少聰慧，勢當先與紀謀，不先令妻知也。江表傳說漏洩有由，於事為詳矣。
