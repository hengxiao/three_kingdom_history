  type: pei
  text: 《吳書》曰：留贊字正明，會稽長山人。少為郡吏，與黃巾賊帥吳桓戰，手斬得桓。贊一足被創，遂屈不伸。然性烈，好讀兵書及三史，每覽古良將戰攻之勢，輒對書獨嘆，因呼諸近親謂曰：「今天下擾亂，英豪並起，歷觀前世，富貴非有常人，而我屈躄在閭巷之間，存亡無以異。今欲割引吾足，幸不死而足申，幾復見用，死則已矣。」親戚皆難之。有間，贊乃以刀自割其筋，血流滂沱，氣絕良久。家人驚怖，亦以既爾，遂引申其足。足申創愈，以得蹉步。凌統聞之，請與相見，甚奇之，乃表薦贊，遂被試用。累有戰功，稍遷屯騎校尉。時事得失，每常規諫，好直言不阿旨，權以此憚之。諸葛恪征東興，讚為前部，合戰先陷陳，大敗魏師，遷左將軍。孫峻徵淮南，授贊節，拜左護軍。未至壽春，道路病發，峻令贊將車重先還。魏將蔣班以步騎四千追贊。贊病困，不能整陳，知必敗，乃解曲蓋印綬付弟子以歸，曰：「吾自為將，破敵搴旗，未嘗負敗。今病困兵羸，眾寡不敵，汝速去矣，俱死無益於國，適所以快敵耳。」弟子不肯受，拔刀欲斫之，乃去。初，讚為將，臨敵必先被發叫天，因抗音而歌，左右應之，畢乃進戰，戰無不克。及敗，歎曰：「吾戰有常術，今病困若此，固命也！」遂被害，時年七十三，眾庶痛惜焉。二子略、平，並為大將。
