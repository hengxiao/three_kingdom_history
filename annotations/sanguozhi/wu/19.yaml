  text: 《漢晉春秋》曰：恪使司馬李衡往蜀說姜維，令同舉，曰：「古人有言，聖人不能為時，時至亦不可失也。今敵政在私門，外內猜隔，兵挫於外，而民怨於內，自曹操以來，彼之亡形未有如今者也。若大舉伐之，使吳攻其東，漢入其西，彼救西則東虛，重東則西輕，以練實之軍，乘虛輕之敵，破之必矣。」維從之。
