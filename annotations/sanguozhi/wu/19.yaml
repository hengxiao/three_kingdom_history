  text: 《吳錄》曰：友有脣吻，少為縣吏。虞翻徙交州，縣令使友送之，翻與語而奇焉，為書與豫章太守謝斐，令以為功曹。郡時見有功曹，斐見之，問曰：「縣吏聶友，可堪何職？」對曰：「此人縣間小吏耳，猶可堪曹佐。」斐曰：「論者以為宜作功曹，君其避之。」乃用為功曹。使至都，諸葛恪友之。時論謂顧子嘿、子直，其間無所复容，恪欲以友居其間，由是知名。後為將，討儋耳，還拜丹楊太守，年三十三卒。
