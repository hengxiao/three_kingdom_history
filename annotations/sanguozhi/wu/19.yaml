  text: 《江表傳》曰：權為吳王，初置節度官，使典掌軍糧，非漢制也。初用侍中偏將軍徐詳，詳死，將用恪。諸葛亮聞恪代詳，書與陸遜曰：「家兄年老，而恪性疏，今使典主糧穀，糧穀軍之要最，僕雖在遠，竊用不安。足下特為啟至尊轉之。」遜以白權，即轉恪領兵。
