  at: 399
  length: 0
  type: pei
  text: 恪別傳曰：權嘗饗蜀使費禕，先逆敕群臣：「使至，伏食勿起。」禕至，權為輟食，而群下不起。禕啁之曰：「鳳皇來翔，騏驎吐哺，驢騾無知，伏食如故。」恪答曰：「爰植梧桐，以待鳳皇，有何燕雀，自稱來翔？何不彈射，使還故鄉！」禕停食餅，索筆作麥賦，恪亦請筆作磨賦，咸稱善焉。權嘗問恪：「頃何以自娛，而更肥澤？」恪對曰：「臣聞富潤屋，德潤身，臣非敢自娛，脩己而已。」又問：「卿何如滕胤？」恪答曰：「登階躡履，臣不如胤；回籌轉策，胤不如臣。」恪嘗獻權馬，先𨪕其耳。範慎時在坐，嘲恪曰：「馬雖大畜，禀氣於天，今殘其耳，豈不傷仁？」恪答曰：「母之於女，恩愛至矣，穿耳附珠，何傷於仁？」太子嘗嘲恪：「諸葛元遜可食馬矢。」恪曰：「原太子食雞卵。」權曰：「人令卿食馬矢，卿使人食雞卵何也？」恪曰：「所出同耳。」權大笑。《江表傳》曰：曾有白頭鳥集殿前，權曰：「此何鳥也？」恪曰：「白頭翁也。」張昭自以坐中最老，疑恪以鳥戲之，因曰：「恪欺陛下，未嘗聞鳥名白頭翁者，試使恪复求白頭母。」恪曰：「鳥名鸚母，未必有對，試使輔吳复求鸚父。」昭不能答，坐中皆歡笑。
