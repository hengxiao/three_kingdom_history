  length: 0
  type: pei
  text: 会稽典录曰：谢渊字休德，少修德操，躬秉耒耜，既无慼容，又不易虑，由是知名。举孝廉，稍迁至建武将军，虽在戎旅，犹垂意人物。骆统子名秀，被门庭之谤，众论狐疑，莫能证明。渊闻之叹息曰：「公绪早夭，同盟所哀。闻其子志行明辩，而被闇昧之谤，望诸夫子烈然高断，而各怀迟疑，非所望也。」秀卒见明，无复瑕玷，终为显士，渊之力也。吴历称云，谢厷才辩有计术。
