- id: wu.13.p22.a1
  anchor: wu.13.p22
  at: 339
  length: 0
  type: pei
  text: 臣松之以为逊虑孙权以退，魏得专力於己，既能张拓形势，使敌不敢犯，方舟顺流，无复怵惕矣，何为复潜遣诸将，奄袭小县，致令市人骇奔，自相伤害？俘馘千人，未足损魏，徒使无辜之民横罹荼酷，与诸葛渭滨之师，何其殊哉！用兵之道既违，失律之凶宜应，其祚无三世，及孙而灭，岂此之餘殃哉！
- id: wu.13.p22.a2
  anchor: wu.13.p22
  at: 406
