  type: pei
  text: 景弟机，字士衡，云字士龙。《机云别传》曰：晋太康末，俱入洛，造司空张华，华一见而奇之，曰：「伐吴之役，利在获二俊。」遂为之延誉，荐之诸公。太傅杨骏辟机为祭酒，转太子洗马、尚书著作郎。云为吴王郎中令，出宰浚仪，甚有惠政，吏民怀之，生为立祠。后并历显位。机天才绮练，文藻之美，独冠於时。云亦善属文，清新不及机，而口辩持论过之。于时朝廷多故，机、云并自结於成都王颖。颖用机为平原相，云清河内史。寻转云右司马，甚见委仗。无几而与长沙王构隙，遂举兵攻洛，以机行后将军，督王粹、牵秀等诸军二十万，士龙著南征赋以美其事。机吴人，羁旅单宦，顿居群士之右，多不厌服。机屡战失利，死散过半。初，宦人孟玖，颖所嬖幸，乘宠豫权，云数言其短，颖不能纳，玖又从而毁之。是役也，玖弟超亦领众配机，不奉军令。机绳之以法，超宣言曰陆机将反。及牵秀等谮机於颖，以为持两端，玖又构之於内，颖信之，遣收机，并收云及弟耽，并伏法。机兄弟既江南之秀，亦著名诸夏，并以无罪夷灭，天下痛惜之。机文章为世所重，云所著亦传於世。初，抗之克步阐也，诛及婴孩，识道者尤之曰：「后世必受其殃！」及机之诛，三族无遗，孙惠与硃诞书曰：「马援择君，凡人所闻，不意三陆相携暴朝，杀身伤名，可为悼叹。」事亦并在晋书。
