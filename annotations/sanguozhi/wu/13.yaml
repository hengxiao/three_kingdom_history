- id: wu.13.p8.a1
  anchor: wu.13.p8
  at: 156
  length: 0
  type: pei
  text: 吴书曰：诸将并欲迎击备，逊以为不可，曰：「备举军东下，锐气始盛，且乘高守险，难可卒攻，攻之纵下，犹难尽克，若有不利，损我大势，非小故也。今但且奖厉将士，广施方略，以观其变。若此间是平原旷野，当恐有颠沛交驰之忧，今缘山行军，势不得展，自当罢於木石之间，徐制其弊耳。」诸将不解，以为逊畏之，各怀愤恨。
