- id: wu.13.p23.a2
  anchor: wu.13.p23
  at: 133
  length: 0
  type: pei
  text: 臣松以为边将为害，盖其常事，使逯式得罪，代者亦复如之，自非狡焉思肆，将成大患，何足亏损雅虑，尚为小诈哉？以斯为美，又所不取。
