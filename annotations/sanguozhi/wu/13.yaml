  type: pei
  text: 陆机为逊铭曰：魏大司马曹休侵我北鄙，乃假公黄钺，统御六师及中军禁卫而摄行王事，主上执鞭，百司屈膝。吴录曰：假逊黄钺，吴王亲执鞭以见之。
