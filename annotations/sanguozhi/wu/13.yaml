  at: 22
  length: 0
  type: pei
  text: 陆氏世颂曰：逊祖纡，字叔盘，敏淑有思学，守城门校尉。父骏，字季才，淳懿信厚，为邦族所怀，官至九江都尉。
- id: wu.13.p2.a1
