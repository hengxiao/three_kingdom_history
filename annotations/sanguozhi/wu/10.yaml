  length: 0
  type: pei
  text: 《吳書》曰：赤壁之役，蓋爲流矢所中，時寒墮水，爲吳軍人所得，不知其蓋也，置廁牀中。蓋自彊以一聲呼韓當，當聞之，曰：「此公覆聲也。」向之垂涕，解易其衣，遂以得生。
- id: wu.10.p9.a1
  anchor: wu.10.p9
  at: 16
  length: 0
  type: pei
  text: 《吳書》曰：又圖畫蓋形，四時祠祭。
