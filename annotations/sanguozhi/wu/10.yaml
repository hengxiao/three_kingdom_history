- id: wu.10.p28.a3
  anchor: wu.10.p28
  at: 153
  length: 0
  type: pei
  text: 《吳書》曰：寧將僮客八百人就劉表。表儒人，不習軍事。時諸英豪各各起兵，寧觀表事勢，終必無成，恐一朝土崩，并受其禍，欲東入吳。黃祖在夏口，軍不得過，乃留依祖，三年不禮之。權討祖，祖軍敗奔走，追兵急，寧以善射，將兵在後，射殺校尉凌操。祖旣得免，軍罷還營，待寧如初。祖都督蘇飛數薦寧，祖不用，令人化誘其客，客稍亡。寧欲去，恐不獲免，獨憂悶不知所出。飛知其意，乃要寧，爲之置酒，謂曰：「吾薦子者數矣，主不能用。日月逾邁，人生幾何，宜自遠圖，庶遇知己。」寧良久乃曰：「雖有其志，未知所由。」飛曰：「吾欲白子爲邾長，於是去就，孰與臨阪轉丸乎？」寧曰：「幸甚。」飛白祖，聽寧之縣。招懷亡客并義從者，得數百人。
