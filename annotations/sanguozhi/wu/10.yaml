  text: 《吳書》曰：凌統怨寧殺其父操，寧常備統，不與相見。權亦命統不得讎之。甞於呂蒙舍會，酒酣，統乃以刀舞。寧起曰：「寧能雙戟舞。」蒙曰：「寧雖能，未若蒙之巧也。」因操刀持楯，以身分之。後權知統意，因令寧將兵，遂徙屯於半州。
