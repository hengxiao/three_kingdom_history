  at: 38
  length: 0
  type: pei
  text: 《吳書》曰：綜欲叛，恐左右不從，因諷使劫略，示欲饒之，轉相放效，爲行旅大患。後因詐言被詔，以部曲爲寇盜見詰讓，云「將吏以下，當並收治」，又言恐罪自及。左右因曰：「惟當去耳。」遂共圖計，以當葬父，盡呼親戚姑姊，悉以嫁將吏，所幸婢妾，皆賜與親近，殺牛飲酒歃血，與共盟誓。
