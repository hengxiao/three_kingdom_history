  at: 61
  length: 0
  type: pei
  text: 《吳書》曰：普殺叛者數百人，皆使投火，即日病癘，百餘日卒。
- id: wu.10.p6.a1
  anchor: wu.10.p6
  at: 13
  length: 0
  type: pei
  text: 《吳書》曰：故南陽太守黃子廉之後也，枝葉分離，自祖遷于零陵，遂家焉。蓋少孤，嬰丁凶難，辛苦備甞，然有壯志，雖處貧賤，不自同於凡庸，常以負薪餘閑，學書疏，講兵事。
- id: wu.10.p8.a1
  anchor: wu.10.p8
  at: 44
  length: 0
  type: pei
  text: 瑜傳
- id: wu.10.p8.a2
  anchor: wu.10.p8
  at: 45
  length: 0
  type: pei
  text: 《吳書》曰：赤壁之役，蓋爲流矢所中，時寒墮水，爲吳軍人所得，不知其蓋也，置廁牀中。蓋自彊以一聲呼韓當，當聞之，曰：「此公覆聲也。」向之垂涕，解易其衣，遂以得生。
- id: wu.10.p9.a1
  anchor: wu.10.p9
  at: 16
  length: 0
  type: pei
  text: 《吳書》曰：又圖畫蓋形，四時祠祭。
- id: wu.10.p10.a1
  anchor: wu.10.p10
  at: 13
  length: 0
  type: pei
  text: 令音郎定反。支音巨兒反。
- id: wu.10.p10.a2
  anchor: wu.10.p10
  at: 49
  length: 0
  type: pei
  text: 《吳書》曰：當勤苦有功，以軍旅陪隷，分於英豪，故爵位不加。終於堅世，爲別部司馬。
