  type: pei
  text: 《江表傳》曰：權謂欽曰：「盛前白卿，卿今舉盛，欲慕祁奚邪？」欽對曰：「臣聞公舉不挾私怨，盛忠而勤彊，有膽略器用，好萬人督也。今大事未定，臣當助國求才，豈敢挾私恨以蔽賢乎！」權嘉之。
