  type: pei
  text: 《吳書》曰：故南陽太守黃子廉之後也，枝葉分離，自祖遷于零陵，遂家焉。蓋少孤，嬰丁凶難，辛苦備甞，然有壯志，雖處貧賤，不自同於凡庸，常以負薪餘閑，學書疏，講兵事。
