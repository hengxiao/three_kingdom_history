  length: 0
  type: pei
  text: 《江表傳》曰：權命以其愛妾殉葬，復客二百家。孫盛曰：昔三良從秦穆師以之不征；魏妾旣出，杜回以之僵仆。禍福之報，如此之效也。權仗計任術，以生從死，世祚之促，不亦宜乎！
