- id: wu.10.p33.a1
  anchor: wu.10.p33
  at: 130
  length: 0
  type: pei
  text: 《吳書》曰：凌統怨寧殺其父操，寧常備統，不與相見。權亦命統不得讎之。甞於呂蒙舍會，酒酣，統乃以刀舞。寧起曰：「寧能雙戟舞。」蒙曰：「寧雖能，未若蒙之巧也。」因操刀持楯，以身分之。後權知統意，因令寧將兵，遂徙屯於半州。
- id: wu.10.p39.a1
  anchor: wu.10.p39
  at: 202
  length: 0
  type: pei
  text: 《吳書》曰：統創甚，權遂留統於舟，盡易其衣服。其創賴得卓氏良藥，故得不死。
- id: wu.10.p42.a1
  anchor: wu.10.p42
  at: 90
  length: 0
  type: pei
  text: 孫盛曰：觀孫權之養士也，傾心竭思，以求其死力，泣周泰之夷，殉陳武之妾，請呂蒙之命，育凌統之孤，卑曲苦志，如此之勤也。是故雖令德無聞，仁澤內著，而能屈彊荊吳，僭擬年歲者，抑有由也。然霸王之道，期於大者遠者，是以先王建德義之基，恢信順之宇，制經略之綱，明貴賤之叙，易簡而其親可乆，體全而其功可大，豈踒璅近務，邀利於當年哉？語曰「雖小道，必有可觀者焉，致遠恐泥」，其是之謂乎！
- id: wu.10.p47.a1
  anchor: wu.10.p47
  at: 85
  length: 0
  type: pei
  text: 干寶《晉紀》所云「疑城」，已注〈孫權傳〉。《魏氏春秋》云：文帝歎曰：「魏雖有武騎千羣，無所用也。」
