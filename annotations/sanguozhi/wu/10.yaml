  text: 《江表傳》曰：權把其臂，因流涕交連，字之曰：「幼平，卿爲孤兄弟戰如熊虎，不惜軀命，被創數十，膚如刻畫，孤亦何心不待卿以骨肉之恩，委卿以兵馬之重乎！卿吳之功臣，孤當與卿同榮辱，等休戚。幼平意快爲之，勿以寒門自退也。」即勑以己常所用御幘青縑蓋賜之。坐罷，住駕，使泰以兵馬導從出，鳴鼓角作鼓吹。
