- id: wu.10.p11.a1
  anchor: wu.10.p11
  at: 38
  length: 0
  type: pei
  text: 《吳書》曰：綜欲叛，恐左右不從，因諷使劫略，示欲饒之，轉相放效，爲行旅大患。後因詐言被詔，以部曲爲寇盜見詰讓，云「將吏以下，當並收治」，又言恐罪自及。左右因曰：「惟當去耳。」遂共圖計，以當葬父，盡呼親戚姑姊，悉以嫁將吏，所幸婢妾，皆賜與親近，殺牛飲酒歃血，與共盟誓。
- id: wu.10.p14.a1
  anchor: wu.10.p14
  at: 85
  length: 0
  type: pei
  text: 《江表傳》曰：權謂欽曰：「盛前白卿，卿今舉盛，欲慕祁奚邪？」欽對曰：「臣聞公舉不挾私怨，盛忠而勤彊，有膽略器用，好萬人督也。今大事未定，臣當助國求才，豈敢挾私恨以蔽賢乎！」權嘉之。
- id: wu.10.p17.a1
  anchor: wu.10.p17
  at: 160
  length: 0
  type: pei
  text: 《江表傳》曰：權把其臂，因流涕交連，字之曰：「幼平，卿爲孤兄弟戰如熊虎，不惜軀命，被創數十，膚如刻畫，孤亦何心不待卿以骨肉之恩，委卿以兵馬之重乎！卿吳之功臣，孤當與卿同榮辱，等休戚。幼平意快爲之，勿以寒門自退也。」即勑以己常所用御幘青縑蓋賜之。坐罷，住駕，使泰以兵馬導從出，鳴鼓角作鼓吹。
