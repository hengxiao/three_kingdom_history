  text: 《吳書》曰：寧本南陽人，其先客於巴郡。寧爲吏舉計掾，補蜀郡丞，頃之，棄官歸家。
- id: wu.10.p28.a2
  anchor: wu.10.p28
  at: 59
  length: 0
  type: pei
  text: 《吳書》曰：寧輕俠殺人，藏舍亡命，聞於郡中。其出入，步則陳車騎，水則連輕舟，侍從被文繡，所如光道路，住止常以繒錦維舟，去或割棄，以示奢也。
- id: wu.10.p28.h2
