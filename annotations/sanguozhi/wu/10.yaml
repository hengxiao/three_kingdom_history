- id: wu.10.p28.a1
  anchor: wu.10.p28
  at: 13
  length: 0
  type: pei
  text: 《吳書》曰：寧本南陽人，其先客於巴郡。寧爲吏舉計掾，補蜀郡丞，頃之，棄官歸家。
- id: wu.10.p28.a2
  anchor: wu.10.p28
  at: 59
  length: 0
  type: pei
  text: 《吳書》曰：寧輕俠殺人，藏舍亡命，聞於郡中。其出入，步則陳車騎，水則連輕舟，侍從被文繡，所如光道路，住止常以繒錦維舟，去或割棄，以示奢也。
- id: wu.10.p28.a3
  anchor: wu.10.p28
  at: 153
  length: 0
  type: pei
  text: 《吳書》曰：寧將僮客八百人就劉表。表儒人，不習軍事。時諸英豪各各起兵，寧觀表事勢，終必無成，恐一朝土崩，并受其禍，欲東入吳。黃祖在夏口，軍不得過，乃留依祖，三年不禮之。權討祖，祖軍敗奔走，追兵急，寧以善射，將兵在後，射殺校尉凌操。祖旣得免，軍罷還營，待寧如初。祖都督蘇飛數薦寧，祖不用，令人化誘其客，客稍亡。寧欲去，恐不獲免，獨憂悶不知所出。飛知其意，乃要寧，爲之置酒，謂曰：「吾薦子者數矣，主不能用。日月逾邁，人生幾何，宜自遠圖，庶遇知己。」寧良久乃曰：「雖有其志，未知所由。」飛曰：「吾欲白子爲邾長，於是去就，孰與臨阪轉丸乎？」寧曰：「幸甚。」飛白祖，聽寧之縣。招懷亡客并義從者，得數百人。
- id: wu.10.p29.a1
  anchor: wu.10.p29
  at: 351
  length: 0
  type: pei
  text: 《吳書》曰：初，權破祖，先作兩函，欲以盛祖及蘇飛首。飛令人告急於寧，寧曰：「飛若不言，吾豈忘之？」權爲諸將置酒，寧下席叩頭，血涕交流，爲權言：「飛疇昔舊恩，寧不值飛，固已損骸於溝壑，不得致命於麾下。今飛罪當夷戮，特從將軍乞其首領。」權感其言，謂曰：「今爲君致之，若走去何？」寧曰：「飛免分裂之禍，受更生之恩，逐之尚必不走，豈當圖亡哉！若爾，寧頭當代入函。」權乃赦之。
- id: wu.10.p32.a1
  anchor: wu.10.p32
  at: 165
  length: 0
  type: pei
  text: 《江表傳》曰：「曹公出濡須，號步騎四十萬，臨江飲馬。權率衆七萬應之，使寧領三千人爲前部督。權密勑寧，使夜入魏軍。寧乃選手下健兒百餘人，徑詣曹公營下，使拔鹿角，踰壘入營，斬得數十級。北軍驚駭鼓譟，舉火如星，寧已還入營，作鼓吹，稱萬歲。因夜見權，權喜曰：「足以驚駭老子否？聊以觀卿膽耳。」即賜絹千匹，刀百口。權曰：「孟德有張遼，孤有興霸，足相敵也。」停住月餘，北軍便退。
