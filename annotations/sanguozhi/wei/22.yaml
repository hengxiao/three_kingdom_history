  at: 442
  length: 0
  type: pei
  text: 魏氏春秋曰：矫本刘氏子，出嗣舅氏而婚于本族。徐宣每非之，庭议其阙。太祖惜矫才量，欲拥全之，乃下令曰：“丧乱已来，风教彫薄，谤议之言，难用褒贬。自建安五年已前，一切勿论。其以断前诽议者，以其罪罪之。”
- id: wei.22.p31.a1
  anchor: wei.22.p31
  at: 98
  length: 0
  type: pei
  text: 案晋书曰：骞字休渊，为晋佐命功臣，至太傅，封高平郡公。
- id: wei.22.p32.a1
  anchor: wei.22.p32
  at: 75
  length: 0
  type: pei
  text: 《世语》曰：悌字孝威。年二十二，以兗州从事为泰山太守。初，太祖定冀州，以悌及东平王国为左右长史，后至中领军，并悉忠贞练事，为世吏表。
- id: wei.22.p35.a1
  anchor: wei.22.p35
  at: 49
  length: 0
  type: pei
  text: 《吕氏春秋》曰：昔晋文公将与楚人战於城濮，召咎犯而问曰：“楚众我寡，奈何而可？”咎犯对曰：“臣闻繁礼之君，不足於文，繁战之君，不足於诈，君亦诈之而已。”文公以咎犯言告雍季，雍季曰：“竭泽而渔，岂不得鱼，而明年无鱼。焚薮而田，岂不得兽，而明年无兽。诈伪之道，虽今偷可，后将无复，非长术也。”文公用咎犯之言，而败楚人於城濮。反而为赏，雍季在上。左右谏曰：“城濮之功，咎犯之谋也。君用其言而后其身，或者不可乎！”文公曰：“雍季之言，百代之利也；咎犯之言，一时之务也。焉有以一时之务，先百代之砾乎？”
