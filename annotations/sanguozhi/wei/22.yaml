  type: pei
  text: 《世语》曰：钦字子若，珽字子笏。钦泰始中为尚书仆射，领选，咸寧四年卒，追赠卫将军，开府。虞预《晋书》曰：钦少居名位，不顾财利，清虚淡泊，动脩礼典。同郡张华，家单少孤，不为乡邑所知，惟钦贵异焉。钦子浮，字子云。《晋诸公赞》曰：张华博识多闻，无物不知。浮高朗经博，有美於华，起家太子舍人，病疽，截手，遂废。朝廷器重之，就家以为国子博士，迁祭酒。永平中为秘书监。珽及子皓、志并至尚书。志子谌，字子谅。温峤表称谌清出有文思。《谌别传》曰：谌善著文章。洛阳倾覆，北投刘琨，琨以为司空从事中郎。琨败，谌归段末波。元帝之初，累召为散骑中书侍郎，不得南赴。永和六年，卒於胡（胡）中，子孙过江。妖贼帅卢循，谌之曾孙。
