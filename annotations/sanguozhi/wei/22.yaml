  type: pei
  text: 《先贤行状》曰：兹字子许。不为激诡之行，不徇流俗之名；明虑渊深，规略宏远。为车骑将军何苗所辟，司徒杨彪再加旌命。董卓作乱，汉室倾荡，太祖到陈留，始与兹相见，遂同盟，计兴武事。兹答曰：“乱生久矣，非兵无以整之。”且言“兵之兴者，自今始矣”。深见废兴，首赞弘谋。合兵三千人，从太祖入荥阳，力战终日，失利，身殁。郭林宗传曰：“兹弱冠与同郡圈文生俱称盛德。林宗与二人共至市，子许买物，随价雠直，文生訾呵，减价乃取。林宗曰：“子许少欲，文生多情，此二人非徒兄弟，乃父子也。”后文生以秽货见损，兹以烈节垂名。
- id: wei.22.p43.a1
  anchor: wei.22.p43
  at: 12
  length: 0
  type: pei
  text: 臣松之案旧事及《傅咸集》，烈终於光禄勋。烈二弟京、楷，皆二千石。楷子權，字伯舆。晋大司马汝南王亮辅政，以权为尚书郎。傅咸与亮笺曰：“卫伯舆贵妃兄子，诚有才章，应作台郎，然未得东宫官属。东宫官属，前患杨骏，亲理塞路，今有伯舆，复越某作郎。一犬吠形，群犬吠声，惧於群吠，遂至回听。”权作左思《吴都赋》叙及注，叙粗有文辞，至於为注，了无所发明，直为尘秽纸墨，不合传写也。
- id: wei.22.p44.a1
  anchor: wei.22.p44
  at: 20
  length: 0
  type: pei
  text: 续汉书曰：植字子幹。少事马融，与郑玄同门相友。植刚毅有大节，常喟然有济世之志，不苟合取容，不应州郡命召。建宁中，徵博士，出补九江太守，以病去官。作尚书章句、礼记解诂。稍迁侍中、尚书。张角起，以植为北中郎将征角，失利抵罪。顷之，复以为尚书。张让劫少帝奔小平津，植手剑责数让等，让等皆放兵，垂泣谢罪，遂自杀。董卓议欲废帝，众莫敢对，植独正言，语在《卓传》。植以老病去位，隐居上谷军都山，初平三年卒。太祖北征柳城，过涿郡，令告太守曰：“故北中郎将卢植，名著海内，学为儒宗，士之楷模，乃国之桢幹也。昔武王入殷，封商容之闾，郑丧子产而仲尼陨涕。孤到此州，嘉其餘风。春秋之义，贤者之后，有异於人。敬遣丞掾脩坟墓，并致薄醊，以彰厥德。”植有四子，毓最小。
