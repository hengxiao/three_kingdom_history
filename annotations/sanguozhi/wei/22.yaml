- id: wei.22.p2.a1
  anchor: wei.22.p2
  at: 13
  length: 0
  type: pei
  text: 魏书曰：阶祖父超，父胜，皆历典州郡。胜为尚书，著名南方。
- id: wei.22.p3.a1
  anchor: wei.22.p3
  at: 84
  length: 0
  type: pei
  text: 魏书称阶谏曰：“今太子仁冠群子，名昭海内，仁圣达节，天下莫不闻；而大王甫以植而问臣，臣诚惑之。”於是太祖知阶笃於守正，深益重焉。
- id: wei.22.p4.a1
  anchor: wei.22.p4
  at: 177
  length: 0
  type: pei
  text: 世说曰：阶孙陵，字元徽，有名於晋武帝世，至荥阳太守，卒。
- id: wei.22.p5.a1
  anchor: wei.22.p5
  at: 31
  length: 0
  type: pei
  text: 寔字仲弓、纪字元方，谌字季方。《魏书》曰：寔德冠当时，纪、谌并名重於世。寔为太丘长，遭党锢，隐居荆山，远近宗师之。灵帝崩，何进辅政，引用天下名士，徵寔，欲以为参军，以老病，遂不屈节，谌为司空掾，早卒。纪历位平原相、侍中、大鸿胪，著书数十篇，世谓之陈子。寔之亡也，司空荀爽、太仆令韩融并制缌麻，执子孙礼。四方至者车数千乘，自太原郭泰等无不造门。《傅子》曰：寔亡，天下致吊，会其葬者三万人，制缞麻者以百数。先贤行状曰：大将军何进遣属吊祠，谥曰文范先生。于时，寔、纪高名并著，而谌又配之，世号曰三君。每宰府辟命，率皆同时，羔雁成群，丞掾交至。豫州百姓皆图画寔、纪、谌之形象。
- id: wei.22.p16.a1
  anchor: wei.22.p16
  at: 43
  length: 0
  type: pei
  text: 臣松之案：《汉书地理志》云：元始二年，天下户口最盛，汝南郡为大郡，有三十餘万户。则文、景之时不能如是多也。案《晋太康三年地记》，晋户有三百七十七万，吴、蜀户不能居半。以此言之，魏虽始承丧乱，方晋亦当无乃大殊。长文之言，於是为过。
- id: wei.22.p18.a1
  anchor: wei.22.p18
  at: 57
  length: 0
  type: pei
  text: 孙盛曰：周礼，天子之宫，有斫蹐之制。然质文之饰，与时推移。汉承周、秦之弊，宜敦简约之化，而何崇饰宫室，示侈后嗣。此乃武帝千门万户所以大兴，岂无所复增之谓邪？况乃魏氏方有吴、蜀之难，四海罹涂炭之艰，而述萧何之过议，以为令轨，岂不惑於大道而昧得失之辨哉？使百代之君，眩於奢俭之中，何之由矣。诗云：“斯言之玷，不可为也。”其斯之谓乎！
- id: wei.22.p20.a1
  anchor: wei.22.p20
  at: 124
  length: 0
  type: pei
  text: 魏书曰：群前后数密陈得失，每上封事，辄削其草，时人及其子弟莫能知也。论者或讥群居位拱默，正始中诏撰群臣上书，以为名臣奏议，朝士乃见群谏事，皆叹息焉。袁子曰：或云“故少府杨阜岂非忠臣哉？见人主之非，则勃然怒而触之，与人言未尝不道也，岂非所谓‘王臣謇謇，匪躬之故’者欤！”答曰：“然可谓直士，忠则吾不知也。夫仁者爱人。施於君谓之忠，施於亲谓之孝。忠孝者，其本一也。故仁爱之至者，君亲有过，谏而不入，求之反覆，不得已而言，不忍宣也。今为人臣，见人主失道，直诋其非而播扬其恶，可谓直士，未为忠臣也。故司空陈群则不然，其谈论终日，未尝言人主之非；书数十上而外人不知。君子谓群於是乎长者矣。”
- id: wei.22.p24.a1
  anchor: wei.22.p24
  at: 108
  length: 0
  type: pei
  text: 臣松之案：此传云“谓救兵当须众集，而卒闻已至，谓有奇变，上下震惧”，此则救至出於不意。若不知救至，何故伏兵深险乃经三日乎？设伏相伺，非不知之谓。此皆语之不通也。
