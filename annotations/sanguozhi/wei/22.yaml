- id: wei.22.p27.a1
  anchor: wei.22.p27
  at: 16
  length: 0
  type: pei
  text: 干宝《晋纪》曰：高贵乡公之杀，司马文王会朝臣谋其故。太常陈泰不至，使其舅荀顗召之。顗至，告以可否。泰曰：“世之论者，以泰方於舅，今舅不如泰也。”子弟内外咸共逼之，垂涕而入。王待之曲室，谓曰：“玄伯，卿何以处我？”对曰：“诛贾充以谢天下。”文王曰：“为我更思其次。”泰曰：“泰言惟有进於此，不知其次。”文王乃不更言。魏氏春秋曰：帝之崩也，太傅司马孚、尚书右仆射陈泰枕帝尸於股，号哭尽哀。时大将军入于禁中，泰见之悲恸，大将军亦对之泣，谓曰：“玄伯，其如我何？”泰曰：“独有斩贾充，少可以谢天下耳。”大将军久之曰：“卿更思其他。”泰曰：“岂可使泰复发后言。”遂呕血薨。臣松之案本传，泰不为太常，未详干宝所由知之。孙盛改易泰言，虽为小胜。然检盛言诸所改易，皆非别有异闻，率更自以意制，多不如旧。凡记言之体，当使若出其口。辞胜而违实，固君子所不取，况复不胜而徒长虚妄哉？案博物记曰：太丘长陈寔、寔子鸿胪纪、纪子司空群、群子泰四世，於汉、魏二朝并有重名，而其德渐渐小减。时人为其语曰：“公惭卿，卿惭长。”
- id: wei.22.p27.a2
  anchor: wei.22.p27
  at: 53
  length: 0
  type: pei
  text: 案陈氏谱：群之后，名位遂微。谌孙佐，官至青州刺史。佐弟坦，廷尉。佐子准，太尉，封广陵郡公。准弟戴、徵及从弟堪，并至大位。准孙逵，字林道，有誉江左，为西中郎将，追赠卫将军。
- id: wei.22.p29.a1
  anchor: wei.22.p29
  at: 130
  length: 0
  type: pei
  text: 刘向《新序》曰：齐桓公求婚於卫，卫不与，而嫁於许。卫为狄所伐，桓公不救，至於国灭君死。懿公尸为狄人所食，惟有肝在。懿公有臣曰弘演，適使反，致命於肝曰：“君为其内，臣为其外。”乃刳腹内肝而死。齐桓公曰：“卫有臣若此而尚灭，寡人无有，亡无日矣！”乃救卫，定其君。
- id: wei.22.p30.a1
  anchor: wei.22.p30
  at: 419
  length: 0
  type: pei
  text: 《世语》曰：刘晔以先进见幸，因谮矫专权。矫惧，以问长子本，本不知所出。次子骞曰：“主上明圣，大人大臣，今若不合，不过不作公耳。”后数日，帝见矫，矫又问二子，骞曰：“陛下意解，故见大人也。”既入，尽日，帝曰：“刘晔构君，朕有以迹君；朕心故已了。”以金五鉼授之，矫辞。帝曰：“岂以为小惠？君已知朕心，顾君妻子未知故也。”帝忧社稷，问矫：“司马公忠正，可谓社稷之臣乎？”矫曰：“朝廷之望；社稷，未知也。”
