  text: 《獻帝傳》載詔曰：「自古帝王，雖號稱相變，爵等不同，至乎襃崇元勳，建立功德，光啟氏姓，延于子孫，庶姓之與親，豈有殊焉。昔我聖祖受命，刱業肇基，造我區夏，鑒古今之制，通爵等之差，盡封山川以立藩屏，使異姓親戚，並列土地，據國而王，所以保乂天命，安固萬嗣。歷世承平，臣主無事。世祖中興而時有難易，是以曠年數百，無異姓諸侯王之位。朕以不德，繼序弘業，遭率土分崩，羣兇縱毒，自西徂東，辛苦卑約。當此之際，唯恐溺入于難，以羞先帝之聖德。賴皇天之靈，俾君秉義奮身，震迅神武，捍朕于艱難，獲保宗廟，華夏遺民，含氣之倫，莫不蒙焉。君勤過稷、禹，忠侔伊、周，而掩之以謙讓，守之以彌恭，是以往者初開魏國，錫君土宇，懼君之違命，慮君之固辭，故且懷志屈意，封君爲上公，欲以欽順高義，須俟勳績。韓遂、宋建，南結巴、蜀，羣逆合從，圖危社稷，君復命將，龍驤虎奮，梟其元首，屠其窟栖。曁至西征，陽平之役，親擐甲冑，深入險阻，芟夷蝥賊，殄其兇醜，盪定西陲，懸旌萬里，聲教遠振，寧我區宇。蓋唐、虞之盛，三后樹功，文、武之興，旦、奭作輔，二祖成業，英豪佐命；夫以聖哲之君，事爲己任，猶錫士班瑞以報功臣，豈有如朕寡德，仗君以濟，而賞典不豐，將何以荅神祇慰萬方哉？今進君爵爲魏王，使使持節行御史大夫、宗正劉艾奉策璽玄土之社，苴以白茅，金虎符第一至第五，竹使符第一至十。君其正王位，以丞相領冀州牧如故。其上魏公璽綬符冊。敬服朕命，簡恤爾衆，克綏庶績，以揚我祖宗之休命。」魏王上書三辭，詔三報不許。又手詔曰：「大聖以功德爲高美，以忠和爲典訓，故刱業垂名，使百世可希，行道制義，使力行可效，是以勳烈無窮，休光茂著。稷、契載元首之聦明，周、邵因文、武之智用，雖經營庶官，仰歎俯思，其對豈有若君者哉？朕惟古人之功，美之如彼，思君忠勤之績，茂之如此，是以每將鏤符析瑞，陳禮命冊，寤寐慨然，自忘守文之不德焉。今君重違朕命，固辭懇切，非所以稱朕心，而訓後世也。其抑志撙節，勿復固辭。」《四體書勢序》曰：梁鵠以公爲北部尉。《曹瞞傳》曰：爲尚書右丞司馬建公所舉。及公爲王，召建公到鄴，與歡飲，謂建公曰：「孤今日可復作尉否？」建公曰：「昔舉大王時，適可作尉耳。」王大笑。建公名防，司馬宣王之父。臣松之案《司馬彪序傳》，建公不爲右丞，疑此不然，而王隱《晉書》云趙王篡位，欲尊祖爲帝，博士馬平議稱京兆府君昔舉魏武帝爲北部尉，賊不犯界，如此則爲有徵。
