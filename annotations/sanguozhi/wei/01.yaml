  text: 《續漢書》曰：慮字鴻豫，山陽高平人。少受業於鄭玄，建安初爲侍中。虞溥《江表傳》曰：獻帝甞特見慮及少府孔融，問融曰：「鴻豫何所優長？」融曰：「可與適道，未可與權。」慮舉笏曰：「融昔宰北海，政散民流，其權安在也！」遂與融互相長短，以至不睦。公以書和解之。慮從光祿勳遷爲大夫。
