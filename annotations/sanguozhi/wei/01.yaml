  text: 《魏書》曰：於是兵皆出取麥，在者不能千人，屯營不固。太祖乃令婦人守陴，悉兵拒之。屯西有大隄，其南樹木幽深。布疑有伏，乃相謂曰：「曹操多譎，勿入伏中。」引軍屯南十餘里。明日復來，太祖隱兵隄裏，出半兵隄外。布益進，乃令輕兵挑戰，旣合，伏兵乃悉乘隄，步騎並進，大破之，獲其龍車，追至其營而還。
