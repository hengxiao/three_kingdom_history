  type: pei
  text: 《魏書》曰：公後日復與遂等會語，諸將曰：「公與虜交語，不宜輕脫，可爲木行馬以爲防遏。」公然之。賊將見公，悉於馬上拜，秦、胡觀者，前後重沓，公笑謂賊曰：「爾欲觀曹公邪？亦猶人也，非有四目兩口，但多智耳！」胡前後大觀。又列鐵騎五千爲十重陣，精光耀日，賊益震懼。
