  type: pei
  text: 《曹瞞傳》曰：公將過河，前隊適渡，超等奄至，公猶坐胡牀不起。張郃等見事急，共引公入船。河水急，北渡，流四五里，超等騎追射之，矢下如雨。諸將見軍敗，不知公所在，皆惶懼，至見，乃悲喜，或流涕。公大笑曰：「今日幾爲小賊所困乎！」
