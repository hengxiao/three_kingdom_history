- id: wei.1.p1.a1
  anchor: wei.1.p1
  at: 29
  length: 0
  type: pei
  text: 〔《曹瞞傳》曰：〕太祖一名吉利，小字阿瞞。王沈《魏書》曰：其先出於黃帝。當高陽世，陸終之子曰安，是爲曹姓。周武王克殷，存先世之後，封曹俠於邾。春秋之世，與於盟會，逮至戰國，爲楚所滅。子孫分流，或家于沛。漢高祖之起，曹參以功封平陽侯，世襲爵土，絕而復紹，至今適嗣國於容城。
- id: wei.1.p1.a2
  anchor: wei.1.p1
  at: 48
  length: 0
  type: pei
  text: 司馬彪《續漢書》曰：騰父節，字元偉，素以仁厚稱。鄰人有亡豕者，與節豕相類，詣門認之，節不與爭；後所亡豕自還其家，豕主人大慙，送所認豕，并辭謝節，節笑而受之。由是鄉黨貴歎焉。長子伯興，次子仲興，次子叔興。騰字季興，少除黃門從官。永寧元年，鄧太后詔黃門令選中黃門從官年少溫謹者，配皇太子書，騰應其選。太子特親愛騰，飲食賞賜與衆有異。順帝即位，爲小黃門，遷至中常侍大長秋。在省闥三十餘年，歷事四帝，未甞有過。好進達賢能，終無所毀傷。其所稱薦，若陳留虞放、邊韶、南陽延固、張溫、弘農張奐、潁川堂谿典等，皆致位公卿，而不伐其善。蜀郡太守因計吏修敬於騰，益州刺史种暠於函谷關搜得其牋，上太守，并奏騰內臣外交，所不當爲，請免官治罪。帝曰：「牋自外來，騰書不出，非其罪也。」乃寑暠奏。騰不以介意，常稱歎暠，以爲暠得事上之節。暠後爲司徒，語人曰：「今日爲公，乃曹常侍恩也。」騰之行事，皆此類也。桓帝即位，以騰先帝舊臣，忠孝彰著，封費亭侯，加位特進。太和三年，追尊騰曰高皇帝。
- id: wei.1.p1.a3
  anchor: wei.1.p1
  at: 67
  length: 0
  type: pei
  text: 《續漢書》曰：嵩字巨高。質性敦慎，所在忠孝。爲司隷校尉，靈帝擢拜大司農、大鴻臚，代崔烈爲太尉。黃初元年，追尊嵩曰太皇帝。吳人作《曹瞞傳》及郭頒《世語》並云：嵩，夏侯氏之子，夏侯惇之叔父。太祖於惇爲從父兄弟。
- id: wei.1.p2.a1
  anchor: wei.1.p2
  at: 29
  length: 0
  type: pei
  text: 《曹瞞傳》云：太祖少好飛鷹走狗，游蕩無度，其叔父數言之於嵩。太祖患之，後逢叔父於路，乃陽敗面喎口；叔父怪而問其故，太祖曰：「卒中惡風。」叔父以告嵩。嵩驚愕，呼太祖，太祖口貌如故。嵩問曰：「叔父言汝中風，已差乎？」太祖曰：「初不中風，但失愛於叔父，故見罔耳。」嵩乃疑焉。自後叔父有所告，嵩終不復信，太祖於是益得肆意矣。
- id: wei.1.p2.a2
  anchor: wei.1.p2
  at: 75
  length: 0
  type: pei
  text: 《魏書》曰：太尉橋玄，世名知人，覩太祖而異之，曰：「吾見天下名士多矣，未有若君者也！君善自持。吾老矣！願以妻子爲託。」由是聲名益重。《續漢書》曰：玄字公祖，嚴明有才略，長於人物。張璠《漢紀》曰：玄歷位中外，以剛斷稱，謙儉下士，不以王爵私親。光和中爲太尉，以久病策罷，拜太中大夫，卒，家貧乏產業，柩無所殯。當世以此稱爲名臣。《世語》曰：玄謂太祖曰：「君未有名，可交許子將。」太祖乃造子將，子將納焉，由是知名。孫盛異同雜語云：太祖甞私入中常侍張讓室，讓覺之；乃舞手戟於庭，踰垣而出。才武絕人，莫之能害。博覽群書，特好兵法，抄集諸家兵法，名曰接要，又注孫武十三篇，皆傳於世。甞問許子將：「我何如人？」子將不荅。固問之，子將曰：「子治世之能臣，亂世之姦雄。」太祖大笑。
- id: wei.1.p2.a3
  anchor: wei.1.p2
  at: 97
  length: 0
  type: pei
  text: 《曹瞞傳》曰：太祖初入尉廨，繕治四門。造五色棒，縣門左右各十餘枚，有犯禁者，不避豪彊，皆棒殺之。後數月，靈帝愛幸小黃門蹇碩叔父夜行，即殺之。京師斂迹，莫敢犯者。近習寵臣咸疾之，然不能傷，於是共稱薦之，故遷爲頓丘令。
- id: wei.1.p2.a4
  anchor: wei.1.p2
  at: 102
  length: 0
  type: pei
  text: 《魏書》曰：太祖從妹夫㶏彊侯宋奇被誅，從坐免官。後以能明古學，復徵拜議郎。先是大將軍竇武、太傅陳蕃謀誅閹官，反爲所害。太祖上書陳武等正直而見陷害，姦邪盈朝，善人壅塞，其言甚切；靈帝不能用。是後詔書勑三府：舉奏州縣政理無效，民爲作謠言者免罷之。三公傾邪，皆希世見用，貨賂並行，彊者爲怨，不見舉奏，弱者守道，多被陷毀。太祖疾之。是歲以災異博問得失，因此復上書切諫，說三公所舉奏專回避貴戚之意。奏上，天子感寤，以示三府責讓之，諸以謠言徵者皆拜議郎。是後政教日亂，豪猾益熾，多所摧毀；太祖知不可匡正，遂不復獻言。
- id: wei.1.p3.a1
  anchor: wei.1.p3
  at: 65
  length: 0
  type: pei
  text: 《魏書》曰：長吏受取貪饕，依倚貴勢，歷前相不見舉；聞太祖至，咸皆舉免，小大震怖，姦宄遁逃，竄入他郡。政教大行，一郡清平。初，城陽景王劉章以有功於漢，故其國爲立祠，青州諸郡轉相倣效，濟南尤盛，至六百餘祠。賈人或假二千石輿服導從作倡樂，奢侈日甚，民坐貧窮，歷世長吏無敢禁絕者。太祖到，皆毀壞祠屋，止絕官吏民不得祠祀。及至秉政，遂除姦邪鬼神之事，世之淫祀由此遂絕。
- id: wei.1.p3.a2
  anchor: wei.1.p3
  at: 85
  length: 0
  type: pei
  text: 《魏書》曰：於是權臣專朝，貴戚橫恣。太祖不能違道取容。數數干忤，恐爲家禍，遂乞留宿衞。拜議郎，常託疾病，輙告歸鄉里；築室城外，春夏習讀書傳，秋冬弋獵，以自娛樂。
- id: wei.1.p4.a1
  anchor: wei.1.p4
  at: 50
  length: 0
  type: pei
  text: 司馬彪《九州春秋》曰：於是陳蕃子逸與術士平原襄楷會於芬坐，楷曰：「天文不利宦者，黃門、常侍貴族滅矣。」逸喜。芬曰：「若然者，芬願驅除。」於是與攸等結謀。靈帝欲北巡河間舊宅，芬等謀因此作難，上書言黑山賊攻劫郡縣，求得起兵。會北方有赤氣，東西竟天，太史上言「當有陰謀，不宜北行」，帝乃止。勑芬罷兵，俄而徵之。芬懼，自殺。《魏書》載太祖拒芬辭曰：「夫廢立之事，天下之至不祥也。古人有權成敗計輕重而行之者，伊尹、霍光是也。伊尹懷至忠之誠，據宰臣之勢，處官司之上，故進退廢置，計從事立。及至霍光受託國之任，藉宗臣之位，內因太后秉政之重，外有羣卿同欲之勢，昌邑即位日淺，未有貴寵，朝乏讜臣，議出密近，故計行如轉圜，事成如摧朽。今諸君徒見曩者之易，未覩當今之難。諸君自度，結衆連黨，何若七國？合肥之貴，孰若吳、楚？而造作非常，欲望必克，不亦危乎！」
- id: wei.1.p5.a1
  anchor: wei.1.p5
  at: 79
  length: 0
  type: pei
  text: 《魏書》曰：太祖聞而笑之曰：「閹豎之官，古今宜有，但世主不當假之權寵，使至於此。旣治其罪，當誅元惡，一獄吏足矣，何必紛紛召外將乎？欲盡誅之，事必宣露，吾見其敗也。」
- id: wei.1.p5.a2
  anchor: wei.1.p5
  at: 134
  length: 0
  type: pei
  text: 《魏書》曰：太祖以卓終必覆敗，遂不就拜，逃歸鄉里。從數騎過故人成臯呂伯奢；伯奢不在，其子與賔客共劫太祖，取馬及物，太祖手刃擊殺數人。《世語》曰：太祖過伯奢。伯奢出行，五子皆在，備賔主禮。太祖自以背卓命，疑其圖己，手劔夜殺八人而去。孫盛雜記曰：太祖聞其食器聲，以爲圖己，遂夜殺之。旣而悽愴曰：「寧我負人，毋人負我！」遂行。
- id: wei.1.p5.a3
  anchor: wei.1.p5
  at: 163
  length: 0
  type: pei
  text: 《世語》曰：中牟疑是亡人，見拘於縣。時掾亦已被卓書；唯功曹心知是太祖，以世方亂，不宜拘天下雄儁，因白令釋之。
- id: wei.1.p5.a4
  anchor: wei.1.p5
  at: 204
  length: 0
  type: pei
  text: 《世語》曰：陳留孝廉衞茲以家財資太祖，使起兵，衆有五千人。
