  text: 《魏武故事》載令曰：「領長史王必，是吾披荊棘時吏也。忠能勤事，心如鐵石，國之良吏也。蹉跌久未辟之，捨騏驥而弗乘，焉遑遑而更求哉？故教辟之，已署所宜，便以領長史統事如故。」
- id: wei.1.p109.a2
  anchor: wei.1.p109
  at: 54
  length: 0
  type: pei
  text: 《三輔決錄注》曰：時有京兆金禕字德禕，自以世爲漢臣，自日磾討莽何羅，忠誠顯著，名節累葉。覩漢祚將移，謂可季興，乃喟然發憤，遂與耿紀、韋晃、吉本、本子邈、邈弟穆等結謀。紀字季行，少有美名，爲丞相掾，王甚敬異之，遷侍中，守少府。邈字文然，穆字思然，以禕慷慨有日磾之風，又與王必善，因以閒之，若殺必，欲挾天子以攻魏，南援劉備。時關羽彊盛，而王在鄴，留必典兵督許中事。文然等率雜人及家僮千餘人夜燒門攻必，禕遣人爲內應，射必中肩。必不知攻者爲誰，以素與禕善，走投禕，夜喚德禕，禕家不知是必，謂爲文然等，錯應曰：「王長史已死乎？卿曹事立矣！」必乃更他路奔。一曰：必欲投禕，其帳下督謂必曰：「今日事竟知誰門而投入乎？」扶必奔南城。會天明，必猶在，文然等衆散，故敗。後十餘日，必竟以創死。《獻帝春秋》曰：收紀、晃等，將斬之，紀呼魏王名曰：「恨吾不自生意，竟爲羣兒所誤耳！」晃頓首搏頰，以至於死。《山陽公載記》曰：王聞王必死，盛怒，召漢百官詣鄴，令救火者左，不救火者右。衆人以爲救火者必無罪，皆附左；王以爲「不救火者非助亂，救火乃實賊也」。皆殺之。
