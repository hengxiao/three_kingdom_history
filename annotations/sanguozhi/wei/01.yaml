  text: 《九州春秋》曰：時王欲還，出令曰「雞肋」，官屬不知所謂。主簿楊脩便自嚴裝，人驚問脩：「何以知之？」脩曰：「夫雞肋，棄之如可惜，食之無所得，以比漢中，知王欲還也。」
