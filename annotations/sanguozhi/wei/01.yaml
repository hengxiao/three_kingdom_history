  type: pei
  text: 《世語》曰：太祖自漢中至洛陽，起建始殿，伐濯龍祠而樹血出。《曹瞞傳》曰：王使工蘇越徙美棃，掘之，根傷盡出血。越白狀，王躬自視而惡之，以爲不祥，還遂寑疾。
