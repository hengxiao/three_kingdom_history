  text: 《曹瞞傳》曰：是時南陽間苦繇役，音於是執太守東里襃，與吏民共反，與關羽連和。南陽功曹宗子卿往說音曰：「足下順民心，舉大事，遠近莫不望風；然執郡將，逆而無益，何不遣之。吾與子共戮力，比曹公軍來，關羽兵亦至矣。」音從之，即釋遣太守。子卿因夜踰城亡出，遂與太守收餘民圍音，會曹仁軍至，共滅之。
