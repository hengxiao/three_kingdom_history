  text: 袁暐《獻帝春秋》曰：太祖圍濮陽，濮陽大姓田氏爲反閒，太祖得入城。燒其東門，示無反意。及戰，軍敗。布騎得太祖而不知是，問曰：「曹操何在？」太祖曰：「乘黃馬走者是也。」布騎乃釋太祖而追黃馬者。門火猶盛，太祖突火而出。
