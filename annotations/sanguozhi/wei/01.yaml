  at: 45
  length: 0
  type: pei
  text: 《魏書》曰：兵謀叛，夜燒太祖帳，太祖手劔殺數十人，餘皆披靡，乃得出營；其不叛者五百餘人。
- id: wei.1.p11.a1
  anchor: wei.1.p11
  at: 20
  length: 0
  type: pei
  text: 《魏書》載太祖荅紹曰：「董卓之罪，暴於四海，吾等合大衆興義兵，遠近莫不響應，此以義動故也。今幼主微弱，制於姦臣，未有昌邑亡國之釁，而一旦改易，天下其孰安之？諸君北面，我自西向。」
- id: wei.1.p11.a2
  anchor: wei.1.p11
  at: 47
  length: 0
  type: pei
  text: 《魏書》曰：太祖大笑曰：「吾不聽汝也。」紹復使人說太祖曰：「今袁公勢盛兵彊，二子已長，天下羣英，孰踰於此？」太祖不應。由是益不直紹，圖誅滅之。
