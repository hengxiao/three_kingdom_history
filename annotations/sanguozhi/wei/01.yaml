  text: 孔衍《漢魏春秋》曰：天子以公典任于外，臨事之賞，或宜速疾，乃命公得承制封拜諸侯守相，詔曰：「夫軍之大事，在茲賞罰，勸善懲惡，宜不旋時，故《司馬法》曰『賞不逾日』者，欲民速覩爲善之利也。昔在中興，鄧禹入關，承制拜軍祭酒李文爲河東太守，來歙又承制拜高峻爲通路將軍，察其本傳，皆非先請，明臨事刻印也，斯則世祖神明，權達損益，蓋所用速示威懷而著鴻勳也。其春秋之義，大夫出疆，有專命之事，苟所以利社稷安國家而已。況君秉任二伯，師尹九有，實征夷夏，軍行蕃甸之外，失得在於斯須之間，停賞俟詔以滯世務，固非朕之所圖也。自今已後，臨事所甄，當加寵號者，其便刻印章假授，咸使忠義得相獎勵，勿有疑焉。」
