  text: 《魏武故事》載公十二月己亥令曰：「孤始舉孝廉，年少，自以本非巖穴知名之士，恐爲海內人之所見凡愚，欲爲一郡守，好作政教，以建立名譽，使世士明知之；故在濟南，始除殘去穢，平心選舉，違迕諸常侍。以爲彊豪所忿，恐致家禍，故以病還。去官之後，年紀尚少，顧視同歲中，年有五十，未名爲老，內自圖之，從此却去二十年，待天下清，乃與同歲中始舉者等耳。故以四時歸鄉里，於譙東五十里築精舍，欲秋夏讀書，冬春射獵，求底下之地，欲以泥水自蔽，絕賔客往來之望，然不能得如意。後徵爲都尉，遷典軍校尉，意遂更欲爲國家討賊立功，欲望封侯作征西將軍，然後題墓道言『漢故征西將軍曹侯之墓』，此其志也。而遭值董卓之難，興舉義兵。是時合兵能多得耳，然常自損，不欲多之；所以然者，多兵意盛，與彊敵爭，儻更爲禍始。故汴水之戰數千，後還到揚州更募，亦復不過三千人，此其本志有限也。後領兖州，破降黃巾三十萬衆。又袁術僭號於九江，下皆稱臣，名門曰建號門，衣被皆爲天子之制，兩婦預爭爲皇后。志計已定，人有勸術使遂即帝位，露布天下，荅言『曹公尚在，未可也』。後孤討禽其四將，獲其人衆，遂使術窮亡解沮，發病而死。及至袁紹據河北，兵勢彊盛，孤自度勢，實不敵之，但計投死爲國，以義滅身，足垂於後。幸而破紹，梟其二子。又劉表自以爲宗室，包藏姧心，乍前乍却，以觀世事，據有當州，孤復定之，遂平天下。身爲宰相，人臣之貴已極，意望已過矣。今孤言此，若爲自大，欲人言盡，故無諱耳。設使國家無有孤，不知當幾人稱帝，幾人稱王。或者人見孤彊盛，又性不信天命之事，恐私心相評，言有不遜之志，妄相忖度，每用耿耿。齊桓、晉文所以垂稱至今日者，以其兵勢廣大，猶能奉事周室也。論語云『三分天下有其二，以服事殷，周之德可謂至德矣』，夫能以大事小也。昔樂毅走趙，趙王欲與之圖燕，樂毅伏而垂泣，對曰：『臣事昭王，猶事大王；臣若獲戾，放在他國，沒世然後已，不忍謀趙之徒隷，況燕後嗣乎！』胡亥之殺蒙恬也，恬曰：『自吾先人及至子孫，積信於秦三世矣；今臣將兵三十餘萬，其勢足以背叛，然自知必死而守義者，不敢辱先人之教以忘先王也。』孤每讀此二人書，未曾不愴然流涕也。孤祖父以至孤身，皆當親重之任，可謂見信者矣，以及子桓兄弟，過於三世矣。孤非徒對諸君說此，也常以語妻妾，皆令深知此意。孤謂之言：『顧我萬年之後，汝曹皆當出嫁，欲令傳道我心，使他人皆知之。』孤此言皆肝鬲之要也。所以勤勤懇懇敘心腹者，見周公有金縢之書以自明，恐人不信之故。然欲孤便爾委捐所典兵衆以還執事，歸就武平侯國，實不可也。何者？誠恐己離兵爲人所禍也。旣爲子孫計，又己敗則國家傾危，是以不得慕虛名而處實禍，此所不得爲也。前朝恩封三子爲侯，固辭不受，今更欲受之，非欲復以爲榮，欲以爲外援，爲萬安計。孤聞介推之避晉封。申胥之逃楚賞，未甞不捨書而歎，有以自省也。奉國威靈，仗鉞征伐，推弱以克彊，處小而禽大，意之所圖，動無違事，心之所慮，何向不濟，遂蕩平天下，不辱主命，可謂天助漢室，非人力也。然封兼四縣，食戶三萬，何德堪之！江湖未靜，不可讓位；至於邑土，可得而辭。今上還陽夏、柘、苦三縣戶二萬，但食武平萬戶，且以分損謗議，少減孤之責也。」
