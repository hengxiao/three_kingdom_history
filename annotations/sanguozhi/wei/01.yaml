  text: 《曹瞞傳》曰：公聞攸來，跣出迎之，撫掌笑曰：「子卿遠來，吾事濟矣！」旣入坐，謂公曰：「袁氏軍盛，何以待之？今有幾糧乎？」公曰：「尚可支一歲。」攸曰：「無是，更言之！」又曰：「可支半歲。」攸曰：「足下不欲破袁氏邪，何言之不實也！」公曰：「向言戲之耳。其實可一月，爲之柰何？」攸曰：「公孤軍獨守，外無救援而糧穀已盡，此危急之日也。今袁氏輜重有萬餘乘，在故市、烏巢，屯軍無嚴備；今以輕兵襲之，不意而至，燔其積聚，不過三日，袁氏自敗也。」公大喜，乃選精銳步騎，皆用袁軍旗幟，銜枚縛馬口，夜從間道出，人抱束薪，所歷道有問者，語之曰：「袁公恐曹操鈔略後軍，遣兵以益備。」聞者信以爲然，皆自若。旣至，圍屯，大放火，營中驚亂。大破之，盡燔其糧穀寶貨，斬督將眭元進、騎督韓莒子、呂威璜、趙叡等首，割得將軍淳于仲簡鼻，未死，殺士卒千餘人，皆取鼻，牛馬割脣舌，以示紹軍。將士皆怛懼。時有夜得仲簡，將以詣麾下，公謂曰：「何爲如是？」仲簡曰：「勝負自天，何用爲問乎！」公意欲不殺。許攸曰：「明且鑒於鏡，此益不忘人。」乃殺之。
