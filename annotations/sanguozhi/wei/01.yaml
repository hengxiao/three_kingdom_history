  text: 孫盛云：昔者先王之爲誅賞也，將以懲惡勸善，永彰鑒戒。紹因世艱危，遂懷逆謀，上議神器，下干國紀。荐社汙宅，古之制也。而乃盡哀於逆臣之冢，加恩於饕餮之室，爲政之道，於斯躓矣。夫匿怨友人，前哲所恥，稅驂舊館，義無虛涕，苟道乖好絕，何哭之有！昔漢高失之於項氏，魏武遵謬於此舉，豈非百慮之一失也。
