- id: wei.1.p119.a1
  anchor: wei.1.p119
  at: 16
  length: 0
  type: pei
  text: 《世語》曰：諷字子京，沛人，有惑衆才，傾動鄴都，鍾繇由是辟焉。大軍未反，諷潛結徒黨，又與長樂衞尉陳禕謀襲鄴。未及期，禕懼，告之太子，誅諷，坐死者數十人。王昶家誡曰「濟陰魏諷」，而此云沛人，未詳。
