  text: 《獻帝起居注》曰：使行太常事大司農安陽亭侯王邑與宗正劉艾，皆持節，介者五人，齎束帛駟馬，及給事黃門侍郎、掖庭丞、中常侍二人，迎二貴人于魏公國。二月癸亥，又於魏公宗廟授二貴人印綬。甲子，詣魏公宮延秋門，迎貴人升車。魏遣郎中令、少府、博士、御府乘黃廄令、丞相掾屬侍送貴人。癸酉，二貴人至洧倉中，遣侍中丹將宂從虎賁前後駱驛往迎之。乙亥，二貴人入宮，御史大夫、中二千石將大夫、議郎會殿中，魏國二卿及侍中、中郎二人，與漢公卿並升殿宴。
