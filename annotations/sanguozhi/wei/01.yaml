  type: pei
  text: 是行也，侍中王粲作五言詩以美其事，曰：「從軍有苦樂，但問所從誰。所從神且武，安得久勞師？相公征關右，赫怒振天威，一舉滅獯虜，再舉服羌夷，西牧邊地賊，忽若俯拾遺。陳賞越山嶽，酒肉踰川坻，軍中多饒飫，人馬皆溢肥，徒行兼乘還，空出有餘資。拓土三千里，往反速如飛，歌舞入鄴城，所願獲無違。」
