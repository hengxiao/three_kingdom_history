  text: 《魏書》曰：有司奏：「四時講武於農隙。漢承秦制，三時不講，唯十月都試車馬，幸長水南門，會五營士爲八陣進退，名曰乘之。今金革未偃，士民素習，自今已後，可無四時講武，但以立秋擇吉日大朝車騎，號曰治兵，上合禮名，下承漢制。」奏可。
