- id: wei.1.p120.a2
  anchor: wei.1.p120
  at: 53
  length: 0
  type: pei
  text: 《魏略》曰：孫權上書稱臣，稱說天命。王以權書示外曰：「是兒欲踞吾著爐火上邪！」侍中陳羣、尚書桓階奏曰：「漢自安帝已來，政去公室，國統數絕，至於今者，唯有名號，尺土一民，皆非漢有，期運久已盡，歷數久已終，非適今日也。是以桓、靈之閒，諸明圖緯者，皆言『漢行氣盡，黃家當興』。殿下應期，十分天下而有其九，以服事漢，羣生注望，遐邇怨歎，是故孫權在遠稱臣，此天人之應，異氣齊聲。臣愚以爲虞、夏不以謙辭，殷、周不吝誅放，畏天知命，無所與讓也。」《魏氏春秋》曰：夏侯惇謂王曰：「天下咸知漢祚已盡，異代方起。自古已來，能除民害爲百姓所歸者，即民主也。今殿下即戎三十餘年，功德著於黎庶，爲天下所依歸，應天順民，復何疑哉！」王曰：「『施於有政，是亦爲政』。若天命在吾，吾爲周文王矣。」《曹瞞傳》及《世語》並云桓階勸王正位，夏侯惇以爲宜先滅蜀，蜀亡則吳服，二方旣定，然後遵舜、禹之軌，王從之。及至王薨，惇追恨前言，發病卒。孫盛評曰：夏侯惇恥爲漢官，求受魏印，桓階方惇，有義直之節；考其傳記，《世語》爲妄矣。
