  text: 襃賞令載公祀文曰：「故太尉橋公，誕敷明德，汎愛博容。國念明訓，士思令謨。靈幽體翳，邈哉晞矣！吾以幼年，逮并堂室，特以頑鄙之姿，爲大君子所納。增榮益觀，皆由獎助，猶仲尼稱不如顏淵，李生之厚歎賈復。士死知己，懷此無忘。又承從容約誓之言：『殂逝之後，路有經由，不以斗酒隻雞過相沃酹，車過三步，腹痛勿怪！』雖臨時戲笑之言，非至親之篤好，胡肯爲此辭乎？匪謂靈忿，能詒己疾，懷舊惟顧，念之悽愴。奉命東征，屯次鄉里，北望貴土，乃心陵墓。裁致薄奠，公其尚饗！」
