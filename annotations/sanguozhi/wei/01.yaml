  text: 《世語》曰：岱旣死，陳宮謂太祖曰：「州今無主，而王命斷絕，宮請說州中，明府尋往牧之，資之以收天下，此霸王之業也。」宮說別駕、治中曰：「今天下分裂而州無主；曹東郡，命世之才也，若迎以牧州，必寧生民。」鮑信等亦謂之然。
- id: wei.1.p18.a2
  anchor: wei.1.p18
  at: 180
  length: 0
  type: pei
  text: 《魏書》曰：太祖將步騎千餘人，行視戰地，卒抵賊營，戰不利，死者數百人，引還。賊尋前進。黃巾爲賊久，數乘勝，兵皆精悍。太祖舊兵少，新兵不習練，舉軍皆懼。太祖被甲嬰冑，親巡將士，明勸賞罰，衆乃復奮，承間討擊，賊稍折退。賊乃移書太祖曰：「昔在濟南，毀壞神壇，其道乃與中黃太一同，似若知道，今更迷惑。漢行已盡，黃家當立。天之大運，非君才力所能存也。」太祖見檄書，呵之罪，數開示降路；遂設奇伏，晝夜會戰，戰輙禽獲，賊乃退走。
