  type: pei
  text: 衞恒《四體書勢序》曰：上谷王次仲善隷書，始爲楷法。至靈帝好書，世多能者。而師宜官爲最，甚矜其能，每書，輙削焚其札。梁鵠乃益爲版而飲之酒，候其醉而竊其札，鵠卒以攻書至選部尚書。於是公欲爲洛陽令，鵠以爲北部尉。鵠後依劉表。及荊州平，公募求鵠，鵠懼，自縛詣門，署軍假司馬，使在祕書，以勤書自効。公甞懸著帳中，及以釘壁玩之，謂勝宜官。鵠字孟皇，安定人。魏宮殿題署，皆鵠書也。皇甫謐《逸士傳》曰：汝南王儁，字子文，少爲范滂、許章所識，與南陽岑晊善。公之爲布衣，特愛儁；儁亦稱公有治世之具。及袁紹與弟術喪母，歸葬汝南，儁與公會之，會者三萬人。公於外密語儁曰：「天下將亂，爲亂魁者必此二人也。欲濟天下，爲百姓請命，不先誅此二子，亂今作矣。」儁曰：「如卿之言，濟天下者，舍卿復誰？」相對而笑。儁爲人外靜而內明，不應州郡三府之命。公車徵，不到，避地居武陵，歸儁者一百餘家。帝之都許，復徵爲尚書，又不就。劉表見紹彊，陰與紹通，儁謂表曰：「曹公，天下之雄也，必能興霸道，繼桓、文之功者也。今乃釋近而就遠，如有一朝之急，遙望漠北之救，不亦難乎！」表不從。儁年六十四，以壽終于武陵，公聞而哀傷。及平荊州，自臨江迎喪，改葬于江陵，表爲先賢也。
