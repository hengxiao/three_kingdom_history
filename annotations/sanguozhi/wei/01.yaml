  text: 《魏書》載庚申令曰：「議者或以軍吏雖有功能，德行不足堪任郡國之選，所謂『可與適道，未可與權』。管仲曰：『使賢者食於能則上尊，鬬士食於功則卒輕於死，二者設於國則天下治。』未聞無能之人，不鬬之士，並受祿賞，而可以立功興國者也。故明君不官無功之臣，不賞不戰之士；治平尚德行，有事賞功能。論者之言，一似管窺虎歟！」
