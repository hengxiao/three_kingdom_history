  length: 0
  type: pei
  text: 詩曰：「致天之屆，于牧之野。」鄭玄云：「屆，極也。」鴻範曰：「鯀則殛死。」
- id: wei.1.p85.a1
  anchor: wei.1.p85
  at: 206
  length: 0
  type: pei
  text: 盤庚曰：「綏爰有衆。」鄭玄曰：「爰，於也，安隱於其衆也。」君奭曰：「海隅出日，罔不率俾。」率，循也。俾，使也。四海之隅，日出所照，無不循度而可使也。
