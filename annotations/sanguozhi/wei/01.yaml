  text: 《曹瞞傳》曰：時公軍每渡渭，輒爲超騎所衝突，營不得立，地又多沙，不可築壘。婁子伯說公曰：「今天寒，可起沙爲城，以水灌之，可一夜而成。」公從之，乃多作縑囊以運水，夜渡兵作城，比明，城立，由是公軍盡得渡渭。或疑于時九月，水未應凍。臣松之案《魏書》：公軍八月至潼關，閏月北渡河，則其年閏八月也，至此容可大寒邪！
- id: wei.1.p77.a4
