  text: 《獻帝起居注》曰：公上言「大將軍鄴侯袁紹前與冀州牧韓馥立故大司馬劉虞，刻作金璽，遣故任長畢瑜詣虞，爲說命錄之數。又紹與臣書云：『可都鄄城，當有所立。』擅鑄金銀印，孝廉計吏，皆往詣紹。從弟濟陰太守敘與紹書云：『今海內喪敗，天意實在我家，神應有徵，當在尊兄。南兄臣下欲使即位，南兄言，以年則北兄長，以位則北兄重。便欲送璽，會曹操斷道。』紹宗族累世受國重恩，而凶逆無道，乃至於此。輙勒兵馬，與戰官渡，乘聖朝之威，得斬紹大將淳于瓊等八人首，遂大破潰。紹與子譚輕身迸走。凡斬首七萬餘級，輜重財物巨億。」
