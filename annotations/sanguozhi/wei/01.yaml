  text: 《曹瞞傳》曰：時寒且旱，二百里無復水，軍又乏食，殺馬數千匹以爲糧，鑿地入三十餘丈乃得水。旣還，利問前諫者，衆莫知其故，人人皆懼。公皆厚賞之，曰：「孤前行，乘危以徼倖，雖得之，天所佐也，顧不可以爲常。諸君之諫，萬安之計，是以相賞，後勿難言之。」
