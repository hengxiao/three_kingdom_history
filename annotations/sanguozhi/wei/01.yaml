  text: 《魏書》載公令曰：「有國有家者，不患寡而患不均，不患貧而患不安。袁氏之治也，使豪彊擅恣，親戚兼并；下民貧弱，代出租賦，衒鬻家財，不足應命；審配宗族，至乃藏匿罪人，爲逋逃主。欲望百姓親附，甲兵彊盛，豈可得邪！其收田租畝四升，戶出絹二匹、緜二斤而已，他不得擅興發。郡國守相明檢察之，無令彊民有所隱藏，而弱民兼賦也。」
