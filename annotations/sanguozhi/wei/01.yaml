  text: 《魏書》曰：自遭荒亂，率乏糧穀。諸軍並起，無終歲之計，饑則寇略，飽則棄餘，瓦解流離，無敵自破者不可勝數。袁紹之在河北，軍人仰食桑椹。袁術在江、淮，取給蒲蠃。民人相食，州里蕭條。公曰：「夫定國之術，在於彊兵足食，秦人以急農兼天下，孝武以屯田定西域，此先代之良式也。」是歲乃募民屯田許下，得穀百萬斛。於是州郡例置田官，所在積穀。征伐四方，無運糧之勞，遂兼滅羣賊，克平天下。
