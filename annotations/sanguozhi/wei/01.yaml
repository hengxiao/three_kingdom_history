  length: 0
  type: pei
  text: 《英雄記》曰：馥字文節，潁川人。爲御史中丞。董卓舉爲冀州牧。于時冀州民人殷盛，兵糧優足。袁紹之在勃海，馥恐其興兵，遣數部從事守之，不得動搖。東郡太守橋瑁詐作京師三公移書與州郡，陳卓罪惡，云「見逼迫，無以自救，企望義兵，解國患難。」馥得移，請諸從事問曰：「今當助袁氏邪，助董卓邪？」治中從事劉子惠曰：「今興兵爲國，何謂袁、董！」馥自知言短而有慙色。子惠復言：「兵者凶事，不可爲首；今宜往視他州，有發動者，然後和之。冀州於他州不爲弱也，他人功未有在冀州之右者也。」馥然之。馥乃作書與紹，道卓之惡，聽其舉兵。
- id: wei.1.p6.a2
  anchor: wei.1.p6
  at: 27
  length: 0
  type: pei
  text: 《英雄記》曰：伷字公緒，陳留人。張璠《漢紀》，載鄭泰說卓云：「孔公緒能清談高論，噓枯吹生。」
- id: wei.1.p6.a3
  anchor: wei.1.p6
  at: 34
  length: 0
  type: pei
  text: 岱，劉繇之兄，事見《吳志》。
- id: wei.1.p6.a4
  anchor: wei.1.p6
  at: 41
  length: 0
  type: pei
  text: 《英雄記》曰：匡字公節，泰山人。輕財好施，以任俠聞。辟大將軍何進府進符使，匡於徐州發彊弩五百西詣京師。會進敗，匡還鄉里。起家，拜河內太守。謝承《後漢書》曰：匡少與蔡邕善。其年爲卓軍所敗，走還泰山，收集勁勇得數千人，欲與張邈合。匡先殺執金吾胡母班。班親屬不勝憤怒，與太祖并勢，共殺匡。
- id: wei.1.p6.a5
  anchor: wei.1.p6
  at: 62
  length: 0
  type: pei
  text: 《英雄記》曰：瑁字元偉，玄族子。先爲兖州刺史，甚有威惠。
- id: wei.1.p6.a6
  anchor: wei.1.p6
  at: 69
  length: 0
  type: pei
  text: 遺字伯業，紹從兄。爲長安令。河間張超甞薦遺于太尉朱儁，稱遺「有冠世之懿，幹時之量。其忠允亮直，固天所縱；若乃包羅載籍，管綜百氏，登高能賦，覩物知名，求之今日，邈焉靡儔。」事在超集。《英雄記》曰：紹後用遺爲揚州刺史，爲袁術所敗。太祖稱「長大而能勤學者，惟吾與袁伯業耳。」語在文帝《典論》。
- id: wei.1.p6.a7
  anchor: wei.1.p6
  at: 74
  length: 0
  type: pei
  text: 信事見子《勛傳》。
