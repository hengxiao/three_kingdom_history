  text: 《獻帝春秋》曰：備謂岱等曰：「使汝百人來，其無如我何；曹公自來，未可知耳！」《魏武故事》曰：岱字公山，沛國人。以司空長史從征伐有功，封列侯。《魏略》曰：王忠，扶風人，少爲亭長。三輔亂，忠饑乏噉人，隨輩南向武關。值婁子伯爲荊州遣迎北方客人；忠不欲去，因率等仵逆擊之，奪其兵，聚衆千餘人以歸公。拜忠中郎將，從征討。五官將知忠甞噉人，因從駕出行，令俳取冢間髑髏繫著忠馬鞍，以爲歡笑。
