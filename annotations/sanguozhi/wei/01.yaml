  text: 《世語》曰：嵩在泰山華縣。太祖令泰山太守應劭送家詣兖州，劭兵未至，陶謙密遣數千騎掩捕。嵩家以爲劭迎，不設備。謙兵至，殺太祖弟德於門中。嵩懼，穿後垣，先出其妾，妾肥，不時得出；嵩逃于厠，與妾俱被害，闔門皆死。劭懼，棄官赴袁紹。後太祖定冀州，劭時已死。韋曜《吳書》曰：太祖迎嵩，輜重百餘兩。陶謙遣都尉張闓將騎二百衞送，闓於泰山華、費間殺嵩，取財物，因奔淮南。太祖歸咎於陶謙，故伐之。
