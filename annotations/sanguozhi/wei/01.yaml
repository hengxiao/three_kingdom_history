  text: 習鑿齒《漢晉春秋》曰：許攸說紹曰：「公無與操相攻也。急分諸軍持之，而徑從他道迎天子，則事立濟矣。」紹不從，曰：「吾要當先圍取之。」攸怒。
- id: wei.1.p48.a2
  anchor: wei.1.p48
