  text: 孫盛《魏氏春秋》云：荅諸將曰：「劉備，人傑也，將生憂寡人。」臣松之以爲史之記言，旣多潤色，故前載所述有非實者矣，後之作者又生意改之，於失實也，不亦彌遠乎！凡孫盛製書，多用左氏以易舊文，如此者非一。嗟乎，後之學者將何取信哉？且魏武方以天下勵志，而用夫差分死之言，尤非其類。
