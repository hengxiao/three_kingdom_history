  text: 後漢尚書左丞潘勗之辭也。勗字元茂，陳留中牟人。《魏書》載公令曰：「夫受九錫，廣開土宇，周公其人也。漢之異姓八王者，與高祖俱起布衣，刱定王業，其功至大，吾何可比之？」前後三讓。於是中軍師王凌、謝亭侯荀攸、前軍師東武亭侯鍾繇、左軍師涼茂、右軍師毛玠、平虜將軍華鄉侯劉勳、建武將軍清苑亭侯劉若、伏波將軍高安侯夏侯惇、揚武將軍都亭侯王忠、奮威將軍樂鄉侯劉展、建忠將軍昌鄉亭侯鮮于輔、奮武將軍安國亭侯程昱、太中大夫都鄉侯賈詡、軍師祭酒千秋亭侯董昭、都亭侯薛洪、南鄉亭侯董蒙、關內侯王粲、傅巽、祭酒王選、袁奐、王朗、張承、任藩、杜襲、中護軍國明亭侯曹洪、中領軍萬歲亭侯韓浩、行驍騎將軍安平亭侯曹仁、領護軍將軍王圖、長史萬潛、謝奐、袁霸等勸進曰：「自古三代，胙臣以土，受命中興，封秩輔佐，皆所以襃功賞德，爲國藩衞也。徃者天下崩亂，羣凶豪起，顛越跋扈之險，不可忍言。明公奮身出命以徇其難，誅二袁篡盜之逆，滅黃巾賊亂之類，殄夷首逆，芟撥荒穢，沐浴霜露二十餘年，書契已來，未有若此功者。昔周公承文、武之迹，受已成之業，高枕墨筆，拱揖羣后，商、奄之勤，不過二年，呂望因三分有二之形，據八百諸侯之勢，暫把旄鉞，一時指麾，然皆大啟土宇，跨州兼國。周公八子，並爲侯伯，白牡騂剛，郊祀天地，典策備物，擬則王室，榮章寵盛如此之弘也。逮至漢興，佐命之臣，張耳、吳芮，其功至薄，亦連城開地，南面稱孤。此皆明君達主行之於上，賢臣聖宰受之於下，三代令典，漢帝明制。今比勞則周、呂逸，計功則張、吳微，論制則齊、魯重，言地則長沙多；然則魏國之封，九錫之榮，況於舊賞，猶懷玉而被褐也。且列侯諸將，幸攀龍驥，得竊微勞，佩紫懷黃，蓋以百數，亦將因此傳之萬世，而明公獨辭賞於上，將使其下懷不自安，上違聖朝歡心，下失冠帶至望，忘輔弼之大業，信匹夫之細行，攸等所大懼也。」於是公勑外爲章，但受魏郡。攸等復曰：「伏見魏國初封，聖朝發慮，稽謀羣寮，然後策命；而明公久違上指，不即大禮。今旣虔奉詔命，副順衆望，又欲辭多當少，讓九受一，是猶漢朝之賞不行，而攸等之請未許也。昔齊、魯之封，奄有東海，疆域井賦，四百萬家，基隆業廣，易以立功，故能成翼戴之勳，立一匡之績。今魏國雖有十郡之名，猶減於曲阜，計其戶數，不能參半，以藩衞王室，立垣樹屏，猶未足也。且聖上覽亡秦無輔之禍，懲曩日震蕩之艱，託建忠賢，廢墜是爲，願明公恭承帝命，無或拒違。」公乃受命。《魏略》載公上書謝曰：「臣蒙先帝厚恩，致位郎署，受性疲怠，意望畢足，非敢希望高位，庶幾顯達。會董卓作亂，義當死難，故敢奮身出命，摧鋒率衆，遂值千載之運，奉役目下。當二袁炎沸侵侮之際，陛下與臣寒心同憂，顧瞻京師，進受猛敵，常恐君臣俱陷虎口，誠不自意能全首領。賴祖宗靈祐，醜類夷滅，得使微臣竊名其間。陛下加恩，授以上相，封爵寵祿，豐大弘厚，生平之願，實不望也。口與心計，幸且待罪，保持列侯，遺付子孫，自託聖世，永無憂責。不意陛下乃發盛意，開國備錫，以貺愚臣，地比齊、魯，禮同藩王，非臣無功所宜膺據。歸情上聞，不蒙聽許，嚴詔切至，誠使臣心俯仰偪迫。伏自惟省，列在大臣，命制王室，身非己有，豈敢自私，遂其愚意，亦將黜退，令就初服。今奉疆土，備數藩翰，非敢遠期，慮有後世；至於父子相誓終身，灰軀盡命，報塞厚恩。天威在顏，悚懼受詔。」
