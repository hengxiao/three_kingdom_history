  text: 《魏書》載公令曰：「昔趙奢、竇嬰之爲將也，受賜千金，一朝散之，故能濟成大功，永世流聲。吾讀其文，未甞不慕其爲人也。與諸將士大夫共從戎事，幸賴賢人不愛其謀，羣士不遺其力，是以夷險平亂，而吾得竊大賞，戶邑三萬。追思竇嬰散金之義，今分所受租與諸將掾屬及故戍於陳、蔡者，庶以疇荅衆勞，不擅大惠也。宜差死事之孤，以租穀及之。若年殷用足，租奉畢入，將大與衆人悉共饗之。」
