  text: 《九州春秋》曰：參軍傅幹諫曰：「治天下之大具有二，文與武也；用武則先威，用文則先德，威德足以相濟，而後王道備矣。往者天下大亂，上下失序，明公用武攘之，十平其九。今未承王命者，吳與蜀也，吳有長江之險，蜀有崇山之阻，難以威服，易以德懷。愚以爲可且按甲寢兵，息軍養士，分土定封，論功行賞，若此則內外之心固，有功者勸，而天下知制矣。然後漸興學校，以導其善性而長其義節。公神武震於四海，若修文以濟之，則普天之下，無思不服矣。今舉十萬之衆，頓之長江之濵，若賊負固深藏，則士馬不能逞其能，奇變無所用其權，則大威有屈而敵心未能服矣。唯明公思虞舜舞干戚之義，全威養德，以道制勝。」公不從，軍遂無功。幹字彥材，北地人，終於丞相倉曹屬。有子曰玄。
