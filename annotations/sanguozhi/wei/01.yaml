  text: 《魏書》曰：初置衞尉官。秋八月，令曰：「昔伊摯、傅說出於賤人，管仲，桓公賊也，皆用之以興。蕭何、曹參，縣吏也，韓信、陳平負汙辱之名，有見笑之恥，卒能成就王業，聲著千載。吳起貪將，殺妻自信，散金求官，母死不歸，然在魏，秦人不敢東向，在楚則三晉不敢南謀。今天下得無有至德之人放在民間，及果勇不顧，臨敵力戰；若文俗之吏，高才異質，或堪爲將守；負汙辱之名，見笑之行，或不仁不孝而有治國用兵之術：其各舉所知，勿有所遺。」
