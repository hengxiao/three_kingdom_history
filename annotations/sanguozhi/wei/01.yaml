  text: 《典略》曰：遂字文約，始與同郡邊章俱著名西州。章爲督軍從事。遂奉計詣京師，何進宿聞其名，特與相見，遂說進使誅諸閹人，進不從，乃求歸。會涼州宋揚、北宮玉等反，舉章、遂爲主，章尋病卒，遂爲揚等所劫，不得已，遂阻兵爲亂，積三十二年，至是乃死，年七十餘矣。劉艾《靈帝紀》曰：章，一名元。
