  type: pei
  text: 臣松之以爲魏武初起兵，已有衆五千，自後百戰百勝，敗者十二三而已矣。但一破黃巾，受降卒三十餘萬，餘所吞并，不可悉紀；雖征戰損傷，未應如此之少也。夫結營相守，異於摧鋒決戰。本紀云：「紹衆十餘萬，屯營東西數十里。」魏太祖雖機變無方，略不世出，安有以數千之兵，而得逾時相抗者哉？以理而言，竊謂不然。紹爲屯數十里，公能分營與相當，此兵不得甚少，一也。紹若有十倍之衆，理應當悉力圍守，使出入斷絕，而公使徐晃等擊其運車，公又自出擊淳于瓊等，揚旌往還，曾無抵閡，明紹力不能制，是不得甚少，二也。諸書皆云公坑紹衆八萬，或云七萬。夫八萬人奔散，非八千人所能縛，而紹之大衆皆拱手就戮，何緣力能制之？是不得甚少，三也。將記述者欲以少見奇，非其實錄也。按《鍾繇傳》云：「公與紹相持，繇爲司隷，送馬二千餘匹以給軍。」本紀及《世語》並云公時有騎六百餘匹，繇馬爲安在哉？
