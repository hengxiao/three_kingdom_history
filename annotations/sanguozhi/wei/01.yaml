  type: pei
  text: 《魏書》曰：諸將皆以爲當還自救。太祖曰：「孫臏救趙而攻魏，耿弇欲走西安攻臨菑。使賊聞我西而還，武陽自解也；不還，我能敗其本屯，虜不能拔武陽必矣。」遂乃行。
- id: wei.1.p16.a2
  anchor: wei.1.p16
  at: 64
  length: 0
  type: pei
  text: 《魏書》曰：於夫羅者，南單于子也。中平中，發匈奴兵，於夫羅率以助漢。會本國反，殺南單于，於夫羅遂將其衆留中國。因天下撓亂，與西河白波賊合，破太原、河內，抄略諸郡爲寇。
