  text: 張璠《漢紀》曰：初，天子敗於曹陽，欲浮河東下。侍中太史令王立曰：「自去春太白犯鎮星於牛斗，過天津，熒惑又逆行守北河，不可犯也。」由是天子遂不北渡河，將自軹關東出。立又謂宗正劉艾曰：「前太白守天關，與熒惑會；金火交會，革命之象也。漢祚終矣，晉、魏必有興者。」立後數言於帝曰：「天命有去就，五行不常盛，代火者土也，承漢者魏也，能安天下者，曹姓也，唯委任曹氏而已。」公聞之，使人語立曰：「知公忠於朝廷，然天道深遠，幸勿多言。」
