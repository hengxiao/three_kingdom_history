  text: 臣松之案：漢高祖二年，與楚戰滎陽京、索之間，築甬道屬河以取敖倉粟。應劭曰：「恐敵鈔輜重，故築垣牆如街巷也。」今魏武不築垣牆，但連車樹柵以扞兩面。
