  text: 《曹瞞傳》曰：公遣華歆勒兵入宮收后，后閉戶匿壁中。歆壞戶發壁，牽后出。帝時與御史大夫郗慮坐，后被髮徒跣過，執帝手曰：「不能復相活邪？」帝曰：「我亦不自知命在何時也。」帝謂慮曰：「郗公，天下寧有是乎！」遂將后殺之，完及宗族死者數百人。
