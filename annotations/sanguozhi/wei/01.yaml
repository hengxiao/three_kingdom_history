  text: 《魏書》曰：辛未，有司以太牢告至，策勳于廟，甲午始春祠，令曰：「議者以爲祠廟上殿當解履。吾受錫命，帶劔不解履上殿。今有事于廟而解履，是尊先公而替王命，敬父祖而簡君主，故吾不敢解履上殿也。又臨祭就洗，以手擬水而不盥。夫盥以絜爲敬，未聞擬向不盥之禮，且『祭神如神在』，故吾親受水而盥也。又降神禮訖，下階就幕而立，須奏樂畢竟，似若不愆，烈祖遲祭，不速訖也。故吾坐俟樂闋送神乃起也。受胙納神以授侍中，此爲敬恭不終實也，古者親執祭事，故吾親納于神，終抱而歸也。仲尼曰『雖違衆，吾從下』，誠哉斯言也。」
