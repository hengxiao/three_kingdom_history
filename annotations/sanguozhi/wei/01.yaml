  text: 《山陽公載記》曰：公船艦爲備所燒，引軍從華容道步歸，遇泥濘，道不通，天又大風，悉使羸兵負草填之，騎乃得過。羸兵爲人馬所蹈藉，陷泥中，死者甚衆。軍旣得出，公大喜，諸將問之，公曰：「劉備，吾儔也。但得計少晚；向使早放火，吾徒無類矣。」備尋亦放火而無所及。孫盛異同評曰：案吳志，劉備先破公軍，然後權攻合肥，而此記云權先攻合肥，後有赤壁之事。二者不同，吳志爲是。
