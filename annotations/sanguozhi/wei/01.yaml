  text: 《魏書》曰：袁紹宿與故太尉楊彪、大長秋梁紹、少府孔融有隙，欲使公以他過誅之。公曰：「當今天下土崩瓦解，雄豪並起，輔相君長，人懷怏怏，各有自爲之心，此上下相疑之秋也，雖以無嫌待之，猶懼未信；如有所除，則誰不自危？且夫起布衣，在塵垢之間，爲庸人之所陵陷，可勝怨乎！高祖赦雍齒之讎而羣情以安，如何忘之？」紹以爲公外託公義，內實離異，深懷怨望。臣松之以爲楊彪亦曾爲魏武所困，幾至於死，孔融竟不免於誅滅，豈所謂先行其言而後從之哉！非知之難，其在行之，信矣。
