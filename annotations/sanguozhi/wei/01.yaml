  text: 《獻帝起居注》曰：使太常徐璆即授印綬。御史大夫不領中丞，置長史一人。《先賢行狀》曰：璆字孟平，廣陵人。少履清爽，立朝正色。歷任城、汝南、東海三郡，所在化行。被徵當還，爲袁術所劫。術僭號，欲授以上公之位，璆終不爲屈。術死後，璆得術璽，致之漢朝，拜衞尉太常；公爲丞相，以位讓璆焉。
