  type: pei
  text: 《魏名臣奏》載中領軍夏侯獻表曰：「公孫淵昔年敢違王命，廢絕計貢者，實挾兩端。既恃阻險，又怙孫權。故敢跋扈，恣睢海外。宿舒親見賊權軍眾府庫，知其弱少不足憑恃，是以決計斬賊之使。又高句麗、濊貊與淵為仇，並為寇鈔。今外失吳援，內有胡寇，心知國家能從陸道，勢不得不懷惶懼之心。因斯之時，宜遣使示以禍福。奉車都尉鬷弘，武皇帝時始奉使命，開通道路。文皇帝即位，欲通使命，遣弘將妻子還歸鄉里，賜其車、牛，絹百匹。弘以受恩，歸死國朝，無有還意，乞留妻子，身奉使命。公孫康遂稱臣妾。以弘奉使稱意，賜爵關內侯。弘性果烈，乃心於國，夙夜拳拳，念自竭效。冠族子孫，少好學問，博通書記，多所關涉，口論速捷，辯而不俗，附依典誥，若出胸臆，加仕本郡，常在人右，彼方士人素所敬服。若當遣使，以為可使弘行。弘乃自舊土，習其國俗，為說利害，辯足以動其意，明足以見其事，才足以行之，辭足以見信。若其計從，雖酈生之降齊王，陸賈之說尉佗，亦無以遠過也。欲進遠路，不宜釋騏驥；將已篤疾，不宜廢扁鵲。原察愚言也。」
- id: wei.8.p30.a1
  anchor: wei.8.p30
  at: 28
  length: 0
  type: pei
  text: 《吳書》曰：魏遣使者傅容、聶夔拜淵為樂浪公。淵計吏從洛陽還，語淵曰：「使者左駿伯，使皆擇勇力者，非凡人也。」淵由是疑怖。容、夔至，住學館中。淵先以步騎圍之，乃入受拜。容、夔大怖，由是還洛言狀。
