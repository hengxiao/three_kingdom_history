  type: pei
  text: 《漢晉春秋》曰：公孫淵自立，稱紹漢元年。聞魏人將討，復稱臣於吳，乞兵北伐以自救。吳人欲戮其使，羊衜曰：「不可，是肆匹夫之怒而捐霸王之計也。不如因而厚之，遣奇兵潛往以要其成。若魏伐淵不克，而我軍遠赴，是恩結遐夷，義蓋萬里，若兵連不解，首尾離隔，則我虜其傍郡，驅略而歸，亦足以致天之罰，報雪曩事矣。」權曰：「善」。乃勒兵大出。謂淵使曰：「請俟後問，當從簡書，必與弟同休戚，共存亡，雖隕於中原，吾所甘心也。」又曰：「司馬懿所向無前，深為弟憂也。」
