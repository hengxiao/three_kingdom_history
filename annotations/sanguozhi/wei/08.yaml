  type: pei
  text: 《魏略》曰：始淵兄晃為恭任子，在洛，聞淵劫奪恭位，謂淵終不可保，數自表聞，欲令國家討淵。帝以淵已秉權，故因而撫之。及淵叛，遂以國法系晃。晃雖有前言，冀不坐，然內以骨肉，知淵破則己從及。淵首到，晃自審必死，與其子相對啼哭。時上亦欲活之，而有司以為不可，遂殺之。
- id: wei.8.p37.a1
  anchor: wei.8.p37
  at: 219
  length: 0
  type: pei
  text: 《九州春秋》曰：張角之反也，黑山、白波、黃龍、左校、牛角、五鹿、羝根、苦蝤、劉石、平漢、大洪、司隸、緣城、羅市、雷公、浮雲、飛燕、白爵、楊鳳、於毒等各起兵，大者二三萬，小者不減數千。靈帝不能討，乃遣使拜楊鳳為黑山校尉，領諸山賊，得舉孝廉計吏。後遂瀰漫，不可復數。《典略》曰：黑山、黃巾諸帥，本非冠蓋，自相號字，謂騎白馬者為張白騎，謂輕捷者為張飛燕，謂聲大者為張雷公，其饒須者則自稱於羝根，其眼大者自稱李大目。張璠《漢紀》云：又有左校、郭大賢、左髭丈八三部也。
