  at: 177
  length: 0
  type: pei
  text: 《英雄記》曰：虞讓太尉，因薦衛尉趙謨、益州牧劉焉、豫州牧黃琬、南陽太守羊續，並任為公。
- id: wei.8.p3.a1
  anchor: wei.8.p3
  at: 110
  length: 0
  type: pei
  text: 《九州春秋》曰：紹、馥使故樂浪太守甘陵張岐齎議詣虞，使即尊號。虞厲聲呵岐曰：「卿敢出此言乎！忠孝之道，既不能濟。孤受國恩，天下擾亂，未能竭命以除國恥，望諸州郡烈義之士戮力西面，援迎幼主，而乃妄造逆謀，欲塗污忠臣邪！」《吳書》曰：馥以書與袁術，云帝非孝靈子，欲依絳、灌誅廢少主，迎立代王故事；稱虞功德治行，華夏少二，當今公室枝屬，皆莫能及。又云：「昔光武去定王五世，以大司馬領河北，耿弇、馮異勸即尊號，卒代更始。今劉公自恭王枝別，其數亦五，以大司馬領幽州牧，此其與光武同。」是時有四星會於箕尾，馥稱讖云神人將在燕分。又言濟陰男子王定得玉印，文曰「虞為天子」。又見兩日出於代郡，謂虞當代立。紹又別書報術。是時術陰有不臣之心，不利國家有長主，外託公義以答拒之。紹亦使人私報虞，虞以國有正統，非人臣所宜言，固辭不許；乃欲圖奔匈奴以自絕，紹等乃止。虞於是奉職脩貢，愈益恭肅；諸外國羌、胡有所貢獻，道路不通，皆為傳送，致之京師。
