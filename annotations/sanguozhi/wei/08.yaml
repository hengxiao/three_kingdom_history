  text: 《吳書》曰：謙死時，年六十三，張昭等爲之哀辭曰：「猗歟使君，君侯將軍，膺秉懿德，允武允文，體足剛直，守以溫仁。令舒及盧，遺愛于民；牧幽曁徐，甘棠是均。憬憬夷貊，賴侯以清；蠢蠢妖寇，匪侯不寧。唯帝念績，爵命以章，旣牧且侯，啟土溧陽。遂升上將，受號安東，將平世難，社稷是崇。降年不永，奄忽殂薨，喪覆失恃，民知困窮。曾不旬日，五郡潰崩，哀我人斯，將誰仰憑？追思靡及，仰叫皇穹。嗚呼哀哉！」謙二子：商、應，皆不仕。
