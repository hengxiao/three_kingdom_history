  type: pei
  text: 《傅子》曰：繡有所親胡車兒，勇冠其軍。太祖愛其驍健，手以金與之。繡聞而疑太祖欲因左右刺之，遂反。《吳書》曰：繡降，（凌統）用賈詡計，乞徙軍就高道，道由太祖屯中。繡又曰：「車少而重，乞得使兵各被甲。」太祖信繡，皆聽之。繡乃嚴兵入屯，掩太祖。太祖不備，故敗。
