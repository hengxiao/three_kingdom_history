  text: 遂舉兵與紹對戰，紹不勝。
- id: wei.8.p7.a1
  anchor: wei.8.p7
  at: 80
  length: 0
  type: pei
  text: 《魏氏春秋》曰：初，劉虞和輯戎狄，瓚以胡夷難禦，當因不賓而討之，今加財賞，必益輕漢，效一時之名，非久長深慮。故虞所賞賜，瓚輒鈔奪。虞數請會，稱疾不往。至是戰敗，虞欲討之，告東曹掾右北平人魏攸。攸曰：「今天下引領，以公為歸，謀臣爪牙，不可無也。瓚，文武才力足恃，雖有小惡，固宜容忍。」乃止。後一年，攸病死。虞又與官屬議，密令眾襲瓚。瓚部曲放散在外，自懼敗，掘東城門欲走。虞兵無部伍，不習戰，又愛民屋，敕令勿燒。故瓚得放火，因以精銳衝突。虞眾大潰，奔居庸城。瓚攻及家屬以還，殺害州府，衣冠善士殆盡。《典略》曰：瓚曝虞於市而祝曰：「若應為天子者，天當降雨救之。」時盛暑，竟日不雨，遂殺虞。《英雄記》曰：虞之見殺，故常山相孫瑾、掾張逸、張瓚等忠義憤發，相與就虞，罵瓚極口，然後同死。
- id: wei.8.p7.a2
  anchor: wei.8.p7
  at: 104
  length: 0
  type: pei
  text: 《英雄記》曰：瓚統內外，衣冠子弟有材秀者，必抑使困在窮苦之地。或問其故，答曰：「今取衣冠家子弟及善士富貴之，皆自以為職當得之，不謝人善也。」所寵遇驕恣者，類多庸兒，若故卜數師劉緯台、販繒李移子、賈人樂何當等三人，與之定兄弟之誓，自號為伯，謂三人者為仲叔季，富皆巨億，或取其女以配己子，常稱古者曲周、灌嬰之屬以譬也。
- id: wei.8.p7.a3
  anchor: wei.8.p7
  at: 221
  length: 0
  type: pei
  text: 《英雄記》曰：先是有童謠曰：「燕南垂，趙北際，中央不合大如礪，惟有此中可避世。」瓚以易當之，乃築京固守。瓚別將有為敵所圍，義不救也。其言曰：「救一人，使後將恃救不力戰；今不救此，後將當念在自勉。」是以袁紹始北擊之時，瓚南界上別營自度守則不能自固，又知必不見救，是以或自殺其將帥，或為紹兵所破，遂令紹軍徑至其門。臣松之以為童謠之言，無不皆驗；至如此記，似若無徵。謠言之作，蓋令瓚終始保易，無事遠略。而瓚因破黃巾之威，意志張遠，遂置三州刺史，圖滅袁氏，所以致敗也。
- id: wei.8.p7.a4
  anchor: wei.8.p7
  at: 265
  length: 0
  type: pei
  text: 《英雄記》曰：瓚諸將家家各作高樓，樓以千計。瓚作鐵門，居樓上，屏去左右，婢妾侍側，汲上文書。
