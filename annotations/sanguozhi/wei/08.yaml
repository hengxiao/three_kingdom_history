- id: wei.8.p42.a1
  anchor: wei.8.p42
  at: 56
  length: 0
  type: pei
  text: 《魏名臣奏》載董昭表曰：武皇帝承涼州從事及武都降人之辭，說張魯易攻，陽平城下南北山相遠，不可守也，信以為然。及往臨履，不如所聞，乃歎曰：『他人商度，少如人意。』攻陽平山上諸屯，既不時拔，士卒傷夷者多。武皇帝意沮，便欲拔軍截山而還，遣故大將軍夏侯惇、將軍許褚呼山上兵還。會前軍未還，夜迷惑，誤入賊營，賊便退散。侍中辛毗、劉曄等在兵後，語惇、褚，言『官兵已據得賊要屯，賊已散走』。猶不信之。惇前自見，乃還白武皇帝，進兵定之，幸而克獲。此近事，吏士所知。又楊暨表曰：武皇帝始征張魯，以十萬之眾，身親臨履，指授方略，因就民麥以為軍糧。張衛之守，蓋不足言。地險守易，雖有精兵虎將，勢不能施。對兵三日，欲抽軍還，言『作軍三十年，一朝持與人，如何』。此計已定，天祚大魏，魯守自壞，因以定之。《世語》曰：魯遣五官掾降，弟衛橫山築陽平城以拒，王師不得進。魯走巴中。軍糧盡，太祖將還。西曹掾東郡郭諶曰：「不可。魯已降，留使既未反，衛雖不同，偏攜可攻。縣軍深入，以進必克，退必不免。」太祖疑之。夜有野麋數千突壞衛營，軍大驚。夜，高祚等誤與衛眾遇，祚等多鳴鼓角會眾。衛懼，以為大軍見掩，遂降。
- id: wei.8.p43.a1
  anchor: wei.8.p43
  at: 188
  length: 0
  type: pei
  text: 臣松之以為張魯雖有善心，要為敗而後降，今乃寵以萬戶，五子皆封侯，過矣。習鑿齒曰：魯欲稱王，而閻圃諫止之，今封圃為列侯。夫賞罰者，所以懲惡勸善也，苟其可以明軌訓於物，無遠近幽深矣。今閻圃諫魯勿王，而太祖追封之，將來之人孰不思順！塞其本源而末流自止，其此之謂與！若乃不明於此而重燋爛之功，豐爵厚賞止於死戰之士，則民利於有亂，俗競於殺伐，阻兵仗力，干戈不戢矣。太祖之此封，可謂知賞罰之本，雖湯武居之，無以加也。《魏略》曰：黃初中，增圃爵邑，在禮請中。後十餘歲病死。《晉書》云：西戎司馬閻纘，圃孫也。
- id: wei.8.p44.a1
  anchor: wei.8.p44
  at: 13
  length: 0
  type: pei
  text: 《魏略》曰：劉雄鳴者，藍田人也。少以採藥射獵為事，常居覆車山下，每晨夜，出行雲霧中，以識道不迷，而時人因謂之能為雲霧。郭、李之亂，人多就之。建安中，附屬州郡，州郡表薦為小將。馬超等反，不肯從，超破之。後詣太祖，太祖執其手謂之曰：「孤方入關，夢得一神人，即卿邪！」乃厚禮之，表拜為將軍，遣令迎其部黨。部黨不欲降，遂劫以反，諸亡命皆往依之，有眾數千人，據武關道口。太祖遣夏侯淵討破之，雄鳴南奔漢中。漢中破，窮無所之，乃復歸降。太祖捉其鬚曰：「老賊，真得汝矣！」復其官，徙勃海。時又有程銀、侯選、李堪，皆河東人也，興平之亂，各有眾千餘家。建安十六年，並與馬超合。超破走，堪臨陳死。銀、選南入漢中，漢中破，詣太祖降，皆复官爵。
