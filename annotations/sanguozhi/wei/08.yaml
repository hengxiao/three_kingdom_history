  length: 0
  type: pei
  text: 《晉陽秋》曰：敏子追求敏，出塞，越二十餘年不娶。州里徐邈責之曰：「不孝莫大於無後，何可終身不娶乎！」乃娶妻，生子胤而遣妻，常如居喪之禮，不勝憂，數年而卒。胤生不識父母，及有識，蔬食哀戚亦如三年之喪。以祖父不知存亡，設主奉之。由是知名，仕至司徒。臣松之案：本傳云敏將家入海，而復與子相失，未詳其故。
