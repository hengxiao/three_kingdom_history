- id: wei.8.p13.a1
  anchor: wei.8.p13
  at: 53
  length: 0
  type: pei
  text: 《吳書》曰：曹公父於泰山被殺，歸咎於謙。欲伐謙而畏其彊，乃表令州郡一時罷兵。詔曰：「今海內擾攘，州郡起兵，征夫勞瘁，寇難未弭，或將吏不良，因緣討捕，侵侮黎民，離害者衆；風聲流聞，震蕩城邑，丘牆懼於橫暴，貞良化爲羣惡，此何異乎抱薪救焚，扇火止沸哉！今四民流移，託身佗方，攜白首於山野，棄稚子於溝壑，顧故鄉而哀歎，向阡陌而流涕，饑厄困苦，亦已甚矣。雖悔往者之迷謬，思奉教於今日，然兵連衆結，鋒鏑布野，恐一朝解散，夕見繫虜，是以阻兵屯據，欲止而不敢散也。詔書到，其各罷遣甲士，還親農桑，惟留常員吏以供官署，慰示遠近，咸使聞知。」謙被詔，乃上書曰：「臣聞懷遠柔服，非德不集；克難平亂，非兵不濟。是以涿鹿、版泉、三苗之野有五帝之師，有扈、鬼方、商、奄四國有王者之伐，自古在昔，未有不揚威以弭亂，震武以止暴者也。臣前初以黃巾亂治，受策長驅，匪遑啟處。雖憲章勑戒，奉宣威靈，敬行天誅，每伐輒克，然妖寇類衆，殊不畏死，父兄殲殪，子弟羣起，治屯連兵，至今爲患。若承命解甲，弱國自虛，釋武備以資亂，損官威以益寇，今日兵罷，明日難必至，上忝朝廷寵授之本，下令羣凶日月滋蔓，非所以彊幹弱枝遏惡止亂之務也。臣雖愚蔽，忠恕不昭，抱恩念報，所不忍行。輒勒部曲，申令警備。出芟彊寇，惟力是視，入宣德澤，躬奉職事，冀效微勞，以贖罪負。」又曰：「華夏沸擾，于今未弭，包茅不入，職貢多闕，寤寐憂歎，無日敢寧。誠思貢獻必至，薦羞獲通，然後銷鋒解甲，臣之願也。臣前調穀百萬斛，已在水次，輒勑兵衞送。」曹公得謙上事，知不罷兵。乃進攻彭城，多殺人民。謙引兵擊之，青州刺史田楷亦以兵救謙。公引兵還。臣松之案：此時天子在長安，曹公尚未秉政。罷兵之詔，不得由曹氏出。
