- id: wei.8.p39.a2
  anchor: wei.8.p39
  at: 129
  length: 0
  type: pei
  text: 《魏略》曰：五官將數因請會，發怒曰：「君殺吾兄，何忍持面視人邪！」繡心不自安，乃自殺。
- id: wei.8.p40.a1
  anchor: wei.8.p40
  at: 295
  length: 0
  type: pei
  text: 《典略》曰：熹平中，妖賊大起，三輔有駱曜。光和中，東方有張角，漢中有張脩。駱曜教民緬匿法，角為太平道，脩為五斗米道。太平道者，師持九節杖為符祝，教病人叩頭思過，因以符水飲之，得病或日淺而癒者，則云此人信道，其或不愈，則為不信道。脩法略與角同，加施靜室，使病者處其中思過。又使人為奸令祭酒，祭酒主以老子五千文，使都習，號為奸令。為鬼吏，主為病者請禱。請禱之法，書病人姓名，說服罪之意。作三通，其一上之天，著山上，其一埋之地，其一沉之水，謂之三官手書。使病者家出米五斗以為常，故號曰五斗米師。實無益於治病，但為淫妄，然小人昏愚，競共事之。後角被誅，脩亦亡。及魯在漢中，因其民信行脩業，遂增飾之。教使作義舍，以米肉置其中以止行人；又教使自隱，有小過者，當治道百步，則罪除；又依月令，春夏禁殺；又禁酒。流移寄在其地者，不敢不奉。臣松之謂：張脩應是張衡，非《典略》之失，則傳寫之誤。
- id: wei.8.p42.t1
