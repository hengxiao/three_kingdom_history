  text: 《九州春秋》曰：純自號彌天將軍、安定王。
- id: wei.8.p2.a1
  anchor: wei.8.p2
  at: 53
  length: 0
  type: pei
  text: 《吳書》曰：虞，東海恭王之後也。遭世衰亂，又與時主疏遠，仕縣為戶曹吏。以能治身奉職，召為郡吏，以孝廉為郎，累遷至幽州刺史，轉甘陵相，甚得東土戎狄之心。後以疾歸家，常降身隱約，與邑黨州閭同樂共卹，等齊有無，不以名位自殊，鄉曲咸共宗之。時鄉曲有所訴訟，不以詣吏，自投虞平之；虞以情理為之論判，皆大小敬從，不以為恨。嘗有失牛者，骨體毛色，與虞牛相似，因以為是，虞便推與之；後主自得本牛，乃還謝罪。會甘陵复亂，吏民思虞治行，復以為甘陵相，甘陵大治。徵拜尚書令、光祿勳，以公族有禮，更為宗正。《英雄記》曰：虞為博平令，治正推平，高尚純樸，境內無盜賊，災害不生。時鄰縣接壤，蝗蟲為害，至博平界，飛過不入。《魏書》曰：虞在幽州，清靜儉約，以禮義化民。靈帝時，南宮災，吏遷補州郡者，皆責助治宮錢，或一千萬，或二千萬，富者以私財辨，或發民錢以備之，貧而清慎者，無以充調，或至自殺。靈帝以虞清貧，特不使出錢。
- id: wei.8.p2.a2
