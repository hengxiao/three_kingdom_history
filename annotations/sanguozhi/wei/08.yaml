  type: pei
  text: 《英雄記》曰：關靖字士起，太原人。本酷吏也，諂而無大謀，特為瓚所信幸。
- id: wei.8.p9.a2
  anchor: wei.8.p9
  at: 197
  length: 0
  type: pei
  text: 《典略》曰：瓚遣行人文則齎書告子續曰：「袁氏之攻，似若神鬼，鼓角鳴於地中，梯衝舞吾樓上。日窮月蹴，無所聊賴。汝當碎首於張燕，速致輕騎，到者當起烽火於北，吾當從內出。不然，吾亡之後，天下雖廣，汝欲求安足之地，其可得乎！」《獻帝春秋》曰：瓚夢薊城崩，知必敗，乃遣間使與續書。紹候者得之，使陳琳更其書曰：「蓋聞在昔衰周之世，僵戶流血，以為不然，豈意今日身當其衝！」其餘語與《典略》所載同。
- id: wei.8.p9.a3
  anchor: wei.8.p9
  at: 249
  length: 0
  type: pei
  text: 《英雄記》曰：袁紹分部攻者掘地為道，穿穴其樓下，稍稍施木柱之，度足達半，便燒所施之柱，樓輒傾倒。
- id: wei.8.p9.a4
  anchor: wei.8.p9
  at: 265
  length: 0
  type: pei
  text: 《漢晉春秋》曰：關靖曰：「吾聞君子陷人於危，必同其難，豈可獨生乎！」乃策馬赴紹軍而死。紹悉送其首於許。
- id: wei.8.p10.a1
  anchor: wei.8.p10
  at: 77
  length: 0
  type: pei
  text: 《魏略》曰：輔從太祖於官渡。袁紹破走，太祖喜，顧謂輔曰：「如前歲本初送公孫瓚頭來，孤自視忽然耳，而今克之。此既天意，亦二三子之力。」
- id: wei.8.p10.a2
  anchor: wei.8.p10
  at: 111
  length: 0
  type: pei
  text: 《魏略》曰：太祖甚愛閻柔，每謂之曰：「我視卿如子，亦欲卿視我如父也。」柔由此自託於五官將，如兄弟。
- id: wei.8.p11.a1
  anchor: wei.8.p11
  at: 10
  length: 0
  type: pei
  text: 《吳書》曰：謙父，故餘姚長。謙少孤，始以不羈聞於縣中。年十四，猶綴帛爲幡，乘竹馬而戲，邑中兒僮皆隨之。故蒼梧太守同縣甘公出遇之塗，見其容貌，異而呼之，住車與語，甚恱，因許妻以女。甘公夫人聞之，怒曰：「妾聞陶家兒敖戲無度，如何以女許之？」公曰：「彼有奇表，長必大成。」遂妻之。
- id: wei.8.p11.a2
  anchor: wei.8.p11
  at: 30
  length: 0
  type: pei
  text: 《吳書》曰：謙性剛直，有大節，少察孝廉，拜尚書郎，除舒令。郡守張磐，同郡先輩，與謙父友意殊親之，而謙恥爲之屈。與衆還城，因以公事進見，坐罷，磐常私還入與謙飲宴，或拒不爲留。常以舞屬謙，謙不爲起，固彊之；及舞，又不轉。磐曰：「不當轉邪？」曰：「不可轉，轉則勝人。」由是不樂，卒以搆隙。謙在官清白，無以糾舉，祠靈星，有贏錢五百，欲以臧之。謙委官而去。
- id: wei.8.p11.a3
  anchor: wei.8.p11
  at: 56
  length: 0
  type: pei
  text: 《吳書》曰：會西羌寇邊，皇甫嵩爲征西將軍，表請武將。召拜謙楊武都尉，與嵩征羌，大破之。後邊章、韓遂爲亂，司空張溫銜命征討；又請謙爲參軍事，接遇甚厚，而謙輕其行事，心懷不服。及軍罷還，百寮高會，溫屬謙行酒，謙衆辱溫。溫怒，徙謙於邊。或說溫曰：「陶恭祖本以材略見重於公，一朝以醉飲過失，不蒙容貸，遠棄不毛，厚德不終，四方人士安所歸望！不如釋憾除恨，克復初分，於以遠聞德美。」溫然其言，乃追還謙。謙至，或又謂謙曰：「足下輕辱三公，罪自己作，今蒙釋宥，德莫厚矣；宜降志卑辭以謝之。」謙曰：「諾。」又謂溫曰：「陶恭祖今深自罪責，思在變革。謝天子禮畢，必詣公門。公宜見之，以慰其意。」時溫於宮門見謙，謙仰曰：「謙自謝朝廷，豈爲公邪？」溫曰：「恭祖癡病尚未除邪？」遂爲之置酒，待之如初。
- id: wei.8.p12.a1
  anchor: wei.8.p12
  at: 94
  length: 0
  type: pei
  text: 謝承《漢書》曰：昱年十三，母嘗病，經涉三月。昱慘戚消瘠，至目不交睫，握粟出卜，祈禱泣血，鄉黨稱其孝。就處士東莞綦毌君受《公羊傳》，兼該羣業。至歷年潛志，不闚園圃，親疏希見其面。時入定省父母，須臾即還。高絜廉正，抱禮而立，清英儼恪，莫干其志；旌善以興化，彈邪以矯俗。州郡請召，常稱病不應。國相檀謨、陳遵比召，不起；或興盛怒，終不迴意。舉孝廉，除莒長，宣揚五教，政爲國表。會黃巾作亂，陸梁五郡，郡縣發兵，以爲先辦。徐州刺史巴祗表功第一，當受遷賞，昱深以爲恥，委官還家。徐州牧陶謙初辟別駕從事，辭疾遜遁。謙重令楊州從事會稽吳範宣旨，昱守意不移；欲威以刑罰，然後乃起。舉茂才，遷廣陵太守。賊笮融從臨淮見討，迸入郡界，昱將兵拒戰，敗績，見害。
