  text: 《傅子》曰：寧以衰亂之時，世多妄變氏族者，違聖人之制，非禮命姓之意，故著《氏姓論》以原本世系，文多不載。每所居姻親、知舊、鄰里有困窮者，家儲雖不盈擔石，必分以贍救之。與人子言，教以孝；與人弟言，訓以悌；言及人臣，誨以忠。貌甚恭，言甚順，觀其行，邈然若不可及，即之熈熈然，甚柔而溫，因其事而導之於善，是以漸之者無不化焉。寧之亡，天下知與不知，聞之無不嗟歎。醇德之所感若此，不亦至乎！
