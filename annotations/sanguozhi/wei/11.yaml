- id: wei.11.p26.a2
  anchor: wei.11.p26
  at: 166
  length: 0
  type: pei
  text: 《傅子》曰：寧往見度，語唯經典，不及世事。還乃因山為廬，鑿坏為室。越海避難者，皆來就之而居，旬月而成邑。遂講詩、書，陳俎豆，飾威儀，明禮讓，非學者無見也。由是度安其賢，民化其德。邴原性剛直，清議以格物，度已下心不安之。寧謂原曰：「潛龍以不見成德，言非其時，皆招禍之道也。」密遣令西還。度庶子康代居郡，外以將軍太守為號，而內實有王心，卑己崇禮，欲官寧以自鎮輔，而終莫敢發言，其敬憚如此。皇甫謐《高士傳》曰：寧所居屯落，會井汲者，或男女雜錯，或爭井鬬鬩。寧患之，乃多買器，分置井傍，汲以待之，又不使知。來者得而怪之，問知寧所為，乃各相責，不復鬬訟。鄰有牛暴寧田者，寧為牽牛著涼處，自為飲食，過於牛主。牛主得牛，大慙，若犯嚴刑。是以左右無鬬訟之聲，禮讓移於海表。
