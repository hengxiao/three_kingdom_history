- id: wei.11.p5.a1
  anchor: wei.11.p5
  at: 274
  length: 0
  type: pei
  text: 《袁氏世紀》曰：渙有四子，侃、㝢、奧、準。侃字公然，論議清當，柔而不犯，善與人交。在廢興之間，人之所趣務者，常謙退不為也。時人以是稱之。歷位黃門選部郎，號為清平。稍遷至尚書，早卒。㝢字宣厚，精辯有機理，好道家之言，少被病，未官而卒，奧字公榮，行足以厲俗，言約而理當，終於光祿勳。準字孝尼，忠信公正，不恥下問，唯恐人之不勝己。以世事多險，故常治退而不敢求進。著書十餘萬言，論治世之務，為易、周官、詩傳，及論五經滯義，聖人之微言，以傳於世。此準之自序也。荀綽《九州記》稱準有儁才，泰始中為給事中。袁氏子孫世有名位，貴達至今。
