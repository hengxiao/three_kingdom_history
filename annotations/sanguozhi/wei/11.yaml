  anchor: wei.11.p18
  at: 663
  length: 0
  type: pei
  text: 《魏略》曰：脩為司金中郎將，陳黃白異議，因奏記曰：「脩聞枳棘之林，無梁柱之質；涓流之水，無洪波之勢。是以在職七年，忠讜不昭於時，功業不見於事，欣於所受，俯慙不報，未嘗不長夜起坐，中飯釋餐。何者？力少任重，不堪而懼也。謹貢所議如左。」太祖甚然之，乃與脩書曰：「君澡身浴德，流聲本州，忠能成績，為世美談，名實相副，過人甚遠。孤以心知君，至深至孰，非徒耳目而已也。察觀先賢之論，多以鹽鐵之利，足贍軍國之用。昔孤初立司金之官，念非屈君，餘無可者。故與君教曰：『昔遏父陶正，民賴其器用，及子媯滿，建侯于陳；近桑弘羊，位至三公。此君元龜之兆先告者也』，是孤用君之本言也，或恐衆人未曉此意。自是以來，在朝之士，每得一顯選，常舉君為首，及聞袁軍師衆賢之議，以為不宜越君。然孤執心將有所厎，以軍師之職，閑於司金，至於建功，重於軍師。孤之精誠，足以達君；君之察孤，足以不疑。但恐傍人淺見，以蠡測海，為蛇畫足，將言前後百選，輙不用之，而使此君沈滯冶官。張甲李乙，尚猶先之，此主人意待之不優之效也。孤懼有此空聲冒實，淫鼃亂耳。假有斯事，亦庶鍾期不失聽也；若其無也，過備何害？昔宣帝察少府蕭望之才任宰相，故復出之，令為馮翊。從正卿往，似於左遷。上使侍中宣意曰：『君守平原日淺，故復試君三輔，非有所閒也。』孤揆先主中宗之意，誠備此事。旣君崇勳業以副孤意。公叔文子與臣俱升，獨何人哉！」後無幾而遷魏郡太守。
