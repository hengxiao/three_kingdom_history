  text: 王隱《晉書》曰：脩一子，名儀，字朱表，高亮雅直。司馬文王為安東，儀為司馬。東關之敗，文王曰：「近日之事，誰任其咎？」儀曰：「責在軍師。」文王怒曰：「司馬欲委罪於孤邪？」遂殺之。子襃，字偉元。少立操尚，非禮不動。身長八尺四寸，容貌絕異。痛父不以命終，絕世不仕。立屋墓側，以教授為務。旦夕常至墓前拜，輙悲號斷絕。墓前有一柏樹，襃常所攀援，涕泣所著，樹色與凡樹不同。讀詩至「哀哀父母，生我勞悴」，未曾不反覆流涕，泣下沾衿。家貧躬耕，計口而田，度身而蠶。諸生有密為襃刈麥者，襃遂棄之；自是莫敢復佐刈者。襃門人為本縣所役，求襃為屬，襃曰：「卿學不足以庇身，吾德薄不足以蔭卿，屬之何益？且吾不捉筆已四十年。」乃步擔乾飯，兒負鹽豉，門徒從者千餘人。安丘令以為見己，整衣出迎之於門。襃乃下道至土牛，磬折而立。云：「門生為縣所役，故來送別。」執手涕泣而去。令即放遣諸生，一縣以為恥。同縣管彥，少有才力，未知名，襃獨以為當自達，常友愛之；男女各始生，共許為婚。彥果為西夷校尉。襃後更以女嫁人，彥弟馥問襃，襃曰：「吾薄志畢願，山藪自處，姊妹皆遠，吉凶斷絕，以此自誓。賢兄子葬父於帝都，此則洛陽之人也，豈吾欲婚之本指邪？」馥曰：「嫂，齊人也。當還臨菑。」襃曰：「安有葬父河南，隨妻還齊！用意如此，何婚之有？」遂不婚。邴春者，根矩之後也。少立志操，寒苦自居，負笈遊學，身不停家，鄉邑翕然，以為能係其先也。襃以為春性險狹，慕名意多，終必不成，及後春果無學業，流離遠外，有識以此歸之。襃常以為人所行，其當歸於善道，不可以己所能而責人所不能也。有致遺者，皆不受。及洛都傾覆，寇賊蠭起，襃宗親悉欲移江東，襃戀墳壠。賊大盛，乃南達泰山郡。襃思土不肯去，賊害之。《漢晉春秋》曰：襃與濟南劉兆字延世，俱以不仕顯名。襃以父為文王所濫殺，終身不應徵聘，未甞西向坐，以示不臣於晉也。
