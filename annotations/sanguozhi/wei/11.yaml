  text: 《高士傳》曰：初，晉宣帝為布衣時，與昭有舊。同郡周生等謀害帝，昭聞而步陟險，邀生於崤、澠之間，止生，生不肯。昭泣與結誠，生感其義，乃止。昭因與斫棗樹共盟而別。昭雖有陰德於帝，口終不言，人莫知之。信行著於鄉黨。建安十六年，百姓聞馬超叛，避兵入山者千餘家，飢乏，漸相劫略，昭常遜辭以解之，是以寇難消息，衆咸宗焉。故其所居部落中，三百里無相侵暴者。
