  text: 《傅子》曰：是時康又已死，嫡子不立而立弟恭，恭懦弱，而康孽子淵有儁才。寧曰：「廢嫡立庶，下有異心，亂之所由起也。」乃將家屬乘海即受徵。寧在遼東，積三十七年乃歸，其後淵果襲奪恭位，叛國家而南連吳，僭號稱王，明帝使相國宣文侯征滅之。遼東之死者以萬計，如寧所籌。寧之歸也，海中遇暴風，船皆沒，唯寧乘船自若。時夜風晦冥，船人盡惑，莫知所泊。望見有火光，輒趣之，得島。島無居人，又無火燼，行人咸異焉，以為神光之祐也。皇甫謐曰：「積善之應也。」
- id: wei.11.p28.a2
  anchor: wei.11.p28
  at: 117
  length: 0
  type: pei
  text: 《傅子》曰：寧上書天子，且以疾辭，曰：「臣聞傅說發夢，以感殷宗，呂尚啟兆，以動周文，以通神之才悟於聖主，用能匡佐帝業，克成大勳。臣之器朽，實非其人。雖貪清時，釋體蟬蛻。內省頑病，日薄西山。唯陛下聽野人山藪之願，使一老者得盡微命。」書奏，帝親覽焉。
