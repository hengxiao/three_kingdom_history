  text: 《晉諸公贊》曰：亮子粲，字儀祖，文學博識，累為儒官，至尚書。
- id: wei.11.p6.a2
  anchor: wei.11.p6
  at: 105
  length: 0
  type: pei
  text: 袁宏《漢紀》曰：初，天下將亂，渙慨然歎曰：「漢室陵遲，亂無日矣。苟天下擾攘，逃將安之？若天未喪道，民以義存，唯彊而有禮，可以庇身乎！」徽曰：「古人有言：『知機其神乎』！見機而作，君子所以元吉也。天理盛衰，漢其亡矣！夫有大功必有大事，此又君子之所深識，退藏於密者也。且兵革旣興，外患必衆，徽將遠迹山海，以求免身。」及亂作，各行其志。
