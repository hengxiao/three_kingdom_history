  text: 《傅子》曰：胡徵君怡怡無不愛也，雖僕隷，必加禮焉。外同乎俗，內秉純絜，心非其好，王公不能屈，年八十而不倦於書籍者，吾於胡徵君見之矣。時有隱者焦先，河東人也。《魏略》曰：先字孝然。中平末，白波賊起。時先年二十餘，與同郡侯武陽相隨。武陽年小，有母，先與相扶接，避白波，東客揚州取婦。建安初來西還，武陽詣大陽占戶，先留陝界。至十六年，關中亂。先失家屬，獨竄於河渚間，食草飲水，無衣履。時大陽長朱南望見之，謂為亡士，欲遣船捕取。武陽語縣：「此狂癡人耳！」遂注其籍。給廩，日五升。後有疫病，人多死者，縣常使埋藏，童兒豎子皆輕易之。然其行不踐邪徑，必循阡陌；及其捃拾，不取大穗；饑不苟食，寒不苟衣，結草以為裳，科頭徒跣。每出，見婦人則隱翳，須去乃出。自作一瓜牛廬，淨埽其中。營木為牀，布草蓐其上。至天寒時，搆火以自炙，呻吟獨語。饑則出為人客作，飽食而已，不取其直。又出於道中，邂逅與人相遇，輙下道藏匿。或問其故，常言「草茅之人，與狐兔同羣」。不肯妄語。太和、青龍中，甞持一杖南渡淺河水，輙獨云未可也，由是人頗疑其不狂。至嘉平中，太守賈穆初之官，故過其廬。先見穆再拜。穆與語，不應；與食，不食。穆謂之曰：「國家使我來為卿作君，我食卿，卿不肯食，我與卿語，卿不應我，如是，我不中為卿作君，當去耳！」先乃曰：「寧有是邪？」遂不復語。其明年，大發卒將伐吳。有竊問先：「今討吳何如？」先不肯應，而謬歌曰：「祝衂祝衂，非魚非肉，更相追逐，本心為當殺牂羊，更殺其羖䍽邪！」郡人不知其謂。會諸軍敗，好事者乃推其意，疑牂羊謂吳，羖䍽謂魏，於是後人僉謂之隱者也。議郎河東董經特嘉異節，與先非故人，密往觀之。經到，乃奮其白鬚，為如與之有舊者，謂曰：「阿先闊乎！念共避白波時不？」先熟視而不言。經素知其昔受武陽恩，因復曰：「念武陽不邪？」先乃曰：「已報之矣。」經又復挑欲與語，遂不肯復應。後歲餘病亡，時年八十九矣。《高士傳》曰：世莫知先所出。或言生乎漢末，自陝居大陽，無父母兄弟妻子。見漢室衰，乃自絕不言。及魏受禪，常結草為廬於河之湄，獨止其中。冬夏恒不著衣，卧不設席，又無草蓐，以身親土，其體垢汙皆如泥漆，五形盡露，不行人間。或數日一食，欲食則為人賃作，人以衣衣之，乃使限功受直，足得一食輙去，人欲多與，終不肯取，亦有數日不食時。行不由邪徑，目不與女子逆視。口未甞言，雖有驚急，不與人語。遺以食物皆不受。河東太守杜恕甞以衣服迎見，而不與語。司馬景王聞而使安定太守董經因事過視，又不肯語，經以為大賢。其後野火燒其廬，先因露寢。遭冬雪大至，先袒卧不移，人以為死，就視如故，不以為病，人莫能審其意。度年可百歲餘乃卒。或問皇甫謐曰：「焦先何人？」曰：「吾不足以知之也。考之於表，可略而言矣。夫世之所常趣者榮味也，形之所不可釋者衣裳也，身之所不可離者室宅也，口之所不能已者言語也，心之不可絕者親戚也。今焦先棄榮味，釋衣服，離室宅，絕親戚，閉口不言，曠然以天地為棟宇，闇然合至道之前，出羣形之表，入玄寂之幽，一世之人不足以挂其意，四海之廣不能以回其顧，妙乎與夫三皇之先者同矣。結繩已來，未及其至也，豈羣言之所能髣髴，常心之所得測量哉！彼行人所不能行，堪人所不能堪，犯寒暑不以傷其性，居曠野不以恐其形，遭驚急不以迫其慮，離榮愛不以累其心，損視聽不以汙其耳目，舍足於不損之地，居身於獨立之處，延年歷百，壽越期頤，雖上識不能尚也。自羲皇已來，一人而已矣！」《魏氏春秋》曰：故梁州刺史耿黼以先為「仙人」也，北海傅玄謂之「性同禽獸」，並為之傳，而莫能測之。
