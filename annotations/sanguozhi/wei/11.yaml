  text: 《尚書·君奭》曰：「耇造德不降，我則鳴鳥不聞，矧曰其有能格。」鄭玄曰：「耇，老也。造，成也。詩云：『小子有造。』老成德之人，不降志與我並在位，則鳴鳥之聲不得聞，況乃曰有能德格於天者乎！言必無也。鳴鳥謂鳳也。」
