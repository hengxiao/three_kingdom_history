  text: 《傅子》曰：司空陳羣又薦寧曰：「臣聞王者顯善以消惡，故湯舉伊尹，不仁者遠。伏見徵士北海管寧，行為世表，學任人師，清儉足以激濁，貞正足以矯時。前雖徵命，禮未優備。昔司空荀爽，家拜光祿，先儒鄭玄，即授司農，若加備禮，庶必可致。至延西序，坐而論道，必能昭明古今，有益大化。」
