  at: 165
  length: 0
  type: pei
  text: 王沈《魏書》曰：穀熟長呂岐善朱淵、爰津，遣使行學還，召用之，與相見，出署淵師友祭酒，津決疑祭酒。淵等因各歸家，不受署。岐大怒，將吏民收淵等，皆杖殺之，議者多非焉。渙教勿劾，主簿孫徽等以為「淵等罪不足死，長吏無專殺之義，孔子稱『唯器與名，不可以假人』。謂之師友而加大戮，刑名相伐，不可以訓。」渙教曰：「主簿以不請為罪，此則然矣。謂淵等罪不足死，則非也。夫師友之名，古今有之。然有君之師友，有士大夫之師友。夫君置師友之官者，所以敬其臣也；有罪加於刑焉，國之法也。今不論其罪而謂之戮師友，斯失之矣。主簿取弟子戮師之名，而加君誅臣之實，非其類也。夫聖哲之治，觀時而動，故不必循常，將有權也。間者世亂，民陵其上，雖務尊君卑臣，猶或未也，而反長世之過，不亦謬乎！」遂不劾。
