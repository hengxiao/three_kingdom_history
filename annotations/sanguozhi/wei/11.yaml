  type: pei
  text: 《先賢行狀》載太祖令曰：「蓨令田疇，志節高尚，遭值州里戎夏交亂，引身深山，研精味道，百姓從之，以成都邑。袁賊之盛，命召不屈。慷慨守志，以徼真主。及孤奉詔征定河北，遂服幽都，將定胡寇，特加禮命。疇即受署，陳建攻胡蹊路所由，率齊山民，一時向化，開塞導道，供承使役，路近而便，令虜不意。斬蹋頓於白狼，遂長驅於柳城，疇有力焉。及軍入塞，將圖其功，表封亭侯，食邑五百，而疇懇惻，前後辭賞。出入三載，歷年未賜，此為成一人之高，甚違王典，失之多矣。宜從表封，無久留吾過。」
