  text: 《先賢行狀》曰：疇將行，引虞密與議。疇因說虞曰：「今帝主幼弱，姧臣擅命，表上須報，懼失事機。且公孫瓚阻兵安忍，不早圖之，必有後悔。」虞不聽。
