- id: wei.11.p15.a1
  anchor: wei.11.p15
  at: 502
  length: 0
  type: pei
  text: 《先賢行狀》載太祖表論疇功曰：「文雅優備，忠武又著，和於撫下，慎於事上，量時度理，進退合義。幽州始擾，胡、漢交萃，蕩析離居，靡所依懷。疇率宗人避難於無終山，北拒盧龍，南守要害，清靜隱約，耕而後食，人民化從，咸共資奉。及袁紹父子威力加於朔野，遠結烏丸，與為首尾，前後召疇，終不陷撓。後臣奉命，軍次易縣，疇長驅自到，陳討胡之勢，猶廣武之建燕策，薛公之度淮南。又使部曲持臣露布，出誘胡衆，漢民或因亡來，烏丸聞之震蕩。王旅出塞，塗由山中九百餘里，疇帥兵五百，啟導山谷，遂威烏丸，蕩平塞表。疇文武有效，節義可嘉，誠應寵賞，以旌其美。」
- id: wei.11.p15.h7
  anchor: wei.11.p15
  at: 533
  length: 2
