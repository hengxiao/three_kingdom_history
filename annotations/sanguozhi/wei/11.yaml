  text: 《博物記》曰：襁，織縷為之，廣八寸，長尺二，以約小兒於背上，負之而行。
- id: wei.11.p9.a2
  anchor: wei.11.p9
  at: 157
  length: 0
  type: pei
  text: 臣松之案此傳云公孫度聞曹公遠征，鄴無守備，則太祖定鄴後也。案〈度傳〉，度以建安九年卒，太祖亦以此年定鄴，自後遠征，唯有北征柳城耳。征柳城之年，度已不復在矣。
