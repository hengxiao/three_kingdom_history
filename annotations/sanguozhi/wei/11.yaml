  type: pei
  text: 《袁氏世紀》曰：布之破也，陳羣父子時亦在布之軍，見太祖皆拜。渙獨高揖不為禮，太祖甚嚴憚之。時太祖又給衆官車各數乘，使取布軍中物，唯其所欲。衆人皆重載，唯渙取書數百卷，資糧而已，衆人聞之，大慙。渙謂所親曰：「脫我以行陳，令軍發足以為行糧而已，不以此為我有。由是厲名也，大悔恨之。」太祖益以此重焉。
