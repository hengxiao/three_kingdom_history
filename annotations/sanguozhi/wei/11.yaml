  text: 《先賢行狀》曰：烈通識達道，秉義不回。以潁川陳太丘為師，二子為友。時潁川荀慈明、賈偉節、李元禮、韓元長皆就陳君學，見烈器業過人，歎服所履，亦與相親。由是英名著於海內。道成德立，還歸舊廬，遂遭父喪，泣淚三年。遇歲饑饉，路有餓殍，烈乃分釜庚之儲，以救邑里之命。是以宗族稱孝，鄉黨歸仁。以典籍娛心，育人為務，遂建學校，敦崇庠序。其誘人也，皆不因其性氣，誨之以道，使之從善遠惡。益者不自覺，而大化隆行，皆成寶器。門人出入，容止可觀，時在市井，行步有異，人皆別之。州閭成風，咸競為善。時國中有盜牛者，牛主得之。盜者曰：「我邂逅迷惑，從今已後將為改過。子旣已赦宥，幸無使王烈聞之。」人有以告烈者，烈以布一端遺之。或問：「此人旣為盜，畏君聞之，反與之布，何也？」烈曰：「昔秦穆公，人盜其駿馬食之，乃賜之酒。盜者不愛其死，以救穆公之難。今此盜人能悔其過，懼吾聞之，是知恥惡。知恥惡，則善心將生，故與布勸為善也。」間年之中，行路老父擔重，人代擔行數十里，欲至家，置而去，問姓名，不以告。頃之，老父復行，失劒於路。有人行而遇之，欲置而去，懼後人得之，劒主於是永失，欲取而購募，或恐差錯，遂守之。至暮，劒主還見之，前者代擔人也。老父擥其袂，問曰：「子前者代吾擔，不得姓名，今子復守吾劒于路，未有若子之仁，請子告吾姓名，吾將以告王烈。」乃語之而去。老父以告烈，烈曰：「世有仁人，吾未之見。」遂使人推之，乃昔時盜牛人也。烈歎曰：「韶樂九成，虞賔以和：人能有感，乃至於斯也！」遂使國人表其閭而異之。時人或訟曲直，將質於烈，或至塗而反，或望廬而還，皆相推以直，不敢使烈聞之。時國主皆親驂乘適烈私館，疇諮政令。察孝廉，三府並辟，皆不就。會董卓作亂，避地遼東，躬秉農器，編於四民，布衣蔬食，不改其樂。東域之人，奉之若君。時衰世弊，識真者少，朋黨之人，互相讒謗。自避世在東國者，多為人所害，烈居之歷年，未甞有患。使遼東彊不淩弱，衆不暴寡，商賈之人，市不二價。太祖累徵召，遼東為解而不遣。以建安二十三年寢疾，年七十八而終。
