  text: 融集有融荅脩教曰：「原之賢也，吾已知之矣。昔高陽氏有才子八人，堯不能用，舜實舉之。原可謂不患無位之士。以遺後賢，不亦可乎！」脩重辭，融荅曰：「掾清身絜己，歷試諸難，謀而鮮過，惠訓不倦。余嘉乃勳，應乃懿德，用升爾于王庭，其可辭乎！」
