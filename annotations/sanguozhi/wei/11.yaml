  text: 《傅子》曰：太祖旣誅袁譚，梟其首，令曰：「敢哭之者戮及妻子。」於是王叔治、田子泰相謂曰：「生受辟命，亡而不哭，非義也。畏死忘義，何以立世？」遂造其首而哭之，哀動三軍。軍正白行其戮，太祖曰：「義士也。」赦之。臣松之案《田疇傳》，疇為袁尚所辟，不被譚命。傅子合而言之，有違事實。
