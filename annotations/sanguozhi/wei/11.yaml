- id: wei.11.p15.a2
  anchor: wei.11.p15
  at: 545
  length: 0
  type: pei
  text: 《魏書》載太祖令曰：「昔伯成棄國，夏后不奪，將欲使高尚之士，優賢之主，不止於一世也。其聽疇所執。」
