  text: 案《庾氏譜》：嶷字劭然，頴川人。子䨹字玄默，晉尚書、陽翟子。嶷弟遁，字德先，太中大夫。遁胤嗣克昌，為世盛門。侍中峻、河南尹純，皆遁之子，豫州牧長史顗，遁之孫，太尉文康公亮、司空冰皆遁之曾孫，貴達至今。
- id: wei.11.p36.a4
  anchor: wei.11.p36
  at: 304
  length: 0
  type: pei
  text: 《文士傳》曰：楨字元幹，廬江人，有文學器幹，容貌甚偉。歷幽州刺史、廷尉，入晉為尚書光祿大夫。楨子龕，後將軍；勗，車騎將軍；惲，豫州刺史；其餘多至大官。自後累世昌阜，司空文穆公充，惲之孫也，貴達至今。
- id: wei.11.p36.a5
  anchor: wei.11.p36
  at: 343
  length: 0
  type: pei
  text: 《高士傳》曰：朝廷以戎車未息，徵命之事，且須後之，昭以故不即徵。後顗、休復與庾嶷薦昭，有詔訪於本州評議。侍中韋誕駮曰：「禮賢徵士，王政之所重也，古者考行於鄉。今顗等位皆常伯納言，嶷為卿佐，足以取信。附下罔上，忠臣之所不行也。昭宿德耆艾，遺逸山林，誠宜加異。」乃從誕議也。
