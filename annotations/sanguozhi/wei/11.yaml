- id: wei.11.p16.a3
  anchor: wei.11.p16
  at: 237
  length: 0
  type: pei
  text: 《魏書》載世子議曰：「昔薳敖逃祿，傳載其美，所以激濁世，勵貪夫，賢於尸祿素餐飡之人也。故可得而小，不可得而毀。至於田疇，方斯近矣。免官加刑，於法為重。」《魏略》載教曰：「昔夷、齊棄爵而譏武王，可謂愚闇，孔子猶以為『求仁得仁』。疇之所守，雖不合道，但欲清高耳。使天下悉如疇志，即墨翟兼愛尚同之事，而老聃使民結繩之道也。外議欲為復使令司隷決之。」魏書載荀彧議，以為「君子之道，或出或處，期於為善而已。故匹夫守志，聖人各因而成之」。鍾繇以為「原思辭粟，仲尼不與，子路拒牛，謂之止善，雖可以激清勵濁，猶不足多也。疇雖不合大義，有益推讓之風，宜如世子議。」臣松之案《呂氏春秋》：「魯國之法，魯人有為臣妾於諸侯，有能贖之者取其金於府。子貢贖人而辭不受金，孔子曰：『賜失之矣。自今以來魯人不贖矣。』子路拯溺者，其人拜之以牛，子路受之。孔子曰：『魯人必拯溺矣。』」案此語不與繇所引者相應，未詳為繇之事誤邪，而事將別有所出？
