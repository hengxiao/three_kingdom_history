  text: 荀綽《冀州記》曰：鉅鹿張貔，字邵虎。祖父泰，字伯陽，有名於魏。父邈，字叔遼，遼東太守。著名自然好學論，在嵇康集。為人弘深有遠識，恢恢然，使求之者莫之能測也。宦歷二宮，元康初為城陽太守，未行而卒。
