- id: wei.11.p16.a1
  anchor: wei.11.p16
  at: 39
  length: 0
  type: pei
  text: 臣松之以為田疇不應袁紹父子之命，以其非正也。故盡規魏祖，建盧龍之策。致使袁尚奔迸，授首遼東，皆疇之由也。旣已明其為賊，胡為復弔祭其首乎？若以甞被辟命，義在其中，則不應為人設謀，使其至此也。疇此舉止，良為進退無當，與王脩哭袁譚，貌同而心異也。
