  type: pei
  text: 《漢晉春秋》曰：文欽曰：「蔣班、焦彝謂我不能出而走，全端、全懌又率眾逆降，此敵無備之時也，可以戰矣。」誕及唐咨等皆以為然，遂共悉眾出攻。
- id: wei.28.p20.a2
  anchor: wei.28.p20
  at: 408
  length: 0
  type: pei
  text: 干寶《晉紀》曰：數百人拱手為列，每斬一人，輒降之，竟不變，至盡，時人比之田橫。吳將於詮曰：「大丈夫受命其主，以兵救人，既不能克，又束手於敵，吾弗取也。」乃免冑冒陳而死。
- id: wei.28.p21.a1
  anchor: wei.28.p21
  at: 120
  length: 0
  type: pei
  text: 干寶《晉紀》曰：初，壽春每歲雨潦，淮水溢，常淹城邑。故文王之築圍也，誕笑之曰：「是固不攻而自敗也。」及大軍之攻，亢旱逾年。城既陷，是日大雨，圍壘皆毀。誕子靚，字仲思，吳平還晉。靚子恢，字道明，位至尚書令，追贈左光祿大夫開府。
- id: wei.28.p22.a1
  anchor: wei.28.p22
  at: 79
  length: 0
  type: pei
  text: 《傅子》曰：宋建椎牛禱賽，終自焚滅。文欽日祠祭事天，斬於人手。諸葛誕夫婦聚會神巫，淫祀求福，伏尸淮南，舉族誅夷。此天下所共見，足為明鑑也。
- id: wei.28.p22.a2
  anchor: wei.28.p22
  at: 156
  length: 0
  type: pei
  text: 習鑿齒曰：自是天下畏威懷德矣。君子謂司馬大將軍於是役也，可謂能以德攻矣。夫建業者異矣，各有所尚，而不能兼併也。故窮武之雄斃於不仁，存義之國喪於懦退，今一征而禽三叛，大虜吳眾，席捲淮浦，俘馘十萬，可謂壯矣。而未及安坐，喪王基之功，種惠吳人，結異類之情，寵鴦葬欽，忘疇昔之隙，不咎誕眾，使揚士懷愧，功高而人樂其成，業廣而敵懷其德，武昭既敷，文算又洽，推此道也，天下其孰能當之哉？喪王基，語在《基傳》。◎鴦一名俶。《晉諸公贊》曰，俶後為將軍，破涼州虜，名聞天下。太康中為東夷校尉、假節。當之職，入辭武帝，帝見而惡之，託以他事免俶官。東安公繇，諸葛誕外孫，欲殺俶，因誅楊駿，誣俶謀逆，遂夷三族。
- id: wei.28.p23.a1
  anchor: wei.28.p23
  at: 185
  length: 0
  type: pei
  text: 《世語》曰：鄧艾少為襄城典農部民，與石苞皆年十二三。謁者陽翟郭玄信，武帝監軍郭誕元奕之子。建安中，少府吉本起兵許都，玄信坐被刑在家，從典農司馬求人禦，以艾、苞與禦，行十餘里，與語，悅之，謂二人皆當遠至為佐相。艾後為典農功曹，奉使詣宣王，由此見知，遂被拔擢。
