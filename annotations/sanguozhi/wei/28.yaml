  type: pei
  text: 《世語》曰：司馬文王既秉朝政，長史賈充以為宜遣參佐慰勞四征，於是遣充至壽春。充還啟文王：「誕再在揚州，有威名，民望所歸。今徵，必不來，禍小事淺；不徵，事遲禍大。」乃以為司空。書至，誕曰：「我作公當在王文舒後，今便為司空！不遣使者，健步齎書，使以兵付樂綝，此必綝所為。」乃將左右數百人至揚州，揚州人欲閉門，誕叱曰：「卿非我故吏邪！」徑入，綝逃上樓，就斬之。魏末傳曰：賈充與誕相見，談說時事，因謂誕曰：「洛中諸賢，皆原禪代，君所知也。君以為云何？」誕厲色曰：「卿非賈豫州子？世受魏恩，如何負國，欲以魏室輸人乎？非吾所忍聞。若洛中有難，吾當死之。」充默然。誕既被徵，請諸牙門置酒飲宴，呼牙門從兵，皆賜酒令醉，謂眾人曰：「前作千人鎧仗始成，欲以擊賊，今當還洛，不復得用，欲蹔出，將見人遊戲，須臾還耳；諸君且止。」乃嚴鼓將士七百人出。樂綝聞之，閉州門。誕歷南門宣言曰：「當還洛邑，蹔出遊戲，揚州何為閉門見備？」前至東門，東門复閉，乃使兵緣城攻門，州人悉走，因風放火，焚其府庫，遂殺綝。誕表曰：「臣受國重任，統兵在東。揚州刺史樂綝專詐，說臣與吳交通，又言被詔當代臣位，無狀日久。臣奉國命，以死自立，終無異端。忿綝不忠，輒將步騎七百人，以今月六日討綝，即日斬首，函頭驛馬傳送。若聖朝明臣，臣即魏臣；不明臣，臣即吳臣。不勝發憤有日，謹拜表陳愚，悲感泣血，哽咽斷絕，不知所如，乞朝廷察臣至誠。」臣松之以為魏末傳所言，率皆鄙陋。疑誕表言曲，不至於此也。
- id: wei.28.p18.a3
  anchor: wei.28.p18
  at: 219
  length: 0
  type: pei
  text: 《世語》曰：黃初末，吳人髮長沙王吳芮塚，以其塼於臨湘為孫堅立廟。芮容貌如生，衣服不朽。後豫發者見吳綱曰：「君何類長沙王吳芮，但微短耳。」綱瞿然曰；「是先祖也，君何由見之？」見者言所由，綱曰：「更葬否？」答曰：「即更葬矣。」自芮之卒年至塚發，四百餘年，綱，芮之十六世孫矣。
