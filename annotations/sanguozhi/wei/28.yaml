  text: 《魏略》曰：凌聞東平民浩詳知星，呼問詳。詳疑凌有所挾，欲悅其意，不言吳當有死喪，而言淮南楚分也，今吳、楚同佔，當有王者興。故凌計遂定。
- id: wei.28.p5.a2
  anchor: wei.28.p5
  at: 218
  length: 0
  type: pei
  text: 《魏略》載凌與太傅書曰：「卒聞神軍密發，巳在百尺，雖知命窮盡，遲於相見，身首分離，不以為恨，前後遣使，有書未得還報，企踵西望，無物以譬。昨遣書之後，便乘船來相迎宿丘頭，旦發於浦口，奉被露布赦書，又得二十三日況，累紙誨示，聞命驚愕，五內失守，不知何地可以自處？僕久忝朝恩，歷試無效，統御戎馬，董齊東夏，事有闕廢，中心犯義，罪在三百，妻子同縣，無所禱矣。不圖聖恩天覆地載，橫蒙視息，复睹日月。亡甥令狐愚攜惑群小之言，僕即時呵抑，使不得竟其語。既人已知，神明所鑑，夫非事無陰，卒至發露，知此梟夷之罪也。生我者父母，活我者子也。」又重曰：「身陷刑罪，謬蒙赦宥。今遣掾送印綬，頃至，當如詔書自縛歸命。雖足下私之，官法有分。」及到，如書。太傅使人解其縛。凌既蒙赦，加怙舊好，不復自疑，徑乘小船自趣太傅。太傅使人逆止之，住船淮中，相去十餘丈。凌知見外，乃遙謂太傅曰：「卿直以折簡召我，我當敢不至邪？而乃引軍來乎！」太傅曰：「以卿非肯逐折簡者故也。」凌曰：「卿負我！」太傅曰：「我寧負卿，不負國家。」遂使人送來西。凌自知罪重，試索棺釘，以觀太傅意，太傅給之。凌行到項，夜呼掾屬與決曰：「行年八十，身名並滅邪！」遂自殺。干寶《晉紀》曰：凌到項，見賈逵祠在水側，凌呼曰：「賈梁道，王凌固忠於魏之社稷者，唯爾有神，知之。」其年八月，太傅有疾，夢凌、逵為癘，甚惡之，遂薨。
- id: wei.28.p6.a1
