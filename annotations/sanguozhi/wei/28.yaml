  type: pei
  text: 袁子曰：諸葛亮，重人也，而驟用蜀兵，此知小國弱民難以久存也。今國家一舉而滅蜀，自征伐之功，未有如此之速者也。方鄧艾以萬人入江由之危險，鍾會以二十萬眾留劍閣而不得進，三軍之士已飢，艾雖戰勝克將，使劉禪數日不降，則二將之軍難以反矣。故功業如此之難也。國家前有壽春之役，後有滅蜀之勞，百姓貧而倉禀虛，故小國之慮，在於時立功以自存，大國之慮，在於既勝而力竭，成功之後，戒懼之時也。
