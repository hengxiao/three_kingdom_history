  type: pei
  text: 按咸熙元年〈百官名〉：邵悌字元伯，陽平人。《漢晉春秋》曰：文王聞鍾會功曹向雄之收葬會也，召而責之曰：「往者王經之死，卿哭於東市而我不問，今鍾會躬為叛逆而又輒收葬，若復相容，其如王法何！」雄曰：「昔先王掩骼埋胔，仁流朽骨，當時豈先卜其功罪而後收葬哉？今王誅既加，於法已備，雄感義收葬，教亦無闕。法立於上，教弘於下，以此訓物，雄曰可矣！何必使雄背死違生，以立於時。殿下讎對枯骨，捐之中野，百歲之後，為臧獲所笑，豈仁賢所掩哉？」王悅，與宴談而遣之。習鑿齒曰：向伯茂可謂勇於蹈義也，哭王經而哀感市人，葬鍾會而義動明主，彼皆忠烈奮勁，知死而往，非存生也。況使經、會處世，或身在急難，而有不赴者乎？故尋其奉死之心，可以見事生之情，覽其忠貞之節，足以愧背義之士矣。王加禮而遣，可謂明達。
