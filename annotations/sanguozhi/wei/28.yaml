  text: 弼字輔嗣。何劭為其傳曰：弼幼而察慧，年十餘，好老氏，通辯能言。父業，為尚書郎。時裴徽為吏部郎，弼未弱冠，往造焉。徽一見而異之，問弼曰：「夫無者誠萬物之所資也，然聖人莫肯致言，而老子申之無已者何？」弼曰：「聖人體無，無又不可以訓，故不說也。老子是有者也，故恆言無所不足。」尋亦為傅嘏所知。於時何晏為吏部尚書，甚奇弼，嘆之曰：「仲尼稱後生可畏，若斯人者，可與言天人之際乎！」正始中，黃門侍郎累缺。晏既用賈充、裴秀、朱整，又議用弼。時丁謐與晏爭衡，致高邑王黎於曹爽，爽用黎。於是以弼補臺郎。初除，覲爽，請間，爽為屏左右，而弼與論道，移時無所他及，爽以此嗤之。時爽專朝政，黨與共相進用，弼通俊不治名高。尋黎無幾時病亡，爽用王沈代黎，弼遂不得在門下，晏為之嘆恨。弼在臺既淺，事功亦雅非所長，益不留意焉。淮南人劉陶善論縱橫，為當時所推。每與弼語，常屈弼。弼天才卓出，當其所得，莫能奪也。性和理，樂遊宴，解音律，善投壺。其論道傅會文辭，不如何晏，自然有所拔得，多晏也，頗以所長笑人，故時為士君子所疾。弼與鍾會善，會論議以校練為家，然每服弼之高致。何晏以為聖人無喜怒哀樂，其論甚精，鍾會等述之。弼與不同，以為聖人茂於人者神明也，同於人者五情也，神明茂故能體沖和以通無，五情同故不能無哀樂以應物，然則聖人之情，應物而無累於物者也。今以其無累，便謂不復應物，失之多矣。弼注易，潁川人荀融難弼大衍義。弼答其意，白書以戲之曰：「夫明足以尋極幽微，而不能去自然之性。顏子之量，孔父之所預在，然遇之不能無樂，喪之不能無哀。又常狹斯人，以為未能以情從理者也，而今乃知自然之不可革。足下之量，雖已定乎胸懷之內，然而隔逾旬朔，何其相思之多乎？故知尼父之於顏子，可以無大過矣。」弼注《老子》，為之指略，致有理統。著道略論，注《易》，往往有高麗言。太原王濟好談，病老、莊，常云：「見弼《易》注，所悟者多。」然弼為人淺而不識物情，初與王黎、荀融善，黎奪其黃門郎，於是恨黎，與融亦不終。正始十年，曹爽廢，以公事免。其秋遇癘疾亡，時年二十四，無子絕嗣。弼之卒也，晉景王聞之，嗟嘆者累日，其為高識所惜如此。孫盛曰：易之為書，窮神知化，非天下之至精，其孰能與於此？世之註解，殆皆妄也。況弼以傅會之辨而欲籠統玄旨者乎？故其敘浮義則麗辭溢目，造陰陽則妙頤無聞，至於六爻變化，群象所效，日時歲月，五氣相推，弼皆擯落，多所不關。雖有可觀者焉，恐將泥夫大道。《博物記》曰：初，王粲與族兄凱俱避地荊州，劉表欲以女妻粲，而嫌其形陋而用率，以凱有風貌，乃以妻凱。凱生業，業即劉表外孫也。蔡邕有書近萬卷，末年載數車與粲，粲亡後，相國掾魏諷謀反，粲子與焉，既被誅，邕所與書悉入業。業字長緒，位至謁者僕射。子宏字正宗，司隸校尉。宏，弼之兄也。《魏氏春秋》曰：文帝既誅粲二子，以業嗣粲。
