  text: 荀綽《冀州記》曰：邵起自幹吏，位至衛尉。長子翰，河東太守。中子敞，大司農。少子倩，字君幼，寬厚有器局，勤於當世，歷位冀州刺史、太子右衛率。翰子俞，字世都，清貞貴素，辯於論議，採公孫龍之辭以談微理。少有能名，辟太尉府，稍歷顯位，至侍中中書令，遷為監。臣松之按：蹇彖辭云「蹇利西南，往得中也」，不云「有功」；下云「利見大人，往有功也」。
