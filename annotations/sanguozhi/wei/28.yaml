  type: pei
  text: 《世語》曰：咸寧中，積射將軍樊震為西戎牙門，得見辭，武帝問震所由進，震自陳曾為鄧艾伐蜀時帳下將，帝遂尋問艾，震具申艾之忠，言之流涕。先是以艾孫朗為丹水令，由此遷為定陵令。次孫千秋有時望，光祿大夫王戎辟為掾。永嘉中，朗為新都太守，未之官，在襄陽失火，朗及母妻子舉室燒死，惟子韜子行得免。千秋先卒，二子亦燒死。
