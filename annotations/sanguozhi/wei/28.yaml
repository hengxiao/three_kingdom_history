  at: 315
  length: 0
  type: pei
  text: 欽與郭淮書曰：「大將軍昭伯與太傅（伯）俱受顧命，登床把臂，託付天下，此遠近所知。後以勢利，乃絕其祀，及其親黨，皆一時之俊，可為痛心，奈何奈何！公侯恃與大司馬公恩親分著，義貫金石，當此之時，想益毒痛，有不可堪也。王太尉嫌其專朝，潛欲舉兵，事竟不捷，复受誅夷，害及楚王，想甚追恨。太傅既亡，然其子師繼承父業，肆其虐暴，日月滋甚，放主弒後，殘戮忠良，包藏禍心，遂至篡弒。此可忍也，孰不可忍？欽以名義大故，事君有節，忠憤內發，忘寢與食，無所吝顧也。會毌丘子邦自與父書，騰說公侯，盡事主之義，欲奮白髮，同符太公，惟須東問，影響相應，聞問之日，能不慷慨！是以不顧妻孥之痛，即與毌丘鎮東舉義兵三萬餘人，西趨京師，欲扶持王室，掃除奸逆，企踵西望，不得聲問，魯望高子，不足喻急。夫當仁不讓，況救君之難，度道遠艱，故不果期要耳。然同舟共濟，安危勢同，禍痛已連，非言飾所解，自公侯所明也。共事曹氏，積信魏朝，行道之人，皆所知見。然在朝之士，冒利偷生，烈士所恥，公侯所賤，賈豎所不忍為也，況當塗之士邪？軍屯住項，小人以閏月十六日別進兵，就於樂嘉城討師，師之徒眾，尋時崩潰，其所斬截，不復訾原，但當長驅徑至京師，而流言先至，毌丘不復詳之，更謂小人為誤，諸軍便爾瓦解。毌丘還走，追尋釋解，無所及。小人還項，复遇王基等十二軍，追尋毌丘，進兵討之，即時克破，所向全勝，要那後無繼何？孤軍梁昌，進退失所，還據壽春，壽春复走，狼狽躓閡，無復他計，惟當歸命大吳，借兵乞食，繼踵伍員耳。不若僕隸，如何快心，复君之仇，永使曹氏少享血食，此亦大國之所祐念也。想公侯不使程嬰、臼擅名於前代，而使大魏獨無鷹揚之士與？今大吳敦崇大義，深見愍悼。然僕於國大分連接，遠同一勢，日欲俱舉，瓜分中國，不原偏取以為己有。公侯必欲共忍帥胸懷，宜廣大勢，恐秦川之卒不可孤舉。今者之計，宜屈己伸人，託命歸漢，東西俱舉爾，乃可克定師黨耳。深思鄙言，若愚計可從，宜使漢軍克制期要，使六合校考，與周、召同封，以託付兒孫。此亦非小事也，大丈夫寧處其落落，是以遠呈忠心，時望嘉應。」時郭淮已卒，欽未知，故有此書。《世語》曰：毌丘儉之誅，黨與七百餘人，傳侍御史杜友治獄，惟舉首事十人，餘皆奏散。友字季子，東郡人，仕晉冀州刺史、河南尹。子默，字世玄，歷吏部郎，衛尉。
- id: wei.28.p13.a1
  anchor: wei.28.p13
  at: 41
  length: 0
  type: pei
  text: 《世語》曰：甸字子邦，有名京邑。齊王之廢也，甸謂儉曰：「大人居方獄重任，國傾覆而晏然自守，將受四海之責。」儉然之。大將軍惡其為人也。及儉起兵，問屈𩑺所在，云不來無能為也。儉初起兵，遣子宗四人入吳。太康中，吳平，宗兄弟皆還中國。宗字子仁，有儉風，至零陵太守。宗子奧，巴東監軍、益州刺史。習鑿齒曰：毌丘儉感明帝之顧命，故為此役。君子謂毌丘儉事雖不成，可謂忠臣矣。夫竭節而赴義者我也，成之與敗者時也，我苟無時，成何可必乎？忘我而不自必，乃所以為忠也。古人有言：「死者復生，生者不愧。」若毌丘儉可謂不愧也。
- id: wei.28.p14.a1
  anchor: wei.28.p14
  at: 28
  length: 0
  type: pei
  text: 欽〈降吳表〉曰：「禀命不幸，常隸魏國，兩絕於天。雖側伏隅都，自知無路。司馬師滔天作逆，廢害二主，辛、癸、高、莽，惡不足喻。欽累世受魏恩，烏鳥之情，竊懷憤踴，在三之義，期於弊僕。前與毌丘儉、郭淮等俱舉義兵，當共討師，掃除凶孽，誠臣慺慺愚管所執。智慮淺薄，微節不騁，進無所依，悲痛切心。退惟不能扶翼本朝，抱愧俯仰，靡所自厝。冒緣古義，固有所歸，庶假天威，得展萬一，僵仆之日，亦所不恨。輒相率將，歸命聖化，慚偷苟生，非辭所陳。謹上還所受魏使持節、前將軍、山桑侯印綬。臨表惶惑，伏須罪誅。」《魏書》曰：欽字仲若，譙郡人。父稷，建安中為騎將，有勇力。欽少以名將子，材武見稱。魏諷反，欽坐與諷辭語相連，及下獄，掠笞數百，當死，太祖以稷故赦之。太和中，為五營校督，出為牙門將。欽性剛暴無禮，所在倨傲陵上，不奉官法，輒見奏遣，明帝抑之。後復以為淮南牙門將，轉為廬江太守、鷹揚將軍。王凌奏欽貪殘，不宜撫邊，求免官治罪，由是徵欽還。曹爽以欽鄉里，厚養待之，不治欽事。復遣還廬江，加冠軍將軍，貴寵逾前。欽以故益驕，好自矜伐，以壯勇高人，頗得虛名於三軍。曹爽誅後，進欽為前將軍以安其心，後代諸葛誕為揚州刺史。自曹爽之誅，欽常內懼，與諸葛誕相惡，無所與謀。會誕去兵，毌丘儉往，乃陰共結謀。戰敗走，晝夜間行，追者不及，遂得入吳，孫峻厚待之。欽雖在他國，不能屈節下人，自呂據、朱異等諸大將皆憎疾之，惟峻常左右之。
- id: wei.28.p15.a1
  anchor: wei.28.p15
  at: 29
  length: 0
  type: pei
  text: 《魏氏春秋》曰：誕為郎，與僕射杜畿試船陶河，遭風覆沒，誕亦俱溺。虎賁浮河救誕，誕曰：「先救杜侯。」誕飄於岸，絕而復蘇。
- id: wei.28.p15.a2
  anchor: wei.28.p15
  at: 137
  length: 0
  type: pei
  text: 《世語》曰：是時，當世俊士散騎常侍夏侯玄、尚書諸葛誕、鄧颺之徒，共相題表，以玄、疇四人為四聰，誕、備八人為八達，中書監劉放子熙、孫資子密、吏部尚書衛臻子烈三人，咸不及比，以父居勢位，容之為三豫，凡十五人。帝以構長浮華，皆免官廢錮。
- id: wei.28.p18.a1
  anchor: wei.28.p18
  at: 54
  length: 0
  type: pei
  text: 《魏書》曰：誕賞賜過度。有犯死者，虧制以活之。
