  type: pei
  text: 儉、欽等表曰：「故相國懿，匡輔魏室，歷事忠貞，故烈祖明皇帝授以寄託之任。懿戮力盡節，以寧華夏。又以齊王聰明，無有穢德，乃心勤盡忠以輔上，天下賴之。懿欲討滅二虜以安宇內，始分軍糧，克時同舉，未成而薨。齊王以懿有輔己大功，故遂使師承統懿業，委以大事。而師以盛年在職，無疾託病，坐擁強兵，無有臣禮，朝臣非之，義士譏之，天下所聞，其罪一也。懿造計取賊，多舂軍糧，剋期有日。師為大臣，當除國難，又為人子，當卒父業。哀聲未絕而便罷息，為臣不忠，為子不孝，其罪二也。賊退過東關，坐自起眾，三征同進，喪眾敗績，歷年軍實，一旦而盡，致使賊來，天下騷動，死傷流離，其罪三也。賊舉國悉眾，號五十萬，來向壽春，圖詣洛陽，會太尉孚與臣等建計，乃杜塞要險，不與爭鋒，還固新城。淮南將士，衝鋒履刃，晝夜相守，勤瘁百日，死者塗地，自魏有軍已來，為難苦甚，莫過於此。而師遂意自由，不論封賞，權勢自在，無所領錄，其罪四也。故中書令李豐等，以師無人臣節，欲議退之。師知而請豐，其夕拉殺，載屍埋棺。豐等為大臣，帝王腹心，擅加酷暴，死無罪名，師有無君之心，其罪五也。懿每嘆說齊王自堪人主，君臣之義定。奉事以來十有五載，始欲歸政，按行武庫，詔問禁兵不得妄出。師自知姦慝，人神所不祐，矯廢君主，加之以罪。孚，師之叔父，性甚仁孝，追送齊王，悲不自勝。群臣皆怒而師懷忍，不顧大義，其罪六也。又故光祿大夫張緝，無罪而誅，夷其妻子，並及母后，逼恐至尊，強催督遣，臨時哀愕，莫不傷痛；而師稱慶，反以歡喜，其罪七也。陛下踐阼，聰明神武，事經聖心，欲崇省約，天下聞之，莫不歡慶；而師不自改悔脩复臣禮，而方徵兵募士，毀壞宮內，列侯自衛。陛下即阼，初不朝覲。陛下欲臨幸師舍以省其疾，复拒不通，不奉法度，其罪八也。近者領軍許允當為鎮北，以廚錢給賜，而師舉奏加辟，雖云流徙，道路餓殺，天下聞之，莫不哀傷，其罪九也。三方之守，一朝闕廢，多選精兵，以自營衛，五營領兵，闕而不補，多載器杖，充聚本營，天下所聞，人懷憤怨，訛言盈路，以疑海內，其罪十也。多休守兵，以佔高第，以空虛四表，欲擅強勢，以逞姦心，募取屯田，加其復賞，阻兵安忍，壞亂舊法。合聚諸籓王公以著鄴，欲悉誅之，一旦舉事廢主。天不長惡，使目腫不成，其罪十一也。臣等先人皆隨從太祖武皇帝征討凶暴，獲成大功，與高祖文皇帝即受漢禪，開國承家，猶堯舜相傳也。臣與安豐護軍鄭翼、廬江護軍呂宣、太守張休、淮南太守丁尊、督合肥護軍王休等議，各以累世受恩，千載風塵，思盡軀命，以完全社稷安主為效。斯義苟立，雖焚妻子，吞炭漆身，死而不恨也。按師之罪，宜加大辟，以彰姦慝。春秋之義，一世為善，一世宥之。懿有大功，海內所書，依古典議，廢師以侯就弟。弟昭，忠肅寬明，樂善好士，有高世君子之度，忠誠為國，不與師同。臣等碎首所保，可以代師輔導聖躬。太尉孚，忠孝小心，所宜親寵，授以保傅。護軍散騎常侍望，忠公親事，當官稱能，遠迎乘輿，有宿衛之功，可為中領軍。春秋之義，大義滅親，故周公誅弟，石碏戮子，季友鴆兄，上為國計，下全宗族。殛鯀用禹，聖人明典，古今所稱。乞陛下下臣等所奏，朝堂博議。臣言當道，使師遜位避賢者，罷兵去備，如三皇舊法，則天下協同。若師負勢恃眾不自退者，臣等率將所領，晝夜兼行，惟命是授。臣等今日所奏，惟欲使大魏永存，使陛下得行君意，遠絕亡之禍，百姓安全，六合一體，使忠臣義士，不愧於三皇五帝耳。臣恐兵起，天下擾亂，臣輒上事，移三征及州郡國典農，各安慰所部吏民，不得妄動，謹具以狀聞。惟陛下愛養精神，明慮危害，以寧海內。師專權用勢，賞罰自由，聞臣等舉眾，必下詔禁絕關津，使驛書不通，擅复徵調，有所收捕。此乃師詔，非陛下詔書，在所皆不得復承用。臣等道遠，懼文書不得皆通，輒臨時賞罰，以便宜從事，須定表上也。」
