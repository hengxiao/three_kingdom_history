  text: 《世語》曰：初，荊州刺史裴潛以泰為從事，司馬宣王鎮宛，潛數遣詣宣王，由此為宣王所知。及征孟達，泰又導軍，遂辟泰。泰頻喪考、妣、祖，九年居喪，宣王留缺待之，至三十六日，擢為新城太守。宣王為泰會，使尚書鍾繇調泰：「君釋褐登宰府，三十六日擁麾蓋，守兵馬郡；乞兒乘小車，一何駛乎？」泰曰：「誠有此。君，名公之子，少有文采，故守吏職；獼猴騎土牛，又何遲也！」眾賓咸悅。後歷兗、豫州刺史，所在有籌算績效。
- id: wei.28.p46.a1
  anchor: wei.28.p46
  at: 25
  length: 0
  type: pei
  text: 會為其母傳曰：「夫人張氏，字昌蒲，太原茲氏人，太傅定陵成侯之命婦也。世長吏二千石。夫人少喪父母，充成侯家，修身正行，非禮不動，為上下所稱述。貴妾孫氏，攝嫡專家，心害其賢，數讒毀無所不至。孫氏辨博有智巧，言足以飾非成過，然竟不能傷也。及妊娠，愈更嫉妒，乃置藥食中，夫人中食，覺而吐之，瞑眩者數日。或曰：『何不向公言之？』答曰：『嫡庶相害，破家危國，古今以為鑑誡。假如公信我，眾誰能明其事？彼以心度我，謂我必言，固將先我；事由彼發，顧不快耶！』遂稱疾不見。孫氏果謂成侯曰：『妾欲其得男，故飲以得男之藥，反謂毒之！』成侯曰：『得男藥佳事，闇於食中與人，非人情也。』遂訊侍者俱服，孫氏由是得罪出。成侯問夫人何能不言，夫人言其故，成侯大驚，益以此賢之。黃初六年，生會，恩寵愈隆。成侯既出孫氏，更納正嫡賈氏。」臣松之按：鍾繇於時老矣，而方納正室。蓋禮所云「宗子雖七十，無無主婦」之義也。《魏氏春秋》曰：會母見寵於繇，繇為之出其夫人。卞太后以為言，文帝詔繇復之。繇恚憤，將引鴆，弗獲，餐椒致噤，帝乃止。
- id: wei.28.p47.a1
  anchor: wei.28.p47
  at: 18
  length: 0
  type: pei
  text: 《世語》曰：司馬景王命中書令虞松作表，再呈輒不可意，命松更定。以經時，松思竭不能改，心苦之，形於顏色。會察其有憂，問松，松以實答。會取視，為定五字。松悅服，以呈景王，王曰：「不當爾邪，誰所定也？」松曰：「鍾會。向亦欲啟之，會公見問，不敢饕其能。」王曰：「如此，可大用，可令來。」會問松王所能，松曰：「博學明識，無所不貫。」會乃絕賓客，精思十日，平旦入見，至鼓二乃出。出後，王獨拊手嘆息曰：「此真王佐材也！」松字叔茂，陳留人，九江太守邊讓外孫。松弱冠有才，從司馬宣王征遼東，宣王命作檄，及破賊，作露布。松從還，宣王辟為掾，時年二十四，遷中書郎，遂至太守。松子濬，字顯弘，晉廷尉。臣松之以為鍾會名公之子，聲譽夙著，弱冠登朝，已歷顯位，景王為相，何容不悉，而方於定虞松表然後乃蒙接引乎？設使先不相識，但見五字而便知可大用，雖聖人其猶病諸，而況景王哉？
