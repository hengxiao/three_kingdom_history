  type: pei
  text: 《魏略》載：山陽單固，字恭夏，為人有器實。正始中，兗州刺史令狐愚與固父伯龍善，辟固，欲以為別駕。固不樂為州吏，辭以疾。愚禮意愈厚，固不欲應。固母夏侯氏謂固曰：「使君與汝父久善，故命汝不止，汝亦故當仕進，自可往耳。」固不獲已，遂往，與兼治中從事楊康並為愚腹心。後愚與王凌通謀，康、固皆知其計。會愚病，康應司徒召詣洛陽，固亦以疾解祿。康在京師露其事，太傅乃東取王凌。到壽春，固見太傅，太傅問曰：「卿知其事為邪？」固對不知。太傅曰：「且置近事。問卿，令狐反乎？」固又曰無。而楊康白，事事與固連。遂收捕固及家屬，皆係廷尉，考實數十，固故云無有。太傅錄楊康，與固對相詰。固辭窮，乃罵康曰：「老庸既負使君，又滅我族，顧汝當活邪！」辭定，事上，須報廷尉，以舊皆聽得與其母妻子相見。固見其母，不仰視，其母知其慚也，字謂之曰：「恭夏，汝本自不欲應州郡也，我強故耳。汝為人吏，自當爾耳。此自門戶衰，我無恨也。汝本意與我語。」固終不仰，又不語，以至於死。初，楊康自以白其事，冀得封拜，後以辭頗參錯，亦並斬。臨刑，俱出獄，固又罵康曰：「老奴，汝死自分耳。若令死者有知，汝何面目以行地下也。」
