  type: pei
  text: 《魏氏春秋》曰：廣字公淵。弟飛梟、金虎，並才武過人。太傅嘗從容問蔣濟，濟曰：「凌文武俱贍，當今無雙。廣等志力，有美於父耳。」退而悔之，告所親曰：「吾此言，滅人門宗矣。」《魏末傳》曰：凌少子字明山，最知名，善書，多技藝，人得其書，皆以為法。走向太原，追軍及之，時有飛鳥集桑樹，隨枝低卬，舉弓射之即倒，追人乃止不復進。明山投親家食，親家告吏，乃就執之。
- id: wei.28.p7.a1
  anchor: wei.28.p7
  at: 62
  length: 0
  type: pei
  text: 魏名臣奏載雍州刺史張既表曰：「河右遐遠，喪亂彌久，武威當諸郡路道喉轄之要，加民夷雜處，數有兵難。領太守毌丘興到官，內撫吏民，外懷羌、胡，卒使柔附，為官效用。黃華、張進初圖逆亂，扇動左右，興志氣忠烈，臨難不顧，為將校民夷陳說禍福，言則涕泣。於時男女萬口，咸懷感激，形毀髮亂，誓心致命。尋率精兵踧脅張掖，濟拔領太守杜通、西海太守張睦。張掖番和、驪靬二縣吏民及郡雜胡棄惡詣興，興皆安卹，使盡力田。興每所歷，盡竭心力，誠國之良吏。殿下即位，留心萬機，苟有毫毛之善，必有賞錄，臣伏緣聖旨，指陳其事。」
