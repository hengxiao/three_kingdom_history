  type: pei
  text: 《魏書》曰：愚字公治，本名浚，黃初中，為和戎護軍。烏丸校尉田豫討胡有功，小違節度，愚以法繩之。帝怒，械系愚，免官治罪，詔曰「浚何愚」！遂以名之。正始中，為曹爽長史，後出為兗州刺史。《魏略》曰：愚聞楚王彪有智勇。初東郡有訛言云：「白馬河出妖馬，夜過官牧邊鳴呼，眾馬皆應，明日見其跡，大如斛，行數里，還入河中。」又有謠言：「白馬素羈西南馳，其誰乘者朱虎騎。」楚王小字朱虎，故愚與王凌陰謀立楚王。乃先使人通意於王，言「使君謝王，天下事不可知，原王自愛」！彪亦陰知其意，答言「謝使君，知厚意也。」
