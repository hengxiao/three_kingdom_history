  text: 《晉諸公贊》曰：胡烈兒名淵，字世元，遵之孫也。遵，安定人，以才兼文武，累居籓鎮，至車騎將軍。子奮，字玄威，亦歷方任。女為晉武帝貴人，有寵。太康中，以奮為尚書僕射，加鎮軍大將軍、開府。弟廣，字宣祖，少府。次烈，字玄武，秦州刺史。次岐，宇玄嶷，并州刺史。廣子喜，涼州刺史。淵小字鷂鴟，時年十八，既殺會救父，名震遠近。後趙王倫篡位，三王興義，倫使淵與張泓將兵禦齊王，屢破齊軍。會成都戰克，淵乃歸降伏法。
