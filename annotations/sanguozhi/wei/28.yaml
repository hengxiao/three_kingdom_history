  text: 《史記》曰：越王無疆與中國爭強，當楚威王時，越北伐齊，齊威王使人說越王，越王不納。齊使者曰：「幸也，越之不亡也。吾不貴其用智之如目，目見毫毛而不自見其睫也。今王知晉之失計，不自知越之過，是目論也。」
