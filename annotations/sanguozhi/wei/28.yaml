  type: pei
  text: 《魏氏春秋》曰：欽中子俶，小名鴦。年尚幼，勇力絕人，謂欽曰：「及其未定，擊之可破也。」於是分為二隊，夜夾攻軍。俶率壯士先至，大呼大將軍，軍中震擾。欽後期不應。會明，俶退，欽亦引還。魏末傳曰：殿中人姓尹，字大目，小為曹氏家奴，常侍在帝側，大將軍將俱行。大目知大將軍一目已突出，啟云：「文欽本是明公腹心，但為人所誤耳，又天子鄉里。大目昔為文欽所信，乞得追解語之，令還與公复好。」大將軍聽遣大目單身往，乘大馬，被鎧甲，追文欽，遙相與語。大目心實欲曹氏安，謬言：「君侯何苦若不可復忍數日中也！」欲使欽解其旨。欽殊不悟，乃更厲聲罵大目：「汝先帝家人，不念報恩，而反與司馬師作逆；不顧上天，天不祐汝！」乃張弓傅矢欲射大目，大目涕泣曰：「世事敗矣，善自努力也。」
- id: wei.28.p12.a2
