  type: pei
  text: 《漢晉春秋》曰：蔣班、焦彝言於諸葛誕曰：「朱異等以大眾來而不能進，孫綝殺異而歸江東，外以發兵為名，而內實坐須成敗，其歸可見矣。今宜及眾心尚固，士卒思用，並力決死，攻其一面，雖不能盡克，猶可有全者。」文欽曰：「江東乘戰勝之威久矣，未有難北方者也。況公今舉十餘萬之眾內附，而欽與全端等皆同居死地，父子兄弟盡在江表，就孫綝不欲，主上及其親戚豈肯聽乎？且中國無歲無事，軍民並疲，今守我一年，勢力已因，異圖生心，變故將起，以往準今，可計日而望也。」班、彝固勸之，欽怒，而誕欲殺班。二人懼，且知誕之必敗也，十一月，乃相攜而降。
