  type: pei
  text: 《漢晉春秋》曰：初艾之下江由也，以續不進，欲斬，既而捨之。及瓘遣續，謂曰：「可以報江由之辱矣。」杜預言於眾曰：「伯玉其不免乎！身為名士，位望已高，既無德音，又不御下以正，是小人而乘君子之器，將何以堪其責乎？」瓘聞之，不俟駕而謝。《世語》曰：師纂亦與艾俱死。纂性急少恩，死之日體無完皮。
