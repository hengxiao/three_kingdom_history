  text: 會時遭所生母喪。其母傳曰：「夫人性矜嚴，明於教訓，會雖童稚，勤見規誨。年四歲授《孝經》，七歲誦《論語》，八歲誦《詩》，十歲誦《尚書》，十一誦《易》，十二誦《春秋左氏傳》、《國語》，十三誦《周禮》、《禮記》，十四誦《成侯易記》，十五使入太學問四方奇文異訓。謂會曰：『學猥則倦，倦則意怠；吾懼汝之意怠，故以漸訓汝，今可以獨學矣。』雅好書籍，涉曆書，特好易、老子，每讀易孔子說鳴鶴在陰、勞謙君子、籍用白茅、不出戶庭之義，每使會反覆讀之，曰：『易三百餘爻，仲尼特說此者，以謙恭慎密，樞機之發，行己至要，榮身所由故也，順斯術已往，足為君子矣。』正始八年，會為尚書郎，夫人執會手而誨之曰：『汝弱冠見敘，人情不能不自足，則損在其中矣，勉思其戒！』是時大將軍曹爽專朝政，日縱酒沉醉，會兄侍中毓宴還，言其事。夫人曰：『樂則樂矣，然難久也。居不驕，制節謹度，然後乃無危溢之患。今奢僭若此，非長守富貴之道。』嘉平元年，車駕朝高平陵，會為中書郎，從行。相國宣文侯始舉兵，眾人恐懼，而夫人自若。中書令劉放、侍郎衛瓘、夏侯和等家皆怪問：『夫人一子在危難之中，何能無憂？』答曰：『大將軍奢僭無度，吾常疑其不安。太傅義不危國，必為大將軍舉耳。吾兒在帝側何憂？聞且出兵無他重器，其勢必不久戰。』果如其言，一時稱明。會歷機密十餘年，頗豫政謀。夫人謂曰：『昔范氏少子為趙簡子設伐邾之計，事從民悅，可謂功矣。然其母以為乘偽作詐，末業鄙事，必不能久。其識本深遠，非近人所言，吾常樂其為人。汝居心正，吾知免矣。但當脩所志以輔益時化，不忝先人耳。常言人誰能皆體自然，但力行不倦，抑亦其次。雖接鄙賤，必以言信。取與之間，分畫分明。』或：『此無乃小乎？』答曰：『君子之行，皆積小以致高大，若以小善為無益而弗為，此乃小人之事耳。希通慕大者，吾所不好。』會自幼少，衣不過青紺，親營家事，自知恭儉。然見得思義，臨財必讓。會前後賜錢帛數百萬計，悉送供公家之用，一無所取。年五十有九，甘露二年二月暴疾薨。比葬，天子有手詔，命大將軍高都侯厚加賵贈，喪事無鉅細，一皆供給。議者以為公侯有夫人，有世婦，有妻，有妾，所謂外命婦也。依春秋成風、定姒之義，宜崇典禮，不得總稱妾名，於是稱成侯命婦。殯葬之事，有取於古制，禮也。」
