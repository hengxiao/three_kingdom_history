  text: 《漢晉春秋》曰：凌、愚謀，以帝幼制於強臣，不堪為主，楚王彪長而才，欲迎立之，以興曹氏。凌使人告廣，廣曰：「凡舉大事，應本人情。今曹爽以驕奢失民，何平叔虛而不治，丁、畢、桓、鄧雖並有宿望，皆專競於世。加變易朝典，政令數改，所存雖高而事不下接，民習於舊，眾莫之從。故雖勢傾四海，聲震天下，同日斬戮，名士減半，而百姓安之，莫或之哀，失民故也。今懿情雖難量，事未有逆，而擢用賢能，廣樹勝己，修先朝之政令，副眾心之所求。爽之所以為惡者，彼莫不必改，夙夜匪解，以恤民為先。父子兄弟，並握兵要，未易亡也。」凌不從。臣松之以為如此言之類，皆前史所不載，而猶出習氏。且制言法體不似於昔，疑悉鑿齒所自造者也。
