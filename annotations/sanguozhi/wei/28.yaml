  text: 《世語》曰：夏侯霸奔蜀，蜀朝問「司馬公如何德」？霸曰：「自當作家門。」「京師俊士」？曰：「有鍾士季，其人管朝政，吳、蜀之憂也。」《漢晉春秋》曰：初，夏侯霸降蜀，姜維問之曰：「司馬懿既得彼政，當復有征伐之志不？」霸曰：「彼方營立家門，未遑外事。有鍾士季者，其人雖少，終為吳、蜀之憂，然非非常之人亦不能用也。」後十五年而會果滅蜀。按習鑿齒此言，非出他書，故採用《世語》而附益也。
