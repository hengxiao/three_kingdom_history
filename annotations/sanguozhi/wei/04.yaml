  type: pei
  text: 《漢晉春秋》曰：毌丘儉、王昶聞東軍敗，各燒屯走。朝議欲貶黜諸將，景王曰：「我不聽公休，以至於此。此我過也，諸將何罪？」悉原之。時司馬文王為監軍，統諸軍，唯削文王爵而已。是歲，雍州刺史陳泰求勑并州并力討胡，景王從之。未集，而鴈門、新興二郡以為將遠役，遂驚反。景王又謝朝士曰：「此我過也，非玄伯之責！」於是魏人愧恱，人思其報。習鑿齒曰：司馬大將軍引二敗以為己過，過消而業隆，可謂智矣。夫民忘其敗，而下思其報，雖欲不康，其可得邪？若乃諱敗推過，歸咎萬物，常執其功而隱其喪，上下離心，賢愚解體，是楚再敗而晉再克也，謬之甚矣！君人者，苟統斯理而以御國，則朝無秕政，身靡留愆，行失而名揚，兵挫而戰勝，雖百敗可也，況於再乎！
