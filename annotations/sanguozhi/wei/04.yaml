  length: 0
  type: pei
  text: 《漢晉春秋》曰：帝見威權日去，不勝其忿。乃召侍中王沈、尚書王經、散騎常侍王業，謂曰：「司馬昭之心，路人所知也。吾不能坐受廢辱，今日當與卿等自出討之。」王經曰：「昔魯昭公不忍季氏，敗走失國，為天下笑。今權在其門，為日乆矣，朝廷四方皆為之致死，不顧逆順之理，非一日也。且宿衞空闕，兵甲寡弱，陛下何所資用，而一旦如此，無乃欲除疾而更深之邪！禍殆不測，宜見重詳。」帝乃出懷中版令投地，曰：「行之決矣。正使死，何所懼？況不必死邪！」於是入白太后，沈、業奔走告文王，文王為之備。帝遂帥僮僕數百，鼓譟而出。文王弟屯騎校尉伷入，遇帝於東止車門，左右呵之，伷衆奔走。中護軍賈充又逆帝戰於南闕下，帝自用劒。衆欲退，太子舍人成濟問充曰：「事急矣。當云何？」充曰：「畜養汝等，正謂今日。今日之事，無所問也。」濟即前刺帝，刃出於背。文王聞，大驚，自投於地曰：「天下其謂我何！」太傅孚奔往，枕帝股而哭，哀甚，曰：「殺陛下者，臣之罪也。」臣松之以為習鑿齒書，雖最後出，然述此事差有次第。故先載習語，以其餘所言微異者次其後。《世語》曰：王沈、王業馳告文王，尚書王經以正直不出，因沈、業申意。《晉諸公贊曰：沈、業將出，呼王經。經不從，曰：「吾子行矣！」干寶《晉紀》曰：成濟問賈充曰：「事急矣。若之何？」充曰：「公畜養汝等，為今日之事也。夫何疑！」濟曰：「然。」乃抽戈犯蹕。《魏氏春秋》曰：戊子夜，帝自將宂從僕射李昭、黃門從官焦伯等下陵雲臺，鎧仗授兵，欲因際會，自出討文王。會雨，有司奏却日，遂見王經等出黃素詔於懷曰：「是可忍也，孰不可忍也！今日便當決行此事。」入白太后，遂拔劒升輦，帥殿中宿衞蒼頭官僮擊戰鼓，出雲龍門。賈充自外而入，帝師潰散，猶稱天子，手劒奮擊，衆莫敢逼。充帥厲將士，騎督成倅弟成濟以矛進，帝崩于師。時暴雨雷霆，晦冥。魏末傳曰：賈充呼帳下督成濟謂曰：「司馬家事若敗，汝等豈復有種乎？何不出擊！」倅兄弟二人乃帥帳下人出，顧曰：「當殺邪？執邪？」充曰：「殺之。」兵交，帝曰：「放仗！」大將軍士皆放仗。濟兄弟因前刺帝，帝倒車下。
