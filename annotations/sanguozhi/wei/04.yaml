  text: 《魏氏春秋》曰：二月丙辰，帝宴羣臣於太極東堂，與侍中荀顗、尚書崔贊、袁亮、鍾毓、給事中中書令虞松等並講述禮典，遂言帝王優劣之差。帝慕夏少康，因問顗等曰：「有夏旣衰，后相殆滅，少康收集夏衆，復禹之績，高祖拔起隴畒，驅帥豪儁，芟夷秦、項，包舉宇內，斯二主可謂殊才異略，命世大賢者也。考其功德，誰宜為先？」顗等對曰：「夫天下重器，王者天授，聖德應期，然後能受命創業。至於階緣前緒，興復舊績，造之與因，難易不同。少康功德雖美，猶為中興之君，與世祖同流可也。至如高祖，臣等以為優。」帝曰：「自古帝王，功德言行互有高下，未必創業者皆優，紹繼者咸劣也。湯、武、高祖雖俱受命，賢聖之分，所覺縣殊。少康、殷宗中興之美，夏啟、周成守文之盛，論德較實，方諸漢祖，吾見其優，未聞其劣；顧所遇之時殊，故所名之功異耳。少康生於滅亡之後，降為諸侯之隷，崎嶇逃難，僅以身免，能布其德而兆其謀，卒滅過、戈，克復禹績，祀夏配天，不失舊物，非至德弘仁，豈濟斯勳？漢祖因土崩之勢，仗一時之權，專任智力以成功業，行事動靜多違聖檢；為人子則數危其親，為人君則囚繫賢相，為人父則不能衞子；身沒之後，社稷幾傾，若與少康易時而處，或未能復大禹之績也。推此言之，宜高夏康而下漢祖矣。諸卿具論詳之。」翌日丁巳，講業旣畢，顗、亮等議曰：「三代建國，列土而治，當其衰弊，無土崩之勢，可懷以德，難屈以力。逮至戰國，彊弱相兼，去道德而任智力。故秦之弊可以力爭。少康布德，仁者之英也；高祖任力，智者之儁也。仁智不同，二帝殊矣。詩、書述殷中宗、高宗，皆列大雅，少康功美過於二宗，其為大雅明矣。少康為優，宜如詔旨。」贊、毓、松等議曰：「少康雖積德累仁，然上承大禹遺澤餘慶，內有虞、仍之援，外有靡、艾之助，寒浞讒慝，不德于民，澆、豷無親，外內棄之，以此有國，蓋有所因。至於漢祖，起自布衣，率烏合之士，以成帝者之業。論德則少康優，課功則高祖多，語資則少康易，校時則高祖難。」帝曰：「諸卿論少康因資，高祖創造，誠有之矣，然未知三代之世，任德濟勳如彼之難，秦、項之際，任力成功如此之易。且太上立德，其次立功，漢祖功高，未若少康盛德之茂也。且夫仁者必有勇，誅暴必用武，少康武烈之威，豈必降於高祖哉？但夏書淪亡，舊文殘缺，故勳美闕而罔載，唯有伍員粗述大略，其言復禹之績，不失舊物，祖述聖業，舊章不行，自非大雅兼才，孰能與於此，向令墳、典具存，行事詳備，亦豈有異同之論哉？」於是羣臣咸恱服。中書令松進曰：「少康之事，去世乆遠，其文昧如，是以自古及今，議論之士莫有言者，德美隱而不宣。陛下旣垂心遠鑒，考詳古昔，又發德音，贊明少康之美，使顯於千載之上，宜錄以成篇，永垂于後。」帝曰：「吾學不博，所聞淺狹，懼於所論，未獲其宜；縱有可采，億則屢中，又不足貴，無乃致笑後賢，彰吾闇昧乎！」於是侍郎鍾會退論次焉。
