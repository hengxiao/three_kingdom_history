  at: 125
  length: 0
  type: pei
  text: 臣松之以為壹畏逼歸命，事無可嘉，格以古義，欲蓋而名彰者也。當時之宜，未得遠遵式典，固應量才受賞，足以疇其來情而已。至乃光錫八命，禮同台鼎，不亦過乎！於招攜致遠，又無取焉。何者？若使彼之將守，與時無嫌，終不恱於殊寵，坐生叛心，以叛而愧，辱孰甚焉？如其憂危將及，非奔不免，則必逃死苟存，無希榮利矣，然則高位厚祿何為者哉？魏初有孟達、黃權，在晉有孫秀、孫楷；達、權爵賞比壹為輕，秀、楷禮秩優異尤甚。及至吳平，而降黜數等，不承權輿，豈不緣在始失中乎？
