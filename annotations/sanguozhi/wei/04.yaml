  type: pei
  text: 《漢晉春秋》曰：是時姜維亦出圍狄道。司馬景王問虞松曰：「今東西有事，二方皆急，而諸將意沮，若之何？」松曰：「昔周亞夫堅壁昌邑而吳楚自敗，事有似弱而彊，或似彊而弱，不可不察也。今恪悉其銳衆，足以肆暴，而坐守新城，欲以致一戰耳。若攻城不拔，請戰不得，師老衆疲，勢將自走，諸將之不徑進，乃公之利也。姜維有重兵而縣軍應恪，投食我麥，非深根之寇也。且謂我并力於東，西方必虛，是以徑進。今若使關中諸軍倍道急赴，出其不意，殆將走矣。」景王曰：「善！」乃使郭淮、陳泰悉關中之衆，解狄道之圍；勑毌丘儉等案兵自守，以新城委吳。姜維聞淮進兵，軍食少，乃退屯隴西界。
