- id: wei.4.p74.a1
  anchor: wei.4.p74
  at: 133
  length: 0
  type: pei
  text: 《漢晉春秋》曰：晉公旣進爵為王，太尉王祥、司徒何曾、司空荀顗並詣王。顗曰：「相王尊重，何侯與一朝之臣皆已盡敬，今日便當相率而拜，無所疑也。」祥曰：「相國位勢，誠為尊貴，然要是魏之宰相，吾等魏之三公；公、王相去，一階而已，班列大同，安有天子三公可輙拜人者！損魏朝之望，虧晉王之德，君子愛人以禮，吾不為也。」及入，顗遂拜，而祥獨長揖。王謂祥曰：「今日然後知君見顧之重！」
