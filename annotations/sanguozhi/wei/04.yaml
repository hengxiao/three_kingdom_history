  anchor: wei.4.p52
  at: 72
  length: 0
  type: pei
  text: 《楚國先賢傳》曰：余字子正，天姿方毅，志尚仁義，建安二十三年為郡功曹。是時吳、蜀不賔，疆埸多虞。宛將侯音扇動山民，保城以叛。余與太守東里衮當擾攘之際、迸竄得出。音即遣騎追逐，去城十里相及，賊便射衮，飛矢交流。余前以身當箭，被七創，因謂追賊曰：「侯音狂狡，造為凶逆，大軍尋至，誅夷在近。謂卿曹本是善人，素無惡心，當思反善，何為受其指揮？我以身代君，已被重創，若身死君全，隕沒無恨。」因仰天號哭泣涕，血淚俱下。賊見其義烈，釋衮不害。賊去之後，余亦命絕。征南將軍曹仁討平音，表余行狀，并脩祭醊。太祖聞之，嗟嘆良乆，下荊州復表門閭，賜穀千斛。衮後為于禁司馬，見《魏略·游說傳》。
