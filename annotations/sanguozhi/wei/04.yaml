- id: wei.4.p7.a1
  anchor: wei.4.p7
  at: 27
  length: 0
  type: pei
  text: 干寶《晉紀》曰：吳將全琮寇芍陂，朱然、孫倫五萬人圍樊城，諸葛瑾、步隲寇柤中；琮已破走而樊圍急。宣王曰：「柤中民夷十萬，隔在水南，流離無主，樊城被攻，歷月不解，此危事也，請自討之。」議者咸言：「賊遠圍樊城不可拔，挫於堅城之下，有自破之勢，宜長策以御之。」宣王曰：「軍志有之：將能而御之，此為縻軍；不能而任之，此為覆軍。今疆埸騷動，民心疑惑，是社稷之大憂也。」六月，督諸軍南征，車駕送津陽城門外。宣王以南方暑溼，不宜持乆，使輕騎挑之，然不敢動。於是乃令諸軍休息洗沐，簡精銳，募先登，申號令，示必攻之勢。然等聞之，乃夜遁。追至三州口，大殺獲。
