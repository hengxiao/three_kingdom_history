  length: 0
  type: pei
  text: 《世語》及《魏氏春秋》並云：此秋，姜維寇隴右。時安東將軍司馬文王鎮許昌，徵還擊維，至京師，帝於平樂觀以臨軍過。中領軍許允與左右小臣謀，因文王辭，殺之，勒其衆以退大將軍。已書詔於前。文王入，帝方食栗，優人雲午等唱曰：「青頭雞，青頭雞。」青頭雞者，鴨也。帝懼不敢發。文王引兵入城，景王因是謀廢帝。臣松之案夏侯玄傳及《魏略》，許允此年春與李豐事相連。豐旣誅，即出允為鎮北將軍，未發，以放散官物收付廷尉，徙樂浪，追殺之。允此秋不得故為領軍而建此謀。
