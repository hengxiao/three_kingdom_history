  text: 《世語》曰：初，青龍中，石苞鬻鐵於長安，得見司馬宣王，宣王知焉。後擢為尚書郎，歷青州刺史、鎮東將軍。甘露中入朝，當還，辭高貴鄉公，留中盡日。文王遣人要令過。文王問苞：「何淹留也？」苞曰：「非常人也。」明日發至滎陽，數日而難作。
