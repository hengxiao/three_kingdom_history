- id: wei.4.p1.a2
  anchor: wei.4.p1
  at: 233
  length: 0
  type: pei
  text: 《異物志》曰：斯調國有火州，在南海中。其上有野火，春夏自生，秋冬自死。有木生於其中而不消也，枝皮更活，秋冬火死則皆枯瘁。其俗常冬采其皮以為布，色小青黑；若塵垢洿之，便投火中，則更鮮明也。傅子曰：漢桓帝時，大將軍梁兾以火浣布為單衣，常大會賔客，兾陽爭酒，失杯而汙之，偽怒，解衣曰：「燒之。」布得火，煒燁赫然，如燒凡布，垢盡火滅，粲然潔白，若用灰水焉。《搜神記》曰：崑崙之墟有炎火之山，山上有鳥獸草木，皆生於炎火之中，故有火浣布，非此山草木之皮枲，則其鳥獸之毛也。漢世西域舊獻此布，中間乆絕；至魏初，時人疑其無有。文帝以為火性酷烈，無含生之氣，著之《典論》，明其不然之事，絕智者之聽。及明帝立，詔三公曰：「先帝昔著典論，不朽之格言，其刊石于廟門之外及太學，與石經並，以永示來世。」至是西域使至而獻火浣布焉，於是刊滅此論，而天下笑之。臣松之昔從征西至洛陽，歷觀舊物，見典論石在太學者尚存，而廟門外無之，問諸長老，云晉初受禪，即用魏廟，移此石於太學，非兩處立也。竊謂此言為不然。又東方朔《神異經》曰：南荒之外有火山，長三十里，廣五十里，其中皆生不燼之木，晝夜火燒，得暴風不猛，猛雨不滅。火中有鼠，重百斤，毛長二尺餘，細如絲，可以作布。常居火中，色洞赤，時時出外而色白，以水逐而沃之即死，續其毛，織以為布。
