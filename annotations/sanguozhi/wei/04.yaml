  anchor: wei.4.p17
  at: 156
  length: 0
  type: pei
  text: 孔衍《漢魏春秋》曰：詔使太常王肅冊命太傅為丞相，增邑萬戶，羣臣奏事不得稱名，如漢霍光故事。太傅上書辭讓曰：「臣親受顧命，憂深責重，憑賴天威，摧弊姦凶，贖罪為幸，功不足論。又三公之官，聖王所制，著之典禮。至於丞相，始自秦政。漢氏因之，無復變改。今三公之官皆備，橫復寵臣，違越先典，革聖明之經，襲秦漢之路，雖在異人，臣所宜正，況當臣身而不固爭，四方議者將謂臣何！」書十餘上，詔乃許之，復加九錫之禮。太傅又言：「太祖有大功大德，漢氏崇重，故加九錫，此乃歷代異事，非後代之君臣所得議也。」又辭不受。
