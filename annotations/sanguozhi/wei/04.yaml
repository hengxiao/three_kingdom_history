  text: 《漢晉春秋》曰：初，孫權築東興隄以遏巢湖。後征淮南，壞不復脩。是歲諸葛恪帥軍更於隄左右結山，挾築兩城，使全端、留略守之，引軍而還。諸葛誕言於司馬景王曰：「致人而不至於人者，此之謂也。今因其內侵，使文舒逼江陵，仲恭向武昌，以羈吳之上流，然後簡精卒攻兩城，比救至，可大獲也。」景王從之。
