  text: 《魏書》曰：是日，景王承皇太后令，詔公卿中朝大臣會議，羣臣失色。景王流涕曰：「皇太后令如是，諸君其若王室何！」咸曰：「昔伊尹放太甲以寧殷，霍光廢昌邑以安漢，夫權定社稷以濟四海，二代行之於古，明公當之於今，今日之事，亦唯公命。」景王曰：「諸君所以望師者重，師安所避之？」於是乃與羣臣共為奏永寧宮曰：「守尚書令太尉長社侯臣孚、大將軍武陽侯臣師、司徒萬歲亭侯臣柔、司空文陽亭侯臣冲、行征西安東將軍新城侯臣昭、光祿大夫關內侯臣邕、太常臣晏、衞尉昌邑侯臣偉、太僕臣嶷、廷尉定陵侯臣毓、大鴻臚臣芝、大司農臣祥、少府臣袤、永寧衞尉臣楨、永寧太僕臣閣、大長秋臣模、司隷校尉潁昌侯臣曾、河南尹蘭陵侯臣肅、城門校尉臣慮、中護軍永安亭侯臣望、武衞將軍安壽亭侯臣演、中堅將軍平原侯臣德、中壘將軍昌武亭侯臣廙、屯騎校尉關內侯臣陔、步兵校尉臨晉侯臣建、射聲校尉安陽鄉侯臣溫、越騎校尉睢陽侯臣初、長水校尉關內侯臣超、侍中臣小同、臣顗、臣酆、博平侯臣表、侍中中書監安陽亭侯臣誕、散騎常侍臣瓌、臣儀、關內侯臣芝、尚書僕射光祿大夫高樂亭侯臣毓、尚書關內侯臣觀、臣嘏、長合鄉侯臣亮、臣贊、臣騫、中書令臣康、御史中丞臣鈐、博士臣範、臣峻等稽首言：臣等聞天子者，所以濟育羣生，永安萬國，三祖勳烈，光被六合。皇帝即位，纂繼洪業，春秋已長，未親萬機，耽淫內寵，沈漫女色，廢捐講學，棄辱儒士，日延小優郭懷、袁信等於建始芙蓉殿前裸袒游戲，使與保林女尚等為亂，親將後宮瞻觀。又於廣望觀上，使懷、信等於觀下作遼東妖婦，嬉褻過度，道路行人掩目，帝於觀上以為讌笑。於陵雲臺曲中施帷，見九親婦女，帝臨宣曲觀，呼懷、信使入帷共飲酒。懷、信等更行酒，婦女皆醉，戲侮無別。使保林李華、劉勳等與懷、信等戲，清商令令狐景呵華、勳曰：『諸女，上左右人，各有官職，何以得爾？』華、勳數讒毀景。帝常喜以彈彈人，以此恚景，彈景不避首目。景語帝曰：『先帝持門戶急，今陛下日將妃后游戲無度，至乃共觀倡優，裸袒為亂，不可令皇太后聞。景不愛死，為陛下計耳。』帝言：『我作天子，不得自在邪？太后何與我事！』使人燒鐵灼景，身體皆爛。甄后崩後，帝欲立王貴人為皇后。太后更欲外求，帝恚語景等：『魏家前後立皇后，皆從所愛耳，太后必違我意，知我當往不也？』後卒待張皇后疏薄。太后遭郃陽君喪，帝日在後園，倡優音樂自若，不數往定省。清商丞龐熈諫帝：『皇太后至孝，今遭重憂，水漿不入口，陛下當數往寬慰，不可但在此作樂。』帝言：『我自爾，誰能柰我何？』皇太后還北宮，殺張美人及禺婉，帝恚望，語景等：『太后橫殺我所寵愛，此無復母子恩。』數往至故處啼哭，私使暴室厚殯棺，不令太后知也。每見九親婦女有美色，或留以付清商。帝至後園竹間戲，或與從官攜手共行。熈白：『從官不宜與至尊相提挈。』帝怒，復以彈彈熈。日游後園，每有外文書入，帝不省，左右曰『出』，帝亦不索視。太后令帝常在式乾殿上講學，不欲，使行來，帝徑去；太后來問，輙詐令黃門荅言『在』耳。景、熈等畏恐，不敢復止，更共讇媚。帝肆行昏淫，敗人倫之叙，亂男女之節，恭孝彌頹，凶德浸盛。臣等憂懼傾覆天下，危墜社稷，雖殺身斃命不足以塞責。今帝不可以承天緒，臣請依漢霍光故事，收帝璽綬。帝本以齊王踐祚，宜歸藩于齊。使司徒臣柔持節，與有司以太牢告祀宗廟。臣謹昧死以聞。」奏可。
- id: wei.4.p26.a3
  anchor: wei.4.p26
  at: 289
  length: 0
  type: pei
  text: 《魏略》曰：景王將廢帝，遣郭芝入白太后，太后與帝對坐。芝謂帝曰：「大將軍欲廢陛下，立彭城王據。」帝乃起去。太后不恱。芝曰：「太后有子不能教，今大將軍意已成，又勒兵于外以備非常，但當順旨，將復何言！」太后曰：「我欲見大將軍，口有所說。」芝曰：「何可見邪？但當速取璽綬。」太后意折，乃遣傍侍御取璽綬著坐側。芝出報景王，景王甚歡。又遣使者授齊王印綬，當出就西宮。帝受命，遂載王車，與太后別，垂涕，始從太極殿南出，羣臣送者數十人，太尉司馬孚悲不自勝，餘多流涕。王出後，景王又使使者請璽綬。太后曰：「彭城王，我之季叔也，今來立，我當何之！且明皇帝當絕嗣乎？吾以為高貴鄉公者，文皇帝之長孫，明皇帝之弟子，於禮，小宗有後大宗之義，其詳議之。」景王乃更召群臣，以皇太后令示之，乃定迎高貴鄉公。是時太常已發二日，待璽綬於溫。事定，又請璽綬。太后令曰：「我見高貴鄉公，小時識之，明日我自欲以璽綬手授之也。」
