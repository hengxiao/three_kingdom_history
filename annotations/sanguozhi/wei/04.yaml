  text: 帝《集》載帝自敘始生禎祥曰：「昔帝王之生，或有禎祥，蓋所以彰顯神異也。惟予小子，支胤末流，謬為靈祇之所相祐也，豈敢自比於前喆，聊記錄以示後世焉。其辭曰：惟正始三年九月辛未朔，二十五日乙未直成，予生。于時也，天氣清明，日月暉光，爰有黃氣，烟熅於堂，照曜室宅，其色煌煌。相而論之曰：未者為土，魏之行也；厥日直成，應嘉名也；烟熅之氣，神之精也；無災無害，蒙神靈也。齊王不弔，顛覆厥度，羣公受予，紹繼皇祚。以眇眇之身，質性頑固，未能涉道，而遵大路，臨深履冰，涕泗憂懼。古人有云，懼則不亡。伊予小子，曷敢怠荒？庶不忝辱，永奉烝甞。」傅暢《晉諸公贊》曰：帝常與中護軍司馬望、侍中王沈、散騎常侍裴秀、黃門侍郎鍾會等講宴於東堂，并屬文論。名秀為儒林丈人，沈為文籍先生，望、會亦各有名號。帝性急，請召欲速。秀等在內職，到得及時，以望在外，特給追鋒車，虎賁卒五人，每有集會，望輒奔馳而至。
