- id: wei.4.p13.a1
  anchor: wei.4.p13
  at: 139
  length: 0
  type: pei
  text: 習鑿齒《漢晉春秋》曰：是年，吳將朱然入柤中，斬獲數千；柤中民吏萬餘家渡沔。司馬宣王謂曹爽曰：「若便令還，必復致寇，宜權留之。」爽曰：「今不脩守沔南，留民沔北，非長策也。」宣王曰：「不然。凡物置之安地則安，危地則危，故兵書曰，成敗形也，安危勢也，形勢御衆之要，不可不審。設令賊二萬人斷沔水，三萬人與沔南諸軍相持，萬人陸鈔柤中，君將何以救之？」爽不聽，卒令還。然後襲殺之。袁淮言於爽曰：「吳楚之民脆弱寡能，英才大賢不出其土，比技量力，不足與中國相抗，然自上世以來常為中國患者，蓋以江漢為池，舟楫為用，利則陸鈔，不利則入水，攻之道遠，中國之長技無所用之也。孫權自十數年以來，大畋江北，繕治甲兵，精其守禦，數出盜竊，敢遠其水，陸次平土，此中國所願聞也。夫用兵者，貴以飽待飢，以逸擊勞，師不欲乆，行不欲遠，守少則固，力專則彊。當今宜捐淮、漢已南，退却避之。若賊能入居中央，來侵邊境，則隨其所短，中國之長技得用矣。若不敢來，則邊境得安，無鈔盜之憂矣。使我國富兵彊，政脩民一，陵其國不足為遠矣。今襄陽孤在漢南，賊循漢而上，則斷而不通，一戰而勝，則不攻而自服，故置之無益於國，亡之不足為辱。自江夏已東，淮南諸郡，三后已來，其所亡幾何，以近賊疆界易鈔掠之故哉！若徙之淮北，遠絕其間，則民人安樂，何鳴吠之驚乎？」遂不徙。
