  type: pei
  text: 《魏書》曰：景王復與羣臣共奏永寧宮曰：「臣等聞人道親親故尊祖，尊祖故敬宗。禮，大宗無嗣，則擇支子之賢者；為人後者，為之子也。東海定王子高貴鄉公，文皇帝之孫，宜承正統，以嗣烈祖明皇帝後。率土有賴，萬邦幸甚，臣請徵公詣洛陽宮。」奏可。使中護軍望、兼太常河南尹肅持節，與少府袤、尚書亮、侍中表等奉法駕，迎公于元城。《魏世譜》曰：晉受禪，封齊王為邵陵縣公。年四十三，泰始十年薨，謚曰厲公。
