  text: 《漢晉春秋》曰：丁卯，葬高貴鄉公于洛陽西北三十里瀍澗之濵。下車數乘，不設旌旐，百姓相聚而觀之，曰：「是前日所殺天子也。」或掩靣而泣，悲不自勝。臣松之以為若但下車數乘，不設旌旐，何以為王禮葬乎？斯蓋惡之過言，所謂不如是之甚者。
