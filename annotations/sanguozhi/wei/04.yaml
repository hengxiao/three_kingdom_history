  text: 《世語》曰：大將軍奉天子征儉，至項；儉旣破，天子先還。臣松之檢諸書都無此事，至諸葛誕反，司馬文王始挾太后及帝與俱行耳。故發詔引漢二祖及明帝親征以為前比，知明帝已後始有此行也。案張璠、虞溥、郭頒皆晉之令史，璠、頒出為官長，溥，鄱陽內史。璠撰《後漢紀》，雖似未成，辭藻可觀。溥著《江表傳》，亦粗有條貫。惟頒撰魏晉《世語》，蹇乏全無宮商，最為鄙劣，以時有異事，故頗行於世。干寶、孫盛等多采其言以為《晉書》，其中虛錯如此者，往往而有之。
