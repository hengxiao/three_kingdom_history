  anchor: wei.4.p23
  at: 182
  length: 0
  type: pei
  text: 《魏氏春秋》曰：脩字孝先，素有業行，著名西州。姜維劫之，脩不為屈。劉禪以為左將軍，脩欲刺禪而不得親近，每因慶賀，且拜且前，為禪左右所遏，事輙不克，故殺禕焉。臣松之以為古之舍生取義者，必有理存焉，或感恩懷德，投命無悔，或利害有機，奮發以應會，詔所稱聶政、介子是也。事非斯類，則陷乎妄作矣。魏之與蜀，雖為敵國，非有趙襄滅智之仇，燕丹危亡之急；且劉禪凡下之主，費禕中才之相，二人存亡，固無關於興喪。郭脩在魏，西州之男子耳，始獲於蜀，旣不能抗節不辱，於魏又無食祿之責，不為時主所使，而無故規規然糜身於非所，義無所加，功無所立，可謂「折柳樊圃」，其狂也且，此之謂也。
