  text: 《漢晉春秋》曰：帝乞言於祥，祥對曰：「昔者明王禮樂旣備，加之以忠誠，忠誠之發，形于言行。夫大人者，行動乎天地；天且弗違，況於人乎？」祥事別見〈呂虔傳〉。小同，鄭玄孫也。《玄別傳》曰：「玄有子，為孔融吏，舉孝廉。融之被圍，往赴，為賊所害。有遺腹子，以丁卯日生；而玄以丁卯歲生，故名曰小同。」《魏名臣奏》載太尉華歆表曰：「臣聞勵俗宣化，莫先於表善，班祿敘爵，莫美於顯能，是以楚人思子文之治，復命其胤，漢室嘉江公之德，用顯其世。伏見故漢大司農北海鄭玄，當時之學，名冠華夏，為世儒宗。文皇帝旌錄先賢，拜玄適孫小同以為郎中，長假在家。小同年踰三十，少有令質，學綜六經，行著鄉邑。海、岱之人莫不嘉其自然，美其氣量。迹其所履，有質直不渝之性，然而恪恭靜默，色養其親，不治可見之美，不競人間之名，斯誠清時所宜式敘，前後明詔所斟酌而求也。臣老病委頓，無益視聽，謹具以聞。」《魏氏春秋》曰：小同詣司馬文王，文王有密疏，未之屏也。如廁還，謂之曰：「卿見吾疏乎？」對曰：「否。」文王猶疑而鴆之，卒。鄭玄注文王世子曰「三老、五更各一人，皆年老更事致仕者也」。注樂記曰「皆老人更知三德五事者也」。蔡邕明堂論云：「更」應作「叟」。叟，長老之稱，字與「更」相似，書者遂誤以為「更」。「嫂」字「女」傍「叟」，今亦以為「更」，以此驗知應為「叟」也。臣松之以為邕謂「更」為「叟」，誠為有似，而諸儒莫之從，未知孰是。
