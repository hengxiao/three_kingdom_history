- id: wei.4.p22.a2
  anchor: wei.4.p22
  at: 41
  length: 0
  type: pei
  text: 是時，張特守新城。《魏略》曰：特字子產，涿郡人。先時領牙門，給事鎮東諸葛誕，誕不以為能也，欲遣還護軍。會毌丘儉代誕，遂使特屯守合肥新城。及諸葛恪圍城，特與將軍樂方等三軍衆合有三千人，吏兵疾病及戰死者過半，而恪起土山急攻，城將陷，不可護。特乃謂吳人曰：「今我無心復戰也。然魏法，被攻過百日而救不至者，雖降，家不坐也。自受敵以來，已九十餘日矣。此城中本有四千餘人，而戰死者已過半，城雖陷，尚有半人不欲降，我當還為相語之，條名別善惡，明日早送名，且持我印綬去以為信。」乃投其印綬以與之。吳人聽其辭而不取印綬。不攻。頃之，特還，乃夜徹諸屋材柵，補其缺為二重。明日，謂吳人曰：「我但有鬬死耳！」吳人大怒，進攻之，不能拔，遂引去。朝廷嘉之，加雜號將軍，封列侯，又遷安豐太守。
