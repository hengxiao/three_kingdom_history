  text: 輅別傳曰：既有明才，遭硃陽之運，於時名勢赫奕，若火猛風疾。當塗之士，莫不枝附葉連。賓客如雲，無多少皆為設食。賓無貴賤，候之以禮。京城紛紛，非徒歸其名勢而已，然亦懷其德焉。向不夭命，輅之榮華，非世所測也。弟辰嘗欲從輅學卜及仰觀事，輅言：「卿不可教耳。夫卜非至精不能見其數，非至妙不能睹其道，孝經、詩、論，足為三公，無用知之也。」於是遂止。子弟無能傳其術者。辰敘曰：「夫晉、魏之士，見輅道術神妙，佔候無錯，以為有隱書及象甲之數。辰每觀輅書傳，惟有易林、風角及鳥鳴、仰觀星書三十餘卷，世所共有。然輅獨在少府官舍，無家人子弟隨之，其亡沒之際，好奇不哀喪者，盜輅書，惟餘易林、風角及鳥鳴書還耳。夫術數有百數十家，其書有數千卷，書不少也。然而世鮮名人，皆由無才，不由無書也。裴冀州、何、鄧二尚書及鄉里劉太常、潁川兄弟，以輅禀受天才，明陰陽之道，吉凶之情，一得其源，遂涉其流，亦不為難，常歸服之。輅自言與此五君共語使人精神清發，昏不暇寐。自此以下，殆白日欲寢矣。又自言當世無所原，欲得與魯梓慎、鄭裨灶、晉卜偃、宋子韋、楚甘公、魏石申共登靈臺，披神圖，步三光，明災異，運蓍龜，決狐疑，無所复恨也。辰不以闇淺，得因孔懷之親，數與輅有所諮論至於辨人物，析臧否，說近義，彈曲直，拙而不工也。若敷皇、羲之典，揚文、孔之辭，周流五曜，經緯三度，口滿聲溢，微言風集，若仰眺飛鴻，漂漂兮景沒，若俯臨深溪，杳杳兮精絕；偪以攻難，而失其端，欲受學求道，尋以迷昏，無不扼腕椎指，追響長嘆也。昔京房雖善卜及風律之佔，卒不免禍，而輅自知四十八當亡，可謂明哲相殊。又京房目見遘讒之黨，耳聽青蠅之聲，面諫不從，而猶道路紛紜。輅處魏、晉之際，藏智以樸，卷舒有時，妙不見求，愚不見遺，可謂知幾相邈也。京房上不量萬乘之主，下不避佞諂之徒，欲以天文、洪範，利國利身，困不能用，卒陷大刑，可謂枯龜之餘智，膏燭之末景，豈不哀哉！世人多以輅疇之京房，辰不敢許也。至於仰察星辰，俯定吉凶，遠期不失年歲，近期不失日月，辰以甘、石之妙不先也。射覆名物，見術流速，東方朔不過也。觀骨形而審貴賤，覽形色而知生死，許負、唐舉不超也。若夫疏風氣而探微候，聽鳥鳴而識神機，亦一代之奇也。向使輅官達，為宰相大臣，膏腴流於明世，華曜列乎竹帛，使幽驗皆舉，秘言不遺，千載之後，有道者必信而貴之，無道者必疑而怪之；信者以妙過真，夫妙與神合者，得神無所惑也。恨輅才長命短，道貴時賤，親賢遐潛，不宣於良史，而為鄙弟所見追述，既自闇濁，又從來久遠，所載卜佔事，雖不識本卦，捃拾殘餘，十得二焉。至於仰觀靈曜，說魏、晉興衰，及五運浮沉，兵革災異，十不收一。無源何以成河？無根何以垂榮？雖秋菊可採，不及春英，臨文慷慨，伏用哀慚。將來君子，幸以高明求其義焉。往孟荊州為列人典農，嘗問亡兄，昔東方朔射覆得何卦，正知守宮、蜥蜴二物者。亡兄於此為安卦生象，辭喻交錯，微義豪起，變化相推，會於辰巳，分別龍蛇，各使有理。言絕之後，孟荊州長嘆息曰：『吾聞君論，精神騰躍，殆欲飛散，何其汪汪乃至於斯邪！』」臣松之案：辰所稱鄉里劉太常者，謂劉寔也。辰撰輅傳，寔時為太常，潁川則寔弟智也。寔、智並以儒學為名，無能言之。世語稱寔博辯，猶不足以並裴、何之流也。又案輅自說，云「本命在寅」，則建安十五年生也。至正始九年，應三十九，而傳云三十六，以正元三年卒，應四十七，傳云四十八，皆為不相應也。近有閻續伯者，名纘，該微通物，有良史風。為天下補綴遺脫，敢以所聞列於篇左。皆從受之於大人先哲，足以取信者，冀免虛誣之譏云爾。嘗受辰傳所謂劉太常者曰：「輅始見聞，由於為鄰婦卜亡牛，云當在西面窮牆中，縣頭上向。教婦人令視諸丘塚中，果得牛。婦人因以為藏己牛，告官案驗，乃知以術知，故裴冀州遂聞焉。」又云：「路中小人失妻者，輅為卜，教使明旦於東陽城門中伺擔豚人牽與共鬥。具如其言，豚逸走，即共追之。豚入人舍，突破主人甕，婦從甕中出。」劉侯云甚多此類，辰所載才十一二耳。劉侯云：「辰，孝廉才也。」中書令史紀玄龍，輅鄉里人，云「輅在田舍，嘗候遠鄰，主人患數失火。輅卜，教使明日於南陌上伺，當有一角巾諸生，駕黑牛故車，必引留，為設賓主，此能消之。即從輅戒。諸生有急求去，不聽，遂留當宿，意大不安，以為圖己。主人罷入，生乃把刀出門，倚兩薪積間，側立假寐。歘有一小物直來過前，如獸，手中持火，以口吹之。生驚，舉刀斫，正斷要，視之則狐。自此主人不復有災。」前長廣太守陳承祐口受城門校尉華長駿語云：「昔其父為清河太守時，召輅作吏，駿與少小，後以鄉里，遂加恩意，常與同載周旋，具知其事。云諸要驗，三倍於傳。辰既短才，又年縣小，又多在田舍，故益不詳。辰仕宦至州主簿、部從事，太康之初物故。」駿又云：「輅卜亦不悉中，十得七八，駿問其故，輅云：『理無差錯來卜者或言不足以宣事實，故使爾。』華城門夫人者，魏故司空涿郡盧公女也，得疾，連年不差。華家時居西城下南纏里中，三厩在其東南。輅卜當有師從東方來，自言能治，便聽使之，必得其力。後無何，有南征厩騶，當充甲卒，來詣盧公，佔能治女郎。公即表請留之，專使其子將詣華氏療疾，初用散藥，後復用丸治，尋有效，即奏除騶名，以補太醫。」又云：「隨輅父在利漕時，有治下屯民捕鹿者，其晨行還，見毛血，人取鹿處來詣厩告輅，輅為卦語云：『此有盜者，是汝東巷中第三家也。汝徑往門前，伺無人時，取一瓦子，密發其碓屋東頭第七椽，以瓦著下，不過明日食時，自送還汝。』其夜，盜者父病頭痛，壯熱煩疼，然亦來詣輅卜。輅為發祟，盜者俱服。輅令擔皮肉藏還者故處，病當自愈。乃密教鹿主往取。又語使復往如前，舉椽棄瓦盜父病差。又都尉治內史有失物者，輅使明晨於寺門外看，當逢一人，使指天畫地，舉手四向，自當得之。暮果獲於故處矣。」
