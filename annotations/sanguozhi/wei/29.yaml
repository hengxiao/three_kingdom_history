  type: pei
  text: 輅別傳曰：輅又曰：「夫風以時動，爻以像應，時者神之驅使，象者時之形表，一時其道，不足為難。」王弘直亦大學問，有道術，皆不能精。問輅：「風之推變，乃可爾乎？」輅言：「此但風之毛髮，何足為異？若夫列宿不守，眾神亂行，八風橫起，怒氣電飛，山崩石飛，樹木摧傾，揚塵萬里，仰不見天，鳥獸藏竄，兆民駭驚，於是使梓慎之徒，登高台，望風氣，分災異，刻期日，然後知神思遐幽，靈風可懼。」
- id: wei.29.p42.a1
  anchor: wei.29.p42
  at: 143
  length: 0
  type: pei
  text: 輅別傳曰：諸葛原字景春，亦學士。好卜筮，數與輅共射覆，不能窮之。景春與輅有榮辱之分，因輅餞之，大有高譚之客。諸人多聞其善卜、仰觀，不知其有大異之才，於是先與輅共論聖人著作之原，又敘五帝、三王受命之符。輅解景春微旨，遂開張戰地，示以不固，藏匿孤虛，以待來攻。景春奔北，軍師摧衄，自言吾睹卿旌旗，城池已壞也。其欲戰之士，於此鳴鼓角，舉雲梯，弓弩大起，牙旗雨集。然後登城曜威，開門受敵，上論五帝，如江如漢，下論三王，如翮如翰；其英者若春華之俱發，其攻者若秋風之落葉。聽者眩惑，不達其義，言者收聲，莫不心服，雖白起之坑趙卒，項羽之塞濉水，無以尚之。於時客皆欲面縛銜璧，求束手於軍鼓之下。輅猶總干山立，未便許之。至明日，離別之際，然後有腹心始終。一時海內俊士，八九人矣。蔡元才在朋友中最有清才，在眾人中言：「本聞卿作狗，何意為龍？」輅言：「潛陽未變，非卿所知，焉有狗耳，得聞龍聲乎！」景春言：「今當遠別，後會何期？且復共一射覆。」輅佔既皆中。景春大笑，「卿為我論此卦意，紓我心懷」。輅為開爻散理，分賦形象，言徵辭合，妙不可述。景春及眾客莫不言聽後論之美，勝於射覆之樂。景春與輅別，戒以二事，言：「卿性樂酒，量雖溫克，然不可保，寧當節之。卿有水鏡之才，所見者妙，仰觀雖神，禍如膏火，不可不慎。持卿叡才，遊於雲漢之聞，不憂不富貴也。」輅言：「酒不可極，才不可盡，吾欲持酒以禮，持才以愚，何患之有也？」
