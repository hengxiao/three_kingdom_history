- id: wei.29.p36.a1
  anchor: wei.29.p36
  at: 186
  length: 0
  type: pei
  text: 輅別傳曰：基與輅共論易，數日中，大以為喜樂，語輅言：「俱相聞善卜，定共清論。君一時異才，當上竹帛也。」輅為基出卦，知其無咎，因謂基曰：「昔高宗之鼎，非雉所鴝，殷之階庭，非木所生，而野鳥一鴝，武丁為高宗，桑谷暫生，太戊以興焉。知三事不為吉祥，原府君安身養德，從容光大，勿以知神姦汙累天真。」
- id: wei.29.p37.a1
  anchor: wei.29.p37
  at: 122
  length: 0
  type: pei
  text: 輅別傳曰：王基即遣信都令遷掘其室中，入地八尺，果得二棺，一棺中有矛，一棺中有角弓及箭，箭久遠，木皆消爛，但有鐵及角完耳。及徙骸骨，去城一十里埋之，無復疾病。基曰：「吾少好讀易，玩之以久，不謂神明之數，其妙如此。」便從輅學易，推論天文。輅每開變化之象，演吉凶之兆，未嘗不纖微委曲，盡其精神。基曰：「始聞君言，如何可得，終以皆亂，此自天授，非人力也。」於是藏周易，絕思慮，不復學卜筮之事。輅鄉里乃太原問輅：「君往者為王府君論怪，云老書佐為蛇，老鈴下為烏，此本皆人，何化之微賤乎？為見於爻象，出君意乎？」輅言：「苟非性與天道，何由背爻象而任胸心者乎？夫萬物之化，無有常形，人之變異，無有常體，或大為小，或小為大，固無優劣。夫萬物之化，一例之道也。是以夏鯀，天子之父，趙王如意，漢祖之子，而鯀為黃熊，如意為蒼狗，斯亦至尊之位而為黔喙之類也。況者協辰巳之位，烏者棲太陽之精，此乃騰黑之明象，白日之流景，如書佐、鈴下，各以微軀化為蛇、烏，不亦過乎！」
- id: wei.29.p38.a1
  anchor: wei.29.p38
  at: 136
  length: 0
  type: pei
  text: 輅別傳曰：經欲使輅卜，而有疑難之言，輅笑而咎之曰：「君侯州里達人，何言之鄙！昔司馬季主有言，夫卜者必法天地，象四時，順仁義。伏羲作八卦，周文王三百八十四爻，而天下治。病者或以愈，且死或以生，患或以免，事或以成，嫁女娶妻或以生長，豈直數千錢哉？以此推之，急務也。苟道之明，聖賢不讓，況吾小人，敢以為難！」彥緯斂手謝輅：「前言戲之耳。」於是輅為作卦，其言皆驗。經每論輅，以為得龍雲之精，能養和通幽者，非徒合會之才也。
- id: wei.29.p39.a1
  anchor: wei.29.p39
  at: 97
  length: 0
  type: pei
  text: 輅別傳曰：義博從輅學鳥鳴之候，輅言君雖好道，天才既少，又不解音律，恐難為師也。輅為說八風之變，五音之數，以律呂為眾鳥之商，六甲為時日之端，反覆譴曲，出入無窮。義博靜然沈思，馳精數日，卒無所得。義博言：「才不出位，難以追徵於此。」遂止。
- id: wei.29.p40.a1
  anchor: wei.29.p40
  at: 98
  length: 0
  type: pei
  text: 輅別傳曰：勃海劉長仁有辯才，初雖聞輅能曉鳥鳴，後每見難輅曰：「夫生民之音曰言，鳥獸之聲曰鳴，故言者則有知之貴靈，鳴者則無知之賤名，何由以鳥鳴為語，亂神明之所異也？孔子曰『吾不與鳥獸同群』，明其賤也。」輅答曰：「夫天雖有大象而不能言，故運星精於上，流神明於下，驗風雲以表異，役鳥獸以通靈。表異者必有浮沈之候，通靈者必有宮商之應，是以宋襄失德，六鶂並退，伯姬將焚，鳥唱其災，四國未火，融風已發，赤鳥夾日，殃在荊楚。此乃上天之所使，自然之明符。考之律呂則音聲有本，求之人事則吉凶不失。昔在秦祖，以功受封，葛盧聽音，著在春秋，斯皆典謨之實，非聖賢之虛名也。商之將興，由一燕卵也。文王受命，丹鳥銜書，此乃聖人之靈祥，周室之休祚，何賤之有乎？夫鳥鳴之聽，精在鶉火，妙在八神，自非斯倫，猶子路之於死生也。」長仁言：「君辭雖茂，華而不實，未敢之信。」須臾有鳴鵲之驗，長仁乃服。
