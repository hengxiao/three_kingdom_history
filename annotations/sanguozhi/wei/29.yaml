- id: wei.29.p19.a2
  anchor: wei.29.p19
  at: 216
  length: 0
  type: pei
  text: 佗別傳曰：人有在青龍中見山陽太守廣陵劉景宗，景宗說中平日數見華佗，其治病手脈之候，其驗若神。瑯琊劉勛為河內太守，有女年幾二十，左腳膝裡上有瘡，癢而不痛。瘡愈數十日復發，如此七八年，迎佗使視，佗曰：「是易治之。當得稻糠黃色犬一頭，好馬二疋。」以繩繫犬頸，使走馬牽犬，馬極輒易，計馬走三十餘里，犬不能行，復令步人拖曳，計向五十里。乃以藥飲女，女即安臥不知人。因取大刀斷犬腹近後腳之前，以所斷之處向瘡口，令去二三寸。停之須臾，有若蛇者從瘡中而出，便以鐵椎橫貫蛇頭。蛇在皮中動搖良久，須臾不動，乃牽出，長三尺所，純是蛇，但有眼處而無童子，又逆鱗耳。以膏散著瘡中，七日愈。又有人苦頭眩，頭不得舉，目不得視，積年。佗使悉解衣倒懸，令頭去地一二寸，濡布拭身體，令周匝，候視諸脈，盡出五色。佗令弟子數人以鈹刀決脈，五色血盡，視赤血，乃下，以膏摩被覆，汗自出周匝，飲以亭歷犬血散，立愈。又有婦人長病經年，世謂寒熱注病者。冬十一月中，佗令坐石槽中，平旦用寒水汲灌，云當滿百。始七八灌，會戰欲死，灌者懼，欲止。佗令滿數。將至八十灌，熱氣乃蒸出，囂囂高二三尺。滿百灌，佗乃使然火溫床，厚覆，良久汗洽出，著粉，汗燥便愈。又有人病腹中半切痛，十餘日中，鬢眉墮落。佗曰：「是脾半腐，可刳腹養治也。」使飲藥令臥，破腹就視，脾果半腐壞。以刀斷之，刮去惡肉，以膏傅瘡，飲之以藥，百日平復。
- id: wei.29.p20.a1
  anchor: wei.29.p20
  at: 346
  length: 0
  type: pei
  text: 佗別傳曰：青黏者，一名地節，一名黃芝，主理五藏，益精氣。本出於迷入山者，見仙人服之，以告佗。佗以為佳，輒語阿，阿又秘之。近者人見阿之壽而氣力強盛，怪之，遂責阿所服，因醉亂誤道之。法一施，人多服者，皆有大驗。文帝《典論論郤儉等事》曰：「潁川郤儉能辟穀，餌伏苓。甘陵甘始亦善行氣，老有少容。廬江左慈知補導之術。並為軍吏。初，儉之至，巿伏苓價暴數倍。議郎安平李覃學其辟穀，餐伏苓，飲寒水，中洩利，殆至隕命。後始來，眾人無不鴟視狼顧，呼吸吐納。軍謀祭酒弘農董芬為之過差，氣閉不通，良久乃蘇。左慈到，又競受其補導之術，至寺人嚴峻，往從問受。閹豎真無事於斯術也，人之逐聲，乃至於是。光和中，北海王和平亦好道術，自以當仙。濟南孫邕少事之，從至京師。會和平病死，邕因葬之東陶，有書百餘卷，藥數囊，悉以送之。後弟子夏榮言其屍解。邕至今恨不取其寶書仙藥。劉向惑於鴻寶之說，君遊眩於子政之言，古今愚謬，豈唯一人哉！」東阿王作〈辯道論〉曰：「世有方士，吾王悉所招致，甘陵有甘始，廬江有左慈，陽城有郤儉。始行氣導引，慈曉房中之術，儉善辟穀，悉號三百歲。卒所以集之於魏國者，誠恐斯人之徒，接姦宄以欺眾，行妖慝以惑民，豈復欲觀神仙於瀛洲，求安期於海島，釋金輅而履雲輿，棄六驥而美飛龍哉？自家王與太子及餘兄弟咸以為調笑，不信之矣。然始等知上遇之有恆，奉不過於員吏，賞不加於無功，海島難得而遊，六黻難得而佩，終不敢進虛誕之言，出非常之語。余嘗試郤儉絕穀百日，躬與之寢處，行步起居自若也。夫人不食七日則死，而儉乃如是。然不必益壽，可以療疾而不憚饑饉焉。左慈善修房內之術，差可終命，然自非有志至精，莫能行也。甘始者，老而有少容，自諸術士咸共歸之。然始辭繁寡實，頗有怪言。余常辟左右，獨與之談，問其所行，溫顏以誘之，美辭以導之，始語余：『吾本師姓韓字世雄，嘗與師於南海作金，前後數四，投萬斤金於海。』又言：『諸梁時，西域胡來獻香罽、腰帶、割玉刀，時悔不取也。』又言：『車師之西國。兒生，擘背出脾，欲其食少而弩行也。』又言：『取鯉魚五寸一雙，合其一煮藥，俱投沸膏中，有藥者奮尾鼓鰓，遊行沉浮，有若處淵，其一者已熟而可啖。』余時問：『言率可試不？』言：『是藥去此逾萬里，當出塞；始不自行不能得也。』言不盡於此，頗難悉載，故粗舉其巨怪者。始若遭秦始皇、漢武帝，則復為徐巿、欒大之徒也。」
