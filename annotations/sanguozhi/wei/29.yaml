  at: 185
  length: 0
  type: pei
  text: 輅別傳曰：輅與倪清河相見，既刻雨期，倪猶未信。輅曰：「夫造化之所以為神，不疾而速，不行而至。十六日壬子，直滿，畢星中已有水氣，水氣之發，動於卯辰，此必至之應也。又天昨檄召五星，宣布星符，刺下東井，告命南箕，使召雷公、電母、風伯、雨師，群岳吐陰，眾川激精，雲漢垂澤，蛟龍含靈，堃堃硃電，吐咀杳冥，殷殷雷聲，噓吸雨靈，習習谷風，六合皆同，欬唾之間，品物流形。天有常期，道有自然，不足為難也。」倪曰：「譚高信寡，相為憂之。」於是便留輅，往請府丞及清河令。若夜雨者當為啖二百斤犢肉，若不雨當住十日。輅曰：「言念費損！」至日向暮，了無雲氣，眾人並嗤輅。輅言：「樹上已有少女微風，樹間又有陰鳥和鳴。又少男風起，眾鳥和翔，其應至矣。」須臾，果有艮風鳴鳥。日未入，東南有山雲樓起。黃昏之後，雷聲動天。到鼓一中，星月皆沒，風雲並興，玄氣四合，大雨河傾。倪調輅言：「誤中耳，不為神也。」輅曰：「誤中與天期，不亦工乎！」
