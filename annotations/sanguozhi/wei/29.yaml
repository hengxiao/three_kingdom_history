  type: pei
  text: 佗別傳曰：有人病兩腳躄不能行，轝詣佗，佗望見云：「己飽針灸服藥矣，不復須看脈。」便使解衣，點背數十處，相去或一寸，或五寸，縱邪不相當。言灸此各十壯，灸創愈即行。後灸處夾脊一寸，上下行端直均調，如引繩也。
