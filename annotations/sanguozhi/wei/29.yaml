  type: pei
  text: 輅別傳云：魏郡太守鍾毓，清逸有才，難輅易二十餘事，自以為難之至精也。輅尋聲投響，言無留滯，分張爻象，義皆殊妙。毓即謝輅。輅卜知毓生日月，毓愕然曰：「聖人運神通化，連屬事物，何聰明乃爾！」輅言：「幽明同化，死生一道，悠悠太極，終而復始。文王損命，不以為憂，仲尼曳杖，不以為懼，緒煩蓍筮，宜盡其意。」毓曰：「生者好事，死者惡事，哀樂之分，吾所不能齊，且以付天，不以付君也。」石苞為鄴典農，與輅相見，問曰：「聞君鄉里翟文耀能隱形，其事可信乎？」輅言：「此但陰陽蔽匿之數，苟得其數，則四岳可藏，河海可逃。況以七尺之形，遊變化之內，散雲霧以幽身，布金水以滅跡，術足數成，不足為難。」苞曰：「欲聞其妙，君且善論其數也。」輅言：「夫物不精不為神，數不妙不為術，故精者神之所合，妙者智之所遇，合之幾微，可以性通，難以言論。是故魯班不能說其手，離硃不能說其目。非言之難，孔子曰『書不盡言』，言之細也，『言不盡意』，意之微也，斯皆神妙之謂也。請舉其大體以驗之。夫白日登天，運景萬里，無物不照，及其入地，一炭之光，不可得見。三五盈月，清耀燭夜，可以遠望，及其在晝，明不如鏡。今逃日月者必陰陽之數，陰陽之數通於萬類，鳥獸猶化，況於人乎！夫得數者妙，得神者靈，非徒生者有驗，死亦有徵。是以杜伯乘火氣以流精，彭生託水變以立形。是故生者能出亦能入，死者能顯亦能幽，此物之精氣，化之遊魂，人鬼相感，數使之然也。」苞曰：「目見陰陽之理，不過於君，君何以不隱？」輅曰：「夫陵虛之鳥，愛其清高，不原江、漢之魚；淵沼之魚，樂其濡濕，不易騰風之鳥：由性異而分不同也。僕自欲正身以明道，直己以親義，見數不以為異，知術不以為奇，夙夜研幾，孳孳溫故，而素隱行怪，未暇斯務也。」
- id: wei.29.p48.a1
  anchor: wei.29.p48
  at: 161
  length: 0
  type: pei
  text: 輅別傳曰：故郡將劉邠字令元，清和有思理，好易而不能精。與輅相見，意甚喜歡，自說注易向訖也。輅言：「今明府欲勞不世之神，經緯大道，誠富美之秋。然輅以為註易之急，急於水火；水火之難，登時之驗，易之清濁，延於萬代，不可不先定其神而後垂明思也。自旦至今，聽採聖論，未有易之一分，易安可注也！輅不解古之聖人，何以處乾位於西北，坤位於西南。夫乾坤者天地之象，然天地至大，為神明君父，覆載萬物，生長無首，何以安處二位與六卦同列？乾之象彖曰：『大哉乾元，萬物資始，乃統天。』夫統者，屬也，尊莫大焉，何由有別位也？」邠依易係詞，諸為之理以為註，不得其要。輅尋聲下難，事皆窮析。曰：「夫乾坤者，易之祖宗，變化之根源，今明府論清濁者有疑，疑則無神，恐非注易之符也。」輅於此為論八卦之道及爻象之精，大論開廓，眾化相連。邠所解者，皆以為妙，所不解者，皆以為神。自說：「欲注易八年，用思勤苦，歷載靡寧，定相得至論，此才不及易，不愛久勞，喜承雅言，如此相為高枕偃息矣。」欲從輅學射覆，輅言：「今明府以虛神於注易，亦宜絕思於靈蓍。靈蓍者，二儀之明數，陰陽之幽契，施之於道則定天下吉凶，用之於術則收天下豪纖。纖微，未可以為易也。」邠曰：「以為術者易之近數，欲求其端耳。若如來論，何事於斯？」留輅五日，不遑卹官，但共清譚。邠自言：「數與何平叔論易及老、莊之道，至於精神遐流，與化周旋，清若金水，鬱若山林，非君侶也。」邠又曰：「此郡官舍，連有變怪，變怪多形，使人怖恐，君似當達此數者，其理何由也。」輅言：「此郡所以名平原者，本有原，山無木石，與地自然；含陰不能吐雲，含陽不能激風，陰陽雖弱，猶有微神；微神不真，多聚凶姦，以類相求，魍魎成群。或因漢末兵馬擾攘，軍屍流血，汙染丘岳，強魂相感，變化無常，故因昏夕之時，多有怪形也。昔夏禹文明，不怪於黃龍，周武信時，不惑於暴風，今明府道德高妙，神不懼妖，自天祐之，吉無不利，原安百祿以光休寵也。」邠曰：「聽雅論為近其理，每有變怪，輒聞鼓角聲音，或見弓劍形象。夫以土山之精，伯有之魂，實能合會，干犯明靈也。」邠問輅：「易言剛健篤實，輝光日新，斯為同不？」輅曰：「不同之名，朝旦為輝，日中為光。」晉諸公贊曰：邠本名炎，犯晉太子諱，改為邠。位至太子僕。子粹，字純嘏，侍中。次宏，字終嘏，太常。次漢，字仲嘏，光祿大夫。漢清衝有貴識，名亞樂廣。宏子咸，徐州刺吏。次耽，晉陵內史。耽子恢，字真長，尹丹楊，為中興名士也。
- id: wei.29.p49.a1
  anchor: wei.29.p49
  at: 127
  length: 0
  type: pei
  text: 輅別傳曰：清河令徐季龍，字開明，有才機。與輅相見，共論龍動則景雲起，虎嘯則谷風至，以為火星者龍，參星者虎，火出則雲應，參出則風到，此乃陰陽之感化，非龍虎之所致也。輅言：「夫論難當先審其本，然後求其理，理失則機謬，機謬則榮辱之主。若以參星為虎，則谷風更為寒霜之風，寒霜之風非東風之名。是以龍者陽精，以潛為陰，幽靈上通，和氣感神，二物相扶，故能興云。夫虎者，陰精而居於陽，依木長嘯，動於巽林，二氣相感，故能運風。若磁石之取鐵，不見其神而金自來，有徵應以相感也。況龍有潛飛之化，虎有文明之變，招雲召風，何足為疑？」季龍言：「夫龍之在淵，不過一井之底，虎之悲嘯，不過百步之中，形氣淺弱，所通者近，何能𣿖景雲而馳東風？」輅言：「君不見陰陽燧在掌握之中，形不出手，乃上引太陽之火，下引太陰之水，噓吸之間，煙景以集。苟精氣相感，縣象應乎二燧；苟不相感，則二女同居，志不相得。自然之道，無有遠近。」季龍言：「世有軍事，則感雞雉先鳴，其道何由？復有他佔，惟在雞雉而巳？」輅言：「貴人有事，其應在天，在天則日月星辰也。兵動民憂，其應在物，在物則山林鳥獸也。夫雞者兌之畜，金者兵之精，雉者離之鳥，獸者武之神，故太白揚輝則雞鳴，熒惑流行則雉驚，各感數而動。又兵之神道，佈在六甲，六甲推移，其占無常。是以晉柩牛呴，果有西軍，鴻嘉石鼓，鳴則有兵，不專近在於雞雉也。」季龍言：「魯昭公八年，有石言於晉，師曠以為作事不時，怨讟動於民，則有非言之物而言，於理為合不？」輅言：「晉平奢泰，崇飾宮室，斬伐林木，殘破金石，民力既盡，怨及山澤，神痛人感，二精並作，金石同氣，則兌為口舌，口舌之妖，動於靈石。傳曰輕百姓，飾城郭，則金不從革，此之謂也。」季龍欽嘉，留輅經數日。輅佔獵既驗，季龍曰：「君雖神妙，但不多藏物耳，何能皆得之？」輅言：「吾與天地參神，蓍龜通靈，抱日月而遊杳冥，極變化而覽未然，況茲近物，能蔽聰明？」季龍大笑，「君既不謙，又念窮在近矣。」輅言：「君尚未識謙言，焉能論道？夫天地者則乾坤之卦，蓍龜者則卜筮之數，日月者離坎之象，變化者陰陽之爻，杳冥者神化之源，未然者則幽冥之先，此皆周易之紀綱，何僕之不謙？」季龍於是取十三種物，欲以窮之，輅射之皆中。季龍乃歎曰：「作者之謂聖，述者之謂明，豈此之謂乎！」
