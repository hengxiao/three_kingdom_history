- id: wei.29.p46.a2
  anchor: wei.29.p46
  at: 391
  length: 0
  type: pei
  text: 輅別傳曰：輅為何晏所請，果共論易九事，九事皆明。晏曰：「君論陰陽，此世無雙。」時鄧颺與晏共坐，颺言：「君見謂善易，而語初不及易中辭義，何故也？」輅尋聲答之曰：「夫善易者不論易也。」晏含笑而讚之「可謂要言不煩也」。因請輅為卦。輅既稱引鑑戒，晏謝之曰：「知幾其神乎，古人以為難；交疏而吐其誠，今人以為難。今君一面而盡二難之道，可謂明德惟馨。詩不云乎，『中心藏之，何日忘之』！」
- id: wei.29.p46.a3
  anchor: wei.29.p46
  at: 468
  length: 0
  type: pei
  text: 輅別傳曰：舅夏大夫問輅：「前見何、鄧之日，為已有凶氣未也？」輅言：「與禍人共會，然後知神明交錯；與吉人相近，又知聖賢求精之妙。夫鄧之行步，則筋不束骨，脈不制肉，起立傾倚，若無手足，謂之鬼躁。何之視候，則魂不守宅，血不華色，精爽煙浮，容若槁木，謂之鬼幽。故鬼躁者為風所收，鬼幽者為火所燒，自然之符，不可以蔽也。」輅後因得休，裴使君問：「何平叔一代才名，其實何如？」輅曰：「其才若盆盎之水，所見者清，所不見者濁。神在廣博，志不務學，弗能成才。欲以盆盎之水，求一山之形，形不可得，則智由此惑。故說老、莊則巧而多華，說易生義則美而多偽；華則道浮，偽則神虛；得上才則淺而流絕，得中才則遊精而獨出，輅以為少功之才也。」裴使君曰：「誠如來論。吾數與平叔共說老、莊及易，常覺其辭妙於理，不能折之。又時人吸習，皆歸服之焉，益令不了。相見得清言，然後灼灼耳。」
