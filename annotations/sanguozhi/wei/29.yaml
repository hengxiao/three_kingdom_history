  at: 72
  length: 0
  type: pei
  text: 輅別傳曰：輅為華清河所召，為北黌文學，一時士友無不嘆慕。安平趙孔曜，明敏有思識，與輅有管、鮑之分，故從發干來，就郡黌上與輅相見，言：「卿腹中汪汪，故時死人半，今生人無雙，當去俗騰飛，翱翔昊蒼，云何在此？聞卿消息，使吾食不甘味也。冀州裴使君才理清明，能釋玄虛，每論易及老、莊之道，未嘗不注精於嚴、瞿之徒也。又眷吾意重，能相明信者。今當故往，為卿陳感虎開石之誠。」輅言：「吾非四淵之龍，安能使白日晝陰？卿若能動東風、興朝雲，吾志所不讓也。」於是遂至冀州見裴使君。使君言：「君顏色何以消減故邪？」孔曜言：「體中無藥石之疾，然見清河郡內有一騏驥，拘縶後厩歷年，去王良、伯樂百八十里，不得騁天骨，起風塵，以此憔悴耳。」使君言：「騏驥今何在也？」孔曜言：「平原管輅字公明，年三十六，雅性寬大，與世無忌，可謂士雄。仰觀天文則能同妙甘公、石申，俯覽周易則能思齊季主，遊步道術，開神無窮，可謂士英。抱荊山之璞，懷夜光之寶，而為清河郡所錄北黌文學，可為痛心疾首也。使君方欲流精九皋，垂神幽藪，欲令明主不獨治，逸才不久滯，高風遐被，莫不草靡，宜使輅特蒙陰和之應，得及羽儀之時，必能翼宣隆化，揚聲九圍也。」裴使君聞言，則慷慨曰：「何乃爾邪！雖在大州，未見異才可用釋人鬱悶者，思還京師，得共論道耳，況草間自有清妙之才乎？如此便相為取之，莫使騏驥更為凡馬，荊山反成凡石。」即檄召輅為文學從事。一相見，清論終日，不覺罷倦。天時大熱，移床在庭前樹下，乃至雞向晨，然後出。再相見，便轉為鉅鹿從事。三見，轉治中。四見，轉為別駕。至十月，舉為秀才。輅辭裴使君，使君言：「（丁）、鄧二尚書，有經國才略，於物理不精也。何尚書神明精微，言皆巧妙，巧妙之志，殆破秋毫，君當慎之！自言不解易九事，必當以相問。比至洛，宜善精其理也。」輅言：「何若巧妙，以攻難之才，遊形之表，未入於神。夫入神者，當步天元，推陰陽，探玄虛，極幽明，然後覽道無窮，未暇細言。若欲差次老、莊而參爻、象，愛微辯而興浮藻，可謂射侯之巧，非能破秋毫之妙也。若九事皆至義者，不足勞思也。若陰陽者，精之以久。輅去之後，歲朝當有時刑大風，風必摧破樹木。若發於乾者，必有天威，不足共清譚者。」
