  type: pei
  text: 輅別傳曰：鮑子春為列人令，有明思才理，與輅相見，曰：「聞君為劉奉林卜婦死亡日，何其詳妙，試為論其意義。」輅論爻象之旨，說變化之義，若規圓矩方，無不合也。子春自言：「吾少好譚易，又喜分蓍，可謂盲者欲視白黑，聾者欲聽清濁，苦而無功也。聽君語後，自視體中，真為憒憒者也。」
