  text: 輅別傳曰：輅年八九歲，便喜仰視星辰，得人輒問其名，夜不肯寐。父母常禁之，猶不可止。自言「我年雖小，然眼中喜視天文。」常云：「家雞野鵠，猶尚知時，況於人乎？」與鄰比兒共戲土壤中，輒畫地作天文及日月星辰。每答言說事，語皆不常，宿學耆人不能折之，皆知其當有大異之才。及成人，果明周易，仰觀、風角、佔、相之道，無不精微。體性寬大，多所含受；憎己不讎，愛己不褒，每欲以德報怨。常謂：「忠孝信義，人之根本，不可不厚；廉介細直，士之浮飾，不足為務也。」自言：「知我者稀，則我貴矣，安能斷江、漢之流，為激石之清？樂與季主論道，不欲與漁父同舟，此吾志也。」其事父母孝，篤兄弟，順愛士友，皆仁和發中，終無所闕。臧否之士，晚亦服焉。父為琅邪即丘長，時年十五，來至官舍讀書。始讀詩、論語及易本，便開淵布筆，辭義斐然。於時黌上有遠方及國內諸生四百餘人，皆服其才也。琅邪太守單子春雅有材度，聞輅一黌之俊，欲得見，輅父即遣輅造之。大會賓客百餘人，坐上有能言之士，輅問子春：「府君名士，加有雄貴之姿，輅既年少，膽未堅剛，若欲相觀，懼失精神，請先飲三升清酒，然後言之。」子春大喜，便酌三升清酒，獨使飲之。酒盡之後，問子春：「今欲與輅為對者，若府君四坐之士邪？」子春曰：「吾欲自與卿旗鼓相當。」輅言：「始讀詩、論、易本，學問微淺，未能上引聖人之道，陳秦、漢之事，但欲論金木水火土鬼神之情耳。」子春言：「此最難者，而卿以為易邪？」於是唱大論之端，遂經於陰陽，文采葩流，枝葉橫生，少引聖籍，多發天然。子春及眾士互共攻劫，論難鋒起，而輅人人答對，言皆有餘。至日向暮，酒食不行。子春語眾人曰：「此年少盛有才器，聽其言論，正似司馬犬子遊獵之賦，何其磊落雄壯，英神以茂，必能明天文地理變化之數，不徒有言也。」於是發聲徐州，號之神童。
- id: wei.29.p34.a1
  anchor: wei.29.p34
  at: 108
  length: 0
  type: pei
  text: 輅別傳曰：利漕民郭恩，字義博，有才學，善周易、春秋，又能仰觀。輅就義博讀易，數十日中，意便開發，言難逾師。於此分蓍下卦，用思精妙，佔黌上諸生疾病死亡貧富喪衰，初無差錯，莫不驚怪，謂之神人也。又從義博學仰觀，三十日中通夜不臥，語義博：「君但相語墟落處所耳，至於推運會，論災異，自當出吾天分。」學未一年，義博反從輅問易及天文事要。義博每聽輅語，未嘗不推幾慷慨。自言「登聞君至論之時，忘我篤疾，明闇之不相逮，何其遠也」！義博設主人，獨請輅，具告辛苦，自說：「兄弟三人俱得躄疾，不知何故？試相為作卦，知其所由。若有咎殃者，天道赦人，當為吾祈福於神明，勿有所愛。兄弟俱行，此為更生。」輅便作卦，思之未詳。會日夕，因留宿，至中夜，語義博曰：「吾以此得之。」既言其事，義博悲涕沾衣，曰：「皇漢之末，實有斯事。君不名主，諱也。我不得言，禮也。兄弟躄來三十餘載，腳如棘子，不可復治，但原不及子孫耳。」輅言火形不絕，水形無餘，不及後也。
