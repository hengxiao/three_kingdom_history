  type: pei
  text: 《傅子》曰：太祖欲速征劉備，議者懼軍出，袁紹擊其後，進不得戰而退失所據。語在《武紀》。太祖疑，以問嘉。嘉勸太祖曰：「紹性遲而多疑，來必不速。備新起，眾心未附，急擊之必敗。此存亡之機，不可失也。」太祖曰：「善。」遂東征備。備敗奔紹，紹果不出。臣松之案武紀，決計征備，量紹不出，皆出自太祖。此云用嘉計，則為不同。又本傳稱（自）嘉料孫策輕佻，必死於匹夫之手，誠為明於見事。然自非上智，無以知其死在何年也。今正以襲許年死，此蓋事之偶合。
