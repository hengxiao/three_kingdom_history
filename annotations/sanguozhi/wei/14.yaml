  text: 司馬彪《戰略》曰：太和六年，明帝遣平州刺史田豫乘海渡，幽州刺史王雄陸道，並攻遼東。蔣濟諫曰：「凡非相吞之國，不侵叛之臣，不宜輕伐。伐之而不制，是驅使為賊。故曰『虎狼當路，不治狐狸。先除大害，小害自已』。今海表之地，累世委質，歲選計考，不乏職貢。議者先之，正使一舉便克，得其民不足益國，得其財不足為富；儻不如意，是為結怨失信也。」帝不聽，豫行竟無成而還。
- id: wei.14.p73.a1
  anchor: wei.14.p73
  at: 16
  length: 0
  type: pei
  text: 《漢晉春秋》曰：公孫淵聞魏將來討，復稱臣於孫權，乞兵自救。帝問濟：「孫權其救遼東乎？」濟曰：「彼知官備以固，利不可得，深入則非力所能，淺入則勞而無獲；權雖子弟在危，猶將不動，況異域之人，兼以往者之辱乎！今所以外揚此聲者，譎其行人疑於我，我之不克，冀折後事已耳。然沓渚之間，去淵尚遠，若大軍相持，事不速決，則權之淺規，或能輕兵掩襲，未可測也。」
- id: wei.14.p74.a1
  anchor: wei.14.p74
  at: 19
  length: 0
  type: pei
  text: 《列異傳》曰：濟為領軍，其婦夢見亡兒涕泣曰：「死生異路，我生時為卿相子孫，今在地下為泰山伍伯，憔悴困辱，不可復言。今太廟西謳士孫阿，今見召為泰山令，原母為白侯，屬阿令轉我得樂處。」言訖，母忽然驚寤，明日以白濟。濟曰：「夢為爾耳，不足怪也。」明日暮，复夢曰：「我來迎新君，止在廟下。未發之頃，暫得來歸。新君明日日中當發，臨發多事，不復得歸，永辭於此。侯氣強，難感悟，故自訴於母，原重啟侯，何惜不一試驗之？」遂道阿之形狀，言甚備悉。天明，母重啟侯：「雖云夢不足怪，此何太適？適亦何惜不一驗之？」濟乃遣人詣太廟下，推問孫阿，果得之，形狀證驗悉如兒言。濟涕泣曰：「幾負吾兒！」於是乃見孫阿，具語其事。阿不懼當死，而喜得為泰山令，惟恐濟言不信也。曰：「若如節下言，阿之原也。不知賢子欲得何職？」濟曰：「隨地下樂者與之。」阿曰：「輒當奉教。」乃厚賞之，言訖遣還。濟欲速知其驗，從領軍門至廟下，十步安一人，以傳阿消息。辰時傳阿心痛，巳時傳阿劇，日中傳阿亡。濟泣曰：「雖哀吾兒之不幸，且喜亡者有知。」後月餘，兒復來語母曰：「已得轉為錄事矣。」
- id: wei.14.p75.a1
  anchor: wei.14.p75
  at: 48
  length: 0
  type: pei
  text: 臣松之案蔣濟立郊議稱《曹騰碑》文云「曹氏族出自邾」，《魏書》述曹氏胤緒亦如之。魏武作家傳，自云曹叔振鐸之後。故陳思王作武帝誄曰：「於穆武皇，冑稷胤周。」此其不同者也。及至景初，明帝從高堂隆議，謂魏為舜後，後魏為禪晉文，稱「昔我皇祖有虞」，則其異彌甚。尋濟難隆，及與尚書繆襲往反，並有理據，文多不載。濟亦未能定氏族所出，但謂「魏非舜後而橫祀非族，降黜太祖，不配正天，皆為繆妄」。然於時竟莫能正。濟又難：鄭玄注《祭法》云「有虞以上尚德，禘郊祖宗，配用有德，自夏已下，稍用其姓氏。」濟曰：「夫虯龍神於獺，獺自祭其先，不祭虯龍也。騏驎白虎仁於豺，豺自祭其先，不祭騏虎也。如玄之說，有虞已上，豺獺之不若邪？臣以為祭法所云，見疑學者久矣，鄭玄不考正其違而就通其義。」濟豺獺之譬，雖似俳諧，然其義旨，有可求焉。
