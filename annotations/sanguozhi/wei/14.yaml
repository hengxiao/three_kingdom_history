  text: 《傅子》曰：太祖與荀彧書，追傷嘉曰：「郭奉孝年不滿四十，相與周旋十一年，阻險艱難，皆共罹之。又以其通達，見世事無所凝滯，欲以後事屬之，何意卒爾失之，悲痛傷心。今表增其子滿千戶，然何益亡者，追念之感深。且奉孝乃知孤者也；天下人相知者少，又以此痛惜。奈何奈何！」又與彧書曰：「追惜奉孝，不能去心。其人見時事兵事，過絕於人。又人多畏病，南方有疫，常言『吾往南方，則不生還』。然與共論計，云當先定荊。此為不但見計之忠厚，必欲立功分，棄命定。事人心乃爾，何得使人忘之！」
