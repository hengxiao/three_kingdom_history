  type: pei
  text: 《魏略》載昱說太祖曰：「昔田橫，齊之世族，兄弟三人更王，據千里之（齊），擁百萬之眾，與諸侯並南面稱孤。既而高祖得天下，而橫顧為降虜。當此之時，橫豈可為心哉！」太祖曰：「然。此誠丈夫之至辱也。」昱曰：「昱愚，不識大旨，以為將軍之志，不如田橫。田橫，齊一壯士耳，猶羞為高祖臣。今聞將軍欲遣家往鄴，將北面而事袁紹。夫以將軍之聰明神武，而反不羞為袁紹之下，竊為將軍恥之！」其後語與本傳略同。
