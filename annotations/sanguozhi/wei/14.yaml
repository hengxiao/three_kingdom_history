- id: wei.14.p35.a1
  anchor: wei.14.p35
  at: 0
  length: 0
  type: pei
  text: 《獻帝春秋》曰：昭與列侯諸將議，以丞相宜進爵國公，九錫備物，以彰殊勳；書與荀彧曰：「昔周旦、呂望，當姬氏之盛，因二聖之業，輔翼成王之幼，功勳若彼，猶受上爵，錫土開宇。末世田單，驅強齊之眾，報弱燕之怨，收城七十，迎复襄王；襄王加賞於單，使東有掖邑之封，西有菑上之虞。前世錄功，濃厚如此。今曹公遭海內傾覆，宗廟焚滅，躬擐甲胄，周旋征伐，櫛風沐雨，且三十年，芟夷羣凶，為百姓除害，使漢室復存，劉氏奉祀。方之曩者數公，若太山之與丘垤，豈同日而論乎？今徒與列將功臣，並侯一縣，此豈天下所望哉！」
