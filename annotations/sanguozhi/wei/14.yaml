  at: 508
  length: 0
  type: pei
  text: 《魏書》曰：昱少時常夢上泰山，兩手捧日。昱私異之，以語荀彧。及兗州反，賴昱得完三城。於是彧以昱夢白太祖。太祖曰：「卿當終為吾腹心。」昱本名立，太祖乃加其上「日」，更名昱也。
