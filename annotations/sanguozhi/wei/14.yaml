  at: 414
  length: 0
  type: pei
  text: 徐眾評曰：允於曹公，未成君臣。母，至親也，於義應去。昔王陵母為項羽所拘，母以高祖必得天下，因自殺以固陵志。明心無所繫，然後可得成事人盡死之節。衛公子開方仕齊，積年不歸，管仲以為不懷其親，安能愛君，不可以為相。是以求忠臣必於孝子之門，允宜先救至親。徐庶母為曹公所得，劉備乃遣庶歸，欲為天下者恕人子之情也。曹公亦宜遣允。
