- id: wei.14.p61.a1
  anchor: wei.14.p61
  at: 109
  length: 0
  type: pei
  text: 《傅子》曰：曄事明皇帝，又大見親重。帝將伐蜀，朝臣內外皆曰「不可」。曄入與帝議，因曰「可伐」；出與朝臣言，因曰「不可伐」。曄有膽智，言之皆有形。中領軍楊暨，帝之親臣，又重曄，持不可伐蜀之議最堅，每從內出，輒過曄，曄講不可之意。後暨從駕行天淵池，帝論伐蜀事，暨切諫。帝曰：「卿書生，焉知兵事！」暨謙謝曰：「臣出自儒生之末，陛下過聽，拔臣羣萃之中，立之六軍之上，臣有微心，不敢不盡言。臣言誠不足採，侍中劉曄先帝謀臣，常曰蜀不可伐。」帝曰：「曄與吾言蜀可伐。」暨曰：「曄可召質也。」詔召曄至，帝問曄，終不言。後獨見，曄責帝曰：「伐國，大謀也，臣得與聞大謀，常恐瞇夢漏洩以益臣罪，焉敢向人言之？夫兵，詭道也，軍事未發，不厭其密也。陛下顯然露之，臣恐敵國已聞之矣。」於是帝謝之。曄見出，責暨曰：「夫釣者中大魚，則縱而隨之，須可制而後牽，則無不得也。人主之威，豈徒大魚而已！子誠直臣，然計不足採，不可不精思也。」暨亦謝之。曄能應變持兩端如此。或惡曄於帝曰：「曄不盡忠，善伺上意所趨而合之。陛下試與曄言，皆反意而問之，若皆與所問反者，是曄常與聖意合也。复每問皆同者，曄之情必無所逃矣。」帝如言以驗之，果得其情，從此疏焉。曄遂發狂，出為大鴻臚，以憂死。諺曰「巧詐不如拙誠」，信矣。以曄之明智權計，若居之以德義，行之以忠信，古之上賢，何以加諸？獨任才智，不與世士相經緯，內不推心事上，外困於俗，卒不能自安於天下，豈不惜哉！
- id: wei.14.p62.a1
  anchor: wei.14.p62
  at: 18
  length: 0
  type: pei
  text: 《王弼傳》曰：淮南人劉陶，善論縱橫，為當時所推。《傅子》曰：陶字季冶，善名稱，有大辯。曹爽時為選部郎，鄧颺之徒稱之以為伊呂。當此之時，其人意陵青雲，謂玄曰：「仲尼不聖。何以知其然？智者圖國；天下羣愚，如弄一丸於掌中，而不能得天下。」玄以其言大惑，不復詳難也。謂之曰：「天下之質，變無常也。今見卿窮！」爽之敗，退居里舍，乃謝其言之過。干寶《晉紀》曰：毌丘儉之起也，大將軍以問陶，陶答依違。大將軍怒曰：「卿平生與吾論天下事，至於今日而更不盡乎？」乃出為平原太守，又追殺之。
