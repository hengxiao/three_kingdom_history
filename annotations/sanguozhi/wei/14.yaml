- id: wei.14.p4.a1
  anchor: wei.14.p4
  at: 414
  length: 0
  type: pei
  text: 徐眾評曰：允於曹公，未成君臣。母，至親也，於義應去。昔王陵母為項羽所拘，母以高祖必得天下，因自殺以固陵志。明心無所繫，然後可得成事人盡死之節。衛公子開方仕齊，積年不歸，管仲以為不懷其親，安能愛君，不可以為相。是以求忠臣必於孝子之門，允宜先救至親。徐庶母為曹公所得，劉備乃遣庶歸，欲為天下者恕人子之情也。曹公亦宜遣允。
- id: wei.14.p4.a2
  anchor: wei.14.p4
  at: 508
  length: 0
  type: pei
  text: 《魏書》曰：昱少時常夢上泰山，兩手捧日。昱私異之，以語荀彧。及兗州反，賴昱得完三城。於是彧以昱夢白太祖。太祖曰：「卿當終為吾腹心。」昱本名立，太祖乃加其上「日」，更名昱也。
- id: wei.14.p5.a1
  anchor: wei.14.p5
  at: 236
  length: 0
  type: pei
  text: 《魏略》載昱說太祖曰：「昔田橫，齊之世族，兄弟三人更王，據千里之（齊），擁百萬之眾，與諸侯並南面稱孤。既而高祖得天下，而橫顧為降虜。當此之時，橫豈可為心哉！」太祖曰：「然。此誠丈夫之至辱也。」昱曰：「昱愚，不識大旨，以為將軍之志，不如田橫。田橫，齊一壯士耳，猶羞為高祖臣。今聞將軍欲遣家往鄴，將北面而事袁紹。夫以將軍之聰明神武，而反不羞為袁紹之下，竊為將軍恥之！」其後語與本傳略同。
- id: wei.14.p7.a1
  anchor: wei.14.p7
  at: 192
  length: 0
  type: pei
  text: 《魏書》曰：太祖征馬超，文帝留守，使昱參軍事。田銀、蘇伯等反河間，遣將軍賈信討之。賊有千餘人請降，議者皆以為宜如舊法，昱曰：「誅降者，謂在擾攘之時，天下雲起，故圍而後降者不赦，以示威天下，開其利路，使不至於圍也。今天下略定，且在邦域之中，此必降之賊，殺之無所威懼，非前日誅降之意。臣以為不可誅也；縱誅之，宜先啟聞。」眾議者曰：「軍事有專，無請。」昱不答。文帝起入，特引見昱曰：「君有所不盡邪？」昱曰：「凡專命者，謂有臨時之急，呼吸之間者耳。今此賊制在賈信之手，無朝夕之變。故老臣不原將軍行之也。」文帝曰：「君慮之善。」即白太祖，太祖果不誅。太祖還，聞之甚說，謂昱曰：「君非徒明於軍計，又善處人父子之間。」
- id: wei.14.p8.a1
  anchor: wei.14.p8
  at: 109
  length: 0
  type: pei
  text: 《魏書》曰：昱時年八十。世語曰：初，太祖乏食，昱略其本縣，供三日糧，頗雜以人脯，由是失朝望，故位不至公。
- id: wei.14.p9.a1
  anchor: wei.14.p9
  at: 11
  length: 0
  type: pei
  text: 《世語》曰：曉字季明，有通識。
- id: wei.14.p11.a1
  anchor: wei.14.p11
  at: 21
  length: 0
  type: pei
  text: 曉別傳曰：曉大著文章多亡失，今之存者不能十分之一。
- id: wei.14.p12.a1
  anchor: wei.14.p12
  at: 13
  length: 0
  type: pei
  text: 《傅子》曰：嘉少有遠量。漢末天下將亂。自弱冠匿名跡，密交結英雋，不與俗接，故時人多莫知，惟識達者奇之。年二十七，辟司徒府。
- id: wei.14.p13.a1
  anchor: wei.14.p13
  at: 113
  length: 0
  type: pei
  text: 傅子曰：太祖謂嘉曰：「本初擁冀州之眾，青、並從之，地廣兵強，而數為不遜。吾欲討之，力不敵，如何？」對曰：
- id: wei.14.p15.a1
  anchor: wei.14.p15
  at: 47
  length: 0
  type: pei
  text: 《傅子》曰：太祖欲引軍還，嘉曰：「昔項籍七十餘戰，未嘗敗北，一朝失勢而身死國亡者，恃勇無謀故也。今布每戰輒破，氣衰力盡，內外失守。布之威力不及項籍，而困敗過之，若乘勝攻之，此成禽也。」太祖曰：「善。」《魏書》曰：劉備來奔，以為豫州牧。或謂太祖曰：「備有英雄志，今不早圖，後必為患。」太祖以問嘉，嘉曰：「有是。然公提劍起義兵，為百姓除暴，推誠仗信以招俊傑，猶懼其未也。今備有英雄名，以窮歸己而害之，是以害賢為名，則智士將自疑，回心擇主，公誰與定天下？夫除一人之患，以沮四海之望，安危之機，不可不察！」太祖笑曰：「君得之矣。」傅子曰：初，劉備來降，太祖以客禮待之，使為豫州牧。嘉言於太祖曰：「備有雄才而甚得眾心。張飛、關羽者，皆萬人之敵也，為之死用。嘉觀之，備終不為人下，其謀未可測也。古人有言：『一日縱敵，數世之患。』宜早為之所。」是時，太祖奉天子以號令天下，方招懷英雄以明大信，未得從嘉謀。會太祖使備要擊袁術，嘉與程昱俱駕而諫太祖曰：「放備，變作矣！」時備已去，遂舉兵以叛。太祖恨不用嘉之言。案《魏書》所云，與《傅子》正反也。
- id: wei.14.p16.a1
  anchor: wei.14.p16
  at: 127
  length: 0
  type: pei
  text: 《傅子》曰：太祖欲速征劉備，議者懼軍出，袁紹擊其後，進不得戰而退失所據。語在《武紀》。太祖疑，以問嘉。嘉勸太祖曰：「紹性遲而多疑，來必不速。備新起，眾心未附，急擊之必敗。此存亡之機，不可失也。」太祖曰：「善。」遂東征備。備敗奔紹，紹果不出。臣松之案武紀，決計征備，量紹不出，皆出自太祖。此云用嘉計，則為不同。又本傳稱（自）嘉料孫策輕佻，必死於匹夫之手，誠為明於見事。然自非上智，無以知其死在何年也。今正以襲許年死，此蓋事之偶合。
- id: wei.14.p17.a1
  anchor: wei.14.p17
  at: 188
  length: 0
  type: pei
  text: 《傅子》曰：河北既平，太祖多辟召青、冀、幽、并知名之士，漸臣使之，以為省事掾屬。皆嘉之謀也。
- id: wei.14.p21.a1
  anchor: wei.14.p21
  at: 186
  length: 0
  type: pei
  text: 《魏書》載太祖表曰：「臣聞褒忠寵賢，未必當身，念功惟績，恩隆後嗣。是以楚宗孫叔，顯封厥子；岑彭既沒，爵及支庶。故軍祭酒郭嘉，忠良淵淑，體通性達。每有大議，發言盈庭，執中處理，動無遺策。自在軍旅，十有餘年，行同騎乘，坐共幄席，東禽呂布，西取眭固，斬袁譚之首，平朔土之眾，逾越險塞，盪定烏丸，震威遼東，以梟袁尚。雖假天威，易為指麾，至於臨敵，發揚誓命，凶逆克殄，勳實由嘉。方將表顯，短命早終。上為朝廷悼惜良臣，下自毒恨喪失奇佐。宜追增嘉封，並前千戶，褒亡為存，厚往勸來也。」
- id: wei.14.p21.a2
  anchor: wei.14.p21
  at: 195
  length: 0
  type: pei
  text: 《魏書》稱奕通達見理。奕字伯益，見王昶《家誡》。
- id: wei.14.p22.a1
  anchor: wei.14.p22
  at: 34
  length: 0
  type: pei
  text: 《傅子》曰：太祖又云：「哀哉奉孝！痛哉奉孝！惜哉奉孝！」
- id: wei.14.p22.a2
  anchor: wei.14.p22
  at: 73
  length: 0
  type: pei
  text: 《傅子》曰：太祖與荀彧書，追傷嘉曰：「郭奉孝年不滿四十，相與周旋十一年，阻險艱難，皆共罹之。又以其通達，見世事無所凝滯，欲以後事屬之，何意卒爾失之，悲痛傷心。今表增其子滿千戶，然何益亡者，追念之感深。且奉孝乃知孤者也；天下人相知者少，又以此痛惜。奈何奈何！」又與彧書曰：「追惜奉孝，不能去心。其人見時事兵事，過絕於人。又人多畏病，南方有疫，常言『吾往南方，則不生還』。然與共論計，云當先定荊。此為不但見計之忠厚，必欲立功分，棄命定。事人心乃爾，何得使人忘之！」
- id: wei.14.p22.a3
  anchor: wei.14.p22
  at: 94
  length: 0
  type: pei
  text: 《世語》曰：嘉孫敞，字泰中，有才識，位散騎常侍。
- id: wei.14.p35.a1
  anchor: wei.14.p35
  at: 0
  length: 0
  type: pei
  text: 《獻帝春秋》曰：昭與列侯諸將議，以丞相宜進爵國公，九錫備物，以彰殊勳；書與荀彧曰：「昔周旦、呂望，當姬氏之盛，因二聖之業，輔翼成王之幼，功勳若彼，猶受上爵，錫土開宇。末世田單，驅強齊之眾，報弱燕之怨，收城七十，迎复襄王；襄王加賞於單，使東有掖邑之封，西有菑上之虞。前世錄功，濃厚如此。今曹公遭海內傾覆，宗廟焚滅，躬擐甲胄，周旋征伐，櫛風沐雨，且三十年，芟夷羣凶，為百姓除害，使漢室復存，劉氏奉祀。方之曩者數公，若太山之與丘垤，豈同日而論乎？今徒與列將功臣，並侯一縣，此豈天下所望哉！」
- id: wei.14.p44.a1
  anchor: wei.14.p44
  at: 12
  length: 0
  type: pei
  text: 惪音德。
- id: wei.14.p48.a1
  anchor: wei.14.p48
  at: 47
  length: 0
  type: pei
  text: 《傅子》曰：太祖徵曄及蔣濟、胡質等五人，皆揚州名士。每舍亭傳，未曾不講，所以見重；內論國邑先賢、禦賊固守、行軍進退之宜，外料敵之變化、彼我虛實、戰爭之術，夙夜不解。而曄獨臥車中，終不一言。濟怪而問之，曄答曰：「對明主非精神不接，精神可學而得乎？」及見太祖，太祖果問揚州先賢，賊之形勢。四人爭對，待次而言，再見如此，太祖每和悅，而曄終不一言。四人笑之。後一見太祖止無所復問，曄乃設遠言以動太祖，太祖適知便止。若是者三。其旨趣以為遠言宜徵精神，獨見以盡其機，不宜於猥坐說也。太祖已探見其心矣，坐罷，尋以四人為令，而授曄以心腹之任；每有疑事，輒以函問曄，至一夜數十至耳。
- id: wei.14.p51.a1
  anchor: wei.14.p51
  at: 5
  length: 0
  type: pei
  text: 《傅子》曰：居七日，蜀降者說：「蜀中一日數十驚，備雖斬之而不能安也。」太祖延問曄曰：「今尚可擊不？」曄曰：「今已小定，未可擊也。」
- id: wei.14.p51.a2
  anchor: wei.14.p51
  at: 125
  length: 0
  type: pei
  text: 《傅子》曰：初，太祖時，魏諷有重名，自卿相以下皆傾心交之。其後孟達去劉備歸文帝，論者多稱有樂毅之量。曄一見諷、達而皆云必反，卒如其言。
- id: wei.14.p52.a1
  anchor: wei.14.p52
  at: 299
  length: 0
  type: pei
  text: 《傅子》曰：孫權遣使求降，帝以問曄。曄對曰：
- id: wei.14.p55.a1
  anchor: wei.14.p55
  at: 0
  length: 0
  type: pei
  text: 又不從。遂即拜權為吳王。權將陸議大敗劉備，殺其兵八萬餘人，備僅以身免。權外禮愈卑，而內行不順，果如曄言。
- id: wei.14.p61.a1
  anchor: wei.14.p61
  at: 109
  length: 0
  type: pei
  text: 《傅子》曰：曄事明皇帝，又大見親重。帝將伐蜀，朝臣內外皆曰「不可」。曄入與帝議，因曰「可伐」；出與朝臣言，因曰「不可伐」。曄有膽智，言之皆有形。中領軍楊暨，帝之親臣，又重曄，持不可伐蜀之議最堅，每從內出，輒過曄，曄講不可之意。後暨從駕行天淵池，帝論伐蜀事，暨切諫。帝曰：「卿書生，焉知兵事！」暨謙謝曰：「臣出自儒生之末，陛下過聽，拔臣羣萃之中，立之六軍之上，臣有微心，不敢不盡言。臣言誠不足採，侍中劉曄先帝謀臣，常曰蜀不可伐。」帝曰：「曄與吾言蜀可伐。」暨曰：「曄可召質也。」詔召曄至，帝問曄，終不言。後獨見，曄責帝曰：「伐國，大謀也，臣得與聞大謀，常恐瞇夢漏洩以益臣罪，焉敢向人言之？夫兵，詭道也，軍事未發，不厭其密也。陛下顯然露之，臣恐敵國已聞之矣。」於是帝謝之。曄見出，責暨曰：「夫釣者中大魚，則縱而隨之，須可制而後牽，則無不得也。人主之威，豈徒大魚而已！子誠直臣，然計不足採，不可不精思也。」暨亦謝之。曄能應變持兩端如此。或惡曄於帝曰：「曄不盡忠，善伺上意所趨而合之。陛下試與曄言，皆反意而問之，若皆與所問反者，是曄常與聖意合也。复每問皆同者，曄之情必無所逃矣。」帝如言以驗之，果得其情，從此疏焉。曄遂發狂，出為大鴻臚，以憂死。諺曰「巧詐不如拙誠」，信矣。以曄之明智權計，若居之以德義，行之以忠信，古之上賢，何以加諸？獨任才智，不與世士相經緯，內不推心事上，外困於俗，卒不能自安於天下，豈不惜哉！
- id: wei.14.p62.a1
  anchor: wei.14.p62
  at: 18
  length: 0
  type: pei
  text: 《王弼傳》曰：淮南人劉陶，善論縱橫，為當時所推。《傅子》曰：陶字季冶，善名稱，有大辯。曹爽時為選部郎，鄧颺之徒稱之以為伊呂。當此之時，其人意陵青雲，謂玄曰：「仲尼不聖。何以知其然？智者圖國；天下羣愚，如弄一丸於掌中，而不能得天下。」玄以其言大惑，不復詳難也。謂之曰：「天下之質，變無常也。今見卿窮！」爽之敗，退居里舍，乃謝其言之過。干寶《晉紀》曰：毌丘儉之起也，大將軍以問陶，陶答依違。大將軍怒曰：「卿平生與吾論天下事，至於今日而更不盡乎？」乃出為平原太守，又追殺之。
- id: wei.14.p70.a1
  anchor: wei.14.p70
  at: 64
  length: 0
  type: pei
  text: 司馬彪《戰略》曰：太和六年，明帝遣平州刺史田豫乘海渡，幽州刺史王雄陸道，並攻遼東。蔣濟諫曰：「凡非相吞之國，不侵叛之臣，不宜輕伐。伐之而不制，是驅使為賊。故曰『虎狼當路，不治狐狸。先除大害，小害自已』。今海表之地，累世委質，歲選計考，不乏職貢。議者先之，正使一舉便克，得其民不足益國，得其財不足為富；儻不如意，是為結怨失信也。」帝不聽，豫行竟無成而還。
- id: wei.14.p73.a1
  anchor: wei.14.p73
  at: 16
  length: 0
  type: pei
  text: 《漢晉春秋》曰：公孫淵聞魏將來討，復稱臣於孫權，乞兵自救。帝問濟：「孫權其救遼東乎？」濟曰：「彼知官備以固，利不可得，深入則非力所能，淺入則勞而無獲；權雖子弟在危，猶將不動，況異域之人，兼以往者之辱乎！今所以外揚此聲者，譎其行人疑於我，我之不克，冀折後事已耳。然沓渚之間，去淵尚遠，若大軍相持，事不速決，則權之淺規，或能輕兵掩襲，未可測也。」
- id: wei.14.p74.a1
  anchor: wei.14.p74
  at: 19
  length: 0
  type: pei
  text: 《列異傳》曰：濟為領軍，其婦夢見亡兒涕泣曰：「死生異路，我生時為卿相子孫，今在地下為泰山伍伯，憔悴困辱，不可復言。今太廟西謳士孫阿，今見召為泰山令，原母為白侯，屬阿令轉我得樂處。」言訖，母忽然驚寤，明日以白濟。濟曰：「夢為爾耳，不足怪也。」明日暮，复夢曰：「我來迎新君，止在廟下。未發之頃，暫得來歸。新君明日日中當發，臨發多事，不復得歸，永辭於此。侯氣強，難感悟，故自訴於母，原重啟侯，何惜不一試驗之？」遂道阿之形狀，言甚備悉。天明，母重啟侯：「雖云夢不足怪，此何太適？適亦何惜不一驗之？」濟乃遣人詣太廟下，推問孫阿，果得之，形狀證驗悉如兒言。濟涕泣曰：「幾負吾兒！」於是乃見孫阿，具語其事。阿不懼當死，而喜得為泰山令，惟恐濟言不信也。曰：「若如節下言，阿之原也。不知賢子欲得何職？」濟曰：「隨地下樂者與之。」阿曰：「輒當奉教。」乃厚賞之，言訖遣還。濟欲速知其驗，從領軍門至廟下，十步安一人，以傳阿消息。辰時傳阿心痛，巳時傳阿劇，日中傳阿亡。濟泣曰：「雖哀吾兒之不幸，且喜亡者有知。」後月餘，兒復來語母曰：「已得轉為錄事矣。」
- id: wei.14.p75.a1
  anchor: wei.14.p75
  at: 48
  length: 0
  type: pei
  text: 臣松之案蔣濟立郊議稱《曹騰碑》文云「曹氏族出自邾」，《魏書》述曹氏胤緒亦如之。魏武作家傳，自云曹叔振鐸之後。故陳思王作武帝誄曰：「於穆武皇，冑稷胤周。」此其不同者也。及至景初，明帝從高堂隆議，謂魏為舜後，後魏為禪晉文，稱「昔我皇祖有虞」，則其異彌甚。尋濟難隆，及與尚書繆襲往反，並有理據，文多不載。濟亦未能定氏族所出，但謂「魏非舜後而橫祀非族，降黜太祖，不配正天，皆為繆妄」。然於時竟莫能正。濟又難：鄭玄注《祭法》云「有虞以上尚德，禘郊祖宗，配用有德，自夏已下，稍用其姓氏。」濟曰：「夫虯龍神於獺，獺自祭其先，不祭虯龍也。騏驎白虎仁於豺，豺自祭其先，不祭騏虎也。如玄之說，有虞已上，豺獺之不若邪？臣以為祭法所云，見疑學者久矣，鄭玄不考正其違而就通其義。」濟豺獺之譬，雖似俳諧，然其義旨，有可求焉。
- id: wei.14.p78.a1
  anchor: wei.14.p78
  at: 159
  length: 0
  type: pei
  text: 孫盛曰：蔣濟之辭邑，可謂不負心矣。語曰「不為利回，不為義疚」，蔣濟其有焉。
- id: wei.14.p78.a2
