  type: pei
  text: 《魏書》載太祖表曰：「臣聞褒忠寵賢，未必當身，念功惟績，恩隆後嗣。是以楚宗孫叔，顯封厥子；岑彭既沒，爵及支庶。故軍祭酒郭嘉，忠良淵淑，體通性達。每有大議，發言盈庭，執中處理，動無遺策。自在軍旅，十有餘年，行同騎乘，坐共幄席，東禽呂布，西取眭固，斬袁譚之首，平朔土之眾，逾越險塞，盪定烏丸，震威遼東，以梟袁尚。雖假天威，易為指麾，至於臨敵，發揚誓命，凶逆克殄，勳實由嘉。方將表顯，短命早終。上為朝廷悼惜良臣，下自毒恨喪失奇佐。宜追增嘉封，並前千戶，褒亡為存，厚往勸來也。」
- id: wei.14.p21.a2
  anchor: wei.14.p21
  at: 195
  length: 0
  type: pei
  text: 《魏書》稱奕通達見理。奕字伯益，見王昶《家誡》。
