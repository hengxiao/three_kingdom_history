  at: 192
  length: 0
  type: pei
  text: 《魏書》曰：太祖征馬超，文帝留守，使昱參軍事。田銀、蘇伯等反河間，遣將軍賈信討之。賊有千餘人請降，議者皆以為宜如舊法，昱曰：「誅降者，謂在擾攘之時，天下雲起，故圍而後降者不赦，以示威天下，開其利路，使不至於圍也。今天下略定，且在邦域之中，此必降之賊，殺之無所威懼，非前日誅降之意。臣以為不可誅也；縱誅之，宜先啟聞。」眾議者曰：「軍事有專，無請。」昱不答。文帝起入，特引見昱曰：「君有所不盡邪？」昱曰：「凡專命者，謂有臨時之急，呼吸之間者耳。今此賊制在賈信之手，無朝夕之變。故老臣不原將軍行之也。」文帝曰：「君慮之善。」即白太祖，太祖果不誅。太祖還，聞之甚說，謂昱曰：「君非徒明於軍計，又善處人父子之間。」
