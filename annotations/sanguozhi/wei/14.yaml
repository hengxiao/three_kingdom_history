  text: 資別傳曰：資字彥龍。幼而岐嶷，三歲喪二親，長於兄嫂。講業太學，博覽傳記，同郡王允一見而奇之。太祖為司空，又辟資。會兄為鄉人所害，資手刃報讎，乃將家屬避地河東，故遂不應命。尋復為本郡所命，以疾辭。友人河東賈逵謂資曰：「足下抱逸羣之才，值舊邦傾覆，主將殷勤，千里延頸，宜崇古賢桑梓之義。而久盤桓，拒違君命，斯猶曜和璧於秦王之庭，而塞以連城之價耳。竊為足下不取也！」資感其言，遂往應之。到署功曹，舉計吏。尚書令荀彧見資，歎曰：「北州承喪亂已久，謂其賢智零落，今日乃復見孫計君乎！」表留以為尚書郎。辭以家難，得還河東。
