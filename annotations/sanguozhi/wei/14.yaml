  type: pei
  text: 《傅子》曰：太祖欲引軍還，嘉曰：「昔項籍七十餘戰，未嘗敗北，一朝失勢而身死國亡者，恃勇無謀故也。今布每戰輒破，氣衰力盡，內外失守。布之威力不及項籍，而困敗過之，若乘勝攻之，此成禽也。」太祖曰：「善。」《魏書》曰：劉備來奔，以為豫州牧。或謂太祖曰：「備有英雄志，今不早圖，後必為患。」太祖以問嘉，嘉曰：「有是。然公提劍起義兵，為百姓除暴，推誠仗信以招俊傑，猶懼其未也。今備有英雄名，以窮歸己而害之，是以害賢為名，則智士將自疑，回心擇主，公誰與定天下？夫除一人之患，以沮四海之望，安危之機，不可不察！」太祖笑曰：「君得之矣。」傅子曰：初，劉備來降，太祖以客禮待之，使為豫州牧。嘉言於太祖曰：「備有雄才而甚得眾心。張飛、關羽者，皆萬人之敵也，為之死用。嘉觀之，備終不為人下，其謀未可測也。古人有言：『一日縱敵，數世之患。』宜早為之所。」是時，太祖奉天子以號令天下，方招懷英雄以明大信，未得從嘉謀。會太祖使備要擊袁術，嘉與程昱俱駕而諫太祖曰：「放備，變作矣！」時備已去，遂舉兵以叛。太祖恨不用嘉之言。案《魏書》所云，與《傅子》正反也。
