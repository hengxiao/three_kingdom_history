  text: 資別傳曰：大將軍爽專事，多變易舊章。資歎曰：「吾累世蒙寵，加以豫聞屬託，今縱不能匡弼時事，可以坐受素餐之祿邪？」遂固稱疾。九年二月，乃賜詔曰：「君掌機密三十餘年，經營庶事，勳著前朝。暨朕統位，動賴良謀。是以曩者增崇寵章，同之三事，外帥羣官，內望讜言。屬以年耆疾篤，上還印綬，前後鄭重，辭旨懇切。天地以大順成德，君子以善恕成仁，重以職事，違奪君志；今聽所執，賜錢百萬，使兼光祿勳少府親策詔君養疾於第。君其勉進醫藥，頤神和氣，以永無疆之祚。置舍人官騎，加以日秩餚酒之膳焉。」
