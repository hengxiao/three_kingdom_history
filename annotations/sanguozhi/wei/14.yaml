- id: wei.14.p48.a1
  anchor: wei.14.p48
  at: 47
  length: 0
  type: pei
  text: 《傅子》曰：太祖徵曄及蔣濟、胡質等五人，皆揚州名士。每舍亭傳，未曾不講，所以見重；內論國邑先賢、禦賊固守、行軍進退之宜，外料敵之變化、彼我虛實、戰爭之術，夙夜不解。而曄獨臥車中，終不一言。濟怪而問之，曄答曰：「對明主非精神不接，精神可學而得乎？」及見太祖，太祖果問揚州先賢，賊之形勢。四人爭對，待次而言，再見如此，太祖每和悅，而曄終不一言。四人笑之。後一見太祖止無所復問，曄乃設遠言以動太祖，太祖適知便止。若是者三。其旨趣以為遠言宜徵精神，獨見以盡其機，不宜於猥坐說也。太祖已探見其心矣，坐罷，尋以四人為令，而授曄以心腹之任；每有疑事，輒以函問曄，至一夜數十至耳。
- id: wei.14.p49.h1
  anchor: wei.14.p49
  at: 0
  length: 2
  type: person
