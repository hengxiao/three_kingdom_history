  type: pei
  text: 《世語》曰：初，濟隨司馬宣王屯洛水浮橋，濟書與曹爽，言宣王旨「惟免官而已」，爽遂誅滅。濟病其言之失信，發病卒。
- id: wei.14.p81.a1
  anchor: wei.14.p81
  at: 127
  length: 0
  type: pei
  text: 祋音都活反。祤音詡。
- id: wei.14.p82.a1
  anchor: wei.14.p82
  at: 31
  length: 0
  type: pei
  text: 資別傳曰：資字彥龍。幼而岐嶷，三歲喪二親，長於兄嫂。講業太學，博覽傳記，同郡王允一見而奇之。太祖為司空，又辟資。會兄為鄉人所害，資手刃報讎，乃將家屬避地河東，故遂不應命。尋復為本郡所命，以疾辭。友人河東賈逵謂資曰：「足下抱逸羣之才，值舊邦傾覆，主將殷勤，千里延頸，宜崇古賢桑梓之義。而久盤桓，拒違君命，斯猶曜和璧於秦王之庭，而塞以連城之價耳。竊為足下不取也！」資感其言，遂往應之。到署功曹，舉計吏。尚書令荀彧見資，歎曰：「北州承喪亂已久，謂其賢智零落，今日乃復見孫計君乎！」表留以為尚書郎。辭以家難，得還河東。
- id: wei.14.p83.a1
  anchor: wei.14.p83
  at: 112
  length: 0
  type: pei
  text: 資別傳曰：諸葛亮出在南鄭，時議者以為可因發大兵，就討之，帝意亦然，以問資。資曰：
- id: wei.14.p85.a1
  anchor: wei.14.p85
  at: 52
  length: 0
  type: pei
  text: 《魏氏春秋》曰：烏丸校尉田豫帥西部鮮卑洩歸尼等出塞，討軻比能、智鬱築鞬，破之，還至馬邑故城，比能帥三萬騎圍豫。帝聞之，計未有所出，如中書省以問監、令。令孫資對曰：「上谷太守閻志，柔弟也，為比能素所歸信。令馳詔使說比能，可不勞師而自解矣。」帝從之，比能果釋豫而還。
- id: wei.14.p85.a2
  anchor: wei.14.p85
  at: 173
  length: 0
  type: pei
  text: 資別傳曰：是時，孫權、諸葛亮號稱劇賊，無歲不有軍征。而帝總攝羣下，內圖禦寇之計，外規廟勝之畫，資皆管之。然自以受腹心，常讓事於帝曰：「動大眾，舉大事，宜與羣下共之；既以示明，且於探求為廣。」既朝臣會議，資奏當其是非，擇其善者推成之，終不顯己之德也。若眾人有譴過及愛憎之說，輒復為請解，以塞譖潤之端。如征東將軍滿寵、涼州刺史徐邈，並有譖毀之者，資皆盛陳其素行，使卒無纖介。寵、邈得保其功名者，資之力也。初，資在邦邑，名出同類之右。鄉人司空掾田豫、梁相宗艷皆妒害之，而楊豐黨附豫等，專為資構造謗端，怨隙甚重。資既不以為言，而終無恨意。豫等慚服，求釋宿憾，結為婚姻。資謂之曰：「吾無憾心，不知所釋。此為卿自薄之，卿自厚之耳！」乃為長子宏取其女。及當顯位，而田豫老疾在家。資遇之甚厚，又致其子於本郡，以為孝廉。而楊豐子後為尚方吏，帝以職事譴怒，欲致之法，資請活之。其不念舊惡如此。
- id: wei.14.p86.a1
  anchor: wei.14.p86
  at: 249
  length: 0
  type: pei
  text: 《世語》曰：放、資久典機任，獻、肇心內不平。殿中有雞棲樹，二人相謂：「此亦久矣，其能復幾？」指謂放、資。放、資懼，乃勸帝召宣王。帝作手詔，令給使辟邪至，以授宣王。宣王在汲，獻等先詔令於軹關西還長安，辟邪又至，宣王疑有變，呼辟邪具問，乃乘追鋒車馳至京師。帝問放、資：「誰可與太尉對者？」放曰：「曹爽。」帝曰：「堪其事不？」爽在左右，流汗不能對。放躡其足，耳之曰：「臣以死奉社稷。」曹肇弟纂為大將軍司馬，燕王頗失指。肇出，纂見，驚曰：「上不安，云何悉共出？宜還。」已暮，放、資宣詔宮門，不得復內肇等，罷燕王。肇明日至門，不得入，懼，詣延尉，以處事失宜免。帝謂獻曰：「吾已差，便出。」獻流涕而出，亦免。案《世語》所云樹置先後，與本傳不同。臣松之以為孫、劉于時號為專任，制斷機密，政事無不綜。資、放被託付之問，當安危所斷，而更依違其對，無有適莫。受人親任，理豈得然？案本傳及諸書並云放、資稱讚曹爽，勸召宣王，魏室之亡，禍基於此。資之別傳，出自其家，欲以是言掩其大失，然恐負國之玷，終莫能磨也。
- id: wei.14.p87.a1
  anchor: wei.14.p87
  at: 129
  length: 0
  type: pei
  text: 資別傳曰：大將軍爽專事，多變易舊章。資歎曰：「吾累世蒙寵，加以豫聞屬託，今縱不能匡弼時事，可以坐受素餐之祿邪？」遂固稱疾。九年二月，乃賜詔曰：「君掌機密三十餘年，經營庶事，勳著前朝。暨朕統位，動賴良謀。是以曩者增崇寵章，同之三事，外帥羣官，內望讜言。屬以年耆疾篤，上還印綬，前後鄭重，辭旨懇切。天地以大順成德，君子以善恕成仁，重以職事，違奪君志；今聽所執，賜錢百萬，使兼光祿勳少府親策詔君養疾於第。君其勉進醫藥，頤神和氣，以永無疆之祚。置舍人官騎，加以日秩餚酒之膳焉。」
- id: wei.14.p87.a2
  anchor: wei.14.p87
  at: 163
  length: 0
  type: pei
  text: 臣松之案〈頭責子羽〉曰：士卿劉許字文生，正之弟也。與張華六人，並稱文辭可觀，意思詳序。晉惠帝世，許為越騎校尉。
- id: wei.14.p88.a1
  anchor: wei.14.p88
  at: 104
  length: 0
  type: pei
  text: 案〈孫氏譜〉：宏為南陽太守。宏子楚，字子荊。《晉陽秋》曰：楚鄉人王濟，豪俊公子也，為本州大中正。訪問關求楚品狀，濟曰：「此人非卿所能名。」自狀之曰：「天才英博，亮拔不羣。」楚位至討虜護軍、馮翊太守。楚子洵，潁川太守。洵子盛，字安國，給事中，秘書監。盛從父弟綽，字興公，廷尉正。楚及盛、綽，並有文藻，盛又善言名理，諸所論著，併傳於世。
