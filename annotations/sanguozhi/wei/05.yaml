- id: wei.5.p18.a1
  anchor: wei.5.p18
  at: 186
  length: 0
  type: pei
  text: 《魏略》曰：明帝既嗣立，追痛甄后之薨，故太后以憂暴崩。甄后臨沒，以帝屬李夫人。及太后崩，夫人乃說甄后見譖之禍，不獲大斂，被髮覆面，帝哀恨流涕，命殯葬太后，皆如甄后故事。漢晉春秋曰：初，甄后之誅，由郭后之寵，及殯，令被髮覆面，以糠塞口，遂立郭后，使養明帝。帝知之，心常懷忿，數泣問甄后死狀。郭后曰：「先帝自殺，何以責問我？且汝為人子，可追讎死父，為前母枉殺後母邪？」明帝怒，遂逼殺之，敕殯者使如甄后故事。《魏書》載哀策曰：「維青龍三年三月壬申，皇太后梓宮啟殯，將葬於首陽之西陵。哀子皇帝叡親奉冊祖載，遂親遣奠，叩心擗踴，號咷仰訴，痛靈魂之遷幸，悲容車之向路，背三光以潛翳，就黃壚而安厝。嗚呼哀哉！昔二女妃虞，帝道以彰，三母嬪週，聖善彌光，既多受祉，享國延長。哀哀慈妣，興化閏房，龍飛紫極，作合聖皇，不虞中年，暴罹災殃。愍予小子，煢煢摧傷，魂雖永逝，定省曷望？嗚呼哀哉！」
