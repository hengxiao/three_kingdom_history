  text: 《魏書》曰：后上表謝曰：「妾無皇、英釐降之節，又非姜、任思齊之倫，誠不足以假充女君之盛位，處中饋之重任。」后自在東宮，及即尊位，雖有異寵，心愈恭肅，供養永壽宮，以孝聞。是時柴貴人亦有寵，后教訓獎導之。后宮諸貴人時有過失，常彌覆之，有譴讓，輒為帝言其本末，帝或大有所怒，至為之頓首請罪，是以六宮無怨。性儉約，不好音樂，常慕漢明德馬后之為人。
