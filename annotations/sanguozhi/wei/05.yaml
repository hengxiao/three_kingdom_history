  text: 《魏書》曰：有司奏建長秋宮，帝璽書迎后，詣行在所，后上表曰：「妾聞先代之興，所以饗國久長，垂祚後嗣，無不由后妃焉。故必審選其人，以興內教。令踐阼之初，誠宜登進賢淑，統理六宮。妾自省愚陋，不任粢盛之事，加以寢疾，敢守微志。」璽書三至而后三讓，言甚懇切。時盛暑，帝欲須秋涼乃更迎后。會后疾遂篤，夏六月丁卯，崩於鄴。帝哀痛咨嗟，策贈皇后璽綬。臣松之以為春秋之義，內大惡諱，小惡不書。文帝之不立甄氏，及加殺害，事有明審。魏史若以為大惡邪，則宜隱而不言，若謂為小惡邪，則不應假為之辭，而崇飾虛文乃至於是，異乎所聞於舊史。推此而言，其稱卞、甄諸后言行之善，皆難以實論。陳氏刪落，良有以也。
