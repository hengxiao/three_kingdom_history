  type: pei
  text: 孫盛曰：於禮，婦人既無封爵之典，況於孩末，而可建以大邑乎？德自異族，援繼非類，匪功匪親，而襲母爵，違情背典，於此為甚。陳群雖抗言，楊阜引事比並，然皆不能極陳先王之禮，明封建繼嗣之義，忠至之辭，猶有闕乎！詩云：「赫赫師尹，民具爾瞻。」宰輔之職，其可略哉！《晉諸公贊》曰：德字彥孫。司馬景王輔政，以女妻德。妻早亡，文王復以女繼室，即京兆長公主。景、文二王欲自結於郭后，是以頻繁為婚。德雖無才學，而恭謹謙順。甄溫字仲舒，與郭建及德等皆后族，以事宜見寵。咸熙初，封郭建為臨渭縣公，德廣安縣公，邑皆千八百戶。溫本國侯，進為輔國大將軍，加侍中，領射聲校尉，德鎮軍大將軍。泰始元年，晉受禪，加建、德、溫三人位特進。德為人貞素，加以世祖姊夫，是以遂貴當世。德暮年官更轉為宗正，遷侍中。太康中，大司馬齊王攸當之籓，德與左衛將軍王濟共諫請，時人嘉之。世祖以此望德，由此出德為大鴻臚，加侍中、光祿大夫，尋疾薨，贈中軍大將軍，開府侍中如故，諡恭公，子喜嗣。喜精粹有器美，歷中書郎、右衛將軍、侍中，位至輔國大將軍，加散騎常侍。喜與國姻親，而經趙王倫、齊王冏事故，能不豫際會，良由其才短，然亦以退靜免之。
