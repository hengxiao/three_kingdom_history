  type: pei
  text: 《魏書》載三公奏曰：「蓋孝敬之道，篤乎其親，乃四海所以承化，天地所以明察，是謂生則致其養，歿則光其靈，誦述以盡其美，宣揚以顯其名者也。今陛下以聖懿之德，紹承洪業，至孝烝烝，通於神明，遭罹殷憂，每勞謙讓。先帝遷神山陵，大禮既備，至於先后，未有顯諡。伏惟先后恭讓著於幽微，至行顯於不言，化流邦國，德侔二南，故能膺神靈嘉祥，為大魏世妃。雖夙年登遐，萬載之後，永播融烈，后妃之功莫得而尚也。案諡法：『聖聞周達曰昭。德明有功曰昭。』昭者，光明之至，盛久而不昧者也。宜上尊諡曰文昭皇后。」是月，三公又奏曰：「自古週人始祖后稷，又特立廟以祀姜嫄。今文昭皇后之於萬嗣，聖德至化，豈有量哉！夫以皇家世（祀）之尊，而克讓允恭，固推盛位，神靈遷化，而無寢廟以承享（禮），非所以報顯德，昭孝敬也。稽之古制，宜依周禮，先妣別立寢廟。」並奏可之。
