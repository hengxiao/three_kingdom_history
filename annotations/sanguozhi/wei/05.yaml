  type: pei
  text: 《魏書》曰：逸娶常山張氏，生三男五女：長男豫，早終；次儼，舉孝廉，大將軍掾、曲梁長；次堯，舉孝廉；長女姜，次脫，次道，次榮，次即后。后以漢光和五年十二月丁酉生。每寢寐，家中彷彿見如有人持玉衣覆其上者，常共怪之。逸薨，加號慕，內外益奇之。後相者劉良相后及諸子，良指后曰：「此女貴乃不可言。」后自少至長，不好戲弄。年八歲，外有立騎馬戲者，家人諸姊皆上閣觀之，后獨不行。諸姊怪問之，后答言：「此豈女人之所觀邪？」年九歲，喜書，視字輒識，數用諸兄筆硯，兄謂后言：「汝當習女工。用書為學，當作女博士邪？」后答言：「聞古者賢女，未有不學前世成敗，以為己誡。不知書，何由見之？」
- id: wei.5.p8.a2
  anchor: wei.5.p8
  at: 143
  length: 0
  type: pei
  text: 《魏略》曰：后年十四，喪中兄儼，悲哀過制，事寡嫂謙敬，事處其勞，拊養儼子，慈愛甚篤。后母性嚴，待諸婦有常，后數諫母：「兄不幸早終，嫂年少守節，顧留一子，以大義言之，待之當如婦，愛之宜如女。」母感后言流涕，便令后與嫂共止，寢息坐起常相隨，恩愛益密。
