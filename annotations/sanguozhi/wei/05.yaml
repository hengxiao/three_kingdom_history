  text: 《魏略》曰：太祖始有丁夫人，又劉夫人生子脩及清河長公主。劉早終，丁養子脩。子脩亡於穰，丁常言：「將我兒殺之，都不復念！」遂哭泣無節。太祖忿之，遣歸家，欲其意折。後太祖就見之，夫人方織，外人傳云「公至」，夫人踞機如故。太祖到，撫其背曰：「顧我共載歸乎！」夫人不顧，又不應。太祖却行，立於戶外，復云：「得無尚可邪！」遂不應，太祖曰：「真訣矣。」遂與絕，欲其家嫁之，其家不敢。初，丁夫人旣爲嫡，加有子脩，丁視后母子不足。后爲繼室，不念舊惡，因太祖出行，常四時使人饋遺，又私迎之，延以正坐而己下之，迎來送去，有如昔日。丁謝曰：「廢放之人，夫人何能常爾邪！」其後丁亡，后請太祖殯葬，許之，乃葬許城南。後太祖病困，自慮不起，歎曰：「我前後行意，於心未曾有所負也。假令死而有靈，子脩若問『我母所在』，我將何辭以荅！」《魏書》曰：后性約儉，不尚華麗，無文繡珠玉，器皆黑漆。太祖常得名璫數具，命后自選一具，后取其中者，太祖問其故，對曰：「取其上者爲貪，取其下者爲偽，故取其中者。」
