  text: 《魏略》曰：熙出在幽州，后留侍姑。及鄴城破，紹妻及后共坐皇堂上。文帝入紹舍，見紹妻及后，后怖，以頭伏姑膝上，紹妻兩手自搏。文帝謂曰：「劉夫人云何如此？令新婦舉頭！」姑乃捧后令仰，文帝就視，見其顏色非凡，稱嘆之。太祖聞其意，遂為迎取。《世語》曰：太祖下鄴，文帝先入袁尚府，有婦人被髮垢面，垂涕立紹妻劉後，文帝問之，劉答「是熙妻」，顧攬髮髻，以巾拭面，姿貌絕倫。既過，劉謂后「不憂死矣」！遂見納，有寵。《魏書》曰：后寵愈隆而彌自挹損，後宮有寵者勸勉之，其無寵者慰誨之，每因閒宴，常勸帝，言「昔黃帝子孫蕃育，蓋由妾媵眾多，乃獲斯祚耳。所原廣求淑媛，以豐繼嗣。」帝心嘉焉。其後帝欲遣任氏，后請於帝曰：「任既鄉黨名族，德、色，妾等不及也，如何遣之？」帝曰：「任性狷急不婉順，前後忿吾非一，是以遣之耳。」后流涕固請曰：「妾受敬遇之恩，眾人所知，必謂任之出，是妾之由。上懼有見私之譏，下受專寵之罪，原重留意！」帝不聽，遂出之。十六年七月，太祖徵關中，武宣皇后從，留孟津，帝居守鄴。時武宣皇后體小不安，后不得定省，憂怖，晝夜泣涕；左右驟以差問告，后猶不信，曰：「夫人在家，故疾每動，輒歷時，今疾便差，何速也？此欲慰我意耳！」憂愈甚。后得武宣皇后還書，說疾已平復，后乃懽悅。十七年正月，大軍還鄴，后朝武宣皇后，望幄座悲喜，感動左右。武宣皇后見后如此，亦泣，且謂之曰：「新婦謂吾前病如昔時困邪？吾時小小耳，十餘日即差，不當視我顏色乎！」嗟歎曰：「此真孝婦也。」二十一年，太祖東征，武宣皇后、文帝及明帝、東鄉公主皆從，時后以病留鄴。二十二年九月，大軍還，武宣皇后左右侍御見后顏色豐盈，怪問之曰：「后與二子別久，下流之情，不可為念，而后顏色更盛，何也？」后笑答之曰：「（諱）等自隨夫人，我當何憂！」后之賢明以禮自持如此。
