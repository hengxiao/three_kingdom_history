  type: pei
  text: 《魏略》曰：初，卞后弟秉，當建安時得爲別部司馬，后常對太祖怨言，太祖荅言：「但得與我作婦弟，不爲多邪？」后又欲太祖給其錢帛，太祖又曰：「但汝盜與，不爲足邪？」故訖太祖世，秉官不移，財亦不益。
- id: wei.5.p7.a2
  anchor: wei.5.p7
  at: 48
  length: 0
  type: pei
  text: 《魏略》曰：蘭獻賦贊述太子德美，太子報曰：「賦者，言事類之所附也，頌者，美盛德之形容也，故作者不虛其辭，受者必當其實。蘭此賦，豈吾實哉？昔吾丘壽王一陳寶鼎，何武等徒以歌頌，猶受金帛之賜，蘭事雖不諒，義足嘉也。今賜牛一頭。」由是遂見親敬。
- id: wei.5.p7.a3
  anchor: wei.5.p7
  at: 72
  length: 0
  type: pei
  text: 《魏略》曰：明帝時，蘭見外有二難，而帝留意於宮室，常因侍從，數切諫。帝雖不能從，猶納其誠欵。後蘭苦酒消渴，時帝信巫女用水方，使人持水賜蘭，蘭不肯飲。詔問其意？蘭言治病自當以方藥，何信於此？帝爲變色，而蘭終不服。後渴稍甚，以至於亡。故時人見蘭好直言，謂帝靣折之而蘭自殺，其實不然。
