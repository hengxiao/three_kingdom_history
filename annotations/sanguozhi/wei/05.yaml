  text: 孫盛曰：古之王者，必求令淑以對揚至德，恢王化於關雎，致淳風於麟趾。及臻三季，並亂茲緒，義以情溺，位由寵昏，貴賤無章，下陵上替，興衰隆廢，皆是物也。魏自武王，暨於烈祖，三后之升，起自幽賤，本既卑矣，何以長世？詩云：「絺兮绤兮，淒其以風。」其此之謂乎！
