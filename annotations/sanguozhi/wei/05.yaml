  text: 《魏書》曰：后以國用不足，滅損御食，諸金銀器物皆去之。東阿王植，太后少子，最愛之。後植犯法，爲有司所奏，文帝令太后弟子奉車都尉蘭持公卿議白太后，太后曰：「不意此兒所作如是，汝還語帝，不可以我故壞國法。」及自見帝，不以爲言。臣松之案：文帝夢磨錢，欲使文滅而更愈明，以問周宣。宣荅曰：「此陛下家事，雖意欲爾，而太后不聽。」則太后用意，不得如此書所言也。《魏書》又曰：太后每隨軍征行，見高年白首，輙住車呼問，賜與絹帛，對之涕泣曰：「恨父母不及我時也。」太后每見外親，不假以顏色，常言「居處當務節儉，不當望賞賜，念自佚也。外舍當怪吾遇之太薄，吾自有常度故也。吾事武帝四五十年，行儉日久，不能自變爲奢，有犯科禁者，吾且能加罪一等耳，莫望錢米恩貸也。」帝爲太后弟秉起第，第成，太后幸第請諸家外親，設下廚，無異膳。太后左右菜食粟飯，無魚肉。其儉如此。
