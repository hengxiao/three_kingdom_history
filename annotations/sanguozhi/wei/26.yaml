- id: wei.26.p3.a1
  anchor: wei.26.p3
  at: 232
  length: 0
  type: pei
  text: 臣松之以爲楊公積德之門，身爲名臣，縱有愆負，猶宜保祐，況淫刑所濫，而可加其楚掠乎？若理應考訊，荀、孔二賢豈其妄有相請屬哉？寵以此爲能，酷吏之用心耳。雖有後善，何解前虐？
- id: wei.26.p6.a1
  anchor: wei.26.p6
  at: 600
  length: 0
  type: pei
  text: 《世語》曰：王淩表寵年過耽酒，不可居方任。帝將召寵，給事中郭謀曰：「寵爲汝南太守、豫州刺史二十餘年，有勳方岳。及鎮淮南，吳人憚之。若不如所表，將爲所闚。可令還朝，問以方事以察之。」帝從之。寵旣至，進見，飲酒至一石不亂。帝慰勞之，遣還。
- id: wei.26.p8.a1
  anchor: wei.26.p8
  at: 126
  length: 0
  type: pei
  text: 《世語》曰：偉字公衡。偉子長武，有寵風，年二十四，爲大將軍掾。高貴鄉公之難，以掾守閶闔掖門，司馬文王弟安陽亭侯幹欲入。幹妃，偉妹也。長武謂幹曰：「此門近，公且來，無有入者，可從東掖門。」幹遂從之。文王問幹入何遲，幹言其故。參軍王羨亦不得入，恨之。旣而羨因王左右啟王，滿掾斷門不內人，宜推劾。壽春之役，偉從文王至許，以疾不進。子從，求還省疾，事定乃從歸，由此內見恨。收長武考死杖下，偉免爲庶人。時人冤之。偉弟子奮，晉元康中至尚書令、司隷校尉。寵、偉、長武、奮，皆長八尺。荀綽《冀州記》曰：奮性清平，有識檢。《晉諸公贊》曰：奮體量通雅，有寵風也。
- id: wei.26.p14.a1
  anchor: wei.26.p14
  at: 31
  length: 0
  type: pei
  text: 臣松之案：曁字休先，熒陽人，事見〈劉曄傳〉。曁子肇，晉荊州刺史。山濤啟事稱肇有才能。肇子潭字道元，次歆字公嗣，潭子彧字長文，次經字仲武，皆見《潘岳集》。
- id: wei.26.p16.a1
  anchor: wei.26.p16
  at: 151
  length: 0
  type: pei
  text: 《魏略》曰：豫罷官歸，居魏縣。會汝南遣健步詣征北，感豫宿恩，過拜之。豫爲殺雞炊黍，送詣至陌頭，謂之曰：「罷老，苦汝來過。無能有益，若何？」健步愍其貧羸，流涕而去，還爲故吏民說之。汝南爲具資數千匹，遣人餉豫，豫一不受。會病，立戒其妻子曰：「葬我必於西門豹邊。」妻之難之，言：「西門豹古之神人，那可葬於其邊乎？」豫言：「豹所履行與我敵等耳，使死而有靈，必與我善。」妻子從之。汝南聞其死也，悲之，旣爲畫像，又就爲立碑銘。
- id: wei.26.p17.a1
  anchor: wei.26.p17
  at: 44
  length: 0
  type: pei
  text: 《魏略》曰：鮮卑素利等數來客見，多以牛馬遺豫；豫轉送官。胡以爲前所與豫物顯露，不如持金。乃密懷金三十斤，謂豫曰：「願避左右，我欲有所道。」豫從之，胡因跪曰：「我見公貧，故前後遺公牛馬，公輒送官，今密以此上公，可以爲家資。」豫張袖受之，荅其厚意。胡去之後，皆悉付外，具以狀聞。於是詔褒之曰：「昔魏絳開懷以納戎賂，今卿舉袖以受狄金，朕甚嘉焉。」乃即賜絹五百匹。豫得賜，分以其半藏小府，後胡復來，以半與之。
