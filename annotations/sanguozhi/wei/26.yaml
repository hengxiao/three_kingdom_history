  text: 徐邈傳
- id: wei.26.p25.a1
  anchor: wei.26.p25
  at: 51
  length: 0
  type: pei
  text: 案《晉書》：弘後爲揚州、涼州刺史，以果烈死事於邊。嘉子秀，字成叔。荀綽《冀州記》曰：秀有儁才，性豪俠有氣，弱冠得美名。於太康中爲衞瓘、崔洪、石崇等所提攜，以新安令博士爲司空從事中郎。與帝舅黃門侍郎王愷素相輕侮。愷諷司隷荀愷，令都官誣奏秀夜在道中載高平國守士田興妻。秀即表訴被誣陷之由，論愷穢行，文辭尤厲。于時朝臣雖多證明，秀名譽由是而損。後張華請爲長史，稍遷至尚書。河間王以秀爲平北將軍，假節，在馮翊遇害。世人玩其辭賦，惜其材幹。
- id: wei.26.p26.a1
  anchor: wei.26.p26
  at: 13
  length: 0
  type: pei
  text: 案〈郭氏譜〉：淮祖全，大司農；父縕，鴈門太守。
- id: wei.26.p31.a1
  anchor: wei.26.p31
  at: 167
  length: 0
  type: pei
  text: 《世語》曰：淮妻，王淩之妹。淩誅，妹當從坐，御史往收。督將及羌、胡渠帥數千人叩頭請淮表留妻，淮不從。妻上道，莫不流涕，人人扼腕，欲劫留之。淮五子叩頭流血請淮，淮不忍視，乃命左右追妻。於是追者數千騎，數日而還。淮以書白司馬宣王曰：「五子哀母，不惜其身；若無其母，是無五子；無五子，亦無淮也。今輒追還，若於法未通，當受罪於主者，覲展在近。」書至，宣王亦宥之。
- id: wei.26.p31.a2
  anchor: wei.26.p31
  at: 224
  length: 0
  type: pei
  text: 《晉諸公贊》曰：淮弟配，字仲南，有重名，位至城陽太守。裴秀、賈充皆配女壻。子展，字泰舒。有器度幹用，歷職著績，終於太僕。次弟豫，字泰寧，相國參軍，知名，早卒。女適王衍。配弟鎮，字季南，謁者僕射。鎮子弈，字泰業。山濤啟事稱弈高簡有雅量，歷位雍州刺史、尚書。
