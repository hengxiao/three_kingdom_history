- id: wei.27.p7.a2
  anchor: wei.27.p7
  at: 158
  length: 0
  type: pei
  text: 虞預《晉書》曰：周字伯南，沛國竹邑人。位至光祿大夫。子陔，字元夏。陔及二弟韶、茂，皆總角見稱，並有器望，雖鄉人諸父，未能覺其多少。時同郡劉公榮，名知人，嘗造周。周謂曰：「卿有知人之明，欲使三兒見卿，卿爲目高下，以效郭、許之聽可乎？」公榮乃自詣陔兄弟，與共言語，觀其舉動。出語周曰：「君三子皆國士也。元夏器量最優，有輔佐之風，展力仕宦，可爲亞公。叔夏、季夏，不減常伯、納言也。」陔少出仕宦，歷職內外，泰始初爲吏部尚書，遷左僕射、右光祿大夫、開府儀同三司，卒於官。陔以在魏已爲大臣，本非佐命之數，懷遜讓，不得已而居位，故在官職，無所荷任，夙夜思恭而已。終始全潔，當世以爲美談。韶歷二官吏部郎。山濤啟事稱韶清白有誠，終於散騎常侍。茂至侍中、尚書。潁川荀愷，宣帝外孫，世祖姑子，自負貴戚，要與茂交。茂拒而不荅，由是見怒。元康元年，楊駿被誅。愷時爲尚書僕射，以茂駿之姨弟，陷爲駿黨，遂枉見殺，衆咸冤痛之。
