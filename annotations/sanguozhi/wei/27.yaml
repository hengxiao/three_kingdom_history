  at: 134
  length: 0
  type: pei
  text: 司馬彪《戰略》載基此事，詳於本傳。曰：「景元二年春三月，襄陽太守胡烈表上『吳賊鄧由、李光等，同謀十八屯，欲來歸化，遣將張吳、鄧生，并送質任。克期欲令郡軍臨江迎拔』。大將軍司馬文王啟聞。詔征南將軍王基部分諸軍，使烈督萬人徑造沮水，荊州、義陽南屯宜城，承書夙發。若由等如期到者，便當因此震蕩江表。基疑賊詐降，誘致官兵，馳驛止文王，說由等可疑之狀。『且當清澄，未宜便舉重兵深入應之』。又曰：『夷陵東道，當由車御，至赤岸乃得渡坦，西道當出箭谿口，乃趣平土，皆山險狹，竹木叢蔚，卒有要害，弩馬不陳。今者筋角弩弱，水潦方降，廢盛農之務，徼難必之利，此事之危者也。昔子午之役，兵行數百里而值霖雨，橋閣破壞，後糧腐敗，前軍縣乏。姜維深入，不待輜重，士衆飢餓，覆軍上邽。文欽、唐咨，舉吳重兵，昧利壽春，身歿不反。此皆近事之鑒戒也。嘉平以來，累有內難。當今之宜，當鎮安社稷，撫寧上下，力農務本，懷柔百姓，未宜動衆以求外利也。得之未足爲多，失之傷損威重。』文王累得基書，意疑。尋勑諸軍已上道者，且權停住所在，須後節度。基又言於文王曰：『昔漢祖納酈生之說，欲封六國，寤張良之謀，而趣銷印。基謀慮淺短，誠不及留侯，亦懼襄陽有食其之謬。』文王於是遂罷軍嚴，後由等果不降。」
