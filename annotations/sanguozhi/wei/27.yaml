  at: 13
  length: 0
  type: pei
  text: 案《晉書》：渾自越騎入晉，累居方任，平吳有功，封一子江陵侯，位至司徒。渾子濟，字武子，有儁才令望，爲河南尹、太僕。早卒，追贈驃騎將軍。渾弟深，兾州刺史。深弟湛，字處冲，汝南太守。湛子承，字安期，東海內史。承子述，字懷祖，尚書令、衞將軍。述子坦之，字文度，北中郎將，徐、兖二州刺史。昶諸子中，湛最有悳譽，而承亦自爲名士，述及坦之並顯重於世，爲時盛門云。自湛已下事，見《晉陽秋》也。
