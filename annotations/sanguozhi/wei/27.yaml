- id: wei.27.p10.a2
  anchor: wei.27.p10
  at: 96
  length: 0
  type: pei
  text: 《晉陽秋》曰：威字伯虎。少有志尚，厲操清白。質之爲荊州也，威自京都省之。家貧，無車馬童僕，威自驅驢單行，拜見父。停廄中十餘日，告歸。臨辭，質賜絹一匹，爲道路糧。威跪曰：「大人清白，不審於何得此絹？」質曰：「是吾俸祿之餘，故以爲汝糧耳。」威受之，辭歸。每至客舍，自放驢，取樵炊爨，食畢，復隨旅進道，往還如是。質帳下都督，素不相識，先其將歸，請假還家，陰資裝百餘里要之，因與爲伴，每事佐助經營之，又少進飲食，行數百里。威疑之，密誘問，乃知其都督也，因取向所賜絹荅謝而遣之。後因他信，具以白質。質杖其都督一百，除吏名。其父子清慎如此。於是名譽著聞，歷位宰牧。晉武帝賜見，論邊事，語及平生。帝歎其父清，謂威曰：「卿清孰與父清？」威對曰：「臣不如也。」帝曰：「以何爲不如？」對曰：「臣父清恐人知，臣清恐人不知，是臣不如者遠也。」官至前將軍、青州刺史。太康元年卒，追贈鎮東將軍。威弟羆，字季象，征南將軍；威子弈，字次孫，平東將軍；並以潔行垂名。
- id: wei.27.p11.a1
  anchor: wei.27.p11
  at: 13
  length: 0
  type: pei
  text: 案〈王氏譜〉：昶伯父柔，字叔優；父澤，字季道。〈郭林宗傳〉曰：叔優、季道幼少之時，聞林宗有知人之鑒，共往候之，請問才行所宜，以自處業。林宗笑曰：「卿二人皆二千石才也，雖然，叔優當以仕宦顯，季道宜以經術進，若違才易務，亦不至也。」叔優等從其言。叔優至北中郎將，季道代郡太守。
- id: wei.27.p11.a2
  anchor: wei.27.p11
  at: 199
  length: 0
  type: pei
  text: 《孫子兵法》曰：兵以正合，以奇勝；奇正還相生，若循環之無端。
- id: wei.27.p13.a1
  anchor: wei.27.p13
  at: 459
  length: 0
  type: pei
  text: 《國語》曰：范文子暮退於朝，武子曰：「何暮也？」對曰：「有秦客廋辭於朝，大夫莫之能對也，吾知三焉。」武子怒曰：「大夫非不能也，讓父兄也。尔童子而三掩人於朝，吾不在，晉國亡無日也。」擊之以杖，折其委笄。臣松之案：對秦客者，范燮也。此云范匄，蓋誤也。
- id: wei.27.p14.a1
  anchor: wei.27.p14
  at: 48
  length: 0
  type: pei
  text: 臣松之以爲援之此誡，可謂切至之言，不刊之訓也。凡道人過失，蓋謂居室之愆，人未之知，則由己而發者也。若乃行事，得失已暴於世，因其善惡，即以爲誡，方之於彼，則有愈焉。然援誡稱龍伯高之美，言杜季良之惡，致使事徹時主，季良以敗。言之傷人，孰大於此？與其所誡，自相違伐。
- id: wei.27.p14.a2
  anchor: wei.27.p14
  at: 291
  length: 0
  type: pei
  text: 《世語》曰：黃初中，孫權通章表。偉以白衣登江上，與權交書求賂，欲以交結京師，故誅之。
- id: wei.27.p15.a1
  anchor: wei.27.p15
  at: 161
  length: 0
  type: pei
  text: 伯益名奕，郭嘉之子。
- id: wei.27.p15.a2
  anchor: wei.27.p15
  at: 270
  length: 0
  type: pei
  text: 臣松之以爲文舒復擬則文淵，顯言人之失。魏諷、曹偉，事陷惡逆，著以爲誡，差無可尤。至若郭伯益、劉公幹，雖其人皆往，善惡有定；然旣交之於昔，不宜復毀之於今，而乃形于翰墨，永傳後葉，於舊交則違久要之義，於子孫則揚人前世之惡。於夫鄙懷，深所不取。善乎東方之誡子也，以首陽爲拙，柳下爲工，寄旨古人，無傷當時。方之馬、王，不亦遠哉！
- id: wei.27.p15.a3
  anchor: wei.27.p15
  at: 318
  length: 0
  type: pei
  text: 昭先名嘏。〈別傳〉曰：嘏，樂安博昌人。世爲著姓，夙智性成，故鄉人爲之語曰：「蔣氏翁，任氏童。」父旐，字子旟，以至行稱。漢末，黃巾賊起，天下飢荒，人民相食。寇到博昌，聞旐姓字，乃相謂曰：「宿聞任子旟，天下賢人也。今雖作賊，那可入其鄉邪？」遂相帥而去。由是聲聞遠近，州郡並招舉孝廉，歷酸棗、祝阿令。嘏八歲喪母，號泣不絕聲，自然之哀，同於成人，故幼以至性見稱。年十四始學，疑不再問，三年中誦五經，皆究其義，兼包群言，無不綜覽，於時學者號之神童。遂遇荒亂，家貧賣魚，會官稅魚，魚貴數倍，嘏取直如常。又與人共買生口，各雇八匹。後生口家來贖，時價直六十匹。共買者欲隨時價取贖，嘏自取本價八匹。共買者慙，亦還取本價。比居者擅耕嘏地數十畝種之，人以語嘏，嘏曰：「我自以借之耳。」耕者聞之，慙謝還地。及邑中爭訟，皆詣嘏質之，然後意厭。其子弟有不順者，父兄竊數之曰：「汝所行，豈可令任君知邪！」其禮教所化，率皆如此。會太祖創業，召海內至德，嘏應其舉，爲臨菑侯庶子、相國東曹屬、尚書郎。文帝時，爲黃門侍郎。每納忠言，輒手書懷本，自在禁省，歸書不封。帝嘉其淑慎，累遷東郡、趙郡、河東太守，所在化行，有遺風餘教。嘏爲人淳粹凱弟，虛己若不足，恭敬如有畏。其脩身履義，皆沈默潛行，不顯其美，故時人少得稱之。著書三十八篇，凡四萬餘言。嘏卒後，故吏東郡程威、趙國劉固、河東上官崇等，錄其事行及所著書奏之。詔下祕書，以貫群言。
