- id: wei.13.p27.a1
  anchor: wei.13.p27
  at: 345
  length: 0
  type: pei
  text: 《世語》曰：恂字良夫，有通識，在朝忠正。歷河南尹、侍中，所居有稱。乃心存公，有匪躬之節。鬲令袁毅餽以駿馬，知其貪財，不受。毅竟以黷貨而敗。建立二學，崇明五經，皆恂所建。卒時年四十餘，贈車騎將軍。肅女適司馬文王，即文明皇后，生晉武帝、齊獻王攸。《晉諸公贊》曰：恂兄弟八人。其達者，虔字恭祖，以功幹見稱，位至尚書。弟愷，字君夫，少有才力而無行檢，與衞尉石崇友善，俱以豪侈競於世，終於後將軍。虔子康、隆，仕亦宦達，爲後世所重。
- id: wei.13.p28.a1
  anchor: wei.13.p28
  at: 94
  length: 0
  type: pei
  text: 臣松之按叔然與晉武帝同名，故稱其字。
- id: wei.13.p28.a2
  anchor: wei.13.p28
  at: 194
  length: 0
  type: pei
  text: 臣松之按此人姓周生，名烈。何晏《論語集解》有烈《義例》，餘所著述，見晉武帝《中經簿》。
