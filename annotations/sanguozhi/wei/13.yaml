- id: wei.13.p2.a1
  anchor: wei.13.p2
  at: 368
  length: 0
  type: pei
  text: 司馬彪《戰略》曰：袁尚遣高幹、郭援將兵數萬人，與匈奴單于寇河東，遣使與馬騰、韓遂等連和，騰等陰許之。傅幹說騰曰：「古人有言『順道者昌，逆德者亡』。曹公奉天子誅暴亂，法明國治，上下用命，有義必賞，無義必罰，可謂順道矣。袁氏背王命，驅胡虜以陵中國，寬而多忌，仁而無斷，兵雖彊，實失天下心，可謂逆德矣。今將軍旣事有道，不盡其力，陰懷兩端，欲以坐觀成敗，吾恐成敗旣定，奉辭責罪，將軍先爲誅首矣。」於是騰懼。幹曰：「智者轉禍爲福。今曹公與袁氏相持，而高幹、郭援獨制河東，曹公雖有萬全之計，不能禁河東之不危也。將軍誠能引兵討援，內外擊之，其勢必舉。是將軍一舉，斷袁氏之臂，解一方之急，曹公必重德將軍。將軍功名，竹帛不能盡載也。唯將軍審所擇！」騰曰：「敬從教。」於是遣子超將精兵萬餘人，并將遂等兵，與繇會擊援等，大破之。
- id: wei.13.p2.a2
  anchor: wei.13.p2
  at: 414
  length: 0
  type: pei
  text: 《魏略》曰：詔徵河東太守王邑。邑以天下未定，心不願徵，而吏民亦戀邑，郡掾衞固及中郎將范先等各詣繇求乞邑。而詔已拜杜畿爲太守，畿已入界。繇不聽先等，促邑交符。邑佩印綬，徑從河北詣許自歸。繇時治在洛陽，自以威禁失督司之法，乃上書自劾曰：「臣前上言故鎮北將軍領河東太守安陽亭侯王邑巧辟治官，犯突科條，事當推劾，檢實姦詐。被詔書當如所糾。以其歸罪，故加寬赦。又臣上言吏民大小，各懷顧望，謂邑當還，拒太守杜畿，今皆反悔，共迎畿之官。謹按文書，臣以空虛，被蒙拔擢，入充近侍，兼典機衡，忝膺重任，總統偏方。旣無德政以惠民物，又無威刑以檢不恪，至使邑違犯詔書，郡掾衞固誑迫吏民，訟訴之言，交驛道路，漸失其禮，不虔王命。今雖反悔，醜聲流聞，咎皆由繇威刑不攝。臣又疾病，前後歷年，氣力日微，尸素重祿，曠廢職任，罪明法正。謹按侍中守司隷校尉東武亭侯鍾繇，幸得蒙恩，以斗筲之才，仍見拔擢，顯從近密，銜命督使。明知詔書深疾長吏政教寬弱，檢下無刑，乆病淹滯，衆職荒頓，法令失張。邑雖違科，當必繩正法，旣舉文書，操彈失禮，至乃使邑遠詣闕廷。隳忝使命，挫傷爪牙。而固誑迫吏民，拒畿連月，今雖反悔，犯順失正，海內兇赫，罪一由繇威刑闇弱。又繇乆病，不任所職，非繇大臣當所宜爲。繇輕慢憲度，不畏詔令，不與國同心，爲臣不忠，無所畏忌，大爲不敬。又不承用詔書，奉詔不謹。又聦明蔽塞，爲下所欺，弱不勝任。數罪謹以劾，臣請法車徵詣廷尉治繇罪，大鴻臚削爵土。臣乆嬰篤疾，涉夏盛劇，命縣呼吸，不任部官。輙以文書付功曹從事馬適議，免冠徒跣，伏須罪誅。」詔不聽。
