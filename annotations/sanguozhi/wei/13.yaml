  text: 華嶠《譜叙》曰：歆有三子。表字偉容，年二十餘爲散騎侍郎。時同寮諸郎共平尚書事，年少，並兼厲鋒氣，要召名譽。尚書事至，或有不便，故遺漏不視，及傳書者去，即入深文論駮。惟表不然，事來有不便，輒與尚書共論盡其意，主者固執，不得已，然後共奏議。司空陳羣等以此稱之。仕晉，歷太子少傅、太常。稱疾致仕，拜光祿大夫。性清淡，常慮天下退理。司徒李胤、司隷王弘等常稱曰：「若此人者，不可得而貴，不可得而賤，不可得而親，不可得而踈。」中子博，歷三縣內史，治有名跡。少子周，黃門侍郎、常山太守，博學有文思。中年遇疾，終于家。表有三子。長子廙，字長駿。《晉諸公贊》曰：廙有文翰，歷位尚書令、太子少傅，追贈光祿大夫開府。嶠字叔駿，有才學，撰《後漢書》，世稱爲良史。爲祕書監、尚書。澹字玄駿，最知名，爲河南尹。廙三子。昆字敬倫，清粹有檢，爲尚書。薈字敬叔。世語稱薈貴正。恒字敬則，以通理稱。昆，尚書；薈，河南尹；恒，左光祿大夫開府。澹子軼，字彥夏。有當世才志，爲江州刺史。
