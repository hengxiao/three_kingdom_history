  at: 13
  length: 0
  type: pei
  text: 《先賢行狀》曰：鍾皓字季明，溫良篤慎，博學詩律，教授門生千有餘人，爲郡功曹。時太丘長陳寔爲西門亭長，皓深獨敬異。寔少皓十七歲，常禮待與同分義。會辟公府，臨辭，太守問：「誰可代君？」皓曰：「明府欲必得其人，西門亭長可用。」寔曰：「鍾君似不察人爲意，不知何獨識我？」皓爲司徒掾，公出，道路泥濘，導從惡其相灑，去公車絕遠。公椎軾言：「司徒今日爲獨行耳！」還府向閤，鈴下不扶，令揖掾屬，公奮手不顧。時舉府掾屬皆投劾出，皓爲西曹掾，即開府門分布曉語已出者，曰：「臣下不能得自直於君，若司隷舉繩墨，以公失宰相之禮，又不勝任，諸君終身何所任邪？」掾屬以故皆止。都官果移西曹掾，問空府去意，皓召都官吏，以見掾屬名示之，乃止。前後九辟三府，遷南鄉、林慮長，不之官。時郡中先輩爲海內所歸者，蒼梧太守定陵陳稚叔、故黎陽令潁陰荀淑及皓。少府李膺常宗此三人，曰：「荀君清識難尚，陳、鍾至德可師。」膺之姑爲皓兄之妻，生子覲，與膺年齊，並有令名。覲又好學慕古，有退讓之行。爲童幼時，膺祖太尉脩言：「覲似我家性，國有道不廢，國無道免於刑戮者也。」復以膺妹妻之。覲辟州宰，未甞屈就。膺謂覲曰：「孟軻以爲人無好惡是非之心，非人也。弟於人何太無皂白邪！」覲甞以膺之言白皓，皓曰：「元禮，祖公在位，諸父並盛，韓公之甥，故得然耳。國武子好昭人過，以爲怨本，今豈其時！保身全家，汝道是也。」覲早亡，膺雖荷功名，位至卿佐，而卒隕身世禍。皓年六十九，終於家。皓二子迪、敷，並以黨錮不仕。繇則迪之孫。
