- id: wei.13.p9.a1
  anchor: wei.13.p9
  at: 78
  length: 0
  type: pei
  text: 《魏書》曰：文帝受禪，歆登壇相儀，奉皇帝璽綬，以成受命之禮。華嶠譜叙曰：文帝受禪，朝臣三公已下並受爵位；歆以形色忤時，徙爲司徒，而不進爵。魏文帝乆不懌，以問尚書令陳羣曰：「我應天受禪，百辟群后，莫不人人恱喜，形于聲色，而相國及公獨有不怡者，何也？」羣起離席長跪曰：「臣與相國曾臣漢朝，心雖恱喜，義形其色，亦懼陛下實應且憎。」帝大恱，遂重異之。
- id: wei.13.p9.a2
  anchor: wei.13.p9
  at: 121
  length: 0
  type: pei
  text: 孫盛曰：盛聞慶賞威刑，必宗於主，權宜宥怒，出自人君。子路私饋，仲尼毀其食器；田氏盜施，春秋著以爲譏。斯襃貶之成言，已然之顯義也。孥戮之家，國刑所肅，受賜之室，乾施所加，若在哀矜，理無偏宥。歆居股肱之任。同元首之重，則當公言皇朝，以彰天澤，而默受嘉賜，獨爲君子，旣犯作福之嫌，又違必去之義，可謂匹夫之仁，蹈道則未也。《魏書》曰：歆性周密，舉動詳慎。常以爲人臣陳事，務以諷諫合道爲貴，就有所言，不敢顯露，故其事多不見載。華嶠《譜叙》曰：歆淡於財欲，前後寵賜，諸公莫及，然終不殖產業。陳羣常歎曰：「若華公，可謂通而不泰，清而不介者矣。」《傅子》曰：敢問今之君子？曰：「袁郎中積德行儉，華太尉積德居順，其智可及也，其清不可及也。事上以忠，濟下以仁，晏嬰、行父何以加諸？」
