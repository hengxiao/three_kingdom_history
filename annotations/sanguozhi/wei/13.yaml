  text: 《魏書》曰：車駕旣還，詔三公曰：「三世爲將，道家所忌。窮兵黷武，古有成戒。況連年水旱，士民損耗，而功作倍於前，勞役兼於昔，進不滅賊，退不和民。夫屋漏在上，知之在下，然迷而知反，失道不遠，過而能改，謂之不過。今將休息，棲備高山，沈權九淵，割除擯棄，投之畫外。車駕當以今月中旬到譙，淮、漢衆軍，亦各還反，不臘西歸矣。」
