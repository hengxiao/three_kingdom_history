  length: 0
  type: pei
  text: 《魏名臣奏》載朗節省奏曰：「詔問所宜損益，必謂東京之事也。若夫西京雲陽、汾陰之大祭，千有五百之羣，祀通天之臺，入阿房之宮，齋必百日，養犧五載，牛則三千，其重玉則七千；其器，文綺以飾重席，童女以蹈舞綴；釀酎必貫三時而後成，樂人必三千四百而後備；內宮美人數至近千，學官博士七千餘人；中廄則騑騄駙馬六萬餘匹，外牧則扈養三萬而馬十之；執金吾從騎六百，走卒倍焉；太常行陵赤車千乘，太官賜官奴婢六千，長安城內治民爲政者三千，中二千石蔽罪斷刑者二十有五獄。政充事猥，威儀繁富，隆於三代，近過禮中。夫所以極奢吝，大抵多受之於秦餘。旣違繭栗愨誠之本，埽地簡易之指，又失替質而損文、避泰而從約之趣。豈夫當今隆興盛明之時，祖述堯舜之際，割奢務儉之政，除繁崇省之令，詳刑慎罰之教，所宜希慕哉？及夫寢廟日一太牢之祀，郡國並立宗廟之法，丞相御史大夫官屬吏從之數，若此之輩，旣已屢改於哀、平之前，不行光武之後矣。謹按圖牒，所改秦在天地及五帝、六宗、宗廟、社稷，旣已因前代之兆域矣。夫天地則埽地而祭，其餘則皆壇而埒之矣。明堂所以祀上帝，靈臺所以觀天文，辟雍所以脩禮樂，太學所以集儒林，高禖所以祈休祥，又所以察時務，揚教化。稽古先民，開誕慶祚，舊時皆在國之陽，並高棟夏屋，足以肆饗射，望雲物。七郊雖尊祀尚質，猶皆有門宇便坐，足以避風雨。可須軍罷年豐，以漸脩治。舊時虎賁羽林五營兵，及衞士并合，雖且萬人，或商賈墯游子弟，或農野謹鈍之人；雖有乘制之處，不講戎陣，旣不簡練，又希更寇，雖名實不副，難以備急。有警而後募兵，軍行而後運粮，或乃兵旣乆屯，而不務營佃，不脩器械，無有貯聚，一隅馳羽檄，則三靣並荒擾，此亦漢氏近世之失而不可式者也。當今諸夏已安，而巴蜀在畫外。雖未得偃武而弢甲，放馬而戢兵，宜因年之大豐，遂寄軍政於農事。吏士小大，並勤稼穡，止則成井里於廣野，動則成校隊於六軍，省其暴繇，贍其衣食。易稱『恱以使民，民忘其勞；恱以犯難，民忘其死』，今之謂矣。粮畜於食，勇畜於勢，雖坐曜烈威而衆未動，畫外之蠻，必復稽顙以求改往而效用矣。若畏威效用，不戰而定，則賢於交兵而後威立，接刃而後功成遠矣。若姦凶不革，遂迷不反，猶欲以其所虐用之民，待大魏投命報養之士，然後徐以前歌後舞樂征之衆，臨彼倒戟折矢樂服之羣，伐腐摧枯，未足以爲喻也。」
- id: wei.13.p17.a2
  anchor: wei.13.p17
  at: 222
  length: 0
  type: pei
  text: 《王朗集》載朗爲大理時上主簿趙郡張登：「昔爲本縣主簿，值黑山賊圍郡，登與縣長王儁帥吏兵七十二人直往赴救，與賊交戰，吏兵散走。儁殆見害，登手格二賊，以全儁命。又守長夏逸，爲督郵所枉，登身受考掠，理逸之罪。義濟二君。宜加顯異。」太祖以所急者多，未遑擢叙。至黃初初，朗又與太尉鍾繇連名表聞，兼稱登在職勤勞。詔曰：「登忠義彰著，在職功勤。名位雖卑，直亮宜顯。饔膳近任，當得此吏。今以登爲太官令。」
