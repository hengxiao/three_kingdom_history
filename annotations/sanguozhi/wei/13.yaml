- id: wei.13.p28.a3
  anchor: wei.13.p28
  at: 217
  length: 0
  type: pei
  text: 《魏略》曰：遇字季直，性質訥而好學。興平中，關中擾亂，與兄季中依將軍段煨。采梠負販，而常挾持經書，投閑習讀。其兄笑之而遇不改。及建安初，王綱小設，郡舉孝廉，稍遷黃門侍郎。是時，漢帝委政太祖，遇旦夕侍講，爲天子所愛信。至二十二年，許中百官矯制，遇雖不與謀，猶被錄詣鄴，轉爲冗散。常從太祖西征，道由孟津，過弘農王冢。太祖疑欲謁，顧問左右，左右莫對，遇乃越第進曰：「春秋之義，國君即位未踰年而卒，未成爲君。弘農王即阼旣淺，又爲暴臣所制，降在藩國，不應謁。」太祖乃過。黃初中，出爲郡守。明帝時，入爲侍中、大司農。數年，病亡。初，遇善治《老子》，爲《老子》作訓注。又善《左氏傳》，更爲作朱墨別異。人有從學者，遇不肯教，而云：「必當先讀百徧」。言「讀書百徧而義自見」。從學者云：「苦渴無日。」遇言：「當以三餘」。或問三餘之意，遇言：「冬者，歲之餘；夜者，日之餘，陰雨者，時之餘也」。由是諸生少從遇學，無傳其朱墨者。《世語》曰：遇子綏，位至祕書監，亦有才學。齊王冏功臣董艾，即綏之子也。
