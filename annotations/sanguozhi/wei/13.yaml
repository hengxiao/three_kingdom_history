  text: 袁宏曰：夫民心樂全而不能常全，蓋利用之物懸於外，而嗜慾之情動於內也。於是有進取貪競之行，希求放肆之事。進取不已，不能充其嗜慾，則苟且儌倖之所生也；希求無饜，無以愜其慾，則姦僞忿怒之所興也。先王知其如此，而欲救其弊，或先德化以陶其心；其心不化，然後加以刑辟。《書》曰：「百姓不親，五品不遜。汝作司徒而敬敷五教。蠻夷猾夏，寇賊姦宄。汝作士，五刑有服。」然則德、刑之設，參而用之者也。三代相因，其義詳焉。《周禮》：「使墨者守門，劓者守關，宮者守內，刖者守囿。」此肉刑之制可得而論者也。荀卿亦云，殺人者死，傷人者刑，百王之所同，未有知其所由來者也。夫殺人者死，而相殺者不已，是大辟可以懲未殺，不能使天下無殺也。傷人者刑，而害物者不息，是黥、劓可以懼未刑，不能使天下無刑也。故將欲止之，莫若先以德化。夫罪過彰著，然後入于刑辟，是將殺人者不必死，欲傷人者不必刑。縱而弗化，則陷於刑辟。故刑之所制，在於不可移之地。禮教則不然，明其善惡，所以潛勸其情，消之於未殺也；示之恥辱，所以內愧其心，治之於未傷也。故過微而不至於著，罪薄而不及於刑。終入罪辟者，非教化之所得也，故雖殘一物之生，刑一人之體，是除天下之害，夫何傷哉！率斯道也，風化可以漸淳，刑罰可以漸少，其理然也。苟不能化其心，而專任刑罰，民失義方，動罹刑網，求世休和，焉可得哉？周之成、康，豈按三千之文而致刑錯之美乎？蓋德化漸漬，致斯有由也。漢初懲酷刑之弊，務寬厚之論，公卿大夫，相與恥言人過。文帝登朝，加以玄默。張武受賂，賜金以愧其心；吳王不朝，崇禮以訓其失。是以吏民樂業，風流篤厚，斷獄四百，幾致刑錯，豈非德刑兼用已然之効哉？世之欲言刑罰之用，不先德教之益，失之遠矣。今大辟之罪，與古同制。免死已下，不過五歲，旣釋鉗鎖，復得齒于人倫。是以民無恥惡，數爲姦盜，故刑徒多而亂不治也。苟教之所去，罰當其罪，一離刀鋸，沒身不齒，鄰里且猶恥之，而況于鄉黨乎？而況朝廷乎？如此，則夙沙、趙高之儔，無施其惡矣。古者察其言，觀其行，而善惡彰焉。然則君子之去刑辟，固已遠矣。過誤不幸，則八議之所宥也。若夫卞和、史遷之冤，淫刑之所及也。苟失其道，或不免于大辟，而況肉刑哉！《漢書》：「斬右趾及殺人先自言告，吏坐受賕，守官物而即盜之，皆棄巿。」此班固所謂當生而令死者也。今不忍刻截之慘，而安勦絕之悲，此最治體之所先，有國所宜改者也。
