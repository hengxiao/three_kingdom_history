- id: wei.13.p15.a1
  anchor: wei.13.p15
  at: 20
  length: 0
  type: pei
  text: 朗被徵未至。孔融與朗書曰：「世路隔塞，情問斷絕，感懷增思。前見章表，知尋湯武罪己之迹，自投東裔同鯀之罰，覽省未周，涕隕潸然。主上寬仁，貴德宥過。曹公輔政，思賢並立。策書屢下，殷勤款至。知櫂舟浮海，息駕廣陵，不意黃能突出羽淵也。談笑有期，勉行自愛！」《漢晉春秋》曰：孫策之始得朗也，譴讓之。使張昭私問朗，朗誓不屈，策忿而不敢害也，留置曲阿。建安三年，太祖表徵朗，策遣之。太祖問曰：「孫策何以得至此邪？」朗曰：「策勇冠一世，有儁才大志。張子布，民之望也，北面而相之。周公瑾，江淮之傑，攘臂而爲其將。謀而有成，所規不細，終爲天下大賊，非徒狗盜而已。」
- id: wei.13.p15.a2
  anchor: wei.13.p15
  at: 32
  length: 0
  type: pei
  text: 《朗家傳》曰：朗少與沛國名士劉陽交友。陽爲莒令，年三十而卒，故後世鮮聞。初，陽以漢室漸衰，知太祖有雄才，恐爲漢累，意欲除之而事不會。及太祖貴，求其嗣子甚急。其子惶窘，走伏無所。陽親舊雖多，莫敢藏者。朗乃納受積年，及從會稽還，又數開解。太祖乆乃赦之，陽門戶由是得全。
