  type: pei
  text: 《獻帝春秋》曰：孫策率軍如閩、越討朗。朗泛舟浮海，欲走交州，爲兵所逼，遂詣軍降。策令使者詰朗曰：「問逆賊故會稽太守王朗：朗受國恩當官，云何不惟報德，而阻兵安忍？大軍征討，幸免梟夷，不自埽屏，復聚黨衆，屯住郡境。遠勞王誅，卒不悟順。捕得云降，庶以欺詐，用全首領，得爾與不，具以狀對。」朗稱禽虜，對使者曰：「朗以瑣才，誤竊朝私，受爵不讓，以遘罪網。前見征討，畏死苟免。因治人物，寄命須臾。又迫大兵，惶怖北引。從者疾患，死亡略盡。獨與老母共乘一欐，流矢始交，便棄欐就俘，稽顙自首於征役之中。朗惶惑不達，自稱降虜。緣前迷謬，被詰慙懼。朗愚淺駑怯，畏威自驚。又無良介，不早自歸。於破亡之中，然後委命下隷。身輕罪重，死有餘辜。申脰就鞅，蹴足入絆，叱咤聽聲，東西惟命。」
