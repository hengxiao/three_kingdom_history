  length: 0
  type: pei
  text: 《魏略》曰：繇爲相國，以五熟釜鼎範因太子鑄之，釜成，太子與繇書曰：「昔有黃三鼎，周之九寶，咸以一體使調一味，豈若斯釜五味時芳？蓋鼎之烹餁，以饗上帝，以養聖賢，昭德祈福，莫斯之美。故非大人，莫之能造；故非斯器，莫宜盛德。今之嘉釜，有逾茲美。夫周之尸臣，宋之考父，衞之孔悝，晉之魏顆，彼四臣者，並以功德勒名鍾鼎。今執事寅亮大魏，以隆聖化。堂堂之德，於斯爲盛。誠太常之所宜銘，彝器之所宜勒。故作斯銘，勒之釜口，庶可贊揚洪美，垂之不朽。」臣松之按《漢書·郊祀志》，孝宣時，美陽得鼎，京兆尹張敞上議曰：「按鼎有刻書曰：『王命尸臣，宕此栒邑。尸，主事之臣也；栒音荀，幽地。賜尔鸞旂，黼黻琱戈。尸臣拜首，稽首曰，敢對揚天子，丕顯休命！』此殆周之所以襃賜大臣子孫，大臣子孫刻銘其先功，藏之于宮廟也。」考父銘見《左氏傳》，孔悝銘在《禮記》，事顯故不載。《國語》曰：「昔克潞之役，秦來圖敗晉功，魏顆以其身追秦師于輔氏，親止杜囬；其勒銘于景鍾，至于今不遺類，其子孫不可不興也。」太子所稱四銘者也。《魏略》曰：後太祖征漢中，太子在孟津，聞繇有玉玦，欲得之而難。公密使臨菑侯轉因人說之，繇即送之。太子與繇書曰：「夫玉以比德君子，見美詩人。晉之垂棘，魯之璵璠，宋之結綠，楚之和璞，價越萬金，貴重都城，有稱疇昔，流聲將來。是以垂棘出晉，虞、虢雙禽；和璧入秦，相如抗節。竊見玉書，稱美玉白若截肪，黑譬純漆，赤擬雞冠，黃侔蒸栗。側聞斯語，未覩厥狀。雖德非君子，義無詩人，高山景行，私所慕仰。然四寶邈焉以遠，秦、漢未聞有良匹。是以求之曠年，未遇厥真，私願不果，饑渴未副。近見南陽宗惠叔稱君侯昔有美玦，聞之驚喜，笑與抃俱。當自白書，恐傳言未審，是以令舍弟子建因荀仲茂轉言鄙旨。乃不忽遺，厚見周稱，鄴騎旣到，寶玦初至，捧跪發匣，爛然滿目。猥以矇鄙之姿，得觀希世之寶，不煩一介之使，不損連城之價，旣有秦昭章臺之觀，而無藺生詭奪之誑。嘉貺益腆，敢不欽承！」繇報書曰：「昔忝近任，并得賜玦。尚方耆老，頗識舊物。名其符采。必得處所。以爲執事有珍此者，是以鄙之，用未奉貢。幸而紆意，實以恱懌。在昔和氏，殷勤忠篤，而繇待命，是懷愧恥。」
- id: wei.13.p3.a2
  anchor: wei.13.p3
  at: 89
  length: 0
  type: pei
  text: 《魏略》曰：孫權稱臣，斬送關羽。太子書報繇，繇荅書曰：「臣同郡故司空荀爽言：『人當道情，愛我者一何可愛！憎我者一何可憎！』顧念孫權，了更侮媚。」太子又書曰：「得報，知喜南方。至於荀公之清談，孫權之侮媚，執書嗢噱，不能離手。若權復黠，當折以汝南許邵月旦之評。權優游二國，俯仰荀、許，亦已足矣。」
