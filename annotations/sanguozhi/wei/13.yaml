  type: pei
  text: 陸氏《異林》曰：繇嘗數月不朝會，意性異常，或問其故，云：「常有好婦來，美麗非凡。」問者曰：「必是鬼物，可殺之。」婦人後往，不即前，止戶外。繇問何以，曰：「公有相殺意。」繇曰：「無此。」乃勤勤呼之，乃入。繇意恨，有不忍之心，然猶斫之傷髀。婦人即出，以新緜拭血竟路。明日使人尋跡之，至一大冢，木中有好婦人，形體如生人，著白練衫，丹繡裲襠，傷左髀，以裲襠中緜拭血。叔父清河太守說如此。清河，陸雲也。
