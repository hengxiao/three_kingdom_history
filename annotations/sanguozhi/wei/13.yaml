  length: 0
  type: pei
  text: 《魏略》曰：太祖請同會，啁朗曰：「不能效君昔在會稽折秔米飯也。」朗仰而歎曰：「宜適難值！」太祖問：「云何？」朗曰：「如朗昔者，未可折而折；如明公今日，可折而不折也。」太祖以孫權稱臣遣貢諮朗，朗荅曰：「孫權前牋，自詭躬討虜以補前愆，後疏稱臣，以明無二。牙獸屈膝，言鳥告歡，明珠、南金，遠珍必至。情見乎辭，效著乎功。三江五湖，爲沼于魏，西吳東越，化爲國民。鄢、郢旣拔，荊門自開。席卷巴、蜀，形勢已成。重休累慶，雜沓相隨。承旨之日，撫掌擊節。情之畜者，辭不能宣。」
