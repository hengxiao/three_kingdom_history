  length: 0
  type: pei
  text: 胡冲《吳歷》曰：孫策擊豫章，先遣虞翻說歆。歆荅曰：「乆在江表，常欲北歸；孫會稽來，吾便去也。」翻還報策，策乃進軍。歆葛巾迎策，策謂歆曰：「府君年德名望，遠近所歸；策年幼稚，宜脩子弟之禮。」便向歆拜。華嶠譜叙曰：孫策略有揚州，盛兵徇豫章，一郡大恐。官屬請出郊迎，教曰：「無然。」策稍進，復白發兵，又不聽。及策至，一府皆造閤，請出避之。乃笑曰：「今將自來，何遽避之？」有頃，門下白曰：「孫將軍至。」請見，乃前與歆共坐，談議良乆，夜乃別去。義士聞之，皆長歎息而心自服也。策遂親執子孫之禮，禮爲上賔。是時四方賢士大夫避地江南者甚衆，皆出其下，人人望風。每策大會，坐上莫敢先發言，歆時起更衣，則論議讙譁。歆能劇飲，至石餘不亂，衆人微察，常以其整衣冠爲異，江南號之曰「華獨坐」。虞溥《江表傳》曰：孫策在椒丘，遣虞翻說歆。翻旣去，歆請功曹劉壹入議。壹勸歆住城，遣檄迎軍。歆曰：「吾雖劉刺史所置，上用，猶是剖符吏也。今從卿計，恐死有餘責矣。」壹曰：「王景興旣漢朝所用，且爾時會稽人衆盛彊，猶見原恕，明府何慮？」於是夜逆作檄，明旦出城，遣吏齎迎。策便進軍，與歆相見，待以上賔，接以朋友之禮。孫盛曰：夫大雅之處世也，必先審隱顯之期，以定出處之分，否則括囊以保其身，泰則行義以達其道。歆旣無夷、皓韜邈之風，又失王臣匪躬之操，故撓心於邪儒之說，交臂於陵肆之徒，位奪於一豎，節墯於當時。昔許、蔡失位，不得列於諸侯；州公寔來，魯人以爲賤恥。方之於歆，咎孰大焉！
