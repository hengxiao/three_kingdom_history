  type: pei
  text: 華嶠《譜叙》曰：歆少以高行顯名。避西京之亂，與同志鄭泰等六七人，間步出武關。道遇一丈夫獨行，願得俱，皆哀欲許之。歆獨曰：「不可。今已在危險之中，禍福患害，義猶一也。無故受人，不知其義。旣以受之，若有進退，可中棄乎！」衆不忍，卒與俱行。此丈夫中道墮井，皆欲棄之。歆曰：「已與俱矣，棄之不義。」相率共還出之，而後別去。衆乃大義之。
