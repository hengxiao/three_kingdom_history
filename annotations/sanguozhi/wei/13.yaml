  text: 孫盛曰：化合神者曰皇，德合天者曰帝。是故三皇創號，五帝次之。然則皇之爲稱，妙於帝矣。肅謂爲輕，不亦謬乎！臣松之以爲上古謂皇皇后帝，次言三、五，先皇後帝，誠如盛言。然漢氏諸帝，雖尊父爲皇，其實則貴而無位，高而無民，比之於帝，得不謂之輕乎！魏因漢禮，名號無改。孝獻之崩，豈得遠考古義？肅之所云，蓋就漢制而爲言耳。謂之爲謬，乃是譏漢，非難肅也。
