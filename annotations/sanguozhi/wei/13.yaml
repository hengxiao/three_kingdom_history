  text: 《列異傳》曰：歆爲諸生時，嘗宿人門外。主人婦夜產。有頃，兩吏詣門，便辟易却，相謂曰：「公在此。」躊躇良乆，一吏曰：「籍當定，柰何得住？」乃前向歆拜，相將入。出並行，共語曰：「當與幾歲？」一人曰：「當三歲。」天明，歆去。後欲驗其事，至三歲，故往問兒消息，果已死。歆乃自知當爲公。臣松之按《晉陽秋》說魏舒少時寄宿事，亦如之。以爲理無二人俱有此事，將由傳者不同。今寧信列異。
