- id: wei.17.p2.a1
  anchor: wei.17.p2
  at: 569
  length: 0
  type: pei
  text: 傅子曰：「太祖將征柳城，遼諫曰：『夫許，天子之會也。今天子在許，公遠北征，若劉表遣劉備襲許，據之以號令四方，公之勢去矣。』太祖策表必不能任備，遂行也。」
