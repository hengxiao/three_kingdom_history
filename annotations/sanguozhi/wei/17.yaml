- id: wei.17.p10.a1
  anchor: wei.17.p10
  at: 185
  length: 0
  type: pei
  text: 魏書載制曰：「昔荀林父敗績於邲，孟明喪師於殽，秦晉不替，使復其位。其後晉獲狄土，秦霸西戎，區區小國，猶尙若斯，而況萬乘乎？樊城之敗，水災暴至，非戰之咎，其復禁等官。」
- id: wei.17.p11.a1
  anchor: wei.17.p11
  at: 76
  length: 0
  type: pei
  text: 漢晉春秋曰：「郃説紹曰：『公雖連勝，然勿與曹公戰也，密遣輕騎鈔絶其南，則兵自敗矣。』紹不從之。」
- id: wei.17.p11.a2
  anchor: wei.17.p11
  at: 254
  length: 0
  type: pei
  text: 臣松之案武紀及袁紹傳幷云袁紹使張郃、高覽攻太祖營，郃等聞淳于瓊破，遂來降，紹衆於是大潰。是則緣郃等降而後紹軍壞也。至如此傳，爲紹軍先潰，懼郭圖之譖，然後歸太祖，爲參錯不同矣。
- id: wei.17.p12.a1
  anchor: wei.17.p12
  at: 361
  length: 0
  type: pei
  text: 魏略曰：「淵雖爲都督，劉備憚郃而易淵。及殺淵，備曰：『當得其魁，用此何爲邪！』」
- id: wei.17.p15.a1
  anchor: wei.17.p15
  at: 45
  length: 0
  type: pei
  text: 魏略曰：「亮軍退，司馬宣王使郃追之，郃曰：『軍法，圍城必開出路，歸軍勿追。』宣王不聽。郃不得已，遂進。蜀軍乘高布伏，弓弩亂發，矢中郃髀。」
- id: wei.17.p17.a1
  anchor: wei.17.p17
  at: 11
  length: 0
  type: pei
  text: 卷，音墟權反。
