- id: wei.17.p9.a1
  anchor: wei.17.p9
  at: 355
  length: 0
  type: pei
  text: 臣松之以爲圍而後降，法雖不赦；囚而送之，未爲違命。禁曾不爲舊交希冀萬一，而肆其好殺之心，以戾衆人之議，所以卒爲降虜，死加惡諡，宜哉。
