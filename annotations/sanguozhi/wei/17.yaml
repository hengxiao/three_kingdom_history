- id: wei.17.p21.a1
  anchor: wei.17.p21
  at: 115
  length: 0
  type: pei
  text: 九州春秋曰：「初，清河季雍以鄃叛袁紹而降公孫瓚，瓚遣兵衞之。紹遣靈攻之。靈家在城中，瓚將靈母弟置城上，誘呼靈。靈望城涕泣曰：『丈夫一出身與人，豈復顧家耶！』遂力戰拔之，生擒雍而靈家皆死。」魏書曰：「靈字文博。太祖旣平冀州，遣靈將新兵五千人騎千匹守許南。太祖戒之曰：『冀州新兵，數承寛緩，暫見齊整，意尙怏怏。卿名先有威嚴，善以道寛之，不然即有變。』靈至陽翟，中郎將程昂等果反，即斬昂，以狀聞。太祖手書曰：『兵中所以爲危險者，外對敵國，內有姦謀不測之變。昔鄧禹中分光武軍西行，而有宗歆、馮愔之難，後將二十四騎還洛陽，禹豈以是減損哉？來書懇惻，多引咎過，未必如所云也。』文帝即位，封靈鄃侯，增其戸邑。詔曰：『將軍佐命先帝，典兵歷年，威過方邵，功逾絳灌。圖籍所美，何以加焉？朕受天命，帝有海內，元功之將，社稷之臣，皆朕所與同福共慶，傳之無窮者也。今封隃侯。富貴不歸故鄕，如夜行衣繡。若平常所志，原勿難言。』靈謝曰：『高唐，宿所原。』於是更封高唐侯，薨，諡曰威侯。」
