- id: wei.17.p4.a1
  anchor: wei.17.p4
  at: 411
  length: 0
  type: pei
  text: 孫盛曰：夫兵固詭道，奇正相資，若乃命將出征，推轂委權，或賴率然之形，或憑掎角之勢，群帥不和，則棄師之道也。至於合肥之守，縣弱無援，專任勇者則好戰生患，專任怯者則懼心難保。且彼衆我寡，必懷貪墯；以致命之兵，擊貪墯之卒，其勢必勝；勝而後守，守則必固。是以魏武推選方員，參以同異，爲之密教，節宣其用；事至而應，若合符契，妙矣夫！
