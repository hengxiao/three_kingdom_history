  at: 7
  length: 0
  type: pei
  text: 《魏略》曰：是後大發士息，及取諸國士。植以近前諸國士息已見發，孤稚弱，在者無幾，而復被取，乃上書曰：『臣聞古者聖君，與日月齊其明，四時等其信，是以戮凶無重，賞善無輕，怒若驚霆，喜若時雨，恩不中絕，教無二可，以此臨朝，則臣下知所死矣。受任在萬里之外，審主之所授官，必己之所以投命，雖有構會之徒，泊然不以為懼者，蓋君臣相信之明效也。昔章子為齊將，人有告之反者，威王曰：「不然。」左右曰：「王何以明之？」王曰：「聞章子改葬死母；彼尚不欺死父，顧當叛生君乎？」此君之信臣也。昔管仲親射桓公，後幽囚從魯檻車載，使少年輓而送齊。管仲知桓公之必用己，懼魯之悔，謂少年曰：「吾為汝唱，汝為和，聲和聲，宜走。」於是管仲唱之，少年走而和之，日行數百裡，宿昔而至。至則相齊，此臣之信君也。臣初受封，策書曰：「植受茲青社，封於東土，以屏翰皇家，為魏藩輔。」而所得兵百五十人，皆年在耳順，或不逾矩，虎賁官騎及親事凡二百餘人。正復不老，皆使年壯，備有不虞，檢校乘城，顧不足以自救，況皆復耄耋罷曳乎？而名為魏東藩，使屏翰王室，臣竊自羞矣。就之諸國，國有士子，合不過五百人。伏以為三軍益損，不復賴此。方外不定，必當須辦者，臣願將部曲倍道奔赴，夫妻負襁，子弟懷糧，蹈鋒履刃，以徇國難，何但習業小兒哉？愚誠以揮涕增河，鼷鼠飲海，於朝萬無損益，於臣家計甚有廢損。又臣士息前後三送，兼人已竭。惟尚有小兒，七八歲已上，十六七已還，三十餘人。今部曲皆年耆，卧在床席，非糜不食，眼不能視，氣息裁屬者，凡三十七人；疲瘵風靡，疣盲聾聵者，二十三人。惟正須此小兒，大者可備宿衛，雖不足以禦寇，粗可以警小盜；小者未堪大使，為可使耘鉏穢草，驅護鳥雀。休侯人則一事廢，一日獵則眾業散，不親自經營則功不攝；常自躬親，不委下吏而已。陛下聖仁，恩詔三至，士子給國，長不複發。明詔之下，有若皦日，保金石之恩，必明神之信，畫然自固，如天如地。定習業者並復見送，晻若晝晦，悵然失圖。伏以為陛下既爵臣百寮之右，居藩國之任，為置卿士，屋名為宮，冢名為陵，不使其危居獨立，無異於凡庶。若柏成欣於野耕，子仲樂於灌園；蓬戶茅牖，原憲之宅也；陋巷簞瓢，顏子之居也：臣才不見效用，常慨然執斯志焉。若陛下聽臣悉還部曲，罷官屬，省監官，使解璽釋紱，追柏成、子仲之業，營顏淵、原憲之事，居子臧之廬，宅延陵之室。如此，雖進無成功，退有可守，身死之日，猶松、喬也。然伏度國朝終未肯聽臣之若是，固當羈絆於世繩，維繫於祿位，懷屑屑之小憂，執無已之百念，安得蕩然肆志，逍遙於宇宙之外哉？此願未從，陛下必欲崇親親，篤骨肉，潤白骨而榮枯木者，惟遂仁德以副前恩詔。』皆遂還之。
