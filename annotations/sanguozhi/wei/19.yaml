  type: pei
  text: 《魏略》曰：太子嗣立，既葬，遣彰之國。始彰自以先王見任有功，冀因此遂見授用，而聞當隨例，意甚不悅，不待遣而去。時以鄢陵塉薄，使治中牟。及帝受禪，因封為中牟王。是後大駕幸許昌，北州諸侯上下，皆畏彰之剛嚴；每過中牟，不敢不速。
