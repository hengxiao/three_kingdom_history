  text: 劉向《說苑》曰：越甲至齊，雍門狄請死之。齊王曰：『鼓鐸之聲未聞，矢石未交，長兵未接，子何務死？知為人臣之禮邪？』雍門狄對曰：『臣聞之，昔者王田於囿，左轂鳴，車右請死之，王曰：「子何為死？」車右曰：「為其鳴吾君也。」王曰：「左轂鳴者，此工師之罪也。子何事之有焉？」車右對曰：「吾不見工師之乘，而見其鳴吾君也。」遂刎頸而死。有是乎？』王曰：『有之。』雍門狄曰：『今越甲至，其鳴吾君，豈左轂之下哉？車右可以死左轂，而臣獨不可以死越甲邪？』遂刎頸而死。是日，越人引軍而退七十里，曰：『齊王有臣，鈞如雍門狄，疑使越社稷不血食。』遂歸。齊王葬雍門狄以上卿之禮。
