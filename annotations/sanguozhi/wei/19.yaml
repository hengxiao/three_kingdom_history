- id: wei.19.p28.a1
  anchor: wei.19.p28
  at: 67
  length: 0
  type: pei
  text: 魚豢曰：諺言『貧不學儉，卑不學恭』，非人性分也，勢使然耳。此實然之勢，信不虛矣。假令太祖防遏植等，在於疇昔，此賢之心，何緣有窺望乎？彰之挾恨，尚無所至。至於植者，豈能興難？乃令楊脩以倚註遇害，丁儀以希意族滅，哀夫！餘每覽植之華採，思若有神。以此推之，太祖之動心，亦良有以也。
