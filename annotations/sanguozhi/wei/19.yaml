  text: 植常為琴瑟調歌，辭曰：『吁嗟此轉蓬，居世何獨然！長去本根逝，夙夜無休間。東西經七陌，南北越九阡，卒遇迴風起，吹我入雲間。自謂終天路，忽焉下沉淵。驚飈接我出，故歸彼中田。當南而更北，謂東而反西，宕宕當何依，忽亡而復存。飄颻周八澤，連翩歷五山，流轉無恆處，誰知吾苦艱？願為中林草，秋隨野火燔，糜滅豈不痛，願與根荄連。』孫盛曰：異哉，魏氏之封建也！不度先王之典，不思藩屏之術，違敦睦之風，背維城之義。漢初之封，或權侔人主，雖雲不度，時勢然也。魏氏諸侯，陋同匹夫，雖懲七國，矯枉過也。且魏之代漢，非積德之由，風澤既微，六合未一，而彫翦枝幹，委權異族，勢同瘣木，危若巢幕，不嗣忽諸，非天喪也。五等之制，萬世不易之典。六代興亡，曹冏論之詳矣。
- id: wei.19.p26.a1
  anchor: wei.19.p26
  at: 128
  length: 0
  type: pei
  text: 《志別傳》曰：志字允恭，好學有才行。晉武帝為中撫軍，迎常道鄉公於鄴，志夜與帝相見，帝與語，從暮至旦，甚器之。及受禪，改封鄄城公。發詔以志為樂平太守，歷章武、趙郡，遷散騎常侍、國子博士，後轉博士祭酒。及齊王攸當之藩，下禮官議崇錫之典，志嘆曰：『安有如此之才，如此之親，而不得樹本助化，而遠出海隅者乎？』乃建議以諫，辭旨甚切。帝大怒，免志官。後復為散騎常侍。志遭母憂，居喪盡哀，因得疾病，喜怒失常，太康九年卒，謚曰定公。
