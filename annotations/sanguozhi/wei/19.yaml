  length: 0
  type: pei
  text: 《魏略》曰：初植未到關，自念有過，宜當謝帝。乃留其從官著關東，單將兩三人微行，入見清河長公主，欲因主謝。而關吏以聞，帝使人逆之，不得見。太後以為自殺也，對帝泣。會植科頭負鈇鑕，徒跣詣闕下，帝及太後乃喜。及見之，帝猶嚴顏色，不與語，又不使冠履。植伏地泣涕，太後為不樂。詔乃聽復王服。《魏氏春秋》曰：是時待遇諸國法峻。任城王暴薨。諸王既懷友於之痛。植及白馬王彪還國，欲同路東歸，以敘隔闊之思，而監國使者不聽。植髮憤告離而作詩曰：『謁帝承明廬，逝將歸舊疆。清晨發皇邑，日夕過首陽。伊洛曠且深，欲濟川無梁。汎舟越洪濤，怨彼東路長。回顧戀城闕，引領情內傷。大谷何寥廓，山樹鬱蒼蒼。霖雨泥我塗，流潦浩從橫。中逵絕無軌，改轍登高岡。修阪造雲日，我馬玄以黃。玄黃猶能進，我思鬱以紆。鬱紆將何念？親愛在離居。本圖相與偕，中更不克俱。鴟梟鳴衡軛，豺狼當路衢；蒼蠅間白黑，讒巧反親疏。欲還絕無蹊，攬轡止踟躕。踟躕亦何留，相思無終極。秋風發微涼，寒蟬鳴我側。原野何蕭條，白日忽西匿。孤獸走索群，銜草不遑食。歸鳥赴高林，翩翩厲羽翼。感物傷我懷，撫心長嘆息。嘆息亦何為，天命與我違。奈何念同生，一往形不歸！孤魂翔故域，靈柩寄京師。存者勿復過，亡沒身自衰。人生處一世，忽若朝露晞。年在桑榆間，影響不能追。自顧非金石，咄吒令心悲。心悲動我神，棄置莫復陳。丈夫志四海，萬里猶比鄰。恩愛苟不虧，在遠分日親。何必同衾幬，然後展殷勤。倉卒骨肉情，能不懷苦辛？苦辛何慮思，天命信可疑。虛無求列仙，松子久吾欺。變故在斯須，百年誰能持？離別永無會，執手將何時？王其愛玉體，俱享黃髮期。收涕即長塗，援筆從此辭。』
