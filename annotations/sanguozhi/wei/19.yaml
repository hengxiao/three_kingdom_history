- id: wei.19.p12.a1
  anchor: wei.19.p12
  at: 17
  length: 0
  type: pei
  text: 《魏略》曰：◎丁儀字正禮，沛郡人也。父沖，宿與太祖親善，時隨乘輿。見國家未定，乃與太祖書曰：『足下平生常喟然有匡佐之志，今其時矣。』是時張楊適還河內，太祖得其書，乃引軍迎天子東詣許，以沖為司隸校尉。後數來過諸將飲，酒美不能止，醉爛腸死。太祖以沖前見開導，常德之。聞儀為令士，雖未見，欲以愛女妻之，以問五官將。五官將曰：『女人觀貌，而正禮目不便，誠恐愛女未必悅也。以為不如與伏波子楙。』太祖從之。尋闢儀為掾，到與論議，嘉其才朗，曰：『丁掾，好士也，即使其兩目盲，尚當與女，何況但眇？是吾兒誤我。』時儀亦恨不得尚公主，而與臨菑侯親善，數稱其奇才。太祖既有意欲立植，而儀又共贊之。及太子立，欲治儀罪，轉儀為右刺奸掾，欲儀自裁而儀不能。乃對中領軍夏侯尚叩頭求哀，尚為涕泣而不能救。後遂因職事收付獄，殺之。◎廙字敬禮，儀之弟也。《文士傳》曰：廙少有才姿，博學洽聞。初闢公府，建安中為黃門侍郎。廙嘗從容謂太祖曰：『臨菑侯天性仁孝，發於自然，而聰明智達，其殆庶幾。至於博學淵識，文章絕倫。當今天下之賢才君子，不問少長，皆願從其游而為之死，實天所以鍾福於大魏，而永授無窮之祚也。』欲以勸動太祖。太祖答曰：『植，吾愛之，安能若卿言！吾欲立之為嗣，何如？』廙曰：『此國家之所以興衰，天下之所以存亡，非愚劣瑣賤者所敢與及。廙聞知臣莫若於君，知子莫若於父。至於君不論明闇，父不問賢愚，而能常知其臣子者何？蓋由相知非一事一物，相盡非一旦一夕。況明公加之以聖哲，習之以人子。今發明達之命，吐永安之言，可謂上應天命，下合人心，得之於須臾，垂之於萬世者也。廙不避斧鉞之誅，敢不盡言！』太祖深納之。
