  text: 《魏略》曰：太祖在漢中，而劉備栖於山頭，使劉封下挑戰。太祖罵曰：『賣履舍兒，長使假子拒汝公乎！待呼我黃鬚來，令擊之。』乃召彰。彰晨夜進道，西到長安而太祖已還，從漢中而歸。彰鬚黃，故以呼之。
