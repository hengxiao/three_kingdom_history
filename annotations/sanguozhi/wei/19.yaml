  text: 臣松之案：秦用敗軍之將，事顯，故不註。魯連與燕將書曰：『曹子為魯將，三戰三北而亡地五百裡，向使曹子計不反顧，義不旋踵，刎頸而死，則亦不免為敗軍之將矣。曹子棄三北之恥，而退與魯君計。桓公朝天子，會諸侯，曹子以一劍之任，披桓公之心於壇坫之上，顏色不變，辭氣不悖。三戰之所亡，一朝而復之。天下震動，諸侯驚駭，威加吳、越。』若此二士者，非不能成小廉而行小節也。
