  type: pei
  text: 《九州春秋》曰：初，布騎將侯成遣客牧馬十五匹，客悉驅馬去，向沛城，欲歸劉備。成自將騎逐之，悉得馬還。諸將合禮賀成，成釀五六斛酒，獵得十餘頭豬，未飲食，先持半豬五斗酒自入詣布前，跪言：「間蒙將軍恩，逐得所失馬，諸將來相賀，自釀少酒，獵得豬，未敢飲食，先奉上微意。」布大怒曰：「布禁酒，卿釀酒，諸將共飲食作兄弟，共謀殺布邪？」成大懼而去，棄所釀酒，還諸將禮。由是自疑，會太祖圍下邳，成遂領衆降。
- id: wei.7.p12.a4
  anchor: wei.7.p12
  at: 321
  length: 0
  type: pei
  text: 《英雄記》曰：布謂太祖曰：「布待諸將厚也，諸將臨急皆叛布耳。」太祖曰：「卿背妻，愛諸將婦，何以爲厚？」布默然。《獻帝春秋》曰：布問太祖：「明公何瘦？」太祖曰：「君何以識孤？」布曰：「昔在洛，會溫氏園。」太祖曰：「然。孤忘之矣。所以瘦，恨不早相得故也。」布曰：「齊桓舍射鉤，使管仲相；今使布竭股肱之力，爲公前驅，可乎？」布縛急，謂劉備曰：「玄德，卿爲坐客，我爲執虜，不能一言以相寬乎？」太祖笑曰：「何不相語，而訴明使君乎？」意欲活之，命使寬縛。主簿王必趨進曰：「布，勍虜也。其衆近在外，不可寬也。」太祖曰：「本欲相緩，主簿復不聽，如之何？」
- id: wei.7.p12.a5
  anchor: wei.7.p12
  at: 344
  length: 0
  type: pei
  text: 《英雄記》曰：順爲人清白有威嚴，不飲酒，不受饋遺。所將七百餘兵，號爲千人，鎧甲鬬具皆精練齊整，每所攻擊無不破者，名爲陷陣營。順每諫布，言「凡破家亡國，非無忠臣明智者也，但患不見用耳。將軍舉動，不肯詳思，輙喜言誤，誤不可數也」。布知其忠，然不能用。布從郝萌反後，更疏順。以魏續有外內之親，悉奪順所將兵以與續。及當攻戰，故令順將續所領兵，順亦終無恨意。
- id: wei.7.p13.a1
  anchor: wei.7.p13
  at: 71
  length: 0
  type: pei
  text: 魚氏《典略》曰：陳宮字公臺，東郡人也。剛直烈壯，少與海內知名之士皆相連結。及天下亂，始隨太祖，後自疑，乃從呂布，爲布畫策，布每不從其計。下邳敗，軍士執布及宮，太祖皆見之，與語平生，故布有求活之言。太祖謂宮曰：「公臺，卿平常自謂智計有餘，今竟何如？」宮顧指布曰：「但坐此人不從宮言，以至於此。若其見從，亦未必爲禽也。」太祖笑曰：「今日之事當云何？」宮曰：「爲臣不忠，爲子不孝，死自分也。」太祖曰：「卿如是，柰卿老母何？」宮曰：「宮聞將以孝治天下者不害人之親，老母之存否，在明公也。」太祖曰：「若卿妻子何？」宮曰：「宮聞將施仁政於天下者不絕人之祀，妻子之存否，亦在明公也。」太祖未復言。宮曰：「請出就戮，以明軍法。」遂趨出，不可止。太祖泣而送之，宮不還顧。宮死後，太祖待其家皆厚於初。
- id: wei.7.p14.a1
