  length: 0
  type: pei
  text: 《先賢行狀》曰：登忠亮高爽，沈深有大略，少有扶世濟民之志。博覽載籍，雅有文藝，舊典文章，莫不貫綜。年二十五，舉孝廉，除東陽長，養耆育孤，視民如傷。是時世荒民饑，州牧陶謙表登爲典農校尉，乃巡土田之宜，盡鑿溉之利，秔稻豐積。奉使到許，太祖以登爲廣陵太守，令陰合衆以圖呂布。登在廣陵，明審賞罰，威信宣布。海賊薛州之羣萬有餘戶，束手歸命。未及期年，功化以就，百姓畏而愛之。登曰：「此可用矣。」太祖到下邳，登率郡兵爲軍先驅。時登諸弟在下邳城中，布乃質執登三弟，欲求和同。登執意不撓，進圍日急。布刺姦張弘，懼於後累，夜將登三弟出就登。布旣伏誅，登以功加拜伏波將軍，甚得江、淮間歡心，於是有吞滅江南之志。孫策遣軍攻登於匡琦城。賊初到，旌甲覆水，羣下咸以今賊衆十倍於郡兵，恐不能抗，可引軍避之，與其空城。水人居陸，不能久處，必尋引去。登厲聲曰：「吾受國命，來鎮此土。昔馬文淵之在斯位，能南平百越，北滅羣狄，吾旣不能遏除凶慝，何逃寇之謂邪！吾其出命以報國，仗義以整亂，天道與順，克之必矣。」乃閉門自守，示弱不與戰，將士銜聲，寂若無人。登乘城望形勢，知其可擊，乃申令將士，宿整兵器，昧爽，開南門，引軍指賊營，步騎鈔其後。賊周章方結陣，不得還舩。登手執軍鼓，縱兵乘之，賊遂大破，皆棄舩迸走。登乘勝追奔，斬虜以萬數。賊忿喪軍，尋復大興兵向登。登以兵不敵，使功曹陳矯求救於太祖。登密去城十里治軍營處所，令多取柴薪，兩束一聚，相去十步，從橫成行，令夜俱起火，火然其聚。城上稱慶，若大軍到。賊望火驚潰，登勒兵追奔，斬首萬級。遷登爲東城太守。廣陵吏民佩其恩德，共拔郡隨登，老弱繈負而追之。登曉語令還，曰：「太守在卿郡，頻致吳寇，幸而克濟。諸卿何患無令君乎？」孫權遂跨有江外。太祖每臨大江而歎，恨不早用陳元龍計，而令封豕養其爪牙。文帝追美登功，拜登息肅爲郎中。
- id: wei.7.p15.a1
  anchor: wei.7.p15
  at: 36
  length: 0
  type: pei
  text: 謝承《後漢書》曰：旻有幹事才，達於從政，為漢良吏。初從徐州從事闢司徒府，除盧奴令，冀州舉尤異，遷揚州刺史、丹楊太守。是時邊方有警，羌、胡出寇，三府舉能，遷旻匈奴中郎將。討賊有功，徵拜議郎，還京師。見太尉袁逢，逢問其西域諸國土地、風俗、人物、種數。旻具答言西域本三十六國，後分為五十五，稍散至百餘國；其國大小，道裡近遠，人數多少，風俗燥濕，山川、草木、鳥獸、異物名種，不與中國同者，悉口陳其狀，手畫地形。逢奇其才，嘆息言：「雖班固作西域傳，何以加此？」旻轉拜長水校尉，終太原太守。
- id: wei.7.p16.a1
  anchor: wei.7.p16
  at: 425
  length: 0
  type: pei
  text: 臣松之案：於時此盟止有劉岱等五人而已。魏氏春秋橫內劉表等數人，皆非事實。表保據江、漢，身未嘗出境，何由得與洪同壇而盟乎？
- id: wei.7.p17.a1
  anchor: wei.7.p17
  at: 73
  length: 0
  type: pei
  text: 《九州春秋》曰：初平中，焦和為青州刺史。是時英雄並起，黃巾寇暴，和務及同盟，俱入京畿，不暇為民保障，引軍逾河而西。未久而袁、曹二公卓將戰於滎陽，敗績。黃巾遂廣，屠裂城邑。和不能禦，然軍器尚利，戰士尚眾，而耳目偵邏不設，恐動之言妄至，望寇奔走，未嘗接風塵交旗鼓也。欲作陷冰丸沈河，令賊不得渡，禱祈群神，求用兵必利，耆筮常陳於前，巫祝不去於側；入見其清談干雲，出則渾亂，命不可知。州遂蕭條，悉為丘墟也。
- id: wei.7.p19.a1
  anchor: wei.7.p19
  at: 607
  length: 0
  type: pei
  text: 臣松之案《英雄記》云：「袁紹使張景明、郭公則、高元才等說韓馥，使讓冀州。」然馥之讓位，景明亦有其功。其餘之事未詳。
- id: wei.7.p19.a2
  anchor: wei.7.p19
  at: 684
  length: 0
  type: pei
  text: 臣松之案：公孫瓚表列紹罪過雲：「紹與故虎牙將軍劉勛首共造兵，勳仍有效，而以小忿枉害於勳，紹罪七也。」疑此是子璜也。
- id: wei.7.p21.a1
  anchor: wei.7.p21
  at: 187
  length: 0
  type: pei
  text: 徐眾《三國評》曰：洪敦天下名義，救舊君之危，其恩足以感人情，義足以勵薄俗。然袁亦知己親友，致位州郡，雖非君臣，且實盟主，既受其命，義不應貳。袁、曹方睦，夾輔王室，呂布反覆無義，志在逆亂，而邈、超擅立布為州牧，其於王法，乃一罪人也。曹公討之，袁氏弗救，未為非理也。洪本不當就袁請兵，又不當還為怨讎。為洪計者，苟力所不足，可奔他國以求赴救，若謀力未展以待事機，則宜徐更觀釁，效死於超。何必誓守窮城而無變通，身死殄民，功名不立，良可哀也！
