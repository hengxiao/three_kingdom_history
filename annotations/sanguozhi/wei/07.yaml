  type: pei
  text: 《英雄記》曰：原字建陽。本出自寒家，為人粗略，有武勇，善騎射。為南縣吏，受使不辭難，有警急，追寇虜，輒在其前。裁知書，少有吏用。
- id: wei.7.p2.a1
  anchor: wei.7.p2
  at: 77
  length: 0
  type: pei
  text: 詩曰：「無拳無勇，職為亂階。」注：「拳，力也。」
- id: wei.7.p3.a1
  anchor: wei.7.p3
  at: 170
  length: 0
  type: pei
  text: 《英雄記》曰：郭汜在城北。布開城門，將兵就汜，言「且卻兵，但身決勝負」。汜、布乃獨共對戰，布以矛刺中汜，汜後騎遂前救汜，汜、布遂各兩罷。
- id: wei.7.p3.a2
  anchor: wei.7.p3
  at: 192
  length: 0
  type: pei
  text: 臣松之案《英雄記》曰：諸書，布以四月二十三日殺卓，六月一日敗走，時又無閏，不及六旬。
- id: wei.7.p4.a1
