  at: 59
  length: 0
  type: pei
  text: 《曹瞞傳》曰：時人語曰：「人中有呂布，馬中有赤兔。」
- id: wei.7.p4.a2
  anchor: wei.7.p4
  at: 132
  length: 0
  type: pei
  text: 《英雄記》曰：布自以有功於袁氏，輕傲紹下諸將，以為擅相署置，不足貴也。布求還洛，紹假布領司隸校尉。外言當遣，內欲殺布。明日當發，紹遣甲士三十人，辭以送布。布使止於帳側，偽使人於帳中鼓箏。紹兵臥，布無何出帳去，而兵不覺。夜半兵起，亂斫布床被，謂為已死。明日，紹訊問，知布尚在，乃閉城門。布遂引去。
- id: wei.7.p4.a3
  anchor: wei.7.p4
  at: 153
  length: 0
  type: pei
  text: 《英雄記》曰：楊及部曲諸將，皆受傕、汜購募，共圖布。布聞之，謂楊曰：「布，卿州里也。卿殺布，於卿弱。不如賣布，可極得汜、傕爵寵。」楊於是外許汜、傕，內實保護布。汜、傕患之，更下大封詔書，以布為潁川太守。
- id: wei.7.p7.a1
  anchor: wei.7.p7
  at: 0
  length: 0
  type: pei
  text: 《英雄記》曰：布見備，甚敬之，謂備曰：「我與卿同邊地人也。布見關東起兵，欲誅董卓。布殺卓東出，關東諸將無安布者，皆欲殺布耳。」請備於帳中坐婦牀上，令婦向拜，酌酒飲食，名備爲弟。備見布語言無常，外然之而內不說。
- id: wei.7.p7.a2
  anchor: wei.7.p7
  at: 45
  length: 0
  type: pei
  text: 《獻帝春秋》曰：袁術議稱尊號，邈謂術曰：「漢據火德，絕而復揚，德澤豐流，誕生明公。公居軸處中，入則享于上席，出則爲衆目之所屬，華、霍不能增其高，淵泉不能同其量，可謂巍巍蕩蕩，無與爲貳。何爲捨此而欲稱制？恐福不盈眥，禍將溢世。莊周之稱郊祭犧牛，養飼經年，衣以文繡，宰執鸞刀，以入廟門，當此之時，求爲孤犢不可得也！」案本傳，邈詣術，未至而死。而此云諫稱尊號，未詳孰是。
- id: wei.7.p8.a1
  anchor: wei.7.p8
  at: 31
  length: 0
  type: pei
  text: 《英雄記》曰：布初入徐州，書與袁術。術報書曰：「昔董卓作亂，破壞王室，禍害術門戶，術舉兵關東，未能屠裂卓。將軍誅卓，送其頭首，爲術掃滅讐耻，使術明目於當世，死生不愧，其功一也。昔將金元休向兖州，甫詣封部，爲曹操逆所拒破，流離迸走，幾至滅亡。將軍破兖州，術復明目於遐邇，其功二也。術生年已來，不聞天下有劉備，備乃舉兵與術對戰；術憑將軍威靈，得以破備，其功三也。將軍有三大功在術，術雖不敏，奉以生死。將軍連年攻戰，軍糧苦少，今送米二十萬斛，迎逢道路，非直此止，當駱驛復致；若兵器戰具，佗所乏少，大小唯命。」布得書大喜，遂造下邳。《典略》曰：元休名尚，京兆人也。尚與同郡韋休甫、第五文休俱著名，號爲三休。尚，獻帝初爲兖州刺史，東之郡，而太祖已臨兖州。尚南依袁術。術僭號，欲以尚爲太尉，不敢顯言，私使人諷之，尚無屈意，術亦不敢彊也。建安初，尚逃還，爲術所害。其後尚喪與太傅馬日磾喪俱至京師，天子嘉尚忠烈，爲之咨嗟，詔百官弔祭，拜子瑋郎中，而日磾不與焉。《英雄記》曰：布水陸東下，軍到下邳西四十里。備中郎將丹楊許耽夜遣司馬章誑來詣布，言「張益德與下邳相曹豹共爭，益德殺豹，城中大亂，不相信。丹楊兵有千人屯西白城門內，聞將軍來東，大小踊躍，如復更生。將軍兵向城西門，丹楊軍便開門內將軍矣」。布遂夜進，晨到城下。天明，丹楊兵悉開門內布兵。布於門上坐，步騎放火，大破益德兵，獲備妻子軍資及部曲將吏士家口。建安元年六月夜半時，布將河內郝萌反，將兵入布所治下邳府，詣廳事閤外，同聲大呼攻閤，閤堅不得入。布不知反者爲誰，直牽婦，科頭袒衣，相將從溷上排壁出，詣都督高順營，直排順門入。順問：「將軍有所隱不？」布言「河內兒聲」。順言「此郝萌也」。順即嚴兵入府，弓弩並射萌衆；萌衆亂走，天明還故營。萌將曹性反萌，與對戰，萌刺傷性，性斫萌一臂。順斫萌首，牀輿性，送詣布。布問性，言「萌受袁術謀，謀者悉誰？」性言「陳宮同謀。」時宮在坐上，靣赤，傍人悉覺之。布以宮大將，不問也。性言「萌常以此問，性言呂將軍大將有神，不可擊也，不意萌狂惑不止。」布謂性曰：「卿健兒也！」善養視之。創愈，使安撫萌故營，領其衆。
- id: wei.7.p9.a1
  anchor: wei.7.p9
  at: 196
  length: 0
  type: pei
  text: 《英雄記》曰：初，天子在河東，有手筆版書召布來迎。布軍無畜積，不能自致，遣使上書。朝廷以布爲平東將軍，封平陶侯。使人於山陽界亡失文字，太祖又手書厚加慰勞布，說起迎天子，當平定天下意，并詔書購捕公孫瓚、袁術、韓暹、楊奉等。布大喜，復遣使上書於天子曰：「臣本當迎大駕，知曹操忠孝，奉迎都許。臣前與操交兵，今操保傅陛下，臣爲外將，欲以兵自隨，恐有嫌疑，是以待罪徐州，進退未敢自寧。」答太祖曰：「布獲罪之人，分爲誅首，手命慰勞，厚見褒獎。重見購捕袁術等詔書，布當以命爲效。」太祖更遣奉車都尉王則爲使者，齎詔書，又封平東將軍印綬來拜布。太祖又手書與布曰：「山陽屯送將軍所失大封，國家無好金，孤自取家好金更相爲作印，國家無紫綬，自取所帶紫綬以籍心。將軍所使不良。袁術稱天子，將軍止之，而使不通章。朝廷信將軍，使復重上，以相明忠誠。」布乃遣登奉章謝恩，并以一好綬答太祖。
- id: wei.7.p11.a1
  anchor: wei.7.p11
  at: 138
  length: 0
  type: pei
  text: 《九州春秋》載布與暹、奉書曰：「二將軍拔大駕來東，有元功於國，當書勳竹帛，萬世不朽。今袁術造逆，當共誅討，奈何與賊臣還共伐布？布有殺董卓之功，與二將軍俱爲功臣，可因今共擊破術，建功於天下，此時不可失也。」暹、奉得書，即迴計從布。布進軍，去勳等營百步，暹、奉兵同時並發，斬十將首，殺傷墮水死者不可勝數。《英雄記》曰：布後又與暹、奉二軍向壽春，水陸並進，所過虜略。到鍾離，大獲而還。旣渡淮北，留書與術曰：「足下恃軍彊盛，常言猛將武士，欲相吞滅，每抑止之耳！布雖無勇，虎步淮南，一時之間，足下鼠竄壽春，無出頭者。猛將武士，爲悉何在？足下喜爲大言以誣天下，天下之人安可盡誣？古者兵交，使在其間，造策者非布先唱也。相去不遠，可復相聞。」布渡畢，術自將步騎五千揚兵淮上，布騎皆於水北大咍笑之而還。時有東海蕭建爲琅邪相，治莒，保城自守，不與布通。布與建書曰：「天下舉兵，本以誅董卓爾。布殺卓，來詣關東，欲求兵西迎大駕，光復洛京，諸將自還相攻，莫肯念國。布，五原人也，去徐州五千餘里，乃在天西北角，今不來共爭天東南之地。莒與下邳相去不遠，宜當共通。君如自遂以爲郡郡作帝，縣縣自王也！昔樂毅攻齊，呼吸下齊七十餘城，唯莒、即墨二城不下，所以然者，中有田單故也。布雖非樂毅，君亦非田單，可取布書與智者詳共議之。」建得書，即遣主簿齎牋上禮，貢良馬五匹。建尋爲臧霸所襲破，得建資實。布聞之，自將步騎向莒。高順諫曰：「將軍躬殺董卓，威震夷狄，端坐顧盼，遠近自然畏服，不宜輕自出軍；如或不捷，損名非小。」布不從。霸畏布鈔暴，果登城拒守。布不能拔，引還下邳。霸後復與布和。
- id: wei.7.p12.a1
  anchor: wei.7.p12
  at: 74
  length: 0
  type: pei
  text: 《獻帝春秋》曰：太祖軍至彭城。陳宮謂布：「宜逆擊之，以逸擊勞，無不克也。」布曰：「不如待其來攻，蹙著泗水中。」及太祖軍攻之急，布於白門樓上謂軍士曰：「卿曹無相困，我當自首明公。」陳宮曰：「逆賊曹操，何等明公！今日降之，若卵投石，豈可得全也！」
- id: wei.7.p12.a2
  anchor: wei.7.p12
  at: 101
  length: 0
  type: pei
  text: 《英雄記》曰：布遣許汜、王楷告急於術。術曰：「布不與我女，理自當敗，何爲復來相聞邪？」汜、楷曰：「明上今不救布，爲自敗耳！布破，明上亦破也。」術時僭號，故呼爲明上。術乃嚴兵爲布作聲援。布恐術爲女不至，故不遣兵救也，以緜纏女身，縛著馬上，夜自送女出與術，與太祖守兵相觸，格射不得過，復還城。布欲令陳宮、高順守城，自將騎斷太祖糧道。布妻謂曰：「將軍自出斷曹公糧道是也。宮、順素不和，將軍一出，宮、順必不同心共城守也，如有蹉跌，將軍當於何自立乎？願將軍諦計之，無爲宮等所誤也。妾昔在長安，已爲將軍所棄，賴得龐舒私藏妾身耳，今不須顧妾也。」布得妻言，愁悶不能自決。《魏氏春秋》曰：陳宮謂布曰：「曹公遠來，勢不能久。若將軍以步騎出屯，爲勢於外，宮將餘衆閉守於內，若向將軍，宮引兵而攻其背，若來攻城，將軍爲救於外。不過旬日，軍食必盡，擊之可破。」布然之。布妻曰：「昔曹氏待公臺如赤子，猶舍而來。今將軍厚公臺不過於曹公，而欲委全城，捐妻子，孤軍遠出，若一旦有變，妾豈得爲將軍妻哉！」布乃止。
