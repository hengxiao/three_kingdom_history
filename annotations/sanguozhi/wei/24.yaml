  type: pei
  text: 謝承《後漢書》曰：幹字元才。才志弘邈，文武秀出。父躬，蜀郡太守。祖賜，司隷校尉。案《陳留耆舊傳》及謝承《書》，幹應為柔從父，非從兄也。未知何者為誤。
