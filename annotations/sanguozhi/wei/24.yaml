  text: 《晉諸公贊》曰：柔長子儁，大將軍掾，次誕，歷三州刺史、太僕。誕放率不倫，而決烈過人。次光，字宣茂，少習家業，明練法理。晉武帝世，為黃沙御史，與中丞同，遷守廷尉，後即真。兄誕與光異操，謂光小節，常輕侮之，而光事誕愈謹。終於尚書令。追贈司空。
