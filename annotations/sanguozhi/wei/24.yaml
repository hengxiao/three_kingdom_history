- id: wei.24.p10.a1
  anchor: wei.24.p10
  at: 265
  length: 0
  type: pei
  text: 臣松之以為孟軻稱宰我之辭曰：「予以觀夫子，賢於堯舜遠矣。」又曰：「生民以來，未有盛於孔子者也。」斯非通賢之格言，商較之定準乎！雖妙極則同，萬聖猶一，然淳薄異時，質文殊用，或當時則榮，沒則已焉，是以遺風所被，寔有深淺。若乃經緯天人，立言垂制，百王莫之能違，彝倫資之以立，誠一人而已耳。周監二代，斯文為盛。然於六經之道，未能及其精致。加以聖賢不興，曠年五百，道化陵夷，憲章殆滅，若使時無孔門，則周典幾乎息矣。夫能光明先王之道，以成萬世之功，齊天地之無窮，等日月之久照，豈不有踰於羣聖哉？林曾無史遷洞想之誠，梅真慷慨之志，而守其蓬心以塞明義，可謂多見其不知量也。
