  text: 《晉諸公贊》曰：述弟隨，晉尚書僕射。為人亮濟。趙王倫篡位，隨與其事。倫敗，隨亦廢錮而卒。林孫瑋，性率而踈，至太子右衞率也。初，林識拔同郡王經於民伍之中，卒為名士，世以此稱之。
- id: wei.24.p12.a1
  anchor: wei.24.p12
  at: 21
  length: 0
  type: pei
  text: 《陳留耆舊傳》曰：靖高祖父固，不仕王莽世，為淮陽太守所害，以烈節垂名。固子慎，字孝甫。敦厚少華，有沈深之量。撫育孤兄子五人，恩義甚篤。琅邪相何英嘉其行履，以女妻焉。英即車騎將軍熈之父也。慎歷二縣令、東萊太守。老病歸家，草屋蓬戶，甕缶無儲。其妻謂之曰：「君累經宰守，積有年歲，何能不少為儲畜以遺子孫乎？」慎曰：「我以勤身清名為之基，以二千石遺之，不亦可乎！」子式，至孝，常盡力供養。永初中，螟蝗為害，獨不食式麥，圉令周彊以表州郡。太守楊舜舉式孝子，讓不行。後以孝廉為郎。次子昌，昌弟賜，並為刺史、郡守。式子弘，孝廉。弘生靖。
- id: wei.24.p13.a1
