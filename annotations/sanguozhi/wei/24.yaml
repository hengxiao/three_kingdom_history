  at: 268
  length: 0
  type: pei
  text: 《魏名臣奏》載柔上疏曰：「臣深思陛下所以不早取此鹿者，誠欲使極蕃息，然後大取以為軍國之用。然臣竊以為今鹿但有日耗，終無從得多也。何以知之？今禁地廣輪且千餘里，臣下計無慮其中有虎大小六百頭，狼有五百頭，狐萬頭。使大虎一頭三日食一鹿，一虎一歲百二十鹿，是為六百頭虎一歲食七萬二千頭鹿也。使十狼日共食一鹿，是為五百頭狼一歲共食萬八千頭鹿。鹿子始生，未能善走，使十狐一日共食一子，比至健走一月之間，是為萬狐一月共食鹿子三萬頭也。大凡一歲所食十二萬頭。其鵰鶚所害，臣置不計。以此推之，終無從得多，不如早取之為便也。」
