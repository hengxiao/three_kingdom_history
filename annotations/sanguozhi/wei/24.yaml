  text: 《楚國先賢傳》曰：曁臨終遺言曰：「夫俗奢者，示之以儉，儉則節之以禮。歷見前代送終過制，失之甚矣。若爾曹敬聽吾言，斂以時服，葬以土藏，穿畢便葬，送以瓦器，慎勿有增益。」又上疏曰：「生有益於民，死猶不害於民。況臣備位台司，在職日淺，未能宣揚聖德以廣益黎庶。寢疾彌留，奄即幽冥。方今百姓農務，不宜勞役，乞不令洛陽吏民供設喪具。懼國典有常，使臣私願不得展從，謹冒以聞，惟蒙哀許。」帝得表嗟歎，乃詔曰：「故司徒韓曁，積德履行，忠以立朝，至於黃髮，直亮不虧。旣登三事，望獲毗輔之助，如何奄忽，天命不永！曾參臨沒，易簀以禮；晏嬰尚儉，遣車降制。今司徒知命，遺言卹民，必欲崇約，可謂善始令終者也。其喪禮所設，皆如故事，勿有所闕。」時賜溫明祕器，衣一稱，五時朝服，玉具劒佩。
- id: wei.24.p4.a3
  anchor: wei.24.p4
  at: 162
  length: 0
  type: pei
  text: 《楚國先賢傳》曰：邦字長林。少有才學。晉武帝時為野王令，有稱績。為新城太守，坐舉野王故吏為新城計吏，武帝大怒，遂殺邦。曁次子繇，高陽太守。繇子洪，侍御史。洪子壽，字德貞。《晉諸公贊》曰：自曁已下，世治素業，壽能敦尚家風，性尤忠厚。早歷清職，惠帝踐阼，為散騎常侍，遷守河南尹。病卒，贈驃騎將軍。壽妻賈充女。充無後，以壽子謐為嗣，弱冠為祕書監侍中，性驕佚而才出壽。少子蔚，亦有器望，並為趙王倫所誅。韓氏遂滅。
- id: wei.24.p6.a1
  anchor: wei.24.p6
  at: 172
  length: 0
  type: pei
  text: 案《王氏譜》：雄字元伯，太保祥之宗也。《魏名臣奏》載安定太守孟達薦雄曰：「臣聞明君以求賢為業，忠臣以進善為效，故易稱『拔茅連茹』，傳曰『舉爾所知』。臣不自量，竊慕其義。臣昔以人乏，謬充備部職。時涿郡太守王雄為西部從事，與臣同僚。雄天性良固，果而有謀。歷試三縣，政成人和。及在近職，奉宣威恩，懷柔有術，清慎持法。臣往年出使，經過雄郡。自說特受陛下拔擢之恩，常勵節精心，思投命為效。言辭激揚，情趣款惻。臣雖愚闇，不識真偽，以謂雄才兼資文武，忠烈之性，踰越倫輩。今涿郡領戶三千，孤寡之家，參居其半，北有守兵藩衞之固，誠不足舒雄智力，展其勤幹也。臣受恩深厚，無以報國，不勝慺慺淺見之情，謹冒陳聞。」詔曰：「昔蕭何薦韓信，鄧禹進吳漢，惟賢知賢也。雄有膽智技能文武之姿，吾宿知之。今便以參散騎之選，方使少在吾門下知指歸，便大用之矣。天下之士，欲使皆先歷散騎，然後出據州郡，是吾本意也。」雄後為幽州刺史。子渾，涼州刺史。次乂，平北將軍。司徒安豐侯戎，渾之子。太尉武陵侯衍、荊州刺史澄，皆乂之子。
