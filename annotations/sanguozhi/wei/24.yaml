- id: wei.24.p24.a1
  anchor: wei.24.p24
  at: 228
  length: 0
  type: pei
  text: 孫盛曰：聞五帝無誥誓之文，三王無盟祝之事，然則盟誓之文，始自三季，質任之作，起於周微。夫貞夫之一，則天地可動，機心內萌，則鷗鳥不下。況信不足焉而祈物之必附，猜生於我而望彼之必懷，何異挾冰求溫，抱炭希涼者哉？且夫要功之倫，陵肆之類，莫不背情任計，昧利忘親，縱懷慈孝之愛，或慮傾身之禍。是以周、鄭交惡，漢高請羹，隗嚻捐子，馬超背父，其為酷忍如此之極也，安在其因質委誠，取任永固哉？世主若能遠覽先王閑邪之至道，近鑒狡肆徇利之凶心，勝之以解網之仁，致之以來蘇之惠，燿之以雷霆之威，潤之以時雨之施，則不恭可歛衽於一朝，炰哮可屈膝於象魏矣。何必拘厥親以來其情，逼所愛以制其命乎？苟不能然，而仗夫計術，籠之以權數，檢之以一切，雖覽一室而庶徵於四海，法生鄙局，兾或半之暫益，自不得不有不忍之刑，以遂孥戮之罰，亦猶瀆盟由乎一人，而云俾墜其師，無克遺育之言耳。豈得復引四罪不及之典，司馬牛獲宥之義乎？假令任者皆不保其父兄，輒有二三之言，曲哀其意而悉活之，則長人子危親自存之悖。子弟雖質，必無刑戮之憂，父兄雖逆，終無勦絕之慮。柔不究明此術非盛王之道，宜開張遠義，蠲此近制，而陳法內之刑以申一人之命，可謂心存小善，非王者之體。古者殺人之中，又有仁焉。刑之於獄，未為失也。臣松之以為辨章事理，貴得當時之宜，無為虛唱大言而終歸無用。浮誕之論，不切於實，猶若畫魑魅之象，而躓於犬馬之形也。質任之興，非防近世，況三方鼎峙，遼東偏遠，羈其親屬以防未然，不為非矣。柔謂晃有先言之善，宜蒙原心之宥。而盛責柔不能開張遠理，蠲此近制。不達此言竟為何謂？若云猜防為非，質任宜廢，是謂應大明先王之道，不預任者生死也。晃之為任，歷年已久，豈得於殺活之際，方論至理之本。是何異叢棘旣繁，事須判決，空論刑措之美，無聞當不之實哉？其為迂闊，亦已甚矣，漢高事窮理迫，權以濟親，而總之酷忍之科，旣已大有所誣。且自古已來，未有子弟妄告父兄以圖全身者，自存之悖，未之或聞。晃以兄告弟，而其事果驗。謂晃應殺，將以遏防。若言之亦死，不言亦死，豈不杜歸善之心，失正刑之中哉？若趙括之母，以先請獲免，鍾會之兄，以密言全子，古今此比，蓋為不少。晃之前言，事同斯例，而獨遇否閉，良可哀哉！
- id: wei.24.p25.a1
