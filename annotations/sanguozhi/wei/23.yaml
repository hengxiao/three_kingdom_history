  at: 161
  length: 0
  type: pei
  text: 臣松之案《漢書文紀》曰「阽於死亡」，《食貨志》曰「阽危若是」，注曰「阽音鹽，如屋簷，近邊欲墮之意也。」一曰「臨危曰阽」。
- id: wei.23.p3.a1
  anchor: wei.23.p3
  at: 219
  length: 0
  type: pei
  text: 孫盛曰：昔先王御世，觀民設敎，雖質文因時，損益代用，至於車服禮秩，貴賤等差，其歸一揆。魏承漢亂，風俗侈泰，誠宜仰思古制，訓以約簡，使奢不陵肆，儉足中禮，進無蜉蝣之刺，退免采莫之譏；如此則治道隆而頌聲作矣。夫矯枉過正則巧僞滋生，以克訓下則民志險隘，非聖王所以陶化民物，閑邪存誠之道。和洽之言，於是允矣。
- id: wei.23.p7.a1
  anchor: wei.23.p7
  at: 39
  length: 0
  type: pei
  text: 离音離。
- id: wei.23.p7.a2
  anchor: wei.23.p7
  at: 58
  length: 0
  type: pei
  text: 晉諸公贊曰：和嶠字長輿，逌之子也。少知名，以雅重稱。常慕其舅夏侯玄之爲人，厚自封植，嶷然不羣。於黃門郎遷中書令，轉尚書。愍懷太子初立，以嶠爲少保，加散騎常侍。家產豐富，擬於王公，而性至儉吝。嶠同母弟郁，素無名，嶠輕侮之，以此爲損。卒於官，贈光祿大夫。郁以公彊當世，致位尚書令。
- id: wei.23.p8.a1
  anchor: wei.23.p8
  at: 25
  length: 0
  type: pei
  text: 劭字子將。汝南先賢傳曰：召陵謝子微，高才遠識，見劭年十八時，乃歎息曰：「此則希世出衆之偉人也。」劭始發明樊子昭於鬻幘之肆，出虞永賢於牧豎，召李淑才鄉閭之閒，擢郭子瑜鞍馬之吏，援楊孝祖，舉和陽士，茲六賢者，皆當世之令懿也。其餘中流之士，或舉之於淹滯，或顯之乎童齒，莫不賴劭顧歎之榮。凡所拔育，顯成令德者，不可殫記。其探擿僞行，抑損虛名，則周之單襄，無以尚也。劭宗人許栩，沉沒榮利，致位司徒。舉宗莫不匍匐栩門，承風而驅，官以賄成，惟劭不過其門。廣陵徐孟玉來臨汝南，聞劭高名，請爲功曹。饕餮放流，絜士盈朝。袁紹公族好名，爲濮陽長，棄官來還，有副車從騎，將入郡界，紹乃歎曰：「吾之輿服，豈可使許子將見之乎？」遂單車而歸。辟公府掾，拜鄢陵令，方正徵，皆不就。避亂江南，所歷之國，必翔而後集。終于豫章，時年四十六。有子曰混，顯名魏世。
- id: wei.23.p9.a1
  anchor: wei.23.p9
  at: 64
  length: 0
  type: pei
  text: 魏略曰：林少單貧。雖貧，自非手力，不取之於人。性好學，漢末爲諸生，帶經耕鉏。其妻常自餽餉之，林雖在田野，其相敬如賓。
- id: wei.23.p11.a1
  anchor: wei.23.p11
  at: 46
  length: 0
  type: pei
  text: 《魏略》曰：林性既清白，當官又嚴。少府寺與鴻臚對門，時崔林爲鴻臚。崔性闊達，不與林同，數數聞林撾吏聲，不以爲可。林夜撾吏，不勝痛，叫呼敖敖徹曙。明日，崔出門，與林車相遇，乃啁林曰：「聞卿爲廷尉，爾邪？」林不覺答曰：「不也。」崔曰：「卿不爲廷尉，昨夜何故考囚乎？」林大慚，然不能自止。
- id: wei.23.p11.a2
  anchor: wei.23.p11
  at: 147
  length: 0
  type: pei
  text: 《魏略》曰：初，林少與司馬京兆善。太傅每見林，輒欲跪。林止之曰：「公尊貴矣，止也！」及司徒缺，太傅有意欲以林補之。案魏略此語，與本傳反。臣松之以爲林之爲人，不畏權貴者也。論其然否，謂本傳爲是。
- id: wei.23.p11.a3
  anchor: wei.23.p11
  at: 219
  length: 0
  type: pei
  text: 案晉書，諸葛誕反，大將軍東征，旹坐稱疾，爲司馬文王所法。《魏略》以林及吉茂、沐並、時苗四人爲《清介傳》。◎吉茂字叔暢，馮翊池陽人也，世爲著姓。好書，不恥惡衣惡食，而恥一物之不知。建安初，關中始平，茂與扶風蘇則共入武功南山，隱處精思數歲。州舉茂才，除臨汾令，居官清靜，吏民不忍欺。轉爲武德侯庶子。二十二年，坐其宗人吉本等起事被收。先是科禁內學及兵書，而茂皆有，匿不送官。及其被收，不知當坐本等，顧謂其左右曰：「我坐書也。」會鍾相國證茂、本服第已絕，故得不坐。後以茂爲武陵太守，不之官。轉酂相，以國省，拜議郎。景初中病亡。自茂修行，從少至長，冬則被裘，夏則裋褐，行則步涉，食則茨藿，臣役妻子，室如懸磬。其或饋遺，一不肯受。雖不以此高人，亦心疾不義而貴且富者。先時國家始制九品，各使諸郡選置中正，差敘自公卿以下，至于郎吏，功德材行所任。茂同郡護羌校尉王琰，前數爲郡守，不名爲清白。而琰子嘉仕歷諸縣，亦復爲通人。嘉時還爲散騎郎，馮翊郡移嘉爲中正。嘉敘茂雖在上第，而狀甚下，云：「德優能少。」茂慍曰：「痛乎，我效汝父子冠幘劫人邪！」初，茂同產兄黃，以十二年中從公府掾爲長陵令。是時科禁長吏擅去官，而黃聞司徒趙溫薨，自以爲故吏，違科奔喪，爲司隸鍾繇所收，遂伏法。茂時爲白衣，始有清名於三輔，以爲兄坐追義而死，怨怒不肯哭。至歲終，繇舉茂。議者以爲茂必不就，及舉既到而茂就之，故時人或以茂爲畏繇，或以茂爲髦士也。◎沐並字德信，河間人也。少孤苦，袁紹父子時，始爲名吏。有志介，嘗過姊，姊爲殺雞炊黍而不留也。然爲人公果，不畏彊禦，丞相召署軍謀掾。黃初中，爲成皋令。校事劉肇出過縣，遣人呼縣吏，求索稾穀。是時蝗旱，官無有見。未辦之間，肇人從入並之閤下，呴呼罵吏。並怒，因躧履提刀而出，多從吏卒，欲收肇。肇覺知驅走，具以狀聞。有詔：「肇爲牧司爪牙吏，而並欲收縛，無所忌憚，自恃清名邪？」遂收欲殺之。（肇）髡決減死，刑竟復吏，由是放散十餘年。至正始中，爲三府長史。時吳使朱然、諸葛瑾攻圍樊城，遣船兵於峴山東斫材，牂牁人兵作食，有先熟者呼後熟者，言：「共食來。」後熟者答言：「不也。」呼者曰：「汝欲作沐德信邪？」其名流布，播於異域如此。雖自華夏，不知者以爲前世人也。爲長史八年，晚出爲濟陰太守，召還，拜議郎。年六十餘，自慮身無常，豫作終制，戒其子以儉葬，曰：「告雲、儀等：夫禮者，生民之始敎，而百世之中庸也。故力行者則爲君子，不務者終爲小人，然非聖人莫能履其從容也。是以富貴者有驕奢之過，而貧賤者譏於固陋，於是養生送死，苟竊非禮。由斯觀之，陽虎璵璠，甚於暴骨，桓魋石椁，不如速朽。此言儒學撥亂反正、鳴鼓矯俗之大義也，未是夫窮理盡性、陶冶變化之實論也。若能原始要終，以天地爲一區，萬物爲芻狗，該覽玄通，求形景之宗，同禍福之素，一死生之命，吾有慕於道矣。夫道之爲物，惟恍惟忽，壽爲欺魄，夭爲鳧沒，身淪有無，與神消息，含悅陰陽，甘夢太極。奚以棺椁爲牢，衣裳爲纏？屍繫地下，長幽桎梏，豈不哀哉！昔莊周闊達，無所適莫；又楊王孫裸體，貴不久容耳。至夫末世，緣生怨死之徒，乃有含珠鱗柙，玉牀象衽，殺人以狥；壙穴之內，錮以紵絮，藉以蜃炭，千載僵燥，託類神仙。於是大敎陵遲，競於厚葬，謂莊子爲放蕩，以王孫爲戮屍，豈復識古有衣薪之鬼，而野有狐狸之胔乎哉？吾以材質滓濁，汙於清流。昔忝國恩，歷試宰守，所在無效，代匠傷指，狼跋首尾，無以雪恥。如不可求，從吾所好。今年過耳順，奄忽無常，苟得獲沒，即以吾身襲於王孫矣。上冀以贖巿朝之逋罪，下以親道化之靈祖。顧爾幼昏，未知臧否，若將逐俗，抑廢吾志，私稱從令，未必爲孝；而犯魏顆聽治之賢，爾爲棄父之命，誰或矜之！使死而有知，吾將屍視。」至嘉平中，病甚。臨困，又敕豫掘埳。戒氣絕，令二人舉屍即埳，絕哭泣之聲，止婦女之送，禁弔祭之賓，無設摶治粟米之奠。又戒後亡者不得入藏，不得封樹。妻子皆遵之。◎時苗字德胄，钜鹿人也。少清白，爲人疾惡。建安中，入丞相府。出爲壽春令，令行風靡。揚州治在其縣，時蔣濟爲治中。苗以初至往謁濟，濟素嗜酒，適會其醉，不能見苗。苗恚恨還，刻木爲人，署曰「酒徒蔣濟」，置之牆下，旦夕射之。州郡雖知其所爲不恪，然以其履行過人，無若之何。又其始之官，乘薄軬〈音飯。〉車，黃牸牛，布被囊。居官歲餘，牛生一犢。及其去，留其犢，謂主簿曰：「令來時本無此犢，犢是淮南所生有也。」羣吏曰：「六畜不識父，自當隨母。」苗不聽，時人皆以爲激，然由此名聞天下。還爲太官令，領其郡中正，定九品，於敘人才不能寬，然紀人之短，雖在久遠，銜之不置。如所忿蔣濟者，仕進至太尉，濟不以苗前毀己爲嫌，苗亦不以濟貴更屈意。爲令數歲，不肅而治。遷典農中郎將。年七十餘，以正始中病亡也。
