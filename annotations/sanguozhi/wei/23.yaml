  text: 《魏略》曰：舊故四征有官廚財籍，遷轉之際，無不因緣。而儼义手上車，發到霸上，忘持其常所服藥。雍州聞之，乃追送雜藥材數箱，儼笑曰：「人言語殊不易，我偶問所服藥耳，何用是爲邪？」遂不取。
