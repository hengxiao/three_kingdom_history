- id: wei.23.p27.a1
  anchor: wei.23.p27
  at: 180
  length: 0
  type: pei
  text: 《魏略》曰：時遠近皆云當爲公，會病亡。始潛自感所生微賤，無舅氏，又爲父所不禮，即折節仕進，雖多所更歷，清省恪然。每之官，不將妻子。妻子貧乏，織藜芘以自供。又潛爲兗州時，嘗作一胡床，及其去也，留以掛柱。又以父在京師，出入薄軬車；羣弟之田廬，常步行；家人小大或幷日而食；其家敎上下相奉，事有似於石奮。其履檢校度，自魏興少能及者。潛爲人材博，有雅（要）容，然但如此而已，終無所推進，故世歸其絜而不宗其餘。
- id: wei.23.p28.a1
  anchor: wei.23.p28
  at: 11
  length: 0
  type: pei
  text: 《文章敘錄》曰：秀字季彥。弘通博濟，八歲能屬文，遂知名。大將軍曹爽辟。喪父服終，推財與兄弟。年二十五，遷黃門侍郎。爽誅，以故吏免。遷衛國相，累遷散騎常侍、尚書僕射令、光祿大夫。咸熙中，晉文王始建五等，命秀典爲制度，封廣川侯。晉室受禪，進左光祿大夫，改封钜鹿公，遷司空。著易及樂論，又畫地域圖十八篇，傳行於世。盟會圖及典治官制皆未成。年四十八，泰始七年薨，諡元公，配食宗廟。少子頠，字逸民，襲封。荀綽《冀州記》曰：頠爲人弘雅有遠識，博學稽古，履行高整，自少知名。歷位太子中庶子、侍中尚書。元康末，爲尚書左僕射。趙王倫以其望重，畏而惡之，知其不與賈氏同心，猶被枉害。臣松之案陸機《惠帝起居注》稱「頠雅有遠量，當朝名士也」，又曰「民之望也」。頠理具淵博，贍於論難，著崇有、貴無二論，以矯虛誕之弊，文辭精富，爲世名論。子嵩，字道文。荀綽稱嵩有父祖風。爲中書郎，早卒。頠從父弟邈，字景聲，有雋才，爲太傅司馬越從事中郎，假節監中外營諸軍事。潛少弟徽，字文季，冀州刺史。有高才遠度，善言玄妙。事見荀粲、傅嘏、王弼、管輅諸傳。徽長子黎，字伯宗，一名演，遊擊將軍。次康，字仲豫，太子左衛率。次楷，字叔則，侍中中書令、光祿大夫、開府。次綽，字季舒，黃門侍郎，早卒，追贈長水校尉。康、楷、綽皆爲名士，而楷才望最重。《晉諸公贊》曰：康有弘量，綽以明達爲稱，楷少與琅邪王戎俱爲掾發名，鍾會致之大將軍司馬文王曰：「裴楷清通，王戎簡要。」文王即辟爲掾，進歷顯位。謝鯤爲樂廣傳，稱楷雋朗有識具，當時獨步。黎子苞，秦州刺史。康子純，黃門侍郎。次盾，徐州刺史。次郃，有器望。晉元帝爲安東將軍，郃爲長史，侍中王曠與司馬越書曰：「裴郃在此，雖不治事，然識量弘淹，此下人士大敬附之。」次廓，中壘將軍。楷子瓚，中書郎。次憲，豫州刺史。綽子遐，太傅主簿。瓚、遐並有盛名，早卒。《晉諸公贊》稱憲有清識。
