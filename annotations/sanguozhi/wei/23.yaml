  at: 187
  length: 0
  type: pei
  text: 《世語》曰：俊二孫：覽字公質，汝陰太守；猗字公彥，尚書：晉東海王越舅也。覽子沈，字宣弘，散騎常侍。《魏略》曰：王象字羲伯。既爲俊所知拔，果有才志。建安中，與同郡荀緯等俱爲魏太子所禮待。及王粲、陳琳、阮瑀、路粹等亡後，新出之中，惟象才最高。魏有天下，拜象散騎侍郎，遷爲常侍，封列侯。受詔撰《皇覽》，使象領秘書監。象從延康元年始撰集，數歲成，藏於祕府，合四十餘部，部有數十篇，通合八百餘萬字。象既性器和厚，又文采溫雅，用是京師歸美，稱爲儒宗。車駕南巡，未到宛，有詔百官不得干豫郡縣。及車駕到，而宛令不解詔旨，閉巿門。帝聞之，忿然曰：「吾是寇邪？」乃收宛令及太守楊俊。詔問尚書：「漢明帝殺幾二千石？」時象見詔文，知俊必不免。乃當帝前叩頭，流血竟面，請俊減死一等。帝不答，欲釋入禁中。象引帝衣，帝顧謂象曰：「我知楊俊與卿本末耳。今聽卿，是無我也。卿寧無俊邪？無我邪？」象以帝言切，乃縮手。帝遂入，決俊法，然後乃出。象自恨不能濟俊，遂發病死。
- id: wei.23.p15.a1
  anchor: wei.23.p15
  at: 27
  length: 0
  type: pei
  text: 先賢行狀曰：安年十歲，名稱鄉黨。至十三，入太學，號曰神童。既名知人，清高絕俗。洛陽令周紆數候安，安常逃避不見。時貴戚慕安高行，多有與書者，輒不發，以慮後患，常鑿壁藏書。後諸與書者果有大罪，推捕所與交通者，吏至門，安乃發壁出書，印封如故，當時皆嘉其慮遠。三府並辟，公車特徵，拜宛令。先是宛有報讎者，其令不忍致理，將與俱亡。縣中豪彊有告其處者，致捕得。安深疾惡之，到官治戮，肆之於巿。懼有司繩彈，遂自免。後徵拜巴郡太守，率身正下，以禮化俗。以病卒官，時服薄斂，素器不漆，子自將車。州郡賢之，表章墳墓。根舉孝廉，除郎中。時和熹鄧后臨朝，外戚橫恣，安帝長大，猶未歸政。根乃與同時郎上書直諫，鄧后怒，收根等伏誅。誅者皆絹囊盛，於殿上撲地。執法者以根德重事公，默語行事人，使不加力。誅訖，車載城外，根以撲輕得蘇息，遂閉目不動搖。經三日，乃密起逃竄，爲宜城山中酒家客，積十五年，酒家知其賢，常厚敬待。鄧后崩，安帝謂根久死。以根等忠直，普下天下，錄見誅者子孫。根乃自出，徵詣公車，拜符節令。或問根：「往日遭難，天下同類知故不少，何至自苦歷年如此？」根答曰：「周旋人間，非絕跡之處。邂逅發露，禍及親知，故不爲也。」遷濟陰太守，以德讓爲政，風移俗改。年七十八以壽終，棺不加漆，斂以時服。長吏下車，常先詣安、根墓致祠。
- id: wei.23.p16.a1
  anchor: wei.23.p16
  at: 242
  length: 0
  type: pei
  text: 《九州春秋》曰：建安六年，劉表攻西鄂，西鄂長杜子緒帥縣男女嬰城而守。時南陽功曹柏孝長亦在城中，聞兵攻聲，恐懼，入室閉戶，牽被覆頭。相攻半日，稍敢出面。其明，側立而聽。二日，往出戶問消息。至四五日，乃更負楯親鬭，語子緒曰：「勇可習也。」
