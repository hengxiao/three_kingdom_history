  length: 0
  type: pei
  text: 《魏略》曰：潛世爲著姓。父茂，仕靈帝時，歷縣令、郡守、尚書。建安初，以奉使率導關中諸將討李傕有功，封列侯。潛少不脩細行，由此爲父所不禮。
