  type: pei
  text: 《魏略》曰：太祖北拒袁紹，時遠近無不私遺牋記，通意於紹者。儼與領陽安太守李通同治，通亦欲遣使。儼爲陳紹必敗意，通乃止。及紹破走，太祖使人搜閱紹記室，惟不見通書疏，陰知儼必爲之計，乃曰：「此必趙伯然也。」臣松之案《魏武紀》：破紹後，得許下軍中人書，皆焚之。若故使人搜閱，知其有無，則非所以安人情也。疑此語爲不然。
- id: wei.23.p22.a1
  anchor: wei.23.p22
  at: 547
  length: 0
  type: pei
  text: 孫盛曰：盛聞爲國以禮，民非信不立。周成不棄桐葉之言，晉文不違伐原之誓，故能隆刑措之道，建一匡之功。儼既詐留千人，使效心力，始雖權也。宜以信終。兵威既集，而又逼徙。信義喪矣，何以臨民？
