- id: wei.9.p26.a1
  anchor: wei.9.p26
  at: 87
  length: 0
  type: pei
  text: 初，宣王以爽魏之肺腑，每推先之，爽以宣王名重，亦引身卑下，當時稱焉。丁謐、畢軌等旣進用，數言於爽曰：「宣王有大志而甚得民心，不可以推誠委之。」由是爽恒猜防焉。禮貌雖存，而諸所興造，皆不復由宣王。宣王力不能爭，且懼其禍，故避之。
