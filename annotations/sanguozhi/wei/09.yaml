  text: 《世語》曰：經字彥偉，初爲江夏太守。大將軍曹爽附絹二十匹令交市於吳，經不發書，棄官歸。母問歸狀，經以實對。母以經典兵馬而擅去，對送吏杖經五十，爽聞，不復罪。經爲司隷校尉，辟河內向雄爲都官從事，王業之出，不申經，竟以及難。經刑於東市，雄哭之，感動一市。刑及經母，雍州故吏皇甫晏以家財收葬焉。《漢晉春秋》曰：經被收，辭母。母顏色不變，笑而應曰：「人誰不死？往所以不止汝者，恐不得其所也。以此并命，何恨之有哉？」晉武帝太始元年詔曰：「故尚書王經，雖身陷法辟，然守志可嘉。門戶堙沒，意常愍之，其賜經孫郎中。」
