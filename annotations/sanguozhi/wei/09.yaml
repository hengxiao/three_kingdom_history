  text: 《世語》曰：偉字世英，馮翊人。明帝治宮室，偉諫曰：「今作宮室，斬伐生民墓上松柏，毀壞碑獸石柱，辜及亡人，傷孝子心，不可以爲後世之法則。」
- id: wei.9.p25.a3
  anchor: wei.9.p25
  at: 258
  length: 0
  type: pei
  text: 《漢晉春秋》曰：司馬宣王謂夏侯玄曰：「春秋責大德重，昔武皇帝再入漢中，幾至大敗，君所知也。今興平路勢至險，蜀已先據；若進不獲戰，退見徼絕，覆軍必矣。將何以任其責！」玄懼，言於爽，引軍退。費禕進兵據三嶺以截爽，爽爭嶮苦戰，僅乃得過。所發牛馬運轉者，死失略盡，羌、胡怨歎，而關右悉虛耗矣。
