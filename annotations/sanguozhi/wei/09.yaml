  text: 干寶《晉書》曰：桓範出赴爽，宣王謂蔣濟曰：「智囊往矣。」濟曰：「範則智矣，駑馬戀棧豆，爽必不能用也。」《世語》曰：宣王使許允、陳泰解語爽，蔣濟亦與書達宣王之旨，又使爽所信殿中校尉尹大目謂爽，唯免官而已，以洛水爲誓。爽信之，罷兵。《魏氏春秋》曰：爽旣罷兵，曰：「我不失作富家翁。」範哭曰：「曹子丹佳人，生汝兄弟，犢耳！何圖今日坐汝等族滅矣！」
