  text: 《魏略》曰：允字士宗，世冠族。父據，仕歷典農校尉、郡守。允少與同郡崔贊俱發名於冀州，召入軍。明帝時爲尚書選曹郎，與陳國袁侃對，同坐職事，皆收送獄，詔旨嚴切，當有死者，正直者爲重。允謂侃曰：「卿，功臣之子，法應八議，不憂死也。」侃知其指，乃爲受重。允刑竟復吏，出爲郡守，稍遷爲侍中尚書中領軍。允聞李豐等被收，欲往見大將軍，已出門，回遑不定，中道還取袴，豐等已收訖。大將軍聞允前遽，恠之曰：「我自收豐等，不知士大夫何爲忩忩乎？」是時朝臣遽者多耳，而衆人咸以爲意在允也。會鎮北將軍劉靜卒，朝廷以允代靜。已受節傳，出止外舍。大將軍與允書曰：「鎮北雖少事，而都典一方，念足下震華鼓，建朱節，歷本州，此所謂著繡晝行也。」允心甚恱，與臺中相聞，欲易其鼓吹旌旗。其兄子素頗聞衆人說允前見嫌意，戒允「但當趣耳，用是爲邪」！允曰：「卿俗士不解，我以榮國耳，故求之。」帝以允當出，乃詔會羣臣，羣臣皆集，帝特引允以自近；允前爲侍中，顧當與帝別，涕泣歔欷。會訖，罷出，詔促允令去。會有司奏允前擅以厨錢穀乞諸俳及其官屬，故遂收送廷尉，考問竟，減死徙邊。允以嘉平六年秋徙，妻子不得自隨，行道未到，以其年冬死。《魏氏春秋》曰：允爲吏部郎，選郡守。明帝疑其所用非次，召入，將加罪。允妻阮氏跣出，謂曰：「明主可以理奪，難以情求。」允頷之而入。帝怒詰之，允對曰：「某郡太守雖限滿文書先至，年限在後，某守雖後，日限在前。」帝前取事視之，乃釋遣出。望其衣敗，曰：「清吏也。」賜之。允之出爲鎮北也，喜謂其妻曰：「吾知免矣！」妻曰：「禍見於此，何免之有？」允善相印，將拜，以印不善，使更刻之，如此者三。允曰：「印雖始成而已被辱。」問送印者，果懷之而墜於厠。相印書曰：「相印法本出陳長文，長文以語韋仲將，印工楊利從仲將受法，以語許士宗。利以法術占吉凶，十可中八九。仲將問長文『從誰得法』？長文曰：『本出漢世，有相印、相笏經，又有鷹經、牛經、馬經。印工宗養以法語程申伯，是故有一十三家相法傳於世。』」允妻阮氏賢明而醜，允始見愕然，交禮畢，無復入意。妻遣婢覘之，云「有客姓桓」，妻曰：「是必桓範，將勸使入也。」旣而範果勸之。允入，須臾便起，妻捉裾留之。允顧謂婦曰：「婦有四德，卿有其幾？」婦曰：「新婦所乏唯容。士有百行，君有其幾？」許曰：「皆備。」婦曰：「士有百行，以德爲首，君好色不好德，何謂皆備？」允有慙色，知其非凡，遂雅相親重。生二子，奇、猛，少有令問。允後爲景王所誅，門生走入告其婦，婦正在機，神色不變，曰：「早知爾耳。」門生欲藏其子，婦曰：「無預諸兒事。」後移居墓所，景王遣鍾會看之，若才藝德能及父，當收。兒以語母，母荅：「汝等雖佳，才具不多，率胷懷與會語，便自無憂，不須極哀，會止便止。又可多少問朝事。」兒從之。會反命，具以狀對，卒免其禍，皆母之教也。雖會之識鑒，而輸賢婦之智也。果慶及後嗣，追封子孫而已。《世語》曰：允二子：奇字子泰，猛字子豹，並有治理才學。晉元康中，奇爲司隷校尉，猛幽州刺史。傅暢《晉諸公贊》曰：猛禮樂儒雅，當時最優。奇子遐，字思祖，以清尚稱，位至侍中。猛子式，字儀祖，有才幹，至濮陽內史、平原太守。
