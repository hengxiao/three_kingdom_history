  type: pei
  text: 《魏略》曰：文帝收洪，時曹真在左右，請之曰：「今誅洪，洪必以真爲譖也。」帝曰：「我自治之，卿何豫也？」會卞太后責怒帝，言「梁、沛之間，非子廉無有今日」。詔乃釋之。猶尚沒入其財產。太后又以爲言，後乃還之。初，太祖爲司空時，以己率下，每歲发调，使本縣平赀。於時譙令平洪赀財與公家等，太祖曰：「我家赀那得如子廉耶！」文帝在東宫，尝從洪贷绢百匹，洪不稱意。及洪犯法，自分必死，既得原，喜，上書谢曰：「臣少不由道，过在人伦，長窃非任，遂蒙含贷。性無检度知足之分，而有豺狼無厌之質，老惛倍贪，触突國网，罪迫三千，不在赦宥，當就辜誅，棄諸市朝，猶蒙天恩，骨肉更生。臣仰视天日，愧負靈神，俯惟愆阙，惭愧怖悸，不能雉經以自裁割，谨涂颜阙門，拜章陳情。」
