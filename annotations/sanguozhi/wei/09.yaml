  text: 《魏略》曰：玄旣遷，司馬景王代爲護軍。護軍總統諸將，任主武官選舉，前後當此官者，不能止貨賂。故蔣濟爲護軍時，有謠言「欲求牙門，當得千匹；百人督，五百匹」。宣王與濟善，聞以問濟，濟無以解之，因戲曰：「洛中市買，一錢不足則不行。」遂相對歡笑。玄代濟，故不能止絕人事。及景王之代玄，整頓法令，人莫犯者。
