  text: 《魏書》曰：時諸將皆受魏官號，惇獨漢官，乃上疏自陳不當不臣之禮。太祖曰：「吾聞太上師臣，其次友臣。夫臣者，貴德之人也，區區之魏，而臣足以屈君乎？」惇固請，乃拜爲前將軍。
