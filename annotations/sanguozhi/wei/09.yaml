  text: 《英雄記》曰：純字子和。年十四而喪父，與同產兄仁别居。承父業，富於財，僮僕人客以百數，純纲紀督御，不失其理，鄉里咸以爲能。好學問，敬愛學士，學士多歸焉，由是爲遠近所稱。年十八，爲黄門侍郎。二十，從太祖到襄邑募兵，遂常從征戰。
