  text: 《世語》曰：初，宣王勒兵從闕下趣武庫，當爽門，人逼車住。爽妻劉怖，出至廳事，謂帳下守督曰：「公在外。今兵起，如何？」督曰：「夫人勿憂。」乃上門樓，引弩注箭欲發。將孫謙在後牽止之曰：「天下事未可知！」如此者三，宣王遂得過去。
