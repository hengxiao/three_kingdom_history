  type: pei
  text: 《世語》曰：玄至廷尉，不肯下辭。廷尉鍾毓自臨治玄。玄正色責毓曰：「吾當何辭？卿爲令史責人也，卿便爲吾作。」毓以其名士，節高不可屈，而獄當竟，夜爲作辭，令與事相附，流涕以示玄。玄視，頷之而已。毓弟會，年少於玄，玄不與交，是日於毓坐狎玄，玄不受。孫盛雜語曰：玄在囹圄，會因欲狎而友玄，玄正色曰：「鍾君何相偪如此也！」
