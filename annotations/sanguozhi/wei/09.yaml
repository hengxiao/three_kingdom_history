  length: 0
  type: pei
  text: 孫盛曰：案《光武紀》，建武九年，盜劫陰貴人母弟，吏以不得拘質迫盜，盜遂殺之也。然則合擊者，乃古制也。自安、順已降，政教陵遲，劫質不避王公，而有司莫能遵奉國憲者，浩始復斬之，故魏武嘉焉。
