- id: wei.9.p39.a6
  anchor: wei.9.p39
  at: 544
  length: 0
  type: pei
  text: 《魏略》曰：玄自從西還，不交人事，不蓄華妍。《魏氏春秋》曰：初，夏侯霸將奔蜀，呼玄欲與之俱。玄曰：「吾豈苟存自客於寇虜乎？」遂還京師。太傅薨，許允謂玄曰：「無復憂矣。」玄歎曰：「士宗，卿何不見事乎？此人猶能以通家年少遇我，子元、子上不吾容也。」玄嘗著樂毅、張良及本無肉刑論，辭旨通遠，咸傳於世。玄之執也，衞將軍司馬文王流涕請之，大將軍曰：「卿忘會趙司空葬乎？」先是，司空趙儼薨，大將軍兄弟會葬，賔客以百數，玄時後至，衆賔客咸越席而迎，大將軍由是惡之。臣松之案：曹爽以正始五年伐蜀，時玄已爲關中都督，至十年，爽誅滅後，方還洛耳。案少帝紀，司空趙儼以六年亡，玄則無由得會儼葬，若云玄入朝，紀、傳又無其事。斯近妄不實。
