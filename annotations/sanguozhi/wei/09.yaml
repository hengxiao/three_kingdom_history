- id: wei.9.p9.a1
  anchor: wei.9.p9
  at: 114
  length: 0
  type: pei
  text: 《魏略》曰：霸字仲權。淵爲蜀所害，故霸常切齒，欲有報蜀意。黄初中爲偏將軍。子午之役，霸召爲前鋒，進至興勢圍，安營在曲谷中。蜀人望知其是霸也，指下兵攻之。霸手戰鹿角間，賴救至，然後解。後爲右將軍，屯隴西，其養士和戎，并得其歡心。至正始中，代夏侯儒爲征蜀護軍，統屬征西。時征西將軍夏侯玄，於霸爲從子，而玄於曹爽爲外弟。及司馬宣王誅曹爽，遂召玄，玄來東。霸聞曹爽被誅而玄又徵，以爲祸必轉相及，心既内恐；又霸先與雍州刺史郭淮不和，而淮代玄爲征西，霸尤不安，故遂奔蜀。南趣陰平而失道，入窮谷中，糧盡，殺馬步行，足破，臥巖石下，使人求道，未知何之。蜀聞之，乃使人迎霸。初，建安五年，時霸從妹年十三四，在本郡，出行樵採，爲張飛所得。飛知其良家女，遂以爲妻，產息女，爲劉禪皇后。故淵之初亡，飛妻請而葬之。及霸入蜀，禪與相見，釋之曰：「卿父自遇害於行間耳，非我先人之手刃也。」指其兒子以示之曰：「此夏侯氏之甥也。」厚加爵寵。
- id: wei.9.p9.a2
  anchor: wei.9.p9
  at: 125
  length: 0
  type: pei
  text: 《世語》曰：威字季權，任俠。貴歷荆、兖二州刺史。子駿，并州刺史。次莊，淮南太守。莊子湛，字孝若，以才博文章，至南陽相、散騎常侍。莊，晉景陽皇后姊夫也。由此一門侈盛於時。
- id: wei.9.p9.a3
  anchor: wei.9.p9
  at: 134
  length: 0
  type: pei
  text: 《文章叙錄》曰：惠字稚權，幼以才學見稱，善屬奏議。歷散騎黄門侍郎，與锺毓數有辯駮，事多見從。遷燕相、樂安太守。年三十七卒。
- id: wei.9.p9.a4
  anchor: wei.9.p9
  at: 142
  length: 0
  type: pei
  text: 《世語》曰：和字義權，清辯有才論。歷河南尹、太常。淵第三子稱，第五子榮。從孫湛爲其〈序〉曰：「稱字叔權。自孺子而好合聚童兒，爲之渠帥，戲必爲軍旅戰陣之事，有違者輒嚴以鞭捶，眾莫敢逆。淵陰奇之，使讀《項羽傳》及兵書，不肯，曰：『能則自爲耳，安能學人？』年十六，淵與之田，見奔虎，稱驅馬逐之，禁之不可，一箭而倒。名聞太祖，太祖把其手喜曰：『我得汝矣！』與文帝爲布衣之交，每讌會，氣陵一坐，辯士不能屈。世之高名者多從之游。年十八卒。弟榮，字幼權。幼聰惠，七歲能屬文，誦書日千言，經目輒識之。文帝聞而請焉。賓客百餘人，人一奏刺，悉書其鄉邑名氏，世所謂爵里刺也，客示之，一寓目，使之遍談，不謬一人。帝深奇之。漢中之敗，榮年十三，左右提之走，不肯，曰：『君親在難，焉所逃死！』乃奮劍而戰，遂沒陣。」
