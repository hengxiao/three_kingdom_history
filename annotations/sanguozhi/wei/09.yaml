  text: 《魏略》曰：真本姓秦，養曹氏。或云其父伯南夙與太祖善。興平末，袁术部党與太祖攻劫，太祖出，爲寇所追，走入秦氏，伯南开門受之。寇問太祖所在，答云：「我是也。」遂害之。由此太祖思其功，故变其姓。《魏書》曰：邵以忠笃有才智，爲太祖所親信。初平中，太祖興義兵，邵募徒眾，從太祖周旋。時豫州刺史黄琬欲害太祖，太祖避之而邵獨遇害。
