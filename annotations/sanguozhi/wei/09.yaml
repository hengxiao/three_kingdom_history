  text: 晏字平叔。《魏略》曰：「太祖爲司空時，納晏母并收養晏，其時秦宜祿兒阿蘇亦隨母在公家，並見寵如公子。蘇即朗也。蘇性謹慎，而晏無所顧憚，服飾擬於太子，故文帝特憎之，每不呼其姓字，常謂之爲「假子」。晏尚主，又好色，故黃初時無所事任。及明帝立，頗爲冗官。至正始初，曲合於曹爽，亦以才能，故爽用爲散騎侍郎，遷侍中尚書。晏前以尚主，得賜爵爲列侯，又其母在內，晏性自喜，動靜粉白不去手，行步顧影。晏爲尚書，主選舉，其宿與之有舊者，多被拔擢。《魏末傳》曰：晏婦金鄉公主，即晏同母妹。公主賢，謂其母沛王太妃曰：「晏爲惡日甚，將何保身？」母笑曰：「汝得無妬晏邪！」俄而晏死。有一男，年五六歲，宣王遣人錄之。晏母歸藏其子王宮中，向使者搏頰，乞白活之，使者具以白宣王。宣王亦聞晏婦有先見之言，心常嘉之；且爲沛王故，特原不殺。《魏氏春秋》曰：初，夏侯玄、何晏等名盛於時，司馬景王亦預焉。晏嘗曰：「唯深也，故能通天下之志，夏侯泰初是也；唯幾也，故能成天下之務，司馬子元是也；惟神也，不疾而速，不行而至，吾聞其語，未見其人。」蓋欲以神況諸己也。初，宣王使晏與治爽等獄。晏窮治黨與，冀以獲宥。宣王曰：「凡有八族。」晏疏丁、鄧等七姓。宣王曰：「未也。」晏窮急，乃曰：「豈謂晏乎！」宣王曰：「是也。」乃收晏。臣松之案：《魏末傳》云晏取其同母妹爲妻，此搢紳所不忍言，雖楚王之妻媦，不是甚也已。設令此言出於舊史，猶將莫之或信，況厎下之書乎！案〈諸王公傳〉，沛王出自杜夫人所生。晏母姓尹，公主若與沛王同生，焉得言與晏同母？皇甫謐《烈女傳》曰：爽從弟文叔，妻譙郡夏侯文寧之女，名令女。文叔早死，服闋，自以年少無子，恐家必嫁己，乃斷髮以爲信。其後，家果欲嫁之，令女聞，即復以刀截兩耳，居止常依爽。及爽被誅，曹氏盡死。令女叔父上書與曹氏絕婚，彊迎令女歸。時文寧爲梁相，憐其少，執義，又曹氏無遺類，冀其意沮，迺微使人諷之。令女歎且泣曰：「吾亦惟之，許之是也。」家以爲信，防之少懈。令女於是竊入寢室，以刀斷鼻，蒙被而臥。其母呼與語，不應，發被視之，血流滿牀席。舉家驚惶，奔往視之，莫不酸鼻。或謂之曰：「人生世間，如輕塵棲弱草耳，何至辛苦迺爾！且夫家夷滅已盡，守此欲誰爲哉？」令女曰：「聞仁者不以盛衰改節，義者不以存亡易心，曹氏前盛之時，尚欲保終，況今衰亡，何忍棄之！禽獸不行，吾豈爲乎？」司馬宣王聞而嘉之，聽使乞子字養，爲曹氏後，名顯於世。
