  length: 0
  type: pei
  text: 《魏書》曰：玄素貴，以爽故廢黜，居常怏怏不得意。中書令李豐與玄及後父光祿大夫張緝陰謀爲亂，緝與豐同郡，傾巧人也，以東莞太守召，爲後家，亦不得意，故皆同謀。初，豐自以身處機密，息韜又以列侯給事中，尚齊長公主，有內外之重，心不自安。密謂韜曰：「玄旣爲海內重人，加以當大任，年時方壯而永見廢，又親曹爽外弟，於大將軍有嫌。吾得玄書，深以爲憂。緝有才用，棄兵馬大郡，還坐家巷。各不得志，欲使汝以密計告之。」緝嘗病創臥，豐遣韜省病，韜屏人語緝曰：「韜尚公主，父子在機近，大將軍秉事，常恐不見明信，太常亦懷深憂。君侯雖有後父之尊，安危未可知，皆與韜家同慮者也，韜父欲與君侯謀之。」緝默然良久曰：「同舟之難，吾焉所逃？此大事，不捷即禍及宗族。」韜於是往報豐。密語黃門監蘇鑠等，蘇鑠等荅豐：「惟君侯計。」豐言曰：「今拜貴人，諸營兵皆屯門。陛下臨軒，因此便共迫脅，將羣寮人兵，就誅大將軍。卿等當共密白此意。」鑠等曰：「陛下儻不從人，柰何？」豐等曰：「事有權宜，臨時若不信聽，便當劫將去耳。郍得不從？」鑠等許諾。豐曰：「此族滅事，卿等密之。事成，卿等皆當封侯常侍也。」豐復密以告玄、緝。緝遣子邈與豐相結，同謀起事。《世語》曰：豐遣子韜以謀報玄，玄曰「宜詳之耳」，而不以告也。
- id: wei.9.p39.a3
  anchor: wei.9.p39
  at: 293
  length: 0
  type: pei
  text: 《世語》曰：大將軍聞豐謀，舍人王羕請以命請豐：「豐若無備，情屈勢迫，必來，若不來，羕一人足以制之；若知謀泄，以衆挾輪，長戟自衞，徑入雲龍門，挾天子登陵雲臺，臺上有三千人仗，鳴鼓會衆，如此，羕所不及也」。大將軍乃遣羕以車迎之。豐見劫迫，隨羕而至。《魏氏春秋》曰：大將軍責豐，豐知禍及，遂正色曰：「卿父子懷姦，將傾社稷，惜吾力劣，不能相禽滅耳！」大將軍怒，使勇士以刀環築豐腰，殺之。《魏略》曰：豐字安國，故衞尉李義子也。黃初中，以父任召隨軍。始爲白衣時，年十七八，在鄴下名爲清白，識別人物，海內翕然，莫不注意。後隨軍在許昌，聲稱日隆。其父不願其然，遂令閉門，勑使斷客。初，明帝在東宮，豐在文學中。及即尊位，得吳降人，問「江東聞中國名士爲誰」？降人云：「聞有李安國者是。」時豐爲黃門郎，明帝問左右安國所在，左右以豐對。帝曰：「豐名乃被於吳越邪？」後轉騎都尉、給事中。帝崩後，爲永寧太僕，以名過其實，能用少也。正始中，遷侍中尚書僕射。豐在臺省，常多託疾，時臺制，疾滿百日當解祿，豐疾未滿數十日，輒暫起，已復臥，如是數歲。初，豐子韜以選尚公主，豐雖外辭之，內不甚憚也。豐弟翼及偉，仕數歲閒，並歷郡守。豐嘗於人中顯誡二弟，言當用榮位爲□。及司馬宣王久病，偉爲二千石，荒於酒，亂新平、扶風二郡，而豐不召，衆人以爲恃寵。曹爽專政，豐依違二公間，無有適莫，故於時有謗書曰：「曹爽之勢熱如湯，太傅父子冷如漿，李豐兄弟如游光。」其意以爲豐雖外示清淨，而內圖事，有似於游光也。及宣王奏誅爽，住車闕下，與豐相聞，豐怖，遽氣索，足委地不能起。至嘉平四年宣王終後，中書令缺，大將軍諮問朝臣：「誰可補者？」或指向豐。豐雖知此非顯選，而自以連婚國家，思附至尊，因伏不辭，遂奏用之。豐爲中書二歲，帝比每獨召與語，不知所說。景王知其議己，請豐，豐不以實告，乃殺之。其事祕。豐前後仕歷二朝，不以家計爲意，仰俸廩而已。韜雖尚公主，豐常約勑不得有所侵取，時得賜錢帛，輒以外施親族；及得賜宮人，多與子弟，而豐皆以與諸外甥。及死後，有司籍其家，家無餘積。《魏氏春秋》曰：夜送豐尸付廷尉，廷尉鍾毓不受，曰：「非法官所治也。」以其狀告，且勑之，乃受。帝怒，將問豐死意，太後懼，呼帝入，乃止。遣使收翼。《世語》曰：翼後妻，散騎常侍荀廙姊，謂翼曰：「中書事發，可及書未至赴吳，何爲坐取死亡！左右可共同赴水火者誰？」翼思未荅，妻曰：「君在大州，不知可與同死生者，去亦不免。」翼曰：「二兒小，吾不去。今但從坐，身死，二兒必免。」果如翼言。翼子斌，楊駿外甥也。晉惠帝初，爲河南尹，與駿俱死，見晉書。
- id: wei.9.p39.a4
  anchor: wei.9.p39
