  type: pei
  text: 《魏書》曰：爽使弟羲爲表曰：「臣亡父真，奉事三朝，入備冢宰，出爲上將。先帝以臣肺腑遺緒，獎飭拔擢，典兵禁省，進無忠恪積累之行，退無羔羊自公之節。先帝聖體不豫，臣雖奔走，侍疾嘗藥，曾無精誠翼日之應，猥與太尉懿俱受遺詔，且慙且懼，靡所厎告。臣聞虞舜序賢，以稷、契爲先，成湯襃功，以伊、呂爲首，審選博舉，優劣得所，斯誠輔世長民之大經，錄勳報功之令典，自古以來，未之或闕。今臣虛闇，位冠朝首，顧惟越次，中心愧惕，敢竭愚情，陳寫至實。夫天下之達道者三，謂德、爵、齒也。懿本以高明中正，處上司之位，名足鎮衆，義足率下，一也。包懷大略，允文允武，仍立征伐之勳，遐邇歸功，二也。萬里旋斾，親受遺詔，翼亮皇家，內外所向，三也。加之耆艾，紀綱邦國，體練朝政；論德則過於吉甫、樊仲；課功則踰於方叔、召虎：凡此數者，懿實兼之。臣抱空名而處其右，天下之人將謂臣以宗室見私，知進而不知退。陛下岐嶷，克明克類，如有以察臣之言，臣以爲宜以懿爲太傅、大司馬，上昭陛下進賢之明，中顯懿身文武之實，下使愚臣免於謗誚。」於是帝使中書監劉放令孫資爲詔曰：「昔吳漢佐光武，有征定四方之功，爲大司馬，名稱於今。太尉體履正直，功蓋海內，先帝本以前後欲更其位者，輒不彌久，是以遲遲不施行耳。今大將軍薦太尉宜爲大司馬，旣合先帝本旨，又放推讓，進德尚勳，乃欲明賢良、辯等列、順長少也。雖旦、奭之屬，宗師呂望，念在引領以處其下，何以過哉！朕甚嘉焉。朕惟先帝固知君子樂天知命，纖介細疑，不足爲忌，當顧栢人彭亡之文，故用低佪，有意未遂耳！斯亦先帝敬重大臣，恩愛深厚之至也。昔成王建保傅之官，近漢顯宗以鄧禹爲太傅，皆所以優崇儁乂，必有尊也。其以太尉爲太傅。」
