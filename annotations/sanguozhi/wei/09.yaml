  text: 《魏略》曰：鄧颺字玄茂，鄧禹後也。少得士名於京師。明帝時爲尚書郎，除洛陽令，坐事免，拜中郎，又入兼中書郎。初，颺與李勝等爲浮華友，及在中書，浮華事發，被斥出，遂不復用。正始初，乃出爲潁川太守，轉大將軍長史，遷侍中尚書。颺爲人好貨，前在內職，許臧艾授以顯官，艾以父妾與颺，故京師爲之語曰：「以官易婦鄧玄茂。」每所薦達，多如此比。故何晏選舉不得人，頗由颺之不公忠，遂同其罪，蓋由交友非其才。《魏略》曰：丁謐，字彥靖。父斐，字文侯。初，斐隨太祖，太祖以斐鄉里，特饒愛之。斐性好貨，數請求犯法，輒得原宥。爲典軍校尉，總攝內外，每所陳說，多見從之。建安末，從太祖征吳。斐隨行，自以家牛羸困，乃私易官牛，爲人所白，被收送獄，奪官。其後太祖問斐曰：「文侯，印綬所在？」斐亦知見戲，對曰：「以易餅耳。」太祖笑，顧謂左右曰：「東曹毛掾數白此家，欲令我重治，我非不知此人不清，良有以也。我之有斐，譬如人家有盜狗而善捕鼠，盜雖有小損，而完我囊貯。」遂復斐官，聽用如初。後數歲，病亡。謐少不肯交游，但博觀書傳。爲人沈毅，頗有才略。太和中，常住鄴，借人空屋，居其中。而諸王亦欲借之，不知謐已得，直開門入。謐望見王，交脚臥而不起，而呼其奴客曰：「此何等人？促呵使去。」王怒其無禮，還具上言。明帝收謐，繫鄴獄，以其功臣子，原出。後帝聞其有父風，召拜度支郎中。曹爽宿與相親，時爽爲武衞將軍，數爲帝稱其可大用。會帝崩，爽輔政，乃拔謐爲散騎常侍，遂轉尚書。謐爲人外似踈略，而內多忌。其在臺閣，數有所彈駮，臺中患之，事不得行。又其意輕貴，多所忽略，雖與何晏、鄧颺等同位，而皆少之，唯以勢屈於爽。爽亦敬之，言無不從。故於時謗書，謂「臺中有三狗，二狗崖柴不可當，一狗憑默作疽囊。」三狗，謂何、鄧、丁也。默者，爽小字也。其意言三狗皆欲嚙人，而謐尤甚也。奏使郭太後出居別宮，及遣樂安王使北詣鄴，又遣文欽令還淮南，皆謐之計。司馬宣王由是特深恨之。畢軌，字昭先。父字子禮，建安中爲典農校尉。軌以才能，少有名聲。明帝在東宮時，軌在文學中。黃初末，出爲長史。明帝即位，入爲黃門郎，子尚公主，居處殷富。遷并州刺史。其在并州，名爲驕豪。時雜虜數爲暴，害吏民，軌輒出軍擊鮮卑軻比能，失利。中護軍蔣濟表曰：「畢軌前失，旣往不咎，但恐是後難可以再。凡人材有長短，不可彊成。軌文雅志意，自爲美器。今失并州，換置他州，若入居顯職，不毀其德，於國事實善。此安危之要，唯聖恩察之。」至正始中，入爲中護軍，轉侍中尚書，遷司隷校尉。素與曹爽善，每言於爽，多見從之。李勝字公昭。父休字子朗，有智略。張魯前爲鎮北將軍，休爲司馬，家南鄭。時漢中有甘露降，子朗見張魯精兵數萬人，有四塞之固，遂建言赤氣久衰，黃家當興，欲魯舉號，魯不聽。會魯破，太祖以其勸魯內附，賜爵關內侯，署散官騎從，詣鄴。至黃初中，仕歷上黨、鉅鹿二郡太守，後以年老還，拜議郎。勝少游京師，雅有才智，與曹爽善。明帝禁浮華，而人白勝堂有四䆫八達，各有主名。用是被收，以其所連引者多，故得原，禁錮數歲。帝崩，曹爽輔政，勝爲洛陽令。夏侯玄爲征西將軍，以勝爲長史。玄亦宿與勝厚。駱穀之役，議從勝出，由是司馬宣王不恱於勝。累遷熒陽太守、河南尹。勝前後所宰守，未嘗不稱職，爲尹歲餘，廳事前屠蘇壞，令人更治之，小材一枚激墮，正檛受符吏石虎頭，斷之。後旬日，遷爲荊州刺史，未及之官而敗也。桓範字元則，世爲冠族。建安末，入丞相府。延康中，爲羽林左監。以有文學，與王象等典集皇覽。明帝時爲中領軍尚書，遷征虜將軍、東中郎將，使持節都督青、徐諸軍事，治下邳。與徐州刺史鄭岐爭屋，引節欲斬岐，爲岐所奏，不直，坐免還。復爲兖州刺吏，怏怏不得意。又聞當轉爲冀州牧。是時冀州統屬鎮北，而鎮北將軍呂昭才實仕進，本在範後。範謂其妻仲長曰：「我寧作諸卿，向三公長跪耳，不能爲呂子展屈也。」其妻曰：「君前在東，坐欲擅斬徐州刺史，衆人謂君難爲作下，今復羞爲呂屈，是復難爲作上也。」範忿其言觸實，乃以刀環撞其腹。妻時懷孕，遂墮胎死。範亦竟稱疾，不赴冀州。正始中拜大司農。範前在臺閣，號爲曉事，及爲司農，又以清省稱。範嘗抄撮《漢書》中諸雜事，自以意斟酌之，名曰世要論。蔣濟爲太尉，嘗與範會社下，羣卿列坐有數人，範懷其所撰，欲以示濟，謂濟當虛心觀之。範出其書以示左右，左右傳之示濟，濟不肯視，範心恨之。因論他事，乃發怒謂濟曰：「我祖薄德，公輩何似邪？」濟性雖彊毅，亦知範剛毅，睨而不應，各罷。範於沛郡，仕次在曹真後。於時曹爽輔政，以範鄉里老宿，於九卿中特敬之，然不甚親也。及宣王起兵，閉城門，以範爲曉事，乃指召之，欲使領中領軍。範欲應召，而其子諫之，以車駕在外，不如南出。範疑有頃，兒又促之。範欲去而司農丞吏皆止範。範不從，乃突出至平昌城門，城門已閉。門候司蕃，故範舉吏也，範呼之，舉手中版以示之，矯曰：「有詔召我，卿促開門！」蕃欲求見詔書，範呵之，言「卿非我故吏邪，何以敢爾？」乃開之。範出城，顧謂蕃曰：「太傅圖逆，卿從我去！」蕃徒行不能及，遂避側。範南見爽，勸爽兄弟以天子詣許昌，徵四方以自輔。爽疑，羲又無言。範自謂羲曰：「事昭然，卿用讀書何爲邪！於今日卿等門戶倒矣！」俱不言。範又謂羲曰：「卿別營近在闕南，洛陽典農治在城外，呼召如意。今詣許昌，不過中宿，許昌別庫，足相被假；所憂當在穀食，而大司農印章在我身。」羲兄弟默然不從，中夜至五鼓，爽乃投刀於地，謂諸從駕羣臣曰：「我度太傅意，亦不過欲令我兄弟向己也。我獨有以不合於遠近耳！」遂進謂帝曰：「陛下作詔免臣官，報皇太後令。」範知爽首免而己必坐唱義也。範乃曰：「老子今茲坐卿兄弟族矣！」爽等旣免，帝還宮，遂令範隨從。到洛水浮橋北，望見宣王，下車叩頭而無言。宣王呼範姓曰：「桓大夫何爲爾邪！」車駕入宮，有詔範還復位。範詣闕拜章謝，待報。會司蕃詣鴻臚自首，具說範前臨出所道。宣王乃忿然曰：「誣人以反，於法何應？」主者曰：「科律，反受其罪。」乃收範於闕下。時人持範甚急，範謂部官曰：「徐之，我亦義士耳。」遂送廷尉。《世語》曰：初，爽夢二虎銜雷公，雷公若二升椀，放著庭中。爽惡之，以問占者，靈臺丞馬訓曰：「憂兵。」訓退，告其妻曰：「爽將以兵亡，不出旬日。」《漢晉春秋》曰：安定皇甫謐以九年冬夢至洛陽，自廟出，見車騎甚衆，以物呈廟云：「誅大將軍曹爽。」寤而以告其邑人，邑人曰：「君欲作曹人之夢乎！朝無公孫彊如何？且爽兄弟典重兵，又權尚書事，誰敢謀之？」謐曰：「爽無叔振鐸之請，苟失天機則離矣，何恃於彊？昔漢之閻顯，倚母後之尊，權國威命，可謂至重矣，閹人十九人一旦尸之，況爽兄弟乎？」《世語》曰：初，爽出，司馬魯芝留在府，聞有事，將營騎斫津門出赴爽。爽誅，擢爲御史中丞。及爽解印綬，將出，主簿楊綜止之曰：「公挾主握權，捨此以至東巿乎？」爽不從。有司奏綜導爽反，宣王曰：「各爲其主也。」宥之，以爲尚書郎。芝字世英，扶風人也。以後仕進至特進光祿大夫。綜字初伯，後爲安東將軍司馬文王長史。臣松之案：夏侯湛爲芝銘及干寶晉紀並云爽旣誅，宣王即擢芝爲并州刺史，以綜爲安東參軍。與《世語》不同。
