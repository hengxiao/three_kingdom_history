  text: 《魏末傳》曰：爽兄弟歸家，勑洛陽縣發民八百人，使尉部圍爽第四角，角作高樓，令人在上望視爽兄弟舉動。爽計窮愁悶，持彈到後園中，樓上人便唱言「故大將軍東南行！」爽還廳事上，與兄弟共議，未知宣王意深淺，作書與宣王曰：「賤子爽哀惶恐怖，無狀招禍，分受屠滅，前遣家人迎糧，於今未反，數日乏匱，當煩見餉，以繼旦夕。」宣王得書大驚，即荅書曰：「初不知乏糧，甚懷踧踖。令致米一百斛，并肉脯、鹽豉、大豆。」尋送。爽兄弟不達變數，即便喜歡，自謂不死。
