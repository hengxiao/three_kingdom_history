  anchor: wei.9.p26
  at: 427
  length: 0
  type: pei
  text: 《魏末傳》曰：爽等令勝辭宣王，并伺察焉。宣王見勝，勝自陳無他功勞，橫蒙時恩，當爲本州，詣閤拜辭，不悟加恩，得蒙引見。宣王令兩婢侍邊，持衣，衣落；復上指口，言渴求飲，婢進粥，宣王持杯飲粥，粥皆流出沾胷。勝愍然，爲之涕泣，謂宣王曰：「今主上尚幼，天下恃賴明公。然衆情謂明公方舊風疾發，何意尊體乃爾！」宣王徐更寬言，才令氣息相屬，說：「年老沈疾，死在旦夕。君當屈并州，并州近胡，好善爲之，恐不復相見，如何！」勝曰：「當還忝本州，非并州也。」宣王乃復陽爲昏謬，曰：「君方到并州，努力自愛！」錯亂其辭，狀如荒語。勝復曰：「當忝荊州，非并州也。」宣王乃若微悟者，謂勝曰：「懿年老，意荒忽，不解君言。今還爲本州刺史，盛德壯烈，好建功勳。今當與君別，自顧氣力轉微，後必不更會，因欲自力，設薄主人，生死共別。令師、昭兄弟結君爲友，不可相舍去，副懿區區之心。」因流涕哽咽。勝亦長歎，荅曰：「輒當承教，須待勑命。」勝辭出，與爽等相見，說：「太傅語言錯誤，口不攝杯，指南爲北。又云吾當作并州，吾荅言當還爲荊州，非并州也。徐徐與語，有識人時，乃知當還爲荊州耳。又欲設主人祖送。不可舍去，宜須待之。」更向爽等垂淚云：「太傅患不可復濟，令人愴然。」
