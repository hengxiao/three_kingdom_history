- id: wei.9.p3.a1
  anchor: wei.9.p3
  at: 122
  length: 0
  type: pei
  text: 《魏略》曰：楙字子林，惇中子也。文帝少與楙親，及即位，以爲安西將軍、持節，承夏侯淵處都督關中。楙性無武略，而好治生。至太和二年，明帝西征，人有白楙者，遂召還爲尚書。楙在西時，多畜伎妾，公主由此與楙不和。其後羣弟不遵禮度，楙數切責，弟懼見治，乃共構楙以誹謗，公主奏之，有詔收楙。帝意欲殺之，以問長水校尉京兆段默，默以爲「此必清河公主與楙不睦，出於譖構，冀不推實耳。且伏波與先帝有定天下之功，宜加三思」。帝意解，曰：「吾亦以爲然。」乃發詔推問爲公主作表者，果其羣弟子臧、子江所構也。
- id: wei.9.p3.a2
  anchor: wei.9.p3
  at: 136
  length: 0
  type: pei
  text: 《晉陽秋》曰：泰始二年，高安鄉侯夏侯佐卒，惇之孫也，嗣絕。詔曰：「惇，魏之元功，勳書竹帛。昔庭堅不祀，猶或悼之，況朕受禪於魏，而可以忘其功臣哉！宜擇惇近屬劭封之。」
- id: wei.9.p4.a1
  anchor: wei.9.p4
  at: 42
  length: 0
  type: pei
  text: 《魏書》曰：韓浩字元嗣。漢末兵起，縣近山藪，多寇，浩聚徒眾爲縣籓衛。太守王匡以爲從事，將兵拒董卓於盟津。時浩舅杜陽爲河陰令，卓執之，使招浩，浩不從。袁术聞而壯之，以爲騎都尉。夏侯惇聞其名，請與相見，大奇之，使領兵從征伐。時大議損益，浩以爲當急田。太祖善之，遷護軍。太祖欲討柳城，領軍史渙以爲道遠深入，非完計也，欲與浩共諫。浩曰：「今兵勢彊盛，威加四海，戰勝攻取，無不如志，不以此時遂除天下之患，將爲後憂。且公神武，舉無遺策，吾與君爲中軍主，不宜沮眾。」遂從破柳城，改其官爲中護軍，置長史、司馬。從討張魯，魯降。議者以浩智略足以綏邊，欲留使都督諸軍，鎮漢中。太祖曰：「吾安可以無護軍？」乃與俱還。其見親任如此。及薨，太祖愍惜之。無子，以養子榮嗣。史渙字公劉。少任俠，有雄氣。太祖初起，以客從，行中軍校尉，從征伐，常監諸將，見親信，轉拜中領軍。十四年薨。子静嗣。
