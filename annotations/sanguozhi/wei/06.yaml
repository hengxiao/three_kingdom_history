  text: 《獻帝紀》曰：時尚書令士孫瑞爲亂兵所害。《三輔決錄注》曰：瑞字君榮，扶風人，世爲學門。瑞少傳家業，博達無所不通，仕歷顯位。卓旣誅，遷大司農，爲三老。每三公缺，瑞常在選中。太尉周忠、皇甫嵩，司徒淳于嘉、趙溫，司空楊彪、張喜等爲公，皆辭拜讓瑞。天子都許，追論瑞功，封子萌澹津亭侯。萌字文始，亦有才學，與王粲善。臨當就國，粲作詩以贈萌，萌有荅，在粲集中。
