- id: wei.6.p36.a2
  anchor: wei.6.p36
  at: 44
  length: 0
  type: pei
  text: 臣松之以爲桀、紂無道，秦、莽縱虐，皆多歷年所，然後衆惡乃著。董卓自竊權柄，至于隕斃，計其日月，未盈三周，而禍崇山岳，毒流四海。其殘賊之性，實豺狼不若。「書契未有」，斯言爲當。但評旣曰「賊忍」，又云「不仁」，賊忍，不仁，於辭爲重。袁術無毫芒之功，纖介之善，而猖狂于時，妄自尊立，固義夫之所扼腕，人鬼之所同疾。雖復恭儉節用，而猶必覆亡不暇，而評但云「奢淫不終」，未足見其大惡。
