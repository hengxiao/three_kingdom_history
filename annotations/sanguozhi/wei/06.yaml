  text: 臣松之案《英雄記》：「陳溫字元悌，汝南人。先爲楊州刺史，自病死。袁紹遣袁遺領州，敗散，奔沛國，爲兵所殺。袁術更用陳瑀爲楊州。瑀字公瑋，下邳人。瑀旣領州，而術敗於封丘，南向壽春，瑀拒術不納。術退保陰陵，更合軍攻瑀，瑀懼走歸下邳。」如此，則溫不爲術所殺，與本傳不同。
