  text: 《英雄記》云：苗，太后之同母兄，先嫁朱氏之子。進部曲將吳匡，素怨苗不與進同心，又疑其與宦官通謀，乃令軍中曰：「殺大將軍者，車騎也。」遂引兵與卓弟旻共攻殺苗於朱爵闕下。
