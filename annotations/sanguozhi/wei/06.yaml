  text: 《九州春秋》曰：馥遣都督從事趙浮、程奐將彊弩萬張屯河陽。浮等聞馥欲以冀州與紹，自孟津馳東下。時紹尚在朝歌清水口，浮等從後來，船數百艘，衆萬餘人，整兵鼓夜過紹營，紹甚惡之。浮等到，謂馥曰：「袁本初軍無斗糧，各己離散，雖有張楊、於扶羅新附，未肯爲用，不足敵也。小從事等請自以見兵拒之，旬日之間，必土崩瓦解；明將軍但當開閤高枕，何憂何懼！」馥不從，乃避位，出居趙忠故舍。遣子齎冀州印綬於黎陽與紹。
