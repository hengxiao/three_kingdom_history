  text: 《吳書》曰：時議者以靈帝失道，使天下叛亂，少帝幼弱，爲賊臣所立，又不識母氏所出。幽州牧劉虞宿有德望，紹等欲立之以安當時，使人報術。術觀漢室衰陵，陰懷異志，故外託公義以拒紹。紹復與術書曰：「前與韓文節共建永世之道，欲海內見再興之主。今西名有幼君，無血脉之屬，公卿以下皆媚事卓，安可復信！但當使兵往屯關要，皆自蹙死於西。東立聖君，太平可冀，如何有疑！又室家見戮，不念子胥，可復北靣乎？違天不祥，願詳思之。」術荅曰：「聖主聦叡，有周成之質。賊卓因危亂之際，威服百寮，此乃漢家小厄之會。亂尚未厭，復欲興之。乃云今主『無血脉之屬』，豈不誣乎！先人以來，弈世相承，忠義爲先。太傅公仁慈惻隱，雖知賊卓必爲禍害，以信徇義，不忍去也。門戶滅絕，死亡流漫，幸蒙遠近來相赴助，不因此時上討國賊，下刷家恥，而圖於此，非所聞也。又曰『室家見戮，可復北靣』，此卓所爲，豈國家哉？君命，天也，天不可讎，況非君命乎！慺慺赤心，志在滅卓，不識其他。」
