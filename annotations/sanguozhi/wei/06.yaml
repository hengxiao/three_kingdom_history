  type: pei
  text: 華嶠《漢書》曰：汜饗公卿，議欲攻傕。楊彪曰：「羣臣共鬬，一人劫天子，一人質公卿，此可行乎？」汜怒，欲手刃之，中郎將楊密及左右多諫，汜乃歸之。
