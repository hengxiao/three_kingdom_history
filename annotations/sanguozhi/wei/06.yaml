- id: wei.6.p32.a1
  anchor: wei.6.p32
  at: 301
  length: 0
  type: pei
  text: 《傅子》曰：初表謂嵩曰：「今天下大亂，未知所定，曹公擁天子都許，君爲我觀其釁。」嵩對曰：「聖達節，次守節。嵩，守節者也。夫事君爲君，君臣名定，以死守之；今策名委質，唯將軍所命，雖赴湯蹈火，死無辭也。以嵩觀之，曹公至明，必濟天下。將軍能上順天子，下歸曹公，必享百世之利，楚國實受其祐，使嵩可也；設計未定，嵩使京師，天子假嵩一官，則天子之臣，而將軍之故吏耳。在君爲君，則嵩守天子之命，義不得復爲將軍死也。唯將軍重思，無負嵩。」表遂使之，果如所言，天子拜嵩侍中，遷零陵太守，還稱朝廷、曹公之德也。表以爲懷貳，大會寮屬數百人，陳兵見嵩，盛怒，持節將斬之，數曰：「韓嵩敢懷貳邪！」衆皆恐，欲令嵩謝。嵩不動，謂表曰：「將軍負嵩，嵩不負將軍！」具陳前言。表怒不已，其妻蔡氏諫之曰：「韓嵩，楚國之望也；且其言直，誅之無辭。」表乃弗誅而囚之。
