  type: pei
  text: 《漢晉春秋》曰：太祖之始征柳城，劉備說表使襲許，表不從。及太祖還，謂備曰：「不用君言，故失此大會也。」備曰：「今天下分裂，日尋干戈，事會之來，豈有終極乎？若能應之於後者，則此未足爲恨也。」
