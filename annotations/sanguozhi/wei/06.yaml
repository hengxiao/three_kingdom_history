  text: 《獻帝起居注》曰：初，天子出到宣平門，當渡橋，汜兵數百人遮橋問「是天子邪」？車不得前。傕兵數百人皆持大戟在乘輿車左右，侍中劉艾大呼云：「是天子也。」使侍中楊琦高舉車帷。帝言諸兵：「汝不郤，何敢迫近至尊邪？」汜等兵乃郤。旣度橋，士衆咸呼萬歲。
