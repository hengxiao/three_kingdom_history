  type: pei
  text: 《典略》曰：尚爲人有勇力，欲奪取康衆，與熙謀曰：「今到，康必相見，欲與兄手擊之，有遼東猶可以自廣也。」康亦心計曰：「今不取熙、尚，無以爲說於國家。」乃先置其精勇於廄中，然後請熙、尚。熙、尚入，康伏兵出，皆縛之，坐於凍地。尚寒，求席，熙曰：「頭顱方行萬里，何席之爲！」遂斬首。譚字顯思。熙字顯弈。尚字顯甫。《吳書》曰：尚有弟名買，與尚俱走遼東。《曹瞞傳》云：買，尚兄子。未詳。
