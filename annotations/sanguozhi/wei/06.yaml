  text: 《傅子》曰：靈帝時牓門賣官，於是太尉段熲、司徒崔烈、太尉樊陵、司空張溫之徒，皆入錢上千萬下五百萬以買三公。熲數征伐有大功，烈有北州重名，溫有傑才，陵能偶時，皆一時顯士，猶以貨取位，而況於劉嚻、唐珍、張顥之黨乎！風俗通曰：司隷劉嚻以黨諸常侍，致位公輔。《續漢書》曰：唐珍，中常侍唐衡弟。張顥，中常侍張奉弟。
