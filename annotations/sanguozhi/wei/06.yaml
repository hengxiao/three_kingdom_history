  type: pei
  text: 《典略》曰：自此紹貢御希慢，私使主薄耿苞密白曰：「赤德衰盡，袁爲黃胤，宜順天意。」紹以苞密白事示軍府將吏。議者咸以苞爲妖妄宜誅，紹乃殺苞以自解。《九州春秋》曰：紹延徵北海鄭玄而不禮，趙融聞之曰：「賢人者，君子之望也。不禮賢，是失君子之望也。夫有爲之君，不敢失萬民之歡心，況於君子乎？失君子之望，難乎以有爲也。」《英雄記》載太祖作董卓歌，辭云：「德行不虧缺，變故自難常。鄭康成行酒，伏地氣絕，郭景圖命盡於園桑。」如此之文，則玄無病而卒。餘書不見，故載錄之。
