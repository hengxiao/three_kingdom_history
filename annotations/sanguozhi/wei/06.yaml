  text: 《英雄記》曰：時有謠言曰：「千里草，何青青，十日卜，猶不生。」又作董逃之歌。又有道士書布爲「呂」字以示卓，卓不知其爲呂布也。卓當入會，陳列步騎，自營至宮，朝服導引行其中。馬躓不前，卓心怪欲止，布勸使行，乃衷甲而入。卓旣死，當時日月清淨，微風不起。旻、璜等及宗族老弱悉在郿，皆還，爲其羣下所斫射。卓母年九十，走至塢門曰「乞脫我死」，即斬首。袁氏門生故吏改殯諸袁死於郿者，斂聚董氏尸於其側而焚之。暴卓尸於市。卓素肥，膏流浸地，草爲之丹。守尸吏暝以爲大炷，置卓臍中以爲燈，光明達旦，如是積日。後卓故部曲收所燒者灰，并以一棺棺之，葬於郿。卓塢中金有二三萬斤，銀八九萬斤，珠玉錦綺奇玩雜物皆山崇阜積，不可知數。
