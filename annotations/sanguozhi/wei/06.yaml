  type: pei
  text: 《九州春秋》曰：馬騰、韓遂之敗，樊稠追至陳倉。遂語稠曰：「天地反覆，未可知也。本所爭者非私怨，王家事耳。與足下州里人，今雖小違，要當大同，欲相與善語以別。邂逅萬一不如意，後可復相見乎！」俱郤騎前接馬，交臂相加，共語良久而別。傕兄子利隨稠，利還告傕「韓、樊交馬語」，不知所道，意愛甚密。傕以是疑稠與韓遂私和而有異意。稠欲將兵東出關，從傕索益兵。因請稠會議，便於坐殺稠。
- id: wei.6.p11.a2
  anchor: wei.6.p11
  at: 26
