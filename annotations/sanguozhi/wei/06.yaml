  text: 《魏書》曰：術歸帝號於紹曰：「漢之失天下久矣，天子提挈，政在家門，豪雄角逐，分裂疆宇，此與周之末年七國分勢無異，卒彊者兼之耳。加袁氏受命當王，符瑞炳然。今君擁有四州，民戶百萬，以彊則無與比大，論德則無與比高。曹操欲扶衰拯弱，安能續絕命救已滅乎？」紹陰然之。《吳書》曰：術旣爲雷薄等所拒，留住三日，士衆絕糧，乃還至江亭，去壽春八十里。問廚下，尚有麥屑三十斛。時盛暑，欲得蜜漿，又無蜜。坐櫺牀上，歎息良久，乃大咤曰：「袁術至於此乎！」因頓伏牀下，嘔血斗餘，遂死。
