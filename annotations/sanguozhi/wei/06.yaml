  type: pei
  text: 《九州春秋》曰：司隷馮方女，國色也，避亂楊州，術登城見而恱之，遂納焉，甚愛幸。諸婦害其寵，語之曰：「將軍貴人有志節，當時時涕泣憂愁，必長見敬重。」馮氏以爲然，後見術輙垂涕，術果以有心志，益哀之。諸婦人因共絞殺，懸之厠梁，術誠以爲不得志而死，乃厚加殯斂。
