  text: 《英雄記》曰：逢紀說紹曰：「將軍舉大事而仰人資給，不據一州，無以自全。」紹荅云：「冀州兵彊，吾士饑乏，設不能辦，無所容立。」紀曰：「可與公孫瓚相聞，導使來南，擊取冀州。公孫必至而馥懼矣，因使說利害，爲陳禍福，馥必遜讓。於此之際，可據其位。」紹從其言而瓚果來。
