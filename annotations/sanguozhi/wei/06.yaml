  text: 《英雄記》曰：公孫瓚擊青州黃巾賊，大破之，還屯廣宗，改易守令，冀州長吏無不望風響應，開門受之。紹自往征瓚，合戰於界橋南二十里。瓚步兵三萬餘人爲方陣，騎爲兩翼，左右各五千餘匹，白馬義從爲中堅，亦分作兩校，左射右，右射左，旌旗鎧甲，光照天地。紹令麴義以八百兵爲先登，彊弩千張夾承之，紹自以步兵數萬結陣於後。義久在涼州，曉習羌鬬，兵皆驍銳。瓚見其兵少，便放騎欲陵蹈之。義兵皆伏楯下不動，未至數十步，乃同時俱起，揚塵大叫，直前衝突，彊弩雷發，所中必倒，臨陣斬瓚所署冀州刺史嚴綱甲首千餘級。瓚軍敗績，步騎奔走，不復還營。義追至界橋；瓚殿兵還戰橋上，義復破之，遂到瓚營，拔其牙門，營中餘衆皆復散走。紹在後，未到橋十數里，下馬發鞍，見瓚已破，不爲設備，惟帳下彊弩數十張，大戟士百餘人自隨。瓚部迸騎二千餘匹卒至，便圍紹數重，弓矢雨下。別駕從事田豐扶紹欲郤入空垣，紹以兜鍪撲地曰：「大丈夫當前鬬死，而入牆間，豈可得活乎？」彊弩乃亂發，多所殺傷。瓚騎不知是紹，亦稍引郤；會麴義來迎，乃散去。瓚每與虜戰，常乘白馬，追不虛發，數獲戎捷，虜相告云「當避白馬」。因虜所忌，簡其白馬數千匹，選騎射之士，號爲白馬義從；一曰胡夷健者常乘白馬，瓚有健騎數千，多乘白馬，故以號焉。紹旣破瓚，引軍南到薄落津，方與賔客諸將共會，聞魏郡兵反，與黑山賊于毒共覆鄴城，遂殺太守栗成。賊十餘部，衆數萬人，聚會鄴中。坐上諸客有家在鄴者，皆憂怖失色，或起啼泣，紹容皃不變，自若也。賊陶升者，故內黃小吏也，有善心，獨將部衆踰西城入，閉守州門，不內他賊，以車載紹家及諸衣冠在州內者，身自扞衞，送到斥丘乃還。紹到，遂屯斥丘，以陶升爲建義中郎將。乃引軍入朝歌鹿場山蒼巖谷討于毒，圍攻五日，破之，斬毒及長安所署冀州牧壺壽。遂尋山北行，薄擊諸賊左髭丈八等，皆斬之。又擊劉石、青牛角、黃龍、左校、郭大賢、李大目、于氐根等，皆屠其屯壁，奔走得脫，斬首數萬級。紹復還屯鄴。初平四年，天子使太傅馬日磾、太僕趙岐和解關東。岐別詣河北，紹出迎於百里上，拜奉帝命。岐住紹營，移書告瓚。瓚遣使具與紹書曰：「趙太僕以周召之德，銜命來征，宣揚朝恩，示以和睦，曠若開雲見日，何喜如之？昔賈復、寇恂亦爭士卒，欲相危害，遇光武之寬，親俱陛見，同輿共出，時人以爲榮。自省邊鄙，得與將軍共同此福，此誠將軍之眷，而瓚之幸也。」麴義後恃功而驕恣，紹乃殺之。
