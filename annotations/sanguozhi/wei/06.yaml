  length: 0
  type: pei
  text: 《九州春秋》載授諫辭曰：「世稱一兔走衢，萬人逐之，一人獲之，貪者悉止，分定故也。且年均以賢，德均則卜，古之制也。願上惟先代成敗之戒，下思逐兔分定之義。」紹曰：「孤欲令四兒各據一州，以觀其能。」授出曰：「禍其始此乎！」譚始至青州，爲都督，未爲刺史，後太祖拜爲刺史。其土自河而西，蓋不過平原而已。遂北排田楷，東攻孔融，曜兵海隅，是時百姓無主，欣戴之矣。然信用羣小，好受近言，肆志奢淫，不知稼穡之艱難。華彥、孔順皆姦佞小人也，信以爲腹心；王脩等備官而已。然能接待賔客，慕名敬士。使婦弟領兵在內，至令草竊，巿井而外，虜掠田野；別使兩將募兵下縣，有賂者見免，無者見取，貧弱者多，乃至於竄伏丘野之中，放兵捕索如獵鳥獸。邑有萬戶者，著籍不盈數百，收賦納稅，參分不入一。招命賢士，不就；不彊棄軍期，安居族黨，亦不能罪也。
- id: wei.6.p19.a5
  anchor: wei.6.p19
  at: 223
  length: 0
  type: pei
  text: 《世語》曰：紹步卒五萬，騎八千。孫盛評曰：案魏武謂崔琰曰「昨案貴州戶籍，可得三十萬衆」。由此推之，但冀州勝兵已如此，況兼幽、并及青州乎？紹之大舉，必悉師而起，十萬近之矣。《獻帝傳》曰：紹將南師，沮授、田豐諫曰：「師出歷年，百姓疲弊，倉庾無積，賦役方殷，此國之深憂也。宜先遣使獻捷天子，務農逸民；若不得通，乃表曹氏隔我王路，然後進屯黎陽，漸營河南，益作舟船，繕治器械，分遣精騎，鈔其邊鄙，令彼不得安，我取其逸。三年之中，事可坐定也。」審配、郭圖曰：「兵書之法，十圍五攻，敵則能戰。今以明公之神武，跨河朔之彊衆，以伐曹氏。譬若覆手，今不時取，後難圖也。」授曰：「蓋救亂誅暴，謂之義兵；恃衆憑彊，謂之驕兵。兵義無敵，驕者先滅。曹氏迎天子安宮許都，今舉兵南向，於義則違。且廟勝之策，不在彊弱。曹氏法令旣行，士卒精練，非公孫瓚坐受圍者也。今棄萬安之術，而興無名之兵，竊爲公懼之！」圖等曰：「武王伐紂，不曰不義，況兵加曹氏而云無名！且公師武臣竭力，將士憤怒，人思自騁，而不及時早定大業，慮之失也。夫天與弗取，反受其咎，此越之所以霸，吳之所以亡也。監軍之計，計在持牢，而非見時知機之變也。」紹從之。圖等因是譖授「監統內外，威震三軍，若其浸盛，何以制之？夫臣與主不同者昌，主與臣同者亡，此黃石之所忌也。且御衆於外，不宜知內。」紹疑焉。乃分監軍爲三都督，使授及郭圖、淳于瓊各典一軍，遂合而南。
