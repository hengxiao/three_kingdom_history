  text: 張璠《漢紀》曰：帝以八月庚午爲諸黃門所劫，步出穀門，走至河上。諸黃門旣投河死。時帝年十四，陳留王年九歲，兄弟獨夜步行欲還宮，闇暝，逐螢火而行，數里，得民家以露車載送。辛未，公卿以下與卓共迎帝於北芒阪下。《獻帝春秋》曰：先是童謠曰：「侯非侯，王非王，千乘萬騎走北芒。」卓時適至，屯顯陽苑。聞帝當還，率衆迎帝。《典略》曰：帝望見卓兵涕泣。羣公謂卓曰：「有詔郤兵。」卓曰：「公諸人爲國大臣，不能匡正王室，至使國家播蕩，何郤兵之有！」遂俱入城。《獻帝紀》曰：卓與帝語，語不可了。乃更與陳留王語，問禍亂由起；王荅，自初至終，無所遺失。卓大喜，乃有廢立意。《英雄記》曰：河南中部掾閔貢扶帝及陳留王上至雒舍止。帝獨乘一馬，陳留王與貢共乘一馬，從雒舍南行。公卿百官奉迎於北芒阪下，故太尉崔烈在前導。卓將步騎數千來迎，烈呵使避，卓罵烈曰：「晝夜三百里來，何云避，我不能斷卿頭邪？」前見帝曰：「陛下令常侍小黃門作亂乃爾，以取禍敗，爲負不小邪？」又趨陳留王，曰：「我董卓也，從我抱來。」乃於貢抱中取王。《英雄記》曰：一本云王不就卓抱，卓與王併馬而行也。
