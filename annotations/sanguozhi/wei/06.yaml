  type: pei
  text: 張璠《漢紀》曰：表與同郡人張隱、薛郁、王訪、宣靖、公緒恭、劉祇、田林爲八交，或謂之八顧。《漢末名士錄》云：表與汝南陳翔字仲麟、范滂字孟愽、魯國孔昱字世元、勃海苑康字仲真、山陽檀敷字文友、張儉字元節、南陽岑晊字公孝爲八友。謝承《漢書》曰：表受學於同郡王暢。暢爲南陽太守，行過乎儉。表時年十七，進諫曰：「奢不僭上，儉不逼下，蓋中庸之道，是故蘧伯玉恥獨爲君子。府君若不師孔聖之明訓，而慕夷齊之末操，無乃皎然自遺於世！」暢荅曰：「以約失之者鮮矣。且以矯俗也。」
