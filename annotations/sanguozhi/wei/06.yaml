  text: 《三輔決錄注》曰：日磾字翁叔，馬融之族子。少傳融業，以才學進。與楊彪、盧植、蔡邕等典校中書，歷位九卿，遂登台輔。《獻帝春秋》曰：術從日磾借節觀之，因奪不還，備軍中千餘人，使促辟之。日磾謂術曰：「卿家先世諸公，辟士云何，而言促之，謂公府掾可劫得乎！」從術求去，而術留之不遣；旣以失節屈辱，憂恚而死。
