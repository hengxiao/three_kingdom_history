  type: pei
  text: 《獻帝傳》云：授大呼曰：「授不降也，爲軍所執耳！」太祖與之有舊，逆謂授曰：「分野殊異，遂用圮絕，不圖今日乃相禽也！」授對曰：「冀州失策，以取奔北。授智力俱困，宜其見禽耳。」太祖曰：「本初無謀，不用君計，今喪亂過紀，國家未定，當相與圖之。」授曰：「叔父、母、弟，縣命袁氏，若蒙公靈，速死爲福。」太祖歎曰：「孤早相得，天下不足慮。」
