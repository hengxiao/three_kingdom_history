  text: 張璠《漢紀》曰：布兵敗，住馬青瑣門外，謂允曰：「公可以去。」允曰：「安國家，吾之上願也，若不獲，則奉身以死。朝廷幼主恃我而已，臨難苟免，吾不爲也。努力謝關東諸公，以國家爲念。」傕、汜入長安城，屯南宮掖門，殺太僕魯馗、大鴻臚周奐、城門校尉崔烈、越騎校尉王頎。吏民死者不可勝數。司徒王允扶天子上宣平城門避兵，傕等於城門下拜，伏地叩頭。帝謂傕等曰：「卿無作威福，而乃放兵縱橫，欲何爲乎？」傕等曰：「董卓忠於陛下，而無故爲呂布所殺。臣等爲卓報讎，弗敢爲逆也。請事竟，詣廷尉受罪。」允窮逼出見傕，傕誅允及妻子宗族十餘人。長安城中男女大小莫不流涕。允字子師，太原祁人也。少有大節，郭泰見而奇之，曰：「王生一日千里，王佐之才也。」泰雖先達，遂與定交。三公並辟，歷豫州刺史，辟荀爽、孔融爲從事，遷河南尹、尚書令。及爲司徒，其所以扶持王室，甚得大臣之節，自天子以下，皆倚賴焉。卓亦推信之，委以朝廷。華嶠曰：夫士以正立，以謀濟，以義成，若王允之推董卓而分其權，伺其間而弊其罪。當此之時，天下之難解矣，本之皆主於忠義也，故推卓不爲失正，分權不爲不義，伺閒不爲狙詐，是以謀濟義成，而歸於正也。
