  text: 《英雄記》曰：紀字元圖。初，紹去董卓出奔，與許攸及紀俱詣冀州，紹以紀聦達有計策，甚親信之，與共舉事。後審配任用，與紀不睦。或有讒配於紹，紹問紀，紀稱「配天性烈直，古人之節，不宜疑之」。紹曰：「君不惡之邪？」紀荅曰：「先日所爭者私情，今所陳者國事。」紹善之，卒不廢配。配由是更與紀爲親善。
