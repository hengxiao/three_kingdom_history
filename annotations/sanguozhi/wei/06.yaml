  text: 《山陽公載記》曰：初卓爲前將軍，皇甫嵩爲左將軍，俱征韓遂，各不相下。後卓徵爲少府并州牧，兵當屬嵩，卓大怒。及爲太師，嵩爲御史中丞，拜於車下。卓問嵩：「義真服未乎？」嵩曰：「安知明公乃至於是！」卓曰：「鴻鵠固有遠志，但燕雀自不知耳。」嵩曰：「昔與明公俱爲鴻鵠，不意今日變爲鳳皇耳。」卓笑曰：「卿早服，今日可不拜也。」張璠《漢紀》曰：卓抵其手謂皇甫嵩曰：「義真怖未乎？」嵩對曰：「明公以德輔朝廷，大慶方至，何怖之有？若淫刑以逞，將天下皆懼，豈獨嵩乎？」卓默然，遂與嵩和解。
