  text: 《獻帝傳》曰：紹臨發，沮授會其宗族，散資財以與之曰：「夫勢在則威無不加，勢亡則不保一身，哀哉！」其弟宗曰：「曹公士馬不敵，君何懼焉！」授曰：「以曹兖州之明略，又挾天子以爲資，我雖克公孫，衆實疲弊，而將驕主忲，軍之破敗，在此舉也。揚雄有言，『六國蚩蚩，爲嬴弱姬』，今之謂也。」
