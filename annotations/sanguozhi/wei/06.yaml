  length: 0
  type: pei
  text: 《典論》曰：表疾病，琦還省疾。琦性慈孝，瑁、允恐琦見表，父子相感，更有託後之意，謂曰：「將軍命君撫臨江夏，爲國東藩，其任至重；今釋衆而來，必見譴怒，傷親之歡心以增其疾，非孝敬也。」遂遏于戶外，使不得見，琦流涕而去。
