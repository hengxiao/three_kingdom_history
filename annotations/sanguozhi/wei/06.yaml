  text: 《魏氏春秋》載紹檄州郡文曰：「蓋聞明主圖危以制變，忠臣慮難以立權。曩者彊秦弱主，趙高執柄，專制朝命，威福由己，終有望夷之禍，汙辱至今。及臻呂后，祿、產專政，擅斷萬機，決事省禁，下陵上替，海內寒心。於是絳侯、朱虛興威奮怒，誅夷逆亂，尊立太宗，故能道化興隆，光明顯融，此則大臣立權之明表也。司空曹操，祖父騰，故中常侍，與左悺、徐璜並作妖孽，饕餮放橫，傷化虐民。父嵩，乞匄攜養，因贓假位，輿金輦璧，輸貨權門，竊盜鼎司，傾覆重器。操贅閹遺醜，本無令德，僄狡鋒俠，好亂樂禍。幕府昔統鷹揚，掃夷凶逆。續遇董卓侵官暴國，於是提劒揮鼓，發命東夏，方收羅英雄，棄瑕錄用，故遂與操參咨策略，謂其鷹犬之才，爪牙可任。至乃愚佻短慮，輕進易退，傷夷折衂，數喪師徒。幕府輙復分兵命銳，脩完補輯，表行東郡太守、兖州刺史，被以虎文，授以偏師，獎蹙威柄，冀獲秦師一克之報。而操遂乘資跋扈，肆行酷裂，割剥元元，殘賢害善。故九江太守邊讓，英才俊逸，天下知名，以直言正色，論不阿諂，身被梟縣之戮，妻孥受灰滅之咎。自是士林憤痛，民怨彌重，一夫奮臂，舉州同聲，故躬破於徐方，地奪於呂布，仿偟東裔，蹈據無所。幕府唯彊幹弱枝之義，且不登叛人之黨，故復援旌擐甲，席卷赴征，金鼓響震，布衆破沮，拯其死亡之患，復其方伯之任，是則幕府無德於兖土之民，而有大造於操也。後會鑾駕東反，羣虜亂政。時冀州方有北鄙之警，匪遑離局，故使從事中郎徐勛就發遣操，使繕脩郊廟，翼衞幼主。而便放志專行，脅遷省禁，卑侮王官，敗法亂紀，坐召三臺，專制朝政，爵賞由心，刑戮在口，所愛光五宗，所惡滅三族，羣談者蒙顯誅，腹議者蒙隱戮，道路以目，百寮鉗口，尚書記朝會，公卿充員品而已。故太尉楊彪，歷典三司，享國極位，操因睚眥，被以非罪，榜楚并兼，五毒俱至，觸情放慝，不顧憲章。又議郎趙彥，忠諫直言，議有可納，故聖朝含聽，改容加錫，操欲迷奪時權，杜絕言路，擅收立殺，不俟報聞。又梁孝王，先帝母弟，墳陵尊顯，松栢桑梓，猶宜恭肅，而操率將校吏士親臨發掘，破棺裸尸，略取金寶，至令聖朝流涕，士民傷懷。又署發丘中郎將、摸金校尉，所過墮突，無骸不露。身處三公之官，而行桀虜之態，殄國虐民，毒流人鬼。加其細政苛慘，科防互設，繒繳充蹊，坑穽塞路，舉手挂網羅，動足蹈機陷，是以兖、豫有無聊之民，帝都有吁嗟之怨。歷觀古今書籍，所載貪殘虐烈無道之臣，於操爲甚。幕府方詰外姦，未及整訓，加意含覆，冀可彌縫。而操豺狼野心，潛苞禍謀，乃欲撓折棟梁，孤弱漢室，除滅中正，專爲梟雄。往歲伐鼓北征，討公孫瓚，彊禦桀逆，拒圍一年。操因其未破，陰交書命，欲託助王師，以相掩襲，故引兵造河，方舟北濟。會其行人發路，瓚亦梟夷，故使鋒芒挫縮，厥圖不果。屯據敖倉，阻河爲固，乃欲以螳蜋之斧，禦隆車之隧。幕府奉漢威靈，折衝宇宙，長戟百萬，胡騎千羣，奮中黃、育、獲之材，騁良弓勁弩之勢，并州越太行，青州涉濟、漯，大軍汎黃河以角其前，荊州下宛、葉而掎其後，雷震虎步，並集虜庭，若舉炎火以焫飛蓬，覆滄海而沃熛炭，有何不消滅者哉？當今漢道陵遲，綱弛紀絕。操以精兵七百，圍守宮闕，外稱陪衞，內以拘執，懼其篡逆之禍，因斯而作。乃忠臣肝腦塗地之秋，烈士立功之會也，可不勗哉！」此陳琳之辭。
