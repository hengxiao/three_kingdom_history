  text: 《九州春秋》曰：傕等在陝，皆恐怖，急擁兵自守。胡文才、楊整脩皆涼州大人，而司徒王允素所不善也。及李傕之叛，允乃呼文才、整脩使東解釋之，不假借以溫顏，謂曰：「關東鼠子欲何爲邪？卿往呼之。」於是二人往，實召兵而還。
