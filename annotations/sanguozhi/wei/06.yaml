  text: 《獻帝傳》曰：沮授，廣平人，少有大志，多權略。仕州別駕，舉茂才，歷二縣令，又爲韓馥別駕，表拜騎都尉。袁紹得冀州，又辟焉。《英雄記》曰：是時年號初平，紹字本初，自以爲年與字合，必能克平禍亂。
