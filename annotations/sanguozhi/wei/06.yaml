  text: 華嶠《漢書》曰：卓欲遷都長安，召公卿以下大議。司徒楊彪曰：「昔盤庚五遷，殷民胥怨，故作三篇以曉天下之民。今海內安穩，無故移都，恐百姓驚動，麋沸蟻聚爲亂。」卓曰：「關中肥饒，故秦得并吞六國。今徙西京，設令關東豪彊敢有動者，以我彊兵踧之，可使詣滄海。」彪曰：「海內動之甚易，安之甚難。又長安宮室壞敗，不可卒復。」卓曰：「武帝時居杜陵南山下，有成瓦窑數千處，引涼州材木東下以作宮室，爲功不難。」卓意不得，便作色曰：「公欲沮我計邪？邊章、韓約有書來，欲令朝廷必徙都。若大兵來下，我不能復相救，公便可與袁氏西行。」彪曰：「西方自彪道徑也，顧未知天下何如耳！」議罷。卓勑司隷校尉宣璠以災異劾奏，因策免彪。《續漢書》曰：太尉黃琬、司徒楊彪、司空荀爽俱詣卓，卓言：「昔高祖都關中，十一世後中興，更都洛陽。從光武至今復十一世，案石苞室讖，宜復還都長安。」坐中皆驚愕，無敢應者。彪曰：「遷都改制，天下大事，皆當因民之心，隨時之宜。昔盤庚五遷，殷民胥怨，故作三篇以曉之。往者王莽篡逆，變亂五常，更始赤眉之時，焚燒長安，殘害百姓，民人流亡，百無一在。光武受命，更都洛邑，此其宜也。今方建立聖主，光隆漢祚，而無故捐宮廟，棄園陵，恐百姓驚愕，不解此意，必麋沸蟻聚以致擾亂。石苞室讖，妖邪之書，豈可信用？」卓作色曰：「楊公欲沮國家計邪？關東方亂，所在賊起。崤函險固，國之重防。又隴右取材，功夫不難。杜陵南山下有孝武故陶處，作塼瓦，一朝可辦。宮室官府，蓋何足言！百姓小民，何足與議。若有前郤，我以大兵驅之，豈得自在。」百寮恐怖失色。琬謂卓曰：「此大事。楊公之語，得無重思！」卓罷坐，即日令司隷奏彪及琬，皆免官。大駕即西。卓部兵燒洛陽城外面百里。又自將兵燒南北宮及宗廟、府庫、民家，城內埽地殄盡。又收諸富室，以罪惡沒入其財物；無辜而死者，不可勝計。《獻帝紀》曰：卓獲山東兵，以豬膏塗布十餘匹，用纏其身，然後燒之，先從足起。獲袁紹豫州從事李延，煑殺之。卓所愛胡，恃寵放縱，爲司隷校尉趙謙所殺。卓大怒曰：「我愛狗，尚不欲令人呵之，而況人乎！」乃召司隷都官撾殺之。
