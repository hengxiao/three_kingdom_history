- id: wei.6.p34.a2
  anchor: wei.6.p34
  at: 269
  length: 0
  type: pei
  text: 《傅子》曰：巽字公悌，瓌偉博達，有知人鑒。辟公府，拜尚書郎，後客荊州，以說劉琮之功，賜爵關內侯。文帝時爲侍中，太和中卒，巽在荊州，目龐統爲半英雄，證裴潛終以清行顯；統遂附劉備，見待次於諸葛亮，潛位至尚書令，並有名德。及在魏朝，魏諷以才智聞，巽謂之必反，卒如其言。巽弟子嘏，別有傳。《漢晉春秋》曰：王威說劉琮曰：「曹操得將軍旣降，劉備已走，必懈弛無備，輕行單進；若給威奇兵數千，徼之於險，操可獲也。獲操即威震四海，坐而虎步，中夏雖廣，可傳檄而定，非徒收一勝之功，保守今日而已。此難遇之機，不可失也。」琮不納。《搜神記》曰：建安初，荊州童謠曰：「八九年間始欲衰，至十三年無孑遺。」言自中平以來，荊州獨全，及劉表爲牧，民又豐樂，至建安八年九年當始衰。始衰者，謂劉表妻死，諸將並零落也。十三年無孑遺者，表當又死，因以喪破也。是時，華容有女子忽啼呼云：「荊州將有大喪。」言語過差，縣以爲妖言，繫獄月餘，忽於獄中哭曰：「劉荊州今日死。」華谷去州數百里，即遣馬吏驗視，而劉表果死，縣乃出之。續又歌吟曰：「不意李立爲貴人。」後無幾，太祖平荊州，以涿郡李立字建賢爲荊州刺史。
