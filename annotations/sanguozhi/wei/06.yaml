  text: 《魏書》曰：輔恇怯失守，不能自安。常把辟兵符，以鈇鑕致其旁，欲以自彊。見客，先使相者相之，知有反氣與不，又筮知吉凶，然後乃見之。中郎將董越來就輔，輔使筮之，得兊下離上，筮者曰：「火勝金，外謀內之卦也。」即時殺越。《獻帝紀》云：筮人常爲越所鞭，故因此以報之。
