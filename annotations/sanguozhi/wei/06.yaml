  at: 60
  length: 0
  type: pei
  text: 《獻帝紀》曰：卓謀廢帝，會羣臣於朝堂，議曰：「大者天地，其次君臣，所以爲治。今皇帝闇弱，不可以奉宗廟，爲天下主。欲以依伊尹、霍光故事，立陳留王，何如？」尚書盧植曰：「案尚書太甲旣立不明，伊尹放之桐宮。昌邑王立二十七日，罪過千餘，故霍光廢之。今上富於春秋，行未有失，非前事之比也。」卓怒，罷坐，欲誅植，侍中蔡邕勸之，得免。九月甲戌，卓復大會羣臣曰：「太后逼迫永樂太后，令以憂死，逆婦姑之禮，無孝順之節。天子幼質，軟弱不君。昔伊尹放太甲，霍光廢昌邑，著在典籍，僉以爲善。今太后宜如太甲，皇帝宜如昌邑。陳留王仁孝，宜即尊皇祚。」《獻帝起居注》載策曰：「孝靈皇帝不究高宗眉壽之祚，早棄臣子。皇帝承紹，海內側望，而帝天姿輕佻，威儀不恪，在喪慢惰，衰如故焉；凶德旣彰，淫穢發聞，損辱神器，忝汙宗廟。皇太后教無母儀，統政荒亂。永樂太后暴崩，衆論惑焉。三綱之道，天地之紀，而乃有闕，罪之大者。陳留王恊，聖德偉茂，規矩邈然，豐下兊上，有堯圖之表；居喪哀戚，言不及邪，岐嶷之性，有周成之懿。休聲美稱，天下所聞，宜承洪業，爲萬世統，可以承宗廟。廢皇帝爲弘農王。皇太后還政。」尚書讀冊畢，羣臣莫有言，尚書丁宮曰：「天禍漢室，喪亂弘多。昔祭仲廢忽立突，春秋大其權。今大臣量宜爲社稷計，誠合天人，請稱萬歲。」卓以太后見廢，故公卿以下不布服，會葬，素衣而已。
