  type: pei
  text: 《獻帝傳》云：沮授說紹曰：「將軍累葉輔弼，世濟忠義。今朝廷播越，宗廟毀壞，觀諸州郡外託義兵，內圖相滅，未有存主卹民者。且今州城粗定，宜迎大駕，安宮鄴都，挾天子而令諸侯，畜士馬以討不庭，誰能禦之！」紹恱，將從之。郭圖、淳于瓊曰：「漢室陵遲，爲日久矣，今欲興之，不亦難乎！且今英雄據有州郡，衆動萬計，所謂秦失其鹿，先得者王。若迎天子以自近，動輙表聞，從之則權輕，違之則拒命，非計之善者也。」授曰：「今迎朝廷，至義也，又於時宜大計也，若不早圖，必有先人者也。夫權不失機，功在速捷，將軍其圖之！」紹弗能用。案此書稱郭圖之計，則與本傳違也。
