  type: pei
  text: 《典略》曰：傕數設酒請汜，或留汜止宿。汜妻懼傕與汜婢妾而奪己愛，思有以離間之。會傕送饋，妻乃以豉爲藥，汜將食，妻曰：「食從外來，儻或有故！」遂摘藥示之，曰：「一栖不二雄，我固疑將軍之信李公也。」他日傕復請汜，大醉。汜疑傕藥之，絞糞汁飲之乃解。於是遂生嫌隙，而治兵相攻。
- id: wei.6.p11.a3
  anchor: wei.6.p11
  at: 54
  length: 0
  type: pei
  text: 《獻帝起居注》曰：初，汜謀迎天子幸其營，夜有亡告傕者，傕使兄子暹將數千兵圍宮，以車三乘迎天子。楊彪曰：「自古帝王無在人臣家者。舉事當合天下心，諸君作此，非是也。」暹曰：「將軍計定矣。」於是天子一乘，貴人伏氏一乘，賈詡、左靈一乘，其餘皆步從。是日，傕復移乘輿幸北塢，使校尉監塢門，內外隔絕。諸侍臣皆有饑色，時盛暑熱，人盡寒心。帝求米五斛、牛骨五具以賜左右，傕曰：「朝餔上飯，何用米爲？」乃與腐牛骨，皆臭不可食。帝大怒，欲詰責之。侍中楊琦上封事曰：「傕，邊鄙之人，習於夷風，今又自知所犯悖逆，常有怏怏之色，欲輔車駕幸黃白城以紓其憤。臣願陛下忍之，未可顯其罪也。」帝納之。初，傕屯黃白城，故謀欲徙之。傕以司徒趙溫不與己同，乃內溫塢中。溫聞傕欲移乘輿，與傕書曰：「公前託爲董公報讎，然實屠陷王城，殺戮大臣，天下不可家見而戶釋也。今爭睚眥之隙，以成千鈞之讎，民在塗炭，各不聊生，曾不改寤，遂成禍亂。朝廷仍下明詔，欲令和解，詔命不行，恩澤日損，而復欲輔乘輿於黃白城，此誠老夫所不解也。於易，一過爲過，再爲涉，三而弗改，滅其頂，凶。不如早共和解，引兵還屯，上安萬乘，下全生民，豈不幸甚！」傕大怒，欲遣人害溫。其從弟應，溫故掾也，諫之數日乃止。帝聞溫與傕書，問侍中常洽曰：「傕弗知臧否，溫言太切，可爲寒心。」對曰：「李應已解之矣。」帝乃恱之。
