  text: 《獻帝傳》曰：紹將濟河，沮授諫曰：「勝負變化，不可不詳。今宜留屯延津，分兵官渡，若其克獲，還迎不晚，設其有難，衆弗可還。」紹弗從。授臨濟歎曰：「上盈其志，下務其功，悠悠黃河，吾其反乎？」遂以疾辭。紹恨之，乃省其所部兵屬郭圖。
