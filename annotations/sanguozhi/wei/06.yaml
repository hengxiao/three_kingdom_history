  text: 《續漢書》曰：進字遂高，南陽人，太后異母兄也。進本屠家子，父曰真。真死後，進以妹倚黃門得入掖庭，有寵，光和三年立爲皇后，進由是貴幸。中平元年，黃巾起，拜進大將軍。《典略》載卓表曰：「臣伏惟天下所以有逆不止者，各由黃門常侍張讓等侮慢天常，操擅王命，父子兄弟並據州郡，一書出門，便獲千金，京畿諸郡數百萬膏腴美田皆屬讓等，至使怨氣上蒸，妖賊蠭起。臣前奉詔討於扶羅，將士饑乏，不肯渡河，皆言欲詣京師先誅閹豎以除民害，從臺閣求乞資直。臣隨慰撫，以至新安。臣聞揚湯止沸，不如滅火去薪，潰癕雖痛，勝於養肉，及溺呼船，悔之無及。」
