  text: 《靈帝紀》曰：中平五年，徵卓爲少府，勑以營吏士屬左將軍皇甫嵩，詣行在所。卓上言：「涼州擾亂，鯨鯢未滅，此臣奮發效命之秋。吏士踊躍，戀恩念報，各遮臣車，辭聲懇惻，未得即路也。輙且行前將軍事，盡心慰卹，効力行陣。」六年，以卓爲并州牧，又勑以吏兵屬皇甫嵩。卓復上言：「臣掌戎十年，士卒大小相狎彌久，戀臣畜養之恩，樂爲國家奮一旦之命，乞將之州，效力邊陲。」卓再違詔勑，會爲何進所召。
