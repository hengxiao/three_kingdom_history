- id: wei.6.p24.a3
  anchor: wei.6.p24
  at: 297
  length: 0
  type: pei
  text: 《魏氏春秋》載劉表遺譚書曰：「天篤降害，禍難殷流，尊公殂殞，四海悼心。賢胤承統，遐邇屬望，咸欲展布旅力，以投盟主，雖亡之日，猶存之願也。何寤青蠅飛於干旍，無極游於二壘，使股肱分爲二體，背膂絕爲異身！昔三王五伯，下及戰國，父子相殘，蓋有之矣；然或欲以成王業，或欲以定伯功，或欲以顯宗主，或欲以固冢嗣，未有棄親即異，抏其本根，而能崇業濟功，垂祚後世者也。若齊襄復九世之讎，士匄卒荀偃之事，是故春秋美其義，君子稱其信。夫伯游之恨於齊，未若太公之忿曹；宣子之承業，未若仁君之繼統也。且君子之違難不適讎國，豈可忘先君之怨，棄至親之好，爲萬世之戒，遺同盟之恥哉！冀州不弟之慠，旣已然矣；仁君當降志辱身，以匡國爲務；雖見憎於夫人，未若鄭莊之於姜氏，兄弟之嫌，未若重華之於象傲也。然莊公有大隧之樂，象受有鼻之封。願棄捐前忿，遠思舊義，復爲母子昆弟如初。」又遺尚書曰：「知變起辛、郭，禍結同生，追閼伯、實沈之蹤，忘常棣死喪之義，親尋干戈，僵尸流血，聞之哽咽，雖存若亡。昔軒轅有涿鹿之戰，周武有商、奄之師，皆所以翦除穢害而定王業，非彊弱之事爭，喜怒之忿也。故雖滅親不爲尤，誅兄不傷義。今二君初承洪業，纂繼前軌，進有國家傾危之慮，退有先公遺恨之負，當唯義是務，唯國是康。何者？金木水火以剛柔相濟，然後克得其和，能爲民用。今青州天性峭急，迷於曲直。仁君度數弘廣，綽然有餘，當以大包小，以優容劣，先除曹操以卒先公之恨，事定之後，乃議曲直之計，不亦善乎！若留神遠圖，克己復禮，當振斾長驅，共獎王室，若迷而不反，違而無改，則胡夷將有誚讓之言，況我同盟，復能戮力爲君之役哉？此韓盧、東郭自困於前而遺田父之獲者也。憤踊鶴望，冀聞和同之聲。若其泰也，則袁族其與漢升降乎！如其否也，則同盟永無望矣。」譚、尚盡不從。《漢晉春秋》載審配獻書於譚曰：「春秋之義，國君死社稷，忠臣死王命。苟有圖危宗廟，敗亂國家，王綱典律，親踈一也。是以周公垂泣而蔽管、蔡之獄，季友歔欷而行鍼叔之鴆。何則？義重人輕，事不得已也。昔衞靈公廢蒯聵而立輙，蒯聵爲不道，入戚以篡，衞師伐之。春秋傳曰：『以石曼姑之義，爲可以拒之。』是以蒯聵終獲叛逆之罪，而曼姑永享忠臣之名。父子猶然，豈況兄弟乎！昔先公廢絀將軍以續賢兄，立我將軍以爲適嗣，上告祖靈，下書譜牒，先公謂將軍爲兄子，將軍謂先公爲叔父，海內遠近，誰不備聞？且先公即世之日，我將軍斬衰居廬，而將軍齋于堊室，出入之分，於斯益明。是時凶臣逢紀，妄畫蛇足，曲辭諂媚，交亂懿親，將軍奮赫然之怒，誅不旋時，我將軍亦奉命承旨，加以淫刑。自是之後，癰疽破潰，骨肉無絲髮之嫌，自疑之臣，皆保生全之福。故悉遣彊胡，簡命名將，料整器械，選擇戰士，殫府庫之財，竭食土之實，其所以供奉將軍，何求而不備？君臣相率，共衞旌麾，戰爲鴈行，賦爲幣主，雖傾倉覆庫，翦剥民物，上下欣戴，莫敢告勞。何則？推戀戀忠赤之情，盡家家肝腦之計，脣齒輔車，不相爲賜。謂爲將軍心合意同，混齊一體，必當并威偶勢，禦寇寧家。何圖凶險讒慝之人，造飾無端，誘導姦利，至令將軍翻然改圖，忘孝友之仁，聽豺狼之謀，誣先公廢立之言，違近者在喪之位，悖紀綱之理，不顧逆順之節，橫易冀州之主，欲當先公之繼。遂放兵鈔撥，屠城殺吏，交尸盈原，裸民滿野，或有髠𩮜髮膚，割截支體，冤魂痛於幽冥，創痍號於草棘。又乃圖獲鄴城，許賜秦、胡財物婦女，豫有分界。或聞告令吏士云：『孤雖有老母，輙使身體完具而已。』聞此言者，莫不驚愕失氣，悼心揮涕，使太夫人憂哀憤懣於堂室，我州君臣士友假寐悲歎，無所措其手足；念欲靜師拱默以聽執事之圖，則懼違春秋死命之節，貽太夫人不測之患，隕先公高世之業。且三軍憤慨，人懷私怒，我將軍辭不獲已，以及館陶之役。是時外爲禦難，內實乞罪，旣不見赦，而屠各二三其心，臨陣叛戾。我將軍進退無功，首尾受敵，引軍奔避，不敢告辭。亦謂將軍當少垂親親之仁，貺以緩追之惠，而乃尋蹤躡軌，無所逃命。困獸必鬬，以干嚴行，而將軍師旅土崩瓦解，此非人力，乃天意也。是後又望將軍改往修來，克己復禮，追還孔懷如初之愛；而縱情肆怒，趣破家門，企踵鶴立，連結外讎，散鋒於火，播增毒螫，烽煙相望，涉血千里，遺城厄民，引領悲怨，雖欲勿救，惡得已哉！故遂引軍東轅，保正疆埸，雖近郊壘，未侵境域，然望旌麾，能不永歎？配等備先公家臣，奉廢立之命。而圖等干國亂家，禮有常刑。故奮弊州之賦，以除將軍之疾，若乃天啟于心，早行其誅，則我將軍匍匐悲號於將軍股掌之上，配等亦袒躬布體以待斧鉞之刑。若必不悛，有以國斃，圖頭不縣，軍不旋踵。願將軍詳度事宜，錫以環玦。」《典略》曰：譚得書悵然，登城而泣。旣劫於郭圖，亦以兵鋒累交，遂戰不解。
