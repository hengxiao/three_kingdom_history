  type: pei
  text: 《典論》曰：譚長而惠，尚少而美。紹妻劉氏愛尚，數稱其才，紹亦奇其皃，欲以爲後，未顯而紹死。劉氏性酷妬，紹死，僵尸未殯，寵妾五人，劉盡殺之。以爲死者有知，當復見紹於地下，乃髠頭墨靣以毀其形。尚又爲盡殺死者之家。
