  anchor: wei.6.p30
  at: 70
  length: 0
  type: pei
  text: 司馬彪《戰略》曰：劉表之初爲荊州也，江南宗賊盛，袁術屯魯陽，盡有南陽之衆。吳人蘇代領長沙太守，具羽爲華容長，各阻兵作亂。表初到，單馬入宜城，而延中廬人蒯良、蒯越、襄陽人蔡瑁與謀。表曰：「宗賊甚盛，而衆不附，袁術因之，禍今至矣！吾欲徵兵，恐不集，其策安出？」良曰：「衆不附者，仁不足也，附而不治者，義不足也；苟仁義之道行，百姓歸之如水之趣下，何患所至之不從而問興兵與策乎？」表顧問越，越曰：「治平者先仁義，治亂者先權謀。兵不在多，在得人也。袁術勇而無斷，蘇代、具羽皆武人，不足慮。宗賊帥多貪暴，爲下所患。越有所素養者，使示之以利，必以衆來。君誅其無道，撫而用之。一州之人，有樂存之心，聞君盛德，必襁負而至矣。兵集衆附，南據江陵，北守襄陽，荊州八郡可傳檄而定。術等雖至，無能爲也。」表曰：「子柔之言，雍季之論也。異度之計，臼犯之謀也。」遂使越遣人誘宗賊，至者五十五人，皆斬之。襲取其衆，或即授部曲。唯江夏賊張虎、陳生擁衆據襄陽，表乃使越與龐季單騎往說降之，江南遂悉平。
