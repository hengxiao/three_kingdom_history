  type: pei
  text: 《漢末名士錄》曰：班字季皮，太山人，少與山陽度尚、東平張邈等八人並輕財赴義，振濟人士，世謂之八廚。謝承《後漢書》曰：班，王匡之妹夫，董卓使班奉詔到河內，解釋義兵。匡受袁紹旨，收班繫獄，欲殺之以徇軍。班與匡書云：「自古已來，未有下土諸侯舉兵向京師者。劉向傳曰『擲鼠忌器』，器猶忌之，況卓今處宮闕之內，以天子爲藩屏，幼主在宮，如何可討？僕與太傅馬公、太僕趙岐、少府陰脩俱受詔命。關東諸郡雖實嫉卓，猶以銜奉王命，不敢玷辱。而足下獨囚僕於獄，欲以釁鼓，此悖暴無道之甚者也。僕與董卓有何親戚，義豈同惡？而足下張虎狼之口，吐長蛇之毒，恚卓遷怒，何甚酷哉！死，人之所難，然恥爲狂夫所害。若亡者有靈，當訴足下於皇天。夫婚姻者禍福之機，今日著矣。曩爲一體，今爲血讎。亡人子二人，則君之甥，身沒之後，慎勿令臨僕尸骸也。」匡得書，抱班二子而泣。班遂死於獄。班甞見太山府君及河伯，事在《搜神記》，語多不載。
