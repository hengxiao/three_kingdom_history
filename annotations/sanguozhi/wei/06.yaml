  text: 《魏書》曰：言其逼天子也。《獻帝紀》曰：卓旣爲太師，復欲稱尚父，以問蔡邕。邕曰：「昔武王受命，太公爲師，輔佐周室，以伐無道，是以天下尊之，稱爲尚父。今公之功德誠爲巍巍，宜須關東悉定，車駕東還，然後議之。」乃止。京師地震，卓又問邕。邕對曰：「地動陰盛，大臣踰制之所致也。公乘青蓋車，遠近以爲非宜。」卓從之，更乘金華皂蓋車也。
