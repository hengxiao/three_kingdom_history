  type: pei
  text: 《獻帝起居注》曰：傕性喜鬼恠左道之術，常有道人及女巫歌謳擊鼓下神，祠祭六丁，符劾厭勝之具，無所不爲。又於朝廷省門外，爲董卓作神坐，數以牛羊祠之，訖，過省閤問起居，求入見。傕帶三刀，手復與鞭合持一刃。侍中、侍郎見傕帶仗，皆惶恐，亦帶劒持刀，先入在帝側。傕對帝，或言「明陛下」，或言「明帝」，爲帝說郭汜無狀，帝亦隨其意荅應之。傕喜，出言「明陛下真賢聖主」，意遂自信，自謂良得天子歡心也。雖然，猶不欲令近臣帶劒在帝邊，謂人言「此曹子將欲圖我邪？而皆持刀也」。侍中李禎，傕州里，素與傕通，語傕「所以持刀者，軍中不可不爾，此國家故事」。傕意乃解。天子以謁者僕射皇甫酈涼州舊姓，有專對之才，遣令和傕、汜。酈先詣汜，汜受詔命。詣傕，傕不肯，曰：「我有討呂布之功，輔政四年，三輔清靜，天下所知也。郭多，盜馬虜耳，何敢乃欲與吾等邪？必欲誅之。君爲涼州人，觀吾方略士衆，足辦多不？多又劫質公卿，所爲如是，而君苟欲利郭多，李傕有膽自知之。」酈荅曰：「昔有窮后羿恃其善射，不思患難，以至於斃。近董公之彊，明將軍目所見，內有王公以爲內主，外有董旻、承、璜以爲鯁毒，呂布受恩而反圖之，斯須之間，頭縣竿端，此有勇而無謀也。今將軍身爲上將，把鉞仗節，子孫握權，宗族荷寵，國家好爵而皆據之。今郭多劫質公卿，將軍脅至尊，誰爲輕重邪？張濟與郭多、楊定有謀，又爲冠帶所附。楊奉，白波帥耳，猶知將軍所爲非是，將軍雖拜寵之，猶不肯盡力也。」傕不納酈言，而呵之令出。酈出，詣省門，白傕不肯從詔，辭語不順。侍中胡邈爲傕所幸，呼傳詔者令飾其辭。又謂酈曰：「李將軍於卿不薄，又皇甫公爲太尉，李將軍力也。」酈荅曰：「胡敬才，卿爲國家常伯，輔弼之臣也，語言如此，寧可用邪？」邈曰：「念卿失李將軍意，恐不易耳！我與卿何事者？」酈言：「我累世受恩，身又常在幃幄，君辱臣死，當坐國家，爲李傕所殺，則天命也。」天子聞酈荅語切，恐傕聞之，便勑遣酈。酈裁出營門，傕遣虎賁王昌呼之。昌知酈忠直，縱令去，還荅傕，言追之不及。天子使左中郎將李固持節拜傕爲大司馬，在三公之右。傕自以爲得鬼神之力，乃厚賜諸巫。
