- id: wei.6.p25.a1
  anchor: wei.6.p25
  at: 417
  length: 0
  type: pei
  text: 《先賢行狀》曰：配字正南，魏郡人，少忠烈慷慨，有不可犯之節。袁紹領冀州，委以腹心之任，以爲治中別駕，并總幕府。初，譚之去，皆呼辛毗、郭圖家得出，而辛評家獨被收。及配兄子開城門內兵，時配在城東南角樓上，望見太祖兵入，忿辛、郭壞敗冀州，乃遣人馳詣鄴獄，指殺仲治家。是時，辛毗在軍，聞門開，馳走詣獄，欲解其兄家，兄家已死。是日生縛配，將詣帳下，辛毗等逆以馬鞭擊其頭，罵之曰：「奴，汝今日真死矣！」配顧曰：「狗輩，正由汝曹破我冀州，恨不得殺汝也！且汝今日能殺生我邪？」有頃，公引見，謂配：「知誰開卿城門？」配曰：「不知也。」曰：「自卿子榮耳。」配曰：「小兒不足用乃至此！」公復謂曰：「曩日孤之行圍，何弩之多也？」配曰：「恨其少耳！」公曰：「卿忠於袁氏父子，亦自不得不爾也。」有意欲活之。配旣無撓辭，而辛毗等號哭不已，乃殺之。初，冀州人張子謙先降，素與配不善，笑謂配曰：「正南，卿竟何如我？」配厲聲曰：「汝爲降虜，審配爲忠臣，雖死，豈若汝生邪！」臨行刑，叱持兵者令北向，曰：「我君在北。」樂資《山陽公載記》及袁暐《獻帝春秋》並云太祖兵入城，審配戰於門中，旣敗，逃于井中，於井獲之。臣松之以爲配一代之烈士，袁氏之死臣，豈當數窮之日，方逃身於井，此之難信，誠爲易了。不知資、暐之徒竟爲何人，未能識別然否，而輕弄翰墨，妄生異端，以行其書。如此之類，正足以誣罔視聽，疑誤後生矣。寔史籍之罪人，達學之所不取者也。
