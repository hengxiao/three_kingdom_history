- id: wei.6.p7.a2
  anchor: wei.6.p7
  at: 148
  length: 0
  type: pei
  text: 謝承《後漢書》曰：蔡邕在王允坐，聞卓死，有歎惜之音。允責邕曰：「卓，國之大賊，殺主殘臣，天地所不祐，人神所同疾。君爲王臣，世受漢恩，國主危難，曾不倒戈，卓受天誅，而更嗟痛乎？」便使收付廷尉。邕謝允曰：「雖以不忠，猶識大義，古今安危，耳所厭聞，口所常玩，豈當背國而向卓也？狂瞽之詞，謬出患入，願黥首爲刑以繼漢史。」公卿惜邕才，咸共諫允。允曰：「昔武帝不殺司馬遷，使作謗書，流於後世。方今國祚中衰，戎馬在郊，不可令佞臣執筆在幼主左右，後令吾徒並受謗議。」遂殺邕。臣松之以爲蔡邕雖爲卓所親任，情必不黨。寧不知卓之姦凶，爲天下所毒，聞其死亡，理無歎惜。縱復令然，不應反言於王允之坐。斯殆謝承之妄記也。史遷紀傳，博有奇功於世，而云王允謂孝武應早殺遷，此非識者之言。但遷爲不隱孝武之失，直書其事耳，何謗之有乎？王允之忠正，可謂內省不疚者矣，旣無懼於謗，且欲殺邕，當論邕應死與不，豈可慮其謗己而枉戮善人哉！此皆誣罔不通之甚者。張璠《漢紀》曰：初，蔡邕以言事見徙，名聞天下，義動志士。及還，內寵惡之。邕恐，乃亡命海濵，往來依太山羊氏，積十年。卓爲太尉，辟爲掾，以高第爲侍御史治書，三日中遂至尚書。後遷巴東太守，卓上留拜侍中，至長安爲左中郎將。卓重其才，厚遇之。每有朝廷事，常令邕具草。及允將殺邕，時名士多爲之言，允悔欲止，而邕已死。
