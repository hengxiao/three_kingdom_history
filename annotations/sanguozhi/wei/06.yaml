  type: pei
  text: 《英雄記》曰：毖字仲遠，武威人。瓊字德瑜，汝南人。謝承《後漢書》曰：伍孚字德瑜，少有大節，爲郡門下書佐。其本邑長有罪，太守使孚出教，就曹下督郵收之。孚不肯受教，伏地仰諫曰：「君雖不君，臣不可不臣，明府柰何令孚受教，勑外収本邑長乎？更乞授他吏。」太守奇而聽之。後大將軍何進辟爲東曹屬，稍遷侍中、河南尹、越騎校尉。董卓作亂，百僚震慄。孚著小鎧，於朝服裏挾佩刀見卓，欲伺便刺殺之。語闋辭去，卓送至閤中，孚因出刀刺之。卓多力，退郤不中，即収孚。卓曰：「卿欲反邪？」孚大言曰：「汝非吾君，吾非汝臣，何反之有？汝亂國篡主，罪盈惡大，今是吾死日，故來誅姦賊耳，恨不車裂汝於市朝以謝天下。」遂殺孚。謝承記孚字及本郡，則與瓊同，而致死事乃與孚異也，不知孚爲瓊之別名，爲別有伍孚也？蓋未詳之。
