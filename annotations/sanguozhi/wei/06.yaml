- id: wei.6.p35.a1
  anchor: wei.6.p35
  at: 14
  length: 0
  type: pei
  text: 《魏武故事》載令曰：「楚有江、漢山川之險，後復先疆與秦爭衡，荊州則其故地。劉鎮南久用其民矣。身沒之後，諸子鼎峙，雖終難全，猶可引日。青州刺史琮，心高志潔，智深慮廣，輕榮重義，薄利厚德，蔑萬里之業，忽三軍之衆，篤中正之體，敦令名之譽，上耀先君之遺塵，下圖不朽之餘祚；鮑永之棄并州，竇融之離五郡，未足以喻也。雖封列侯一州之位，猶恨此寵未副其人；而比有牋求還州。監史雖尊，秩祿未優。今聽所執，表琮爲諫議大夫，參同軍事。」
- id: wei.6.p35.a2
  anchor: wei.6.p35
  at: 29
  length: 0
  type: pei
  text: 《傅子》曰：越，蒯通之後也，深中足智，魁傑有雄姿。大將軍何進聞其名，辟爲東曹掾。越勸進誅諸閹官，進猶豫不決。越知進必敗，求出爲汝陽令，佐劉表平定境內，表得以彊大。詔書拜章陵太守，封樊亭侯。荊州平，太祖與荀彧書曰：「不喜得荊州，喜得蒯異度耳。」建安十九年卒。臨終，與太祖書，託以門戶。太祖報書曰：「死者反生，生者不愧。孤少所舉，行之多矣。魂而有靈，亦將聞孤此言也。」
- id: wei.6.p35.a3
  anchor: wei.6.p35
  at: 35
  length: 0
  type: pei
  text: 《先賢行狀》曰：嵩字德高，義陽人。少好學，貧不改操。知世將亂，不應三公之命，與同好數人隱居於酈西山中。黃巾起，嵩避難南方，劉表逼以爲別駕，轉從事中郎。表郊祀天地，嵩正諫不從，漸見違忤。奉使到許，事在前注。荊州平，嵩疾病，就在所拜授大鴻臚印綬。
- id: wei.6.p35.a4
  anchor: wei.6.p35
  at: 40
  length: 0
  type: pei
  text: 羲，章陵人。
- id: wei.6.p35.a5
  anchor: wei.6.p35
  at: 53
  length: 0
  type: pei
  text: 《零陵先賢傳》曰：先字始宗，博學彊記，尤好黃老言，明習漢家典故。爲劉表別駕，奉章詣許，見太祖。時賔客並會，太祖問先：「劉牧如何郊天也？」先對曰：「劉牧託漢室肺腑，處牧伯之位，而遭王道未平，羣凶塞路，抱玉帛而無所聘頫，脩章表而不獲達御，是以郊天祀地，昭告赤誠。」太祖曰：「羣凶爲誰？」先曰：「舉目皆是。」太祖曰：「今孤有熊羆之士，步騎十萬，奉辭伐罪，誰敢不服？」先曰：「漢道陵遲，羣生憔悴，旣無忠義之士翼戴天子，綏寧海內，使萬邦歸德，而阻兵安忍，曰莫己若，即蚩尤、智伯復見於今也。」太祖嘿然。拜先武陵太守。荊州平，先始爲漢尚書，後爲魏國尚書令。先甥同郡周不疑，字元直，零陵人。先賢傳稱不疑幼有異才，聦明敏達，太祖欲以女妻之，不疑不敢當。太祖愛子倉舒，夙有才智，謂可與不疑爲儔。及倉舒卒，太祖心忌不疑，欲除之。文帝諫以爲不可，太祖曰：「此人非汝所能駕御也。」乃遣刺客殺之。摯虞文章志曰：不疑死時年十七，著文論四首。《世語》曰：表死後八十餘年，至晉太康中，表冢見發。表及妻身形如生，芬香聞數里。
