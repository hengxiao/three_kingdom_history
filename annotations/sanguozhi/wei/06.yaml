  text: 《獻帝春秋》曰：卓欲廢帝，謂紹曰：「皇帝沖闇，非萬乘之主。陳留王猶勝，今欲立之。人有小智，大或癡，亦知復何如，爲當且爾；卿不見靈帝乎？念此令人憤毒！」紹曰：「漢家君天下四百許年，恩澤深渥，兆民戴之來久。今帝雖幼沖，未有不善宣聞天下，公欲廢適立庶，恐衆不從公議也。」卓謂紹曰：「豎子！天下事豈不決我？我今爲之，誰敢不從？爾謂董卓刀爲不利乎！」紹曰：「天下健者，豈唯董公？」引佩刀橫揖而出。臣松之以爲紹于時與卓未搆嫌隙，故卓與之諮謀。若但以言議不同，便罵爲豎子，而有推刃之心，及紹復荅，屈彊爲甚，卓又安能容忍而不加害乎？且如紹此言，進非亮正，退違詭遜，而顯其競爽之旨，以觸哮闞之鋒，有志功業者，理豈然哉！此語，妄之甚矣。
