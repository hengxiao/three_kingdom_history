  length: 0
  type: pei
  text: 《英雄記》曰：紹生而父死，二公愛之。幼使爲郎，弱冠除濮陽長，有清名。遭母喪，服竟，又追行父服，凡在冢廬六年。禮畢，隱居洛陽，不妄通賔客，非海內知名，不得相見。又好游俠，與張孟卓、何伯求、吳子卿、許子遠、伍德瑜等皆爲奔走之友。不應辟命。中常侍趙忠謂諸黃門曰：「袁本初坐作聲價，不應呼召而養死士，不知此兒欲何所爲乎？」紹叔父隗聞之，責數紹曰：「汝且破我家！」紹於是乃起應大將軍之命。臣松之案：《魏書》云「紹，逢之庶子，出後伯父成」。如此記所言，則似實成所生。夫人追服所生，禮無其文，況於所後而可以行之！二書未詳孰是。
