  text: 《魏書》曰：卓所願無極，語賔客曰：「我相，貴無上也。」《英雄記》曰：卓欲震威，侍御史擾龍宗詣卓白事，不解劒，立撾殺之，京師震動。發何苗棺，出其尸，枝解節棄於道邊。又收苗母舞陽君殺之，棄尸於苑枳落中，不復收斂。
