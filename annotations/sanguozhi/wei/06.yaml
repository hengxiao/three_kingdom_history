  text: 《獻帝紀》曰：是時新遷都，宮人多亡衣服，帝欲發御府繒以與之，李傕弗欲，曰：「宮中有衣，胡爲復作邪？」詔賣廄馬百餘匹，御府大司農出雜繒二萬匹，與所賣廄馬直，賜公卿以下及貧民不能自存者。李傕曰「我邸閣儲偫少」，乃悉載置其營。賈詡曰「此上意，不可拒」，傕不從之。
- id: wei.6.p11.a1
