  text: 《獻帝紀》曰：初，議者欲令天子浮河東下，太尉楊彪曰：「臣弘農人，從此已東有三十六灘，非萬乘所當從也。」劉艾曰：「臣前爲陝令，知其危險，有師猶有傾覆，況今無師，太尉謀是也。」乃止。及當北渡，使李樂具船。天子步行趨河岸，岸高不得下，董承等謀欲以馬羈相續以繫帝腰。時中宮僕伏德扶中宮，一手持十匹絹，乃取德絹連續爲輦。行軍校尉尚弘多力，令弘居前負帝，乃得下登船。其餘不得渡者甚衆，復遣船收諸不得渡者，皆爭攀船，船上人以刃櫟斷其指，舟中之指可掬。
