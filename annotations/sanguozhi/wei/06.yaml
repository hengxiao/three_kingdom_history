  text: 《九州春秋》曰：初紹說進曰：「黃門、常侍累世太盛，威服海內，前竇武欲誅之而反爲所害，但坐言語漏泄，以五營士爲兵故耳。五營士生長京師，服畏中人，而竇氏反用其鋒，遂果叛走歸黃門，是以自取破滅。今將軍以元舅之尊，二府並領勁兵，其部曲將吏皆英雄名士，樂盡死力，事在掌握，天贊其時也。今爲天下誅除貪穢，功勳顯著，垂名後世，雖周之申伯，何足道哉？今大行在前殿，將軍以詔書領兵衞守，可勿入宮。」進納其言，後更狐疑。紹懼進之改變，脅進曰：「今交搆已成，形勢已露，將軍何爲不早決之？事留變生，後機禍至。」進不從，遂敗。
