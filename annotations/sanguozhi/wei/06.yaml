- id: wei.6.p22.a1
  anchor: wei.6.p22
  at: 245
  length: 0
  type: pei
  text: 《先賢行狀》曰：豐字元皓，鉅鹿人，或云勃海人。豐天姿瓌傑，權略多奇，少喪親，居喪盡哀，日月雖過，笑不至矧。博覽多識，名重州黨。初辟太尉府，舉茂才，遷侍御史。閹宦擅朝，英賢被害，豐乃棄官歸家。袁紹起義，卑辭厚幣以招致豐，豐以王室多難，志存匡救，乃應紹命，以爲別駕。勸紹迎天子，紹不納。紹後用豐謀，以平公孫瓚。逢紀憚豐亮直，數讒之於紹，紹遂忌豐。紹軍之敗也，土崩奔北，師徒略盡，軍皆拊膺而泣曰：「向令田豐在此，不至於是也。」紹謂逢紀曰：「冀州人聞吾軍敗，皆當念吾，唯田別駕前諫止吾，與衆不同，吾亦慙見之。」紀復曰：「豐聞將軍之退，拊手大笑，喜其言之中也。」紹於是有害豐之意。初，太祖聞豐不從戎，喜曰：「紹必敗矣。」及紹奔遁，復曰：「向使紹用田別駕計，尚未可知也。」孫盛曰：觀田豐、沮授之謀，雖良、平何以過之？故君貴審才，臣尚量主；君用忠良，則霸王之業隆，臣奉闇后，則覆亡之禍至：存亡榮辱，常必由茲。豐知紹將敗，敗則己必死，甘冒虎口以盡忠規，烈士之於所事，慮不存己。夫諸侯之臣，義有去就，況豐與紹非純臣乎！詩云「逝將去汝，適彼樂土」，言去亂邦，就有道可也。
