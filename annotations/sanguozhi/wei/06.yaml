  text: 《英雄記》曰：卓侍妾懷抱中子，皆封侯，弄以金紫。孫女名白，時尚未笄，封爲渭陽君。於郿城東起壇，從廣二丈餘，高五六尺，使白乘軒金華青蓋車，都尉、中郎將、刺史二千石在郿者，各令乘軒簪筆，爲白導從，之壇上，使兄子璜爲使者授印綬。
