  length: 0
  type: pei
  text: 華嶠《漢書》曰：安字邵公，好學有威重。明帝時爲楚郡太守，治楚王獄，所申理者四百餘家，皆蒙全濟，安遂爲名臣。章帝時至司徒，生蜀郡太守京。京弟敞爲司空。京子陽，太尉。陽四子：長子平，平弟成，左中郎將，並早卒；成弟逢，逢弟隗，皆爲公。《魏書》曰：自安以下，皆博愛容衆，無所揀擇；賔客入其門，無賢愚皆得所欲，爲天下所歸。紹即逢之庶子，術異母兄也，出後成爲子。《英雄記》曰：成字文開，壯健有部分，貴戚權豪自大將軍梁冀以下皆與結好，言無不從。故京師爲作諺曰：「事不諧，問文開。」
