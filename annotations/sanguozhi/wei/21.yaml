  length: 0
  type: pei
  text: 司馬彪《戰略》載嘏此對，詳於本傳，今悉載之以盡其意。彪曰：嘉平四年四月，孫權死。征南大將軍王昶、征東將軍胡遵、鎮南將軍毌丘儉等表請征呉。朝廷以三征計異，詔訪尚書傅嘏，嘏對曰：「昔夫差勝齊陵晉，威行中國，不能以免姑蘇之禍；齊閔辟土兼國，開地千里，不足以救顛覆之敗：有始不必善終，古事之明效也。孫權自破蜀兼平荊州之後，志盈欲滿，罪戮忠良，殊及胤嗣，元凶已極。相國宣文侯先識取亂侮亡之義，深建宏圖大舉之策。今權已死，託孤於諸葛恪。若矯權苛暴，蠲其虐政，民免酷烈，偷安新惠，外內齊慮，有同舟之懼，雖不能終自保完，猶足以延期挺命於深江之表矣。昶等或欲汎舟徑渡，橫行江表，收民略地，因糧於寇；或欲四道並進，臨之以武，誘間攜貳，待其崩壞；或欲進軍大佃，偪其項領，積穀觀釁，相時而動：凡此三者，皆取賊之常計也。然施之當機，則功成名立，苟不應節，必貽後患。自治兵已來，出入三載，非掩襲之軍也。賊喪元帥，利存退守，若撰飾舟楫，羅船津要，堅城清野，以防卒攻，橫行之計，殆難必施。賊之爲寇，幾六十年，君臣偽立，吉凶同患，若恪蠲其弊，天去其疾，崩潰之應，不可卒待。今邊壤之守，與賊相遠，賊設羅落，又持重密，間諜不行，耳目無聞。夫軍無耳目，校察未詳，而舉大衆以臨巨險，此爲希幸徼功，先戰而後求勝，非全軍之長策也。唯有進軍大佃，最差完牢。可詔昶、遵等擇地居險，審所錯置，及令三方一時前守。奪其肥壤，使還耕塉土，一也；兵出民表，寇鈔不犯，二也；招懷近路，降附日至，三也；羅落遠設，間構不來，四也；賊退其守，羅落必淺，佃作易之，五也；坐食積穀，士不運輸，六也；釁隙時聞，討襲速決，七也：凡此七者，軍事之急務也。不據則賊擅便資，據之則利歸於國，不可不察也。夫屯壘相偪，形勢已交，智勇得陳，巧拙得用，策之而知得失之計，角之而知有餘不足，虜之情偽，將焉所逃？夫以小敵大，則役煩力竭，以貧敵富，則斂重財匱。故『敵逸能勞之，飽能飢之』，此之謂也。然後盛衆厲兵以震之，參惠倍賞以招之，多方廣似以疑之。由不虞之道，以間其不戒；比及三年，左提右挈，虜必冰散瓦解，安受其弊，可坐筭而得也。昔漢氏歷世常患匈奴，朝臣謀士早朝晏罷，介冑之將則陳征伐，搢紳之徒咸言和親，勇奮之士思展搏噬。故樊噲願以十萬之衆橫行匈奴，季布面折其短。李信求以二十萬獨舉楚人，而果辱秦軍。今諸將有陳越江陵險，獨步虜庭，即亦向時之類也。以陛下聖德，輔相忠賢，法明士練，錯計於全勝之地，振長策以禦之，虜之崩潰，必然之數。故兵法曰：『屈人之兵，而非戰也；拔人之城，而非攻也。』若釋廟勝必然之理，而行萬一不必全之路，誠愚臣之所慮也。故謂大佃而偪之計最長。」時不從嘏言。其年十一月，詔昶等征呉。五年正月，諸葛恪拒戰，大破衆軍於東關。
