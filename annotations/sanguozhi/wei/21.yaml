- id: wei.21.p7.a1
  anchor: wei.21.p7
  at: 46
  length: 0
  type: pei
  text: 《文士傳》曰：太祖雅聞瑀名，辟之，不應，連見偪促，乃逃入山中。太祖使人焚山，得瑀，送至，召入。太祖時征長安，大延賔客，怒瑀不與語，使就技人列。瑀善解音，能鼓琴，遂撫弦而歌，因造歌曲曰：「奕奕天門開，大魏應期運。青蓋巡九州，在東西人怨。士爲知己死，女爲恱者玩。恩義苟敷暢，他人焉能亂？」爲曲旣捷，音聲殊妙，當時冠坐，太祖大恱。臣松之案魚氏《典略》、摯虞《文章志》並云「瑀建安初辭疾避役，不爲曹洪屈。得太祖召，即投杖而起」。不得有逃入山中，焚之乃出之事也。又《典略》載太祖初征荊州，使瑀作書與劉備，及征馬超，又使瑀作書與韓遂，此二書今具存。至長安之前，遂等破走，太祖始以十六年得入關耳。而張隲云初得瑀時太祖在長安，此又乖矣。瑀以十七年卒，太祖十八年策爲魏公，而云瑀歌舞辭稱「大魏應期運」，愈知甚妄。又其辭云「他人焉能亂」，了不成語。瑀之吐屬，必不如此。
- id: wei.21.p7.a2
  anchor: wei.21.p7
  at: 59
  length: 0
  type: pei
  text: 《典略》曰：琳作諸書及檄，草成呈太祖。太祖先苦頭風，是日疾發，卧讀琳所作，翕然而起曰：「此愈我病。」數加厚賜。太祖嘗使瑀作書與韓遂，時太祖適近出，瑀隨從，因於馬上具草，書成呈之。太祖攬筆欲有所定，而竟不能增損。
- id: wei.21.p8.h1
  anchor: wei.21.p8
  at: 5
