- id: wei.21.p40.a4
  anchor: wei.21.p40
  at: 134
  length: 0
  type: pei
  text: 《世語》曰：景王疾甚，以朝政授傅嘏，嘏不敢受。及薨，嘏祕不發喪，以景王命召文王於許昌，領公軍焉。孫盛評曰：晉宣、景、文王之相魏也，權重相承，王業基矣。豈蕞爾傅嘏所宜間厠？世語所云，斯不然矣。
- id: wei.21.p40.a5
  anchor: wei.21.p40
  at: 209
  length: 0
  type: pei
  text: 《傅子》曰：初，李豐與嘏同州，少有顯名，早歷大官，內外稱之，嘏又不善也。謂同志曰：「豐飾偽而多疑，矜小失而昧於權利，若處庸庸者可也，自任機事，遭明者必死。」豐後爲中書令，與夏侯玄俱禍，卒如嘏言。嘏自少與兾州刺史裴徽、散騎常侍荀甝善，徽、甝早亡。又與鎮北將軍何曾、司空陳泰、尚書僕射荀顗、後將軍鍾毓並善相友綜朝事，俱爲名臣。
- id: wei.21.p40.a6
  anchor: wei.21.p40
  at: 235
  length: 0
  type: pei
  text: 《晉諸公贊》曰：祗字子莊，嘏少子也。晉永嘉中至司空。祗子宣，字世弘。《世語》稱宣以公正知名，位至御史中丞。宣弟暢，字世道，祕書丞，沒在胡中。著《晉諸公贊》及晉公卿禮秩故事。
