  via: chapter_alias
- id: wei.21.p8.a1
  anchor: wei.21.p8
  at: 32
  length: 0
  type: pei
  text: 華嶠《漢書》曰：瑒祖奉，字世叔。才敏善諷誦，故世稱「應世叔讀書，五行俱下」。著《後序》十餘篇，爲世儒者。延熹中，至司隷校尉。子劭字仲遠，亦博學多識，尤好事。諸所撰述《風俗通》等，凡百餘篇，辭雖不典，世服其博聞。《續漢書》曰：劭又著《中漢輯叙》、《漢官儀》及《禮儀故事》，凡十一種，百三十六卷。朝廷制度，百官儀式，所以不亡者，由劭記之。官至泰山太守。劭弟珣，字季瑜，司空掾，即瑒之父。
- id: wei.21.p8.a2
  anchor: wei.21.p8
  at: 44
  length: 0
  type: pei
  text: 《文士傳》曰：楨父名梁，字曼山，一名恭。少有清才，以文學見貴，終於野王令。《典略》曰：文帝嘗賜楨廓落帶，其後師死，欲借取以爲像，因書嘲楨云：「夫物因人爲貴。故在賤者之手，不御至尊之側。今雖取之，勿嫌其不反也。」楨荅曰：「楨聞荊山之璞，曜元后之寶；隨侯之珠，燭衆士之好；南垠之金，登窈窕之首；鼲貂之尾，綴侍臣之幘：此四寶者，伏朽石之下，潛汙泥之中，而揚光千載之上，發彩疇昔之外，亦皆未能初自接於至尊也。夫尊者所服，卑者所脩也；貴者所御，賤者所先也。故夏屋初成而大匠先立其下，嘉禾始熟而農夫先嘗其粒。恨楨所帶，無他妙飾，若實殊異，尚可納也。」楨辭旨巧妙皆如是，由是特爲諸公子所親愛。其後太子嘗請諸文學，酒酣坐歡，命夫人甄氏出拜。坐中衆人咸伏，而楨獨平視。太祖聞之，乃收楨，減死輸作。
- id: wei.21.p9.h1
  anchor: wei.21.p9
  at: 20
  length: 2
  type: person
