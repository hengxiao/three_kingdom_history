- id: wei.21.p39.a2
  anchor: wei.21.p39
  at: 499
  length: 0
  type: pei
  text: 《漢書·張湯傳》曰：湯始爲小吏，乾沒，與長安富賈田甲、魚翁叔之屬交私。服虔説曰：「乾沒，射成敗也。」如淳曰：「得利爲乾，失利爲沒。」臣松之以虔直以乾沒爲射成敗，而不説乾沒之義，於理猶爲未暢。淳以得利爲乾，又不可了。愚謂乾讀宜爲干燥之干。蓋謂有所徼射，不計干燥之與沈沒而爲之。
