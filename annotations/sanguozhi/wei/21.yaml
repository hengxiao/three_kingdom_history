  text: 文帝
  via: chapter_alias
- id: wei.21.p9.a1
  anchor: wei.21.p9
  at: 267
  length: 0
  type: pei
  text: 《典論》曰：今之文人，魯國孔融、廣陵陳琳、山陽王粲、北海徐幹、陳留阮瑀、汝南應瑒、東平劉楨，斯七子者，於學無所遺，於辭無所假，咸自以騁騏驥於千里，仰齊足而並馳。粲長於辭賦。幹時有逸氣，然非粲匹也。如粲之初征、登樓、槐賦、征思，幹之玄猨、漏巵、圓扇、橘賦，雖張、蔡不過也，然於他文未能稱是。琳、瑀之章表書記，今之儁也。應瑒和而不壯；劉楨壯而不密。孔融體氣高妙，有過人者，然不能持論，理不勝辭，至于雜以嘲戲；及其所善，揚、班之儔也。
- id: wei.21.p10.a1
  anchor: wei.21.p10
  at: 7
  length: 0
  type: pei
  text: 《魏略》曰：淳一名笁，字子叔。博學有才章，又善蒼、雅、蟲、篆、許氏字指。初平時，從三輔客荊州。荊州內附，太祖素聞其名，召與相見，甚敬異之。時五官將博延英儒，亦宿聞淳名，因啟淳欲使在文學官屬中。會臨菑侯植亦求淳，太祖遣淳詣植。植初得淳甚喜，延入坐，不先與談。時天暑熱，植因呼常從取水自澡訖，傅粉。遂科頭拍袒，胡舞五椎鍛，跳丸擊劒，誦俳優小説數千言訖，謂淳曰：「邯鄲生何如邪？」於是乃更著衣幘，整儀容，與淳評説混元造化之端，品物區別之意，然後論皇羲以來賢聖名臣烈士優劣之差，次頌古今文章賦誄及當官政事宜所先後，又論用武行兵倚伏之勢。乃命廚宰，酒炙交至，坐席默然，無與伉者。及暮，淳歸，對其所知歎植之材，謂之「天人」。而于時世子未立。太祖俄有意於植，而淳屢稱植材。由是五官將頗不恱。及黃初初，以淳爲博士給事中。淳作投壺賦千餘言奏之，文帝以爲工，賜帛千匹。
- id: wei.21.p10.a2
  anchor: wei.21.p10
  at: 10
  length: 0
  type: pei
  text: 繁，音婆。《典略》曰：欽字休伯，以文才機辯，少得名於汝、潁。欽旣長於書記，又善爲詩賦。其所與太子書，記喉轉意，率皆巧麗。爲丞相主簿。建安二十三年卒。
- id: wei.21.p10.a3
  anchor: wei.21.p10
  at: 15
  length: 0
  type: pei
  text: 《典略》曰：粹字文蔚，少學於蔡邕。初平中，隨車駕至三輔。建安初，以高才與京兆嚴象擢拜尚書郎。像以兼有文武，出爲揚州刺史。粹後爲軍謀祭酒，與陳琳、阮瑀等典記室。及孔融有過，太祖使粹爲奏，承指數致融罪，其大略言：「融昔在北海，見王室不寧，招合徒衆，欲圖不軌，言『我大聖之後也，而滅於宋。有天下者何必卯金刀』？」又云：「融爲九列，不遵朝儀，禿巾微行，唐突宮掖。又與白衣禰衡言論放蕩，衡與融更相贊揚。衡謂融曰：『仲尼不死也。』融荅曰：『顏淵復生。』」凡説融諸如此輩，辭語甚多。融誅之後，人覩粹所作，無不嘉其才而畏其筆也。至十九年，粹轉爲祕書令，從大軍至漢中，坐違禁賤請驢伏法。太子素與粹善，聞其死，爲之歎惜。及即帝位，特用其子爲長史。魚豢曰：尋省往者，魯連、鄒陽之徒，援譬引類，以解締結，誠彼時文辯之儁也。今覽王、繁、阮、陳、路諸人前後文旨，亦何昔不若哉？其所以不論者，時世異耳。余又竊怪其不甚見用，以問大鴻臚卿韋仲將。仲將云：「仲宣傷於肥戇，休伯都無格檢，元瑜病於體弱，孔璋實自麤疏，文尉性頗忿鷙，如是彼爲，非徒以脂燭自煎糜也，其不高蹈，蓋有由矣。然君子不責備于一人，譬之朱漆，雖無楨幹，其爲光澤亦壯觀也。」
