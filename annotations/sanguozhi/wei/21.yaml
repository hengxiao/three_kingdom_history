- id: wei.21.p26.a1
  anchor: wei.21.p26
  at: 41
  length: 0
  type: pei
  text: 廙別傳曰：初，廙弟偉與諷善，廙戒之曰：「夫交友之美，在於得賢，不可不詳。而世之交者，不審擇人，務合黨衆，違先聖人交友之義，此非厚己輔仁之謂也。吾觀魏諷，不脩德行，而專以鳩合爲務，華而不實，此直攪世治名者也。卿其慎之，勿復與通。」偉不從，故及於難。
- id: wei.21.p26.a2
  anchor: wei.21.p26
  at: 132
  length: 0
  type: pei
  text: 《廙別傳》載廙表《論治道》曰：「昔者周有亂臣十人，有婦人焉，九人而已，孔子稱『才難，不其然乎』！明賢者難得也。況亂弊之後，百姓凋盡，士之存者蓋亦無幾。股肱大職，及州郡督司，邊方重任，雖備其官，亦未得人也。此非選者之不用意，蓋才匱使之然耳。況於長吏以下，羣職小任，能皆簡練備得其人也？其計莫如督之以法。不爾而數轉易，往來不已，送迎之煩，不可勝計。轉易之間，輒有姦巧，旣於其事不省，而爲政者亦以其不得乆安之故，知惠益不得成於己，而苟且之可免於患，皆將不念盡心於卹民，而夢想於聲譽，此非所以爲政之本意也。今之所以爲黜陟者，近頗以州郡之毀譽，聽往來之浮言耳。亦皆得其事實而課其能否也？長吏之所以爲佳者，奉法也，憂公也，卹民也。此三事者，或州郡有所不便，往來者有所不安。而長吏執之不已，於治雖得計，其聲譽未爲美；闕而從人，於治雖失計，其聲譽必集也。長吏皆知黜陟之在於此也，亦何能不去本而就末哉？以爲長吏皆宜使小乆，足使自展。歳課之能，三年總計，乃加黜陟。課之皆當以事，不得依名。事者，皆以戸口率其墾田之多少，及盜賊發興，民之亡叛者，爲得負之計。如此行之，則無能之吏，脩名無益；有能之人，無名無損。法之一行，雖無部司之監，姦譽妄毀，可得而盡。」事上，太祖甚善之。
