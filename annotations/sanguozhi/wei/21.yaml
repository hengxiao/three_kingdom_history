  type: pei
  text: 張璠《漢紀》曰：龔字伯宗，有高名於天下。順帝時爲太尉。初，山陽太守薛勤喪妻不哭，將殯，臨之曰：「幸不爲夭，復何恨哉？」及龔妻卒，龔與諸子並杖行服，時人或兩譏焉。暢字叔茂，名在八俊。靈帝時爲司空，以水災免，而李膺亦免歸故郡，二人以直道不容當時。天下以暢、膺爲高士，諸危言危行之徒皆推宗之，願涉其流，惟恐不及。會連有災異，而言事者皆言三公非其人，宜因其變，以暢、膺代之，則禎祥必至。由是宦豎深怨之，及膺誅死而暢遂廢，終于家。
