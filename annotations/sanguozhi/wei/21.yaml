- id: wei.21.p15.a1
  anchor: wei.21.p15
  at: 37
  length: 0
  type: pei
  text: 《魏略》曰：質字季重，以才學通博，爲五官將及諸侯所禮愛；質亦善處其兄弟之間，若前世樓君卿之游五侯矣。及河北平定，五官將爲世子，質與劉楨等並在坐席。楨坐譴之際，質出爲朝歌長，後遷元城令。其後大將軍西征，太子南在孟津小城，與質書曰：「季重無恙！途路雖局，官守有限，願言之懷，良不可任。足下所治僻左，書問致簡，益用增勞。每念昔日南皮之游，誠不可忘。旣妙思六經，逍遙百氏，彈棊間設，終以博弈，高談娛心，哀箏順耳。馳騖北塲，旅食南館，浮甘瓜於清泉，沈朱李於寒水。皦日旣沒，繼以朗月，同乘並載，以游後園，輿輪徐動，賔從無聲，清風夜起，悲笳微吟，樂往哀來，淒然傷懷。余顧而言，茲樂難常，足下之徒，咸以爲然。今果分別，各在一方。元瑜長逝，化爲異物，每一念至，何時可言？方今蕤賔紀辰，景風扇物，天氣和暖，衆果具繁。時駕而游，北遵河曲，從者鳴笳以啟路，文學託乘於後車，節同時異，物是人非，我勞如何！今遣騎到鄴，故使枉道相過。行矣，自愛！」二十三年，太子又與質書曰：「歳月易得，別來行復四年。三年不見，東山猶歎其遠，況乃過之，思何可支？雖書疏往反，未足解其勞結。昔年疾疫，親故多離其災，徐、陳、應、劉，一時俱逝，痛何可言邪！昔日游處，行則同輿，止則接席，何嘗須臾相失！每至觴酌流行，絲竹並奏，酒酣耳熱，仰而賦詩。當此之時，忽然不自知樂也。謂百年己分，長共相保，何圖數年之間，零落略盡，言之傷心。頃撰其遺文，都爲一集。觀其姓名，已爲鬼錄，追思昔游，猶在心目，而此諸子化爲糞壤，可復道哉！觀古今文人，類不護細行，鮮能以名節自立。而偉長獨懷文抱質，恬淡寡欲，有箕山之志，可謂彬彬君子矣。著《中論》二十餘篇，成一家之業，辭義典雅，足傳于後，此子爲不朽矣。德璉常斐然有述作意，才學足以著書，美志不遂，良可痛惜。間歷觀諸子之文，對之抆淚，旣痛逝者，行自念也。孔璋章表殊健，微爲繁富。公幹有逸氣，但未遒耳，至其五言詩，妙絶當時。元瑜書記翩翩，致足樂也。仲宣獨自善於辭賦，惜其體弱，不足起其文，至於所善，古人無以遠過也。昔伯牙絶絃於鍾期，仲尼覆醢於子路，愍知音之難遇，傷門人之莫逮也。諸子但爲未及古人，自一時之儁也，今之存者已不逮矣。後生可畏，來者難誣，然吾與足下不及見也。行年已長大，所懷萬端，時有所慮，至乃通夕不瞑。何時復類昔日！已成老翁，但未白頭耳。光武言『年已三十，在軍十年，所更非一』，吾德雖不及，年與之齊。以犬羊之質，服虎豹之文，無衆星之明，假日月之光，動見觀瞻，何時易邪？恐永不復得爲昔日游也。少壯真當努力，年一過往，何可攀援？古人思秉燭夜游，良有以也。頃何以自娛？頗復有所造述不？東望於邑，裁書叙心。」臣松之以本傳雖略載太子此書，美辭多被刪落，今故悉取《魏略》所述以備其文。太子即王位，又與質書曰：「南皮之游，存者三人，烈祖龍飛，或將或侯。今惟吾子，棲遲下土，從我游處，獨不及門。瓶罄罍恥，能無懷愧。路不云遠，今復相聞。」初，曹真、曹休亦與質等俱在渤海游處，時休、真亦以宗親並受爵封，出爲列將，而質故爲長史。王顧質有望，故稱二人以慰之。始質爲單家，少游遨貴戚間，蓋不與鄕里相沈浮。故雖已出官，本國猶不與之士名。及魏有天下，文帝徵質，與車駕會洛陽。到，拜北中郎將，封列侯，使持節督幽、并諸軍事，治信都。太和中，入朝。質自以不爲本郡所饒，謂司徒董昭曰：「我欲溺鄕里耳。」昭曰：「君且止，我年八十，不能老爲君溺攢也。」《世語》曰：魏王嘗出征，世子及臨菑侯植並送路側。植稱述功德，發言有章，左右屬目，王亦恱焉。世子悵然自失，呉質耳曰：「王當行，流涕可也。」及辭，世子泣而拜，王及左右咸歔欷，於是皆以植辭多華，而誠心不及也。《質別傳》曰：帝嘗召質及曹休歡會，命郭后出見質等。帝曰：「卿仰諦視之。」其至親如此。質黃初五年朝京師，詔上將軍及特進以下皆會質所，大官給供具。酒酣，質欲盡歡。時上將軍曹真性肥，中領軍朱鑠性瘦，質召優，使説肥瘦。真負貴，恥見戲，怒謂質曰：「卿欲以部曲將遇我邪？」驃騎將軍曹洪、輕車將軍王忠言：「將軍必欲使上將軍服肥，即自宜爲瘦。」真愈恚，拔刀瞋目，言：「俳敢輕脫，吾斬爾。」遂罵坐。質案劒曰：「曹子丹，汝非屠机上肉，呉質吞爾不搖喉，咀爾不搖牙，何敢恃勢驕邪？」鑠因起曰：「陛下使吾等來樂卿耳，乃至此邪！」質顧叱之曰：「朱鑠，敢壞坐！」諸將軍皆還坐。鑠性急，愈恚，還拔劒斬地。遂便罷也。及文帝崩，質思慕作詩曰：「愴愴懷殷憂，殷憂不可居。徙倚不能坐，出入步踟躕。念蒙聖主恩，榮爵與衆殊。自謂永終身，志氣甫當舒。何意中見棄，棄我歸黃壚。煢煢靡所恃，淚下如連珠。隨沒無所益，身死名不書。慷慨自僶俛，庶幾烈丈夫。」太和四年，入爲侍中。時司空陳羣錄尚書事，帝初親萬機，質以輔弼大臣，安危之本，對帝盛稱「驃騎將軍司馬懿，忠智至公，社稷之臣也。陳羣從容之士，非國相之才，處重任而不親事。」帝甚納之。明日，有切詔以督責羣，而天下以司空不如長文，即羣，言無實也。質其年夏卒。質先以怙威肆行，謚曰醜侯。質子應仍上書論枉，至正元中乃改謚威侯。應字溫舒，晉尚書。應子康，字子仲，知名於時，亦至大位。
