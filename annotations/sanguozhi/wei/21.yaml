  type: pei
  text: 儀、廙、脩事，並在〈陳思王傳〉。荀勗《文章叙錄》曰：緯字公高。少喜文學。建安中，召署軍謀掾、魏太子庶子，稍遷至散騎常侍、越騎校尉。年四十二，黃初四年卒。
- id: wei.21.p11.a1
  anchor: wei.21.p11
  at: 30
  length: 0
  type: pei
  text: 《文章叙錄》曰：璩字休璉，博學好屬文，善爲書記。文、明帝世，歷官散騎常侍。齊王即位，稍遷侍中、大將軍長史。曹爽秉政，多違法度，璩爲詩以諷焉。其言雖頗諧合，多切時要，世共傳之。復爲侍中，典著作。嘉平四年卒，追贈衞尉。貞字吉甫，少以才聞，能談論。正始中，夏侯玄盛有名勢，貞嘗在玄坐作五言詩，玄嘉玩之。舉高第，歷顯位。晉武帝爲撫軍大將軍，以貞參軍事。晉室踐阼，遷太子中庶子、散騎常侍。又以儒學與太尉荀顗撰定新禮，事未施行。泰始五年卒。貞弟純。純子紹，永嘉中爲黃門侍郎，爲司馬越所殺。純弟秀。秀子詹，鎮南大將軍、江州刺史。
- id: wei.21.p12.a1
  anchor: wei.21.p12
  at: 34
  length: 0
  type: pei
  text: 籍字嗣宗。《魏氏春秋》曰：籍曠達不羈，不拘禮俗。性至孝，居喪雖不率常檢，而毀幾至滅性。兖州刺史王昶請與相見，終日不得與言，昶歎賞之，自以不能測也。太尉蔣濟聞而辟之，後爲尚書郎、曹爽參軍，以疾歸田里。歳餘，爽誅，太傅及大將軍乃以爲從事中郎。後朝論以其名高，欲顯崇之，籍以世多故，祿仕而已，聞步兵校尉缺，廚多美酒，營人善釀酒，求爲校尉，遂縱酒昏酣，遺落世事。嘗登廣武，觀楚、漢戰處，乃歎曰：「時無英才，使豎子成名乎！」時率意獨駕，不由徑路，車迹所窮，輒慟哭而反。籍少時嘗遊蘇門山，蘇門山有隱者，莫知名姓，有竹實數斛、臼杵而已。籍從之，與談太古無爲之道，及論五帝三王之義，蘇門生蕭然曾不經聽。籍乃對之長嘯，清韻響亮，蘇門生逌爾而笑。籍旣降，蘇門生亦嘯，若鸞鳳之音焉。至是，籍乃假蘇門先生之論以寄所懷。其歌曰：「日沒不周西，月出丹淵中，陽精蔽不見，陰光代爲雄。亭亭在須臾，厭厭將復隆。富貴俯仰間，貧賤何必終。」又歎曰：「天地解兮六合開，星辰隕兮日月頹，我騰而上將何懷？」籍口不論人過，而自然高邁，故爲禮法之士何曾等深所讎疾。大將軍司馬文王常保持之，卒以壽終。子渾字長成。《世語》曰：渾以閑澹寡欲，知名京邑。爲太子庶子。早卒。
- id: wei.21.p13.a1
  anchor: wei.21.p13
  at: 34
  length: 0
  type: pei
  text: 康字叔夜。案〈嵇氏譜〉：康父昭，字子遠，督軍糧治書侍御史。兄喜，字公穆，晉揚州刺史、宗正。喜爲康傳曰：「家世儒學，少有儁才，曠邁不羣，高亮任性，不脩名譽，寬簡有大量。學不師授，博洽多聞，長而好老、莊之業，恬靜無欲。性好服食，嘗採御上藥。善屬文論，彈琴詠詩，自足于懷抱之中。以爲神仙者，禀之自然，非積學所致。至於導養得理，以盡性命，若安期、彭祖之倫，可以善求而得也；著養生篇。知自厚者所以喪其所生，其求益者必失其性，超然獨達，遂放世事，縱意於塵埃之表。撰錄上古以來聖賢、隱逸、遁心、遺名者，集爲傳贊，自混沌至于管寧，凡百一十有九人，蓋求之於宇宙之內，而發之乎千載之外者矣。故世人莫得而名焉。」虞預《晉書》曰：康家本姓奚，會稽人。先自會稽遷于譙之銍縣，改爲嵇氏，取嵇字之上山以爲姓，蓋以志其本也。一曰銍有嵇山，家于其側，遂氏焉。《魏氏春秋》曰：康寓居河內之山陽縣，與之游者，未嘗見其喜慍之色。與陳留阮籍、河內山濤、河南向秀、籍兄子咸、琅邪王戎、沛人劉伶相與友善，遊於竹林，號爲七賢。鍾會爲大將軍所昵，聞康名而造之。會，名公子，以才能貴幸，乘肥衣輕，賔從如雲。康方箕踞而鍛，會至，不爲之禮。康問會曰：「何所聞而來？何所見而去？」會曰：「有所聞而來，有所見而去。」會深銜之。大將軍嘗欲辟康。康旣有絶世之言，又從子不善，避之河東，或云避世。及山濤爲選曹郎，舉康自代，康荅書拒絶，因自説不堪流俗，而非薄湯、武。大將軍聞而怒焉。初，康與東平呂昭子巽及巽弟安親善。會巽淫安妻徐氏，而誣安不孝，囚之。安引康爲證，康義不負心，保明其事，安亦至烈，有濟世志力。鍾會勸大將軍因此除之，遂殺安及康。康臨刑自若，援琴而鼓，旣而歎曰：「雅音於是絶矣！」時人莫不哀之。初，康採藥於汲郡共北山中，見隱者孫登。康欲與之言，登默然不對。踰時將去，康曰：「先生竟無言乎？」登乃曰：「子才多識寡，難乎免於今之世。」及遭呂安事，爲詩自責曰：「欲寡其過，謗議沸騰。性不傷物，頻致怨憎。昔慙柳下。今愧孫登。內負宿心，外赧良朋。」康所著諸文論六七萬言，皆爲世所玩詠。康別傳云：孫登謂康曰：「君性烈而才儁，其能免乎？」稱康臨終之言曰：「袁孝尼嘗從吾學廣陵散，吾每固之不與。廣陵散於今絶矣！」與盛所記不同。又《晉陽秋》云：康見孫登，登對之長嘯，踰時不言。康辭還，曰：「先生竟無言乎？」登曰：「惜哉！」此二書皆孫盛所述，而自爲殊異如此。康集目錄曰：登字公和，不知何許人，無家屬，於汲縣北山土窟中得之。夏則編草爲裳，冬則被髮自覆。好讀易鼓琴，見者皆親樂之。每所止家，輒給其衣服食飲，得無辭讓。《世語》曰：毌丘儉反，康有力，且欲起兵應之，以問山濤，濤曰：「不可。」儉亦已敗。臣松之案本傳云康以景元中坐事誅，而干寶、孫盛、習鑿齒諸書，皆云正元二年，司馬文王反自樂嘉，殺嵇康、呂安。蓋緣《世語》云康欲舉兵應毌丘儉，故謂破儉便應殺康也。其實不然。山濤爲選官，欲舉康自代，康書告絶，事之明審者也。案濤行狀，濤始以景元二年除吏部郎耳。景元與正元相覺七八年，以濤行狀檢之，如本傳爲審。又〈鍾會傳〉亦云會作司隷校尉時誅康；會作司隷，景元中也。干寶云呂安兄巽善於鍾會，巽爲相國掾，俱有寵於司馬文王，故遂抵安罪。尋文王以景元四年鍾、鄧平蜀後，始授相國位；若巽爲相國掾時陷安，焉得以破毌丘儉年殺嵇、呂？此又干寶疏謬，自相違伐也。康子紹，字延祖，少知名。山濤啟以爲祕書郎，稱紹平簡溫敏，有文思，又曉音，當成濟者。帝曰：「紹如此，便可以爲丞，不足復爲郎也。」遂歷顯位。《晉諸公贊》曰：紹與山濤子簡、弘農楊準同好友善，而紹最有忠正之情。以侍中從惠帝北伐成都王，王師敗績，百官奔走，惟紹獨以身扞衞，遂死於帝側。故累見襃崇，追贈太尉，謚曰忠穆公。
