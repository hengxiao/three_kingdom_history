  type: pei
  text: 《傅子》曰：嘏祖父睿，代郡太守。父充，黃門侍郎。
- id: wei.21.p36.a2
  anchor: wei.21.p36
  at: 38
  length: 0
  type: pei
  text: 《傅子》曰：是時何晏以材辯顯於貴戚之間，鄧颺好變通，合徒黨，鬻聲名於閭閻，而夏侯玄以貴臣子少有重名，爲之宗主，求交於嘏而不納也。嘏友人荀粲，有清識遠心，然猶怪之。謂嘏曰：「夏侯泰初一時之傑，虛心交子，合則好成，不合則怨至。二賢不睦，非國之利，此藺相如所以下廉頗也。」嘏荅之曰：「泰初志大其量，能合虛聲而無實才。何平叔言遠而情近，好辯而無誠，所謂利口覆邦國之人也。鄧玄茂有爲而無終，外要名利，內無關鑰，貴同惡異，多言而妬前；多言多釁，妬前無親。以吾觀此三人，皆敗德也。遠之猶恐禍及，況昵之乎？」
