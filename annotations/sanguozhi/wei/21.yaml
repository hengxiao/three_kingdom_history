- id: wei.21.p21.a1
  anchor: wei.21.p21
  at: 48
  length: 0
  type: pei
  text: 《文章志》曰：勗字元茂，初名芝，改名勗，後避諱。或曰勗獻帝時爲尚書郎，遷右丞。詔以勗前在二千石曹，才敏兼通，明習舊事，勑并領本職，數加特賜。二十年，遷東海相。未發，留拜尚書左丞。其年病卒，時年五十餘。魏公九錫策命，勗所作也。勗子滿，平原太守，亦以學行稱。滿子尼，字正叔。尼別傳曰：尼少有清才，文辭溫雅。初應州辟，後以父老歸供養。居家十餘年，父終，晚乃出仕。尼嘗贈陸機詩，機荅之，其四句曰：「猗歟潘生，世篤其藻，仰儀前文，丕隆祖考。」位終太常。尼從父岳，字安仁。岳別傳曰：岳美姿容，夙以才穎發名。其所著述，清綺絶倫。爲黃門侍郎，爲孫秀所殺。尼、岳文翰，並見重於世。尼從子滔，字湯仲。晉諸公贊：滔以博學才量爲名。永嘉末，爲河南尹，遇害。
