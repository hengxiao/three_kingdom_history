- id: wei.21.p17.a1
  anchor: wei.21.p17
  at: 0
  length: 0
  type: pei
  text: 《魏書》曰：初，漢朝遷移，臺閣舊事散亂。自都許之後，漸有綱紀，覬以古義多所正定。是時關西諸將，外雖懷附，內未可信。司隷校尉鍾繇求以三千兵入關，外託討張魯，內以脅取質任。太祖使荀彧問覬，覬以爲「西方諸將，皆豎夫屈起，無雄天下意，苟安樂目前而已。今國家厚加爵號，得其所志，非有大故，不憂爲變也。宜爲後圖。若以兵入關中，當討張魯，魯在深山，道徑不通，彼必疑之；一相驚動，地險衆彊，殆難爲慮！」彧以覬議呈太祖。太祖初善之，而以繇自典其任，遂從繇議。兵始進而關右大叛，太祖自親征，僅乃平之，死者萬計。太祖悔不從覬議，由是益重覬。
