  type: pei
  text: 《傅子》曰：河南尹內掌帝都，外統京畿，兼古六鄕六遂之士。其民異方雜居，多豪門大族，商賈胡貊，天下四方會利之所聚，而姦之所生。前尹司馬芝，舉其綱而太簡，次尹劉靜，綜其目而太密，後尹李勝，毀常法以收一時之聲。嘏立司馬氏之綱統，裁劉氏之綱目以經緯之，李氏所毀以漸補之。郡有七百吏，半非舊也。河南俗黨五官掾功曹典選職，皆授其本國人，無用異邦人者，嘏各舉其良而對用之，官曹分職，而後以次考核之。其治以德教爲本，然持法有恒，簡而不可犯，見理識情，獄訟不加檟楚而得其實。不爲小惠，有所薦達及大有益於民事，皆隱其端迹，若不由己出。故當時無赫赫之名，吏民乆而後安之。
