  type: pei
  text: 《文士傳》載粲説琮曰：「僕有愚計，願進之於將軍，可乎？」琮曰：「吾所願聞也。」粲曰：「天下大亂，豪傑並起，在倉卒之際，彊弱未分，故人各各有心耳。當此之時，家家欲爲帝王，人人欲爲公侯。觀古今之成敗，能先見事機者，則恒受其福。今將軍自度，何如曹公邪？」琮不能對。粲復曰：「如粲所聞，曹公故人傑也。雄略冠時，智謀出世，摧袁氏於官渡，驅孫權於江外，逐劉備於隴右，破烏丸於白登，其餘梟夷蕩定者，往往如神，不可勝計。今日之事，去就可知也。將軍能聽粲計，卷甲倒戈，應天順命，以歸曹公，曹公必重德將軍。保己全宗，長享福祚，垂之後嗣，此萬全之策也。粲遭亂流離，託命此州，蒙將軍父子重顧，敢不盡言！」琮納其言。臣松之案：孫權自此以前，尚與中國和同，未嘗交兵，何云「驅權於江外」乎？魏武以十三年征荊州，劉備却後數年方入蜀，備身未嘗涉於關、隴。而於征荊州之年，便云逐備於隴右，旣已乖錯；又白登在平城，亦魏武所不經，北征烏丸，與白登永不相豫。以此知張隲假偽之辭，而不覺其虛之自露也。凡隲虛偽妄作，不可覆疏，如此類者，不可勝紀。
