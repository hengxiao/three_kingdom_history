- id: wei.21.p33.a1
  anchor: wei.21.p33
  at: 26
  length: 0
  type: pei
  text: 《先賢行狀》曰：繆斐字文雅。該覽經傳，事親色養。徵博士，六辟公府。漢帝在長安，公卿博舉名儒。時舉斐任侍中，並無所就。即襲父也。文章志曰：襲字熈伯。辟御史大夫府，歷事魏四世。正始六年，年六十卒。子恱字孔懌，晉光祿大夫。襲孫紹、播、徵、胤等，並皆顯達。
- id: wei.21.p34.a1
  anchor: wei.21.p34
  at: 29
  length: 0
  type: pei
  text: 襲撰統《昌言表》，稱統字公理，少好學，博涉書記，贍於文辭。年二十餘，游學青、徐、并、兾之閒，與交者多異之。并州刺史高幹素貴有名，招致四方游士，多歸焉。統過幹，幹善待遇之，訪以世事。統謂幹曰：「君有雄志而無雄才，好士而不能擇人，所以爲君深戒也。」幹雅自多，不納統言。統去之，無幾而幹敗。并、兾之士以是識統。大司農常林與統共在上黨，爲臣道統性倜儻，敢直言，不矜小節，每列郡命召，輒稱疾不就。默語無常，時人或謂之狂。漢帝在許，尚書令荀彧領典樞機，好士愛奇，聞統名，啟召以爲尚書郎。後參太祖軍事，復還爲郎。延康元年卒，時年四十餘。統每論説古今世俗行事，發憤歎息，輒以爲論，名曰《昌言》，凡二十四篇。
- id: wei.21.p35.a1
  anchor: wei.21.p35
  at: 9
  length: 0
  type: pei
  text: 《魏略》曰：林字孝友，博學，多通古今寄指，凡諸書傳文間危疑，林皆釋之。建安中，爲五官將文學，甚見禮待。黃初中，爲博士給事中。文帝作《典論》所稱蘇林者是也。以老歸第，國家每遣人就問之，數加賜遺。年八十餘卒。
- id: wei.21.p35.a2
  anchor: wei.21.p35
  at: 18
  length: 0
  type: pei
  text: 《文章叙錄》曰：誕字仲將，太僕端之子。有文才，善屬辭章。建安中，爲郡上計吏，特拜郎中，稍遷侍中中書監，以光祿大夫遜位，年七十五卒於家。初，邯鄲淳、衞覬及誕並善書，有名。覬孫恒撰《四體書勢》，其序古文曰：「自秦用篆書，焚燒先典，而古文絶矣。漢武帝時，魯恭王壞孔子宅，得《尚書》、《春秋》、《論語》、《孝經》，時人已不復知有古文，謂之「科斗書」，漢世祕藏，希得見之。魏初傳古文者，出於邯鄲淳。敬侯寫淳《尚書》，後以示淳，而淳不別。至正始中，立三字石經，轉失淳法。因科斗之名，遂效其法。太康元年，汲縣民盜發魏襄王冢，得策書十餘萬言。案敬侯所書，猶有髣髴。」敬侯謂覬也。其序篆書曰：「秦時李斯號爲工篆，諸山及銅人銘皆斯書也。漢建初中，扶風曹喜少異於斯而亦稱善。邯鄲淳師焉，略究其妙。韋誕師淳而不及也。太和中，誕爲武都太守，以能書留補侍中，魏氏寶器銘題皆誕書云。漢末又有蔡邕采斯、喜之法，爲古今雜形，然精密簡理不如淳也。」其序錄隷書，已略見《武紀》。又曰：「師宜官爲大字，邯鄲淳爲小字。梁鵠謂淳得次仲法，然鵠之用筆盡其勢矣。」其序草書曰：「漢興而有草書，不知作者姓名。至章帝時，齊相杜度號善作篇，後有崔瑗、崔寔亦皆稱工。杜氏然字甚安而書體微瘦，崔氏甚得筆勢而結字小疏。弘農張伯英者因而而轉精其巧。凡家之衣帛，必書而後練之，臨池學書，池水盡黑。下筆必爲楷則，號『怱怱不暇草』，寸紙不見遺，至今世人尤寶之，韋仲將謂之草聖。伯英弟文舒者，次伯英。又有姜孟潁、梁孔達、田彥和及韋仲將之徒，皆伯英弟子，有名於世，然殊不及文舒也。」
- id: wei.21.p35.a3
  anchor: wei.21.p35
  at: 28
  length: 0
  type: pei
  text: 惠，淵子。事在〈淵傳〉。
- id: wei.21.p35.a4
  anchor: wei.21.p35
  at: 37
  length: 0
  type: pei
  text: 《文章叙錄》曰：該字公達。彊志好學。年二十，上計掾，召爲郎中。著《魏書》。遷博士司徒右長史，復還入著作。景元二年卒官。
- id: wei.21.p35.a5
  anchor: wei.21.p35
  at: 55
  length: 0
  type: pei
  text: 《文章叙錄》曰：摯字德魯。初上笳賦，署司徒軍謀吏。後舉孝廉，除郎中，轉補校書。摯與毌丘儉鄕里相親，故爲詩與儉，求仙人藥一丸，欲以感切儉求助也。其詩曰：「騏驥馬不試，婆娑槽櫪間。壯士志未伸，坎軻多辛酸。伊摯爲媵臣，呂望身操竿；夷吾困商販，寗戚對牛歎；食其處監門，淮陰飢不餐；買臣老負薪，妻畔呼不還，釋之宦十年，位不增故官。才非八子倫，而與齊其患。無知不在此，袁盎未有言。被此篤病乆，榮衞動不安，聞有韓衆藥，信來給一丸。」儉荅曰：「鳳鳥翔京邑，哀鳴有所思。才爲聖世出，德音何不怡！八子未遭遇，今者遘明時。胡康出壟畒，楊偉無根基，飛騰沖雲天，奮迅協光熙。駿驥骨法異，伯樂觀知之，但當養羽翮，鴻舉必有期。體無纖微疾，安用問良醫？聯翩輕栖集，還爲燕雀嗤。韓衆藥雖良，或更不能治。悠悠千里情，薄言荅嘉詩。信心感諸中，中實不在辭。」摯竟不得遷，卒于祕書。廬江何氏〈家傳〉曰：明帝時，有譙人胡康，年十五，以異才見送，又陳損益，求試劇縣。詔特引見。衆論翕然，號爲神童。詔付祕書，使博覽典籍。帝以問祕書丞何禎：「康才何如？」禎荅曰：「康雖有才，性質不端，必有負敗。」後果以過見譴。臣松之案：魏朝自微而顯者，不聞胡康；疑是孟康。康事見〈杜恕傳〉。楊偉見〈曹爽傳〉。
