- id: wei.21.p21.a3
  anchor: wei.21.p21
  at: 92
  length: 0
  type: pei
  text: 《晉陽秋》曰：瓘字伯玉。清貞有名理，少爲傅嘏所知。弱冠爲尚書郎，遂歷位內外，爲晉尚書令、司空、太保。惠帝初輔政，爲楚王瑋所害。《世語》曰：瓘與扶風內史燉煌索靖，並善草書。瓘子恒，字巨山，黃門侍郎。恒子玠，字叔寶，有盛名，爲太子洗馬，早卒。
