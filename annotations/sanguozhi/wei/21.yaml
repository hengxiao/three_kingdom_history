  type: pei
  text: 《漢晉春秋》曰曰：嘏固勸景王行，景王未從。嘏重言曰：「淮、楚兵勁，而儉等負力遠鬬，其鋒未易當也。若諸將戰有利鈍，大勢一失，則公事敗矣。」是時景王新割目瘤，創甚，聞嘏言，蹶然而起曰：「我請輿疾而東。」
