- id: wei.21.p22.a1
  anchor: wei.21.p22
  at: 123
  length: 0
  type: pei
  text: 劉向《新序》曰：趙簡子欲專天下，謂其相曰：「趙有犢犨，晉有鐸鳴，魯有孔丘，吾殺三人者，天下可王也。」於是乃召犢犨、鐸鳴而問政焉，已即殺之。使使者聘孔子於魯，以胖牛肉迎於河上。使者謂船人曰：「孔子即上船，中河必流而殺之。」孔子至，使者致命，進胖牛之肉。孔子仰天而歎曰：「美哉水乎，洋洋乎，使丘不濟此水者，命也夫！」子路趨而進曰：「敢問何謂也？」孔子曰：「夫犢犨、鐸鳴，晉國之賢大夫也，趙簡子未得意之時，須而後從政，及其得意也，殺之。黃龍不反于涸澤，鳳皇不離其罻羅。故刳胎焚林，則麒麟不臻；覆巢破卵，則鳳皇不翔；竭澤而漁，則龜龍不見。鳥獸之於不仁，猶知避之，況丘乎？故虎嘯而谷風起，龍興而景雲見，擊庭鍾於外，而黃鍾應於內。夫物類之相感，精神之相應，若響之應聲，影之象形，故君子違傷其類者。今彼已殺吾類矣，何爲之此乎？」於是遂回車，不渡而還。
- id: wei.21.p22.a2
  anchor: wei.21.p22
  at: 179
  length: 0
  type: pei
  text: 《廙別傳》載廙道路爲牋謝劉表曰：「考匊過蒙分遇榮授之顯，未有管、狐、桓、文之烈，孤德隕命，精誠不遂。兄望之見禮在昔，旣無堂構昭前之績，中規不密，用墜禍辟。斯乃明神弗祐，天降之災。悔吝之負，哀號靡及。廙之愚淺，言行多違，懼有浸潤三至之間。考匊之愛已衰，望之之責猶存，必傷天慈旣往之分，門戸殪滅，取笑明哲。是用迸竄，永涉川路，即日到廬江尋陽。昔鍾儀有南音之操，椒舉有班荊之思，雖遠猶邇，敢忘前施？」《傅子》曰：表旣殺望之，荊州士人皆自危也。夫表之本心，於望之不輕也，以直迕情，而讒言得入者，以無容直之度也。據全楚之地，不能以成功者，未必不由此也。夷、叔迕武王以成名，丁公順高祖以受戮，二主之度遠也。若不遠其度，惟褊心是從，難乎以容民畜衆矣。
