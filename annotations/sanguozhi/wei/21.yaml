- id: wei.21.p40.a1
  anchor: wei.21.p40
  at: 15
  length: 0
  type: pei
  text: 《傅子》曰：嘏旣達治好正，而有清理識要，好論才性，原本精微，尠能及之。司隷校尉鍾會年甚少，嘏以明智交會。臣松之案：傅子前云嘏了夏侯之必敗，不與之交，而此云與鍾會善。愚以爲夏侯玄以名重致患，釁由外至；鍾會以利動取敗，禍自己出。然則夏侯之危兆難覩，而鍾氏之敗形易照也。嘏若了夏侯之必危，而不見鍾會之將敗，則爲識有所蔽，難以言通；若皆知其不終，而情有彼此，是爲厚薄由于愛憎，奚豫於成敗哉？以愛憎爲厚薄，又虧於雅體矣。傅子此論，非所以益嘏也。
