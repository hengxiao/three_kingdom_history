  length: 0
  type: pei
  text: 《魏略》曰：緝字敬仲，太和中為溫令，名有治能。會諸葛亮出，緝上便宜，詔以問中書令孫資，資以為有籌略，遂召拜騎都尉，遣參征蜀軍。軍罷，入為尚書郎，以稱職為明帝所識。帝以為緝之材能，多所堪任，試呼相工相之。相者云：「不過二千石。」帝曰：「何材如是而位止二千石乎？」及在東莞，領兵數千人。緝性吝於財而矜於勢，一旦以女徵去郡，還坐里舍，悒悒躁擾。數為國家陳擊吳、蜀形勢，又嘗對司馬大將軍料諸葛恪雖得勝於邊土，見誅不乆。大將軍問其故，緝云：「威震其主，功蓋一國，欲不死可得乎？」及恪從合肥還，吳果殺之。大將軍聞恪死，謂衆人曰：「諸葛恪多輩耳！近張敬仲縣論恪，以為必見殺，今果然如此。敬仲之智為勝恪也。」緝與李豐通家，又居相側近。豐時取急出，子藐往見之，有所咨道。豐被收，事與緝連，遂收送廷尉，賜死獄中，其諸子皆並誅。緝孫殷，晉永興中為梁州刺史，見《晉書》。
