  text: 《魏略》曰：建字公威，少與諸葛亮俱游學。亮後出祁山，答司馬宣王書，使杜子绪宣意於公威也。
- id: wei.15.p27.a1
  anchor: wei.15.p27
  at: 50
  length: 0
  type: pei
  text: 《魏略》曰：逵世爲著姓，少孤家贫，冬常無袴，过其妻兄柳孚宿，其明無何，著孚袴去，故時人謂之通健。
- id: wei.15.p27.a2
  anchor: wei.15.p27
  at: 207
  length: 0
  type: pei
  text: 《魏略》曰：援捕得逵，逵不肯拜，謂援曰：「王府君臨郡積年，不知足下曷爲者也？」援怒曰：「促斬之。」諸將覆護，乃囚於壶關，闭著土窖中，以车轮盖上，使人固守。方將杀之，逵從窖中謂守者曰：「此間無健兒邪，而當使義士死此中乎？」時有祝公道者，與逵非故人，而適聞其言，怜其守正危厄，乃夜盗往引出，折械遣去，不语其姓名。
- id: wei.15.p27.a3
  anchor: wei.15.p27
  at: 299
  length: 0
  type: pei
  text: 《孫资别傳》曰：资舉河東计吏，到许，荐於相府曰：「逵在绛邑，帅厉吏民，與贼郭援交戰，力尽而敗，爲贼所俘，挺然直志，颜辭不屈；忠言聞於大眾，烈节显於當時，雖古之直发、据鼎，罔以加也。其才兼文武，誠時之利用。」魏略曰：郭援破後，逵乃知前出己者爲祝公道。公道，河南人也。後坐他事，當伏法。逵救之，力不能解，爲之改服焉。
- id: wei.15.p28.a1
  anchor: wei.15.p28
  at: 248
  length: 0
  type: pei
  text: 《魏略》曰：太祖欲征吳而大霖雨，三軍多不原行。太祖知其然，恐外有谏者，教曰：「今孤戒严，未知所之，有谏者死。」逵受教，謂其同寮三主簿曰：「今實不可出，而教如此，不可不谏也。」乃建谏草以示三人，三人不获已，皆署名，入白事。太祖怒，收逵等。當送狱，取造意者，逵即言「我造意」，遂走詣狱。狱吏以逵主簿也，不即著械。謂狱吏曰：「促械我。尊者且疑我在近职，求缓於卿，今將遣人来察我。」逵著械適讫，而太祖果遣家中人就狱视逵。既而教曰：「逵無恶意，原復其职。」始，逵爲諸生，略览大義，取其可用。最好春秋左傳，及爲牧守，常自课读之，月常一遍。逵前在弘农，與典农校尉爭公事，不得理，乃发愤生瘿，後所病稍大，自启原欲令医割之。太祖惜逵忠，恐其不活，教「謝主簿，吾聞『十人割瘿九人死』」。逵猶行其意，而瘿愈大。逵本名衢，後改爲逵。
- id: wei.15.p28.a2
  anchor: wei.15.p28
  at: 325
  length: 0
  type: pei
  text: 《魏略》曰：時太子在鄴，鄢陵侯未到，士民颇苦劳役，又有疾疠，於是軍中骚動。羣寮恐天下有變，欲不发丧。逵建議爲不可秘，乃发哀，令内外皆入临，临讫，各安叙不得動。而青州軍擅击鼓相引去。眾人以爲宜禁止之，不從者讨之。逵以爲「方大丧在殡，嗣王未立，宜因而抚之」。乃爲作長檄，告所在给其廪食。
- id: wei.15.p29.a1
  anchor: wei.15.p29
  at: 36
  length: 0
  type: pei
  text: 《魏略》曰：初，魏郡官屬颇以公事期會有所急切，會聞逵當爲郡，舉府皆詣縣門外。及遷書到，逵出門，而郡官屬悉當門，謁逵於车下。逵抵掌曰：「詣治所，何宜如是！」
- id: wei.15.p29.a2
  anchor: wei.15.p29
  at: 109
  length: 0
  type: pei
  text: 《魏略》曰：逵爲豫州。逵進曰：「臣守天門，出入六年，天門始開，而臣在外。唯殿下爲兆民计，無违天人之望。」
