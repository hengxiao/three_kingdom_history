  text: 魏略曰：鲜卑大人育延，常爲州所畏，而一旦將其部落五千餘骑詣習，求互市。習念不听則恐其怨，若听到州下，又恐爲所略，於是乃许之往與會空城中交市。遂敕郡縣，自將治中以下軍往就之。市易未毕，市吏收缚一胡。延骑皆惊，上馬弯弓圍習數重，吏民惶怖不知所施。習乃徐呼市吏，問缚胡意，而胡實侵犯人。習乃使译呼延，延到，習责延曰：「汝胡自犯法，吏不侵汝，汝何爲使諸骑惊駭邪？」遂斩之，餘胡破胆不敢動。是後無寇虏。至二十二年，太祖拔漢中，諸軍還到長安，因留骑督太原乌丸王鲁昔，使屯池陽，以備卢水。昔有愛妻，住在晉陽。昔既思之，又恐遂不得歸，乃以其部五百骑叛還并州，留其餘骑置山谷間，而单骑独入晉陽，盗取其妻。已出城，州郡乃觉；吏民又畏昔善射，不敢追。習乃令從事張景，募鲜卑使逐昔。昔馬負其妻，重骑行迟，未及與其眾合，而爲鲜卑所射死。始太祖聞昔叛，恐其爲亂於北邊；會聞已杀之，大喜，以習前後有策略，封爲關内侯。
