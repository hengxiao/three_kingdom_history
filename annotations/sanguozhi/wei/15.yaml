  type: pei
  text: 《魏略》曰：休怨逵進迟，乃呵责逵，遂使主者敕豫州刺史往拾棄仗。逵恃心直，謂休曰：「本爲國家作豫州刺史，不来相爲拾棄仗也。」乃引軍還。遂與休更相表奏，朝廷雖知逵直，猶以休爲宗室任重，两無所非也。魏書云：休猶挟前意，欲以後期罪逵，逵終無言，時人益以此多逵。習凿齒曰：夫賢人者，外身虚己，内以下物，嫌忌之名，何由而生乎？有嫌忌之名者，必與物爲對，存胜負於己身者也。若以其私憾敗國殄民，彼雖倾覆，於我何利？我苟無利，乘之曷爲？以是稱说，臧获之心耳。今忍其私忿而急彼之憂，冒難犯危而免之於害，使功显於明君，惠施於百姓，身登於君子之涂，義愧於敌人之心，雖豺虎猶將不觉所復，而况於曹休乎？然則济彼之危，所以成我之胜，不计宿憾，所以服彼之心，公義既成，私利亦弘，可謂善爭矣。在於未能忘胜之流，不由於此而能济胜者，未之有也。
