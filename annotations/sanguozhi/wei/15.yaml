- id: wei.15.p14.a1
  anchor: wei.15.p14
  at: 101
  length: 0
  type: pei
  text: 臣松之以爲習與王思，同寮而已，親非骨肉，義非刎颈，而以身代思，受不测之祸。以之爲義，無乃乖先哲之雅旨乎！史遷云「死有重於太山，有轻於鸿毛」，故君子不爲苟存，不爲苟亡。若使思不引分，主不加恕，則所謂自經於沟渎而莫之知也。習之死義者，豈其然哉！
- id: wei.15.p14.a2
  anchor: wei.15.p14
  at: 135
  length: 0
  type: pei
  text: 《魏略苛吏傳》曰：思與薛悌、郤嘉俱從微起，官位略等。三人中，悌差挟儒术，所在名爲間省。嘉與思事行相似。文帝詔曰：「薛悌驳吏，王思、郤嘉纯吏也，各赐關内侯，以报其勤。」思爲人雖烦碎，而晓练文書，敬賢礼士，倾意形勢，亦以是显名。正始中，爲大司农，年老目瞑，瞋怒無度，下吏嗷然不知何据。性少信，時有吏父病笃，近在外舍，自白求假。思疑其不實，发怒曰：「世有思妇病母者，豈此謂乎！」遂不與假。吏父明日死，思無恨意。其爲刻薄类如此。思又性急，尝執笔作書，蝇集笔端，驱去復来，如是再三。思恚怒，自起逐蝇不能得，還取笔掷地，蹋坏之。時有丹陽施畏、鲁郡倪顗、南陽胡業亦爲刺史、郡守，時人謂之苛暴。◎又有高陽刘类，歷位宰守，苛慝尤其，以善修人事，不废於世。嘉平中，爲弘农太守。吏二百餘人，不與休假，专使爲不急。过無轻重，辄捽其头，又亂杖挝之，牵出復入，如是數四。乃使人掘地求钱，所在市里，皆有孔穴。又外讬简省，每出行，陽敕督邮不得使官屬曲修礼敬，而阴识不来者，辄发怒中伤之。性又少信，每遣大吏出，辄使小吏随覆察之，白日常自於墙壁間闚闪，夜使幹廉察諸曹，復以幹不足信，又遣铃下及奴婢使轉相检验。尝案行，宿止民家。民家二狗逐猪，猪惊走，头插栅間，号呼良久。类以爲外之吏擅共饮食，不復徵察，便使伍百曳五官掾孫弼入，顿头责之。弼以實對，类自愧不详，因讬問以他事。民尹昌，年垂百歲，聞类出行，當經过，謂其兒曰：「扶我迎府君，我欲陳恩。」兒扶昌在道左，类望見，呵其兒曰：「用是死人，使来見我。」其视人無礼，皆此类也。舊俗，民谤官長者有三不肯，謂遷、免與死也。类在弘农，吏民患之，乃题其門曰：「刘府君有三不肯。」类雖聞之，猶不能自改。其後安東將軍司馬文王西征，路經弘农，弘农人告类荒耄不任宰郡，乃召入爲五官中郎將。
- id: wei.15.p16.a1
  anchor: wei.15.p16
  at: 0
  length: 0
  type: pei
  text: 《魏略》曰：旣世單家富，為人有容儀。少小工書疏，為郡門下小吏，而家富。自惟門寒，念無以自達，乃常畜好刀筆及版奏，伺諸大吏有乏者輒給與，以是見識焉。
- id: wei.15.p18.a1
  anchor: wei.15.p18
  at: 152
  length: 0
  type: pei
  text: 《三輔決錄注》曰：旣為兒童，為郡功曹游殷察異之，引旣過家，旣敬諾。殷先歸，勑家具設賔饌。及旣至，殷妻笑曰：「君其悖乎！張德容童昏小兒，何異客哉！」殷曰：「卿勿怪，乃方伯之器也。」殷遂與旣論霸王之略。饗訖，以子楚託之；旣謙不受，殷固託之，旣以殷邦之宿望，難違其旨，乃許之。殷先與司隷校尉胡軫有隙，軫誣搆殺殷。殷死月餘，軫得疾患，自說但言「伏罪，伏罪，游功曹將鬼來」。於是遂死。于時關中稱曰：「生有知人之明，死有貴神之靈。」子楚字仲允，為蒲阪令。太祖定關中時，漢興郡缺，太祖以問旣，旣稱楚才兼文武，遂以為漢興太守。後轉隴西。《魏略》曰：楚為人慷慨，歷位宰守，所在以恩德為治，不好刑殺。太和中，諸葛亮出隴右，吏民騷動。天水、南安太守各棄郡東下，楚獨據隴西，召會吏民，謂之曰：「太守無恩德。今蜀兵至，諸郡吏民皆已應之，此亦諸卿富貴之秋也。太守本為國家守郡，義在必死，卿諸人便可取太守頭持往。」吏民皆涕淚，言「死生當與明府同，無有二心」。楚復言：「卿曹若不願，我為卿畫一計。今東二郡已去，必將寇來，但可共堅守。若國家救到，寇必去，是為一郡守義，人人獲爵寵也。若官救不到，蜀攻日急，爾乃取太守以降，未為晚也。」吏民遂城守。而南安果將蜀兵，就攻隴西。楚聞賊到，乃遣長史馬顒出門設陣，而自於城上曉謂蜀帥，言：「卿能斷隴，使東兵不上，一月之中，則隴西吏人不攻自服；卿若不能，虛自疲弊耳。」使顒鳴鼓擊之，蜀人乃去。後十餘日，諸軍上隴，諸葛亮破走。南安、天水皆坐應亮破滅，兩郡守各獲重刑，而楚以功封列侯，長史掾屬皆賜拜。帝嘉其治，詔特聽朝，引上殿。楚為人短小而大聲，自為吏，初不朝覲，被詔登階，不知儀式。帝令侍中贊引，呼「隴西太守前」，楚當言「唯」，而大應稱「諾」。帝顧之而笑，遂勞勉之。罷會，自表乞留宿衞，拜駙馬都尉。楚不學問，而性好遊遨音樂。乃畜歌者，琵琶、箏、簫，每行來將以自隨。所在樗蒲、投壺，歡欣自娛。數歲，復出為北地太守，年七十餘卒。
- id: wei.15.p19.a1
  anchor: wei.15.p19
  at: 660
  length: 0
  type: pei
  text: 《魏略》曰：成公英，金城人也。中平末，隨韓約為腹心。建安中，約從華陰破走，還湟中，部黨散去，唯英獨從。《典略》曰：韓遂在湟中，其壻閻行欲殺遂以降，夜攻遂，不下。遂歎息曰：「丈夫困厄，禍起婚姻乎！」謂英曰：「今親戚離叛，人衆轉少，當從羌中西南詣蜀耳。」英曰：「興軍數十年，今雖罷敗，何有棄其門而依於人乎！」遂曰：「吾年老矣，子欲何施？」英曰：「曹公不能遠來，獨夏侯爾。夏侯之衆，不足以追我，又不能乆留；且息肩於羌中，以須其去。招呼故人，綏會羌、胡，猶可以有為也。」遂從其計，時隨從者男女尚數千人。遂宿有恩於羌，羌衞護之。及夏侯淵還，使閻行留後。乃合羌、胡數萬將攻行，行欲走，會遂死，英降太祖。太祖見英甚喜，以為軍師，封列侯。從行出獵，有三鹿走過前，公命英射之，三發三中，皆應弦而倒。公抵掌謂之曰：「但韓文約可為盡節，而孤獨不可乎？」英乃下馬而跪曰：「不欺明公。假使英本主人在，實不來此也。」遂流涕哽咽。公嘉其敦舊，遂親敬之。延康、黃初之際，河西有逆謀。詔遣英佐涼州平隴右，病卒。《魏略》曰：閻行，金城人也，後名艷，字彥明。少有健名，始為小將，隨韓約。建安初，約與馬騰相攻擊。騰子超亦號為健。行嘗刺超，矛折，因以折矛撾超項，幾殺之。至十四年，為約所使詣太祖，太祖厚遇之，表拜犍為太守。行因請令其父入宿衞，西還見約，宣太祖教云：「謝文約：卿始起兵時，自有所逼，我所具明也。當早來，共匡輔國朝。」行因謂約曰：「行亦為將軍，興軍以來三十餘年，民兵疲瘁，所處又狹，宜早自附。是以前在鄴，自啟當令老父詣京師，誠謂將軍亦宜遣一子，以示丹赤。」約曰：「且可復觀望數歲中！」後遂遣其子，與行父母俱東。會約西討張猛，留行守舊營，而馬超等結反謀，舉約為都督。及約還，超謂約曰：「前鍾司隷任超使取將軍，關東人不可復信也。今超棄父，以將軍為父，將軍亦當棄子，以超為子。」行諫約，不欲令與超合。約謂行曰：「今諸將不謀而同，似有天數。」乃東詣華陰。及太祖與約交馬語，行在其後，太祖望謂行曰：「當念作孝子。」及超等破走，行隨約還金城。太祖聞行前意，故但誅約子孫在京師者。乃手書與行曰：「觀文約所為，使人笑來。吾前後與之書，無所不說，如此何可復忍！卿父諫議，自平安也。雖然，牢獄之中，非養親之處，且又官家亦不能乆為人養老也。」約聞行父獨在，欲使並遇害，以一其心，乃彊以少女妻行，行不獲已。太祖果疑行。會約使行別領西平郡。遂勒其部曲，與約相攻擊。行不勝，乃將家人東詣太祖。太祖表拜列侯。
- id: wei.15.p20.a1
  anchor: wei.15.p20
  at: 63
  length: 0
  type: pei
  text: 《魏略》曰：儒字俊林，夏侯尚從弟。初為鄢陵侯彰驍騎司馬，宣王為征南將軍，都督荊、豫州。正始二年，朱然圍樊城，城中守將乙脩等求救甚急。儒進屯鄧塞，以兵少不敢進，但作鼓吹，設導從，去然六七里，翱翔而還，使脩等遙見之，數數如是。月餘，及太傅到，乃俱進，然等走。時謂儒為怯，或以為曉以少疑衆，得聲救之宜。儒猶以此召還，為太僕。
- id: wei.15.p21.a1
  anchor: wei.15.p21
  at: 53
  length: 0
  type: pei
  text: 《魏略》曰：初，旣為郡小吏，功曹徐英嘗自鞭旣三十。英字伯濟，馮翊著姓，建安初為蒲阪令。英性剛爽，自見族氏勝旣，於鄉里名行在前，加以前辱旣，雖知旣貴顯，終不肯求於旣。旣雖得志，亦不顧計本原，猶欲與英和。嘗因醉欲親狎英，英故抗意不納。英由此遂不復進用。故時人善旣不挾舊怨，而壯英之不撓。
