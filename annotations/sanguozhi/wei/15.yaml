  text: 晉諸公赞曰：望字子初，孚之長子。有才识，早知名。咸熙中位至司徒，入晉封義陽王，遷太尉、大司馬。時孚爲太宰，父子居上公位，自中代以来未之有也。洪字孔業，封河間王。
