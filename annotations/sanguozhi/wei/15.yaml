  text: 臣松之案：朗此對，但爲稱述卓功德，未相箴誨而已。了不自申釋，而卓便云「吾亦悟之，卿言有意」！客主之辭如爲不相酬塞也。
- id: wei.15.p9.a1
  anchor: wei.15.p9
  at: 348
  length: 0
  type: pei
  text: 魏書曰：文帝善朗论，命秘書录其文。孫盛曰：繇既失之，朗亦未爲得也。昔「汤舉伊尹，而不仁者远矣」。易稱「颜氏之子，其殆庶幾乎！有不善未尝不知，知之未尝復行」。由此而言，圣人之與大賢，行藏道一，舒卷斯同，御世垂風，理無降異；升泰之美，豈俟积世哉？「善人爲邦百年，亦可以胜残去杀」。又曰「不践迹，亦不入于室」。數世之论，其在斯乎！方之大賢，固有間矣。
