  text: 司馬彪序傳曰：朗祖父雋，字元異，博學好古，倜儻有大度。長八尺三寸，腰帶十圍，儀狀魁岸，與眾有異，鄉黨宗族咸景附焉。位至穎川太守。父防，字建公，性質直公方，雖閑居宴處，威儀不忒。雅好《漢書名臣列傳》，所諷誦者數十萬言。少仕州郡，歷官洛陽令、京兆尹，以年老轉拜骑都尉。養志閭巷，闔門自守。諸子雖冠成人，不命曰進不敢進，不命曰坐不敢坐，不指有所問不敢言，父子之間肅如也。年七十一，建安二十四年終。有子八人，朗最長，次即晉宣皇帝也。
