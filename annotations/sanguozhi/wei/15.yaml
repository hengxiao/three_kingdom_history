  at: 145
  length: 0
  type: pei
  text: 《魏略》曰：甘露二年，车驾東征，屯项，復入逵祠下，詔曰：「逵没有遺愛，歷世見祠。追聞風烈，朕甚嘉之。昔先帝東征，亦幸于此，親发德音，褒扬逵美，徘徊之心，益有慨然！夫礼賢之義，或扫其坟墓，或脩其門閭，所以崇敬也。其扫除祠堂，有穿漏者补治之。」
