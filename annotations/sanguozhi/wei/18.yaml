  type: pei
  text: 《魏書》曰：典少好學，不樂兵事，乃就師讀《春秋左氏傳》，博觀群書。太祖善之，故試以治民之政。
- id: wei.18.p5.a1
  anchor: wei.18.p5
  at: 13
  length: 0
  type: pei
  text: 《魏略》曰：通小字萬億。
- id: wei.18.p7.a1
  anchor: wei.18.p7
  at: 183
  length: 0
  type: pei
  text: 王隱《晉書》曰：緒子秉，字玄胄，有俊才，為時所貴，官至秦州刺史。秉嘗答司馬文王問，因以為家誡曰：
- id: wei.18.p11.a1
  anchor: wei.18.p11
  at: 78
  length: 0
  type: pei
  text: 《魏略》曰：霸一名奴寇。孫觀名嬰子。吳敦名黯奴。尹禮名盧兒。建安二十四年，霸遣別軍在洛。會太祖崩，霸所部及青州兵，以為天下將亂，皆鳴鼓擅去。文帝即位，以曹休都督青、徐，霸謂休曰：「國家未肯聽霸耳！若假霸步騎萬人，必能橫行江表。」休言之於帝，帝疑霸軍前擅去，今意壯乃爾！遂東巡，因霸來朝而奪其兵。
- id: wei.18.p11.a2
  anchor: wei.18.p11
  at: 107
  length: 0
  type: pei
  text: 《魏書曰：艾少以才理稱，為黃門郎，歷位郡守。
- id: wei.18.p11.a3
  anchor: wei.18.p11
  at: 151
  length: 0
  type: pei
  text: 霸一子舜，字太伯，晉散騎常侍，見武帝百官名。此百官名，不知誰所撰也，皆有題目，稱舜「才穎條暢，識贊時宜」也。
- id: wei.18.p12.a1
  anchor: wei.18.p12
  at: 37
  length: 0
  type: pei
  text: 《魏書》曰：孫觀字仲台，泰山人。與臧霸俱起，討黃巾，拜騎都尉。太祖破呂布，使霸招觀兄弟，皆厚遇之。與霸俱戰伐，觀常為先登，徵定青、徐群賊，功次於霸，封呂都亭侯。康亦以功封列侯。與太祖會南皮，遣子弟入居鄴，拜觀偏將軍，遷青州刺史。從徵孫權於濡須口，假節。攻權，為流矢所中，傷左足，力戰不顧，太祖勞之曰：「將軍被創深重，而猛氣益奮，不當為國愛身乎？」轉振威將軍，創甚，遂卒。
- id: wei.18.p13.a1
  anchor: wei.18.p13
  at: 249
  length: 0
  type: pei
  text: 孫盛曰：資父事君，忠孝道一。臧霸少有孝烈之稱，文聘著垂泣之誠，是以魏武一面，委之以二方之任，豈直壯武見知於倉卒之間哉！
- id: wei.18.p14.a1
  anchor: wei.18.p14
  at: 92
  length: 0
  type: pei
  text: 《魏略》曰：孫權嘗自將數萬眾卒至。時大雨，城柵崩壞，人民散在田野，未及補治。聘聞權到，不知所施，乃思惟莫若潛默可以疑之。乃敕城中人使不得見，又自臥捨中不起。權果疑之，語其部黨曰：「北方以此人忠臣也，故委之以此郡，今我至而不動，此不有密圖，必當有外救。」遂不敢攻而去。魏略此語，與本傳反。
- id: wei.18.p18.a1
  anchor: wei.18.p18
  at: 52
  length: 0
  type: pei
  text: 孫盛《雜語》曰：祥字休徵。性至孝，後母苛虐，每欲危害祥，祥色養無怠。盛寒之月，後母曰：「吾思食生魚。」祥脫衣，將剖冰求之，（有）少，堅冰解，下有魚躍出，因奉以供，時人以為孝感之所致也。供養三十餘年，母終乃仕，以淳誠貞粹見重於時。王隱《晉書》曰：祥始出仕，年過五十矣，稍遷至司隸校尉。高貴鄉公入學，以祥為三老，遷司空太尉。司馬文王初為晉王，司空荀顗要祥盡敬，祥不從。語在《三少帝紀》。晉武踐阼，拜祥為太保，封雎陵公。泰始四年，年八十九薨。祥弟覽，字玄通，光祿大夫。《晉諸公贊》稱覽率素有至行。覽子孫繁衍，頗有賢才相系，奕世之盛，古今少比焉。
- id: wei.18.p24.a1
  anchor: wei.18.p24
  at: 13
  length: 0
  type: pei
  text: 狟音桓。
- id: wei.18.p24.a2
  anchor: wei.18.p24
  at: 118
  length: 0
  type: pei
  text: 《魏略》曰：德手斬一級，不知是援。戰罷之後，眾人皆言援死而不得其首。援，鍾繇之甥。德晚後於鞬中出一頭，繇見之而哭。德謝繇，繇曰：「援雖我甥，乃國賊也。卿何謝之？」
- id: wei.18.p25.a1
  anchor: wei.18.p25
  at: 51
  length: 0
  type: pei
  text: 《魏略》曰：德從兄名柔，時在蜀。
- id: wei.18.p26.a1
  anchor: wei.18.p26
  at: 108
  length: 0
  type: pei
  text: 王隱《蜀記》曰：鍾會平蜀，前後鼓吹，迎德屍喪還葬鄴，冢中身首如生。臣松之案德死於樊城，文帝即位，又遣使至德墓所，則其屍喪不應在蜀。此王隱之虛說也。
- id: wei.18.p27.a1
  anchor: wei.18.p27
  at: 107
  length: 0
  type: pei
  text: 《魏略》曰：猛兵欲來縛淯，猛聞之，嘆曰：「猛以殺刺史為罪。此人以至忠為名，如又殺之，何以勸一州履義之士邪！」遂使行服。《典略》曰：張猛字叔威，本敦煌人也。猛父奐，桓帝時仕歷郡守、中郎將、太常，遂居華陰，終因葬焉。建安初，猛仕郡為功曹，是時河西四郡以去涼州治遠，隔以河寇，上書求別置州。詔以陳留人邯鄲商為雍州刺史，別典四郡。時武威太守缺，詔又以猛父昔在河西有威名，乃以猛補之。商、猛俱西。初，猛與商同歲，每相戲侮，及共之官，行道更相責望。暨到，商欲誅猛。猛覺之，遂勒兵攻商。商治舍與猛側近，商聞兵至，恐怖登屋，呼猛字曰：「叔威，汝欲殺我耶？然我死者有知，汝亦族矣。請和解，尚可乎？」猛因呼曰：「來。」商踰屋就猛，猛因責數之，語畢，以商屬督郵。督郵錄商，閉置傳舍。後商欲逃，事覺，遂殺之。是歲建安十四年也。至十五年，將軍韓遂自上討猛，猛發兵遣軍東拒。其吏民畏遂，乃反共攻猛。初奐為武威太守時，猛方在孕。母夢帶奐印綬，登樓而歌，旦以告奐。奐訊占夢者，曰：「夫人方生男，後當復臨此郡，其必死官乎！」及猛被攻，自知必死，曰：「使死者無知則已矣，若有知，豈使吾頭東過華陰曆先君之墓乎？」乃登樓自燒而死。
- id: wei.18.p28.a1
  anchor: wei.18.p28
  at: 117
  length: 0
  type: pei
  text: 皇甫謐《列女傳》曰：酒泉烈女龐娥親者，表氏龐子夏之妻，祿福趙君安之女也。君安為同縣李壽所殺，娥親有男弟三人，皆欲報仇，壽深以為備。會遭災疫，三人皆死。壽聞大喜，請會宗族，共相慶賀，雲：「趙氏強壯已盡，唯有女弱，何足復憂！」防備懈弛。娥親子淯出行，聞壽此言，還以啓娥親。娥親既素有報仇之心，及聞壽言，感激愈深，愴然隕涕曰：「李壽，汝莫喜也，終不活汝！戴履天地，為吾門戶，吾三子之羞也。焉知娥親不手刃殺汝，而自儌倖邪？」陰巿名刀，挾長持短，晝夜哀酸，志在殺壽。壽為人凶豪，聞娥親之言，更乘馬帶刀，鄉人皆畏憚之。比鄰有徐氏婦，憂娥親不能制，恐逆見中害，每諫止之，曰：「李壽，男子也，凶惡有素，加今備衛在身。趙雖有猛烈之志，而強弱不敵。邂逅不制，則為重受禍於壽，絕滅門戶，痛辱不輕也。原詳舉動，為門戶之計。」娥親曰：「父母之仇，不同天地共日月者也。李壽不死，娥親視息世間，活復何求！今雖三弟早死，門戶泯絕，而娥親猶在，豈可假手於人哉！若以卿心況我，則李壽不可得殺；論我之心，壽必為我所殺明矣。」夜數磨礪所持刀訖，扼腕切齒，悲涕長嘆，家人及鄰里咸共笑之。娥親謂左右曰：「卿等笑我，直以我女弱不能殺壽故也。要當以壽頸血污此刀刃，令汝輩見之。」遂棄家事，乘鹿車伺壽。至光和二年二月上旬，以白日清時，於都亭之前，與壽相遇，便下車扣壽馬，叱之。壽驚愕，回馬欲走。娥親奮刀斫之，並傷其馬。馬驚，壽擠道邊溝中。娥親尋復就地斫之，探中樹蘭，折所持刀。壽被創未死，娥親因前欲取壽所佩刀殺壽，壽護刀瞋目大呼，跳梁而起。娥親乃挺身奮手，左抵其額，右樁其喉，反覆盤旋，應手而倒。遂拔其刀以截壽頭，持詣都亭，歸罪有司，徐步詣獄，辭顏不變。時祿福長漢陽尹嘉不忍論娥親，即解印綬去官，弛法縱之。娥親曰：「仇塞身死，妾之明分也。治獄制刑，君之常典也。何敢貪生以枉官法？」鄉人聞之，傾城奔往，觀者如堵焉，莫不為之悲喜慷慨嗟嘆也。守尉不敢公縱，陰語使去，以便宜自匿。娥親抗聲大言曰：「枉法逃死，非妾本心。今仇人已雪，死則妾分，乞得歸法以全國體。雖復萬死，於娥親畢足，不敢貪生為明廷負也。」尉故不聽所執，娥親復言曰：「匹婦雖微，猶知憲制。殺人之罪，法所不縱。今既犯之，義無可逃。乞就刑戮，隕身朝巿，肅明王法，娥親之原也。」辭氣愈厲，面無懼色。尉知其難奪，強載還家。涼州刺史周洪、酒泉太守劉班等並共表上，稱其烈義，刊石立碑，顯其門閭。太常弘農張奐貴尚所履，以束帛二十端禮之。海內聞之者，莫不改容贊善，高大其義。故黃門侍郎安定梁寬追述娥親，為其作傳。玄晏先生以為父母之仇，不與共天地，蓋男子之所為也。而娥親以女弱之微，念父辱之酷痛，感仇黨之凶言，奮劍仇頸，人馬俱摧，塞亡父之怨魂，雪三弟之永恨，近古已來，未之有也。詩雲「修我戈矛，與子同仇」，娥親之謂也。
