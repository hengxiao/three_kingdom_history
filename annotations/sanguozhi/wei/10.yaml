- id: wei.10.p33.a3
  anchor: wei.10.p33
  at: 223
  length: 0
  type: pei
  text: 《魏書》曰：時建安十九年，攸年五十八。計其年大彧六歳。《魏書》載太祖令曰：「孤與荀公達周遊二十餘年，無毫毛可非者。」又曰：「荀公達眞賢人也，所謂『温良恭儉讓以得之』。孔子稱『晏平仲善與人交，久而敬之』，公達即其人也。」《傅子》曰：或問近世大賢君子，荅曰：「荀令君之仁，荀軍師之智，斯可謂近世大賢君子矣。荀令君仁以立德，明以舉賢，行無諂黷，謀能應機。孟軻稱『五百年而有王者興，其間必有命世者』，其荀令君乎！太祖稱『荀令君之進善，不進不休，荀軍師之去惡，不去不止』也。」
