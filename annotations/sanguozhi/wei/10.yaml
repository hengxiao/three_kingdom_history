- id: wei.10.p18.a1
  anchor: wei.10.p18
  at: 20
  length: 0
  type: pei
  text: 《彧別傳》載太祖表曰：「臣聞慮爲功首，謀爲賞本，野績不越廟堂，戰多不踰國勳。是故典阜之錫，不後營丘，蕭何之土，先於平陽。珍策重計，古今所尚。侍中守尚書令彧，積德累行，少長無悔，遭世紛擾，懷忠念治。臣自始舉義兵，周游征伐，與彧勠力同心，左右王略，發言授策，無施不效。彧之功業，臣由以濟，用披浮雲，顯光日月。陛下幸許，彧左右機近，忠恪祗順，如履薄冰，研精極鋭，以撫庶事。天下之定，彧之功也。宜享髙爵，以彰元勳。」彧固辭無野戰之勞，不通太祖表。太祖與彧書曰：「與君共事已來，立朝廷，君之相爲匡弼，君之相爲舉人，君之相爲建計，君之相爲密謀，亦以多矣。夫功未必皆野戰也，願君勿讓。」彧乃受。
