- id: wei.10.p21.a1
  anchor: wei.10.p21
  at: 60
  length: 0
  type: pei
  text: 《彧別傳》曰：太祖又表曰：「昔袁紹侵入郊甸，戰於官渡。時兵少糧盡，圖欲還許，書與彧議，彧不聽臣。建宜住之便，恢進討之規，更起臣心，易其愚慮，遂摧大逆，覆取其衆。此彧覩勝敗之機，略不世出也。及紹破敗，臣糧亦盡，以爲河北未易圖也，欲南討劉表。彧復止臣，陳其得失，臣用反斾，遂呑凶族，克平四州。向使臣退於官渡，紹必鼓行而前，有傾覆之形，無克捷之勢。後若南征，委棄兖、豫，利旣難要，將失本據。彧之二策，以亡爲存，以禍致福，謀殊功異，臣所不及也。是以先帝貴指蹤之功，薄搏獲之賞；古人尚帷幄之規，下攻拔之捷。前所賞録，未副彧巍巍之勳，乞重平議，疇其戸邑。」彧深辭讓，太祖報之曰：「君之策謀，非但所表二事。前後謙沖，欲慕魯連先生乎？此聖人達節者所不貴也。昔介子推有言『竊人之財，猶謂之盜』。況君密謀安衆，光顯於孤者以百數乎！以二事相還而復辭之，何取謙亮之多邪！」太祖欲表彧爲三公，彧使荀攸深讓，至于十數，太祖乃止。
