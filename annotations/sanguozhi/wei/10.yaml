  type: pei
  text: 臣松之以爲于時徐州未平，兖州又叛，而云十萬之衆，雖是抑抗之言，要非寡弱之稱。益知官渡之役，不得云兵不滿萬也。
- id: wei.10.p3.a2
  anchor: wei.10.p3
  at: 364
  length: 0
  type: pei
  text: 《曹瞞傳》云：自京師遭董卓之亂，人民流移東出，多依彭城間。遇太祖至，坑殺男女數萬口於泗水，水爲不流。陶謙帥其衆軍武原，太祖不得進。引軍從泗南攻取慮、睢陵、夏丘諸縣，皆屠之；鷄犬亦盡，墟邑無復行人。
