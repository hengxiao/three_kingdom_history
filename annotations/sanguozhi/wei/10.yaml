- id: wei.10.p23.a1
  anchor: wei.10.p23
  at: 151
  length: 0
  type: pei
  text: 《魏氏春秋》曰：太祖饋彧食，發之乃空器也，於是飲藥而卒。咸熙二年，贈彧太尉。《彧別傳》曰：彧自爲尚書令，常以書陳事，臨薨，皆焚毀之，故奇策密謀不得盡聞也。是時征役草創，制度多所興復，彧嘗言於太祖曰：「昔舜分命禹、稷、契、皐陶以揆庶績，教化征伐，並時而用。及髙祖之初，金革方殷，猶舉民能善教訓者，叔孫通習禮儀於戎旅之閒，世祖有投戈講藝、息馬論道之事，君子無終食之閒違仁。今公外定武功，内興文學，使干戈戢睦，大道流行，國難方弭，六禮倶治，此姬旦宰周之所以速平也。旣立德立功，而又兼立言，成仲尼述作之意；顯制度於當時，揚名於後世，豈不盛哉！若須武事畢而後制作，以稽治化，於事未敏。宜集天下大才通儒，考論六經，刊定傳記，存古今之學，除其煩重，以一聖眞，並隆禮學，漸敦教化，則王道兩濟。」彧從容與太祖論治道，如此之類甚衆，太祖常嘉納之。彧德行周備，非正道不用心，名重天下，莫不以爲儀表，海内英儁咸宗焉。司馬宣王常稱書傳遠事，吾自耳目所從聞見，逮百數十年間，賢才未有及荀令君者也。前後所舉者，命世大才，邦邑則荀攸、鍾繇、陳羣，海内則司馬宣王，及引致當世知名郗慮、華歆、王朗、荀恱、杜襲、辛毗、趙儼之儔，終爲卿相，以十數人。取士不以一揆，戲志才、郭嘉等有負俗之譏，杜畿簡傲少文，皆以智策舉之，終各顯名。荀攸後爲魏尚書令，亦推賢進士。太祖曰：「二荀令之論人，久而益信，吾沒世不忘。」鍾繇以爲顏子旣沒，能備九德，不貳其過，唯荀彧然。或問繇曰：「君雅重荀君，比之顏子，自以不及，可得聞乎？」曰：「夫明君師臣，其次友之。以太祖之聦明，毎有大事，常先諮之荀君，是則古師友之義也。吾等受命而行，猶或不盡，相去顧不遠邪！」《獻帝春秋》曰：董承之誅，伏后與父完書，言司空殺董承，帝方爲報怨。完得書以示彧，彧惡之，久隱而不言。完以示妻弟樊普，普封以呈太祖，太祖陰爲之備。彧後恐事覺，欲自發之，因求使至鄴，勸太祖以女配帝。太祖曰：「今朝廷有伏后，吾女何得以配上，吾以微功見録，位爲宰相，豈復賴女寵乎！」彧曰：「伏后無子，性又凶邪，往常與父書，言辭醜惡，可因此廢也。」太祖曰：「卿昔何不道之？」彧陽驚曰：「昔已嘗爲公言也。」太祖曰：「此豈小事而吾忘之！」彧又驚曰：「誠未語公邪！昔公在官渡與袁紹相持，恐增内顧之念，故不言爾。」太祖曰：「官渡事後何以不言？」彧無對，謝闕而已。太祖以此恨彧，而外含容之，故世莫得知。至董昭建立魏公之議，彧意不同，欲言之於太祖。及齎璽書犒軍，飲饗禮畢，彧留請閒。太祖知彧欲言封事，揖而遣之，彧遂不得言。彧卒於壽春，壽春亡者告孫權，言太祖使彧殺伏后，彧不從，故自殺。權以露布於蜀，劉備聞之，曰：「老賊不死，禍亂未已。」臣松之案《獻帝春秋》云彧欲發伏后事而求使至鄴，而方誣太祖云「昔已嘗言」。言旣無徴，迴託以官渡之虞，俛仰之間，辭情頓屈，雖在庸人，猶不至此，何以玷累賢哲哉！凡諸云云，皆出自鄙俚，可謂以吾儕之言而厚誣君子者矣。袁暐虚罔之類，此最爲甚也。
