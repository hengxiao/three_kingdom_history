- id: wei.10.p2.a1
  anchor: wei.10.p2
  at: 21
  length: 0
  type: pei
  text: 《典略》曰：中常侍唐衡欲以女妻汝南傅公明，公明不娶，轉以與彧。父緄慕衡勢，爲彧娶之。彧爲論者所譏。臣松之案：《漢紀》云唐衡以桓帝延熹七年死，計彧于時年始二歳，則彧婚之日，衡之沒久矣。慕勢之言爲不然也。臣松之又以爲緄八龍之一，必非苟得者也，將有逼而然，何云慕勢哉？昔鄭忽以違齊致譏，雋生以拒霍見美，致譏在於失援，見美嘉其慮遠，並無交至之害，故得各全其志耳。至於閹豎用事，四海屛氣；左悺、唐衡殺生在口。故于時諺云「左迴天，唐獨坐」，言威權莫二也。順之則六親以安，忤違則大禍立至；斯誠以存易亡，蒙恥期全之日。昔蔣詡姻于王氏，無損淸髙之操，緄之此婚，庸何傷乎！
