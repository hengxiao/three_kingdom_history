- id: wei.10.p42.a1
  anchor: wei.10.p42
  at: 26
  length: 0
  type: pei
  text: 臣松之以爲列傳之體，以事類相從。張子房靑雲之士，誠非陳平之倫。然漢之謀臣，良、平而已。若不共列，則餘無所附，故前史合之，蓋其宜也。魏氏如詡之儔，其比幸多，詡不編程、郭之篇，而與二荀並列；失其類矣。且攸、詡之爲人，其猶夜光之與蒸燭乎！其照雖均，質則異焉。今荀、賈之評，共同一稱，尤失區別之宜也。
