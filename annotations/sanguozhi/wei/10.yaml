  type: pei
  text: 《魏書》曰：太祖自柳城還，過攸舍，稱述攸前後謀謨勞勳，曰：「今天下事略已定矣，孤願與賢士大夫共饗其勞。昔髙祖使張子房自擇邑三萬戸，今孤亦欲君自擇所封焉。」
