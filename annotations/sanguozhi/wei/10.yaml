- id: wei.10.p38.a1
  anchor: wei.10.p38
  at: 106
  length: 0
  type: pei
  text: 臣松之以爲詡之此謀，未合當時之宜。于時韓、馬之徒尚狼顧關右，魏武不得安坐郢都以威懷呉會，亦已明矣。彼荊州者，孫、劉之所必爭也。荊人服劉主之雄姿，憚孫權之武略，爲日旣久，誠非曹氏諸將所能抗禦。故曹仁守江陵，敗不旋踵，何撫安之得行，稽服之可期？將此旣新平江、漢，威懾揚、越，資劉表水戰之具，藉荊楚檝櫂之手，實震蕩之良會，廓定之大機。不乘此取呉，將安俟哉？至於赤壁之敗，蓋有運數。實由疾疫大興，以損淩厲之鋒，凱風自南，用成焚如之勢。天實爲之，豈人事哉？然則魏武之東下，非失筭也。詡之此規，爲無當矣。魏武後克平張魯，蜀中一日數十驚，劉備雖斬之而不能止，由不用劉曄之計，以失席巻之會，斤石旣差，悔無所及，即亦此事之類也。世咸謂劉計爲是，即愈見賈言之非也。
