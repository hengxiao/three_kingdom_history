  anchor: wei.10.p40
  at: 296
  length: 0
  type: pei
  text: 《世語》曰：模，晉惠帝時爲散騎常侍、護軍將軍，模子胤，胤弟龕，從弟疋，皆至大官，並顯於晉也。
- id: wei.10.p41.h1
  anchor: wei.10.p41
  at: 3
  length: 2
  type: person
  person_id: xunyu
  text: 荀彧
  via: primary
- id: wei.10.p41.a1
  anchor: wei.10.p41
  at: 29
  length: 0
  type: pei
  text: 世之論者，多譏彧協規魏氏，以傾漢祚；君臣易位，實彧之由。雖晩節立異，無救運移；功旣違義，識亦疚焉。陳氏此評，蓋亦同乎世識。臣松之以爲斯言之作，誠未得其遠大者也。彧豈不知魏武之志氣，非衰漢之貞臣哉？良以于時王道旣微，橫流已及，雄豪虎視，人懷異心，不有撥亂之資，仗順之略，則漢室之亡忽諸，黔首之類殄矣。夫欲翼讚時英，一匡屯運，非斯人之與而誰與哉？是故經綸急病，若救身首，用能動于嶮中，至于大亨，蒼生蒙舟航之接，劉宗延二紀之祚，豈非荀生之本圖，仁恕之遠致乎？及至霸業旣隆，翦漢迹著，然後亡身殉節，以申素情，全大正於當年，布誠心於百代，可謂任重道遠，志行義立。謂之未充，其殆誣歟！
