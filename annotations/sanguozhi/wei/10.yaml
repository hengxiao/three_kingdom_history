- id: wei.10.p28.a1
  anchor: wei.10.p28
  at: 149
  length: 0
  type: pei
  text: 張璠《漢紀》曰：顒字伯求，少與郭泰、賈彪等遊學洛陽，泰等與同風好。顒顯名太學，於是中朝名臣太傅陳蕃、司隷李膺等皆深接之。及黨事起，顒亦名在其中，乃變名姓亡匿汝南間，所至皆交結其豪桀。顒旣奇太祖而知荀彧，袁紹慕之，與爲奔走之友。是時天下士大夫多遇黨難，顒常歳再三私入洛陽，從紹計議，爲諸窮窘之士解釋患禍。而袁術亦豪俠，與紹爭名。顒未常造術，術深恨之。《漢末名士録》曰：術嘗於衆坐數顒三罪，曰：「王德彌先覺儁老，名德髙亮，而伯求踈之，是一罪也。許子遠凶淫之人，性行不純，而伯求親之，是二罪也。郭、賈寒窶，無他資業，而伯求肥馬輕裘，光曜道路，是三罪也。」陶丘洪曰：「王德彌大賢而短於濟時，許子遠雖不純而赴難不憚濡足。伯求舉善則以德彌爲首，濟難則以子遠爲宗。且伯求嘗爲虞偉髙手刃復仇，義名奮發。其怨家積財巨萬，文馬百駟，而欲使伯求羸牛疲馬，頓伏道路，此爲披其胷而假仇敵之刃也。」術意猶不平。後與南陽宗承會於闕下，術發怒曰：「何伯求，凶德也，吾當殺之。」承曰：「何生英俊之士，足下善遇之，使延令名於天下。」術乃止。後黨禁除解，辟司空府。毎三府掾屬會議，顒策謀有餘，議者皆自以爲不及。遷北軍中候，董卓以爲長史。後荀彧爲尚書令，遣人迎叔父司空爽喪，使并置顒尸，而葬之於爽冢傍。
