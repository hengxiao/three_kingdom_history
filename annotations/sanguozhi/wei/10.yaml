  type: pei
  text: 《魏書》曰：攸年七八歳，衢曾醉，誤傷攸耳；而攸出入遊戲，常避護不欲令衢見。衢後聞之，乃驚其夙智如此。荀氏家傳曰：衢子祈，字伯旗，與族父愔倶著名。祈與孔融論肉刑，愔與孔融論聖人優劣，並在融集。祈位至濟陰太守；愔後徴有道，至丞相祭酒。
