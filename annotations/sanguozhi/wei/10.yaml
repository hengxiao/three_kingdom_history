- id: wei.10.p20.a1
  anchor: wei.10.p20
  at: 57
  length: 0
  type: pei
  text: 《荀氏家傳》曰：衍字休若，彧第三兄。彧第四兄諶，字友若，事見袁紹傳。陳羣與孔融論汝、潁人物，羣曰：「荀文若、公達、休若、友若、仲豫，當今並無對。」衍子紹，位至太僕。紹子融，字伯雅，與王弼、鍾會倶知名，爲洛陽令，參大將軍軍事，與弼、會論易、老義，傳於世。諶子閎，字仲茂，爲太子文學掾。時有甲乙疑論，閎與鍾繇、王朗、袁渙議各不同。文帝與繇書曰：「袁、王國士，更爲脣齒，荀閎勁悍，往來鋭師，眞君侯之勍敵，左右之深憂也。」終黃門侍郎。閎從孫惲字景文，太子中庶子，亦知名。與賈充共定音律，又作易集解。仲豫名恱，朗陵長儉之少子，彧從父兄也。張璠《漢紀》稱恱淸虚沈靜，善於著述。建安初爲祕書監侍中，被詔刪《漢書》作《漢紀》三十篇，因事以明臧否，致有典要；其書大行於世。
