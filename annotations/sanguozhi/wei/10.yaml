  text: 《三輔決録》曰：象字文則，京兆人。少聦博，有膽智。以督軍御史中丞詣揚州討袁術，會術病卒，因以爲揚州刺史。建安五年，爲孫策廬江太守李術所殺，時年三十八。象同郡趙岐作三輔決録，恐時人不盡其意，故隱其書，唯以示象。康字元將，亦京兆人。孔融與康父端書曰：「前日元將來，淵才亮茂，雅度弘毅，偉世之器也。昨日仲將又來，懿性貞實，文愍篤誠，保家之主也。不意雙珠，近出老蚌，甚珍貴之。」端從涼州牧徴爲太僕，康代爲涼州刺史，時人榮之。後爲馬超所圍，堅守歴時，救軍不至，遂爲超所殺。仲將名誕，見劉邵傳。
