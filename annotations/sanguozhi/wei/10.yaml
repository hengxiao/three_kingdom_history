- id: wei.10.p24.a2
  anchor: wei.10.p24
  at: 104
  length: 0
  type: pei
  text: 《荀氏家傳》曰：惲字長倩，俁字叔倩，詵字曼倩，俁子寓，字景伯。《世語》曰：寓少與裴楷、王戎、杜默倶有名京邑，仕晉，位至尚書，名見顯著。子羽嗣，位至尚書。
- id: wei.10.p24.a3
  anchor: wei.10.p24
  at: 115
  length: 0
  type: pei
  text: 《晉陽秋》曰：顗字景倩，幼爲姊夫陳羣所異。博學洽聞，意思愼密。司馬宣王見顗，奇之，曰：「荀令君之子也。近見袁偘，亦曜卿之子也。」擢拜散騎侍郎。顗佐命晉室，位至太尉，封臨淮康公。嘗難鍾會「易無互體」，見稱於世。顗弟粲，字奉倩。何劭爲粲傳曰：粲字奉倩，粲諸兄並以儒術論議，而粲獨好言道，常以爲子貢稱夫子之言性與天道，不可得聞，然則六籍雖存，固聖人之糠粃。粲兄俁難曰：「易亦云聖人立象以盡意，繫辭焉以盡言，則微言胡爲不可得而聞見哉？」粲荅曰：「蓋理之微者，非物象之所舉也。今稱立象以盡意，此非通于意外者也。繫辭焉以盡言，此非言乎繫表者也；斯則象外之意，繫表之言，固蘊而不出矣。」及當時能言者不能屈也。又論父彧不如從兄攸。彧立德髙整，軌儀以訓物，而攸不治外形，愼密自居而已。粲以此言善攸，諸兄怒而不能迴也。太和初，到京邑與傅嘏談。嘏善名理而粲尚玄遠，宗致雖同，倉卒時或有格而不相得意。裴徽通彼我之懷，爲二家騎驛，頃之，粲與嘏善。夏侯玄亦親。常謂嘏、玄曰：「子等在世塗間，功名必勝我，但識劣我耳！」嘏難曰：「能盛功名者，識也。天下孰有本不足而末有餘者邪？」粲曰：「功名者，志局之所獎也。然則志局自一物耳，固非識之所獨濟也。我以能使子等爲貴，然未必齊子等所爲也。」粲常以婦人者，才智不足論，自宜以色爲主。驃騎將軍曹洪女有美色，粲於是娉焉，容服帷帳甚麗，專房歡宴。歴年後，婦病亡，未殯，傅嘏往喭粲；粲不哭而神傷。嘏問曰：「婦人才色並茂爲難。子之娶也，遺才而好色。此自易遇，今何哀之甚？」粲曰：「佳人難再得！顧逝者不能有傾國之色，然未可謂之易遇。」痛悼不能已，歳餘亦亡，時年二十九。粲簡貴，不能與常人交接，所交皆一時俊傑。至葬夕，赴者裁十餘人，皆同時知名士也，哭之，感慟路人。
- id: wei.10.p25.a1
  anchor: wei.10.p25
  at: 27
  length: 0
  type: pei
  text: 《荀氏家傳》曰：頵字温伯，爲羽林右監，早卒。頵子崧，字景猷。《晉陽秋》稱崧少有志操，雅好文學，孝義和愛，在朝恪勤，位至左右光祿大夫、開府儀同三司。崧子羨，字令則，淸和有才。尚公主，少歴顯位，年二十八爲北中郎將，徐、兖二州刺史，假節都督徐、兖、靑三州諸軍事。在任十年，遇疾解職，卒於家，追贈驃騎將軍。羨孫伯子，今御史中丞也。
- id: wei.10.p26.a1
  anchor: wei.10.p26
  at: 69
  length: 0
  type: pei
  text: 《荀氏家傳》曰：愷，晉武帝時爲侍中。干寶《晉紀》曰：武帝使侍中荀顗、和嶠倶至東宮，觀察太子。顗還稱太子德識進茂，而嶠云聖質如初。孫盛曰「遣荀勗」，其餘語則同。臣松之案和嶠爲侍中，荀顗亡沒久矣。荀勗位亞台司，不與嶠同班，無縁方稱侍中。二書所云，皆爲非也。考其時位，愷寔當之。愷位至征西大將軍。愷兄憺，少府。弟悝，護軍將軍，追贈車騎大將軍。
