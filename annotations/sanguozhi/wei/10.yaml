- id: wei.10.p35.a1
  anchor: wei.10.p35
  at: 36
  length: 0
  type: pei
  text: 《九州春秋》曰：中平元年，車騎將軍皇甫嵩旣破黃巾，威震天下。閻忠時罷信都令，説嵩曰：「夫難得而易失者時也，時至而不旋踵者機也，故聖人常順時而動，智者必因機以發。今將軍遭難得之運，蹈易解之機，而踐運不撫，臨機不發，將何以享大名乎？」嵩曰：「何謂也？」忠曰：「天道無親，百姓與能，故有髙人之功者，不受庸主之賞。今將軍授鉞於初春，收功於末冬，兵動若神，謀不再計，旬月之間，神兵電掃，攻堅易於折枯，摧敵甚於湯雪，七州席巻，屠三十六萬方，夷黃巾之師，除邪害之患，或封戸刻石，南向以報德，威震本朝，風馳海外。是以羣雄迴首，百姓企踵，雖湯武之舉，未有髙於將軍者。身建髙人之功，北面以事庸主，將何以圖安？」嵩曰：「心不忘忠，何爲不安？」忠曰：「不然。昔韓信不忍一飱之遇，而棄三分之利，拒蒯通之忠，忽鼎跱之勢，利劒已揣其喉，乃嘆息而悔，所以見烹於兒女也。今主勢弱於劉、項，將軍權重於淮陰，指麾可以振風雲，叱咤足以興雷電；赫然奮發，因危抵頽，崇恩以綏前附，振武以臨後服；徴冀方之士，動七州之衆，羽檄先馳於前，大軍震響於後，蹈蹟漳河，飲馬孟津，舉天網以網羅京都，誅閹宦之罪，除羣怨之積忿，解久危之倒懸。如此則攻守無堅城，不招必影從，雖兒童可使奮空拳以致力，女子可使其褰裳以用命，況厲智能之士，因迅風之勢，則大功不足合，八方不足同也。功業已就，天下已順，乃燎于上帝，告以天命，混齊六合，南面以制，移神器於己家，推亡漢以定祚，實神機之至決，風發之良時也。夫木朽不彫，世衰難佐，將軍雖欲委忠難佐之朝，彫畫朽敗之木，猶逆坂而走丸，必不可也。方今權宦羣居，同惡如市，主上不自由，詔命出左右。如有至聦不察，機事不先，必嬰後悔，亦無及矣。」嵩不從，忠乃亡去。《英雄記》曰：涼州賊王國等起兵，共劫忠爲主，統三十六部，號車騎將軍。忠感慨發病而死。
