- id: wei.10.p36.a1
  anchor: wei.10.p36
  at: 167
  length: 0
  type: pei
  text: 臣松之以爲傳稱「仁人之言，其利愽哉」！然則不仁之言，理必反是。夫仁功難著，而亂源易成，是故有禍機一發而殃流百世者矣。當是時，元惡旣梟，天地始開，致使厲階重結，大梗殷流，邦國遘殄悴之哀，黎民嬰周餘之酷，豈不由賈詡片言乎？詡之罪也，一何大哉！自古兆亂，未有如此之甚。
- id: wei.10.p36.a2
  anchor: wei.10.p36
  at: 279
  length: 0
  type: pei
  text: 《獻帝紀》曰：郭汜、樊稠與傕互相違戾，欲鬬者數矣。詡輒以道理責之，頗受詡言。《魏書》曰：詡典選舉，多選舊名以爲令僕，論者以此多詡。
- id: wei.10.p36.a3
  anchor: wei.10.p36
  at: 300
  length: 0
  type: pei
  text: 《獻帝紀》曰：傕等與詡議，迎天子置其營中。詡曰：「不可。脅天子，非義也。」傕不聽。張繡謂詡曰：「此中不可久處，君胡不去？」詡曰：「吾受國恩，義不可背。卿自行，我不能也。」
- id: wei.10.p36.a4
  anchor: wei.10.p36
  at: 310
  length: 0
  type: pei
  text: 《獻帝紀》曰：傕時召羌、胡數千人，先以御物繒綵與之，又許以宮人婦女，欲令攻郭汜。羌、胡數來闚省門，曰：「天子在中邪！李將軍許我宮人美女，今皆安在？」帝患之，使詡爲之方計。詡乃密呼羌、胡大帥飲食之，許以封爵重寶，於是皆引去。傕由此衰弱。
- id: wei.10.p36.a5
  anchor: wei.10.p36
  at: 328
  length: 0
  type: pei
  text: 《獻帝紀》曰：天子旣東，而李傕來追，王師敗績。司徒趙温、太常王偉、衞尉周忠、司隷榮邵皆爲傕所嫌，欲殺之。詡謂傕曰：「此皆天子大臣，卿柰何害之？」傕乃止。
- id: wei.10.p36.a6
  anchor: wei.10.p36
  at: 349
  length: 0
  type: pei
  text: 《典略》稱煨在華陰時，脩農事，不虜略。天子東還，煨迎道貢遺周急。獻帝紀曰：後以煨爲大鴻臚光祿大夫，建安十四年，以壽終。
