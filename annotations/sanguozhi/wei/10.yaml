- id: wei.10.p4.a1
  anchor: wei.10.p4
  at: 314
  length: 0
  type: pei
  text: 《典略》曰：彧折節下士，坐不累席。其在臺閣，不以私欲撓意。彧有羣從一人，才行實薄，或謂彧：「以君當事，不可不以某爲議郎邪？」彧笑曰：「官者所以表才也，若如來言，衆人其謂我何邪！」其持心平正皆類此。
- id: wei.10.p4.h8
  anchor: wei.10.p4
  at: 314
  length: 2
  type: person
  person_id: caocao
  text: 太祖
  via: chapter_alias
- id: wei.10.p4.a2
  anchor: wei.10.p4
  at: 331
  length: 0
  type: pei
  text: 《典略》曰：彧爲人偉美。又平原禰衡傳曰：衡字正平，建安初，自荊州北游許都，恃才傲逸，臧否過差，見不如己者不與語，人皆以是憎之。唯少府孔融髙貴其才，上書薦之曰：「淑質貞亮，英才卓犖。初渉藝文，升堂覩奧；目所一見，輒誦於口，耳所暫聞，不忘於心。性與道合，思若有神。弘羊心計，安世默識，以衡準之，誠不足恠。」衡時年二十四。是時許都雖新建，尚饒人士。衡嘗書一刺懷之，字漫滅而無所適。或問之曰：「何不從陳長文、司馬伯達乎？」衡曰：「卿欲使我從屠沽兒輩也！」又問曰：「當今許中，誰最可者？」衡曰：「大兒有孔文舉，小兒有楊德祖。」又問：「曹公、荀令君、趙盪寇皆足蓋世乎？」衡稱曹公不甚多；又見荀有儀容，趙有腹尺，因荅曰：「文若可借面吊喪，稚長可使監廚請客。」其意以爲荀但有貌，趙健啖肉也。於是衆人皆切齒。衡知衆不恱，將南還荊州。裝束臨發，衆人爲祖道，先設供帳於城南，自共相誡曰：「衡數不遜，今因其後到，以不起報之。」及衡至，衆人皆坐不起，衡乃號咷大哭。衆人問其故，衡曰：「行屍柩之間，能不悲乎？」衡南見劉表，表甚禮之。將軍黃祖屯夏口，祖子射與衡善，隨到夏口。祖嘉其才，毎在坐，席有異賔，介使與衡談。後衡驕蹇，荅祖言徘優饒言，祖以爲罵己也，大怒，顧伍伯捉頭出。左右遂扶以去，拉而殺之。臣松之以本傳不稱彧容貌，故載《典略》與衡傳以見之。又潘勗爲彧碑文，稱彧「瓌姿奇表」。張衡《文士傳》曰：孔融數薦衡於太祖，欲與相見，而衡疾惡之，意常憤懣。因狂疾不肯往，而數有言論。太祖聞其名，圖欲辱之，乃録爲鼓吏。後至八月朝，大宴，賔客並會。時鼓吏撃鼓過，皆當脱其故服，易着新衣。次衡，衡撃爲漁陽參檛，容態不常，音節殊妙。坐上賔客聽之，莫不慷慨。過不易衣，吏呵之，衡乃當太祖前，以次脱衣，裸身而立，徐徐乃着褌冐畢，復撃鼓參檛，而顏色不怍。太祖大笑，告四坐曰：「本欲辱衡，衡反辱孤。」至今有漁陽參檛，自衡造也。融深責數衡，并宣太祖意，欲令與太祖相見。衡許之，曰：「當爲卿往。」至十月朝，融先見太祖，説「衡欲求見」。至日晏，衡着布單衣，疎巾履，坐太祖營門外，以杖捶地，數罵太祖。太祖勑外廄急具精馬三匹，并騎二人，謂融曰：「禰衡豎子，乃敢爾！孤殺之無異於雀鼠，顧此人素有虚名，遠近所聞，今日殺之，人將謂孤不能容。今送與劉表，視卒當何如？」乃令騎以衡置馬上，兩騎扶送至南陽。《傅子》曰：衡辯於言而剋于論，見荊州牧劉表日，所以自結於表者甚至，表恱之以爲上賔。衡稱表之美盈口，而論表左右不廢繩墨。於是左右因形而譖之，曰：「衡稱將軍之仁，西伯不過也，唯以爲不能斷；終不濟者，必由此也。」是言實指表智短，而非衡所言也。表不詳察，遂疎衡而逐之。衡以交絶於劉表，智窮於黃祖，身死名滅，爲天下笑者，譖之者有形也。
