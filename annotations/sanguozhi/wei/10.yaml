  type: pei
  text: 《魏略》曰：文帝得詡之對太祖，故即位首登上司。荀勗別傳曰：晉司徒闕，武帝問其人於勗。荅曰：「三公具瞻所歸，不可用非其人。昔魏文帝用賈詡爲三公，孫權笑之。」
