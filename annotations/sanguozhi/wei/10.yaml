  length: 0
  type: pei
  text: 《魏書》曰：攸姑子辛韜曾問攸説太祖取冀州時事。攸曰：「佐治爲袁譚乞降，王師自往平之，吾何知焉？」自是韜及内外莫敢復問軍國事也。
