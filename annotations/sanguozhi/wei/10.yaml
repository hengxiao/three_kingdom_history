  text: 《荀氏家傳》曰：曇字元智。兄昱，字伯脩。張璠《漢紀》稱昱、曇並傑俊有殊才。昱與李膺、王暢、杜密等號爲八俊，位至沛相。攸父彝，州從事。彝於彧爲從祖兄弟。
