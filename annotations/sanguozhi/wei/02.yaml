- id: wei.2.p8.a2
  anchor: wei.2.p8
  at: 18
  length: 0
  type: pei
  text: 《魏略》曰：王將出征，度支中郎將新平霍性上踈諫曰：「臣聞文王與紂之事，是時天下括囊無咎，凡百君子，莫肯用訊。今大王體則乾坤，廣開四聦，使賢愚各建所規。伏惟先王功無與比，而今能言之類，不稱爲德。故聖人曰『得百姓之歡心』。兵書曰『戰，危事也』是以六國力戰，彊秦承弊，豳王不爭，周道用興。愚謂大王且當委重本朝而守其雌，抗威虎卧，功業可成。而今刱基，便復起兵，兵者凶器，必有凶擾，擾則思亂，亂出不意。臣謂此危，危於累卵。昔夏啟隱神三年，易有『不遠而復』，論有『不憚改』。誠願大王揆古察今，深謀遠慮，與三事大夫筭其長短。臣沐浴先王之遇，又初改政，復受重任，雖知言觸龍鱗，阿諛近福，竊感所誦，危而不持。」奏通，帝怒，遣刺姦就考，竟殺之。旣而悔之，追原不及。
