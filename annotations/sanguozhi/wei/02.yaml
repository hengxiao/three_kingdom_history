- id: wei.2.p10.a1
  anchor: wei.2.p10
  at: 32
  length: 0
  type: pei
  text: 《魏略》載王自手筆令曰：「吾前遣使宣國威靈，而達即來。吾惟春秋襃儀父，即封拜達，使還領新城太守。近復有扶老攜幼首向王化者。吾聞夙沙之民自縛其君以歸神農，豳國之衆襁負其子而入酆、鎬，斯豈驅略迫脅之所致哉？乃風化動其情而仁義感其衷，歡心內發使之然也。以此而推，西南將萬里無外，權、備將與誰守死乎？」
- id: wei.2.p11.a1
  anchor: wei.2.p11
  at: 22
  length: 0
  type: pei
  text: 《魏書》曰：設伎樂百戲，令曰：「先王皆樂其所生，禮不忘其本。譙，霸王之邦，真人本出，其復譙租稅二年。」三老吏民上壽，日夕而罷。丙申，親祠譙陵。孫盛曰：昔者先王之以孝治天下也，內節天性，外施四海，存盡其敬，亡極其哀，思慕諒闇，寄政冢宰，故曰「三年之喪，自天子達于庶人」。夫然，故在三之義惇，臣子之恩篤，雍熙之化隆，經國之道固，聖人之所以通天地，厚人倫，顯至教，敦風俗，斯萬世不易之典，百王服膺之制也。是故喪禮素冠，鄶人著庶見之譏，宰予降朞，仲尼發不仁之歎，子頹忘戚，君子以爲樂禍，魯侯易服，春秋知其不終，豈不以墜至痛之誠心，喪哀樂之大節者哉？故雖三季之末，七雄之弊，猶未有廢縗斬於旬朔之閒，釋麻杖於反哭之日者也。逮于漢文，變易古制，人道之紀，一旦而廢，縗素奪於至尊，四海散其遏密，義感闕於羣后，大化墜於君親；雖心存貶約，慮在經綸，至於樹德垂聲，崇化變俗，固以道薄於當年，風穨於百代矣。且武王載主而牧野不陣，晉襄墨縗而三帥爲俘，應務濟功，服其焉害。魏王旣追漢制，替其大禮，處莫重之哀而設饗宴之樂，居貽厥之始而墜王化之基，及至受禪，顯納二女，忘其至恤以誣先聖之典，天心喪矣，將何以終！是以知王齡之不遐，卜世之期促也。
