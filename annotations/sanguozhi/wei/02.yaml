  text: 《魏書》曰：丙戌，令史官奏修重、黎、羲、和之職，欽若昊天，歷象日月星辰以奉天時。臣松之案：《魏書》有是言而不聞其職也。丁亥令曰：「故尚書僕射毛玠、奉常王脩、涼茂、郎中令袁渙、少府謝奐、萬潛、中尉徐奕、國淵等，皆忠直在朝，履蹈仁義，並早即世，而子孫陵遲，惻然愍之，其皆拜子男爲郎中。」
