  type: pei
  text: 《魏略》載詔曰：「昔軒轅建四面之號，周武稱『予有亂臣十人』，斯蓋先聖所以體國君民，亮成天工，多賢爲貴也。今內有公卿以鎮京師，外設牧伯以監四方，至於元戎出征，則軍中宜有柱石之賢帥，輜重所在，又宜有鎮守之重臣，然後車駕可以周行天下，無內外之慮。吾今當征賊，欲守之積年。其以尚書令潁鄉侯陳羣爲鎮軍大將軍，尚書僕射西鄉侯司馬懿爲撫軍大將軍。若吾臨江授諸將方略，則撫軍當留許昌，督後諸軍，錄後臺文書事；鎮軍隨車駕，當董督衆軍，錄行尚書事；皆假節鼓吹，給中軍兵騎六百人。吾欲去江數里，築宮室，往來其中，見賊可擊之形，便出奇兵擊之；若或未可，則當舒六軍以遊獵，饗賜軍士。」
