  text: 《魏略》曰：太祖不時立太子，太子自疑。是時有高元呂者，善相人，乃呼問之，對曰：「其貴乃不可言。」問：「壽幾何？」元呂曰：「其壽，至四十當有小苦，過是無憂也。」後無幾而立爲王太子，至年四十而薨。
