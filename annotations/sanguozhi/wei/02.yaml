  type: pei
  text: 《魏書》曰：初，鄭甘、王照及盧水胡率其屬來降，王得降書以示朝曰：「前欲有令吾討鮮卑者，吾不從而降；又有欲使吾及今秋討盧水胡者，吾不聽，今又降。昔魏武侯一謀而當，有自得之色，見譏李悝。吾今說此，非自是也，徒以爲坐而降之，其功大於動兵革也。」
