  text: 《魏書》曰：帝初在東宮，疫癘大起，時人彫傷，帝深感歎，與素所敬者大理王朗書曰：「生有七尺之形，死爲一棺之土，唯立德揚名，可以不朽，其次莫如著篇籍。疫癘數起，士人彫落，余獨何人，能全其壽？」故論撰所著《典論》、詩賦，蓋百餘篇，集諸儒於肅城門內，講論大義，侃侃無倦。常嘉漢文帝之爲君，寬仁玄默，務欲以德化民，有賢聖之風。時文學諸儒，或以爲孝文雖賢，其於聦明，通達國體，不如賈誼。帝由是著《太宗論》曰：「昔有苗不賔，重華舞以干戚，尉他稱帝，孝文撫以恩德，吳王不朝，錫之几杖以撫其意，而天下賴安；乃弘三章之教，愷悌之化，欲使曩時累息之民，得闊步高談，無危懼之心。若賈誼之才敏，籌畫國政，特賢臣之器，管、晏之姿，豈若孝文大人之量哉？」三年之中，以孫權不服，復班太宗論於天下，明示不願征伐也。他日又從容言曰：「顧我亦有所不取於漢文帝者三：殺薄昭；幸鄧通；慎夫人衣不曳地，集上書囊爲帳帷。以爲漢文儉而無法，舅后之家，但當養育以恩而不當假借以權，旣觸罪法，又不得不害矣。」其欲秉持中道，以爲帝王儀表者如此。胡沖《吳歷》曰：帝以素書所著《典論》及詩賦餉孫權，又以紙寫一通與張昭。
