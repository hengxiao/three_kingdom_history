  type: pei
  text: 袁宏《漢紀》載漢帝詔曰：「魏太子丕：昔皇天授乃顯考以翼我皇家，遂攘除羣凶，拓定九州，弘功茂績，光于宇宙，朕用垂拱負扆二十有餘載。天不憖遺一老，永保余一人，早世潛神，哀悼傷切。丕奕世宣明，宜秉文武，紹熙前緒。今使使持節御史大夫華歆奉策詔授丕丞相印綬、魏王璽紱，領冀州牧。方今外有遺虜，遐夷未賔，旗鼓猶在邊境，干戈不得韜刃，斯乃播揚洪烈，立功垂名之秋也。豈得脩諒闇之禮，究曾、閔之志哉？其敬服朕命，抑弭憂懷，旁祗厥緒，時亮庶功，以稱朕意。於戲，可不勉與！」
