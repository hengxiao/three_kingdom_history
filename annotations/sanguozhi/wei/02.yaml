  text: 管子曰：黃帝立明臺之議者，上觀於兵也；堯有衢室之問者，下聽於民也；舜有告善之旌，而主不蔽也；禹立建鼓於朝，而備訴訟也；湯有總街之廷，以觀民非也；武王有靈臺之囿，而賢者進也：此古聖帝明王所以有而勿失，得而勿忘也。
