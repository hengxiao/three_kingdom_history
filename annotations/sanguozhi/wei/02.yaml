- id: wei.2.p26.a1
  anchor: wei.2.p26
  at: 75
  length: 0
  type: pei
  text: 孫盛曰：夫經國營治，必憑俊喆之輔，賢達令德，必居參亂之任，故雖周室之盛，有婦人與焉。然則坤道承天，南面罔二，三從之禮，謂之至順，至於號令自天子出，奏事專行，非古義也。昔在申、呂，實匡有周。苟以天下爲心，惟德是杖，則親疏之授，至公一也，何至后族而必斥遠之哉？二漢之季世，王道陵遲，故令外戚憑寵，職爲亂階。於此，自時昏道喪，運祚將移，縱無王、呂之難，豈乏田、趙之禍乎？而後世觀其若此，深懷酸毒之戒也。至於魏文，遂發一概之詔，可謂有識之爽言，非帝者之宏議。
