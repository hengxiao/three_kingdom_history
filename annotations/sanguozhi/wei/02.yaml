  text: 《魏書》曰：帝生時，有雲氣青色而圜如車盖當其上，終日，望氣者以爲至貴之證，非人臣之氣。年八歲，能屬文。有逸才，遂博貫古今經傳諸子百家之書。善騎射，好擊劔。舉茂才，不行。《獻帝起居注》曰：建安十五年，爲司徒趙溫所辟。太祖表「溫辟臣子弟，選舉故不以實」。使侍中守光祿勳郗慮持節奉策免溫官。
