  text: 《魏書》載丙午詔曰：「孫權殘害民物，朕以寇不可長，故分命猛將三道並征。今征東諸軍與權黨呂範等水戰，則斬首四萬，獲船萬艘。大司馬據守濡須，其所禽獲亦以萬數。中軍、征南攻圍江陵，左將軍張郃等舳艫直渡，擊其南渚，賊赴水溺死者數千人，又爲地道攻城，城中外雀鼠不得出入，此几上肉耳！而賊中癘氣疾病，夾江塗地，恐相染污。昔周武伐殷，旋師孟津，漢祖征隗嚻，還軍高平，皆知天時而度賊情也。且成湯解三面之網，天下歸仁。今開江陵之圍，以緩成死之禽。且休力役，罷省繇戍，畜養士民，咸使安息。」
