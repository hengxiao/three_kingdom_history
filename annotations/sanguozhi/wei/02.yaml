  text: 臣松之案：諸書記是時帝居北宮，以建始殿朝羣臣，門曰承明，陳思王植詩曰「謁帝承明廬」是也。至明帝時，始於漢南宮崇德殿處起太極、昭陽諸殿。《魏書》曰：以夏數爲得天，故即用夏正，而服色尚黃。《魏略》曰：詔以漢火行也，火忌水，故「洛」去「水」而加「隹」。魏於行次爲土，土，水之牡也，水得土而乃流，土得水而柔，故除「隹」加「水」，變「雒」爲「洛」。
