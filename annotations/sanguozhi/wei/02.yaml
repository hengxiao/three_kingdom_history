  text: 《魏略》曰：以侍中鄭稱爲武德侯傅，令曰：「龍淵、太阿出昆吾之金，和氏之璧由井里之田；礱之以砥礪，錯之以他山，故能致連城之價，爲命世之寶。學亦人之砥礪也。稱篤學大儒，勉以經學輔侯，宜旦夕入侍，曜明其志。」
- id: wei.2.p6.a2
  anchor: wei.2.p6
  at: 58
