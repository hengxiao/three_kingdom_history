  text: 《魏書》曰：己亥，公卿朝朔旦，并引故漢太尉楊彪，待以客禮，詔曰：「夫先王制几杖之賜，所以賔禮黃耇襃崇元老也。昔孔光、卓茂皆以淑德高年，受茲嘉錫。公故漢宰臣，乃祖已來，世著名節，年過七十，行不踰矩，可謂老成人矣，所宜寵異以章舊德。其賜公延年杖及馮几；謁請之日，便使杖入，又可使著鹿皮冠。」彪辭讓不聽，竟著布單衣、皮弁以見。《續漢書》曰：彪見漢祚將終，自以累世爲三公，恥爲魏臣，遂稱足攣，不復行。積十餘年，帝即王位，欲以爲太尉，令近臣宣旨。彪辭曰：「甞以漢朝爲三公，值世衰亂，不能立尺寸之益，若復爲魏臣，於國之選，亦不爲榮也。」帝不奪其意。黃初四年，詔拜光祿大夫，秩中二千石，朝見位次三公，如孔光故事。彪上章固讓，帝不聽，又爲門施行馬，致吏卒，以優崇之。年八十四，以六年薨。子脩，事見〈陳思王傳〉。
- id: wei.2.p20.a2
  anchor: wei.2.p20
  at: 64
  length: 0
  type: pei
  text: 《魏書》曰：十一月辛未，鎮西將軍曹真命衆將及州郡兵討破叛胡治元多、蘆水、封賞等，斬首五萬餘級，獲生口十萬，羊一百一十一萬口，牛八萬，河西遂平。帝初聞胡決水灌顯美，謂左右諸將曰：「昔隗嚻灌略陽，而光武因其疲弊，進兵滅之。今胡決水灌顯美，其事正相似，破胡事今至不久。」旬日，破胡告檄到，上大笑曰：「吾策之於帷幕之內，諸將奮擊於萬里之外，其相應若合符契。前後戰克獲虜，未有如此也。」
