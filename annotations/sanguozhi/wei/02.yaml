  type: pei
  text: 《魏書》曰：權及領南郡太守史郃等三百一十八人，詣荊州刺史奉上所假印綬、棨戟、幢麾、牙門、鼓車。權等詣行在所，帝置酒設樂，引見於承光殿。權、郃等人人前自陳，帝爲論說軍旅成敗去就之分，諸將無不喜恱。賜權金帛、車馬、衣裘、帷帳、妻妾，下及偏裨皆有差。拜權爲侍中鎮南將軍，封列侯，即日召使驂乘；及封史郃等四十二人皆爲列侯，爲將軍郎將百餘人。
