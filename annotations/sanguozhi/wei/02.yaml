  type: pei
  text: 《魏書》載詔曰：「潁川，先帝所由起兵征伐也。官渡之役，四方瓦解，遠近顧望，而此郡守義，丁壯荷戈，老弱負糧。昔漢祖以秦中爲國本，光武恃河內爲王基，今朕復於此登壇受禪，天以此郡翼成大魏。」
- id: wei.2.p17.a3
  anchor: wei.2.p17
