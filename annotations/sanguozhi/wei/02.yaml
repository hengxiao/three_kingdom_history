  text: 《魏書》載帝於馬上爲詩曰：「觀兵臨江水，水流何湯湯！戈矛成山林，玄甲曜日光。猛將懷暴怒，膽氣正從橫。誰云江水廣，一葦可以航，不戰屈敵虜，戢兵稱賢良。古公宅岐邑，實始翦殷商。孟獻營虎牢，鄭人懼稽顙。充國務耕殖，先零自破亡。興農淮泗間，築室都徐方。量宜運權略，六軍咸恱康；豈如東山詩，悠悠多憂傷。」
