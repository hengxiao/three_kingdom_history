  text: 《漢書》高祖八月令曰：「士卒從軍死，爲槥。」應劭曰：「槥，小棺也，今謂之櫝。」應璩百一詩曰：「槥車在道路，征夫不得休。」陸機大墓賦曰：「觀細木而悶遲，覩洪櫝而念槥。」
- id: wei.2.p13.a1
  anchor: wei.2.p13
  at: 15
  length: 0
  type: pei
  text: 袁宏《漢紀》載漢帝詔曰：「朕在位三十有二載，遭天下蕩覆，幸賴祖宗之靈，危而復存。然仰瞻天文，俯察民心，炎精之數旣終，行運在乎曹氏。是以前王旣樹神武之績，今王又光曜明德以應其期，是歷數昭明，信可知矣。夫大道之行，天下爲公，選賢與能，故唐堯不私於厥子，而名播於無窮。朕羨而慕焉，今其追踵堯典，禪位于魏王。」
