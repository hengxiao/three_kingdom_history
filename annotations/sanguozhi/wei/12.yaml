  at: 97
  length: 0
  type: pei
  text: 《先賢行狀》曰：玠雅亮公正，在官清恪。其典选舉，拔貞實，斥華僞，进遜行，抑阿党。諸宰官治民功绩不著而私财丰足者，皆免黜停废，久不选用。于時四海翕然，莫不励行。至乃長吏還者，垢面羸衣，常乘柴车。軍吏入府，朝服徒行。人拟壶飧之絜，家象濯缨之操，貴者無秽欲之累，賤者绝姦货之求，吏絜于上，俗移乎下，民到于今稱之。
- id: wei.12.p17.a1
  anchor: wei.12.p17
  at: 20
  length: 0
  type: pei
  text: 孫盛曰：魏武於是失政刑矣。《易》稱『明折庶獄』，《傳》有『舉直措枉』，庶獄明則國無怨民，枉直當則民無不服，未有徵青蝇之浮聲，信浸润之谮诉，可以允釐四海，惟清缉熙者也。昔者漢高獄萧何，出復相之，玠之一责，永見摈放，二主度量，豈不殊哉！
- id: wei.12.p18.a1
  anchor: wei.12.p18
  at: 119
  length: 0
  type: pei
  text: 《魏書》曰：或謂奕曰：『夫以史魚之直，孰與蘧伯玉之智？丁儀方貴重，宜思所以下之。』奕曰：『以公明聖，儀豈得行其僞乎！且奸以事君者，吾所能御也，子寧以他規我。』《傅子》曰：武皇帝，至明也。崔琰、徐奕，一時清賢，皆以忠信顯於魏朝；丁儀間之，徐奕失位而崔琰被誅。
- id: wei.12.p19.a1
  anchor: wei.12.p19
  at: 148
  length: 0
  type: pei
  text: 《魏書》曰：文帝每與朝臣會同，未嘗不嗟歎，思奕之爲人。奕無子，詔以其族子統爲郎，以奉奕後。
- id: wei.12.p20.a1
  anchor: wei.12.p20
  at: 29
  length: 0
  type: pei
  text: 華峤《漢書》曰：熙字孟孫，少有大志，不拘小節。身長八尺五寸，体貌魁梧，善爲容儀。舉孝廉，爲谒者，贊拜殿中，音动左右。和帝（佳）之，历位司隸校尉、大司农。永初三年，南单于與乌丸俱反，以熙行车騎將軍征之，累有功。乌丸请降，单于復稱臣如舊。會熙暴疾卒。
- id: wei.12.p20.a2
  anchor: wei.12.p20
  at: 55
  length: 0
  type: pei
  text: 《魏書》曰：漢末阉宦用事，夔從父衡爲尚書，有直言，由是在党中，諸父兄皆禁锢。夔歎曰：『天地闭，賢人隱。』故不应宰司之命。
