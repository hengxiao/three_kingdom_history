  type: pei
  text: 《世語》曰：植妻衣繡，太祖登臺見之，以違制命還家賜死。
- id: wei.12.p8.a1
  anchor: wei.12.p8
  at: 34
  length: 0
  type: pei
  text: 先賢行狀曰：琰清忠高亮，雅識經遠，推方直道，正色於朝。魏氏初載，委授銓衡，總齊清議，十有餘年。文武羣才，多所明拔。朝廷歸高，天下稱仁。
- id: wei.12.p8.a2
  anchor: wei.12.p8
  at: 252
  length: 0
  type: pei
  text: 《魏略》曰：人得琰書，以裹幘籠，持其籠行都道中。時有與琰宿不平者，遙見琰名著幘籠，從而視之，遂白之。太祖以爲琰腹誹心謗，乃收付獄，髡刑輸徒。前所白琰者又復白之云：『琰爲徒，虬鬚直視，心似不平。』時太祖亦以爲然，遂欲殺之。乃使清公大吏往經营琰，敕吏曰：『三日期消息。』琰不悟，後數日，吏故白琰平安。公忿然曰：『崔琰必欲使孤行刀鋸乎！』吏以是教告琰，琰謝吏曰：『我殊不宜，不知公意至此也！』遂自殺。
- id: wei.12.p9.a1
