  at: 196
  length: 0
  type: pei
  text: 孫盛曰：夫君使臣以禮，臣事君以忠，是以上下休嘉，道光化洽。公府掾属，古之造士也，必擢時隽，搜揚英逸，得其人則論道之任隆，非其才則覆餗之患至。苟有疵衅，刑黜可也。加其捶扑之罰，肃以小惩之戒，豈『导之以德，齊之以禮』之謂與！然士之出处，宜度德投趾；可不之節，必审於所蹈。故高尚之徒，抗心於青云之表，豈王侯之所能臣，名器之所羁绁哉！自非此族，委身世塗，否泰荣辱，制之由時，故箕子安於孥戮，柳下夷於三黜，萧何、周勃亦在縲绁，夫豈不辱，君命故也。夔知時制，而甘其寵，挟药要君，以避微耻。詩云『唯此褊心』，何夔其有焉。放之，可也；宥之，非也。
- id: wei.12.p21.a2
  anchor: wei.12.p21
