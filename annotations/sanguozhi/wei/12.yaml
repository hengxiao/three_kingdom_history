  length: 0
  type: pei
  text: 《魏書》曰：時丁儀兄弟方进寵，儀與夔不合。尚書傅巽謂夔曰：『儀不相好已甚，子友毛玠，玠等儀已害之矣。子宜少下之！』夔曰：『爲不義適足害其身，焉能害人？且怀奸佞之心，立於明朝，其得久乎！』夔終不屈志，儀后果以凶僞敗。
- id: wei.12.p29.a1
  anchor: wei.12.p29
  at: 11
  length: 0
  type: pei
  text: 干寶《晉紀》曰：曾字颖考。正元中爲司隸校尉。時毌丘儉孫女適劉氏，以孕系廷尉。女母荀，爲武卫將軍荀顗所表活，既免，辭诣廷尉，乞爲官婢以赎女命。曾使主簿程咸爲議，議曰：『大魏承奏、漢之弊，未及革制。所以追戮已出之女，誠欲殄丑類之族也。若已产育，則成他家之母。於防則不足惩姦亂之源，於情則傷孝子之思，男不御罪於他族，而女獨婴戮於二門，非所以哀矜女弱，均法制之大分也。臣以爲在室之女，可從父母之刑，既醮之妇，使從夫家之戮。』朝廷從之，乃定律令。《晉諸公贊》曰：曾以高雅稱，加性纯孝，位至太宰，封朗陵縣公。年八十餘薨，諡曰元公。子邵嗣。邵字敬祖，才識深博，有經國体儀。位亦至太宰，諡康公。子蕤嗣。邵庶兄遵，字思祖，有幹能。少經清職，終於太僕。遵子绥，字伯蔚，亦以幹事稱。永嘉中爲尚書，爲司馬越所殺。《傅子》稱曾及荀顗曰：『以文王之道事其親者，其潁昌何侯乎！其荀侯乎！古稱曾、闵，今曰荀、何。内尽其心以事其親，外崇禮讓以接天下。孝子，百世之宗；仁人，天下之令也。有能行仁孝之道者，君子之儀表矣。』
