  type: pei
  text: 《晉諸公贊》曰：顒曾孫乔，字曾伯。有体量局幹，美於當世。历清職。元康中，與劉涣俱爲尚書吏部郎，稍遷至司隸校尉。
- id: wei.12.p33.a1
  anchor: wei.12.p33
  at: 92
  length: 0
  type: pei
  text: 《魏書》曰：信父丹，官至少府侍中，世以儒雅顯。少有大節，寬厚愛人，沈毅有謀。大將軍何进辟拜騎都尉，遣歸募兵，得千餘人，還到成皋而进已遇害。信至京師，董卓亦始到。信知卓必爲亂，劝袁紹襲卓，紹畏卓不敢发。語在《紹傳》。信乃引軍還鄉里，收徒眾二萬，騎七百，辎重五千餘乘。是歲，太祖始起兵於己吾，信與弟韬以兵应太祖。太祖與袁紹表信行破虏將軍，韬裨將軍。時紹眾最盛，豪杰多向之。信獨謂太祖曰：『夫略不世出，能總英雄以拨亂反正者，君也。苟非其人，雖强必毙。君殆天之所启！』遂深自结納，太祖亦親異焉。汴水之敗，信被疮，韬在陳戰亡。紹劫夺韓馥位，遂据冀州。信言於太祖曰：『奸臣乘衅，荡覆王室，英雄奋節，天下鄉应者，義也。今紹爲盟主，因权专利，將自生亂，是復有一卓也。若抑之，則力不能制，祗以遘難，又何能濟？且可規大河之南，以待其變。』太祖善之。太祖爲東郡太守，表信爲濟北相。會黄巾大眾入州界，劉岱欲與戰，信止之，岱不從，遂敗。語在《武紀》。太祖以賊恃勝而骄，欲設奇兵挑擊之於壽張。先與信出行戰地，后步軍未至，而卒與賊遇，遂接戰。信殊死戰，以救太祖，太祖仅得溃围出，信遂没，時年四十一。雖遭亂起兵，家本修儒，治身至儉，而厚养將士，居無餘财，士以此歸之。
