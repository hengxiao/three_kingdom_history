  text: 《魏略》曰：勛字子臺，琅邪人。中平末，爲沛國建平長，與太祖有舊。后爲庐江太守，爲孫策所破，自歸太祖，封列侯，遂從在散伍議中。勛兄爲豫州刺史，病亡。兄子威，又代從政。勛自恃與太祖有宿，日骄慢，數犯法，又誹謗。爲李申成所白，收治，並免威官。
