  at: 43
  length: 0
  type: pei
  text: 臣松之案：『跱』或作『特』，竊謂『英特』爲是也。
- id: wei.12.p9.a2
  anchor: wei.12.p9
  at: 189
  length: 0
  type: pei
  text: 《魏略》曰：明帝時，崔林嘗與司空陳羣共論冀州人士，稱琰爲首。羣以『智不存身』貶之。林曰：『大丈夫爲有邂逅耳，即如卿諸人，良足貴乎！』
- id: wei.12.p10.a1
  anchor: wei.12.p10
  at: 18
  length: 0
  type: pei
  text: 融字文舉。《續漢書》曰：融，孔子二十世孫也。高祖父尚，鉅鹿太守。父宙，太山都尉。融幼有異才。時河南尹李膺有重名，敕門下簡通賓客，非當世英賢及通家子孫弗見也。融年十餘歲，欲觀其爲人，遂造膺門，語門者曰：『我，李君通家子孫也。』膺見融，問曰：『高明父祖，嘗與僕周旋乎？』融曰：『然。先君孔子與君先人李老君，同德比義而相師友，則融與君累世通家也。』眾坐奇之，僉曰：『異童子也。』太中大夫陳煒後至，同坐以告煒，煒曰：『人小時了了者，大亦未必奇也。』融答曰：『即如所言，君之幼時，豈實慧乎！』膺大笑，顧謂曰：『高明長大，必爲偉器。』山陽張儉，以中正爲中常侍侯覽所忿疾，覽爲刊章下州郡捕儉。儉與融兄褒有舊，亡投褒。遇褒出，時融年十六，儉以其少不告也。融知儉長者，有窘迫色，謂曰：『吾獨不能爲君主邪！』因留舍藏之。後事泄，國相以下密就掩捕，儉得脱走，登時收融及褒送獄。融曰：『保納藏舍者融也，融當坐之。』褒曰：『彼來求我，罪我之由，非弟之過，我當坐之。』兄弟爭死，郡縣疑不能决，乃上讞，詔書令褒坐焉。融由是名震遠近，與平原陶丘洪、陳留邊讓，並以俊秀，爲後进冠蓋。融持論經理不及讓等，而逸才宏博過之。司徒大將軍辟舉高第，累遷北軍中候、虎賁中郎將、北海相，時年二十八。承黄巾殘破之後，修復城邑，崇學校，設庠序，舉賢才，顯儒士。以彭璆爲方正，邴原爲有道，王脩爲孝廉。告高密縣爲鄭玄特立一鄉，名爲鄭公鄉。又國人無后，及四方遊士有死亡者，皆爲棺木而殯葬之。郡人甄子然孝行知名，早卒，融恨不及之，乃令配食縣社。其禮賢如此。在郡六年，劉備表融領青州刺史。建安元年，徵還爲將作大匠，遷少府。每朝會訪對，輒爲議主，諸卿大夫寄名而已。司馬彪《九州春秋》曰：融在北海，自以智能優贍，溢才命世，當時豪俊皆不能及。亦自許大志，且欲舉軍曜甲，與羣賢要功，自於海岱结殖根本，不肯碌碌如平居郡守，事方伯、赴期會而已。然其所任用，好奇取異，皆輕剽之才。至於稽古之士，謬爲恭敬，禮之雖備，不與論國事也。高密鄭玄，稱之鄭公，執子孫禮。及高談教令，盈溢官曹，辭氣温雅，可玩而誦。論事考實，難可悉行。但能張磔網羅，其自理甚疏。租賦少稽，一朝殺五部督郵。奸民污吏，猾亂朝市，亦不能治。幽州精兵亂，至徐州，卒到城下，舉國皆恐。融直出说之，令無異志。遂與别校謀夜覆幽州，幽州軍敗，悉有其眾。無几時，還復叛亡。黄巾將至，融大飲醇酒，躬自上馬，御之淶水之上。寇令上部與融相拒，两翼径涉水，直到所治城。城溃，融不得入，转至南縣，左右稍叛。连年倾覆，事無所濟，遂不能保鄣四境，棄郡而去。后徙徐州，以北海相自還領青州刺史，治郡北陲。欲附山東，外接辽東，得戎馬之利，建树根本，孤立一隅，不與共也。于時曹、袁、公孫共相首尾，戰士不滿數百，谷不至萬斛。王子法、劉孔慈凶辩小才，信爲腹心。左丞祖、劉義遜清隽之士，備在坐席而已，言此民望，不可失也。丞祖劝融自讬强國，融不聽而殺之。義遜棄去。遂爲袁谭所攻，自春至夏，城小寇眾，流矢雨集。然融凭几安坐，讀書論議自若。城壞眾亡，身奔山東，室家爲谭所虏。張璠《漢紀》曰：融在郡八年，仅以身免。帝初都許，融以爲宜略依舊制，定王畿，正司隸所部爲千里之封，乃引公卿上書言其義。是時天下草创，曹、袁之权未分，融所建明，不識時务。又天性氣爽，頗推平生之意，狎侮太祖。太祖制酒禁，而融書啁之曰：『天有酒旗之星，地列酒泉之郡，人有旨酒之德，故尧不飲千锺，無以成其聖。且桀紂以色亡國，今令不禁婚姻也。』太祖外雖寬容，而内不能平。御史大夫郗虑知旨，以法免融官。歲餘，拜太中大夫。雖居家失勢，而賓客日滿其門，愛才樂酒，常歎曰：『坐上客常滿，樽中酒不空，吾無忧矣。』虎賁士有貌似蔡邕者，融每酒酣，輒引與同坐，曰：『雖無老成人，尚有典刑。』其好士如此。《續漢書》曰：太尉楊彪與袁术婚姻，术僭號，太祖與彪有隙，因是執彪，將殺焉。融聞之，不及朝服，往見太祖曰：『楊公累世清德，四叶重光，周書「父子兄弟，罪不相及」，况以袁氏之罪乎？易稱「积善餘慶」，但欺人耳。』太祖曰：『國家之意也。』融曰：『假使成王欲殺召公，則周公可得言不知邪？今天下缨緌搢绅之士所以瞻仰明公者，以明公聰明仁智，輔相漢朝，舉直措枉，致之雍熙耳。今横殺無辜，則海内觀聽，谁不解体？孔融魯國男子，明日便當褰衣而去，不復朝矣。』太祖意解，遂理出彪。《魏氏春秋》曰：袁紹之敗也，融與太祖書曰：『武王伐紂，以妲己賜周公。』太祖以融學博，謂書傳所紀。后見，問之，對曰：『以今度之，想其當然耳！』十三年，融對孫權使，有讪謗之言，坐棄市。二子年八歲，時方弈棋，融被收，端坐不起。左右曰：『而父見執，不起何也？』二子曰：『安有巢毁而卵不破者乎！』遂俱見殺。融有高名清才，世多哀之。太祖惧遠近之議也，乃令曰：『太中大夫孔融既伏其罪矣，然世人多采其虚名，少於核實，見融浮艳，好作變異，眩其诳诈，不復察其亂俗也。此州人说平原祢衡受傳融論，以爲父母與人無親，譬若鲊器，寄盛其中，又言若遭饥馑，而父不肖，寧贍活餘人。融違天反道，敗倫亂理，雖肆市朝，猶恨其晚。更以此事列上，宣示諸軍將校掾属，皆使聞見。』《世語》曰：融二子，皆龆龀。融見收，顧謂二子曰：『何以不辭？』二子俱曰：『父尚如此，復何所辭！』以爲必俱死也。臣松之以爲《世語》云融二子不辭，知必俱死，猶差可安。如孫盛之言，誠所未譬。八歲小兒，能玄了祸福，聰明特达，卓然既遠，則其忧樂之情，宜其有過成人，安有見父收執而曾無變容，弈釭不起，若在暇豫者乎？昔申生就命，言不忘父，不以己身將死而废念父之情也。父安猶尚若兹，而况於颠沛哉？盛以此爲美談，無乃賊夫人之子與！蓋由好奇情多，而不知言之傷理。
- id: wei.12.p10.a2
  anchor: wei.12.p10
  at: 23
  length: 0
  type: pei
  text: 《魏略》曰：攸字子遠，少與袁紹及太祖善。初平中随紹在冀州，嘗在坐席言議。官渡之役，諫紹勿與太祖相攻，語在《紹傳》。紹自以强盛，必欲极其兵勢。攸知不可爲謀，乃亡诣太祖。紹破走，及后得冀州，攸有功焉。攸自恃勛勞，時與太祖相戏，每在席，不自限齊，至呼太祖小字，曰：『某甲，卿不得我，不得冀州也。』太祖笑曰：『汝言是也。』然内嫌之。其后從行出鄴東門，顧謂左右曰：『此家非得我，則不得出入此門也。』人有白者，遂見收之。
- id: wei.12.p10.a3
  anchor: wei.12.p10
  at: 35
  length: 0
  type: pei
  text: 《魏略》曰：娄圭字子伯，少與太祖有舊。初平中在荆州北界合眾，后诣太祖。太祖以爲大將，不使典兵，常在坐席言議。及河北平定，随在冀州。其后太祖從諸子出遊，子伯時亦随從。子伯顧謂左右曰：『此家父子，如今日爲樂也。』人有白者，太祖以爲有腹誹意，遂收治之。《吴書》曰：子伯少有猛志，嘗歎息曰：『男兒居世，會當得數萬兵千匹騎著后耳！』儕輩笑之。后坐藏亡命，被系當死，得逾獄出，捕者追之急，子伯乃變衣服如助捕者，吏不能觉，遂以得免。會天下義兵起，子伯亦合眾與劉表相依。后歸曹公，遂爲所用，軍國大計常與焉。劉表亡，曹公向荆州。表子琮降，以節迎曹公，諸將皆疑诈，曹公以問子伯。子伯曰：『天下扰攘，各貪王命以自重，今以節來，是必至誠。』曹公曰：『大善。』遂进兵。寵秩子伯，家累千金，曰：『娄子伯富樂于孤，但勢不如孤耳！』從破馬超等，子伯功爲多。曹公常歎曰：『子伯之計，孤不及也。』后與南郡习授同載，見曹公出，授曰：『父子如此，何其快耶！』子伯曰：『居世間，當自爲之，而但觀他人乎！』授乃白之，遂見誅。魚豢曰：古人有言曰：「得鳥者，羅之一目也，然張一目之羅，終不得鳥矣。鳥能遠飞，遠飞者，六翮之力也，然無眾毛之助，則飞不遠矣。」以此推之，大魏之作，雖有功臣，亦未必非兹輩胥附之由也。
- id: wei.12.p10.a4
