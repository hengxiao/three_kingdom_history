  at: 218
  length: 0
  type: pei
  text: 《三輔決錄》曰：伯郎，涼州人，名不令休。其注曰：伯郎姓孟，名他，扶風人。靈帝時。中常侍張讓專朝政，讓監奴典護家事。他仕不遂，乃盡以家財賂監奴，與共結親，積年家業爲之破盡。衆奴皆慙，問他所欲，他曰：「欲得卿曹拜耳。」奴被恩久，皆許諾。時賔客求見讓者，門下車常數百乘，或累日不得通。他最後到，衆奴伺其至，皆迎車而拜，徑將他車獨入。衆人悉驚，謂他與讓善，爭以珍物遺他。他得之，盡以賂讓，讓大喜。他又以蒲桃酒一斛遺讓，即拜涼州刺史。他生達，少入蜀。其處蜀事迹在劉封傳。《魏略》曰：達以延康元年率部曲四千餘家歸魏。文帝時初即王位，旣宿知有達，聞其來，甚恱，令貴臣有識察者往觀之，還曰「將帥之才也」，或曰「卿相之器也」，王益欽達。逆與達書曰：「近日有命，未足達旨，何者？昔伊摯背商而歸周，百里去虞而入秦，樂毅感鴟夷以蟬蛻，王遵識逆順以去就，皆審興廢之符效，知成敗之必然，故丹青畫其形容，良史載其功勳。聞卿姿度純茂，器量優絕，當騁能明時，收名傳記。今者翻然濯鱗清流，甚相嘉樂，虛心西望，依依若舊，下筆屬辭，歡心從之。昔虞卿入趙，再見取相，陳平就漢，一覲參乘，孤今於卿，情過於往，故致所御馬物以昭忠愛。」又曰：「今者海內清定，萬里一統，三垂無風塵之警，中夏無狗吠之虞，以是弛罔闊禁，與世無疑，保官空虛，初無資任。卿來相就，當明孤意，慎勿令家人繽紛道路，以親駭疏也。若卿欲來相見，且當先安部曲，有所保固，然後徐徐輕騎來東。」達旣至譙，進見閑雅，才辯過人，衆莫不屬目。又王近出，乘小輦，執達手，撫其背戲之曰：「卿得無爲劉備刺客邪？」遂與同載。又加拜散騎常侍，領新城太守，委以西南之任。時衆臣或以爲待之太猥，又不宜委以方任。王聞之曰：「吾保其無他，亦譬以蒿箭射蒿中耳。」達旣爲文帝所寵，又與桓階、夏侯尚親善，及文帝崩，時桓、尚皆卒，達自以羈旅久在疆場，心不自安。諸葛亮聞之，陰欲誘達，數書招之，達與相報荅。魏興太守申儀與達有隙，密表達與蜀潛通，帝未之信也。司馬宣王遣參軍梁幾察之，又勸其入朝。達驚懼，遂反。干寶《晉紀》曰：達初入新城，登白馬塞，歎曰：「劉封、申耽，據金城千里而失之乎！」
- id: wei.3.p5.a1
  anchor: wei.3.p5
  at: 20
  length: 0
  type: pei
  text: 《魏略》曰：宣王誘達將李輔及達甥鄧賢，賢等開門內軍。達被圍旬有六日而敗，焚其首于洛陽四達之衢。
- id: wei.3.p6.a1
  anchor: wei.3.p6
  at: 25
  length: 0
  type: pei
  text: 《魏書》曰：是時朝臣未知計所出，帝曰：「亮阻山爲固，今者自來，旣合兵書致人之術；且亮貪三郡，知進而不知退，今因此時，破亮必也。」乃部勒兵馬步騎五萬拒亮。
- id: wei.3.p6.a2
  anchor: wei.3.p6
  at: 71
  length: 0
  type: pei
  text: 《魏略》載帝露布天下并班告益州曰：「劉備背恩，自竄巴蜀。諸葛亮棄父母之國，阿殘賊之黨，神人被毒，惡積身滅。亮外慕立孤之名，而內貪專擅之實。劉升之兄弟守空城而已。亮又侮易益土，虐用其民，是以利狼、宕渠、高定、青羌莫不瓦解，爲亮仇敵。而亮反裘負薪，裏盡毛殫，刖趾適屨，刻肌傷骨，反更稱說，自以爲能。行兵於井底，游步於牛蹄。自朕即位，三邊無事，猶哀憐天下數遭兵革，且欲養四海之耆老，長後生之孤幼，先移風於禮樂，次講武於農隙，置亮畫外，未以爲虞。而亮懷李熊愚勇之智，不思荊邯度德之戒，驅略吏民，盜利祁山。王師方振，膽破氣奪，馬謖、高祥望旗奔敗。虎臣逐北，蹈尸涉血，亮也小子，震驚朕師。猛銳踊躍，咸思長驅。朕惟率土莫非王臣，師之所處，荊棘生焉，不欲使十室之邑忠信貞良與夫淫昏之黨，同受塗炭。故先開示，以昭國誠，勉思變化，無滯亂邦。巴蜀將吏士民諸爲亮所劫迫，公卿已下皆聽束手。」
- id: wei.3.p6.a3
  anchor: wei.3.p6
  at: 82
  length: 0
  type: pei
  text: 《魏略》曰：是時譌言云帝已崩，從駕羣臣迎立雍丘王植。京師自卞太后羣公盡懼。及帝還，皆私察顏色。卞太后悲喜，欲推始言者，帝曰：「天下皆言，將何所推？」
- id: wei.3.p6.a4
  anchor: wei.3.p6
  at: 271
  length: 0
  type: pei
  text: 《魏略》曰：先是使將軍郝昭築陳倉城；會亮至，圍昭，不能拔。昭字伯道，太原人，爲人雄壯，少入軍爲部曲督，數有戰功，爲雜號將軍，遂鎮守河西十餘年，民夷畏服。亮圍陳倉，使昭鄉人靳詳於城外遙說之，昭於樓上應詳曰：「魏家科法，卿所練也；我之爲人，卿所知也。我受國恩多而門戶重，卿無可言者，但有必死耳。卿還謝諸葛，便可攻也。」詳以昭語告亮，亮又使詳重說昭，言人兵不敵，無爲空自破滅。昭謂詳曰：「前言已定矣。我識卿耳，箭不識也。」詳乃去。亮自以有衆數萬，而昭兵纔千餘人，又度東救未能便到，乃進兵攻昭，起雲梯衝車以臨城。昭於是以火箭逆射其雲梯，梯然，梯上人皆燒死。昭又以繩連石磨壓其衝車，衝車折。亮乃更爲井闌百尺以付城中，以土丸填壍，欲直攀城，昭又於內築重牆。亮足爲城突，欲踊出於城裏，昭又於城內穿地橫截之。晝夜相攻拒二十餘日，亮無計，救至，引退。詔嘉昭善守，賜爵列侯。及還，帝引見慰勞之，顧謂中書令孫資曰：「卿鄉里乃有爾曹快人，爲將灼如此，朕復何憂乎？」仍欲大用之。會病亡，遺令戒其子凱曰：「吾爲將，知將不可爲也。吾數發冢，取其木以爲攻戰具，又知厚葬無益於死者也。汝必斂以時服。且人生有處所耳，死復何在邪？今去本墓遠，東西南北，在汝而已。」
- id: wei.3.p10.a1
  anchor: wei.3.p10
  at: 63
  length: 0
  type: pei
  text: 臣松之按：黃初四年，有司奏立二廟，太皇帝大長秋與文帝之高祖共一廟，特立武帝廟，百世不毀。今此無高祖神主，蓋以親盡毀也。此則魏初唯立親廟，祀四室而已。至景初元年，始定七廟之制。孫盛曰：事亡猶存，祭如神在，迎遷神主，正斯宜矣。
- id: wei.3.p12.a1
  anchor: wei.3.p12
  at: 245
  length: 0
  type: pei
  text: 《魏書》曰：行過繁昌，使執金吾臧霸行太尉事，以特牛祠受禪壇。臣松之按：《漢紀》章帝元和三年，詔高邑縣祠即位壇，五成陌北，臘祠門戶。此雖前代已行故事，然爲壇以祀天，而壇非神也，今無事於上帝，而致祀於虛壇，求之義典，未詳所據。
- id: wei.3.p13.a1
  anchor: wei.3.p13
  at: 115
  length: 0
  type: pei
  text: 《魏書》曰：初，亮出，議者以爲亮軍無輜重，糧必不繼，不擊自破，無爲勞兵；或欲自芟上邽左右生麥以奪賊食，帝皆不從。前後遣兵增宣王軍，又勑使護麥。宣王與亮相持，賴得此麥以爲軍糧。
