  text: 《魏書》曰：殯于九龍前殿。
- id: wei.3.p43.a3
  anchor: wei.3.p43
  at: 86
  length: 0
  type: pei
  text: 臣松之桉：魏武以建安九年八月定鄴，文帝始納甄后，明帝應以十年生，計至此年正月，整三十四年耳。時改正朔，以故年十二月爲今年正月，可彊名三十五年，不得三十六也。
