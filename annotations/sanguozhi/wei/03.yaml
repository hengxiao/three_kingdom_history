  length: 0
  type: pei
  text: 干竇《晉紀》曰：帝問宣王：「度淵將何計以待君？」宣王對曰：「淵棄城預走，上計也；據遼水拒大軍，其次也；坐守襄平，此爲成禽耳。」帝曰：「然則三者何出？」對曰：「唯明智審量彼我，乃預有所割棄，此旣非淵所及，又謂今往縣遠，不能持久，必先拒遼水，後守也。」帝曰：「往還幾日？」對曰：「往百日，攻百日；還百日，以六十日爲休息，如此，一年足矣。」魏名臣奏載散騎常侍何曾表曰：「臣聞先王制法，必於全慎，故建官授任，則置假輔，陳師命將，則立監貳，宣命遣使，則設介副，臨敵交刃，則參御右，蓋以盡謀思之功，防安危之變也。是以在險當難，則權足相濟，隕缺不預，則手足相代，其爲固防，至深至遠。及至漢氏，亦循舊章。韓信伐趙，張耳爲貳；馬援討越，劉隆副軍。前世之迹，著在篇志。今懿奉辭誅罪，步騎數萬，道路迴阻，四千餘里，雖假天威，有征無戰，寇或潛遁，消散日月，命無常期。人非金石，遠慮詳備，誠宜有副。今北邊諸將及懿所督，皆爲僚屬，名位不殊，素無定分，卒有變急，不相鎮攝。存不忘亡，聖達所戒，宜選大臣名將威重宿著者，盛其禮秩，遣詣懿軍，進同謀略，退爲副佐。雖有萬一不虞之災，軍主有儲，則無患矣。」毌丘儉志記云，時以儉爲宣王副也。
