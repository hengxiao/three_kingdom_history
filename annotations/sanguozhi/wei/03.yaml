- id: wei.3.p1.a2
  anchor: wei.3.p1
  at: 64
  length: 0
  type: pei
  text: 《魏略》曰：文帝以郭后無子，詔使子養帝。帝以母不以道終，意甚不平。後不獲已，乃敬事郭后，旦夕因長御問起居，郭后亦自以無子，遂加慈愛。文帝始以帝不恱，有意欲以他姬子京兆王爲嗣，故久不拜太子。魏末傳曰：帝常從文帝獵，見子母鹿。文帝射殺鹿母，使帝射鹿子，帝不從，曰：「陛下已殺其母，臣不忍復殺其子。」因涕泣。文帝即放弓箭，以此深奇之，而樹立之意定。
- id: wei.3.p1.a3
  anchor: wei.3.p1
  at: 117
  length: 0
  type: pei
  text: 《世語》曰：帝與朝士素不接，即位之後，羣下想聞風采。居數日，獨見侍中劉曄，語盡日。衆人側聽，曄旣出，問「何如」？曄曰：「秦始皇、漢孝武之儔，才具微不及耳。」
