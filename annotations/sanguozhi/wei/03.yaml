- id: wei.3.p16.a1
  anchor: wei.3.p16
  at: 115
  length: 0
  type: pei
  text: 《魏書》載詔曰：「昔先王之禮，於功臣存則顯其爵祿，沒則祭于大蒸，故漢氏功臣祠於廟庭。大魏元功之臣功勳優著，終始休明者，其皆依禮祀之。」於是以惇等配饗之。
- id: wei.3.p19.a1
  anchor: wei.3.p19
  at: 27
  length: 0
  type: pei
  text: 《魏氏春秋》曰：朗字元明，新興人。《獻帝傳》曰：朗父名宜祿，爲呂布使詣袁術，術妻以漢宗室女。其前妻杜氏留下邳。布之被圍，關羽屢請於太祖，求以杜氏爲妻，太祖疑其有色，及城陷，太祖見之，乃自納之。宜祿歸降，以爲銍長。及劉備走小沛，張飛隨之，過謂宜祿曰：「人取汝妻，而爲之長，何蚩蚩若是邪！隨我去乎？」宜祿從之數里，悔欲還，飛殺之。朗隨母氏畜于公宮，太祖甚愛之，每坐席，謂賔客曰：「豈有人愛假子如孤者乎？」《魏略》曰：朗游遨諸侯間，歷武、文之世而無尤也。及明帝即位，授以內官，爲驍騎將軍、給事中，每車駕出入，朗常隨從。時明帝喜發舉，數有以輕微而致大辟者，朗終不能有所諫止，又未甞進一善人，帝亦以是親愛；每顧問之，多呼其小字阿穌，數加賞賜，爲起大第於京城中。四方雖知朗無能爲益，猶以附近至尊，多賂遺之，富均公侯。《世語》曰：朗子秀，勁厲能直言，爲晉武帝博士。《魏略》以朗與孔桂俱在佞倖篇。桂字叔林，天水人也。建安初，數爲將軍楊秋使詣太祖，太祖表拜騎都尉。桂性便辟，曉博弈、蹹鞠，故太祖愛之，每在左右，出入隨從。桂察太祖意，喜樂之時，因言次曲有所陳，事多見從，數得賞賜，人多餽遺，桂由此侯服玉食。太祖旣愛桂，五官將及諸侯亦皆親之。其後桂見太祖久不立太子，而有意於臨菑侯，因更親附臨菑侯而簡於五官將，將甚銜之。及太祖薨，文帝即王位，未及致其罪。黃初元年，隨例轉拜駙馬都尉。而桂私受西域貨賂，許爲人事。事發，有詔收問，遂殺之。魚豢曰：爲上者不虛授，處下者不虛受，然後外無伐檀之歎，內無尸素之刺，雍熙之美著，太平之律顯矣。而佞倖之徒，但姑息人主，至乃無德而榮，無功而祿，如是焉得不使中正日朘，傾邪滋多乎！以武皇帝之慎賞，明皇帝之持法，而猶有若此等人，而況下斯者乎？
- id: wei.3.p20.a1
  anchor: wei.3.p20
  at: 31
  length: 0
  type: pei
  text: 《世語》曰：并州刺史畢軌送漢故度遼將軍范明友鮮卑奴，年三百五十歲，言語飲食如常人。奴云：「霍顯，光後小妻。明友妻，光前妻女。」《博物志》曰：時京邑有一人失其姓名，食啖兼十許人，遂肥不能動。其父曾作遠方長吏，官徙送彼縣，令故義傳供食之；一二年中，一鄉中輒爲之儉。《傅子》曰：時太原發冢破棺，棺中有一生婦人，將出與語，生人也。送之京師，問其本事，不知也。視其冢上樹木可三十歲，不知此婦人三十歲常生於地中邪？將一朝欻生，偶與發冢者會也？
