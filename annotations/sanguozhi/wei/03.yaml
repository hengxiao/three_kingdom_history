  at: 70
  length: 0
  type: pei
  text: 《魏略》曰：帝旣從劉放計，召司馬宣王，自力爲詔，旣封，顧呼宮中常所給使者曰：「辟邪來！汝持我此詔授太尉也。」辟邪馳去。先是，燕王爲帝畫計，以爲關中事重，宜便道遣宣王從河內西還，事以施行。宣王得前詔，斯須復得後手筆，疑京師有變，乃馳到，入見帝。勞問訖，乃召齊、秦二王以示宣王，別指齊王謂宣王曰：「此是也，君諦視之，勿誤也！」又教齊王令前抱宣王頸。《魏氏春秋》曰：時太子芳年八歲，秦王九歲，在于御側。帝執宣王手，目太子曰：「死乃復可忍，朕忍死待君，君其與爽輔此。」宣王曰：「陛下不見先帝屬臣以陛下乎？」
