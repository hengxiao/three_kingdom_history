- id: wei.3.p32.a2
  anchor: wei.3.p32
  at: 53
  length: 0
  type: pei
  text: 《魏書》曰：初，文皇帝即位，以受禪于漢，因循漢正朔弗改。帝在東宮著論，以爲五帝三王雖同氣共祖，禮不相襲，正朔自宜改變，以明受命之運。及即位，優游者久之，史官復著言宜改，乃詔三公、特進、九卿、中郎將、大夫、博士、議郎、千石、六百石博議，議者或不同。帝據古典，甲子詔曰：「夫太極運三辰五星於上，元氣轉三統五行於下，登降周旋，終則又始。故仲尼作春秋，於三微之月，每月稱王，以明三正迭相爲首。今推三統之次，魏得地統，當以建丑之月爲正月。考之羣藝，厥義章矣。其改青龍五年三月爲景初元年四月。」
- id: wei.3.p32.a3
  anchor: wei.3.p32
  at: 85
  length: 0
  type: pei
  text: 臣松之桉：魏爲土行，故服色尚黃。行殷之時，以建丑爲正，故犧牲旂旗一用殷禮。《禮記》云：「夏后氏尚黑，故戎事乘驪，牲用玄；殷人尚白，戎事乘翰，牲用白；周人尚赤，戎事乘騵，牲用騂。」鄭玄云：「夏后氏以建寅爲正，物生色黑；殷以建丑爲正，物牙色白；周以建子爲正，物萌色赤。翰，白色馬也，《易》曰『白馬翰如』。」《周禮巾車職》「建大赤以朝」，大白以即戎，此則周以正色之旗以朝，先代之旗即戎。今魏用殷禮，變周之制，故建大白以朝，大赤即戎。
