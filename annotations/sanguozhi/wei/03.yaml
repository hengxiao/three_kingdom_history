  type: pei
  text: 孫盛曰：夫謚以表行，廟以存容，皆於旣沒然後著焉，所以原始要終，以示百世也。未有當年而逆制祖宗，未終而豫自尊顯。昔華樂以厚斂致譏，周人以豫凶違禮，魏之羣司，於是乎失正。
- id: wei.3.p36.a1
  anchor: wei.3.p36
  at: 100
  length: 0
  type: pei
  text: 《魏書》載詔曰：「蓋帝王受命，莫不恭承天地以章神明，尊祀世統以昭功德，故先代之典旣著，則禘郊祖宗之制備也。昔漢氏之初，承秦滅學之後，采摭殘缺，以備郊祀，自甘泉后土、雍宮五畤，神祇兆位，多不見經，是以制度無常，一彼一此，四百餘年，廢無禘祀。古代之所更立者，遂有闕焉。曹氏繫世，出自有虞氏，今祀圜丘，以始祖帝舜配，號圜丘曰皇皇帝天；方丘所祭曰皇皇后地，以舜妃伊氏配；天郊所祭曰皇天之神，以太祖武皇帝配；地郊所祭曰皇地之祇，以武宣后配；宗祀皇考高祖文皇帝於明堂，以配上帝。」至晉泰始二年，并圜丘、方丘二至之祀於南北郊。
