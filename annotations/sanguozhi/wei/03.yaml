- id: wei.3.p36.a3
  anchor: wei.3.p36
  at: 166
  length: 0
  type: pei
  text: 《魏略》曰：是歲，徙長安諸鐘簴、駱駝、銅人、承露盤。盤折，銅人重不可致，留于霸城。大發銅鑄作銅人二，號曰翁仲，列坐於司馬門外。又鑄黃龍、鳳皇各一，龍高四丈，鳳高三丈餘，置內殿前。起土山於芳林園西北陬，使公卿羣僚皆負土成山，樹松竹雜木善草於其上，捕山禽雜獸置其中。《漢晉春秋》曰：帝徙盤，盤折，聲聞數十里，金狄或泣，因留於霸城。《魏略》載司徒軍議掾河東董尋上書諫曰：「臣聞古之直士，盡言於國，不避死亡。故周昌比高祖於桀、紂，劉輔譬趙后於人婢。天生忠直，雖白刃沸湯，往而不顧者，誠爲時主愛惜天下也。建安以來，野戰死亡，或門殫戶盡，雖有存者，遺孤老弱。若今宮室狹小，當廣大之，猶宜隨時，不妨農務，況乃作無益之物，黃龍、鳳皇，九龍、承露盤，土山、淵池，此皆聖明之所不興也，其功參倍於殿舍。三公九卿侍中尚書，天下至德，皆知非道而不敢言者，以陛下春秋方剛，心畏雷霆。今陛下旣尊羣臣，顯以冠冕，被以文繡，載以華輿，所以異於小人；而使穿方舉土，面目垢黑，沾體塗足，衣冠了鳥，毀國之光以崇無益，甚非謂也。孔子曰：『君使臣以禮，臣事君以忠。』無忠無禮，國何以立！故有君不君，臣不臣，上下不通，心懷鬱結，使陰陽不和，災害屢降，凶惡之徒因閒而起，誰當爲陛下盡言是者乎？又誰當干萬乘以死爲戲乎？臣知言出必死，而臣自比於牛之一毛，生旣無益，死亦何損？秉筆流涕，心與世辭。臣有八子，臣死之後，累陛下矣！」將奏，沐浴。旣通，帝曰：「董尋不畏死邪！」主者奏收尋，有詔勿問。後爲貝丘令，清省得民心。
