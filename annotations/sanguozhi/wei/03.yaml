  length: 0
  type: pei
  text: 《獻帝傳》曰：帝變服，率羣臣哭之，使使持節行司徒太常和洽弔祭，又使持節行大司空大司農崔林監護喪事。詔曰：「蓋五帝之事尚矣，仲尼盛稱堯、舜巍巍蕩蕩之功者，以爲禪代乃大聖之懿事也。山陽公深識天祿永終之運，禪位文皇帝以順天命。先帝命公行漢正朔，郊天祀祖以天子之禮，言事不稱臣，此舜事堯之義也。昔放勛殂落，四海如喪考妣，遏密八音，明喪葬之禮同於王者也。今有司奏喪禮比諸侯王，此豈古之遺制而先帝之至意哉？今謚公漢孝獻皇帝。」使太尉具以一太牢告祠文帝廟，曰：「叡聞夫禮也者，反本請吉，不忘厥初，是以先代之君，尊尊親親，戚有尚焉。今山陽公寢疾棄國，有司建言喪紀之禮視諸侯王。叡惟山陽公昔知天命永終於己，深觀歷數允在聖躬，傳祚禪位，尊我民主，斯乃陶唐懿德之事也。黃初受終，命公于國行漢正朔，郊天祀祖禮樂制度率乃漢舊，斯亦舜、禹明堂之義也。上考遂初，皇極攸建，允熙克讓，莫明于茲。蓋子以繼志嗣訓爲孝，臣以配命欽述爲忠，故詩稱『匪棘其猶，聿追來孝』，書曰『前人受命，茲不忘大功』。叡敢不奉承徽典，以昭皇考之神靈。今追謚山陽公曰孝獻皇帝，冊贈璽紱。命司徒、司空持節弔祭護喪，光祿、大鴻臚爲副，將作大匠、復土將軍營成陵墓，及置百官羣吏，車旗服章喪葬禮儀，一如漢氏故事；喪葬所供羣官之費，皆仰大司農。立其後嗣爲山陽公，以通三統，永爲魏賔。」於是贈冊曰：「嗚呼，昔皇天降戾于漢，俾逆臣董卓，播厥凶虐，焚滅京都，劫遷大駕。于時六合雲擾，姦雄熛起。帝自西京，徂唯求定，臻茲洛邑。疇咨聖賢，聿改乘轅，又遷許昌，武皇帝是依。歲在玄枵，皇師肇征，迄于鶉尾，十有八載，羣寇殲殄，九域咸乂。惟帝念功，祚茲魏國，大啟土宇。爰及文皇帝，齊聖廣淵，仁聲旁流，柔遠能邇，殊俗向義，乾精承祚，坤靈吐曜，稽極玉衡，允膺歷數，度于軌儀，克猒帝心。乃仰欽七政，俯察五典，弗采四嶽之謀，不俟師錫之舉，幽贊神明，承天禪位。祚逮朕躬，統承洪業。蓋聞昔帝堯，元愷旣舉，凶族未流，登舜百揆，然後百揆時序，內平外成，授位明堂，退終天祿，故能冠德百王，表功高嶽。自往迄今，彌歷七代，歲曁三千，而大運來復，庸命底績，纂我民主，作建皇極。念重光，紹咸池，繼韶夏，超羣后之遐蹤，邈商、周之慙德，可謂高朗令終，昭明洪烈之懿盛者矣。非夫漢、魏與天地合德，與四時合信，動和民神，格于上下，其孰能至於此乎？朕惟孝獻享年不永，欽若顧命，考之典謨，恭述皇考先靈遺意，闡崇弘謚，奉成聖美，以章希世同符之隆，以傳億載不朽之榮。魂而有靈，嘉茲弘休。嗚呼哀哉！」八月壬申，葬于山陽國，陵曰禪陵，置園邑。葬之日，帝制錫衰弁絰，哭之慟。適孫桂氏鄉侯康，嗣立爲山陽公。
- id: wei.3.p22.a1
  anchor: wei.3.p22
  at: 84
  length: 0
  type: pei
  text: 《魏氏春秋》曰：亮旣屢遣使交書，又致巾幗婦人之飾，以怒宣王。宣王將出戰，辛毗杖節奉詔，勒宣王及軍吏已下，乃止。宣王見亮使，唯問其寢食及其事之煩簡，不問戎事。使對曰：「諸葛公夙興夜寐，罰二十已上，皆親覽焉；所啖食不過數升。」宣王曰：「亮體斃矣，其能久乎？」
- id: wei.3.p26.a1
  anchor: wei.3.p26
  at: 76
  length: 0
  type: pei
  text: 顧愷之《啟蒙注》曰：魏時人有開周王冢者，得殉葬女子，經數日而有氣，數月而能語；年可二十。送詣京師，郭太后愛養之。十餘年，太后崩，哀思哭泣，一年餘而死。
- id: wei.3.p27.a1
  anchor: wei.3.p27
  at: 52
  length: 0
  type: pei
  text: 《魏略》曰：是年起太極諸殿，築緫章觀，高十餘丈，建翔鳳於其上；又於芳林園中起陂池，楫櫂越歌；又於列殿之北立八坊，諸才人以次序處其中，貴人夫人以上轉南附焉，其秩石擬百官之數。帝常游宴在內，乃選女子知書可付信者六人，以爲女尚書，使典省外奏事，處當畫可，自貴人以下至尚保，及給掖庭灑掃，習伎歌者，各有千數。通引穀水過九龍殿前，爲玉井綺欄，蟾蜍含受，神龍吐出。使博士馬均作司南車，水轉百戲。歲首建巨獸，魚龍曼延，弄馬倒騎，備如漢西京之制，築閶闔諸門闕外罘罳。太子舍人張茂以吳、蜀數動，諸將出征，而帝盛興宮室，留意於玩飾，賜與無度，帑藏空竭；又錄奪士女前已嫁爲吏民妻者，還以配士，旣聽以生口自贖，又簡選其有姿首者內之掖庭，乃上書諫曰：「臣伏見詔書，諸士女嫁非士者，一切錄奪，以配戰士，斯誠權時之宜，然非大化之善者也。臣請論之。陛下，天之子也，百姓吏民，亦陛下之子也。禮，賜君子小人不同日，所以殊貴賤也。吏屬君子，士爲小人，今奪彼以與此，亦無以異於奪兄之妻妻弟也，於父母之恩偏矣。又詔書聽得以生口年紀、顏色與妻相當者自代，故富者則傾家盡產，貧者舉假貸貰，貴買生口以贖其妻；縣官以配士爲名而實內之掖庭，其醜惡者乃出與士。得婦者未必有懽心，而失妻者必有憂色，或窮或愁，皆不得志。夫君有天下而不得萬姓之懽心者，尠不危殆。且軍師在外數千萬人，一日之費非徒千金，舉天下之賦以奉此役，猶將不給，況復有宮庭非員無錄之女，椒房母后之家賞賜橫興，內外交引，其費半軍。昔漢武帝好神仙，信方士，掘地爲海，封土爲山，賴是時天下爲一，莫敢與爭者耳。自衰亂以來，四五十載，馬不捨鞍，士不釋甲，每一交戰，血流丹野，創痍號痛之聲于今未已。猶彊寇在疆，圖危魏室。陛下不兢兢業業，念崇節約，思所以安天下者，而乃奢靡是務，中尚方純作玩弄之物，炫燿後園，建承露之盤，斯誠快耳目之觀，然亦足以騁寇讎之心矣。惜乎，舍堯舜之節儉，而爲漢武之侈事，臣竊爲陛下不取也。願陛下沛然下詔，萬幾之事有無益而有損者悉除去之，以所除無益之費，厚賜將士父母妻子之飢寒者，問民所疾而除其所惡，實倉廩，繕甲兵，恪恭以臨天下。如是，吳賊面縛，蜀虜輿櫬，不待誅而自服，太平之路可計日而待也。陛下可無勞神思於海表，軍師高枕，戰士備員。今羣公皆結舌，而臣所以不敢不獻瞽言者，臣昔上要言，散騎奏臣書，以聽諫篇爲善，詔曰：『是也』，擢臣爲太子舍人；且臣作書譏爲人臣不能諫諍，今有可諫之事而臣不諫，此爲作書虛妄而不能言也。臣年五十，常恐至死無以報國，是以投軀沒身，冒昧以聞，惟陛下裁察。」書通，上顧左右曰：「張茂恃鄉里故也。」以事付散騎而已。茂字彥林，沛人。
- id: wei.3.p28.a1
  anchor: wei.3.p28
  at: 83
  length: 0
  type: pei
  text: 《魏氏春秋》曰：是歲張掖郡刪丹縣金山玄川溢涌，寶石負圖，狀象靈龜，廣一丈六尺，長一丈七尺一寸，圍五丈八寸，立于川西。有石馬七，其一仙人騎之，其一羈絆，其五有形而不善成。有玉匣關蓋於前，上有玉字，玉玦二，璜一。麒麟在東，鳳鳥在南，白虎在西，犧牛在北，馬自中布列四面，色皆蒼白。其南有五字，曰「上上三天王」；又曰「述大金，大討曹，金但取之，金立中，大金馬一匹在中，大吉開壽，此馬甲寅述水」。凡「中」字六，「金」字十；又有若八卦及列宿孛彗之象焉。《世語》曰：又有一雞象。《搜神記》曰：初，漢元、成之世，先識之士有言曰，魏年有和，當有開石於西三千餘里，繫五馬，文曰「大討曹」。及魏之初興也，張掖之柳谷，有開石焉，始見於建安，形成於黃初，文備於太和，周圍七尋，中高一仞，蒼質素章，龍馬、麟鹿、鳳皇、仙人之象，粲然咸著，此一事者，魏、晉代興之符也。至晉泰始三年，張掖太守焦勝上言，以留郡本國圖校今石文，文字多少不同，謹具圖上。桉其文有五馬象，其一有人平上幘，執戟而乘之，其一有若馬形而不成，其字有「金」，有「中」，有「大司馬」，有「王」，有「大吉」，有「正」，有「開壽」，其一成行，曰「金當取之」。《漢晉春秋》曰：氐池縣大柳谷口夜激波涌溢，其聲如雷，曉而有蒼石立水中，長一丈六尺，高八尺，白石畫之，爲十三馬，一牛，一鳥，八卦玉玦之象，皆隆起，其文曰「大討曹，適水中，甲寅」。帝惡其「討」也，使鑿去爲「計」，以蒼石窒之，宿昔而白石滿焉。至晉初，其文愈明，馬象皆煥徹如玉焉。
