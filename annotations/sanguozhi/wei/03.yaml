  at: 142
  length: 0
  type: pei
  text: 《魏書》載戊子詔曰：「昔漢高祖創業，光武中興，謀除殘暴，功昭四海，而墳陵崩頹，童兒牧豎踐蹈其上，非大魏尊崇所承代之意也。其表高祖、光武陵四面百步，不得使民耕牧樵採。」
- id: wei.3.p39.a1
  anchor: wei.3.p39
  at: 41
  length: 0
  type: pei
  text: 《漢晉春秋》曰：史官言於帝曰：「此周之分野也，洛邑惡之。」於是大脩禳禱之術以厭焉。《魏書》曰：九月，蜀陰平太守廖惇反，攻守善羌侯宕蕈營。雍州刺史郭淮遣廣魏太守王贇、南安太守游弈將兵討惇。淮上書：「贇、弈等分兵夾山東西，圍落賊表，破在旦夕。」帝曰：「兵勢惡離。」促詔淮勑弈諸別營非要處者，還令據便地。詔勑未到，弈軍爲惇所破；贇爲流矢所中死。
- id: wei.3.p41.a1
  anchor: wei.3.p41
  at: 91
  length: 0
  type: pei
  text: 《漢晉春秋》曰：帝以燕王宇爲大將軍，使與領軍將軍夏侯獻、武衞將軍曹爽、屯騎校尉曹肈、驍騎將軍秦朗等對輔政。中書監劉放、令孫資久專權寵，爲朗等素所不善，懼有後害，陰圖間之，而宇常在帝側，故未得有言。甲申，帝氣微，宇下殿呼曹肈有所議，未還，而帝少間，惟曹爽獨在。放知之，呼資與謀。資曰：「不可動也。」放曰：「俱入鼎鑊，何不可之有？」乃突前見帝，垂泣曰：「陛下氣微，若有不諱，將以天下付誰？」帝曰：「卿不聞用燕王耶？」放曰：「陛下忘先帝詔勑，藩王不得輔政。且陛下方病，而曹肈、秦朗等便與才人侍疾者言戲。燕王擁兵南面，不聽臣等入，此即豎刀、趙高也。今皇太子幼弱，未能統政，外有彊暴之寇，內有勞怨之民，陛下不遠慮存亡，而近係恩舊。委祖考之業，付二三凡士，寢疾數日，外內擁隔，社稷危殆，而己不知，此臣等所以痛心也。」帝得放言，大怒曰：「誰可任者？」放、資乃舉爽代宇，又白「宜詔司馬宣王使相參」，帝從之。放、資出，曹肈入，泣涕固諫，帝使肈勑停。肈出戶，放、資趨而往，復說止帝，帝又從其言。放曰：「宜爲手詔。」帝曰：「我困篤，不能。」放即上牀，執帝手強作之，遂齎出，大言曰：「有詔免燕王宇等官，不得停省中。」於是宇、肈、獻、朗相與泣而歸第。
