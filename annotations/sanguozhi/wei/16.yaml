  text: 郖音豆。《魏略》曰：初，畿与卫固少相狎侮，固尝轻畿。畿尝与固博而争道，畿尝谓固曰：“仲坚，我今作河东也。”固褰衣骂之。及畿之官，而固为郡功曹。张时故任京兆。畿迎司隶，与时会华阴，时、畿相见，於仪当各持版。时叹曰：“昨日功曹，今为郡将也！”
