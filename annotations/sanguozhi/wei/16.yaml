  text: 《魏略》曰：旧仪，侍中亲省起居，故俗谓之执虎子。始则同郡吉茂者，是时仕甫历县令，迁为冗散。茂见则，嘲之曰：“仕进不止执虎子。”则笑曰：“我诚不能效汝蹇蹇驱鹿车驰也。”初，则在金城，闻汉帝禅位，以为崩也，乃发丧；后闻其在，自以不审，意颇默然。临菑侯植自伤失先帝意，亦怨激而哭。其后文帝出游，追恨临菑，顾谓左右曰：“人心不同，当我登大位之时，天下有哭者。”时从臣知帝此言，有为而发也，而则以为为己。欲下马谢。侍中傅巽目之，乃悟。孙盛曰：夫士不事其所非，不非其所事，趣舍出处，而岂徒哉！则既策名新朝，委质异代，而方怀二心生忿，欲奋爽言，岂大雅君子去就之分哉？诗云：“士也罔极，二三其德。”士之二三，犹丧妃偶，况人臣乎？
