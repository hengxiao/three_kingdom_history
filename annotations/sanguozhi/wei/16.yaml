  type: pei
  text: 《魏略》曰：乐详字文载。少好学，建安初，详闻公车司马令南郡谢该善左氏传，乃从南阳步诣〔许，从〕该问疑难诸要，今左氏乐氏问七十二事，详所撰也。所问既了而归乡里，时杜畿为太守，亦甚好学，署详文学祭酒，使教后进，於是河东学业大兴。至黄初中，徵拜博士。于时太学初立，有博士十餘人，学多褊狭，又不熟悉，略不亲教，备员而已。惟详五业并授，其或难解，质而不解，详无愠色，以杖画地，牵譬引类，至忘寝食，以是独擅名於远近。详学既精悉，又善推步三五，别受诏与太史典定律历。太和中，转拜骑都尉。详学优能少，故历三世，竟不出为宰守。至正始中，以年老罢归於舍，本国宗族归之，门徒数千人。
- id: wei.16.p34.a1
  anchor: wei.16.p34
  at: 19
  length: 0
  type: pei
  text: 《杜氏新书》曰：恕弟理，字务仲。少而机察精要，畿奇之，故名之曰理。年二十一而卒。弟宽，字务叔。清虚玄静，敏而好古。以名臣门户，少长京师，而笃志博学，绝於世务，其意欲探赜索隐，由此显名，当涂之士多交焉。举孝廉，除郎中。年四十二而卒。经传之义，多所论駮，皆草创未就，惟删集礼记及春秋左氏传解，今存于世。阮武者，亦拓落大才也。案〈阮氏谱〉：武父谌，字士信，徵辟无所就，造三礼图传於世。《杜氏新书》曰：武字文业，阔达博通，渊雅之士。位止清河太守。武弟炳，字叔文，河南尹。精意医术，撰药方一部。炳子坦，字弘舒，晋太子少傅，平东将军。坦弟柯，字士度。荀绰《兗州记》曰：坦出绍伯父，亡，次兄当袭爵，父爱柯，言名传之，遂承封。时幼小，不能让，及长悔恨，遂幅巾而居，后虽出身，未尝释也。性纯笃闲雅，好礼无违，存心经诰，博学洽闻。选为濮阳王文学，迁领军长史，丧官。王衍时为领军，哭之甚恸。
