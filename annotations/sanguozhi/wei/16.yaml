  text: 《魏名臣奏》载文帝令问雍州刺史张既曰：“试守金城太守苏则，既有绥民平夷之功，闻又出军西定湟中，为河西作声势，吾甚嘉之。则之功效，为可加爵邑未邪？封爵重事，故以问卿。密白意，且勿宣露也。”既答曰：“金城郡，昔为韩遂所见屠剥，死丧流亡，或窜戎狄，或陷寇乱，户不满五百。则到官，内抚彫残，外鸠离散，今见户千餘。又梁烧杂种羌，昔与遂同恶，遂毙之后，越出障塞。则前后招怀，归就郡者三千餘落，皆恤以威恩，为官效用。西平麹演等倡造邪谋，则寻出军，临其项领，演即归命送质，破绝贼粮。则既有恤民之效，又能和戎狄，尽忠效节。遭遇圣明，有功必录。若则加爵邑，诚足以劝忠臣，励风俗也。”
