  text: 张璠《汉纪》曰：泰字公业。少有才略，多谋计，知天下将乱，阴交结豪杰。家富於财，有田四百顷，而食常不足，名闻山东。举孝廉，三府辟，公车徵，皆不就。何进辅政，徵用名士，以泰为尚书侍郎，加奉车都尉。进将诛黄门，欲召董卓为助，泰谓进曰：“董卓强忍寡义，志欲无餍，若借之朝政，授之大事，将肆其心以危朝廷。以明公之威德，据阿衡之重任，秉意独断，诛除有罪，诚不待卓以为资援也。且事留变生，其鉴不远。”又为陈时之要务，进不能用，乃弃官去。谓颍川人荀攸曰：“何公未易辅也。”进寻见害，卓果专权，废帝。关东义兵起，卓会议大发兵，群寮咸惮卓，莫敢忤旨。泰恐其强，益将难制，乃曰：“夫治在德，不在兵也。”卓不悦曰：“如此，兵无益邪？”众人莫不变容，为泰震栗。泰乃诡辞对曰：“非以无益，以山东不足加兵也。今山东议欲起兵，州郡相连，人众相动，非不能也。然中国自光武以来，无鸡鸣狗吠之警，百姓忘战日久；仲尼有言‘不教民战，是谓弃之’，虽众不能为害，一也。明公出自西州，少为国将，闲习军事，数践战场，名称当世；以此威民，民怀慑服，二也。袁本初公卿子弟，生处京师，体长妇人；张孟卓东平长者，坐不窥堂；孔公绪能清谈高论，嘘枯吹生，无军帅之才，负霜露之勤；临锋履刃，决敌雌雄，皆非明公敌，三也。察山东之士，力能跨马控弦，勇等孟贲，捷齐庆忌，信有聊城之守，策有良平之谋；可任以偏师，责以成功，未闻有其人者，四也。就有其人，王爵不相加，妇姑位不定，各恃众怙力，将人人釭跱，以观成败，不肯同心共胆，率徒旅进，五也。关西诸郡，北接上党、太原、冯翊、扶风、安定，自顷以来，数与胡战，妇女载戟挟矛，弦弓负矢，况其悍夫；以此当山东忘战之民，譬驱群羊向虎狼，其胜可必，六也。且天下之权勇，今见在者不过并、凉、匈奴、屠各、湟中、义从、八种西羌，皆百姓素所畏服，而明公权以为爪牙，壮夫震栗，况小丑乎！七也。又明公之将帅，皆中表腹心，周旋日久，自三原、硖口以来，恩信醇著，忠诚可远任，智谋可特使，以此当山东解（合）之虚诞，实不相若，八也。夫战有三亡：以乱攻治者亡，以邪攻正者亡，以逆攻顺者亡。今明公秉国政平，讨夷凶宦，忠义克立；以三德待於三亡，奉辞伐罪，谁人敢御？九也。东州有郑康成，学该古今，儒生之所以集；北海邴根矩，清高直亮，群士之楷式。彼诸将若询其计画，案典校之强弱，燕、赵、齐、梁非不盛，终见灭於秦，吴、楚七国非不众，而不敢逾荥阳，况今德政之赫赫，股肱之邦良，欲造乱以徼不义者，必不相然赞，成其凶谋，十也。若十事少有可采，无事徵兵以惊天下，使患役之民，相聚为非，弃德恃众，以轻威重。”卓乃悦，以泰为将军，统诸军击关东。或谓卓曰：“郑泰智略过人，而结谋山东，今资之士马，使就其党，窃为明公惧之。”卓收其兵马，留拜议郎。后又与王允谋共诛卓，泰脱身自武关走，东归。后将军袁术以为扬州刺史，未至官，道卒，时年四十一。
