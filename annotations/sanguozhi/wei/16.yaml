- id: wei.16.p39.a1
  anchor: wei.16.p39
  at: 45
  length: 0
  type: pei
  text: 《晋阳秋》曰：泰子袤，字林叔。泰与华歆、荀攸善。见袤曰：“郑公业为不亡矣。”初为临菑侯文学，稍迁至光禄大夫。泰始七年，以袤为司空，固辞不受，终於家。子默，字思玄。《晋诸公赞》曰：默遵守家业，以笃素称，位至太常。默弟质、舒、诩，皆为卿。默子球，清直有理识，尚书右仆射、领选。球弟豫，为尚书。
