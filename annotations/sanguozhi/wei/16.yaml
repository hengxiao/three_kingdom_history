- id: wei.16.p41.a1
  anchor: wei.16.p41
  at: 84
  length: 0
  type: pei
  text: 瓘、焕事行无所见。《魏略》曰：◎颜斐字文林。有才学。丞相召为太子洗马，黄初初转为黄门侍郎，后为京兆太守。始，京兆从马超破后，民人多不专於农殖，又历数四二千石，取解目前，亦不为民作久远计。斐到官，乃令属县整阡陌，树桑果。是时民多无车牛。斐又课民以间月取车材，使转相教匠作车。又课民无牛者，令畜猪狗，卖以买牛。始者民以为烦，一二年间，家家有丁车、大牛。又起文学，听吏民欲读书者，复其小徭。又於府下起菜园，使吏役间鉏治。又课民当输租时，车牛各因便致薪两束，为冬寒冰炙笔砚。於是风化大行，吏不烦民，民不求吏。京兆与冯翊、扶风接界，二郡道路既秽塞，田畴又荒莱，人民饥冻，而京兆皆整顿开明，丰富常为雍州十郡最。斐又清己，仰奉而已，於是吏民恐其迁转也。至青龙中，司马宣王在长安立军市，而军中吏士多侵侮县民，斐以白宣王。宣王乃发怒召军市候，便於斐前杖一百。时长安典农与斐共坐，以为斐宜谢，乃私推筑斐。斐不肯谢，良久乃曰：“斐意观明公受分陕之任，乃欲一齐众庶，必非有所左右也。而典农窃见推筑，欲令斐谢；假令斐谢，是更为不得明公意也。”宣王遂严持吏士。自是之后，军营、郡县各得其分。后数岁，迁为平原太守，吏民啼泣遮道，车不得前，步步稽留，十餘日乃出界，东行至崤而疾困。斐素心恋京兆，其家人从者见斐病甚，劝之，言：“平原当自勉励作健。”斐曰：“我心不原平原，汝曹等呼我，何不言京兆邪？”遂卒，还平原。京兆闻之，皆为流涕，为立碑，於今称颂之。◎令狐邵字孔叔。父仕汉，为乌丸校尉。建安初，袁氏在冀州，邵去本郡家居鄴。九年，暂出到武安毛城中。会太祖破鄴，遂围毛城。城破，执邵等辈十餘人，皆当斩。太祖阅见之，疑其衣冠也，问其祖考，而识其父，乃解放，署军谋掾。仍历宰守，后徙丞相主簿，出为弘农太守。所在清如冰雪，妻子希至官省；举善而教，恕以待人，不好狱讼，与下无忌。是时，郡无知经者，乃历问诸吏，有欲远行就师，辄假遣，令诣河东就乐详学经，粗明乃还，因设文学。由是弘农学业转兴。至黄初初，徵拜羽林郎，迁虎贲中郎将，三岁，病亡。始，邵族子愚，为白衣时，常有高志，众人谓愚必荣令狐氏，而邵独以为“愚性倜傥，不修德而原大，必灭我宗”。愚闻邵言，其心不平。及邵为虎贲郎将，而愚仕进已多所更历，所在有名称。愚见邵，因从容言次，微激之曰：“先时闻大人谓愚为不继，愚今竟云何邪？”邵熟视而不答也。然私谓其妻子曰：“公治性度犹如故也。以吾观之，终当败灭。但不知我久当坐之不邪？将逮汝曹耳！”邵没之后，十餘年间，愚为兗州刺史，果与王凌谋废立，家属诛灭。邵子华，时为弘农郡丞，以属疏得不坐。案孔氏谱：孔乂字元俊，孔子之后。曾祖畴，字元矩，陈相。汉桓帝立老子庙於苦县之赖乡，画孔子象於壁；畴为陈相，立孔子碑於像前，今见存。乂父祖皆二千石，乂为散骑常侍，上疏规谏。语在《三少帝纪》。至大鸿胪。子恂字士信，晋平东将军卫尉也。
