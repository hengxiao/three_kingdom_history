  length: 0
  type: pei
  text: 《傅子》曰：畿与太仆李恢、东安太守郭智有好。恢子丰交结英俊，以才智显於天下。智子沖有内实而无外观，州里弗称也。畿为尚书仆射，二人各脩子孙礼见畿。既退，畿叹曰：“孝懿无子；非徒无子，殆将无家。君谋为不死也，其子足继其业。”时人皆以畿为误。恢死后，丰为中书令，父子兄弟皆诛；沖为代郡太守，卒继父业；世乃服畿知人。《魏略》曰李丰父名义，与此不同，义盖恢之别名也。
- id: wei.16.p15.a1
  anchor: wei.16.p15
  at: 16
  length: 0
  type: pei
  text: 杜氏新书曰：恕少与冯翊李丰俱为父任，总角相善。及各成人，丰砥砺名行以要世誉，而恕诞节直意，与丰殊趣。丰竟驰名一时，京师之士多为之游说。而当路者或以丰名过其实，而恕被褐怀玉也。由此为丰所不善。恕亦任其自然，不力行以合时。丰以显仕朝廷，恕犹居家自若。明帝以恕大臣子，擢拜散骑侍郎，数月，转补黄门侍郎。
