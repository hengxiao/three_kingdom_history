  text: 杜氏新书曰：喜欲恕折节谢己，讽司马宋权示之以微意。恕答权书曰：“况示委曲。夫法天下事，以善意相待，无不致快也；以不善意相待，无不致嫌隙也。而议者言，凡人天性皆不善，不当待以善意，更堕其调中。仆得此辈，便欲归蹈沧海乘桴耳，不能自谐在其间也。然以年五十二，不见废弃，颇亦遭明达君子亮其本心；若不见亮，使人刳心著地，正与数斤肉相似，何足有所明，故终不自解说。程征北功名宿著，在仆前甚多，有人出征北乎！若令下官事无大小，咨而后行，则非上司弹绳之意；若咨而不从，又非上下相顺之宜。故推一心，任一意，直而行之耳。杀胡之事，天下谓之是邪，是仆谐也；呼为非邪，仆自受之，无所怨咎。程征北明之亦善，不明之亦善，诸君子自共为其心耳，不在仆言也。”喜於是遂深文劾恕。
- id: wei.16.p32.a1
