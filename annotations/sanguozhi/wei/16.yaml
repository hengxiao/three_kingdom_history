  type: pei
  text: 杜氏新书曰：以为人伦之大纲，莫重於君臣；立身之基本，莫大於言行；安上理民，莫精於政法；胜残去杀，莫善於用兵。夫礼也者，万物之体也，万物皆得其体，无有不善，故谓之体论。
