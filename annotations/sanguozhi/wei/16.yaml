  type: pei
  text: 《杜氏新书》曰：平虏将军刘勋，为太祖所亲，贵震朝廷。尝从畿求大枣，畿拒以他故。后勋伏法，太祖得其书，叹曰：“杜畿可谓‘不媚於灶’者也。”称畿功美，以下州郡，曰：“昔仲尼之於颜子，每言不能不叹，既情爱发中，又宜率马以骥。今吾亦冀众人仰高山，慕景行也。”
- id: wei.16.p14.h1
  anchor: wei.16.p14
