  text: 《魏略》曰：恕在弘农，宽和有惠爱。及迁，以孟康代恕为弘农。康字公休，安平人。黄初中，以於郭后有外属，并受九亲赐拜，遂转为散骑侍郎。是时，散骑皆以高才英儒充其选，而康独缘妃嫱杂在其间，故于时皆共轻之，号为阿九。康既（无）才敏，因在冗官，博读书传，后遂有所弹駮，其文义雅而切要，众人乃更加意。正始中，出为弘农，领典农校尉。康到官，清己奉职，嘉善而矜不能，省息狱讼，缘民所欲，因而利之。郡领吏二百餘人，涉春遣休，常四分遣一。事无宿诺，时出案行，皆豫敕督邮平水，不得令属官遣人探候，修设曲敬。又不欲烦损吏民，常豫敕吏卒，行各持镰，所在自刈马草，不止亭传，露宿树下，又所从常不过十餘人。郡带道路，其诸过宾客，自非公法无所出给；若知旧造之，自出於家。康之始拜，众人虽知其有志量，以其未尝宰牧，不保其能也；而康恩泽治能乃尔，吏民称歌焉。嘉平末，从渤海太守徵入为中书令，后转为监。
