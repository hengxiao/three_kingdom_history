- id: wei.16.p40.a1
  anchor: wei.16.p40
  at: 385
  length: 0
  type: pei
  text: 《魏略》曰：天水王迁，承代慈，虽循其迹，不能及也。金城赵基承迁后，复不如迁。至嘉平中，安定皇甫隆代基为太守。初，敦煌不甚晓田，常灌溉滀水，使极濡洽，然后乃耕。又不晓作耧梨，用水，及种，人牛功力既费，而收谷更少。隆到，教作耧梨，又教衍溉，岁终率计，其所省庸力过半，得谷加五。又敦煌俗，妇人作裙，挛缩如羊肠，用布一匹；隆又禁改之，所省复不訾。故敦煌人以为隆刚断严毅不及於慈，至於勤恪爱惠，为下兴利，可以亚之。
