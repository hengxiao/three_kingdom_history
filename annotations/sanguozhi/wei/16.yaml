  text: 《傅子》曰：畿自荆州还，后至许，见侍中耿纪，语终夜。尚书令荀彧与纪比屋，夜闻畿言，异之，旦遣人谓纪曰：“有国士而不进，何以居位？”既见畿，知之如旧相识者，遂进畿於朝。
