  type: pei
  text: 《魏武故事》载令曰：“故陈留太守枣祗，天性忠能。始共举义兵，周旋征讨。后袁绍在冀州，亦贪祗，欲得之。祗深附讬於孤，使领东阿令。吕布之乱，兗州皆叛，惟范、东阿完在，由祗以兵据城之力也。后大军粮乏，得东阿以继，祗之功也。及破黄巾定许，得贼资业。当兴立屯田，时议者皆言当计牛输谷，佃科以定。施行后，祗白以为僦牛输谷，大收不增谷，有水旱灾除，大不便。反覆来说，孤犹以为当如故，大收不可复改易。祗犹执之，孤不知所从，使与荀令君议之。时故军祭酒侯声云：‘科取官牛，为官田计。如祗议，於官便，於客不便。’声怀此云云，以疑令君。祗犹自信，据计画还白，执分田之术。孤乃然之，使为屯田都尉，施设田业。其时岁则大收，后遂因此大田，丰足军用，摧灭群逆，克定天下，以隆王室。祗兴其功，不幸早没，追赠以郡，犹未副之。今重思之，祗宜受封，稽留至今，孤之过也。祗子处中，宜加封爵，以祀祗为不朽之事。”《文士传》曰：祗本姓棘，先人避难，易为枣。孙据，字道彦，晋冀州刺史。据子嵩，字台产，散骑常侍。并有才名，多所著述。嵩兄腆，字玄方，襄阳太守，亦有文采。
