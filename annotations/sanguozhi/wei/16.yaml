  at: 32
  length: 0
  type: pei
  text: 《魏略》曰：初畿在郡，被书录寡妇。是时他郡或有已自相配嫁，依书皆录夺，啼哭道路。畿但取寡者，故所送少；及赵俨代畿而所送多。文帝问畿：“前君所送何少，今何多也？”畿对曰：“臣前所录皆亡者妻，今俨送生人妇也。”帝及左右顾而失色。
- id: wei.16.p14.a2
  anchor: wei.16.p14
  at: 89
  length: 0
  type: pei
  text: 《魏氏春秋》曰：初，畿尝见童子谓之曰：“司命使我召子。”畿固请之，童子曰：“今将为君求相代者。君其慎勿言！”言卒，忽然不见。至此二十年矣，畿乃言之。其日而卒，时年六十二。
- id: wei.16.p14.a3
  anchor: wei.16.p14
  at: 110
  length: 0
  type: pei
  text: 韦昭《国语注》称《毛诗》传曰：“冥，契六世孙也，为夏水官，勤於其职而死於水。稷、周弃也，勤播百谷，死於黑水之山。”
