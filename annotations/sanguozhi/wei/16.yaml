  type: pei
  text: 《魏略》曰：畿少有大志。在荆州数岁，继母亡后，以三辅开通，负其母丧北归。道为贼所劫略，众人奔走，畿独不去。贼射之，畿请贼曰：“卿欲得财耳，今我无物，用射我何为邪？”贼乃止。畿到乡里，京兆尹张时，河东人也，与畿有旧，署为功曹。尝嫌其阔达，不助留意於诸事，言此家疏诞，不中功曹也。畿窃云：“不中功曹，中河东守也。”
