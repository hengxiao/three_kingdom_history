  text: 《魏书》曰：则刚直疾恶，常慕汲黯之为人。《魏略》曰：则世为著姓，兴平中，三辅乱，饥穷，避难北地。客安定，依富室师亮。亮待遇不足，则慨然叹曰：“天下会安，当不久尔，必还为此郡守，折庸辈士也。”后与冯翊吉茂等隐於郡南太白山中，以书籍自娱。及为安定太守，而师亮等皆欲逃走。则闻之，豫使人解语，以礼报之。
