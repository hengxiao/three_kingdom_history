  text: 習鑿齒曰：高堂隆可謂忠臣矣。君侈每思諫其惡，將死不忘憂社稷，正辭動於昏主，明戒驗於身後，謇諤足以勵物，德音沒而弥彰，可不謂忠且智乎！詩云：「聽用我謀，庶無大悔。」又曰：「曾是莫聽，大命以傾。」其高堂隆之謂也。
