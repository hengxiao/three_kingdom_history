  text: 《英雄記》曰：譚、尚戰於外門，譚軍敗奔北。郭圖說譚曰：「今將軍國小兵少，糧匱勢弱，顯甫之來，久則不敵。愚以爲可呼曹公來擊顯甫。曹公至，必先攻鄴，顯甫還救。將軍引兵而西，自鄴以北皆可虜得。若顯甫軍破，其兵奔亡，又可斂取以拒曹公。曹公遠僑而來，糧餉不繼，必自逃去。比此之際，趙國以北皆我之有，亦足與曹公爲對矣。不然，不諧。」譚始不納，後遂從之。問圖：「誰可使？」圖荅：「辛佐治可。」譚遂遣毗詣太祖。
