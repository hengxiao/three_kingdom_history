- id: wei.25.p2.a1
  anchor: wei.25.p2
  at: 67
  length: 0
  type: pei
  text: 《英雄記》曰：譚、尚戰於外門，譚軍敗奔北。郭圖說譚曰：「今將軍國小兵少，糧匱勢弱，顯甫之來，久則不敵。愚以爲可呼曹公來擊顯甫。曹公至，必先攻鄴，顯甫還救。將軍引兵而西，自鄴以北皆可虜得。若顯甫軍破，其兵奔亡，又可斂取以拒曹公。曹公遠僑而來，糧餉不繼，必自逃去。比此之際，趙國以北皆我之有，亦足與曹公爲對矣。不然，不諧。」譚始不納，後遂從之。問圖：「誰可使？」圖荅：「辛佐治可。」譚遂遣毗詣太祖。
- id: wei.25.p8.a1
  anchor: wei.25.p8
  at: 262
  length: 0
  type: pei
  text: 《魏略》曰：諸葛亮圍祁山，不克，引退。張郃追之，爲流矢所中死。帝惜郃，臨朝而歎曰：「蜀未平而郃死，將若之何！」司空陳羣曰：「郃誠良將，國所依也。」毗心以爲郃雖可惜，然已死，不當內弱主意，而示外以不大也。乃持羣曰：「陳公，是何言歟！當建安之末，天下不可一日無武皇帝也，及委國祚，而文皇帝受命，黃初之世，亦謂不可無文皇帝也，及委棄天下，而陛下龍興。今國內所少，豈張郃乎？」陳羣曰：「亦誠如辛毗言。」帝笑曰：「陳公可謂善變矣。」臣松之以爲擬人必於其倫，取譬宜引其類，故君子於其言，無所苟而已矣。毗欲弘廣主意，當舉若張遼之疇，安有於一將之死而可以祖宗爲譬哉？非所宜言，莫過於茲，進違其類，退似諂佞，佐治剛正之體，不宜有此。《魏略》旣已難信，習氏又從而載之，竊謂斯人受誣不少。
- id: wei.25.p9.a1
  anchor: wei.25.p9
  at: 72
  length: 0
  type: pei
  text: 《魏略》曰：宣王數數欲進攻，毗禁不聽。宣王雖能行意，而每屈於毗。
- id: wei.25.p9.a2
  anchor: wei.25.p9
  at: 101
  length: 0
  type: pei
  text: 《世語》曰：敞字泰雍，官至衞尉。毗女憲英，適太常泰山羊耽，外孫夏侯湛爲其傳曰：「憲英聦明有才鑒。初文帝與陳思王爭爲太子，旣而文帝得立，抱毗頸而喜曰：『辛君知我喜不？』毗以告憲英，憲英歎曰：『太子代君主宗廟社稷者也。代君不可以不戚，主國不可以不懼，宜戚而喜，何以能乆？魏其不昌乎！』弟敞爲大將軍曹爽參軍。司馬宣王將誅爽，因爽出，閉城門。大將軍司馬魯芝將爽府兵，犯門斬關，出城門赴爽，來呼敞俱去。敞懼，問憲英曰：『天子在外，太傅閉城門，人云將不利國家，於事可得爾乎？』憲英曰：『天下有不可知，然以吾度之，太傅殆不得不爾！明皇帝臨崩，把太傅臂，以後事付之，此言猶在朝士之耳。且曹爽與太傅俱受寄託之任，而獨專權勢，行以驕奢，於王室不忠，於人道不直，此舉不過以誅曹爽耳。』敞曰：『然則事就乎？』憲英曰：『得無殆就！爽之才非太傅之偶也。』敞曰：『然則敞可以無出乎？』憲英曰：『安可以不出。職守，人之大義也。凡人在難，猶或卹之；爲人執鞭而棄其事，不祥，不可也。且爲人死，爲人任，親昵之職也，從衆而已。』敞遂出。宣王果誅爽。事定之後，敞歎曰：『吾不謀於姊，幾不獲於義。』逮鍾會爲鎮西將軍，憲英謂從子羊祜曰：『鍾士季何故西出？』祜曰：『將爲滅蜀也。』憲英曰：『會在事縱恣，非持乆處下之道，吾畏其有他志也。』祜曰：『季母勿多言。』其後會請子琇爲參軍，憲英憂曰：『他日見鍾會之出，吾爲國憂之矣。今日難至吾家，此國之大事，必不得止也。』琇固請司馬文王，文王不聽。憲英語琇曰：『行矣，戒之！古之君子，入則致孝於親，出則致節於國，在職思其所司，在義思其所立，不遺父母憂患而已。軍旅之間，可以濟者，其惟仁恕乎！汝其慎之！』琇竟以全身。憲英年至七十有九，泰始五年卒。」
- id: wei.25.p10.a1
