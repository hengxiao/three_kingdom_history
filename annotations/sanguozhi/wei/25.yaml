  text: 皇甫謐《列女傳》曰：姜叙母者，天水姜伯弈之母也。建安中，馬超攻冀，害涼州刺史韋康，州人悽然，莫不感憤。叙爲撫夷將軍，擁兵屯歷。叙姑子楊阜，故爲康從事，同等十餘人，皆略屬超，陰相結爲康報仇，未有閒。會阜妻死，辭超寧歸西，因過至歷，候叙母，說康被害及冀中之難，相對泣良乆。姜叙舉室感悲，叙母曰：「咄！伯弈，韋使君遇難，豈一州之恥，亦汝之負，豈獨義山哉？汝無顧我，事淹變生。人誰不死？死國，忠義之大者。但當速發，我自爲汝當之，不以餘年累汝也。」因勑叙與阜參議，許諾，分人使語鄉里尹奉、趙昂及安定梁寬等，令叙先舉兵叛超，超怒，必自來擊叙，寬等因從後閉門。約誓以定，叙遂進兵入鹵，昂、奉守祁山。超聞，果自出擊叙，寬等從後閉冀門，超失據。過鹵，叙守鹵。超因進至歷，歷中見超往，以爲叙軍還。又傳聞超以走奔漢中，故歷無備。及超入歷，執叙母，母怒罵超。超被罵大怒，即殺叙母及其子，燒城而去。阜等以狀聞，太祖甚嘉之，手令襃揚，語如本傳。臣松之案：謐稱阜爲叙姑子，而本傳云叙爲阜外兄，與今名內外爲不同。謐又載趙昂妻曰：趙昂妻異者，故益州刺史天水趙偉璋妻，王氏女也。昂爲羌道令，留異在西。會同郡梁雙反，攻破西城，害異兩男。異女英，年六歲，獨與異在城中。異見兩男已死，又恐爲雙所侵，引刀欲自刎，顧英而歎曰：「身死爾棄，當誰恃哉！吾聞西施蒙不絜之服，則人掩鼻，況我貌非西施乎？」乃以溷糞涅麻而被之，尠食瘠形，自春至冬。雙與州郡和，異竟以是免難。昂遣吏迎之，未至三十里，止謂英曰：「婦人無符信保傅，則不出房闈。昭姜沈流，伯姬待燒，每讀其傳，心壯其節。今吾遭亂不能死，將何以復見諸姑？所以偷生不死，惟憐汝耳。今官舍已近，吾去汝死矣。」遂飲毒藥而絕。時適有解毒藥良湯，撅口灌之，良乆迺蘇。建安中，昂轉參軍事，徙居冀。會馬超攻冀，異躬著布韝，佐昂守備，又悉脫所佩環、黼黻以賞戰士。及超攻急，城中饑困，刺史韋康素仁，愍吏民傷殘，欲與超和。昂諫不聽，歸以語異，異曰：「君有爭臣，大夫有專利之義；專不爲非也。焉知救兵不到關隴哉？當共勉卒高勳，全節致死，不可從也。」比昂還，康與超和。超遂背約害康，又劫昂，質其嫡子月於南鄭。欲要昂以爲己用，然心未甚信。超妻楊聞異節行，請與讌終日。異欲信昂於超以濟其謀，謂楊曰：「昔管仲入齊，立九合之功；由余適秦，穆公成霸。方今社稷初定，治亂在於得人，涼州士馬，迺可與中夏爭鋒，不可不詳也。」楊深感之，以爲忠於己，遂與異重相接結。昂所以得信於超，全功免禍者，異之力也。及昂與楊阜等結謀討超，告異曰：「吾謀如是，事必萬全，當柰月何？」異厲聲應曰：「忠義立於身，雪君父之大恥，喪元不足爲重，況一子哉？夫項託、顏淵，豈復百年，貴義存耳。」昂曰：「善。」遂共閉門逐超，超奔漢中，從張魯得兵還。異復與昂保祁山，爲超所圍，三十日救兵到，乃解。超卒殺異子月。凡自冀城之難，至于祁山，昂出九奇，異輒參焉。
