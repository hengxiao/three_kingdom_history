  text: 《魏略》曰：太史上漢歷不及天時，因更推步弦望朔晦，爲太和歷。帝以隆學問優深，於天文又精，乃詔使隆與尚書郎楊偉、太史待詔駱祿參共推校。偉、祿是太史，隆故據舊歷更相劾奏，紛紜數歲，偉稱祿得日蝕而月晦不盡，隆不得日蝕而月晦盡，詔從太史。隆所爭雖不得，而遠近猶知其精微也。
