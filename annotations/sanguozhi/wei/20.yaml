  type: pei
  text: 孔衍《漢魏春秋》載璽書曰：「夫先王行賞不遺仇讎，用戮不違親戚，至公之義也。故周公流涕而決二叔之罪，孝武傷懷而斷昭平之獄，古今常典也。惟王，國之至親，作籓於外，不能祗奉王度，表率宗室，而謀於姦邪，乃與太尉王凌、兗州刺史令狐愚構通逆謀，圖危社稷，有悖忒之心，無忠孝之意。宗廟有靈，王其何面目以見先帝？朕深痛王自陷罪辜，旣得王情，深用憮然。有司奏王當就大理，朕惟公族甸師之義，不忍肆王市朝，故遣使者賜書。王自作孼，匪由於他，燕剌之事，宜足以觀。王其自圖之！」
