  text: 《魏書》曰：沖毎見當刑者，輒探睹其冤枉之情而微理之。及勤勞之吏，以過誤觸罪，常爲太祖陳説，宜寛宥之。辨察仁愛，與性倶生，容貌姿美，有殊於衆，故特見寵異。臣松之以「容貌姿美」一類之言，而分以爲三，亦敍屬之一病也。
