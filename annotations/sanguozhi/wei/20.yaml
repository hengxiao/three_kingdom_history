- id: wei.20.p5.a1
  anchor: wei.20.p5
  at: 305
  length: 0
  type: pei
  text: 《魏書》曰：沖毎見當刑者，輒探睹其冤枉之情而微理之。及勤勞之吏，以過誤觸罪，常爲太祖陳説，宜寛宥之。辨察仁愛，與性倶生，容貌姿美，有殊於衆，故特見寵異。臣松之以「容貌姿美」一類之言，而分以爲三，亦敍屬之一病也。
- id: wei.20.p5.a2
  anchor: wei.20.p5
  at: 371
  length: 0
  type: pei
  text: 孫盛曰：春秋之義，立嫡以長不以賢。沖雖存也猶不宜立，況其旣沒，而發斯言乎？詩云：「無易由言。」魏武其易之也。
- id: wei.20.p6.a1
  anchor: wei.20.p6
  at: 21
  length: 0
  type: pei
  text: 《魏書》載策曰：「惟黃初二年八月丙午，皇帝曰：咨爾鄧哀侯沖，昔皇天鍾美於爾躬，俾聰哲之才，成於弱年。當永享顯祚，克成厥終。如何不祿，早世夭昬！朕承天序，享有四海，幷建親親，以籓王室，惟爾不逮斯榮，且葬禮未備。追悼之懷，愴然攸傷。今遷葬於髙陵，使使持節兼謁者僕射郎中陳承，追賜號曰鄧公，祠以太牢。魂而有靈，休茲寵榮。嗚呼哀哉！」《魏略》曰：文帝常言「家兄孝廉，自其分也。若使倉舒在，我亦無天下。」
- id: wei.20.p7.a1
  anchor: wei.20.p7
  at: 192
  length: 0
  type: pei
  text: 《魏書》載璽書曰：「制詔彭城王：有司奏，王遣司馬董和，賫珠玉來到京師中尙方，多作禁物，交通工官，出入近署，逾侈非度，慢令違制，繩王以法。朕用憮然，不寧於心。王以懿親之重，處籓輔之位，典籍日陳於前，勤誦不輟於側。加雅素奉脩，恭肅敬愼，務在蹈道，孜孜不衰，豈忘率意正身，考終厥行哉？若然小疵，或謬於細人，忽不覺悟，以斯爲失耳。書曰：『惟聖罔念作狂，惟狂克念作聖。』古人垂誥，乃至於此，故君子思心無斯須遠道焉。常慮所以累德者而去之，則德明矣；開心所以爲塞者而通之，則心夷矣；愼行所以爲尤者而脩之，則行全矣：三者，王之所能備也。今詔有司宥王，削縣二千戸，以彰八柄與奪之法。昔羲、文作易，著休復之語，仲尼論行，旣過能改。王其改行，茂昭斯義，率意無怠。」
- id: wei.20.p9.a1
  anchor: wei.20.p9
  at: 95
  length: 0
  type: pei
  text: 案《嵇氏譜》：嵇康妻，林子之女也。
- id: wei.20.p11.a1
  anchor: wei.20.p11
  at: 61
  length: 0
  type: pei
  text: 《魏書》載璽書曰：「制詔中山王：有司奏，王乃者來朝，犯交通京師之禁。朕惟親親之恩，用寢吏議。然法者，所與天下共也，不可得廢。今削王縣二，戸七百五十。夫克己復禮，聖人稱仁，朝過夕改，君子與之。王其戒諸，無貳咎悔也。」
- id: wei.20.p15.a1
  anchor: wei.20.p15
  at: 47
  length: 0
  type: pei
  text: 《魏略》曰：幹一名良。良本陳妾子，良生而陳氏死，太祖令王夫人養之。良年五歳而太祖疾困，遺令語太子曰：「此兒三歳亡母，五歳失父，以累汝也。」太子由是親待，隆於諸弟。良年小，常呼文帝爲阿翁，帝謂良曰：「我，汝兄耳。」文帝又愍其如是，毎爲流涕。臣松之案：此傳以母貴賤爲次，不計兄弟之年，故楚王彪年雖大，傳在幹後。尋《朱建平傳》，知彪大幹二十歳。
- id: wei.20.p19.a1
  anchor: wei.20.p19
  at: 232
  length: 0
  type: pei
  text: 孔衍《漢魏春秋》載璽書曰：「夫先王行賞不遺仇讎，用戮不違親戚，至公之義也。故周公流涕而決二叔之罪，孝武傷懷而斷昭平之獄，古今常典也。惟王，國之至親，作籓於外，不能祗奉王度，表率宗室，而謀於姦邪，乃與太尉王凌、兗州刺史令狐愚構通逆謀，圖危社稷，有悖忒之心，無忠孝之意。宗廟有靈，王其何面目以見先帝？朕深痛王自陷罪辜，旣得王情，深用憮然。有司奏王當就大理，朕惟公族甸師之義，不忍肆王市朝，故遣使者賜書。王自作孼，匪由於他，燕剌之事，宜足以觀。王其自圖之！」
- id: wei.20.p20.a1
  anchor: wei.20.p20
  at: 75
  length: 0
  type: pei
  text: 臣松之案：嘉入晉，封髙邑公。元康中，與石崇倶爲國子博士。嘉後爲東莞太守，崇爲徴虜將軍，監靑、徐軍事，屯於下邳，嘉以詩遺崇曰：「文武應時用，兼才在明哲。嗟嗟我石生，爲國之俊傑。入侍於皇闥，出則登九列。威檢肅靑、徐，風發宜呉裔。疇昔謬同位，情至過魯、衞。分離逾十載，思遠心增結。原子鑑斯誠，寒暑不逾契。」崇答曰：「昔常接羽儀，倶遊靑雲中，敦道訓胄子，儒化渙以融，同聲無異響，故使恩愛隆。豈惟敦初好，款分在令終。孔不陋九夷，老氏適西戎。逍遙滄海隅，可以保王躬。世事非所務，周公不足夢。玄寂令神王，是以守至衝。」王隱《晉書》載吏部郎李重啓云：「魏氏宗室屈滯，毎聖恩所存。東莞太守曹嘉，才幹學義，不及志、翕，而良素脩潔，性業逾之；又已歴二郡。臣以爲優先代之後，可以嘉爲員外散騎侍郎。」
- id: wei.20.p27.a1
  anchor: wei.20.p27
  at: 143
  length: 0
  type: pei
  text: 臣松之案：翕入晉，封廩丘公。魏宗室之中，名次鄄城公。至泰始二年，翕遣世子琨奉表來朝。詔曰：「翕秉德履道，魏宗之良。今琨遠至，其假世子印綬，加騎都尉，賜服一具，錢十萬，隨才敍用。」翕撰解寒食散方，與皇甫謐所撰幷行於世。
- id: wei.20.p40.a1
  anchor: wei.20.p40
  at: 67
  length: 0
  type: pei
  text: 《袁子》曰：魏興，承大亂之後，民人損減，不可則以古始。於是封建侯王，皆使寄地，空名而無其實。王國使有老兵百餘人，以衞其國。雖有王侯之號，而乃儕爲匹夫。縣隔千里之外，無朝聘之儀，鄰國無會同之制。諸侯遊獵不得過三十里，又爲設防輔監國之官以伺察之。王侯皆思爲布衣而不能得。旣違宗國籓屛之義，又虧親戚骨肉之恩。
