  length: 0
  type: pei
  text: 《袁子》曰：魏興，承大亂之後，民人損減，不可則以古始。於是封建侯王，皆使寄地，空名而無其實。王國使有老兵百餘人，以衞其國。雖有王侯之號，而乃儕爲匹夫。縣隔千里之外，無朝聘之儀，鄰國無會同之制。諸侯遊獵不得過三十里，又爲設防輔監國之官以伺察之。王侯皆思爲布衣而不能得。旣違宗國籓屛之義，又虧親戚骨肉之恩。
