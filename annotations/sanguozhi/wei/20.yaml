- id: wei.20.p5.a2
  anchor: wei.20.p5
  at: 371
  length: 0
  type: pei
  text: 孫盛曰：春秋之義，立嫡以長不以賢。沖雖存也猶不宜立，況其旣沒，而發斯言乎？詩云：「無易由言。」魏武其易之也。
