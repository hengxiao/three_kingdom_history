- id: hhs.67.p1.a1
  anchor: hhs.67.p1
  at: 31
  length: 0
  type: lixian
  text: 嗜猶好也。惡音烏故反。言人好惡，各有本性，遷染者，由其所習。尚書曰：「唯人生厚，因物有遷。」墨子曰：「墨子見染絲者，泣而歎曰：『染於蒼則蒼，染於黃則黃，故染不可不慎也。非獨染絲然也，國亦有染。湯染於伊尹，故王天下；殷紂染於惡來，故國殘身死，爲天下僇。』」
- id: hhs.67.p1.a2
  anchor: hhs.67.p1
  at: 46
  length: 0
  type: lixian
  text: 刻意，刻削其意不得自恣也。莊子曰：「刻意尚行，離時異俗。」行音下孟反。肆猶族縱也。牽物謂爲物所牽制，則其志流宕忘反也。淮南子曰：「非拘緊牽連於物，而不與推移也。」
- id: hhs.67.p1.a3
  anchor: hhs.67.p1
  at: 93
  length: 0
  type: lixian
  text: 陶謂陶治以成之。管子曰：「夫法之制人，猶陶之於埴，冶之於金也。」
- id: hhs.67.p1.a4
  anchor: hhs.67.p1
  at: 108
  length: 0
  type: lixian
  text: 叔末猶季末也。謂當春秋之時。
- id: hhs.67.p1.a5
  anchor: hhs.67.p1
  at: 156
  length: 0
  type: lixian
  text: 褫猶奪也，音直紙反。厮臺，賤人也。齊侯伐楚，楚子使與師言曰：「君處北海，寡人南海，唯是風馬牛不相及也，不虞君之涉吾地也。何故？」管仲對曰：「爾貢苞茅不入，王祭不供，無以縮酒，寡人是征。」對曰：「貢之不入，寡君之罪也。」遂使屈完與齊盟於召陵。此強梁褫氣也。又晉呂甥、卻苪將焚公宮而殺晉侯，寺人披請見，公使讓之，且辭曰：「汝爲惠公來求殺余，命汝三宿，汝中宿而至。雖君有命，何其速也？」對曰：「臣謂君之入也，其知之矣。若猶未也，又將及難。君命無二，古之制也。除君之惡，唯力是視，蒲人狄人，余何有焉。今君即位，其無蒲、狄乎？」此爲厮臺解情也。並見《左傳》。
- id: hhs.67.p2.a1
  anchor: hhs.67.p2
  at: 10
  length: 0
  type: lixian
  text: 霸德衰謂六國時也。狙音七余反。廣雅曰：「狙，獮猴也。」以其多詐，故比之也。
- id: hhs.67.p2.a2
  anchor: hhs.67.p2
  at: 44
  length: 0
  type: lixian
  text: 蘇秦説趙王，賜白壁百雙，黃金萬鎰。虞卿一見趙王，賜白璧一雙，黃金百鎰。見史記及戰國策。
- id: hhs.67.p2.a3
  anchor: hhs.67.p2
  at: 61
  length: 0
  type: lixian
  text: 《史記》曰：楚惠王言「莊舄，越之鄙細人也，今仕楚執珪，貴富矣」。解草衣謂范睢、蔡澤之類。
- id: hhs.67.p2.a4
  anchor: hhs.67.p2
  at: 82
  length: 0
  type: lixian
  text: 韓子李斯曰：「韓非飾辯詐謀，以釣利於秦」也。賈誼過秦曰「贏糧而景從」也。
- id: hhs.67.p3.a1
  anchor: hhs.67.p3
  at: 35
  length: 0
  type: lixian
  text: 四豪謂信陵君魏公子無忌、平原君趙勝、春申君黃歇、孟嘗君田文。前書班固曰：「游談者以四豪爲稱首。」
- id: hhs.67.p3.a2
  anchor: hhs.67.p3
  at: 65
  length: 0
  type: lixian
  text: 《前書音義》曰：「相與信爲任，同是非爲俠，所謂權行州域，力折公侯者也。」
- id: hhs.67.p3.a3
  anchor: hhs.67.p3
  at: 112
  length: 0
  type: lixian
  text: 武帝詔求賢良，於是公孫弘、董仲舒等出焉。宣帝時，集諸儒於石渠閣，講論六蓺。召五經名儒太子蕭望之等大議殿中，平公羊、谷梁同異，同己者朋黨之，異己者攻伐之。劉歆書曰：「黨同門，妒道真。」
- id: hhs.67.p3.a4
  anchor: hhs.67.p3
  at: 145
  length: 0
  type: lixian
  text: 謂襲勝、薛方、郭欽、蔣詡之類，並隱居不應莽召。
- id: hhs.67.p3.a5
  anchor: hhs.67.p3
  at: 177
  length: 0
  type: lixian
  text: 謂逢萌、嚴光、周黨、尚長之屬。
- id: hhs.67.p3.a6
  anchor: hhs.67.p3
  at: 245
  length: 0
  type: lixian
  text: 婞，狠也，音邢鼎反。
- id: hhs.67.p4.a1
  anchor: hhs.67.p4
  at: 20
  length: 0
  type: lixian
  text: 《禮記》曰：「下之事上也，不從其所令，從其所行。上好是物，下必有甚者矣。」矯，正也。正枉必過其直，見《孟子》。
- id: hhs.67.p5.a1
  anchor: hhs.67.p5
  at: 75
  length: 0
  type: lixian
  text: 初委反
- id: hhs.67.p6.a1
  anchor: hhs.67.p6
  at: 25
  length: 0
  type: lixian
  text: 音質
- id: hhs.67.p7.a1
  anchor: hhs.67.p7
  at: 34
  length: 0
  type: lixian
  text: 謝承書曰「成瑨少修仁義，篤學，以清名見。舉孝廉，拜郎中，遷南陽太守。郡舊多豪強，中官黃門磐牙境界。瑨下車，振威嚴以撿攝之。是時桓帝乳母、中官貴人外親張子禁，怙恃貴埶，不畏法網，功曹岑晊勸使捕子禁付宛獄，笞殺之。桓帝征□，下獄死。宗資字叔都，南陽安觿人也。家代爲漢將相名臣。祖父均，自有傳。資少在京師，學孟氏易、歐陽尚書。舉孝廉，拜議郎，補御史中丞、汝南太守。署范滂爲功曹，委任政事，推功於滂，不伐其美。任善之名，聞於海內」也。
- id: hhs.67.p7.a2
  anchor: hhs.67.p7
  at: 60
  length: 0
  type: lixian
  text: 冠猶首也。
- id: hhs.67.p7.a3
  anchor: hhs.67.p7
  at: 114
  length: 0
  type: lixian
  text: 公族，姓也，名進階。風俗通曰：「晉成公立嫡子爲公族大夫。」韓無忌號公族穆子，見《左氏傳》
- id: hhs.67.p7.a4
  anchor: hhs.67.p7
  at: 131
  length: 0
  type: lixian
  text: 危言謂不畏危難而直言也。論語孔子曰：「邦有道，危言危行。」
- id: hhs.67.p9.a1
  anchor: hhs.67.p9
  at: 45
  length: 0
  type: lixian
  text: 説文曰：「誹，謗也。」蒼頡篇曰：「訕，非也。」
- id: hhs.67.p10.a1
  anchor: hhs.67.p10
  at: 24
  length: 0
  type: lixian
  text: 希，望也，摽搒猶相稱揚也。「搒」與「牓」同，古字通。
- id: hhs.67.p11.a1
  anchor: hhs.67.p11
  at: 93
  length: 0
  type: lixian
  text: 導，引也。宗謂所宗仰者。
- id: hhs.67.p11.a2
  anchor: hhs.67.p11
  at: 123
  length: 0
  type: lixian
  text: 蕃，姓也，音皮。
- id: hhs.67.p12.a1
  anchor: hhs.67.p12
  at: 102
  length: 0
  type: lixian
  text: 公緒，姓也。
- id: hhs.67.p12.a2
  anchor: hhs.67.p12
  at: 147
  length: 0
  type: lixian
  text: 墠，除地於中爲壇。墠音禪。魁，大帥也。
- id: hhs.67.p12.a3
  anchor: hhs.67.p12
  at: 156
  length: 0
  type: lixian
  text: 刊，削。不欲宣露並名，故削除之，而直捕儉等。
- id: hhs.67.p12.a4
  anchor: hhs.67.p12
  at: 279
  length: 0
  type: lixian
  text: 睚音五懈反。廣雅曰：「睚，裂也。」眦音才賜反。前書音義曰：「瞋目魍也。」史記曰：「睚眦之隙必報。」
