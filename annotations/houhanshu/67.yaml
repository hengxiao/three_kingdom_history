  length: 0
  type: lixian
  text: 謂斬衰、齊衰、大功、小功、緦麻也。
- id: hhs.67.p14.t1
  anchor: hhs.67.p14
  at: 0
  length: 4
  type: temporal
  text: 光和二年
  kind: absolute
  resolution: absolute
  year_ad: 179
  era: 光和
  era_year: 2
- id: hhs.67.p14.a1
  anchor: hhs.67.p14
  at: 10
  length: 0
  type: lixian
  text: 上祿，縣，屬武都郡，今成州縣也。
- id: hhs.67.p14.a2
  anchor: hhs.67.p14
  at: 59
  length: 0
  type: lixian
  text: 《左氏傳》曰：「父子兄弟，罪不相及。」
- id: hhs.67.p15.t1
  anchor: hhs.67.p15
  at: 0
  length: 4
  type: temporal
  text: 中平元年
  kind: absolute
  resolution: absolute
  year_ad: 184
  era: 中平
  era_year: 1
- id: hhs.67.p15.a1
  anchor: hhs.67.p15
  at: 95
  length: 0
  type: lixian
  text: 《詩·大雅·蕩篇》序曰：「厲王無道，天下蕩蕩，無綱紀文章。」鄭玄注云：「蕩蕩，法度廢壞之魍也。」
- id: hhs.67.p16.a1
  anchor: hhs.67.p16
  at: 167
  length: 0
  type: lixian
  text: 曲城，縣，故城在今萊州掖縣東北也。
- id: hhs.67.p17.t1
  anchor: hhs.67.p17
  at: 62
  length: 2
  type: temporal
  text: 二年
  kind: relative
  resolution: bare_year
  year_ad: 185
  era: 中平
  era_year: 2
- id: hhs.67.p19.a1
  anchor: hhs.67.p19
  at: 16
  length: 0
  type: lixian
  text: 《漢官儀》曰：「脩，字伯游。」
- id: hhs.67.p19.a2
  anchor: hhs.67.p19
  at: 35
  length: 0
  type: lixian
  text: 亢，高也
- id: hhs.67.p20.a1
  anchor: hhs.67.p20
  at: 60
  length: 0
  type: lixian
  text: 謝承書曰：「出補蜀郡太守，修庠序，設條教，明法令，威恩並行。蜀之珍玩，不入於門。益州紀其政化，朝廷舉能理劇，轉烏桓校尉。」
- id: hhs.67.p20.a2
  anchor: hhs.67.p20
  at: 90
  length: 0
  type: lixian
  text: 謝承書曰：「膺常率步騎臨陣交戰，身被創夷，拭血進戰，遂破寇，斬首二千級。」
- id: hhs.67.p20.a3
  anchor: hhs.67.p20
  at: 107
  length: 0
  type: lixian
  text: 綸氏，縣，屬穎川郡，故城今陽城縣也。
- id: hhs.67.p20.a4
  anchor: hhs.67.p20
  at: 141
  length: 0
  type: lixian
  text: 漢官儀曰：「樊陵字德雲。」
