  type: temporal
  text: 延熹二年
  kind: absolute
  resolution: absolute
  year_ad: 159
  era: 延熹
  era_year: 2
- id: hhs.67.p22.a1
  anchor: hhs.67.p22
  at: 37
  length: 0
  type: lixian
  text: 溷軒，廁屋。
- id: hhs.67.p24.a1
  anchor: hhs.67.p24
  at: 30
  length: 0
  type: lixian
  text: 新序曰：「秦欲伐楚，使*[使]*者往觀楚之寶器。楚王聞之，召昭奚恤問焉。對曰：『此欲觀吾國之得失而圖之，寶器在於賢臣。』遂使恤應之。乃爲東面之壇四，爲南面之壇一，爲西面之壇一。秦使者至，恤曰：『君，客也，請就上位東面，子西南面，太宰子方次之，葉公子高次之，司馬子反次之。』恤自居西面之壇，稱曰：『客觀楚國之寶器。所寶者，賢臣也。理百姓，實倉廩，使人各得其所，子西在此。奉珪璋，使諸侯，解忿悁之難，交兩國之歡，使無兵革之憂，太宰子方在此。守封疆，謹境界，不侵鄰國，鄰亦不侵，葉公子高在此。理師旅，正兵戎，以當強敵，提袍鼓以動百萬之觿，使皆赴湯火，蹈白刃，出萬死不顧，司馬子反在此。若懷霸王之餘義，獵理亂之遺風，昭奚恤在此。惟大國所觀。』秦使者瞿然無以對，恤遂攝衣而去。使反，言秦君曰：『楚多賢臣，未可謀也。』」
- id: hhs.67.p24.a2
  anchor: hhs.67.p24
  at: 48
  length: 0
  type: lixian
  text: 瑋猶美也。史記曰，魏惠王問齊威王曰：「王亦有寶乎？」威王曰：「無有。」魏王曰：「寡人之國雖小，尚有徑寸珠照車前後十二乘者十枚，柰何以萬乘之國而無寶乎！」威王曰：「寡人所以爲寶者與王異。吾臣有檀子者，使守南城，楚人不敢爲寇。吾臣有盼子者，使守高堂，則趙人不敢東漁於河。吾臣有黔夫者，使守徐州，於是燕人祭北門，趙人祭西門，從者七千餘家。吾臣有種首者，使備盜賊，則道不拾遺。以此爲寶，將以照千里，豈直十二乘哉？」魏王籩，不懌而去。
- id: hhs.67.p24.a3
  anchor: hhs.67.p24
  at: 100
  length: 0
  type: lixian
  text: 肆，陳也。
- id: hhs.67.p24.a4
  anchor: hhs.67.p24
  at: 129
  length: 0
  type: lixian
  text: 紀太子僕殺紀公，以其寶玉來奔，納諸宣公，公命與之邑，季文子使司寇出之境。公問其故，對曰：「孝敬忠信爲吉德，盜賊藏姦爲凶德。夫莒僕，則其孝敬，*[則]*弒君父矣，則其忠信，則竊寶玉矣，其人則盜賊也，是以去之。舜舉十六相，去四凶，有大功二十而爲天子。今行父雖未獲一吉人，去一凶矣，於舜之功，二十之一也。」見《左傳》。
- id: hhs.67.p25.a1
  anchor: hhs.67.p25
  at: 42
  length: 0
  type: lixian
  text: 景帝時，韓安國爲梁大夫，坐法抵罪。後梁內史缺，起徒中爲二千石，拜爲內史。臣賢案：此言武帝，誤也。
- id: hhs.67.p25.a2
  anchor: hhs.67.p25
  at: 51
  length: 0
  type: lixian
  text: 張敞爲京兆尹，坐殺人亡命歸家。冀州亂，征敞爲冀州刺史。
- id: hhs.67.p25.a3
  anchor: hhs.67.p25
  at: 63
  length: 0
  type: lixian
  text: 《詩·小雅》曰：「顯允方叔，征伐玁狁，蠻荊來威。」鄭玄注云：「方叔先與吉甫征伐玁狁，今特往伐蠻荊，皆使來服於宣王之威，美其功之多也。」緄以順帝時討長沙武陵蠻夷有功，故以比之。
- id: hhs.67.p25.a4
  anchor: hhs.67.p25
  at: 76
  length: 0
  type: lixian
  text: 謂祐奏梁冀弟旻，又爲司隸校尉，權豪畏之也。詩曰：「唯仲山甫，柔亦不茹，剛亦不吐，不侮鰥寡，不畏彊禦。」
- id: hhs.67.p25.a5
  anchor: hhs.67.p25
  at: 116
  length: 0
  type: lixian
  text: 易解卦象詞也。卦坎下震上。解，坎爲險，爲水。水者，雨之象。震爲動，爲雷。王弼注云：「屯難盤結，於是乎解也。」
- id: hhs.67.p26.a1
  anchor: hhs.67.p26
  at: 135
  length: 0
  type: lixian
  text: 《公羊傳》曰：「晉人執□侯，歸之於京師。歸之於者，執之乎天子之側者也。罪定不定已可知矣。」何休注云：「歸之於者，決辭也。」
- id: hhs.67.p26.a2
  anchor: hhs.67.p26
  at: 156
  length: 0
  type: lixian
  text: 解見《張酺傳》。
- id: hhs.67.p27.a1
  anchor: hhs.67.p27
  at: 24
  length: 0
  type: lixian
  text: 裁，音才代反。
- id: hhs.67.p27.a2
  anchor: hhs.67.p27
  at: 38
  length: 0
  type: lixian
  text: 以魚爲喻也。龍門，河水所下之口，在今絳州龍門縣。辛氏三秦記曰「河津一名龍門，水險不通，魚□之屬莫能上，江海大魚薄集龍門下數千，不得上，上則爲龍」也。
- id: hhs.67.p27.a3
  anchor: hhs.67.p27
  at: 91
  length: 0
  type: lixian
  text: 解見《耿弇傳》。
- id: hhs.67.p27.a4
  anchor: hhs.67.p27
  at: 110
  length: 0
  type: lixian
  text: 平署猶連署也。
- id: hhs.67.p27.a5
  anchor: hhs.67.p27
  at: 125
  length: 0
  type: lixian
  text: 獄名，解見靈紀也。
- id: hhs.67.p27.a6
  anchor: hhs.67.p27
  at: 183
  length: 0
  type: lixian
  text: 以朝廷爲污穢也。
- id: hhs.67.p28.a1
  anchor: hhs.67.p28
  at: 58
  length: 0
  type: lixian
  text: 《論語》曰：「鯉趨而過庭。子曰：『學詩乎？』曰『未也』。」又曰：「孔子恂恂然善誘人。」詩曰：「陟彼岵兮，瞻望父兮。」又曰：「一日不見，如三歲兮。」爽致敬於膺，故以父爲喻也。
- id: hhs.67.p28.a2
  anchor: hhs.67.p28
  at: 109
  length: 0
  type: lixian
  text: 上帝謂天子，鼎臣即陳蕃。
- id: hhs.67.p28.a3
  anchor: hhs.67.p28
  at: 114
  length: 0
  type: lixian
  text: 《易·下繫》曰：「人謀鬼謀，百姓與能。」
- id: hhs.67.p28.a4
  anchor: hhs.67.p28
  at: 129
  length: 0
  type: lixian
  text: 《易》曰：「天地之道，貞觀也。」乾九二、九五並曰「利見大人」也。
- id: hhs.67.p28.a5
  anchor: hhs.67.p28
  at: 141
  length: 0
  type: lixian
  text: 夷，傷也。融，朗也。明夷卦離下坤上，離爲日，坤爲地，日之初出，其明未朗。左傳曰：「明而未融，其當旦乎？」以膺黜，故喻之也。
- id: hhs.67.p28.a6
  anchor: hhs.67.p28
  at: 151
  length: 0
  type: lixian
  text: 《春秋考異郵》曰：「虹蜺出，亂惑棄和。」謂棄君子，同小人也。《論語》曰：「君子和而不同，小人同而不和」也。
- id: hhs.67.p28.a7
  anchor: hhs.67.p28
  at: 163
  length: 0
  type: lixian
  text: 《易·文言》曰：「天地閉，賢人隱。」《否》九五曰：「大人休否。」休否謂休廢而否塞。
- id: hhs.67.p28.a8
  anchor: hhs.67.p28
  at: 173
  length: 0
  type: lixian
  text: 見險難，故投身以遠害也。《易》曰：「君子以儉德避難，不可榮以祿。」
- id: hhs.67.p28.a9
  anchor: hhs.67.p28
  at: 177
  length: 0
  type: lixian
  text: 匱，乏也。
- id: hhs.67.p28.a10
  anchor: hhs.67.p28
  at: 203
  length: 0
  type: lixian
  text: 毛萇詩注曰：「衡門，橫木爲門。」
- id: hhs.67.p32.a1
  anchor: hhs.67.p32
  at: 3
  length: 0
  type: lixian
  text: 謝承書「瓚」作「珪」。
- id: hhs.67.p34.a1
  anchor: hhs.67.p34
  at: 41
  length: 0
  type: lixian
  text: 軌，車多也。言絶人事。
- id: hhs.67.p34.a2
  anchor: hhs.67.p34
  at: 113
  length: 0
  type: lixian
  text: 寒蟬謂寂默也。《楚詞》曰：「悲哉秋之爲氣也，蟬寂漠而無聲。」
- id: hhs.67.p34.a3
  anchor: hhs.67.p34
  at: 125
  length: 0
  type: lixian
  text: 力行謂盡力行善也。《禮記》曰：「好問近乎智，力行近乎仁。」
- id: hhs.67.p35.a1
  anchor: hhs.67.p35
  at: 50
  length: 0
  type: lixian
  text: 前有李固、杜喬，故言「亦」也。
- id: hhs.67.p35.t1
  anchor: hhs.67.p35
  at: 64
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 160
  era: 延熹
  era_year: 3
- id: hhs.67.p36.a1
  anchor: hhs.67.p36
  at: 13
  length: 0
  type: lixian
  text: 安國，縣，故城在今定州義豐縣東南。謝承書曰：「祐，宗室胤緒，代有名位。少修操行，學嚴氏春秋、小戴禮、古文尚書，仕郡爲主簿。郡將小子嘗出錢付之，今市買果實，祐悉以買筆書具與之，因白郡將，言『郎君年可入小學，而但傲佷，遠近謂明府無過庭之教，請出授書』。郡將爲使子就祐受經，五日一試，不滿呈限，白決罰，遂成學業也。」
- id: hhs.67.p37.a1
  anchor: hhs.67.p37
  at: 90
  length: 0
  type: lixian
  text: 三河謂河東、河內、河南也。表猶標準也。
- id: hhs.67.p38.t1
  anchor: hhs.67.p38
  at: 3
  length: 4
  type: temporal
  text: 延熹四年
  kind: absolute
  resolution: absolute
  year_ad: 161
  era: 延熹
  era_year: 4
- id: hhs.67.p39.a1
  anchor: hhs.67.p39
  at: 48
  length: 0
  type: lixian
  text: 累氣，屏息也。
- id: hhs.67.p41.a1
  anchor: hhs.67.p41
  at: 40
  length: 0
  type: lixian
  text: 三讓，解見和紀。
- id: hhs.67.p41.a2
  anchor: hhs.67.p41
  at: 50
  length: 0
  type: lixian
  text: 揖，讓也。左傳，吳王壽夢卒，子諸樊既除喪，將立弟季札，札□其室而耕，乃捨之。
- id: hhs.67.p41.a3
  anchor: hhs.67.p41
  at: 66
  length: 0
  type: lixian
  text: 蘧瑗字伯玉，甯子名俞，並衞大夫。《論語》孔子曰：「君子哉蘧伯玉，邦有道則仕，邦無道則可卷而懷之。」又曰：「寧武子邦無道則愚。」
- id: hhs.67.p41.a4
  anchor: hhs.67.p41
  at: 76
  length: 0
  type: lixian
  text: 《老子》曰「古之善爲道者，微妙玄通，深不可識」也。又曰「道沖而用之或不盈」。
- id: hhs.67.p41.a5
  anchor: hhs.67.p41
  at: 96
  length: 0
  type: lixian
  text: 莊子曰：「舜讓天下於子州支伯，子州支伯曰：『予適有幽憂之病，方且理之，未暇理天下也。』」靈帝初，陳蕃輔政，以祐爲河南尹。及蕃敗，祐黜歸，卒於家。明年，大誅黨人，幸不及禍。
- id: hhs.67.p42.a1
  anchor: hhs.67.p42
  at: 13
  length: 0
  type: lixian
  text: 上虞，縣，故城在今越州餘姚縣西。有虞山，在縣東。
- id: hhs.67.p42.a2
  anchor: hhs.67.p42
  at: 55
  length: 0
  type: lixian
  text: 孔子作《春秋緯》十二篇。
- id: hhs.67.p43.a1
  anchor: hhs.67.p43
  at: 41
  length: 0
  type: lixian
  text: 中，猶中傷
- id: hhs.67.p44.a1
  anchor: hhs.67.p44
  at: 35
  length: 0
  type: lixian
  text: 牛渚，山名。突出江中，謂爲牛渚圻，在宣州當塗縣北也。
- id: hhs.67.p45.a1
  anchor: hhs.67.p45
  at: 49
  length: 0
  type: lixian
  text: 比門，猶並門也。
- id: hhs.67.p47.a1
  anchor: hhs.67.p47
  at: 73
  length: 0
  type: lixian
  text: 林慮，今相州縣
- id: hhs.67.p47.a2
  anchor: hhs.67.p47
  at: 124
  length: 0
  type: lixian
  text: 涅陽，縣，屬南陽郡
- id: hhs.67.p49.a1
  anchor: hhs.67.p49
  at: 13
  length: 0
  type: lixian
  text: 安觿在今南陽縣西南，仍有其名，無復基趾也。
- id: hhs.67.p50.a1
  anchor: hhs.67.p50
  at: 13
  length: 0
  type: lixian
  text: 高城，縣，故城在今滄州鹽山縣南。
- id: hhs.67.p50.a2
  anchor: hhs.67.p50
  at: 26
  length: 0
  type: lixian
  text: 慎，縣，屬汝南郡。貝丘，縣，屬清河郡。
- id: hhs.67.p51.a1
  anchor: hhs.67.p51
  at: 13
  length: 0
  type: lixian
  text: 征羌，解見《來歙傳》。謝承書曰：「汝南細陽人也。」
- id: hhs.67.p52.a1
  anchor: hhs.67.p52
  at: 0
  length: 0
  type: lixian
  text: 漢官儀曰：「光祿舉敦厚﹑質樸﹑遜讓﹑節儉。」此爲四行也。
- id: hhs.67.p52.a2
  anchor: hhs.67.p52
  at: 108
  length: 0
  type: lixian
  text: 版，笏也。
- id: hhs.67.p52.a3
  anchor: hhs.67.p52
  at: 132
  length: 0
  type: lixian
  text: 格，正也。
- id: hhs.67.p53.a1
  anchor: hhs.67.p53
  at: 19
  length: 0
  type: lixian
  text: 《漢官儀》曰：「三公聽采長史臧否，人所疾苦，還條奏之，是爲舉謠言也。頃者舉謠言，掾屬令史都會殿上，主者大言，州郡行狀云何，善者同聲稱之，不善者默爾銜枚。」
- id: hhs.67.p54.a1
  anchor: hhs.67.p54
  at: 12
  length: 0
  type: lixian
  text: 《左傳》曰：「爲國家者，見惡如農夫之務去草焉。」
- id: hhs.67.p56.a1
  anchor: hhs.67.p56
  at: 136
  length: 0
  type: lixian
  text: 裁，音才載反。
- id: hhs.67.p57.a1
  anchor: hhs.67.p57
  at: 8
  length: 0
  type: lixian
  text: 鉤，引也。
- id: hhs.67.p57.a2
  anchor: hhs.67.p57
  at: 57
  length: 0
  type: lixian
  text: 帝謂天也。
- id: hhs.67.p58.a1
  anchor: hhs.67.p58
  at: 65
  length: 0
  type: lixian
  text: 三木，項及手足皆有械，更以物蒙覆其頭也。前書司馬遷曰「魏其，大將也，衣赭關三木」也。
- id: hhs.67.p58.a2
  anchor: hhs.67.p58
  at: 169
  length: 0
  type: lixian
  text: 探湯喻去疾也。見《論語》。
- id: hhs.67.p58.a3
  anchor: hhs.67.p58
  at: 287
  length: 0
  type: lixian
  text: 伯夷﹑叔齊餓死首陽山，見《史記》。首陽山在洛陽東北。
- id: hhs.67.p58.a4
  anchor: hhs.67.p58
  at: 302
  length: 0
  type: lixian
  text: 鄭玄注《周禮》曰：「木在足曰桎，在手曰梏。」
- id: hhs.67.p59.a1
  anchor: hhs.67.p59
  at: 28
  length: 0
  type: lixian
  text: 兩，車也。尚書曰：「戎車三百兩。」
- id: hhs.67.p60.a1
  anchor: hhs.67.p60
  at: 75
  length: 0
  type: lixian
  text: 左傳，晉討欒盈之黨，殺叔向之弟羊舌虎，並囚叔向。於是祁奚聞之，見范宣子曰：「夫謀而鮮過，惠訓不倦者，叔向有焉。社稷之固也，猶將十代宥之，今一不免其身，不亦惑乎？」宣子説而免之。祁奚不見叔向而歸，叔向亦不告免焉而朝。孔安國注尚書曰「自功曰伐」也。
- id: hhs.67.p61.t1
  anchor: hhs.67.p61
  at: 0
  length: 4
  type: temporal
  text: 建寧二年
  kind: absolute
  resolution: absolute
  year_ad: 169
  era: 建寧
  era_year: 2
- id: hhs.67.p61.a1
  anchor: hhs.67.p61
  at: 38
  length: 0
  type: lixian
  text: 傳，驛舍也，音知戀反。
- id: hhs.67.p61.a2
  anchor: hhs.67.p61
  at: 137
  length: 0
  type: lixian
  text: 仲博，滂弟也。
- id: hhs.67.p61.a3
  anchor: hhs.67.p61
  at: 146
  length: 0
  type: lixian
  text: 謝承書曰：「滂父顯，故龍舒侯相也。」
- id: hhs.67.p62.a1
  anchor: hhs.67.p62
  at: 19
  length: 0
  type: lixian
  text: 李膺﹑杜密。
- id: hhs.67.p64.a1
  anchor: hhs.67.p64
  at: 12
  length: 0
  type: lixian
  text: 前書班固曰「振拔污塗，跨騰風雲」也。
- id: hhs.67.p64.a2
  anchor: hhs.67.p64
  at: 23
  length: 0
  type: lixian
  text: 《周易》曰：「鼓以動之。」
- id: hhs.67.p64.a3
  anchor: hhs.67.p64
  at: 96
  length: 0
  type: lixian
  text: 《論語》之文。
- id: hhs.67.p66.a1
  anchor: hhs.67.p66
  at: 12
  length: 0
  type: lixian
  text: 項，今陳州項城縣也。
- id: hhs.67.p68.a1
  anchor: hhs.67.p68
  at: 13
  length: 0
  type: lixian
  text: 梁父故城在今兗州泗水縣北。
- id: hhs.67.p69.a1
  anchor: hhs.67.p69
  at: 20
  length: 0
  type: lixian
  text: 張耳，大梁人也。高祖立爲趙王。
- id: hhs.67.p70.t1
  anchor: hhs.67.p70
  at: 0
  length: 4
  type: temporal
  text: 延熹八年
  kind: absolute
  resolution: absolute
  year_ad: 165
  era: 延熹
  era_year: 8
- id: hhs.67.p70.a1
  anchor: hhs.67.p70
  at: 27
  length: 0
  type: lixian
  text: 縣名，屬山陽郡，故城在今兗州金鄉縣南。
- id: hhs.67.p72.a1
  anchor: hhs.67.p72
  at: 99
  length: 0
  type: lixian
  text: 明廷猶明府。言不執儉，得義之半也。
- id: hhs.67.p73.t1
  anchor: hhs.67.p73
  at: 0
  length: 4
  type: temporal
  text: 中平元年
  kind: absolute
  resolution: absolute
  year_ad: 184
  era: 中平
  era_year: 1
- id: hhs.67.p76.a1
  anchor: hhs.67.p76
  at: 14
  length: 0
  type: lixian
  text: 違，避也。史記魏齊，魏之諸公子也。虞卿，趙相也。范睢入秦，爲昭王相，昭王乃遺趙王書曰：「魏齊，范睢之仇也，急持其頭來。」趙王乃圍齊，齊急亡，見虞卿。卿度趙王不可説，乃解其印，與齊往信陵君所。信陵君初聞之疑，後乃出迎。齊聞信陵初疑，遂自刎。趙王持其頭遺秦也。
- id: hhs.67.p76.a2
  anchor: hhs.67.p76
  at: 24
  length: 0
  type: lixian
  text: 季布，楚人。爲項羽將，數窘漢王。羽敗，漢購求布千金，敢舍匿，罪三族。布匿濮陽周氏，髡鉗布，之魯朱家所賣之。朱家心知是季布也。買置田舍。乃往洛陽，見汝陰侯灌嬰，説之曰：「季布何罪？臣各爲主用，職耳。」汝陰侯言於高帝，帝乃赦之。拜郎中，後爲河東守也。
- id: hhs.67.p76.a3
  anchor: hhs.67.p76
  at: 95
  length: 0
  type: lixian
  text: 堙，塞也。前書班固曰：「何武、王嘉，區區以一簣障江河，用沒其身。」
- id: hhs.67.p76.a4
  anchor: hhs.67.p76
  at: 110
  length: 0
  type: lixian
  text: 《論語》曰：「人而不仁，疾之以甚，亂也。」又曰：「人雖欲自絶，其何傷於日月[乎]？多見其不知量也。」
- id: hhs.67.p77.a1
  anchor: hhs.67.p77
  at: 12
  length: 0
  type: lixian
  text: 棘，音力
- id: hhs.67.p77.a2
  anchor: hhs.67.p77
  at: 28
  length: 0
  type: lixian
  text: 《方言》曰：「叨，殘也。」
- id: hhs.67.p78.a1
  anchor: hhs.67.p78
  at: 44
  length: 0
  type: lixian
  text: 《爾雅》曰：「董，督正也。」
- id: hhs.67.p80.a1
  anchor: hhs.67.p80
  at: 29
  length: 0
  type: lixian
  text: 臣賢案：前書孔霸字次儒，即安國孫，世習尚書。宣帝時爲太中大夫，授太子經，遷詹事，高密相。元帝即位，霸以師賜爵關內侯，號褒成君。薨，謚曰烈君。今范書及謝承書皆雲成帝，又言封侯，蓋誤也。詹事及相俱二千石，故曰歷卿。
- id: hhs.67.p80.a2
  anchor: hhs.67.p80
  at: 60
  length: 0
  type: lixian
  text: 家學《尚書》。
- id: hhs.67.p81.a1
  anchor: hhs.67.p81
  at: 13
  length: 0
  type: lixian
  text: 重合，縣，故城在今滄州樂陵縣東。
- id: hhs.67.p84.a1
  anchor: hhs.67.p84
  at: 13
  length: 0
  type: lixian
  text: 瑕丘，今兗州縣。
- id: hhs.67.p84.a2
  anchor: hhs.67.p84
  at: 98
  length: 0
  type: lixian
  text: 蒙，縣，屬梁國。
- id: hhs.67.p84.a3
  anchor: hhs.67.p84
  at: 129
  length: 0
  type: lixian
  text: 謝承書曰「敷與孫同衣而行，并日而食」也。
- id: hhs.67.p85.a1
  anchor: hhs.67.p85
  at: 13
  length: 0
  type: lixian
  text: 陽平故城，今魏州莘縣。
- id: hhs.67.p85.a2
  anchor: hhs.67.p85
  at: 30
  length: 0
  type: lixian
  text: 珪璋，玉也。半珪曰璋。謝承書曰：「林宗歎儒有珪璋之質，終必爲令德之士。」《詩》曰：「如珪如璋，令聞令望。」
- id: hhs.67.p87.a1
  anchor: hhs.67.p87
  at: 14
  length: 0
  type: lixian
  text: 新息，今豫州縣。
- id: hhs.67.p87.a2
  anchor: hhs.67.p87
  at: 58
  length: 0
  type: lixian
  text: 就發處案驗之。
- id: hhs.67.p89.t1
  anchor: hhs.67.p89
  at: 0
  length: 4
  type: temporal
  text: 延熹九年
  kind: absolute
  resolution: absolute
  year_ad: 166
  era: 延熹
  era_year: 9
- id: hhs.67.p91.a1
  anchor: hhs.67.p91
  at: 28
  length: 0
  type: lixian
  text: 望，怨也。
- id: hhs.67.p91.a2
  anchor: hhs.67.p91
  at: 46
  length: 0
  type: lixian
  text: 相，視也。左傳之文也。
- id: hhs.67.p93.a1
  anchor: hhs.67.p93
  at: 13
  length: 0
  type: lixian
  text: 襄鄉故城在今隨州棗陽縣東北也。
- id: hhs.67.p93.a2
  anchor: hhs.67.p93
  at: 86
  length: 0
  type: lixian
  text: 醊，祭酹也，音竹歲反。
- id: hhs.67.p95.a1
  anchor: hhs.67.p95
  at: 32
  length: 0
  type: lixian
  text: 《詩·大雅》曰：「予曰有胥附，予曰有先後，予曰有奔走，予曰有禦侮。」毛萇注曰：「諭德宣譽曰奔走。」
- id: hhs.67.p98.a1
  anchor: hhs.67.p98
  at: 23
  length: 0
  type: lixian
  text: 礫音歷。説文曰：「礫，小石也。」言渭以涇濁，乃顯其清，玉居礫石，乃見其貞。區猶別也。嗜，愛也。從形謂形有善惡也。以諭彼李膺等與宦豎不同，故相憎疾。
- id: hhs.67.p98.a2
  anchor: hhs.67.p98
  at: 33
  length: 0
  type: lixian
  text: 蕕，臭草也。左傳曰：「一熏一蕕，十年尚猶有華。」易否卦曰：「小人道長，君子道銷。」泰卦曰：「君子道長，小人道銷。」老子曰「高下相傾」也。
- id: hhs.67.p98.a3
  anchor: hhs.67.p98
  at: 43
  length: 0
  type: lixian
  text: 前書龔勝死，有一老父入哭甚哀，曰：「熏以香自燒，膏以明自銷。」
