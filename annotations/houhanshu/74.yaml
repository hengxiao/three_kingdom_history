- id: hhs.74.p255.a1
  anchor: hhs.74.p255
  at: 31
  length: 0
  type: lixian
  text: 左傳曰：「震盪播越。」書曰：「彝倫攸斁。」彝，常也。倫，理也。攸，所也。斁，敗也。
- id: hhs.74.p255.a2
  anchor: hhs.74.p255
  at: 65
  length: 0
  type: lixian
  text: 言太公者尊之，謂紹也。
- id: hhs.74.p255.a3
  anchor: hhs.74.p255
  at: 76
  length: 0
  type: lixian
  text: 楚，荊州也。魏，冀州也。
- id: hhs.74.p255.a4
  anchor: hhs.74.p255
  at: 86
  length: 0
  type: lixian
  text: 《左傳》曰：「同好惡，奬王室。」杜預曰：「奬，助也。」
- id: hhs.74.p255.a5
  anchor: hhs.74.p255
  at: 145
  length: 0
  type: lixian
  text: 奕，重也，《國語》曰：「奕代載德」。
- id: hhs.74.p255.a6
  anchor: hhs.74.p255
  at: 195
  length: 0
  type: lixian
  text: 《詩·小雅》曰：「營營青蠅，止於榛。讒人罔極，構我二人。」史記，費無忌得寵於楚平王，為太子建少傅，無寵於太子，日夜讒太子於王，欲誅太子。太子亡奔宋。左傳作「無極」。竿旌、二壘者，謂譚、尚也。
- id: hhs.74.p255.a7
  anchor: hhs.74.p255
  at: 246
  length: 0
  type: lixian
  text: 左傳子產曰：「高辛氏有二子，伯曰閼伯，季曰實沈，居於曠林，不相能也，日尋干戈，以相征討。」
- id: hhs.74.p255.a8
  anchor: hhs.74.p255
  at: 315
  length: 0
  type: lixian
  text: 若周公誅管、蔡之類。
- id: hhs.74.p255.a9
  anchor: hhs.74.p255
  at: 322
  length: 0
  type: lixian
  text: 若齊桓公殺子糾也。
- id: hhs.74.p257.a1
  anchor: hhs.74.p257
  at: 10
  length: 0
  type: lixian
  text: 《公羊傳》曰：「紀侯大去其國。大去者何？滅之也。孰滅之也？齊滅之。曷為不言齊滅之？為襄公諱也。春秋為賢者諱。何賢於襄公？復讎也。何讎爾？遠祖也。哀公烹於周，紀侯譖之。遠祖者幾代？九代矣。」《史記》曰：「紀侯譖齊哀公於周，周夷王烹哀公。其弟靜立，是為胡公。弟獻公立，子武公立，子厲公立，子文公立，子成公立，子莊公立，子厘公立，子襄公八年，紀遷去其邑，是為九代也。」
- id: hhs.74.p258.a1
  anchor: hhs.74.p258
  at: 34
  length: 0
  type: lixian
  text: 荀偃，晉大夫也。左傳曰，荀偃將中軍，士棄佐之，伐齊。濟河，病目出，及卒，而視不可唅。欒盈曰：「其為未卒事於齊故也？」士棄撫之曰：「主苟終，所不嗣事於齊有如河！」乃瞑受含。伯游，荀偃字也。宣子即士棄也，士燮之子，士會之孫。
- id: hhs.74.p258.a2
  anchor: hhs.74.p258
  at: 51
  length: 0
  type: lixian
  text: 左傳曰，公山不狃曰：「君子違難不適讎國。」杜預曰：「違，奔亡也。」史記樂毅遺燕惠王書曰：「臣聞古之君子，交絕不出惡聲。」
- id: hhs.74.p259.a1
  anchor: hhs.74.p259
  at: 38
  length: 0
  type: lixian
  text: 左傳曰：「段不弟，故不言弟。」
- id: hhs.74.p260.a1
  anchor: hhs.74.p260
  at: 39
  length: 0
  type: lixian
  text: 鄭武公娶於申，曰武姜，生莊公及叔段。莊公寤生，驚姜氏，遂惡之，愛叔段，欲立之，武公弗許。及莊公立，姜氏為請京，使居之。段繕甲兵，將襲鄭，夫人將啟之。莊公遂寘姜氏於城穎，而誓之曰：「不及黃泉，無相見也。」既而悔之。穎考叔曰：「君何患焉？若闕地及泉，隧而相見，其誰曰不然！」從之。公入而賦：「大隧之中，其樂也融融。」姜出而賦：「大隧之外，其樂也洩洩。」遂為母子如初。事見左傳。史記曰，舜名重華。父瞽叟盲而舜母死，瞽叟更娶妻，生象。瞽叟愛後妻子，常欲殺舜。舜踐帝位，封弟象為諸侯。孟子曰：「象至不仁，封諸有鼻。仁人之於其弟也，不藏怒焉，不宿怨焉，親愛之而已矣。」鼻國在永州營道縣北，今猶謂之鼻亭。
- id: hhs.74.p261.a1
  anchor: hhs.74.p261
  at: 11
  length: 0
  type: lixian
  text: 《魏氏春秋》載表遺尚書曰：「知變起辛、郭，禍結同生，追閼伯、實沈之蹤，忘常棣死喪之義，親尋干戈，殭屍流血，聞之哽咽，若存若亡。昔軒轅有涿鹿之戰，周公有商、奄之師，皆所以翦除穢害而定王業，非強弱之爭，喜怒之忿也。故雖滅親不尤，誅兄不傷。今二君初承洪業，纂繼前軌，進有國家傾危之慮，退有先公遺恨之負。當唯曹是務，唯國是康。何者？金木水火剛柔相濟，然後克得其和，能為人用。今青州天性峭急，迷於曲直。仁君度數弘廣，綽然有餘，當以大苞小，以優容劣，先除曹操，以平先公之恨，事定之後，乃議曲直之評，不亦善乎！若留神遠圖，克己復禮，當振旅長驅，共□王室。若迷而不返，遵而無改，則胡夷將有誚讓之言，況我同盟，復能戮力仁君之役哉！此韓盧、東郭自困於前，而遺田父之獲者也。憤躍鶴望，冀聞和同之聲。若其泰也，則袁族其與漢升降乎！如其否也，則同盟永無望矣。」表二書並見王粲集。
