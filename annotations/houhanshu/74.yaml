  type: lixian
  text: 《韓非子·亡征》曰：「佷剛而不和，愎諫而好勝，不顧社稷而輕為信者，可亡也。」又曰：「太子輕，庶子伉，可亡也。」又曰：「太子卑而庶子尊，可亡也。」
- id: hhs.74.p317.a2
  anchor: hhs.74.p317
  at: 126
  length: 0
  type: lixian
  text: 言其如刻木為人，無所知也。《前書》：「有木禺龍一。」音義曰：「禺，寄也。寄龍形於木。」
