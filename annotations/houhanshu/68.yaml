annotations:
- id: hhs.68.p2.a1
  anchor: hhs.68.p2
  at: 6
  length: 0
  type: lixian
  text: 范曄父名泰，故改爲此「太」。鄭公業之名亦同焉。
- id: hhs.68.p2.a2
  anchor: hhs.68.p2
  at: 13
  length: 0
  type: lixian
  text: 介休，今汾州縣。
- id: hhs.68.p2.a3
  anchor: hhs.68.p2
  at: 29
  length: 0
  type: lixian
  text: 《蒼頡篇》曰：「廷，直也。」《說文》：「廷，朝中也。」《風俗通》：「廷，正也。言縣廷、郡廷、朝廷，皆取平均正直也。」
- id: hhs.68.p3.a1
  anchor: hhs.68.p3
  at: 48
  length: 0
  type: lixian
  text: 《左傳》晉汝叔寬之詞。支猶持也。
- id: hhs.68.p3.a2
  anchor: hhs.68.p3
  at: 98
  length: 0
  type: lixian
  text: 音丁念反。周遷《輿服雜事》曰：「巾以葛爲之，形如幍，音口洽反。本居士野人所服。魏武造幍，其巾乃廢。今國子學生服焉。以白紗爲之。」
- id: hhs.68.p3.a3
  anchor: hhs.68.p3
  at: 122
  length: 0
  type: lixian
  text: 《泰別傳》曰：「泰名顯，士爭歸之，載刺常盈車。」
- id: hhs.68.p3.a4
  anchor: hhs.68.p3
  at: 148
  length: 0
  type: lixian
  text: 介推之類。
- id: hhs.68.p3.a5
  anchor: hhs.68.p3
  at: 153
  length: 0
  type: lixian
  text: 柳下惠之類。
- id: hhs.68.p3.a6
  anchor: hhs.68.p3
  at: 172
  length: 0
  type: lixian
  text: 《禮記》曰：「儒有上不臣天子，下不事諸侯。」
- id: hhs.68.p3.a7
  anchor: hhs.68.p3
  at: 182
  length: 0
  type: lixian
  text: 謝承《書》曰：「遭母憂，歐血發病，歷年乃瘳。」
- id: hhs.68.p3.a8
  anchor: hhs.68.p3
  at: 197
  length: 0
  type: lixian
  text: 《禮記》曰：「擬人必於其倫。」鄭玄注曰：「倫猶類也。」《論語》孔子曰：「邦有道，危言危行。邦無道，危行言孫。」覈猶實也。
- id: hhs.68.p4.t1
  anchor: hhs.68.p4
  at: 0
  length: 4
  type: temporal
  text: 建寧元年
  kind: absolute
  resolution: absolute
  year_ad: 168
  era: 建寧
  era_year: 1
- id: hhs.68.p4.a1
  anchor: hhs.68.p4
  at: 48
  length: 0
  type: lixian
  text: 詩大雅之詞。
- id: hhs.68.p4.a2
  anchor: hhs.68.p4
  at: 64
  length: 0
  type: lixian
  text: 詩小雅也。言不知王業當何所歸。
- id: hhs.68.p5.t1
  anchor: hhs.68.p5
  at: 0
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 169
  era: 建寧
  era_year: 2
- id: hhs.68.p5.a1
  anchor: hhs.68.p5
  at: 27
  length: 0
  type: lixian
  text: 謝承《書》曰：「泰以建寧二年正月卒，自弘農函谷關以西，河內湯陰以北，二千里負笈荷擔彌路，柴車葦裝塞塗，蓋有萬數來赴。」
- id: hhs.68.p6.a1
  anchor: hhs.68.p6
  at: 11
  length: 0
  type: lixian
  text: 謝承《書》曰：「泰之所名，人品乃定，先言後驗，衆皆服之。故適陳留則友符偉明，遊太學則師仇季智，之陳國則親魏德公，入汝南則交黃叔度。初，太始至南州，過袁奉高，不宿而去；從叔度，累日不去。或以問太。太曰：『奉高之器，譬之氿濫，雖清而易挹。叔度之器，汪汪若千頃之陂，澄之不清，擾之不濁，不可量也。』已而果然，太以是名聞天下。」
- id: hhs.68.p6.a2
  anchor: hhs.68.p6
  at: 51
  length: 0
  type: lixian
  text: 章章猶昭昭也。
- id: hhs.68.p7.a1
  anchor: hhs.68.p7
  at: 69
  length: 0
  type: lixian
  text: 《呂氏春秋》曰：「顏涿聚，梁父大盜也，學於孔子。」《左傳》曰：「晉伐齊，戰于黎丘，齊師敗績，親禽顏庚。」杜預注曰：「黎丘，隰也。顏庚，齊大夫顏涿聚也。」又曰：「晉荀瑤伐鄭，鄭駟弘請救於齊。齊師將興，陳成子屬孤子，三日朝，設乘車兩馬，繫五邑焉。召顏涿聚之子晉，曰：『隰之役，而父死焉，以國之多難，未汝恤也。今君命汝以是邑也，服車而朝，無廢前勞。』」《呂氏春秋》曰：「段干木，晉國之駔。」《說文》曰：「駔，會也。謂合兩家之賣買，如今之度巿也。」《新序》曰「魏文侯過段干木之閭而軾之，遂致祿百萬，而時往問之。國人皆喜，相與誦之曰：『吾君好正，段干木之敬；吾君好忠，段干木之隆。』秦欲攻魏，司馬唐諫曰：『段干木賢者也，而魏禮之，天下莫不聞，無乃不可加兵乎？』秦君以爲然」也。駔音子朗反。
- id: hhs.68.p7.a2
  anchor: hhs.68.p7
  at: 85
  length: 0
  type: lixian
  text: 《論語》曰：「蘧伯玉使人於孔子，問之曰：『夫子何爲？』對曰：『夫子欲寡其過而未能也。』」又曰：「顏回好學，不貳過。」
- id: hhs.68.p7.a3
  anchor: hhs.68.p7
  at: 132
  length: 0
  type: lixian
  text: 《論語》孔子之言也。鄭玄注云：「不仁之人，當以風化之。若疾之以甚，是益使爲亂也。」
- id: hhs.68.p8.a1
  anchor: hhs.68.p8
  at: 36
  length: 0
  type: lixian
  text: 夷，平也。《說文》曰：「踞，蹲也。」
- id: hhs.68.p8.a2
  anchor: hhs.68.p8
  at: 95
  length: 0
  type: lixian
  text: 草，麤也。
- id: hhs.68.p9.a1
  anchor: hhs.68.p9
  at: 13
  length: 0
  type: lixian
  text: 《十三州志》曰：楊氏縣在今魏郡北也。
- id: hhs.68.p10.a1
  anchor: hhs.68.p10
  at: 22
  length: 0
  type: lixian
  text: 士即門卒。
- id: hhs.68.p11.a1
  anchor: hhs.68.p11
  at: 6
  length: 0
  type: lixian
  text: 謝承《書》「乙」作「文」。
- id: hhs.68.p12.a1
  anchor: hhs.68.p12
  at: 28
  length: 0
  type: lixian
  text: 謝承《書》曰：「淑爲舅宋瑗報讎於縣中，爲吏所捕，繫獄當死。泰與語，淑懇惻流涕。泰詣縣令應操，陳其報怨蹈義之士。被赦，縣不宥之，郡上言，乃得原。」
- id: hhs.68.p12.a2
  anchor: hhs.68.p12
  at: 108
  length: 0
  type: lixian
  text: 互鄉，鄉名。「互鄉難與言，童子見，門人惑。孔子曰：『人潔己以進，與其進，不保其往。』」
- id: hhs.68.p17.a1
  anchor: hhs.68.p17
  at: 19
  length: 0
  type: lixian
  text: 《說文》曰：「郵，境上傳書舍也。」廣雅曰：「郵，驛也。」置亦驛也。《風俗通》曰：「漢改郵爲置。置者，度其遠近之閒置之也。」
- id: hhs.68.p17.a2
  anchor: hhs.68.p17
  at: 94
  length: 0
  type: lixian
  text: 謝承《書》曰：「太原郭長信、王長文、長文弟子師、韓文布、李子政、曹子元、定襄周康子、西河王季然、雲中丘季智名靈舉。子師位至司徒，季然北地太守，其餘多典州郡者。」
- id: hhs.68.p18.a1
  anchor: hhs.68.p18
  at: 28
  length: 0
  type: lixian
  text: 徵，明也。沈，深也。
- id: hhs.68.p18.a2
  anchor: hhs.68.p18
  at: 39
  length: 0
  type: lixian
  text: 詭，違也。
- id: hhs.68.p18.a3
  anchor: hhs.68.p18
  at: 49
  length: 0
  type: lixian
  text: 帝謂堯也。書曰：「知人則哲，惟帝爲難。」
- id: hhs.68.p18.a4
  anchor: hhs.68.p18
  at: 79
  length: 0
  type: lixian
  text: 亨，通也。
- id: hhs.68.p18.a5
  anchor: hhs.68.p18
  at: 102
  length: 0
  type: lixian
  text: 墨翟、孟軻也。絕，過也。
- id: hhs.68.p19.a1
  anchor: hhs.68.p19
  at: 25
  length: 0
  type: lixian
  text: 《續漢志》曰：「都官從事，主察舉百官犯法者。」融恥爲其吏而去。
- id: hhs.68.p19.a2
  anchor: hhs.68.p19
  at: 69
  length: 0
  type: lixian
  text: 幅巾者，以一幅爲之也。褎，古袖字。如雲者，奔踊而出也。
- id: hhs.68.p19.a3
  anchor: hhs.68.p19
  at: 107
  length: 0
  type: lixian
  text: 古人相見，必因紹介。介，因也，言因此人以相接見也。謝承書曰：「融見林宗，便與之交。又紹介於膺，以爲海之明珠，未燿其光，鳥之鳳皇，羽儀未翔。膺與林宗相見，待以師友之禮，遂振名天下，融之致也。」
- id: hhs.68.p20.a1
  anchor: hhs.68.p20
  at: 58
  length: 0
  type: lixian
  text: 謝承書曰：「文經、子艾，曜名遠近，聲價已定，徵辟不就，療病京師，不通賔客。公卿將相大夫遣門生旦暮問疾，郎吏公府掾屬雜坐其門，不得見也。」
- id: hhs.68.p21.a1
  anchor: hhs.68.p21
  at: 60
  length: 0
  type: lixian
  text: 伷音冑。謝承書曰：「馮岱字德山。性忼慨，有文武異才。旣到官，融往相見，薦范冉爲功曹，韓卓爲主簿，孔伷爲上計吏。」袁山松書曰：「卓字子助。臘日，奴竊食祭其先，卓義其心，即日免之。」
- id: hhs.68.p22.a1
  anchor: hhs.68.p22
  at: 34
  length: 0
  type: lixian
  text: 易繫詞曰：「古之葬者，厚衣以薪，葬之中野。」
- id: hhs.68.p22.a2
  anchor: hhs.68.p22
  at: 51
  length: 0
  type: lixian
  text: 謝承書：「潁川張元祖，志行士也，來存融，弔其妻亡，知其如此，謂言『足下欲尚古道，非不清妙；且禮設棺槨，制杖章，孔子曰「吾從周」』。便推所乘羸牛車，命融以給殯，融受而不辭也。」
- id: hhs.68.p24.a1
  anchor: hhs.68.p24
  at: 13
  length: 0
  type: lixian
  text: 輿音預。
- id: hhs.68.p24.a2
  anchor: hhs.68.p24
  at: 43
  length: 0
  type: lixian
  text: 《魏志》曰：「和洽字陽士，汝南西平人也。初舉孝廉，大將軍辟，不就。魏國建，爲侍中。」
- id: hhs.68.p25.a1
  anchor: hhs.68.p25
  at: 14
  length: 0
  type: lixian
  text: 璆音求，又巨秋反。
- id: hhs.68.p27.a1
  anchor: hhs.68.p27
  at: 16
  length: 0
  type: lixian
  text: 令品藻爲題目。
- id: hhs.68.p29.a1
  anchor: hhs.68.p29
  at: 30
  length: 0
  type: lixian
  text: 《蜀志》曰：「許靖字文休，少與從弟劭俱知名，並有人倫臧否之稱，而私情不協。劭爲郡功曹，排擯靖不得齒敘，以馬磨自給。」
- id: hhs.68.p30.a1
  anchor: hhs.68.p30
  at: 123
  length: 0
  type: lixian
  text: 繇字正禮。
- id: hhs.68.p30.a2
  anchor: hhs.68.p30
  at: 133
  length: 0
  type: lixian
  text: 寓，寄也。
- id: hhs.68.p31.a1
  anchor: hhs.68.p31
  at: 18
  length: 0
  type: lixian
  text: 平輿故城，今豫州汝陽縣東北，有二龍鄉、月旦里。
- id: hhs.68.p32.a1
  anchor: hhs.68.p32
  at: 13
  length: 0
  type: lixian
  text: 甄，明也。藻猶飾也。
- id: hhs.68.p32.a2
  anchor: hhs.68.p32
  at: 23
  length: 0
  type: lixian
  text: 明發，發夕至明也。《呂氏春秋》曰：「孔子周流天下。」
- id: hhs.68.p32.a3
  anchor: hhs.68.p32
  at: 43
  length: 0
  type: lixian
  text: 逡巡，自退不仕也。
