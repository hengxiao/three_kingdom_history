chapter: hhs.58
source:
  id: wikisource
  url: https://zh.wikisource.org/wiki/後漢書/卷58
  retrieved: '2026-05-03'
  sha256: e2788721b78210102b772d0bc2d0c61e366328b8f24c6e221499081787f6f0b8
annotations:
- id: hhs.58.p2.a1
  anchor: hhs.58.p2
  at: 13
  length: 0
  type: lixian
  text: 武平故城在今亳州鹿邑縣東北。酈元水經注云武平城西南七里有漢尚書令虞詡碑，題云「君諱詡，字定安，虞仲之後」。定安蓋詡之別字也。
- id: hhs.58.p2.a2
  anchor: hhs.58.p2
  at: 70
  length: 0
  type: lixian
  text: 前書，于定國字曼倩，東海人。其父于公為縣獄吏、郡決曹，所決皆不恨，為之生立祠。其門閭壞，父老方共修之，于公曰：「少高大閭門，令容駟馬高蓋車。我決獄多陰德，未嘗有所冤，子孫必有興者。」至定國為丞相，孫永為御史大夫也。
- id: hhs.58.p4.a1
  anchor: hhs.58.p4
  at: 72
  length: 0
  type: lixian
  text: 漢官儀曰：「修字伯游，襄城人也。」
- id: hhs.58.p5.t1
  anchor: hhs.58.p5
  at: 0
  length: 4
  type: temporal
  text: 永初四年
  kind: absolute
  resolution: absolute
  year_ad: 110
  era: 永初
  era_year: 4
- id: hhs.58.p7.a1
  anchor: hhs.58.p7
  at: 15
  length: 0
  type: lixian
  text: 說文曰：「喭，傳言也。」前書曰：「秦、漢以來，山東出相，山西出將。」
- id: hhs.58.p7.a2
  anchor: hhs.58.p7
  at: 112
  length: 0
  type: lixian
  text: 席捲言無餘也。前書曰「雲徹席捲，後無餘□」也。
- id: hhs.58.p7.a3
  anchor: hhs.58.p7
  at: 160
  length: 0
  type: lixian
  text: 疽，癰瘡也。
- id: hhs.58.p7.a4
  anchor: hhs.58.p7
  at: 221
  length: 0
  type: lixian
  text: 四府謂太傅、太尉、司徒、司空之府也。九卿謂太常、光祿、衛尉、廷尉、太僕、大鴻臚、宗正、大司農、少府等也。
- id: hhs.58.p7.a5
  anchor: hhs.58.p7
  at: 241
  length: 0
  type: lixian
  text: □，散也，音人勇反。
- id: hhs.58.p9.a1
  anchor: hhs.58.p9
  at: 118
  length: 0
  type: lixian
  text: 稜字伯威，援族孫也。
- id: hhs.58.p9.a2
  anchor: hhs.58.p9
  at: 170
  length: 0
  type: lixian
  text: 譸當作「籌」也。
- id: hhs.58.p9.a3
  anchor: hhs.58.p9
  at: 180
  length: 0
  type: lixian
  text: 韓界上黨，魏界河內，相接犬牙，故雲郊也。
- id: hhs.58.p9.a4
  anchor: hhs.58.p9
  at: 194
  length: 0
  type: lixian
  text: 敖倉在滎陽，解具安紀也。
- id: hhs.58.p9.a5
  anchor: hhs.58.p9
  at: 227
  length: 0
  type: lixian
  text: 右臂，喻要便也。
- id: hhs.58.p10.a1
  anchor: hhs.58.p10
  at: 32
  length: 0
  type: lixian
  text: 閡與「礙」同。
- id: hhs.58.p10.a2
  anchor: hhs.58.p10
  at: 145
  length: 0
  type: lixian
  text: 幟，記也。續漢書曰「以絳縷縫其裾」也。
- id: hhs.58.p12.a1
  anchor: hhs.58.p12
  at: 95
  length: 0
  type: lixian
  text: 孫臏為齊軍將，與魏龐涓戰，使齊軍入魏地，為十萬醋，明日為五萬醋，明日為三萬醋。龐涓行三日，大喜曰：「我固知齊卒怯。入吾地三日，士卒亡過半矣。」事見史記。
- id: hhs.58.p12.a2
  anchor: hhs.58.p12
  at: 110
  length: 0
  type: lixian
  text: 前書王吉上疏曰：「古者師行三十里，吉行五十里。」
- id: hhs.58.p14.a1
  anchor: hhs.58.p14
  at: 24
  length: 0
  type: lixian
  text: 赤亭故城在今渭州襄武縣東南，有赤亭水也。
- id: hhs.58.p14.a2
  anchor: hhs.58.p14
  at: 110
  length: 0
  type: lixian
  text: 一作「西」。
- id: hhs.58.p15.a1
  anchor: hhs.58.p15
  at: 22
  length: 0
  type: lixian
  text: 廣雅曰：「僦，賃也。」音子救反。僦五致一謂用五石賃而致一石也。
- id: hhs.58.p15.a2
  anchor: hhs.58.p15
  at: 39
  length: 0
  type: lixian
  text: 沮及下辯並縣名。沮，今興州順政縣也。下辯，今成州同谷縣也。沮音七余反。
- id: hhs.58.p15.a3
  anchor: hhs.58.p15
  at: 55
  length: 0
  type: lixian
  text: 續漢書曰「下辯東三十餘里有峽，中當泉水，生大石，障塞水流，每至春夏，輒溢沒秋稼，壞敗營郭。詡乃使人燒石，以水灌之，石皆坼裂，因鐫去石，遂無泛溺之患」也。
- id: hhs.58.p15.a4
  anchor: hhs.58.p15
  at: 122
  length: 0
  type: lixian
  text: 續漢書曰：「詡始到，谷石千，鹽石八千，見戶萬三千。視事三歲，米石八十，鹽石四百，流人還歸，郡戶數萬，人足家給，一郡無事」。
- id: hhs.58.p16.t1
  anchor: hhs.58.p16
  at: 0
  length: 4
  type: temporal
  text: 永建元年
  kind: absolute
  resolution: absolute
  year_ad: 126
  era: 永建
  era_year: 1
- id: hhs.58.p16.a1
  anchor: hhs.58.p16
  at: 97
  length: 0
  type: lixian
  text: 禮記曰：「夫禮，禁亂之所由生，猶坊止水之所自來也。故以舊防為無用壞之者，必有水敗。」屍子曰：「刑罰者，人之鞭策也。」
- id: hhs.58.p16.a2
  anchor: hhs.58.p16
  at: 166
  length: 0
  type: lixian
  text: 韓詩外傳曰「昔者衛大夫史魚病且死，謂其子曰：『我數言蘧伯玉之賢而不能進，彌子瑕不肖不能退。為人臣生不能進賢而退不肖，死不當理喪正堂，殯我於室足矣。』衛君問其故，子以父言聞，君乃立召蘧伯玉而貴之，彌子瑕而退之，徙殯於正堂，成禮而後去」也。
- id: hhs.58.p16.a3
  anchor: hhs.58.p16
  at: 180
  length: 0
  type: lixian
  text: 漢官儀曰：「敦字文理，京*(兆)**[縣]*人也。」
- id: hhs.58.p17.a1
  anchor: hhs.58.p17
  at: 108
  length: 0
  type: lixian
  text: 震為樊豐所譖而死。
- id: hhs.58.p17.a2
  anchor: hhs.58.p17
  at: 161
  length: 0
  type: lixian
  text: 歐刀，刑人之刀也。
- id: hhs.58.p17.a3
  anchor: hhs.58.p17
  at: 198
  length: 0
  type: lixian
  text: 謂順帝為太子，被江京等廢為濟陰王，程等謀立之時也。
- id: hhs.58.p17.a4
  anchor: hhs.58.p17
  at: 271
  length: 0
  type: lixian
  text: 史記天官書曰「虛、危南有觿星，曰羽林」也。
- id: hhs.58.p17.a5
  anchor: hhs.58.p17
  at: 329
  length: 0
  type: lixian
  text: 埤蒼云：「箱，序也。」字或作「廂」。
- id: hhs.58.p18.a1
  anchor: hhs.58.p18
  at: 0
  length: 0
  type: lixian
  text: 阿母，宋娥也。
- id: hhs.58.p19.t1
  anchor: hhs.58.p19
  at: 44
  length: 2
  type: temporal
  text: 元年
  kind: relative
  resolution: bare_year
  year_ad: 126
  era: 永建
  era_year: 1
- id: hhs.58.p19.a1
  anchor: hhs.58.p19
  at: 108
  length: 0
  type: lixian
  text: 走卒，伍伯之類也。續漢志曰：「伍伯，公八人，中二千石六人，千石、六百石皆四人，自*[四]*百石以下至二百石皆二人。黃綬。武官伍伯，文官辟車。鈴下、侍閣、門蘭、部署、街*[裡]*走卒，皆有程品，多少隨所典領，率皆赤幘縫□。」即今行鞭杖者也。此言錢者，令其出資錢，不役其身也。
- id: hhs.58.p20.a1
  anchor: hhs.58.p20
  at: 16
  length: 0
  type: lixian
  text: 寧陽，縣，屬東平國，故城在今兗州龔丘縣南也。
- id: hhs.58.p21.a1
  anchor: hhs.58.p21
  at: 10
  length: 0
  type: lixian
  text: 回，曲也。
- id: hhs.58.p24.a1
  anchor: hhs.58.p24
  at: 13
  length: 0
  type: lixian
  text: 靈州，縣也。
- id: hhs.58.p24.a2
  anchor: hhs.58.p24
  at: 31
  length: 0
  type: lixian
  text: 家語子貢對衛文子曰：「一日三復白珪之玷，是南宮絛之行也。」王肅注云：「玷，缺也。詩云：『白珪之玷，尚可磨也。斯言之玷，不可為也。』一日三復，慎之至也。」
- id: hhs.58.p26.a1
  anchor: hhs.58.p26
  at: 51
  length: 0
  type: lixian
  text: 左傳曰，昔高陽氏有才子八人，蒼舒、隤摎、搗戭、大臨、尨降、庭堅、仲容、叔達，謂之八愷。高辛氏有才子八人，伯奮、仲堪、叔獻、季仲、伯虎、仲熊、叔豹、季狸，謂之八元也。
- id: hhs.58.p26.a2
  anchor: hhs.58.p26
  at: 81
  length: 0
  type: lixian
  text: 皇甫嵩傳曰：「連結郡國，自青、徐、幽、冀、荊、楊、兗、豫八州之人，莫不畢應。」此云「六州」，蓋初起時也。
- id: hhs.58.p26.a3
  anchor: hhs.58.p26
  at: 196
  length: 0
  type: lixian
  text: 甫，始也。
- id: hhs.58.p26.a4
  anchor: hhs.58.p26
  at: 218
  length: 0
  type: lixian
  text: 韓子曰「冰炭不同器而久，寒暑不同時而至」也。
- id: hhs.58.p26.a5
  anchor: hhs.58.p26
  at: 253
  length: 0
  type: lixian
  text: 甘茂對秦武王曰：「昔曾參之居費，魯人有與曾參同姓名者殺人，人告其母曰『曾參殺人』，其母織自若也。又告之，其母自若也。又告之，其母投杼下機，踰牆而走。夫以曾參之賢與其母之信也，三人疑之，其母懼焉。」見史記也。
- id: hhs.58.p26.a6
  anchor: hhs.58.p26
  at: 260
  length: 0
  type: lixian
  text: 解見馬援傳。
- id: hhs.58.p26.a7
  anchor: hhs.58.p26
  at: 278
  length: 0
  type: lixian
  text: 白起與應侯有隙，構之秦昭王，免起為士伍，遷之陰密。行出咸陽西門十里，至杜郵，使賜劍自裁。見史記。案杜郵，今咸陽城是其地。酈元注水經雲渭水北有杜郵亭也。
- id: hhs.58.p26.a8
  anchor: hhs.58.p26
  at: 298
  length: 0
  type: lixian
  text: 殛音紀力反。殛亦誅也。
- id: hhs.58.p26.a9
  anchor: hhs.58.p26
  at: 387
  length: 0
  type: lixian
  text: 續漢書曰：「燮軍斬賊三帥卜巳、張伯、梁仲寧等，功高為封首。」
- id: hhs.58.p26.a10
  anchor: hhs.58.p26
  at: 394
  length: 0
  type: lixian
  text: 識，記也，音志。
- id: hhs.58.p28.a1
  anchor: hhs.58.p28
  at: 77
  length: 0
  type: lixian
  text: 冒頓，匈奴單于名也。前書曰，季布為中郎將，單于為書嫚呂太后，呂太后怒，召諸將議之。將軍樊噲曰：「願得十萬觿，橫行匈奴中。」諸將皆阿太后，以噲言為然。布曰：「樊噲可斬也！夫以高帝兵三十萬困於平城，噲時亦在其中。今柰何以十萬觿橫行匈奴中！」
- id: hhs.58.p29.a1
  anchor: hhs.58.p29
  at: 0
  length: 0
  type: lixian
  text: 前書，漢王賜酈商爵信成君，以將軍為隴西都尉，別定北地。
- id: hhs.58.p29.a2
  anchor: hhs.58.p29
  at: 20
  length: 0
  type: lixian
  text: 前書，武帝分武威、酒泉，置張掖、敦煌，謂之四郡。劉歆等議曰：「孝武帝北攘匈奴，降昆邪十萬之觿，置五屬國，起朔方，以奪其肥饒之地。東伐朝鮮，起玄菟、樂浪，以斷匈奴之左臂。西伐大宛，并*[三十]*六國，結烏孫，起敦煌、酒泉、張掖，以*(高)**[鬲]*婼羌，裂匈奴之右臂。」婼音而遮反。
- id: hhs.58.p29.a3
  anchor: hhs.58.p29
  at: 90
  length: 0
  type: lixian
  text: 說文曰：「衽，衣衿也。」
- id: hhs.58.p29.a4
  anchor: hhs.58.p29
  at: 150
  length: 0
  type: lixian
  text: 方，正也。格猶標準也。
- id: hhs.58.p31.a1
  anchor: hhs.58.p31
  at: 99
  length: 0
  type: lixian
  text: 一作「封」。
- id: hhs.58.p33.a1
  anchor: hhs.58.p33
  at: 23
  length: 0
  type: lixian
  text: 漢官曰，司隸功曹從事，即持中也。
- id: hhs.58.p33.t1
  anchor: hhs.58.p33
  at: 23
  length: 4
  type: temporal
  text: 中平四年
  kind: absolute
  resolution: absolute
  year_ad: 187
  era: 中平
  era_year: 4
- id: hhs.58.p33.a2
  anchor: hhs.58.p33
  at: 166
  length: 0
  type: lixian
  text: 挺，解也。
- id: hhs.58.p36.a1
  anchor: hhs.58.p36
  at: 64
  length: 0
  type: lixian
  text: 燮，北地人，故雲鄉里也。
- id: hhs.58.p36.a2
  anchor: hhs.58.p36
  at: 124
  length: 0
  type: lixian
  text: 干集曰：「干字彥林。」
- id: hhs.58.p36.a3
  anchor: hhs.58.p36
  at: 142
  length: 0
  type: lixian
  text: 左傳曰，曹公子臧曰：「前志有之，聖達節，次守節，下失節。」
- id: hhs.58.p36.a4
  anchor: hhs.58.p36
  at: 163
  length: 0
  type: lixian
  text: 史記曰，伯夷，孤竹君之子也。武王載文王木主伐紂。殷既平，伯夷恥之，義不食周粟，遂餓死。論語曰，子貢問曰：「伯夷、叔齊何人也？」孔子曰：「古之賢人也。」
- id: hhs.58.p36.a5
  anchor: hhs.58.p36
  at: 189
  length: 0
  type: lixian
  text: 孟子曰：「養吾浩然之氣。」趙岐注曰：「浩然，天氣也。」
- id: hhs.58.p36.a6
  anchor: hhs.58.p36
  at: 198
  length: 0
  type: lixian
  text: 左傳曰，子路曰「食焉不避其難」也。
- id: hhs.58.p36.a7
  anchor: hhs.58.p36
  at: 230
  length: 0
  type: lixian
  text: 程嬰，解見馮衍傳也。
- id: hhs.58.p36.a8
  anchor: hhs.58.p36
  at: 305
  length: 0
  type: lixian
  text: 師即君也。尚書曰「作之君，作之師」也。
- id: hhs.58.p38.a1
  anchor: hhs.58.p38
  at: 13
  length: 0
  type: lixian
  text: 廣至，縣名，故城在今瓜州常樂縣東，今謂之縣泉堡是也。
- id: hhs.58.p38.a2
  anchor: hhs.58.p38
  at: 19
  length: 0
  type: lixian
  text: 續漢書曰：「曾祖父進，漢陽太守。祖父彪，大司農。」謝承書曰：「父字思齊，官至安定屬國都尉。」
- id: hhs.58.p39.a1
  anchor: hhs.58.p39
  at: 111
  length: 0
  type: lixian
  text: 紲，系也。廣雅曰：「鷙，執也。」蒼頡解詁曰：「鳶，鴟也。」食音嗣。
- id: hhs.58.p39.a2
  anchor: hhs.58.p39
  at: 167
  length: 0
  type: lixian
  text: 續漢書，中平元年，黃巾賊起，故武威太守酒泉黃雋被征，失期。梁鵠欲奏誅雋，勳為言得免。雋以黃金二十斤謝勳，勳謂雋曰：「吾以子罪在八議，故為子言。吾豈賣評哉！」終辭不受。
- id: hhs.58.p40.t1
  anchor: hhs.58.p40
  at: 0
  length: 4
  type: temporal
  text: 中平元年
  kind: absolute
  resolution: absolute
  year_ad: 184
  era: 中平
  era_year: 1
- id: hhs.58.p40.a1
  anchor: hhs.58.p40
  at: 31
  length: 0
  type: lixian
  text: 斷謂割截。
- id: hhs.58.p40.a2
  anchor: hhs.58.p40
  at: 50
  length: 0
  type: lixian
  text: 阿陽，縣，屬天水郡。
- id: hhs.58.p42.a1
  anchor: hhs.58.p42
  at: 12
  length: 0
  type: lixian
  text: 齊景公時，燕、晉侵齊，景公以司馬穰苴為將，扞之，仍令寵臣莊賈監軍。與穰苴期旦日會，賈素驕貴，夕時至，穰苴召軍正問曰：「軍法期而後者雲何？」對曰：「當斬。」遂斬賈以徇三軍。
- id: hhs.58.p42.a2
  anchor: hhs.58.p42
  at: 110
  length: 0
  type: lixian
  text: 續漢書「梟」字作「泉」也。
- id: hhs.58.p43.a1
  anchor: hhs.58.p43
  at: 10
  length: 0
  type: lixian
  text: 崔杼，齊大夫。齊莊公先通其妻，杼殺之。慶父，魯莊公弟。莊公子開立，是為愍公，慶父襲殺愍公。並見史記。
- id: hhs.58.p43.a2
  anchor: hhs.58.p43
  at: 91
  length: 0
  type: lixian
  text: 前書尹翁歸傳曰：「有論罪輸掌畜官。」音義曰：「右扶風畜牧所在，有苑師之屬，故曰畜官。畜音許救反。」
- id: hhs.58.p43.a3
  anchor: hhs.58.p43
  at: 123
  length: 0
  type: lixian
  text: 麗音離。左傳曰：「王以諸侯伐鄭，鄭原繁、高渠彌奉公為魚麗之陳，先偏後伍，伍承彌縫。」杜預注曰：「此魚麗陳法也。」
- id: hhs.58.p43.a4
  anchor: hhs.58.p43
  at: 149
  length: 0
  type: lixian
  text: 表，標也。
- id: hhs.58.p43.a5
  anchor: hhs.58.p43
  at: 165
  length: 0
  type: lixian
  text: 句就，羌別種也。句音古侯反。
- id: hhs.58.p43.a6
  anchor: hhs.58.p43
  at: 284
  length: 0
  type: lixian
  text: 調猶發也。
- id: hhs.58.p45.a1
  anchor: hhs.58.p45
  at: 30
  length: 0
  type: lixian
  text: 中藏謂內藏也。
- id: hhs.58.p46.a1
  anchor: hhs.58.p46
  at: 13
  length: 0
  type: lixian
  text: 國語曰：「穆王將征犬戎，祭公謀父諫曰：『不可。先王耀德不觀兵。』」韋昭注曰：「耀，明也。觀，示也。」
- id: hhs.58.p47.a1
  anchor: hhs.58.p47
  at: 0
  length: 0
  type: lixian
  text: 左傳曰「戎昭果毅以聽之之謂武，殺敵為果，致果曰毅」也。
- id: hhs.58.p49.a1
  anchor: hhs.58.p49
  at: 172
  length: 0
  type: lixian
  text: 府，聚也。
- id: hhs.58.p50.a1
  anchor: hhs.58.p50
  at: 63
  length: 0
  type: lixian
  text: 續漢書曰：「是時，漢陽叛人王國，觿十餘萬，攻陳倉，三輔震動。勳領郡兵五千人，自請滿萬人，因表用處士扶風*[士]*孫瑞為鷹鷂都尉，桂陽魏傑為破敵都尉，京兆杜楷為威虜都尉，弘農楊儒為鳥擊都尉，長陵第五鑈為清寇都尉。凡五都尉，皆素有名，悉領屬勳。每有密事，靈帝手詔問之。」
- id: hhs.58.p51.a1
  anchor: hhs.58.p51
  at: 91
  length: 0
  type: lixian
  text: 孫卿子曰「慶者在堂，吊者在閭，福與禍鄰，莫知其門」也。
- id: hhs.58.p54.a1
  anchor: hhs.58.p54
  at: 13
  length: 0
  type: lixian
  text: 武丁，殷王高宗也。謂傅說曰：「啟乃心，沃朕心。」說復於王曰：「惟木從繩則正，後從諫則聖。」見尚書。
- id: hhs.58.p54.a2
  anchor: hhs.58.p54
  at: 21
  length: 0
  type: lixian
  text: 射陽故城在今楚州安宜縣東也。
- id: hhs.58.p54.t1
  anchor: hhs.58.p54
  at: 21
  length: 4
  type: temporal
  text: 熹平元年
  kind: absolute
  resolution: absolute
  year_ad: 172
  era: 熹平
  era_year: 1
- id: hhs.58.p54.a3
  anchor: hhs.58.p54
  at: 37
  length: 0
  type: lixian
  text: 謝承書曰：「旻達於從政，為漢良吏，遷匈奴中郎將。還京師，太尉袁逢問其西域諸國土地風俗人物種數，旻具荅言西域本三十六國，後分為五十五，稍散至百餘國。大小，道裡近遠，人數多少，風俗燥濕，山川草木鳥獸異物名種不與中國同者，口陳其狀，手畫地形。逢奇其才，歎息言：『雖班固作西域傳，何以加此乎？』」
- id: hhs.58.p55.t1
  anchor: hhs.58.p55
  at: 49
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
  year_ad: 174
  era: 熹平
  era_year: 3
- id: hhs.58.p56.a1
  anchor: hhs.58.p56
  at: 13
  length: 0
  type: lixian
  text: 句章縣故城在今越州鄮縣西。十三州志云：「句踐之地，南至句無，其後並吳，因大城句，章伯功以示子孫，故曰句章。」
- id: hhs.58.p56.a2
  anchor: hhs.58.p56
  at: 28
  length: 0
  type: lixian
  text: 漢法，孝廉試經者拜為郎。洪以年幼才俊，故拜童子郎也。續漢書曰「左雄奏征海內名儒為博士，使公卿子弟為諸生，有志操者加其俸祿。及汝南謝廉、河南趙建章年始十二，各能通經，雄並奏拜童子郎。於是負書來學，雲集京師」也。
- id: hhs.58.p56.a3
  anchor: hhs.58.p56
  at: 37
  length: 0
  type: lixian
  text: 魁梧，壯大之貌也。梧音吾。
- id: hhs.58.p58.a1
  anchor: hhs.58.p58
  at: 20
  length: 0
  type: lixian
  text: 即丘，縣，屬琅邪國，故城在今沂州臨沂縣東南，即春秋之祝丘也。
- id: hhs.58.p58.a2
  anchor: hhs.58.p58
  at: 167
  length: 0
  type: lixian
  text: 謂超為廣陵，兄邈為陳留也。
- id: hhs.58.p58.a3
  anchor: hhs.58.p58
  at: 174
  length: 0
  type: lixian
  text: 岱字公山。
- id: hhs.58.p58.a4
  anchor: hhs.58.p58
  at: 307
  length: 0
  type: lixian
  text: 伷字公緒。
- id: hhs.58.p58.a5
  anchor: hhs.58.p58
  at: 324
  length: 0
  type: lixian
  text: 橋瑁也。
- id: hhs.58.p59.a1
  anchor: hhs.58.p59
  at: 15
  length: 0
  type: lixian
  text: 糾，收也。
- id: hhs.58.p60.a1
  anchor: hhs.58.p60
  at: 147
  length: 0
  type: lixian
  text: 左傳曰，王子虎盟諸侯於王廷，要言曰「皆□王室，無相害也。有渝此盟，明神殛之，俾墜其師，無克祚國」也。
- id: hhs.58.p61.t1
  anchor: hhs.58.p61
  at: 2
  length: 2
  type: temporal
  text: 二年
  kind: relative
  resolution: bare_year
  year_ad: 173
  era: 熹平
  era_year: 2
- id: hhs.58.p61.a1
  anchor: hhs.58.p61
  at: 211
  length: 0
  type: lixian
  text: 巫，女巫也。史，祝史也。禜謂營攢用幣，以*(穰)**[禳]*風雨霜雪水旱厲疫於日月星辰山川也。禱謂告事求福也。
- id: hhs.58.p62.a1
  anchor: hhs.58.p62
  at: 15
  length: 0
  type: lixian
  text: 獻帝春秋曰「紹使琳為書八條，責以恩義，告喻使降」也。
- id: hhs.58.p62.a2
  anchor: hhs.58.p62
  at: 41
  length: 0
  type: lixian
  text: 爾雅曰：「武，多也。」
- id: hhs.58.p63.a1
  anchor: hhs.58.p63
  at: 20
  length: 0
  type: lixian
  text: 比，頻也。
- id: hhs.58.p63.a2
  anchor: hhs.58.p63
  at: 53
  length: 0
  type: lixian
  text: 家語，孔子之郯，與程子相遇於塗，傾蓋而語也。
- id: hhs.58.p63.a3
  anchor: hhs.58.p63
  at: 70
  length: 0
  type: lixian
  text: 洪常寓於紹，故謂之主人也。
- id: hhs.58.p63.a4
  anchor: hhs.58.p63
  at: 218
  length: 0
  type: lixian
  text: 搦，捉也，音女卓反。
- id: hhs.58.p63.a5
  anchor: hhs.58.p63
  at: 234
  length: 0
  type: lixian
  text: 來者側席而待之，去者克己自責，不責人也。
- id: hhs.58.p64.a1
  anchor: hhs.58.p64
  at: 55
  length: 0
  type: lixian
  text: 吳王余昧卒，欲授弟季札，季札逃去。見史記也。
- id: hhs.58.p64.a2
  anchor: hhs.58.p64
  at: 78
  length: 0
  type: lixian
  text: 英雄記雲，袁紹使張景明、郭公則、高元才等說韓馥，使讓冀州與紹。然則馥之讓位，景明亦有其功。其餘未詳也。
- id: hhs.58.p64.a3
  anchor: hhs.58.p64
  at: 177
  length: 0
  type: lixian
  text: 魏志呂布傳曰：「布破張燕軍而求益兵，觿將士鈔掠，紹患忌之。布覺其意，從紹求去。」英雄記：「布求還洛，紹假布領司隸校尉，外言當遣，內欲殺布。明日當發，紹遣甲士三十人，辭以送布，止於帳側。布偽使人於帳中鼓箏，紹兵臥，無何，出帳去而兵不覺。夜半兵起，亂斫布默被，謂已死。明旦，紹訊問，知布尚在，乃閉城門，布遂引去。」
- id: hhs.58.p65.a1
  anchor: hhs.58.p65
  at: 61
  length: 0
  type: lixian
  text: 左傳雲，公山不狃曰：「君子違不適讎國。」杜預注云：「違，奔亡也。」
- id: hhs.58.p65.t1
  anchor: hhs.58.p65
  at: 87
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
  year_ad: 174
  era: 熹平
  era_year: 3
- id: hhs.58.p65.t2
  anchor: hhs.58.p65
  at: 93
  length: 2
  type: temporal
  text: 一年
  kind: relative
  resolution: bare_year
  year_ad: 172
  era: 熹平
  era_year: 1
- id: hhs.58.p65.a2
  anchor: hhs.58.p65
  at: 116
  length: 0
  type: lixian
  text: 崔杼殺齊莊公，欲劫晏子與盟，以戟拘其頸，□承其心。晏子曰：「劫吾以刃而失其意，非勇也。」崔杼遂釋之。事見晏子。左傳曰「太史書曰『崔杼弒其君』，崔子殺之。其弟嗣書而死者二人，其弟又書，乃捨之。南史氏聞太史盡死，執簡以往，聞既書矣，乃還」也。
- id: hhs.58.p65.a3
  anchor: hhs.58.p65
  at: 130
  length: 0
  type: lixian
  text: 左傳曰：「楚子圍宋，築室反耕。」杜預注曰：「築室於宋，反兵耕田，示無還意也。」
- id: hhs.58.p65.a4
  anchor: hhs.58.p65
  at: 140
  length: 0
  type: lixian
  text: 伯珪，公孫瓚字。
- id: hhs.58.p65.a5
  anchor: hhs.58.p65
  at: 158
  length: 0
  type: lixian
  text: 魏志曰，張揚字稚叔，雲中人也，以武勇給并州為從事。何進令於本州募兵，得千餘人，因留上黨擊山賊。進敗，揚遂以所將兵攻上黨，仍略諸縣，觿至數千，又與袁紹合。張燕，常山人，本姓褚。黃巾起，燕合聚少年為腢盜，觿萬人。博陵張牛角*(立)**[之]*起，觿次癭陶，牛角為飛矢所中，且死，告其觿曰：「必以燕為帥。」角死，觿奉燕，故改姓張。燕僄悍，捷速過人，軍中號為「飛燕」。觿至百萬，號曰「黑山」。後助公孫瓚與紹爭冀州也。
- id: hhs.58.p66.a1
  anchor: hhs.58.p66
  at: 31
  length: 0
  type: lixian
  text: 股肱猶手足也。言北邊有倉卒之急，股肱之臣將告歸自救耳。
- id: hhs.58.p67.a1
  anchor: hhs.58.p67
  at: 29
  length: 0
  type: lixian
  text: 前書，彭越將其觿居鉅野中，無所屬，漢王乃使人賜越將軍印，使下濟陰以擊楚也。
- id: hhs.58.p68.a1
  anchor: hhs.58.p68
  at: 76
  length: 0
  type: lixian
  text: 盟主謂袁紹也。
- id: hhs.58.p68.a2
  anchor: hhs.58.p68
  at: 162
  length: 0
  type: lixian
  text: 與音預。
- id: hhs.58.p70.a1
  anchor: hhs.58.p70
  at: 46
  length: 0
  type: lixian
  text: 杜預注左傳曰：「饘，糜也。」音之延反。
- id: hhs.58.p70.a2
  anchor: hhs.58.p70
  at: 115
  length: 0
  type: lixian
  text: 前漢音義曰：「觖猶冀也。」觖音羌恚反。
- id: hhs.58.p73.a1
  anchor: hhs.58.p73
  at: 110
  length: 0
  type: lixian
  text: 公羊傳曰：「事君猶事父也，父受誅，子復讎，推刃之道。」
- id: hhs.58.p73.a2
  anchor: hhs.58.p73
  at: 125
  length: 0
  type: lixian
  text: 前書魏相上書曰：「救亂誅暴，謂之義兵，兵義者王。敵加於己，不得已而起者，謂之應兵，兵應者勝。爭恨小故，不勝憤怒者，謂之忿兵，兵忿者敗。
- id: hhs.58.p89.a1
  anchor: hhs.58.p89
  at: 9
  length: 0
  type: lixian
  text: 吳破楚，申包胥如秦乞師，立依於庭牆而哭，日夜不絕聲，勺飲不入口，七日秦師乃出，以車五百乘救楚，敗吳兵於稷。事見左傳及史記。言臧洪徒守節致死，不能如包胥之存楚也。
