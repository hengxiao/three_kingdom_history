  type: lixian
  text: 《續漢志》曰：「侍中，比二千石，無員。」《漢官儀》曰：「侍中，左蟬右貂，本秦丞相史，往來殿內，故謂之侍中。分掌乘輿服物，下至褻器虎子之屬。武帝時，孔安國爲侍中，以其儒者，特聽掌御唾壺，朝廷榮之。至東京時，屬少府，亦無員。駕出，則一人負傳國璽，操斬蛇劔，乘輿中官俱止禁中。」又曰：「給事黃門侍郎，六百石，無員。掌侍從左右，給事中使，關通中外。」應劭曰：「黃門侍郎，每日暮向青瑣門拜，謂之夕郎。」輿服志曰：「禁門曰黃闥，以中人主之，故號曰黃門令。」然則黃門郎給事黃闥之內，故曰黃門郎。本旣無員，於此各置六人也。獻帝起居注曰：「自誅黃門後，侍中、侍郎出入禁中，機事頗露，由是王允乃奏侍中、黃門不得出入。不通賔客，自此始也。」
