  text: 《獻帝春秋》曰：「時省幽、并州，以其郡國并於兾州；省司隷校尉及涼州，以其郡國并爲雍州；省交州，并荊州、益州。於是有兖、豫、青、徐、荊、楊、兾、益、雍也。」九數雖同，而禹貢無益州有梁州，然梁、益亦一地也。
