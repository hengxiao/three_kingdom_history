- id: hhs.9.p36.a1
  anchor: hhs.9.p36
  at: 53
  length: 0
  type: lixian
  text: 《續漢書》曰：「天子葬，太僕駕四輪輈爲賔車，大練爲屋幙。中黃門、虎賁各二十人執紼。司空擇土造穿，太史卜日，將作作黃腸、題湊、便房，如禮。大駕，大僕御。方相氏黃金四目，蒙熊皮，玄衣朱裳，執戈揚楯，立乘四馬先駈。旂長三刃，十有二旒曳地，畫日、月、升龍。書旐曰『天子之柩』。謁者二人，立乘六馬爲次。太常跪哭日十五舉音，止哭。晝漏上，請發。司徒、河南尹先引車轉，太常曰請拜送。車著白絲三糾，紼長三十丈，圍七寸；六行，行五十人。公卿已下子弟凡三百人，皆素幘，委貌冠，衣素裳，挽。校尉三百人，皆赤幘，不冠，持幢幡，皆銜枚。羽林孤兒、巴俞嬥歌者六十人，爲六列。司馬八人，執鐸。至陵南羨門，司徒跪請就下房，都導東園武士奉入房，執事下明器，太祝進醴獻。司空將校復土。」嬥音徒了反。《帝王紀》曰：「禪陵在濁鹿城西北十里，在今懷州脩武縣北二十五里。陵高二丈，周回二百步。」劉澄之《地記》云：「以漢禪魏，故以名焉。」
- id: hhs.9.p37.a1
  anchor: hhs.9.p37
  at: 26
  length: 0
  type: lixian
  text: 《左氏傳》王孫滿曰：「桀有昏德，鼎遷於商；商紂暴虐，鼎遷於周。德之休明，雖小，重也；其姦回昏亂，雖大，輕也。」故言神之所寶，不可奪移。
- id: hhs.9.p37.a2
  anchor: hhs.9.p37
  at: 41
  length: 0
  type: lixian
  text: 言神器至重，被人負而趨走者，斯亦窮盡之運歸於此時乎，言不可復振也。莊子曰：「藏舟於壑，藏山於澤，謂之固矣。然而有力者負之而趨，而昧者不知。」
- id: hhs.9.p37.a3
  anchor: hhs.9.p37
  at: 55
  length: 0
  type: lixian
  text: 厭，倦；誅，責也。漢自和帝以後，政敎陵遲，故言天厭漢德乆矣。禍之來也，非獨山陽公之過，其何所誅責乎？《左傳》宋子魚曰：「天旣厭商德。」孔子曰：「於予予何誅。」
- id: hhs.9.p38.a1
  anchor: hhs.9.p38
  at: 13
  length: 0
  type: lixian
  text: 辰，時也。播，遷也。言獻帝生不逢時，身旣播遷，國又屯難。《詩》曰：「我生不辰。」《左傳》曰：「震蕩播越。」
- id: hhs.9.p38.a2
  anchor: hhs.9.p38
  at: 23
  length: 0
  type: lixian
  text: 《春秋演孔圖》曰：「劉四百歲之際，襃漢王輔，皇王以期，有名不就。」宋均注曰：「雖襃族人爲漢王以自輔，以當有應期，名見攝錄者，故名不就也。」虞賔謂舜以堯子丹朱爲賔，《商書》曰「虞賔在位」是也。以喻山陽公爲魏之賔也。
