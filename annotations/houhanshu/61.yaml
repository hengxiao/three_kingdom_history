  length: 4
  type: temporal
  text: 延熹元年
  kind: absolute
  resolution: absolute
  year_ad: 158
  era: 延熹
  era_year: 1
- id: hhs.61.p60.t3
  anchor: hhs.61.p60
  at: 60
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 159
  era: 延熹
  era_year: 2
- id: hhs.61.p60.a1
  anchor: hhs.61.p60
  at: 115
  length: 0
  type: lixian
  text: 說文云「邟，穎川縣」也。漢穎川有周承休侯國，元始二年更名曰邟，音亢。
- id: hhs.61.p60.a2
  anchor: hhs.61.p60
  at: 198
  length: 0
  type: lixian
  text: 五侯謂左悺、徐璜等。
- id: hhs.61.p60.t4
  anchor: hhs.61.p60
  at: 198
  length: 2
  type: temporal
  text: 四年
  kind: relative
  resolution: bare_year
  year_ad: 161
  era: 延熹
  era_year: 4
- id: hhs.61.p60.t5
  anchor: hhs.61.p60
  at: 206
  length: 2
  type: temporal
  text: 其年
  kind: relative
  resolution: this_year
  year_ad: 161
  era: 延熹
  era_year: 4
- id: hhs.61.p61.t1
  anchor: hhs.61.p61
  at: 0
  length: 2
  type: temporal
  text: 七年
  kind: relative
  resolution: bare_year
  year_ad: 164
  era: 延熹
  era_year: 7
- id: hhs.61.p62.a1
  anchor: hhs.61.p62
  at: 135
  length: 0
  type: lixian
  text: 泮冰諭危陷。枳棘諭艱難。
- id: hhs.61.p62.a2
  anchor: hhs.61.p62
  at: 151
  length: 0
  type: lixian
  text: 形，兆也。言未有天下之兆。「畫」或作「書」也。
- id: hhs.61.p62.a3
  anchor: hhs.61.p62
  at: 292
  length: 0
  type: lixian
  text: 殷，盛也。
- id: hhs.61.p63.a1
  anchor: hhs.61.p63
  at: 28
  length: 0
  type: lixian
  text: 法言曰「金口木舌」也。
- id: hhs.61.p63.a2
  anchor: hhs.61.p63
  at: 83
  length: 0
  type: lixian
  text: 坐音才臥反。
- id: hhs.61.p63.a3
  anchor: hhs.61.p63
  at: 124
  length: 0
  type: lixian
  text: 賈誼上疏曰「夫抱火厝之積薪之下而寢其上，火未及然，因謂之安。方今之政，何以異此」也。
- id: hhs.61.p65.a1
  anchor: hhs.61.p65
  at: 11
  length: 0
  type: lixian
  text: 史記曰，孔子將西見趙簡子，至於河而聞竇鳴犢、舜華之死也，臨河而歎曰：「美哉洋洋，丘之不濟此，命也夫！竇鳴犢、舜華，晉之賢大夫也。趙簡子未得志之時，須此兩人而後從政，及其得志而殺之。丘聞刳胎殺夭，則麒麟不至郊藪；涸澤而漁，則蛟龍不合陰陽；覆巢毀卵，則鳳皇不翔。何則？君子諱傷其類也。」事亦見孔子家語文也。
- id: hhs.61.p65.a2
  anchor: hhs.61.p65
  at: 154
  length: 0
  type: lixian
  text: 扺，投也。音紙。
- id: hhs.61.p65.a3
  anchor: hhs.61.p65
  at: 182
  length: 0
  type: lixian
  text: 解見寇榮傳。
- id: hhs.61.p65.a4
  anchor: hhs.61.p65
  at: 192
  length: 0
  type: lixian
  text: 說苑曰「王國子前母子伯奇，後母子伯封。後母欲其子立為太子，說王曰：『伯奇好妾。』王不信。其母曰：『令伯奇於後園，妾過其旁，王上台視之，即可知。』王如其言，伯奇入園，後母陰取蜂十數置單衣中，過伯奇邊曰：『蜂螫我。』伯奇就衣中取蜂殺之。王遙見之，乃逐伯奇」也。
- id: hhs.61.p65.a5
  anchor: hhs.61.p65
  at: 279
  length: 0
  type: lixian
  text: 三者數之極。一生二，二生三，三生萬物，天地人之極數。故以三為名者，取其深之極也。
- id: hhs.61.p65.t1
  anchor: hhs.61.p65
  at: 279
  length: 2
  type: temporal
  text: 其年
  kind: relative
  resolution: this_year
  year_ad: 164
  era: 延熹
  era_year: 7
- id: hhs.61.p66.t1
  anchor: hhs.61.p66
  at: 27
  length: 4
  type: temporal
  text: 元年正月
  kind: relative
  resolution: bare_year
  year_ad: 158
  era: 延熹
  era_year: 1
  month_chinese: 正月
  month_ordinal: 1
- id: hhs.61.p66.a1
  anchor: hhs.61.p66
  at: 154
  length: 0
  type: lixian
  text: 副本詣公府也。
- id: hhs.61.p67.a1
  anchor: hhs.61.p67
  at: 52
  length: 0
  type: lixian
  text: 久次謂久居官次也。
- id: hhs.61.p67.a2
  anchor: hhs.61.p67
  at: 95
  length: 0
  type: lixian
  text: 能音乃來反。
- id: hhs.61.p72.a1
  anchor: hhs.61.p72
  at: 36
  length: 0
  type: lixian
  text: 新序曰：「白公勝*(殺)**[將弒]*楚惠王，王出亡，令尹、司馬皆死，勝拔□而屬之於屈廬曰：『子與我，將捨子，不我與，將殺子。』屈廬曰：『詩有之曰：「莫莫葛虆，延於條枚，愷悌君子，求福不回。」今子殺子叔父而求福於廬也，可乎？且吾聞之，知命之士，見利不動，臨死則死，是謂人臣之禮。故上知天命，下知臣道。其有可劫乎？子胡不推之！』白公勝乃入其□焉。」
- id: hhs.61.p72.a2
  anchor: hhs.61.p72
  at: 50
  length: 0
  type: lixian
  text: 解見馮衍傳。
- id: hhs.61.p73.a1
  anchor: hhs.61.p73
  at: 47
  length: 0
  type: lixian
  text: 尚書大傳曰「古者諸侯之於天子，三年一貢士。一適謂之好德，再適謂之賢賢，三適謂之有功。有功者，天子賜以車服弓矢，號曰命。諸侯有不貢士謂之不率正，一不適謂之過，再不適謂之傲，三不適謂之誣。誣者，天子絀之，一絀以爵，再絀以地，三絀而爵地畢」也。
- id: hhs.61.p73.a2
  anchor: hhs.61.p73
  at: 353
  length: 0
  type: lixian
  text: 拘儒猶褊狹也。
- id: hhs.61.p73.a3
  anchor: hhs.61.p73
  at: 546
  length: 0
  type: lixian
  text: 而，語辭也。論語曰：「豈不獸思，室是遠而。」
- id: hhs.61.p73.a4
  anchor: hhs.61.p73
  at: 577
  length: 0
  type: lixian
  text: 碩，大也。
- id: hhs.61.p73.a5
  anchor: hhs.61.p73
  at: 608
  length: 0
  type: lixian
  text: 彌縫猶補合也。詩曰：「袞職有闕，惟仲山甫補之。」
- id: hhs.61.p73.a6
  anchor: hhs.61.p73
  at: 697
  length: 0
  type: lixian
  text: 廣雅曰：「遒，急也。」
- id: hhs.61.p74.a1
  anchor: hhs.61.p74
  at: 23
  length: 0
  type: lixian
  text: 匯，類也。易曰：「以其匯征吉。」匯音謂。
- id: hhs.61.p75.a1
  anchor: hhs.61.p75
  at: 0
  length: 0
  type: lixian
  text: 紓，解也，音式余反。
- id: hhs.61.p75.a2
  anchor: hhs.61.p75
  at: 10
  length: 0
  type: lixian
  text: 疵，病也。
- id: hhs.61.p75.a3
  anchor: hhs.61.p75
  at: 20
  length: 0
  type: lixian
  text: 志意差舛，不能遂也。差音楚宜反。
