chapter: hhs.61
source:
  id: wikisource
  url: https://zh.wikisource.org/wiki/後漢書/卷61
  retrieved: '2026-05-03'
  sha256: cba76286271b9d3dfb7db764f13f225ebd9487dd1002dc1fd40573ca5e97061f
annotations:
- id: hhs.61.p3.a1
  anchor: hhs.61.p3
  at: 101
  length: 0
  type: lixian
  text: 容容猶和同也。言不可獨為白玉之清絜，當與觿人和同。
- id: hhs.61.p3.a2
  anchor: hhs.61.p3
  at: 144
  length: 0
  type: lixian
  text: 謨，謀也。即尚書立政、無逸篇之類也。
- id: hhs.61.p4.a1
  anchor: hhs.61.p4
  at: 56
  length: 0
  type: lixian
  text: 尚書□陶謨之詞也。惠，愛也。黎，觿也。
- id: hhs.61.p4.a2
  anchor: hhs.61.p4
  at: 102
  length: 0
  type: lixian
  text: 詩小雅也。渰，陰雲也。淒淒，雲興貌。祁，徐也。言陰陽和，風雨時，先雨公田，乃及私田。
- id: hhs.61.p4.a3
  anchor: hhs.61.p4
  at: 114
  length: 0
  type: lixian
  text: 詩小雅刺幽王曰：「不自為政，卒勞百姓。」
- id: hhs.61.p5.a1
  anchor: hhs.61.p5
  at: 41
  length: 0
  type: lixian
  text: □艷謂□姒也。艷，色美也。七子皆□姒之親黨，謂皇甫為卿士，仲允為膳夫，家伯為宰，番為司徒，蹶為趣馬，棸子為內史，楀為師氏也。厲王淫於色，七子皆用，言妻黨盛也。四國，四方之國也。虺蜴之性，見人則走，哀今之人皆如是，傷時政事。見詩小雅。番音方元反。棸音側流反。楀音記禹反。
- id: hhs.61.p5.a2
  anchor: hhs.61.p5
  at: 66
  length: 0
  type: lixian
  text: 僄，削也。五等謂諸侯。
- id: hhs.61.p5.a3
  anchor: hhs.61.p5
  at: 86
  length: 0
  type: lixian
  text: 史記，商鞅為秦定變法之令，令人什伍而相牧司，犯禁相連坐，不告奸者□斬。楊雄長楊賦曰「秦窫窳其士，封豕其人」也。
- id: hhs.61.p6.a1
  anchor: hhs.61.p6
  at: 109
  length: 0
  type: lixian
  text: 宣帝時鳳皇五至，因以紀年。
- id: hhs.61.p7.a1
  anchor: hhs.61.p7
  at: 117
  length: 0
  type: lixian
  text: 國語曰：「□丹廷見令尹子常，與之語，問畜貨聚*(焉)**[馬]*。歸以語其弟曰：『楚其亡乎？吾見令尹如餓獸豺虎焉，殆必亡者也。』」
- id: hhs.61.p7.a2
  anchor: hhs.61.p7
  at: 124
  length: 0
  type: lixian
  text: 項背相望謂前後相顧也。背音輩。
- id: hhs.61.p7.a3
  anchor: hhs.61.p7
  at: 151
  length: 0
  type: lixian
  text: 開，匝也。謂一歲。
- id: hhs.61.p7.a4
  anchor: hhs.61.p7
  at: 175
  length: 0
  type: lixian
  text: 離，遭也。
- id: hhs.61.p7.a5
  anchor: hhs.61.p7
  at: 189
  length: 0
  type: lixian
  text: 因罪潛遁，以求高尚之名也。論語曰：「色斯舉矣。」言觀前人之顏色也。
- id: hhs.61.p8.a1
  anchor: hhs.61.p8
  at: 42
  length: 0
  type: lixian
  text: 斯，賤也。
- id: hhs.61.p8.a2
  anchor: hhs.61.p8
  at: 67
  length: 0
  type: lixian
  text: 調，征也。
- id: hhs.61.p8.a3
  anchor: hhs.61.p8
  at: 108
  length: 0
  type: lixian
  text: 墨綬謂令長，即古子男之國也。
- id: hhs.61.p8.a4
  anchor: hhs.61.p8
  at: 118
  length: 0
  type: lixian
  text: 庸，常也。
- id: hhs.61.p8.a5
  anchor: hhs.61.p8
  at: 194
  length: 0
  type: lixian
  text: 式，用也。
- id: hhs.61.p8.a6
  anchor: hhs.61.p8
  at: 243
  length: 0
  type: lixian
  text: 任，堪也，音人林反。
- id: hhs.61.p8.a7
  anchor: hhs.61.p8
  at: 248
  length: 0
  type: lixian
  text: 負，欠也。筭，口錢也。儒生未有品秩，故寬之。
- id: hhs.61.p8.a8
  anchor: hhs.61.p8
  at: 324
  length: 0
  type: lixian
  text: 文帝、宣帝也。文帝遭呂氏難，故亦云中興。
- id: hhs.61.p10.a1
  anchor: hhs.61.p10
  at: 47
  length: 0
  type: lixian
  text: 天鏡經曰：「大水自平地出，破山殺人，其國有兵。」
- id: hhs.61.p13.a1
  anchor: hhs.61.p13
  at: 82
  length: 0
  type: lixian
  text: 儒有一家之學，故稱家*[法]*。
- id: hhs.61.p13.a2
  anchor: hhs.61.p13
  at: 157
  length: 0
  type: lixian
  text: 謝承書曰「淑字伯進，廣陵海西人也。寬裕博雅，好學樂道。隨父慎在京師，鑽孟氏易、春秋、公羊、禮記、周官。善誦太公六韜，交接英雄，常有壯志。舉茂才，除勃海修令，遷琅邪都尉」也。
- id: hhs.61.p14.a1
  anchor: hhs.61.p14
  at: 22
  length: 0
  type: lixian
  text: 解見順帝紀。
- id: hhs.61.p20.a1
  anchor: hhs.61.p20
  at: 60
  length: 0
  type: lixian
  text: 禮記曰：「公侯佩山玄玉而朱組綬，大夫佩水蒼玉而緇組綬。」
- id: hhs.61.p21.a1
  anchor: hhs.61.p21
  at: 97
  length: 0
  type: lixian
  text: 韓厥，韓獻子也。國語曰：「趙宣子舉獻子於靈公，以為司馬。河曲之役，宣子使人以其乘車干行，獻子執而戮之。宣子皆告諸大夫曰：『可賀我矣。吾舉厥也而中吾，乃今知免於罪矣。』」
- id: hhs.61.p23.a1
  anchor: hhs.61.p23
  at: 127
  length: 0
  type: lixian
  text: 鄭武姜生莊公及共叔段，愛叔段，謀殺莊公。公誓之曰：「不及黃泉，無相見也。」既而悔之。穎考叔為穎谷封人，曰：「若掘地及泉，隧而相見，其誰曰不然！」公從之，遂為母子如初。事見左傳。茅焦事，解見蘇竟傳也。
- id: hhs.61.p24.a1
  anchor: hhs.61.p24
  at: 7
  length: 0
  type: lixian
  text: 音丑良反。
- id: hhs.61.p24.a2
  anchor: hhs.61.p24
  at: 70
  length: 0
  type: lixian
  text: 朝廷謂順帝也。孫程與王康等十八人謀於西鐘下，共立濟陰王為順帝也。
- id: hhs.61.p24.a3
  anchor: hhs.61.p24
  at: 86
  length: 0
  type: lixian
  text: 韓信、彭越、吳漢、賈復也。
- id: hhs.61.p25.a1
  anchor: hhs.61.p25
  at: 11
  length: 0
  type: lixian
  text: 平丘，縣，屬陳留郡。
- id: hhs.61.p25.a2
  anchor: hhs.61.p25
  at: 57
  length: 0
  type: lixian
  text: 章謂所上之書。
- id: hhs.61.p26.a1
  anchor: hhs.61.p26
  at: 28
  length: 0
  type: lixian
  text: 新序曰：「晉文公反國，介子推無爵，遂去而之介山之上。文公求之不得，乃焚其山，推遂不出而焚死。」事具耿恭傳。龍，星，木之位也，春見東方。
- id: hhs.61.p26.a2
  anchor: hhs.61.p26
  at: 114
  length: 0
  type: lixian
  text: 其事見桓譚新論及汝南先賢傳也。
- id: hhs.61.p28.a1
  anchor: hhs.61.p28
  at: 119
  length: 0
  type: lixian
  text: 天統、地統、人統謂之三統。事見白武通。
- id: hhs.61.p28.a2
  anchor: hhs.61.p28
  at: 129
  length: 0
  type: lixian
  text: 尚書洪範曰：「建用皇極。」孔安國注云：「皇，大也。極，中也。言立大中之道而行之也。」
- id: hhs.61.p28.a3
  anchor: hhs.61.p28
  at: 159
  length: 0
  type: lixian
  text: 五品，五常之教也。書曰：「五品不遜，汝作司徒，敬敷五教在寬。」訓亦遜之義。
- id: hhs.61.p32.a1
  anchor: hhs.61.p32
  at: 125
  length: 0
  type: lixian
  text: 歿，終也。
- id: hhs.61.p32.a2
  anchor: hhs.61.p32
  at: 137
  length: 0
  type: lixian
  text: 帝王紀曰：「武王入殷，命召公釋箕子之囚，表商容之閭，出傾宮之女於諸侯。」
- id: hhs.61.p32.a3
  anchor: hhs.61.p32
  at: 148
  length: 0
  type: lixian
  text: 帝王紀曰：「湯伐桀，後大旱七年，洛川竭，使人持三足鼎祝於山川曰：
- id: hhs.61.p32.a4
  anchor: hhs.61.p32
  at: 159
  length: 0
  type: lixian
  text: 解見楊厚傳。
- id: hhs.61.p33.a1
  anchor: hhs.61.p33
  at: 33
  length: 0
  type: lixian
  text: 晏子春秋之文。
- id: hhs.61.p33.a2
  anchor: hhs.61.p33
  at: 59
  length: 0
  type: lixian
  text: 緣木求魚，見孟子之文。韓詩外傳曰：「夫明鏡所以照形，往古所以知今。
- id: hhs.61.p34.a1
  anchor: hhs.61.p34
  at: 14
  length: 0
  type: lixian
  text: 易稽覽圖之文也。解具郎顗傳也。
- id: hhs.61.p34.a2
  anchor: hhs.61.p34
  at: 123
  length: 0
  type: lixian
  text: 別音彼列反。
- id: hhs.61.p38.a1
  anchor: hhs.61.p38
  at: 84
  length: 0
  type: lixian
  text: 尚書洪範五行傳曰：「周公死，成王不圖大禮，故天大雷雨，禾偃，大木拔。及成王寤金縢之策，改周公之葬，尊以王禮，申命魯郊，而天立復風雨，禾稼盡起。」
- id: hhs.61.p38.a2
  anchor: hhs.61.p38
  at: 190
  length: 0
  type: lixian
  text: 杜預注左傳曰：「短折曰夭，未名曰昏。」
- id: hhs.61.p38.a3
  anchor: hhs.61.p38
  at: 206
  length: 0
  type: lixian
  text: 子猛，周景王之子。子野，魯襄公之子。春秋經書「王子猛卒」。杜元凱注云：「未即位，故不言崩。」又曰：「秋九月癸巳，子野卒。」注曰：「不書葬，未成君也。」
- id: hhs.61.p39.a1
  anchor: hhs.61.p39
  at: 48
  length: 0
  type: lixian
  text: 周官曰：「女巫，掌歲時祓除釁沴。」鄭玄云：「如今三月上巳，水上之類也。」司馬彪續漢書曰「三月上巳，宮人皆絜於東流水上，自洗濯祓除為大絜」也。
- id: hhs.61.p39.a2
  anchor: hhs.61.p39
  at: 87
  length: 0
  type: lixian
  text: 纂文曰：「□露，今之輓歌也。」崔豹古今注□露歌曰：「□上露何易唏！
- id: hhs.61.p39.a3
  anchor: hhs.61.p39
  at: 128
  length: 0
  type: lixian
  text: 左傳曰，叔孫昭子與宋公語，相泣。樂祁退而告人曰：「君與叔孫其皆死乎？吾聞之，哀樂而樂哀，皆喪心也。心之精爽，是謂魂魄。魂魄去之，何以能久也！」
- id: hhs.61.p41.a1
  anchor: hhs.61.p41
  at: 93
  length: 0
  type: lixian
  text: 尚書洪範之文也。孔安國注曰：「君行僭差，則常暘順之也。」
- id: hhs.61.p46.a1
  anchor: hhs.61.p46
  at: 120
  length: 0
  type: lixian
  text: 事見左氏傳。
- id: hhs.61.p46.a2
  anchor: hhs.61.p46
  at: 142
  length: 0
  type: lixian
  text: 左氏傳：「從祀先公。」杜預云：「從，順也。先公，閔公、僖公也。將正二公之位，親盡，故通言先公也。」
- id: hhs.61.p47.a1
  anchor: hhs.61.p47
  at: 61
  length: 0
  type: lixian
  text: 尚書曰，武王入殷，封比干墓，軾商容閭。
- id: hhs.61.p47.a2
  anchor: hhs.61.p47
  at: 84
  length: 0
  type: lixian
  text: 公叔文子，衛大夫也。文子卒，其子戌請謚於君。君曰：「昔者衛國凶饑，夫子為粥與國之餓者，不亦惠乎？衛國有難，夫子以其死衛寡人，不亦貞乎？
- id: hhs.61.p47.a3
  anchor: hhs.61.p47
  at: 98
  length: 0
  type: lixian
  text: 伯夷、史魚也。
- id: hhs.61.p47.a4
  anchor: hhs.61.p47
  at: 104
  length: 0
  type: lixian
  text: 隨會、管仲。
- id: hhs.61.p47.a5
  anchor: hhs.61.p47
  at: 125
  length: 0
  type: lixian
  text: 史記堯典曰：「咨十有二牧，欽哉！」
- id: hhs.61.p47.a6
  anchor: hhs.61.p47
  at: 193
  length: 0
  type: lixian
  text: 詩大雅也。肇，謀也。敏，疾也。戎，汝也。錫，賜也。祉，福也。
- id: hhs.61.p47.a7
  anchor: hhs.61.p47
  at: 225
  length: 0
  type: lixian
  text: '*(詩)*國風羔羊詩：「羔羊之皮，素絲五紽。退食自公，逶蛇逶蛇。」'
- id: hhs.61.p49.t1
  anchor: hhs.61.p49
  at: 148
  length: 4
  type: temporal
  text: 延熹二年
  kind: absolute
  resolution: absolute
  year_ad: 159
  era: 延熹
  era_year: 2
- id: hhs.61.p51.a1
  anchor: hhs.61.p51
  at: 38
  length: 0
  type: lixian
  text: 綸氏即夏之綸國，少康之邑也。竹書紀年云：「楚及秦伐鄭綸氏。」今洛州故嵩陽縣城是也。
- id: hhs.61.p51.a2
  anchor: hhs.61.p51
  at: 109
  length: 0
  type: lixian
  text: 萬歲亭在今洛州故嵩陽縣西北。武帝元封元年，幸緱氏，登太室，聞山上呼萬歲聲者三，因以名焉。
- id: hhs.61.p51.a3
  anchor: hhs.61.p51
  at: 138
  length: 0
  type: lixian
  text: 論語孔子曰，伯夷、叔齊不降其志，不辱其身。謂柳下惠、少連降志辱身。我則異於是，無可無不可。鄭玄注云：不為夷、齊之清，不為惠、連之屈，故曰異於是也。
- id: hhs.61.p52.a1
  anchor: hhs.61.p52
  at: 81
  length: 0
  type: lixian
  text: 宋玉對楚襄王問曰：「客有歌於郢中者，為下裡巴人，國中屬而和者數千人；為陽春白雪，屬而和者不過數百人。是其曲□高，其和□寡。」
- id: hhs.61.p53.a1
  anchor: hhs.61.p53
  at: 0
  length: 0
  type: lixian
  text: 樊君，樊英也。事具英傳。
- id: hhs.61.p55.a1
  anchor: hhs.61.p55
  at: 24
  length: 0
  type: lixian
  text: 易干鑿度曰：「求卦主歲術常以太歲為歲紀歲，七十六為一紀，二十紀為一蔀首。即置積蔀首歲數，加所入紀歲數，以三十二除之，不足除者以乾坤始數二卦而得一歲，未筭即主歲之卦也。」
- id: hhs.61.p55.a2
  anchor: hhs.61.p55
  at: 39
  length: 0
  type: lixian
  text: 蒙，陰闇也。散謂不精明。
- id: hhs.61.p55.a3
  anchor: hhs.61.p55
  at: 60
  length: 0
  type: lixian
  text: 石室，藏書之府。河洛，圖書之文也。
- id: hhs.61.p55.a4
  anchor: hhs.61.p55
  at: 190
  length: 0
  type: lixian
  text: 論語曰：「作者七人。」注云：「謂伯夷、叔齊、虞仲、夷逸、朱張、柳下惠、少連。」
- id: hhs.61.p56.t1
  anchor: hhs.61.p56
  at: 0
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
  year_ad: 160
  era: 延熹
  era_year: 3
- id: hhs.61.p56.a1
  anchor: hhs.61.p56
  at: 50
  length: 0
  type: lixian
  text: 春秋考異郵曰「僖公之時，雨澤不澍，比於九月，公大驚懼，率腢臣禱山川，以六過自讓，絀女謁，放下讒佞郭都*(之)*等十三人，誅領人之吏受貨賂趙祝等九人。曰：『辜在寡人。方今天旱，野無生稼，寡人當死，百姓何謗，請以身塞無狀』」也。
- id: hhs.61.p57.a1
  anchor: hhs.61.p57
  at: 105
  length: 0
  type: lixian
  text: 國語曰，宣王即位，不籍千畝。□文公諫曰：「夫人之大事在農，上帝之粢盛於是乎出，故稷為太官。古者太史順時覛土，農祥晨正日月，底於天廟。先時九日，太史告稷曰：『陽氣俱蒸，土膏其動。』稷以告王，王即齋宮，百官御事。王耕一□，班三之，庶人終於千畝。」王弗聽，後師敗績於姜氏之戎。□音扶發反。
- id: hhs.61.p57.a2
  anchor: hhs.61.p57
  at: 175
  length: 0
  type: lixian
  text: 詩商頌曰：「不僭不濫，不敢怠遑。」書曰「文王至於日中昃，不遑暇食」也。
- id: hhs.61.p57.a3
  anchor: hhs.61.p57
  at: 289
  length: 0
  type: lixian
  text: 西北風曰不周風，亦曰厲風，見呂氏春秋也。
- id: hhs.61.p57.a4
  anchor: hhs.61.p57
  at: 319
  length: 0
  type: lixian
  text: 五經通義曰：「八風者，八卦之氣。八風以時至，則陰陽變化之道成，萬物得以時育生之。」
- id: hhs.61.p57.a5
  anchor: hhs.61.p57
  at: 337
  length: 0
  type: lixian
  text: 干卦象曰「天行健，君子以自強不息」也。
- id: hhs.61.p59.t1
  anchor: hhs.61.p59
  at: 2
  length: 2
  type: temporal
  text: 元年
  kind: relative
  resolution: bare_year
  year_ad: 158
  era: 延熹
  era_year: 1
- id: hhs.61.p59.a1
  anchor: hhs.61.p59
  at: 88
  length: 0
  type: lixian
  text: 詩魯頌曰：「王曰叔父，建獸元子，俾侯於魯，啟獸土宇，為周室輔。乃命魯公，俾侯於東，錫之山川，土田附庸。」注云：「王，成王也。叔父，周公也。」
- id: hhs.61.p59.a2
  anchor: hhs.61.p59
  at: 147
  length: 0
  type: lixian
  text: 禮記明堂位曰「周公相武王以伐紂。武王崩，成王幼弱，周公踐天子位，以理天下。七年，致政於成王。成王以周公有勳勞於天下，是以封周公於曲阜，地方七百裡，革車千乘，命魯公世世祀周公以天子之禮樂」也。
- id: hhs.61.p59.a3
  anchor: hhs.61.p59
  at: 192
  length: 0
  type: lixian
  text: 高祖為泗上亭長，蕭何佐之，後拜何為相國，益封五千戶。霍光廢昌邑王，立宣帝，後益封光萬七千戶。
- id: hhs.61.p60.t1
  anchor: hhs.61.p60
  at: 2
  length: 2
