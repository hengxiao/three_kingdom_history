- id: hhs.73.p38.a1
  anchor: hhs.73.p38
  at: 11
  length: 0
  type: lixian
  text: 丹陽郡丹陽縣人也。吳書曰：「陶謙父，故余姚長。謙少孤，始以不羈聞於縣中。年十四，猶綴帛為幡，乘竹馬而戲，邑中兒童皆隨之。故倉梧太守同縣甘公出遇之，見其容貌，異而呼之，與語甚悅，許妻以女。甘夫人怒曰：『陶家兒遨戲無度，於何以女許之？』甘公曰：『彼有奇表，長必大成。』遂與之。」
- id: hhs.73.p38.a2
  anchor: hhs.73.p38
  at: 20
  length: 0
  type: lixian
  text: 吳書曰：「陶謙察孝廉，拜尚書郎，除舒令。郡太守張盤，同郡先輩，與謙父友，謙恥為之屈。嘗*[以]*舞屬謙，謙不為起，固強之乃舞，舞又不轉。
