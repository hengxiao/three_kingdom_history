  text: 左傳曰：「兩釋累囚。」杜預曰：「累，系也。」前書音義曰：「諸不以罪死曰累。」斃，踣也。董卓恨紹起兵山東，乃誅紹叔父太傅隗，及宗族在京師者，盡誅滅之。
