  at: 698
  length: 0
  type: lixian
  text: 春秋：「公會齊侯盟於柯。」公羊傳曰：「齊桓公之信著於天下，自柯之盟始也。」
- id: hhs.73.p23.a13
  anchor: hhs.73.p23
  at: 706
  length: 0
  type: lixian
  text: 踐土，鄭地也。左傳，周襄王出居於鄭，晉文公重耳為踐土之會，率諸侯朝天子，以成霸功。
- id: hhs.73.p23.a14
  anchor: hhs.73.p23
  at: 714
  length: 0
  type: lixian
  text: 菁茅，靈茅，以供祭祀也。左傳曰僖四年，齊桓伐楚，責之曰：「爾貢苞茅不入，王祭不供，無以縮酒，寡人是征。」
- id: hhs.73.p23.a15
  anchor: hhs.73.p23
  at: 723
  length: 0
  type: lixian
  text: 左傳僖二十八年，晉侯伐曹，假道於衞，衞人不許，還自河南濟，侵曹伐衞，責其無禮也。
- id: hhs.73.p23.a16
  anchor: hhs.73.p23
  at: 733
  length: 0
  type: lixian
  text: 闒猶下也。茸，細也。闒音吐盍反。昔音人勇反。
- id: hhs.73.p23.a17
  anchor: hhs.73.p23
  at: 753
  length: 0
  type: lixian
  text: 鈇音方於反。莝，刃也。鉞，斧也。
