  text: 繕，修也。左傳曰：「繕甲兵。」
- id: hhs.73.p37.a3
  anchor: hhs.73.p37
  at: 57
  length: 0
  type: lixian
  text: 天運猶天命也。人文猶人事也。易曰「觀乎人文，以化成天下」。
- id: hhs.73.p38.h1
  anchor: hhs.73.p38
  at: 0
  length: 2
  type: person
