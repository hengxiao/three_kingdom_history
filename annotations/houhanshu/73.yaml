- id: hhs.73.p7.a1
  anchor: hhs.73.p7
  at: 23
  length: 0
  type: lixian
  text: 左傳曰，周襄王出奔於鄭，魯臧文仲曰：「天子蒙塵於外。」
- id: hhs.73.p7.a2
  anchor: hhs.73.p7
  at: 47
  length: 0
  type: lixian
  text: 說文曰：「曒力，並力也。」左傳曰：「曒力同心。」音力凋反，又音六。
