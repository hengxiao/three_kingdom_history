  anchor: hhs.72.p31
  at: 14
  length: 0
  type: lixian
  text: 《獻帝紀》曰：「傕見稠果勇而得衆心，疾害之，醉酒，潛使外生騎都尉胡封於坐中拉殺稠。」
- id: hhs.72.p31.a2
  anchor: hhs.72.p31
  at: 33
  length: 0
  type: lixian
  text: 袁宏《紀》曰「李傕數設酒請汜，或留汜止宿。汜妻懼與傕婢妾私而奪己愛，思有以離閒之。會傕送饋，汜妻乃以豉為藥。汜將食，妻曰：『食從外來，儻或有故？』遂摘藥示之，曰：『一栖不兩雄，我固疑將軍之信李公也。』他日傕請汜，大醉，汜疑傕藥之，絞糞汁飲之乃解，於是遂相猜疑」也。
- id: hhs.72.p31.h1
  anchor: hhs.72.p31
  at: 42
  length: 1
  type: person
  person_id: dongzhuo
  text: 卓
  via: given_name_carry
- id: hhs.72.p31.a3
  anchor: hhs.72.p31
  at: 75
  length: 0
  type: lixian
  text: 音纖。
- id: hhs.72.p31.a4
  anchor: hhs.72.p31
  at: 304
  length: 0
  type: lixian
  text: 《獻帝紀》曰：「汜與傕將張苞、張龍謀誅傕，汜將兵夜攻傕門。候開門內汜兵，苞等燒屋，火不然。汜兵弓弩並發，矢及天子樓帷簾中。」
- id: hhs.72.p32.a1
  anchor: hhs.72.p32
  at: 33
  length: 0
  type: lixian
  text: 《獻帝紀》曰：「傕令門設反關，校尉守察。盛夏炎暑，不能得冷水，飢渴流離。上以前移宮人及侍臣，不得以穀米自隨，入門有禁防，不得出市，困乏，使就傕索粳米五斛，牛骨五具，欲為食賜宮人左右。傕不與米，取乆牛肉牛骨給，皆已臭蟲，不可啖食。」
- id: hhs.72.p32.a2
  anchor: hhs.72.p32
  at: 45
  length: 0
  type: lixian
  text: 池陽，縣，故城在今涇陽縣西北。
- id: hhs.72.p32.a3
  anchor: hhs.72.p32
  at: 153
  length: 0
  type: lixian
  text: 左右，助也，音佐又。
- id: hhs.72.p32.a4
  anchor: hhs.72.p32
  at: 215
  length: 0
  type: lixian
  text: 《獻帝起居注》曰：「傕性喜鬼怪左道之術，常有道人及女巫歌謳擊鼓下神祭，六丁符劾厭勝之具，無所不為。又於朝廷省門外為董卓作神坐，數以牛羊祠之。天子使左中郎將李國持節拜傕為大司馬，在三公之右。傕自以為得鬼神之助，乃厚賜諸巫。」
- id: hhs.72.p33.a1
  anchor: hhs.72.p33
  at: 40
  length: 0
  type: lixian
  text: 袁宏《紀》曰：「濟使太官令孫篤、校尉張式宣諭十反。」
- id: hhs.72.p33.a2
  anchor: hhs.72.p33
  at: 47
  length: 0
  type: lixian
  text: 《獻帝起居注》曰：「初，天子出，到宣平門，當度橋，汜兵數百人遮橋曰：『是天子非？』車不得前。傕兵數百人皆持大戟在乘輿車前，侍中劉艾大呼云：『是天子也！』使侍中楊琦高舉車帷。帝言諸兵：『汝却，何敢迫近至尊邪！』汜等兵乃却。旣度橋，士衆咸稱萬歲。」
- id: hhs.72.p33.a3
  anchor: hhs.72.p33
  at: 104
  length: 0
  type: lixian
  text: 《蜀志》曰：「承，獻帝舅也。」裴松之注曰：「承，靈帝母太后之姪。」
- id: hhs.72.p33.a4
  anchor: hhs.72.p33
  at: 149
  length: 0
  type: lixian
  text: 《帝王紀》曰：「帝以尚書郎郭溥喻汜，汜以屯部未定，乞須留之。溥因罵汜曰：『卿真庸人賤夫，為國上將，今天子有命，何須留之？吾不忍見卿所行，請先殺我，以章卿惡。』汜得溥言切，意乃少喻。」
- id: hhs.72.p33.a5
  anchor: hhs.72.p33
  at: 199
  length: 0
  type: lixian
  text: 袁宏《紀》曰：「煨與楊定有隙，煨迎乘輿，不敢下馬，揖馬上。侍中种輯素與定親，乃言曰：『段煨欲反。』上曰：『煨屬來迎，何謂反？』對曰：『迎不至界，拜不下馬，其色變，必有異心。』太尉楊彪等曰：『煨不反，臣等敢以死保，車駕可幸其營。』董承、楊定言曰：『郭汜今且將七百騎來入煨營。』天子信之，遂露次於道南，奉、承、定等功也。」
- id: hhs.72.p34.a1
  anchor: hhs.72.p34
  at: 107
  length: 0
  type: lixian
  text: 《獻帝傳》曰：「掠婦女衣被，遲違不時解，即斫刺之。有美髮者斷取。凍死及嬰兒隨流而浮者塞水。」
- id: hhs.72.p34.a2
  anchor: hhs.72.p34
  at: 165
  length: 0
  type: lixian
  text: 袁山松《書》曰：「儁年二十五，其督戰訾寶負其尸而瘞之。」
- id: hhs.72.p34.a3
  anchor: hhs.72.p34
  at: 347
  length: 0
  type: lixian
  text: 袁宏紀曰：「傕、汜繞營叫呼，吏士失色，各有分散意。李樂懼，欲令車駕御舡過砥柱，出盟津。楊彪曰：『臣弘農人也。自此以東，有三十六難，非萬乘所當登。』宗正劉艾亦曰：『臣前為陝令，知其危險。舊故河師，猶時有傾危，況今無師。太尉所慮是也。』」
- id: hhs.72.p34.a4
  anchor: hhs.72.p34
  at: 384
  length: 0
  type: lixian
  text: 縋音直類反。
- id: hhs.72.p34.a5
  anchor: hhs.72.p34
  at: 446
  length: 0
  type: lixian
  text: 宋貴人名都，常山太守泓之女也。見獻帝起居注。
- id: hhs.72.p34.a6
  anchor: hhs.72.p34
  at: 492
  length: 0
  type: lixian
  text: 大陽，縣，屬河東郡。前書音義曰「在大河之陽」也。即今陝州河北縣是也。《十三州記》曰：「傅巖在其界，今住穴尚存。」
