  at: 84
  length: 0
  type: lixian
  text: 前漢枚乘上書曰：「欲湯之滄，一人吹之，百人揚之，無益也。不如絕薪止火而已。」滄音測亮反，寒也。
- id: hhs.72.p8.a3
  anchor: hhs.72.p8
  at: 111
  length: 0
  type: lixian
  text: 《公羊傳》曰：「晉趙鞅取晉陽之甲以逐荀寅與士吉射。荀寅與士吉射者曷為者也？君側之惡人也。此逐君側之惡人，曷為以叛言之？無君命也。」
- id: hhs.72.p8.a4
  anchor: hhs.72.p8
  at: 121
  length: 0
  type: lixian
  text: 鳴鍾鼓者，聲其罪也。論語曰：「小子鳴鼓而攻之。」《典略》載卓表曰：「張讓等慆慢天常，擅操王命，父子兄弟並據州郡，一書出門，高獲千金，下數百萬膏腴美田，皆屬讓等。使變氣上蒸，妖賊蜂起。」
