  text: 《三輔舊事》曰：「秦王立二十六年，初定天下，稱皇帝。大人見臨洮，身長五丈，跡長六尺，作銅人以厭之，立在阿房殿前。漢徙長樂宮中大夏殿前。」史記曰：「始皇鑄天下兵器為十二金人。」
