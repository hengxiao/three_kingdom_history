- id: hhs.72.p43.a1
  anchor: hhs.72.p43
  at: 12
  length: 0
  type: lixian
  text: 《魏志》曰：「阜字義山，天水兾人也。韋康以為別駕。馬超率萬餘人攻兾城，阜率國士大夫及宗族子弟勝兵者千餘人，使弟岳於城上作偃月營，與超接戰。自正月至八月拒守，而救兵不至。超入，拘岳於兾，殺刺史太守。阜內有報超之志，而未得其便。外兄姜敘屯歷城，阜少長詣敘家，見敘母，說前在兾中時事，歔欷悲甚。敘曰：『何為爾？』阜曰：『守城不能完，君亡不能死，亦何面目以視息天下？』時敘母慨然勑從阜計。超聞阜等兵起，自將出襲歷城，得敘母。敘母罵之曰：『若背父之逆子，殺君之桀賊，天地豈乆容，敢以面目視人乎？』超怒，殺之。阜與戰，身被五創，宗族昆季死者七人，超遂南奔張魯。」
