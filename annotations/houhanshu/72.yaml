  type: lixian
  text: 《獻帝春秋》曰：「涼州義從宋建、王國等反。詐金城郡降，求見涼州大人故新安令邊允、從事韓約。約不見，太守陳懿勸之使往，國等便劫質約等數十人。金城亂，懿出，國等扶以到護羌營，殺之，而釋約、允等。隴西以愛憎露布，冠約、允名以為賊，州購約、允各千戶侯。約、允被購，『約』改為『遂』，『允』改為『章』。」
