  text: 金華，以金為華飾車也。爪者，蓋弓頭為爪形也。轓音甫袁反。《廣雅》云：「車箱也。」畫為文彩。《續漢志》曰：「轓長六尺，下屈，廣八寸。」又云：「皇太子青蓋金華蚤畫轓。」竿摩謂相逼近也。今俗以事干人者，謂之「相竿摩」。
