  anchor: hhs.72.p13
  at: 185
  length: 0
  type: lixian
  text: 鍾虡以銅為之，故賈山上書云「懸石鑄鍾虡」。前書《音義》曰：「虡，鹿頭龍身，神獸也。」《說文》：「鍾鼓之跗，以猛獸為飾也。」武帝置飛廉館。《音義》云：「飛廉，神禽，身似鹿，頭如爵，有角，蛇尾，文如豹文。」明帝永平五年，長安迎取飛廉及銅馬置上西門外，名平樂館。銅馬則東門京所作，致於金馬門外者也。張璠《紀》曰：「太史靈臺及永安候銅蘭楯，卓亦取之。」
