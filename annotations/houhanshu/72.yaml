  type: person
  person_id: caocao
  text: 曹操
  via: primary
- id: hhs.72.p44.h2
  anchor: hhs.72.p44
  at: 49
  length: 3
  type: person
  person_id: xiahouyuan
  text: 夏侯淵
  via: primary
- id: hhs.72.p44.a2
  anchor: hhs.72.p44
  at: 63
  length: 0
  type: lixian
  text: 《魏志》曰：「泉字妙才，沛國人也，為征西護軍，魏太祖使帥諸將討建，拔之。」
- id: hhs.72.p45.h1
  anchor: hhs.72.p45
  at: 3
  length: 2
  type: person
  person_id: dongzhuo
  text: 董卓
  via: primary
- id: hhs.72.p45.a1
  anchor: hhs.72.p45
  at: 12
  length: 0
  type: lixian
  text: 《詩·大雅》曰：「闞如虓虎。」毛傳曰：「虎怒之貌也。」
- id: hhs.72.p45.a2
  anchor: hhs.72.p45
  at: 19
  length: 0
  type: lixian
  text: 剝猶亂也。《左傳》曰：「天實剝亂。」
- id: hhs.72.p45.a3
  anchor: hhs.72.p45
  at: 31
  length: 0
  type: lixian
  text: 彝，常也。倫，理也。書云：「我不知其彝倫攸敘。」《左傳》曰：「裂冠毀冕。」畿謂王畿也。服，九服也。
- id: hhs.72.p45.a4
  anchor: hhs.72.p45
  at: 40
  length: 0
  type: lixian
  text: 刳，剖也。斮，斬也。紂刳剔孕婦，剖比干之心，斮朝涉之脛。
- id: hhs.72.p45.a5
  anchor: hhs.72.p45
  at: 62
  length: 0
  type: lixian
  text: 折，屈也。謂忍性屈情，擢用鄭泰、蔡邕、何顒、荀爽等。
- id: hhs.72.p45.a6
  anchor: hhs.72.p45
  at: 70
  length: 0
  type: lixian
  text: 《莊子》曰：「跖之徒問於跖曰：『盜亦有道乎？』跖曰：『何適無有邪？夫妄意室中之藏，聖也；入先，勇也；出後，義也；知可否，智也；分均，仁也：五者不備而能成大盜者，天下未之有也。』」
- id: hhs.72.p45.a7
  anchor: hhs.72.p45
  at: 76
  length: 0
  type: lixian
  text: 殘寇謂傕、汜等。
- id: hhs.72.p45.a8
  anchor: hhs.72.p45
  at: 91
  length: 0
  type: lixian
  text: 《書》曰：「火炎崑岡，玉石俱焚。」
- id: hhs.72.p45.a9
  anchor: hhs.72.p45
  at: 101
  length: 0
  type: lixian
  text: 《詩．大雅》曰：「上帝版版，下人卒癉。」毛萇注：「版，反也。癉，病也。言厲王為政，反先王之道，下人盡病也。」又《蕩之什》曰：「蕩蕩上帝，下人之辟，疾威上帝，其命多辟。」鄭玄注云：「蕩蕩，法度廢壞之貌。」
- id: hhs.72.p45.a10
  anchor: hhs.72.p45
  at: 111
  length: 0
  type: lixian
  text: 《左傳》曰：「人生實難，其有不獲死乎？」
- id: hhs.72.p45.a11
  anchor: hhs.72.p45
  at: 119
  length: 0
  type: lixian
  text: 《老子》曰：「天地不仁，以萬物為芻狗。」
- id: hhs.72.p46.a1
  anchor: hhs.72.p46
  at: 8
  length: 0
  type: lixian
  text: 前書《音義》曰：「四千五百歲為一元，一元之中有九戹，陽戹五，陰戹四。陽為旱，陰為水。」初入元百六歲有陽戹，故曰「百六之會」。
- id: hhs.72.p46.a2
  anchor: hhs.72.p46
  at: 14
  length: 0
  type: lixian
  text: 《易》曰大過：「棟撓，本末弱也。」剝：「不利有攸往，小人長也。」
- id: hhs.72.p46.h1
  anchor: hhs.72.p46
  at: 14
  length: 2
  type: person
  person_id: dongzhuo
  text: 董卓
  via: primary
- id: hhs.72.p46.a3
  anchor: hhs.72.p46
  at: 24
  length: 0
  type: lixian
  text: 滔，漫也。《書》曰：「象龔滔天。」
- id: hhs.72.p46.a4
  anchor: hhs.72.p46
  at: 29
  length: 0
  type: lixian
  text: 方，四方；夏，華夏也。《詩．小雅》云：「百川沸騰，山冢崒崩。」
- id: hhs.72.p46.a5
  anchor: hhs.72.p46
  at: 44
  length: 0
  type: lixian
  text: 《左傳》曰：「多行無禮，必自及。」
- id: hhs.72.p46.a6
  anchor: hhs.72.p46
  at: 54
  length: 0
  type: lixian
  text: 《周禮》巾車氏掌王之五輅。纏，遶也。魏象，闕也。
