  text: 《獻帝起居注》曰：「傕等各欲用其所舉，若壹違之，便忿憤恚怒。主者患之，乃以次第用其所舉，先從傕起，汜次之，稠次之。三公所舉，終不見用。」
- id: hhs.72.p30.a1
  anchor: hhs.72.p30
  at: 67
  length: 0
  type: lixian
  text: 啖音徒敢反。
- id: hhs.72.p30.a2
  anchor: hhs.72.p30
  at: 84
  length: 0
  type: lixian
  text: 音問。
- id: hhs.72.p30.a3
  anchor: hhs.72.p30
  at: 110
  length: 0
  type: lixian
  text: 賦，布也。卹，憂也。
