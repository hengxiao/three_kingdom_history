- id: hhs.8.p283.a1
  anchor: hhs.8.p283
  at: 18
  length: 0
  type: lixian
  text: 《史記》曰，趙高欲爲亂，恐羣臣不聽，乃先設驗。持鹿獻胡亥曰：「馬也。」胡亥曰：「丞相誤也。」以問羣臣，左右或言馬，或言鹿者高皆陰法中之，自此左右不敢言之也。
- id: hhs.8.p283.a2
  anchor: hhs.8.p283
  at: 35
  length: 0
  type: lixian
  text: 時宦官並起第宅，擬則宮室。帝甞登永安候臺，宦官恐望見之，乃使趙忠等諫曰：「人君不當登高，登高則百姓散離。」自是不敢復登臺榭。見《宦者傳》。
- id: hhs.8.p284.a1
  anchor: hhs.8.p284
  at: 13
  length: 0
  type: lixian
  text: 《易》曰：「負且乘，致寇至。」言帝以小人而乘君子之器。
- id: hhs.8.p284.a2
  anchor: hhs.8.p284
  at: 23
  length: 0
  type: lixian
  text: 《詩》小雅曰：「小雅廢，則四夷交侵，中國微矣。」缺亦廢也。
- id: hhs.8.p284.a3
  anchor: hhs.8.p284
  at: 33
  length: 0
  type: lixian
  text: 《史記》曰，伍子胥諫吳王，吳王不聽，子胥曰：「臣今見麋鹿遊于姑蘇之臺，官中生荊棘，露沾衣也。」言帝爲政貪亂，任寄不得其人，尋以獻帝遷播，洛陽丘墟，故麋鹿棲宮衞也。衞，協韻音于別反。
