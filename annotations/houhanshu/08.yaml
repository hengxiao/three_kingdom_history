- id: hhs.8.p169.a1
  anchor: hhs.8.p169
  at: 50
  length: 0
  type: lixian
  text: 《三禮圖》曰：「進賢冠，文官服之，前高七寸，後高三寸，長八寸。」《續漢志》曰：「靈帝寵用便嬖子弟，轉相汲引，賣關內侯直五百萬。令長強者貪如豺狼，弱者略不類物，實狗而冠也。」昌邑王見狗冠方山冠，龔遂曰：「王之左右皆狗而冠。」
- id: hhs.8.p169.a2
  anchor: hhs.8.p169
  at: 73
  length: 0
  type: lixian
  text: 《續漢志》曰：「驢者乃服重致遠，上下山谷，野人之所用耳，何有帝王君子而驂駕之乎！天意若曰，國且大亂，賢愚倒植，凡執政者皆如驢也。」
