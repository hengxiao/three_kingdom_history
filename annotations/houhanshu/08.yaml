  length: 0
  type: lixian
  text: 國王，陳愍王寵也。臣賢案：陳敬王傳云「國相師遷」。又《東觀記》曰「陳行相師遷奏，沛相魏愔，前爲陳相，與陳王寵交通」。明魏愔爲沛相，此言師遷爲沛相，蓋誤也。
