  length: 0
  type: lixian
  text: 騄驥，善馬也。調謂徵發也。
- id: hhs.8.p160.a2
  anchor: hhs.8.p160
  at: 33
  length: 0
  type: lixian
  text: 《前書音義》曰：「辜，障也。搉，專也。謂障餘人賣買而自取其利。」
