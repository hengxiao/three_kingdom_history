  text: 京房《易傳》曰：「諸侯相伐，厥妖馬生人。」
- id: hhs.8.p134.a2
  anchor: hhs.8.p134
  at: 39
  length: 0
  type: lixian
  text: 《山陽公載記》曰：「時賣官，二千石二千萬，四百石四百萬，其以德次應選者半之，或三分之一，於西園立庫以貯之。」
