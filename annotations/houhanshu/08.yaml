  anchor: hhs.8.p258
  at: 11
  length: 0
  type: lixian
  text: 樂資《山陽公載記》曰：「小黃門蹇碩爲上軍校尉，虎賁中郎將袁紹爲中軍校尉，屯騎校尉鮑鴻爲下軍校尉，議郎曹操爲典軍校尉，趙融爲助軍左校尉，馮芳爲助軍右校尉，諫議大夫夏牟爲左校尉，淳于瓊爲右校尉：凡八校，皆統於蹇碩。」
- id: hhs.8.p259.a1
  anchor: hhs.8.p259
  at: 25
  length: 0
