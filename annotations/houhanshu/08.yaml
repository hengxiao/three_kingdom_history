- id: hhs.8.p1.a1
  anchor: hhs.8.p1
  at: 7
  length: 0
  type: lixian
  text: 《謚法》曰：「亂而不損曰靈。」《伏侯古今注》曰宏之字曰大。
- id: hhs.8.p1.a2
  anchor: hhs.8.p1
  at: 34
  length: 0
  type: lixian
  text: 淑以河閒王子封爲解瀆亭侯，萇襲父封，故言世封也。解瀆亭在今定州義豐縣東北也。
- id: hhs.8.p1.a3
  anchor: hhs.8.p1
  at: 89
  length: 0
  type: lixian
  text: 《續漢志》曰：「桓帝之初，京都童謠曰：『城上烏，尾畢逋，父爲吏，子爲徒。一徒死，百乘車。車班班，入河閒。河閒奼女工數錢，以錢爲室金爲堂，石上慊慊舂黃梁。梁下有懸鼓，我欲擊之丞卿怒。』『城上烏』者，處高獨食，不與下共，謂人主多聚斂也。『父爲吏，子爲徒』者，言蠻夷叛逆，父旣爲軍吏，子弟又爲卒徒往擊之也。『一徒死，百乘車』者，言前一人討胡旣死矣，後又遣百乘車往也。『車班班』者，言乘輿班班入河閒迎靈帝也。『奼女數錢』，言帝旣立，其母永樂太后好聚金以爲堂室也。『石上慊慊』者，言太后雖積金錢，猶慊慊常若不足，使人舂黃粱而食之也。『我欲擊之』者，言太后敎帝使賣官受錢，天下忠篤之士怨望，欲擊鼓求見卿，懸鼓者復怒而止我也。」
