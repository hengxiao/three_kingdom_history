  anchor: hhs.8.p125
  at: 10
  length: 0
  type: lixian
  text: 顥字智明。《搜神記》曰：「顥爲梁相，新雨後，有鵲飛翔近地，令人擿之，墯地化爲圓石，顥命椎破，得一金印，文曰『忠孝侯印』。」
