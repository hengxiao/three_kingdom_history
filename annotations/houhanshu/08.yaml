- id: hhs.8.p123.a1
  anchor: hhs.8.p123
  at: 8
  length: 0
  type: lixian
  text: 鴻都，門名也，於內置學。時其中諸生，皆勑州、郡、三公舉召能爲尺牘辭賦及工書鳥篆者相課試，至千人焉。
