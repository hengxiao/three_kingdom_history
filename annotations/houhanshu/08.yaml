  anchor: hhs.8.p185
  at: 39
  length: 0
  type: lixian
  text: 《續漢書》曰：「三十六萬餘人。」
- id: hhs.8.p185.a2
  anchor: hhs.8.p185
  at: 53
  length: 0
  type: lixian
  text: 安平王續、甘陵王忠。
- id: hhs.8.p186.t1
  anchor: hhs.8.p186
  at: 0
  length: 2
  type: temporal
  text: 三月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 三月
  month_ordinal: 3
- id: hhs.8.p186.a1
  anchor: hhs.8.p186
  at: 29
  length: 0
  type: lixian
  text: 都亭在洛陽。八關謂函谷、廣城、伊闕、大谷、轘轅、旋門、小平津、孟津也。
- id: hhs.8.p186.a2
  anchor: hhs.8.p186
  at: 44
  length: 0
  type: lixian
  text: 時中常侍呂彊言於帝曰：「黨錮乆積，若與黃巾合謀，悔之無救。」帝懼，皆赦之。
- id: hhs.8.p187.t1
  anchor: hhs.8.p187
  at: 0
  length: 3
  type: temporal
  text: 夏四月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 夏四月
  month_ordinal: 4
- id: hhs.8.p187.a1
  anchor: hhs.8.p187
  at: 20
  length: 0
  type: lixian
  text: 盛字伯能。
- id: hhs.8.p189.a1
  anchor: hhs.8.p189
  at: 16
  length: 0
  type: lixian
  text: 時鈞上《書》曰：「今斬常侍，懸其首於南郊以謝天下，即兵自消也。」帝以章示常侍，故下獄也。
- id: hhs.8.p190.a1
  anchor: hhs.8.p190
  at: 13
  length: 0
  type: lixian
  text: 邵陵，縣名，屬汝南郡，故城在今豫州郾城縣東。
- id: hhs.8.p191.t1
  anchor: hhs.8.p191
  at: 0
  length: 2
  type: temporal
  text: 五月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 五月
  month_ordinal: 5
- id: hhs.8.p191.a1
  anchor: hhs.8.p191
  at: 23
  length: 0
  type: lixian
  text: 長社，今許州縣也，故城在長葛縣西。
- id: hhs.8.p192.t1
  anchor: hhs.8.p192
  at: 0
  length: 2
  type: temporal
  text: 六月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 六月
  month_ordinal: 6
- id: hhs.8.p194.a1
  anchor: hhs.8.p194
  at: 16
  length: 0
  type: lixian
  text: 西華，縣，屬汝南郡，故城在今陳州項城縣西。
- id: hhs.8.p194.a2
  anchor: hhs.8.p194
  at: 50
  length: 0
  type: lixian
  text: 植連破張角，垂當拔之，小黃門左豐言於帝曰：「盧中郎固壘息軍，以待天誅。」帝怒，遂檻車徵植，減死一等。
- id: hhs.8.p195.a1
  anchor: hhs.8.p195
  at: 12
  length: 0
  type: lixian
  text: 《續漢志》曰：「上西門外女子生兒，兩頭，異肩共胸，以爲不祥，墮地棄之。其後政在私門，上下無別，二頭之象。」
- id: hhs.8.p196.t1
  anchor: hhs.8.p196
  at: 0
  length: 3
  type: temporal
  text: 秋七月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 秋七月
  month_ordinal: 7
- id: hhs.8.p196.a1
  anchor: hhs.8.p196
  at: 16
  length: 0
  type: lixian
  text: 劉艾《紀》曰：「時巴郡巫人張脩療病，愈者雇以米五斗，號爲『五斗米師』。」
- id: hhs.8.p198.t1
  anchor: hhs.8.p198
  at: 0
  length: 2
  type: temporal
  text: 八月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 八月
  month_ordinal: 8
- id: hhs.8.p198.a1
  anchor: hhs.8.p198
  at: 18
  length: 0
  type: lixian
  text: 其帥，卜已也。倉亭在東郡。
- id: hhs.8.p200.t1
  anchor: hhs.8.p200
  at: 0
  length: 2
  type: temporal
  text: 九月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 九月
  month_ordinal: 9
- id: hhs.8.p201.t1
  anchor: hhs.8.p201
  at: 0
  length: 3
  type: temporal
  text: 冬十月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 冬十月
  month_ordinal: 10
- id: hhs.8.p201.a1
  anchor: hhs.8.p201
  at: 31
  length: 0
  type: lixian
  text: 發棺斷頭，傳送馬市。
- id: hhs.8.p201.t2
  anchor: hhs.8.p201
  at: 42
  length: 3
  type: temporal
  text: 十一月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 十一月
  month_ordinal: 11
- id: hhs.8.p202.a1
  anchor: hhs.8.p202
  at: 44
  length: 0
  type: lixian
  text: 伶，姓也，周有大夫伶州鳩。
- id: hhs.8.p205.t1
  anchor: hhs.8.p205
  at: 0
  length: 3
  type: temporal
  text: 十二月
  kind: relative
  resolution: bare_month
  year_ad: 184
  era: 中平
  era_year: 1
  month_chinese: 十二月
  month_ordinal: 12
- id: hhs.8.p206.t1
  anchor: hhs.8.p206
  at: 0
  length: 2
  type: temporal
  text: 是歲
  kind: relative
  resolution: this_year
  year_ad: 184
  era: 中平
  era_year: 1
- id: hhs.8.p206.a1
  anchor: hhs.8.p206
  at: 29
  length: 0
  type: lixian
  text: 《風俗通》曰：「亦作人狀，操持兵弩，一一備具。」《續漢志》曰：「龍蛇鳥獸，其狀毛羽頭目足翅皆具。是歲黃巾賊起，漢遂微弱。」
- id: hhs.8.p207.t1
  anchor: hhs.8.p207
  at: 0
  length: 5
  type: temporal
  text: 二年春正月
  kind: relative
  resolution: bare_year
  year_ad: 185
  era: 中平
  era_year: 2
  month_chinese: 春正月
  month_ordinal: 1
- id: hhs.8.p209.t1
  anchor: hhs.8.p209
  at: 0
  length: 2
  type: temporal
  text: 二月
  kind: relative
  resolution: bare_month
  year_ad: 185
  era: 中平
  era_year: 2
  month_chinese: 二月
  month_ordinal: 2
- id: hhs.8.p209.a1
  anchor: hhs.8.p209
  at: 16
  length: 0
  type: lixian
  text: 《續漢志》曰：「時燒靈臺殿、樂成殿，延及北闕度道，西燒嘉德、和驩殿。」
- id: hhs.8.p209.a2
  anchor: hhs.8.p209
  at: 27
  length: 0
  type: lixian
  text: 洛陽城西面南頭門也。
- id: hhs.8.p210.a1
  anchor: hhs.8.p210
  at: 9
  length: 0
  type: lixian
  text: 以修宮室。
- id: hhs.8.p212.t1
  anchor: hhs.8.p212
  at: 6
