  anchor: hhs.8.p278
  at: 143
  length: 0
  type: lixian
  text: 小平津在今鞏縣西北。《續漢志》曰：「時京師童謠曰『侯非侯，王非王，千乘萬騎上北邙。』案獻帝未有爵號，爲段珪等所執，公卿百官皆隨其後，到河上乃得還。」
- id: hhs.8.p278.a2
  anchor: hhs.8.p278
  at: 164
  length: 0
  type: lixian
  text: 《獻帝春秋》曰：「河南中部掾閔貢見天子出，率騎追之，北到河上。天子飢渴，貢宰羊進之，厲聲責讓等曰：『君以閹宦之隷，刀鋸之殘，越從洿泥，扶侍日月，賣弄國恩，階賤爲貴，劫迫帝主，蕩覆王室，假息漏刻，遊魂河津。自亡新以來，姦臣賊子未有如君者。今不速死，吾射殺汝。』讓等惶怖，叉手再拜叩頭，向天子辭曰：『臣等死，陛下自愛。』遂投河而死。」
- id: hhs.8.p281.t1
