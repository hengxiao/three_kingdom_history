- id: hhs.8.p225.a2
  anchor: hhs.8.p225
  at: 29
  length: 0
  type: lixian
  text: 天祿，獸也。時使掖廷令畢嵐鑄銅人，列於倉龍、玄武闕外，鍾懸於玉堂及雲臺殿前，天祿、蝦蟆吐水於平門外。事具《宦者傳》。案：今鄧州南陽縣北有宗資碑，旁有兩石獸，鐫其膊一曰天祿，一曰辟邪。據此，即天祿、辟邪並獸名也。漢有天祿閣，亦因獸以立名。
