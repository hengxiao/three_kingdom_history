  month_ordinal: 5
- id: hhs.8.p129.a1
  anchor: hhs.8.p129
  at: 20
  length: 0
  type: lixian
  text: 《東觀記》曰：「白衣人言『梁伯夏敎我上殿』，與中黃門桓賢語，因忽不見。」
- id: hhs.8.p129.t2
