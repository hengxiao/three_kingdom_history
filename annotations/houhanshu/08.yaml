  type: lixian
  text: 《續漢志》曰：「建寧中，京都長者皆以葦方笥爲裝具，時有識者竊言，葦笥郡國讞篋也。後黨人禁錮，會赦，有疑者皆讞廷尉，人名悉入方笥中。」
