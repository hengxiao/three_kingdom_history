  length: 0
  type: lixian
  text: 平城門，洛陽城南門也。蔡邕曰：「平城門，正陽之門，與宮連，郊祀法駕所從出，門之最尊者。」武庫，禁兵所藏。東垣，庫之外障。《易傳》曰：「小人在位，厥妖城門自壞。」
