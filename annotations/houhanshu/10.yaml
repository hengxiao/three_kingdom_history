  length: 0
  type: lixian
  text: 《漢官儀》曰：「黃門令秩六百石。」
- id: hhs.10.p25.a2
  anchor: hhs.10.p25
  at: 88
  length: 0
  type: lixian
  text: 靈帝母所居也。訕，謗毀也。
- id: hhs.10.p25.t2
