  length: 3
  type: temporal
  text: 十二年
  kind: relative
  resolution: bare_year
  year_ad: 69
  era: 永平
  era_year: 12
- id: hhs.10.p59.a1
  anchor: hhs.10.p59
  at: 14
  length: 0
  type: lixian
  text: 平臯，縣，屬河內郡。
- id: hhs.10.p59.a2
  anchor: hhs.10.p59
  at: 23
  length: 0
  type: lixian
  text: 昌安，縣，屬高密國。蕃，鄧襲子，禹之孫也。
- id: hhs.10.p60.t1
  anchor: hhs.10.p60
  at: 4
  length: 3
