  era_year: 2
- id: hhs.10.p26.a2
  anchor: hhs.10.p26
  at: 98
  length: 0
  type: lixian
  text: 嘉德殿在九龍門內。
- id: hhs.10.p27.t1
  anchor: hhs.10.p27
  at: 28
  length: 4
  type: temporal
  text: 中平五年
  kind: absolute
  resolution: absolute
  year_ad: 188
  era: 中平
  era_year: 5
- id: hhs.10.p27.a1
  anchor: hhs.10.p27
  at: 42
  length: 0
  type: lixian
  text: 脩，今德州縣也，故城在縣南。「脩」今作「蓨」，音條。
- id: hhs.10.p27.a2
  anchor: hhs.10.p27
  at: 139
  length: 0
  type: lixian
  text: 輈張猶彊梁也。
- id: hhs.10.p27.a3
  anchor: hhs.10.p27
  at: 198
  length: 0
  type: lixian
  text: 《漢官儀》曰：「永樂太僕，用中人爲之。」
- id: hhs.10.p27.a4
  anchor: hhs.10.p27
  at: 212
  length: 0
  type: lixian
  text: 辜較，解見靈紀。西省，即謂永樂宮之司。
- id: hhs.10.p27.a5
  anchor: hhs.10.p27
  at: 222
  length: 0
  type: lixian
  text: 蕃后謂平帝母衞姬。時王莽攝政，恐其專權，后不得留在京師，故云故事也。
- id: hhs.10.p28.t1
  anchor: hhs.10.p28
  at: 26
  length: 4
  type: temporal
  text: 建寧三年
  kind: absolute
  resolution: absolute
  year_ad: 170
  era: 建寧
  era_year: 3
- id: hhs.10.p28.t2
  anchor: hhs.10.p28
  at: 39
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 171
  era: 建寧
  era_year: 4
- id: hhs.10.p28.a1
  anchor: hhs.10.p28
  at: 60
  length: 0
  type: lixian
  text: 不其，縣，屬琅邪郡，故城在今萊州即墨縣西南，蓋其縣之鄉也。其音基。決錄注：「酆字伯遇。」
- id: hhs.10.p29.a1
  anchor: hhs.10.p29
  at: 36
  length: 0
  type: lixian
  text: 熹平元年，王甫譖悝與中常侍鄭颯交通，欲迎立悝，悝自殺，妃死獄中也。
- id: hhs.10.p29.a2
  anchor: hhs.10.p29
  at: 68
  length: 0
  type: lixian
  text: 禮記曰：「執左道以亂衆，殺無赦。」鄭玄注云：「左道，若巫蠱也。」
- id: hhs.10.p29.t1
  anchor: hhs.10.p29
  at: 72
  length: 4
  type: temporal
  text: 光和元年
  kind: absolute
  resolution: absolute
  year_ad: 178
  era: 光和
  era_year: 1
- id: hhs.10.p29.a3
  anchor: hhs.10.p29
  at: 148
  length: 0
  type: lixian
  text: 《詩》云：「迺立皐門。」注云：「王之郭門曰皐門。」《漢官儀》曰：「十二門皆有亭。」
- id: hhs.10.p30.a1
  anchor: hhs.10.p30
  at: 58
  length: 0
  type: lixian
  text: 上帝，天也。震，動也。書曰「帝乃震怒」也。
- id: hhs.10.p30.a2
  anchor: hhs.10.p30
  at: 85
  length: 0
  type: lixian
  text: 《續漢志》曰：「羽林左監一人，秩六百石，主羽林左騎。右亦如之。」「永」或作「詠」。
- id: hhs.10.p30.a3
  anchor: hhs.10.p30
  at: 98
  length: 0
  type: lixian
  text: 攘謂除也。
- id: hhs.10.p30.a4
  anchor: hhs.10.p30
  at: 218
  length: 0
  type: lixian
  text: 《左傳》曰：「晉侯夢大厲，被髮及地，搏膺而踊曰：『殺余孫，不義，余得請于帝矣。』」杜預注曰：「厲鬼，趙氏之先祖也。晉侯先殺趙同、趙括，故怒也。」
- id: hhs.10.p31.a1
  anchor: hhs.10.p31
  at: 24
  length: 0
  type: lixian
  text: 風俗通曰，漢以八月筭人。后家以金帛賂遺主者以求入也。
- id: hhs.10.p31.a2
  anchor: hhs.10.p31
  at: 47
  length: 0
  type: lixian
  text: 道人謂道術之人也。《獻帝春秋》曰：「靈帝數失子，不敢正名，養道人史子眇家，號曰史侯。」
- id: hhs.10.p32.t1
  anchor: hhs.10.p32
  at: 0
  length: 4
  type: temporal
  text: 光和三年
  kind: absolute
  resolution: absolute
  year_ad: 180
  era: 光和
  era_year: 3
- id: hhs.10.p32.t2
  anchor: hhs.10.p32
  at: 10
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 181
  era: 光和
  era_year: 4
- id: hhs.10.p32.a1
  anchor: hhs.10.p32
  at: 47
  length: 0
  type: lixian
  text: 《左傳》曰：「邑姜方娠。」杜預注曰：「懷胎爲娠。」音之刃反，一音身。
- id: hhs.10.p32.t3
  anchor: hhs.10.p32
  at: 71
  length: 2
  type: temporal
  text: 四年
  kind: relative
  resolution: bare_year
  year_ad: 181
  era: 光和
  era_year: 4
- id: hhs.10.p33.a1
  anchor: hhs.10.p33
  at: 36
  length: 0
  type: lixian
  text: 會計謂揔會其數而筭。
- id: hhs.10.p34.t1
  anchor: hhs.10.p34
  at: 0
  length: 4
  type: temporal
  text: 中平六年
  kind: absolute
  resolution: absolute
  year_ad: 189
  era: 中平
  era_year: 6
- id: hhs.10.p34.a1
  anchor: hhs.10.p34
  at: 168
  length: 0
  type: lixian
  text: 華延儁《洛陽記》曰：「城內有奉常亭。」
- id: hhs.10.p34.a2
  anchor: hhs.10.p34
  at: 180
  length: 0
  type: lixian
  text: 有凶事素服而朝，謂之白衣會。《左傳》曰：「不書葬，不成喪。」
- id: hhs.10.p36.t1
  anchor: hhs.10.p36
  at: 0
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 190
- id: hhs.10.p36.a1
  anchor: hhs.10.p36
  at: 143
  length: 0
  type: lixian
  text: 抗，舉也。
- id: hhs.10.p36.a2
  anchor: hhs.10.p36
  at: 154
  length: 0
  type: lixian
  text: 《史記》：周烈王崩，周人謂齊威王曰「天崩地坼」也。
- id: hhs.10.p37.a1
  anchor: hhs.10.p37
  at: 63
  length: 0
  type: lixian
  text: 不自名少帝之姬也。袁宏《紀》曰：「爲傕所略，不敢自言。」
- id: hhs.10.p37.a2
  anchor: hhs.10.p37
  at: 70
  length: 0
  type: lixian
  text: 《魏志》曰：「詡字文和，武威姑臧人。少時漢陽閻忠見而異之，曰：『詡有良、平之才。』」
- id: hhs.10.p38.t1
  anchor: hhs.10.p38
  at: 0
  length: 6
  type: temporal
  text: 初平元年二月
  kind: absolute
  resolution: absolute
  year_ad: 190
  era: 初平
  era_year: 1
  month_chinese: 二月
  month_ordinal: 2
- id: hhs.10.p38.a1
  anchor: hhs.10.p38
  at: 22
  length: 0
  type: lixian
  text: 趙忠先有成壙，因而葬焉。
- id: hhs.10.p40.t1
  anchor: hhs.10.p40
  at: 0
  length: 4
  type: temporal
  text: 興平元年
  kind: absolute
  resolution: absolute
  year_ad: 194
  era: 興平
  era_year: 1
- id: hhs.10.p40.a1
  anchor: hhs.10.p40
  at: 63
  length: 0
  type: lixian
  text: 《詩》云：「心如結兮。」
- id: hhs.10.p40.a2
  anchor: hhs.10.p40
  at: 110
  length: 0
  type: lixian
  text: 敬，章帝陵。恭，安帝陵。
- id: hhs.10.p41.a1
  anchor: hhs.10.p41
  at: 13
  length: 0
  type: lixian
  text: 凡言都亭者，並城內亭也。漢法，大縣侯位視三公，小縣侯位視上卿，鄉侯、亭侯視中二千石也。
- id: hhs.10.p42.a1
  anchor: hhs.10.p42
  at: 14
  length: 0
  type: lixian
  text: 東武，今密州諸城縣。
- id: hhs.10.p42.a2
  anchor: hhs.10.p42
  at: 49
  length: 0
  type: lixian
  text: 陽安，縣，屬汝南郡，故城在今豫州朗山縣東北。
- id: hhs.10.p43.t1
  anchor: hhs.10.p43
  at: 0
  length: 4
  type: temporal
  text: 初平元年
  kind: absolute
  resolution: absolute
  year_ad: 190
  era: 初平
  era_year: 1
- id: hhs.10.p43.t2
  anchor: hhs.10.p43
  at: 22
  length: 4
  type: temporal
  text: 興平二年
  kind: absolute
  resolution: absolute
  year_ad: 195
  era: 興平
  era_year: 2
- id: hhs.10.p43.a1
  anchor: hhs.10.p43
  at: 66
  length: 0
  type: lixian
  text: 度所在今陝州陝縣北。水經曰銅翁仲所沒處，是獻帝東遷潛度所。
- id: hhs.10.p43.a2
  anchor: hhs.10.p43
  at: 74
  length: 0
  type: lixian
  text: 《周禮》曰：「王后率六宮之人。」鄭玄注曰：「六宮之人，夫人以下，分居后之六宮者。」
- id: hhs.10.p43.a3
  anchor: hhs.10.p43
  at: 105
  length: 0
  type: lixian
  text: 濺音子見反。
- id: hhs.10.p43.t3
  anchor: hhs.10.p43
  at: 122
  length: 4
  type: temporal
  text: 建安元年
  kind: absolute
  resolution: absolute
  year_ad: 196
  era: 建安
  era_year: 1
- id: hhs.10.p43.t4
  anchor: hhs.10.p43
  at: 169
  length: 3
  type: temporal
  text: 十四年
  kind: relative
  resolution: bare_year
  year_ad: 209
  era: 建安
  era_year: 14
- id: hhs.10.p44.a1
  anchor: hhs.10.p44
  at: 130
  length: 0
  type: lixian
  text: 浹，徹也，音子協反。
- id: hhs.10.p44.a2
  anchor: hhs.10.p44
  at: 162
  length: 0
  type: lixian
  text: 《說文》曰：「𡜟，孕也。」音仁蔭反。
- id: hhs.10.p44.t1
  anchor: hhs.10.p44
  at: 201
  length: 3
  type: temporal
  text: 十九年
  kind: relative
  resolution: bare_year
  year_ad: 214
  era: 建安
  era_year: 19
- id: hhs.10.p44.a3
  anchor: hhs.10.p44
  at: 246
  length: 0
  type: lixian
  text: 《漢官儀》曰：「皇后稱椒房，取其蕃實之義也。」《詩》云：「椒聊之實，蕃衍盈升。」
- id: hhs.10.p44.a4
  anchor: hhs.10.p44
  at: 261
  length: 0
  type: lixian
  text: 大任，文王母。大姒，武王母。徽，美也。《詩》云：「大姒嗣徽音。」
- id: hhs.10.p44.a5
  anchor: hhs.10.p44
  at: 270
  length: 0
  type: lixian
  text: 《左傳》曰：「人受天地之中而生，謂之命。能者養之以福，不能者敗以取禍。」
- id: hhs.10.p44.a6
  anchor: hhs.10.p44
  at: 312
  length: 0
  type: lixian
  text: 蔡邕《獨斷》曰：「皇后赤綬玉璽。」《續漢志》曰：「乘輿黃赤綬，四綵黃赤縹紺，淳黃圭，綬長二丈九尺九寸，五百首。太皇太后、皇太后，其綬皆與乘輿同。」
- id: hhs.10.p44.a7
  anchor: hhs.10.p44
  at: 355
  length: 0
  type: lixian
  text: 《魏志》曰：「華歆字子魚，平原高唐人。代荀彧爲尚書令。慮字鴻預，山陽高平人。」
- id: hhs.10.p44.t2
  anchor: hhs.10.p44
  at: 461
  length: 3
  type: temporal
  text: 二十年
  kind: relative
  resolution: bare_year
  year_ad: 215
  era: 建安
  era_year: 20
- id: hhs.10.p45.a1
  anchor: hhs.10.p45
  at: 8
  length: 0
  type: lixian
  text: 《謚法》曰：「布德執義曰穆。」
- id: hhs.10.p45.t1
  anchor: hhs.10.p45
  at: 17
  length: 5
  type: temporal
  text: 建安十八年
  kind: absolute
  resolution: absolute
  year_ad: 213
  era: 建安
  era_year: 18
- id: hhs.10.p45.a2
  anchor: hhs.10.p45
  at: 53
  length: 0
  type: lixian
  text: 留住於國，以待年長。
- id: hhs.10.p45.t2
  anchor: hhs.10.p45
  at: 53
  length: 3
  type: temporal
  text: 十九年
  kind: relative
  resolution: bare_year
  year_ad: 214
  era: 建安
  era_year: 19
- id: hhs.10.p45.t3
  anchor: hhs.10.p45
  at: 70
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 215
  era: 建安
  era_year: 20
- id: hhs.10.p45.a3
  anchor: hhs.10.p45
  at: 117
  length: 0
  type: lixian
  text: 抵，擲也。軒，闌板也。
- id: hhs.10.p45.t4
  anchor: hhs.10.p45
  at: 142
  length: 2
  type: temporal
  text: 七年
  kind: relative
  resolution: bare_year
  year_ad: 202
  era: 建安
  era_year: 7
- id: hhs.10.p45.t5
  anchor: hhs.10.p45
  at: 169
  length: 2
  type: temporal
  text: 元年
  kind: relative
  resolution: bare_year
  year_ad: 196
  era: 建安
  era_year: 1
- id: hhs.10.p46.a1
  anchor: hhs.10.p46
  at: 34
  length: 0
  type: lixian
  text: 上官，昭帝后也。
- id: hhs.10.p46.a2
  anchor: hhs.10.p46
  at: 126
  length: 0
  type: lixian
  text: 蔡邕集謚議曰：「漢世母氏無謚，至于明帝始建光烈之稱，是後轉因帝號加之以德，上下優劣，混而爲一，違禮『大行受大名，小行受小名』之制。《謚法》『有功安人曰熹』。帝后一體，禮亦宜同。大行皇太后謚宜爲和熹。」
- id: hhs.10.p47.a1
  anchor: hhs.10.p47
  at: 13
  length: 0
  type: lixian
  text: 《易》曰：「坤厚載物。」又曰：「女正位乎內，男正位乎外。」
- id: hhs.10.p47.a2
  anchor: hhs.10.p47
  at: 18
  length: 0
  type: lixian
  text: 逑，匹也。《詩》云：「窈窕淑女，君子好逑。」言后妃有關雎之德，爲君子好匹。
- id: hhs.10.p47.a3
  anchor: hhs.10.p47
  at: 23
  length: 0
  type: lixian
  text: 兌下震上，歸妹卦也。婦人謂嫁曰歸，妹爲少女之稱。兌爲少陰，震爲長陽，少陰而承長陽，恱以動之，歸妹之象也。以六五與九二相應，五爲王侯，故易言「帝乙歸妹」。
- id: hhs.10.p47.a4
  anchor: hhs.10.p47
  at: 33
  length: 0
  type: lixian
  text: 祁祁，衆多也。孋亦儷也。觀，示也。言諸后皆示其貞淑，配皇爲儷。案字書無「孋」字，相傳音麗，蕭該音離。
- id: hhs.10.p47.a5
  anchor: hhs.10.p47
  at: 53
  length: 0
  type: lixian
  text: 班固《西都賦》曰：「後宮則掖庭椒房，后妃之室。蘭林蕙草，披香發越。」蘭林，殿名，故言蘭閨。椒屋即椒房也。
- id: hhs.10.p47.a6
  anchor: hhs.10.p47
  at: 63
  length: 0
  type: lixian
  text: 德升謂馬、鄧等也。幸進謂閻、何之類也。
- id: hhs.10.p47.a7
  anchor: hhs.10.p47
  at: 73
  length: 0
  type: lixian
  text: 《公羊傳》曰「河海潤千里」也。
- id: hhs.10.p47.a8
  anchor: hhs.10.p47
  at: 93
  length: 0
  type: lixian
  text: 易屯卦象曰：「六二之難，乘剛也。」又坤卦曰：「牝馬地類，行地無疆。」王弼注云：「地之所以得無疆者，以卑順行之故也。」
- id: hhs.10.p48.a1
  anchor: hhs.10.p48
  at: 17
  length: 0
  type: lixian
  text: 漢法，大縣侯視三公。
- id: hhs.10.p48.a2
  anchor: hhs.10.p48
  at: 34
  length: 0
  type: lixian
  text: 蔡邕曰：「帝女曰公主，姊妹曰長公主。」建武十五年，封舞陽公主爲長公主，即是帝女尊崇亦爲長，非惟姊妹也。輿服志曰「長公主赤𦋺軿車，與諸侯同綬」也。
- id: hhs.10.p48.a3
  anchor: hhs.10.p48
  at: 53
  length: 0
  type: lixian
  text: 鄉、亭侯視中二千石。
- id: hhs.10.p48.a4
  anchor: hhs.10.p48
  at: 75
  length: 0
  type: lixian
  text: 《東平王傳》曰：「封蒼女五人爲縣公主。」孝王女，傳不見其數。
- id: hhs.10.p48.a5
  anchor: hhs.10.p48
  at: 94
  length: 0
  type: lixian
  text: 案：鄧禹玄孫少府襃尚舞陰長公主，耿弇曾孫侍中良尚濮陽長公主，岑彭玄孫魏郡守熙尚涅陽長公主，來歙玄孫虎賁中郎將定尚平氏長公主，並安帝妹也。長社、益陽公主，桓帝妹也。解見上。
- id: hhs.10.p48.a6
  anchor: hhs.10.p48
  at: 113
  length: 0
  type: lixian
  text: 溤定，獲嘉公主子，襲封獲嘉侯；馮奮，平陽公主子，襲封平陽侯。此其類也。
- id: hhs.10.p48.a7
  anchor: hhs.10.p48
  at: 142
  length: 0
  type: lixian
  text: 沈約《謝儼傳》曰：「范曄所撰十志，一皆託儼。搜撰垂畢，遇曄敗，悉蠟以覆車。宋文帝令丹陽尹徐湛之就儼尋求，巳不復得，一代以爲恨。其志今闕。」《續漢志》曰：「諸公主家令一人，六百石；丞一人，三百石；其餘屬吏，增減無常。」《漢官儀》曰「長公主傅一人，私府長一人，食官一人，永巷長一人，家令一人，秩皆六百石，各有員吏。而鄉公主傅一人，秩六百石，僕一人，六百石，家丞一人，三百石」也。
- id: hhs.10.p49.t1
  anchor: hhs.10.p49
  at: 5
  length: 5
  type: temporal
  text: 建武十五年
  kind: absolute
  resolution: absolute
  year_ad: 39
  era: 建武
  era_year: 15
- id: hhs.10.p49.a1
  anchor: hhs.10.p49
  at: 27
  length: 0
  type: lixian
  text: 舞陽，縣，屬潁川郡。松，梁統之子。其傳云：「尚光武女舞陰公主。」又鄧訓傳：「舞陰公主子梁扈，有罪，訓與交通。」此云舞陽，誤也。
- id: hhs.10.p50.t1
  anchor: hhs.10.p50
  at: 5
  length: 3
  type: temporal
  text: 十五年
  kind: relative
  resolution: bare_year
  year_ad: 39
  era: 建武
  era_year: 15
- id: hhs.10.p50.a1
  anchor: hhs.10.p50
  at: 24
  length: 0
  type: lixian
  text: 涅陽，屬南陽郡。顯親，縣，屬漢陽郡。固，竇融子。
- id: hhs.10.p51.t1
  anchor: hhs.10.p51
  at: 5
  length: 3
  type: temporal
  text: 十五年
  kind: relative
  resolution: bare_year
  year_ad: 39
  era: 建武
  era_year: 15
- id: hhs.10.p52.t1
  anchor: hhs.10.p52
  at: 5
  length: 3
  type: temporal
  text: 十七年
  kind: relative
  resolution: bare_year
  year_ad: 41
  era: 建武
  era_year: 17
- id: hhs.10.p52.a1
  anchor: hhs.10.p52
  at: 25
  length: 0
  type: lixian
  text: 璜，郭況子也。
- id: hhs.10.p53.a1
  anchor: hhs.10.p53
  at: 4
  length: 0
  type: lixian
  text: 「綬」一作「緩」。
- id: hhs.10.p53.t1
