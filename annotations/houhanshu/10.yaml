  resolution: bare_year
  year_ad: 45
  era: 建武
  era_year: 21
- id: hhs.10.p53.a2
  anchor: hhs.10.p53
  at: 30
  length: 0
  type: lixian
  text: 酈，縣，屬南陽郡，音擲亦反。新陽，縣，屬汝南郡。豐，陰就子。
- id: hhs.10.p54.t1
  anchor: hhs.10.p54
  at: 4
  length: 4
  type: temporal
  text: 永平二年
  kind: absolute
  resolution: absolute
  year_ad: 59
  era: 永平
  era_year: 2
- id: hhs.10.p54.a1
  anchor: hhs.10.p54
  at: 26
  length: 0
  type: lixian
  text: 獲嘉，縣，屬河內郡。楊邑，縣，屬太原郡。柱，馮魴子。
- id: hhs.10.p55.t1
  anchor: hhs.10.p55
  at: 4
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
