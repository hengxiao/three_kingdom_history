  resolution: bare_year
  year_ad: 59
  era: 永平
  era_year: 2
- id: hhs.10.p57.a1
  anchor: hhs.10.p57
  at: 12
  length: 0
  type: lixian
  text: 平氏，縣，屬南陽郡。旣不言所適，不顯始終，蓋史闕之也。它皆倣此。
- id: hhs.10.p58.t1
