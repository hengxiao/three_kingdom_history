  era_year: 4
- id: hhs.10.p21.t2
  anchor: hhs.10.p21
  at: 147
  length: 2
  type: temporal
  text: 四年
  kind: relative
  resolution: bare_year
  year_ad: 161
  era: 延熹
  era_year: 4
- id: hhs.10.p21.a2
  anchor: hhs.10.p21
  at: 216
  length: 0
  type: lixian
  text: 巨，大也。大萬謂萬萬也。
- id: hhs.10.p22.t1
  anchor: hhs.10.p22
  at: 46
  length: 2
  type: temporal
  text: 八年
  kind: relative
  resolution: bare_year
  year_ad: 165
  era: 延熹
  era_year: 8
- id: hhs.10.p22.a1
  anchor: hhs.10.p22
  at: 61
  length: 0
  type: lixian
  text: 《漢官儀》曰：「暴室在掖庭內，丞一人，主宮中婦人疾病者。其皇后、貴人有罪，亦就此室也。」
- id: hhs.10.p22.t2
  anchor: hhs.10.p22
  at: 62
  length: 2
  type: temporal
  text: 七年
  kind: relative
  resolution: bare_year
  year_ad: 164
  era: 延熹
  era_year: 7
- id: hhs.10.p23.t1
  anchor: hhs.10.p23
  at: 24
  length: 4
  type: temporal
  text: 延熹八年
  kind: absolute
  resolution: absolute
  year_ad: 165
  era: 延熹
  era_year: 8
- id: hhs.10.p23.t2
  anchor: hhs.10.p23
  at: 68
  length: 4
  type: temporal
  text: 永康元年
  kind: absolute
  resolution: absolute
  year_ad: 167
  era: 永康
  era_year: 1
- id: hhs.10.p25.t1
  anchor: hhs.10.p25
  at: 16
  length: 6
  type: temporal
