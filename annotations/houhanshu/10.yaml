  at: 8
  length: 0
  type: lixian
  text: 《謚法》曰：「謀慮不愆曰思。」
- id: hhs.10.p2.a2
  anchor: hhs.10.p2
  at: 68
  length: 0
  type: lixian
  text: 《漢官儀》曰「比二千石，掌宿衞兵，屬北軍中候」也。
- id: hhs.10.p3.t1
  anchor: hhs.10.p3
  at: 5
  length: 4
