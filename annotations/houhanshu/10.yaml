  text: 平陽，縣，屬河東郡。
- id: hhs.10.p55.a2
  anchor: hhs.10.p55
  at: 19
  length: 0
  type: lixian
  text: 馮勤子也。
- id: hhs.10.p56.a1
  anchor: hhs.10.p56
  at: 4
  length: 0
  type: lixian
  text: 「迎」或作「延」。
- id: hhs.10.p56.t1
  anchor: hhs.10.p56
  at: 4
  length: 2
  type: temporal
