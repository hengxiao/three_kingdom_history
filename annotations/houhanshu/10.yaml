  era_year: 3
- id: hhs.10.p58.a1
  anchor: hhs.10.p58
  at: 12
  length: 0
  type: lixian
  text: 沁水，縣，屬河內郡。
- id: hhs.10.p58.a2
  anchor: hhs.10.p58
  at: 19
  length: 0
  type: lixian
  text: 乾，鄧震之子，禹之孫。
- id: hhs.10.p59.t1
