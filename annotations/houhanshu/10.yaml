  resolution: bare_year
  year_ad: 60
  era: 永平
  era_year: 3
- id: hhs.10.p56.a2
  anchor: hhs.10.p56
  at: 12
  length: 0
  type: lixian
  text: 隆慮，縣，屬河內郡。
- id: hhs.10.p56.a3
  anchor: hhs.10.p56
  at: 19
  length: 0
  type: lixian
  text: 牟平，縣，屬東萊郡。襲，耿弇弟舒之子。
- id: hhs.10.p57.t1
