  at: 108
  length: 4
  type: temporal
  text: 延熹三年
  kind: absolute
  resolution: absolute
  year_ad: 160
  era: 延熹
  era_year: 3
- id: hhs.10.p21.a1
  anchor: hhs.10.p21
  at: 89
  length: 0
  type: lixian
  text: 采，擇也，以因采擇而立名。
- id: hhs.10.p21.t1
  anchor: hhs.10.p21
  at: 89
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 161
