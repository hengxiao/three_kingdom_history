  era_year: 2
- id: hhs.10.p3.a1
  anchor: hhs.10.p3
  at: 57
  length: 0
  type: lixian
  text: 鴆，毒鳥也。食蝮。以其羽畫酒中，飲之立死。
- id: hhs.10.p3.t3
  anchor: hhs.10.p3
  at: 57
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
  year_ad: 116
  era: 元初
  era_year: 3
- id: hhs.10.p3.a2
  anchor: hhs.10.p3
  at: 78
  length: 0
  type: lixian
  text: 北宜春，縣，屬汝南郡。以豫章有宜春，故此加北。故城在今豫州汝陽縣西南也。
- id: hhs.10.p3.t4
  anchor: hhs.10.p3
  at: 84
  length: 2
  type: temporal
  text: 四年
  kind: relative
  resolution: bare_year
  year_ad: 117
  era: 元初
  era_year: 4
- id: hhs.10.p4.t1
  anchor: hhs.10.p4
  at: 0
  length: 4
  type: temporal
  text: 建光元年
  kind: absolute
  resolution: absolute
  year_ad: 121
  era: 建光
  era_year: 1
- id: hhs.10.p4.t2
  anchor: hhs.10.p4
  at: 33
  length: 4
  type: temporal
  text: 延光元年
  kind: absolute
  resolution: absolute
  year_ad: 122
  era: 延光
  era_year: 1
- id: hhs.10.p4.a1
  anchor: hhs.10.p4
  at: 46
  length: 0
  type: lixian
  text: 長社，縣，屬潁川郡。《前書音義》曰：「其社中樹暴長，故名長社。」今許州縣。
- id: hhs.10.p4.a2
  anchor: hhs.10.p4
  at: 65
  length: 0
  type: lixian
  text: 《續漢志》曰：「婦人封君，儀比公主，油犍軿車，帶綬以采組爲緄帶，各如其綬色，黃金辟邪加其首爲帶。」
- id: hhs.10.p4.a3
  anchor: hhs.10.p4
  at: 75
  length: 0
  type: lixian
  text: 《大戴禮》曰：「男八歲而齔，女七歲而齔。」齔，毀齒也，音初刃反。
- id: hhs.10.p5.t1
  anchor: hhs.10.p5
  at: 0
  length: 2
  type: temporal
  text: 四年
  kind: relative
  resolution: bare_year
  year_ad: 125
  era: 延光
  era_year: 4
- id: hhs.10.p5.a1
  anchor: hhs.10.p5
  at: 42
  length: 0
  type: lixian
  text: 晏，晚也。臣下不敢斥言帝崩，猶言晚駕而出。
- id: hhs.10.p5.a2
  anchor: hhs.10.p5
  at: 122
  length: 0
  type: lixian
  text: 蔡邕《獨斷》曰：「少帝即位，太后即代攝政，臨前殿，朝羣臣。太后東面，少帝西面。羣臣奏事上書，皆爲兩通，一詣后，一詣少帝。」
- id: hhs.10.p6.a1
  anchor: hhs.10.p6
  at: 32
  length: 0
  type: lixian
  text: 惠王名壽，章帝子也。
- id: hhs.10.p6.a2
  anchor: hhs.10.p6
  at: 44
  length: 0
  type: lixian
  text: 耿弇之弟舒之孫。
- id: hhs.10.p6.a3
  anchor: hhs.10.p6
  at: 93
  length: 0
  type: lixian
  text: 《善文》曰：「惲字伯周。宓字仲周，篤字季周。」
- id: hhs.10.p6.a4
  anchor: hhs.10.p6
  at: 161
  length: 0
  type: lixian
  text: 比景，縣名，屬日南郡。《前書音義》曰：「日中於頭上，景在己下，故名之。」
- id: hhs.10.p7.t1
  anchor: hhs.10.p7
  at: 152
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 126
- id: hhs.10.p8.a1
  anchor: hhs.10.p8
  at: 73
  length: 0
  type: lixian
  text: 在恭陵之北，因以爲名。《漢官儀》曰：「置陵園令、食監各一人，秩皆六百石。」金匱，緘之以金。
- id: hhs.10.p9.a1
  anchor: hhs.10.p9
  at: 8
  length: 0
  type: lixian
  text: 《謚法》曰：「執德尊業曰烈。」聲類曰：「妠，娶也，音納。」
- id: hhs.10.p9.a2
  anchor: hhs.10.p9
  at: 57
  length: 0
  type: lixian
  text: 韓嬰所傳詩也。
- id: hhs.10.p9.a3
  anchor: hhs.10.p9
  at: 78
  length: 0
  type: lixian
  text: 劉向撰《列女傳》八篇，圖畫其象。
- id: hhs.10.p9.a4
  anchor: hhs.10.p9
  at: 107
  length: 0
  type: lixian
  text: 商曾祖統，更始二年補中郎將、酒泉太守，使安集涼州。時西河擾亂，衆議以統素有威信，乃推統與竇融共完全五郡。
- id: hhs.10.p10.t1
  anchor: hhs.10.p10
  at: 0
  length: 4
  type: temporal
  text: 永建三年
  kind: absolute
  resolution: absolute
  year_ad: 128
  era: 永建
  era_year: 3
- id: hhs.10.p10.a1
  anchor: hhs.10.p10
  at: 69
  length: 0
  type: lixian
  text: 《易》坤卦六五爻，變而之比，比九五，象曰：「顯比之吉，位正中也。」九五居得其位，下應於上，故吉。
- id: hhs.10.p10.a2
  anchor: hhs.10.p10
  at: 116
  length: 0
  type: lixian
  text: 《詩》國風序曰：「言后妃若螽斯不妒忌，則子孫衆多也。」《詩》大雅曰「太姒嗣徽音，則百斯男」也。
- id: hhs.10.p10.a3
  anchor: hhs.10.p10
  at: 133
  length: 0
  type: lixian
  text: 《易》曰：「雲行雨施，品物流形。」剝卦曰：「貫魚，以宮人寵，無不利。」剝，坤下艮上，五陰而一陽，衆陰在下，駢頭相次，似貫魚也。
- id: hhs.10.p11.t1
  anchor: hhs.10.p11
  at: 0
  length: 4
  type: temporal
  text: 陽嘉元年
  kind: absolute
  resolution: absolute
  year_ad: 132
  era: 陽嘉
  era_year: 1
- id: hhs.10.p11.a1
  anchor: hhs.10.p11
  at: 24
  length: 0
  type: lixian
  text: 商祖姑，章帝貴人，生和帝也。
- id: hhs.10.p11.a2
  anchor: hhs.10.p11
  at: 36
  length: 0
  type: lixian
  text: 《公羊傳》曰，天子娶於紀。紀本子爵也，先襃爲侯，言王者不娶於小國也。
- id: hhs.10.p11.a3
  anchor: hhs.10.p11
  at: 50
  length: 0
  type: lixian
  text: 正其內位，居陰德之極也。《易》曰「女正位乎內」也。
- id: hhs.10.p11.a4
  anchor: hhs.10.p11
  at: 66
  length: 0
  type: lixian
  text: 壽安是德陽宮內殿名。
- id: hhs.10.p11.a5
  anchor: hhs.10.p11
  at: 98
  length: 0
  type: lixian
  text: 讁，責也。《禮記》云：「陽事不得，讁見於天，日爲之食。陰事不得，讁見於天，月爲之食。」
- id: hhs.10.p12.t1
  anchor: hhs.10.p12
  at: 0
  length: 4
  type: temporal
  text: 建康元年
  kind: absolute
  resolution: absolute
  year_ad: 144
  era: 建康
  era_year: 1
- id: hhs.10.p13.a1
  anchor: hhs.10.p13
  at: 72
  length: 0
  type: lixian
  text: 貪財曰叨。慝，惡也。
- id: hhs.10.p14.t1
  anchor: hhs.10.p14
  at: 0
  length: 4
  type: temporal
  text: 和平元年
  kind: absolute
  resolution: absolute
  year_ad: 150
  era: 和平
  era_year: 1
- id: hhs.10.p14.a1
  anchor: hhs.10.p14
  at: 69
  length: 0
  type: lixian
  text: 寖，漸也。
- id: hhs.10.p15.a1
  anchor: hhs.10.p15
  at: 17
  length: 0
  type: lixian
  text: 《續漢志》曰：「美人父詩爲郎中，詩父衡屯騎校尉。」
- id: hhs.10.p17.t1
  anchor: hhs.10.p17
  at: 0
  length: 4
  type: temporal
  text: 熹平四年
  kind: absolute
  resolution: absolute
  year_ad: 175
  era: 熹平
  era_year: 4
- id: hhs.10.p17.a1
  anchor: hhs.10.p17
  at: 11
  length: 0
  type: lixian
  text: 《續漢志》曰：「小黃門，六百石，宦者，無員，掌侍左右，受尚書事。上在內宮，關通中外，及中宮以下衆事，諸公主及王大妃等疾苦，則使問之。」
- id: hhs.10.p17.a2
  anchor: hhs.10.p17
  at: 18
  length: 0
  type: lixian
  text: 風俗通曰：「卑氏，鄭大夫卑諶之後，漢有卑躬，爲北平太守。」
- id: hhs.10.p17.a3
  anchor: hhs.10.p17
  at: 31
  length: 0
  type: lixian
  text: 《公羊傳》曰：「桓公幼而貴，隱公長而卑。桓何以貴？母貴也。母貴則子何以貴？子以母貴，母以子貴。」
- id: hhs.10.p17.a4
  anchor: hhs.10.p17
  at: 144
  length: 0
  type: lixian
  text: 孝王名鴻，章帝子千乘貞王伉之孫。鴻生質帝，帝立，徙勃海焉。
- id: hhs.10.p17.a5
  anchor: hhs.10.p17
  at: 171
  length: 0
  type: lixian
  text: 懷陵，沖帝陵。靜陵，質帝陵。
- id: hhs.10.p18.a1
  anchor: hhs.10.p18
  at: 8
  length: 0
  type: lixian
  text: 匽音偃。
- id: hhs.10.p18.a2
  anchor: hhs.10.p18
  at: 16
  length: 0
  type: lixian
  text: 蠡吾侯翼，河閒王開子，和帝孫。
- id: hhs.10.p18.t1
  anchor: hhs.10.p18
  at: 25
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 176
  era: 熹平
  era_year: 5
- id: hhs.10.p18.t2
  anchor: hhs.10.p18
  at: 49
  length: 4
  type: temporal
  text: 和平元年
  kind: absolute
  resolution: absolute
  year_ad: 150
  era: 和平
  era_year: 1
- id: hhs.10.p18.a3
  anchor: hhs.10.p18
  at: 114
  length: 0
  type: lixian
  text: 《漢官儀》曰：「帝祖母稱長信宮，帝母稱長樂宮，故有長信少府、長樂少府及職吏，皆宦者爲之。」
- id: hhs.10.p18.t3
  anchor: hhs.10.p18
  at: 144
  length: 4
  type: temporal
  text: 元嘉二年
  kind: absolute
  resolution: absolute
  year_ad: 152
  era: 元嘉
  era_year: 2
- id: hhs.10.p18.a4
  anchor: hhs.10.p18
  at: 161
  length: 0
  type: lixian
  text: 石，蠡吾侯翼子，桓帝兄。
- id: hhs.10.p18.a5
  anchor: hhs.10.p18
  at: 188
  length: 0
  type: lixian
  text: 東園，署名，屬少府，掌爲棺器。梓木爲棺，以漆畫之。稱壽器者，欲其乆長也，猶如壽堂、壽宮、壽陵之類也。《漢舊儀》曰：「梓棺長二丈，崇廣四尺。」玉匣者，腰已下爲匣，至足亦縫，以黃金爲鏤。飯含者，以珠玉實口。
- id: hhs.10.p18.a6
  anchor: hhs.10.p18
  at: 207
  length: 0
  type: lixian
  text: 《公羊傳》曰：「貨財曰賻。」
- id: hhs.10.p18.a7
  anchor: hhs.10.p18
  at: 231
  length: 0
  type: lixian
  text: 《漢官儀》曰：「天子車駕次第謂之鹵簿。有大駕、法駕、小駕。大駕公卿奉引，大將軍參乘，太僕御，屬車八十一乘，備千乘萬騎，侍御史在左駕馬，詢問不法者。」今儀比車駕，故以侍御史監護焉。
- id: hhs.10.p18.a8
  anchor: hhs.10.p18
  at: 247
  length: 0
  type: lixian
  text: 悝音恢。
- id: hhs.10.p18.a9
  anchor: hhs.10.p18
  at: 257
  length: 0
  type: lixian
  text: 長社公主，桓帝姊，耿弇弟霸玄孫援尚焉。益陽公主，桓帝妹，侍中寇榮從兄子尚焉。
- id: hhs.10.p19.a1
  anchor: hhs.10.p19
  at: 11
  length: 0
  type: lixian
  text: 《謚法》曰：「溫和聖善曰懿，聦明叡知曰獻。」
- id: hhs.10.p19.a2
  anchor: hhs.10.p19
  at: 43
  length: 0
  type: lixian
  text: 嘉禮，婚禮。
- id: hhs.10.p19.t1
  anchor: hhs.10.p19
  at: 53
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 153
- id: hhs.10.p19.a3
  anchor: hhs.10.p19
  at: 80
  length: 0
  type: lixian
  text: 《公羊傳》曰：「祭公來逆王后于紀。」傳曰：「祭公者何？天子之三公。其稱王后何？王者無外，其辭成矣。」
- id: hhs.10.p19.a4
  anchor: hhs.10.p19
  at: 93
  length: 0
  type: lixian
  text: 膺，當也。紹，嗣也。聖善謂母也，言娶妻當嗣親也。《詩》云：「母氏聖善。」
- id: hhs.10.p19.a5
  anchor: hhs.10.p19
  at: 103
  length: 0
  type: lixian
  text: 謂太后先有令許結親也。詩云「天監在下，有命旣集」也。
- id: hhs.10.p19.a6
  anchor: hhs.10.p19
  at: 113
  length: 0
  type: lixian
  text: 徵，成也。納幣以成婚。
- id: hhs.10.p19.a7
  anchor: hhs.10.p19
  at: 162
  length: 0
  type: lixian
  text: 《漢書舊儀》：「娉皇后，黃金萬斤。」呂后爲惠帝娶魯元公主女，故特優其禮也。《儀禮》曰：「納采用鴈。」鄭玄注曰：「納其采擇之禮。用鴈，取順陰陽往來也。」《周禮》：「王者穀圭以聘女。」鄭玄注云：「士大夫已上，乃以玄纁束帛，天子加以穀圭，諸侯加以大璋。」然禮稱以圭，此云用璧，形制雖異，爲玉同也。乘馬，四匹馬也。雜記曰：「納幣一束，束五兩，兩五尋。」然則每端二丈也。
- id: hhs.10.p19.t2
  anchor: hhs.10.p19
  at: 162
  length: 6
  type: temporal
