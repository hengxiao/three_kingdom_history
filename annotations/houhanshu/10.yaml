  era_year: 17
- id: hhs.10.p60.a1
  anchor: hhs.10.p60
  at: 23
  length: 0
  type: lixian
  text: 「軮」，志作「軑」，音忕。師古曰：又音徒系反。軮，縣，屬江夏郡。度，王符子，霸之孫。
- id: hhs.10.p61.t1
