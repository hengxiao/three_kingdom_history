- id: hhs.60.p2.a1
  anchor: hhs.60.p2
  at: 13
  length: 0
  type: lixian
  text: 融集云：「茂陵成歡裡人也。」
- id: hhs.60.p2.a2
  anchor: hhs.60.p2
  at: 21
  length: 0
  type: lixian
  text: 嚴，援兄余之子。
- id: hhs.60.p3.a1
  anchor: hhs.60.p3
  at: 27
  length: 0
  type: lixian
  text: 三輔決錄注曰：「恂字季直，好學善屬文，隱於南山之陰。」
- id: hhs.60.p4.a1
  anchor: hhs.60.p4
  at: 67
  length: 0
  type: lixian
  text: 左傳曰，叔向云：「道殣相望。」杜注云「餓死為殣」也。音覲。
- id: hhs.60.p4.a2
  anchor: hhs.60.p4
  at: 111
  length: 0
  type: lixian
  text: 莊子曰。言不以名害其生者。
- id: hhs.60.p5.a1
  anchor: hhs.60.p5
  at: 10
  length: 0
  type: lixian
  text: 謝承*[書]*及續漢書並雲為校書郎，又拜郎中也。
- id: hhs.60.p6.a1
  anchor: hhs.60.p6
  at: 69
  length: 0
  type: lixian
  text: 五才，金、木、水、火、土也。左傳曰，宋子罕曰「天生五材，人並用之，廢一不可，誰能去兵」也。
- id: hhs.60.p8.a1
  anchor: hhs.60.p8
  at: 26
  length: 0
  type: lixian
  text: 界猶限也。
- id: hhs.60.p8.a2
  anchor: hhs.60.p8
  at: 50
  length: 0
  type: lixian
  text: 詩國風序曰：「蟋蟀，刺晉僖公也。儉不中禮。」其詩曰：「無已太康，職思其居。」毛萇注云：「已，甚也。」鄭箋云：「君雖當自樂，亦無甚太樂，欲其用禮以為節也。」又序曰：「山有樞，刺晉昭公也。有才不能用。」其詩曰：「子有車馬，弗馳弗驅。宛其死矣，佗人是愉。」言僖公以太康貽戒，昭公以不能馳驅被譏，言文武之道須折衷也。樞音謳。
- id: hhs.60.p9.a1
  anchor: hhs.60.p9
  at: 36
  length: 0
  type: lixian
  text: 左傳曰，吳季札聘於魯，魯為之歌頌。季札曰：「樂而不荒。」為之歌衛。曰：「憂而不困。」
- id: hhs.60.p10.a1
  anchor: hhs.60.p10
  at: 31
  length: 0
  type: lixian
  text: 韓詩外傳曰：「人有五藏六府。何謂五藏？精藏於腎，神藏於心，魂藏於肝，魄藏於肺，志藏於脾，此之謂五藏也。何謂六府？喉咽者，量腸之府也；胃者，五穀之府也；大腸者，轉輸之府也；小腸者，受成之府也；膽者，積精之府也；旁光者，湊液之府也。」詩曰：「天生蒸民，有物有則。」
- id: hhs.60.p10.a2
  anchor: hhs.60.p10
  at: 198
  length: 0
  type: lixian
  text: 戛，敔也，音古八反。形如伏獸，背上有二十七刻，以木長尺櫟之，所以止樂。擊，柷也，像桶，中有椎柄，連底搖之，所以作樂。見三禮圖。球，玉磬也。虞謨，舜典也。詩小雅曰：「吉日維戊，既伯既禱。田車既好，四牡孔阜。」又曰：「我車既攻，我馬既同。」
- id: hhs.60.p10.a3
  anchor: hhs.60.p10
  at: 252
  length: 0
  type: lixian
  text: 元年謂安帝即位年也。□運謂地震、大水、雨雹之類。
- id: hhs.60.p10.a4
  anchor: hhs.60.p10
  at: 285
  length: 0
  type: lixian
  text: 孟子對齊宣王曰：「今王*(頗)*鼓樂於此，百姓聞王鐘鼓之聲，舉欣欣然有喜色而相告曰：『吾王庶幾無疾病歟？何以能鼓樂也！』今王田獵於此，百姓見羽旄之美，欣欣有喜色而相告曰：『吾王庶幾無疾病歟？何以能田獵也？』此無佗，與人同樂也。」
- id: hhs.60.p10.a5
  anchor: hhs.60.p10
  at: 322
  length: 0
  type: lixian
  text: 鞬以藏箭，櫜以藏弓。鞬音紀言反。櫜音高。禮記孔子曰：「武王克殷，倒載干戈，包以獸皮，名之曰建櫜。」鄭注云「建讀為鍵」，音其蹇反，謂藏閉之也，此馬鄭異義。司馬法曰：「古者武軍三年不興，則凱樂凱歌，偃伯靈台，荅人之勞，告不興也。」偃，休也。伯謂師節也。靈台，望氣之台也。
- id: hhs.60.p13.t1
  anchor: hhs.60.p13
  at: 48
  length: 4
  type: temporal
  text: 延熹九年
  kind: absolute
  resolution: absolute
  year_ad: 166
  era: 延熹
  era_year: 9
- id: hhs.60.p13.a1
  anchor: hhs.60.p13
  at: 74
  length: 0
  type: lixian
  text: 左傳鄭子太叔曰：「為刑罰威獄，以類天之震耀殺戮。」杜注曰：「雷霆震耀，天之威也。聖人作刑獄以象類之。」又宋子罕曰：「兵之設久矣，所以威不軌而昭文德也。聖人以興，亂人以廢，廢興存亡昏明之術，皆兵之由也。」
- id: hhs.60.p14.a1
  anchor: hhs.60.p14
  at: 25
  length: 0
  type: lixian
  text: 酆，周文王所都。孟子曰：「文王之囿方七十里。」爾雅曰：「春獵為搜，夏曰苗，秋曰獮，冬曰狩。」
- id: hhs.60.p14.a2
  anchor: hhs.60.p14
  at: 39
  length: 0
  type: lixian
  text: 韓詩曰：「東有*(囿)**[圃]*草，駕言行狩。」毛詩曰：「彼茁者葭，一發五豝，于嗟乎騶虞。」毛萇注云：「騶虞，義獸也，白虎黑文，不食生物。有至信之德則應之。」周禮大司樂：「王大射則奏騶虞。」
- id: hhs.60.p14.a3
  anchor: hhs.60.p14
  at: 61
  length: 0
  type: lixian
  text: 周禮曰：「風雨之所會也，陰陽之所和也，乃建王國焉。」天邑謂洛陽也。
- id: hhs.60.p14.a4
  anchor: hhs.60.p14
  at: 82
  length: 0
  type: lixian
  text: 揆，度也。詩大雅曰：「王在靈囿。」言作廣成苑以比之。
- id: hhs.60.p14.a5
  anchor: hhs.60.p14
  at: 94
  length: 0
  type: lixian
  text: □音眇，泱音烏朗反，並廣大貌。
- id: hhs.60.p14.a6
  anchor: hhs.60.p14
  at: 106
  length: 0
  type: lixian
  text: 阹音欺於反。上林賦曰：「江河為阹。」郭璞注曰：「因山谷遮禽獸曰阹。」廣雅曰：「矕，視也。」音馬板反。三塗，山名，在陸渾縣西南。
