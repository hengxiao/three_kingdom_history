annotations:
- id: hhs.70.p1.a1
  anchor: hhs.70.p1
  at: 2
  length: 0
  type: lixian
  text: （即鄭泰）
- id: hhs.70.p2.a1
  anchor: hhs.70.p2
  at: 2
  length: 0
  type: lixian
  text: 范曄避父諱「泰」改。
- id: hhs.70.p2.a2
  anchor: hhs.70.p2
  at: 20
  length: 0
  type: lixian
  text: 開封，縣，故城在今汴州南。
- id: hhs.70.p3.a1
  anchor: hhs.70.p3
  at: 40
  length: 0
  type: lixian
  text: 續漢志曰：「尚書凡六曹，侍郎三十六人，四百石。一曹有六人，主作文書起草。」
- id: hhs.70.p3.a2
  anchor: hhs.70.p3
  at: 86
  length: 0
  type: lixian
  text: 借音子夜反。
- id: hhs.70.p4.a1
  anchor: hhs.70.p4
  at: 128
  length: 0
  type: lixian
  text: 詭猶詐也。
- id: hhs.70.p8.a1
  anchor: hhs.70.p8
  at: 21
  length: 0
  type: lixian
  text: 孟卓名邈。
- id: hhs.70.p8.a2
  anchor: hhs.70.p8
  at: 26
  length: 0
  type: lixian
  text: 言不妄視也。
- id: hhs.70.p8.a3
  anchor: hhs.70.p8
  at: 29
  length: 0
  type: lixian
  text: 名伷。
- id: hhs.70.p8.a4
  anchor: hhs.70.p8
  at: 39
  length: 0
  type: lixian
  text: 枯者噓之使生，生者吹之使枯。言談論有所抑揚也。
- id: hhs.70.p9.a1
  anchor: hhs.70.p9
  at: 10
  length: 0
  type: lixian
  text: 悍，勇也。
- id: hhs.70.p9.a2
  anchor: hhs.70.p9
  at: 22
  length: 0
  type: lixian
  text: 說菀曰：「孟賁水行不避鮫龍，陸行不避虎狼，發怒吐氣，聲響動天。」許慎注《淮南子》曰：「孟賁，衞人也。」《呂氏春秋》曰：「孟賁過於河，先其伍，船人怒，以楫虓其頭，不知其孟賁故也。中河，孟賁瞋目視船人，髮植目裂，舟中人盡播入河。」慶忌，吳王僚子也。射之矢，滿把不能中，四馬追之不能及。
- id: hhs.70.p9.a3
  anchor: hhs.70.p9
  at: 27
  length: 0
  type: lixian
  text: 《史記》，燕將攻下聊城，因保守之。齊將田單攻之，歲餘不下。
- id: hhs.70.p10.a1
  anchor: hhs.70.p10
  at: 22
  length: 0
  type: lixian
  text: 怙亦恃也。
- id: hhs.70.p10.a2
  anchor: hhs.70.p10
  at: 27
  length: 0
  type: lixian
  text: 峙，止也。
- id: hhs.70.p11.a1
  anchor: hhs.70.p11
  at: 33
  length: 0
  type: lixian
  text: 挾，持也。
- id: hhs.70.p12.a1
  anchor: hhs.70.p12
  at: 36
  length: 0
  type: lixian
  text: 義從、八種並見〈西羌傳〉。
- id: hhs.70.p13.a1
  anchor: hhs.70.p13
  at: 37
  length: 0
  type: lixian
  text: 膠亦固也。
- id: hhs.70.p15.a1
  anchor: hhs.70.p15
  at: 9
  length: 0
  type: lixian
  text: 玄，北海人，故云東州。
- id: hhs.70.p15.a2
  anchor: hhs.70.p15
  at: 18
  length: 0
  type: lixian
  text: 《魏志》，原字根矩，北海朱虛人也。與管寧俱以操尚稱。
- id: hhs.70.p15.a3
  anchor: hhs.70.p15
  at: 76
  length: 0
  type: lixian
  text: 《前書》吳王濞、楚王戊、趙王遂、淄川王賢、濟南王辟光、膠西王卬、膠東王雄渠，景帝三年反，大將軍條侯周亞夫將兵破之滎陽。
- id: hhs.70.p19.a1
  anchor: hhs.70.p19
  at: 33
  length: 0
  type: lixian
  text: 《前書》霸字次孺，元帝師。解見〈孔昱傳〉。
- id: hhs.70.p20.a1
  anchor: hhs.70.p20
  at: 6
  length: 0
  type: lixian
  text: 融家傳曰：「兄弟七人，融第六，幼有自然之性。年四歲時，每與諸兄共食梨，融輒引小者。大人問其故，荅曰：『我小兒，法當取小者。』由是宗族竒之。」
- id: hhs.70.p20.a2
  anchor: hhs.70.p20
  at: 22
  length: 0
  type: lixian
  text: 膺，潁川襄城人。融家傳曰：「聞漢中李公清節直亮，意慕之，遂造公門。」李固，漢中人，爲太尉，與此傳不同也。
- id: hhs.70.p20.a3
  anchor: hhs.70.p20
  at: 133
  length: 0
  type: lixian
  text: 家語曰：「孔子謂南宮敬叔曰：『吾聞老聃博古而達今，通禮樂之源，明道德之歸，即吾之師也。今將往矣。』遂至周，問禮於老聃焉。」
- id: hhs.70.p20.a4
  anchor: hhs.70.p20
  at: 159
  length: 0
  type: lixian
  text: 煒音于匭反。
- id: hhs.70.p22.a1
  anchor: hhs.70.p22
  at: 21
  length: 0
  type: lixian
  text: 刊，削也。謂削去告人姓名。
- id: hhs.70.p22.a2
  anchor: hhs.70.p22
  at: 42
  length: 0
  type: lixian
  text: 抵，歸也。融家傳「襃字文禮」也。
- id: hhs.70.p22.a3
  anchor: hhs.70.p22
  at: 62
  length: 0
  type: lixian
  text: 窘，迫也。
- id: hhs.70.p22.a4
  anchor: hhs.70.p22
  at: 86
  length: 0
  type: lixian
  text: 舍，止也。
- id: hhs.70.p22.a5
  anchor: hhs.70.p22
  at: 196
  length: 0
  type: lixian
  text: 《前書音義》曰：「讞，請也，音宜傑反。」
- id: hhs.70.p23.a1
  anchor: hhs.70.p23
  at: 55
  length: 0
  type: lixian
  text: 撓，曲也，音乃孝反。
- id: hhs.70.p23.a2
  anchor: hhs.70.p23
  at: 123
  length: 0
  type: lixian
  text: 融家傳曰：「客言於進曰：『孔文舉於時英雄特傑，譬諸物類，猶衆星之有北辰，百穀之有黍稷，天下莫不屬目也。』」
- id: hhs.70.p25.a1
  anchor: hhs.70.p25
  at: 104
  length: 0
  type: lixian
  text: 璆音巨秋反，又音求。
- id: hhs.70.p25.a2
  anchor: hhs.70.p25
  at: 183
  length: 0
  type: lixian
  text: 都昌，縣，屬北海郡，故城在今青州臨朐縣東北。
- id: hhs.70.p25.a3
  anchor: hhs.70.p25
  at: 210
  length: 0
  type: lixian
  text: 吳志，慈字子義，東萊人也。避事之遼東，北海相孔融聞而竒之，數遣人訊問其母，并致餉遺。時融爲管亥所圍，慈從遼東還，母謂之曰：「汝與孔北海未甞相見，至汝行後，贍恤殷勤，過於故舊。今爲賊所圍，汝宜赴之。」慈單步見融，旣而求救於劉備，得兵以解圍焉。
- id: hhs.70.p27.a1
  anchor: hhs.70.p27
  at: 22
  length: 0
  type: lixian
  text: 迄，竟也。
- id: hhs.70.p27.t1
  anchor: hhs.70.p27
  at: 36
  length: 4
  type: temporal
  text: 建安元年
  kind: absolute
  resolution: absolute
  year_ad: 196
  era: 建安
  era_year: 1
  reasoning: 原文「建安元年」直接出现年号；解析為 AD 196
- id: hhs.70.p27.a2
  anchor: hhs.70.p27
  at: 77
  length: 0
  type: lixian
  text: 隱，憑也。《莊子》曰：「南郭子綦隱几而坐。」
- id: hhs.70.p28.a1
  anchor: hhs.70.p28
  at: 41
  length: 0
  type: lixian
  text: 《說文》云：「隷，附著。」
- id: hhs.70.p29.a1
  anchor: hhs.70.p29
  at: 60
  length: 0
  type: lixian
  text: 三輔決錄曰：「日磾字翁叔，馬融之族子。少傳融業，以才學進。與楊彪、盧植、蔡邕等典校中書，歷位九卿，遂登台輔。」獻帝春秋曰：「術從日磾借節觀之，因奪不還，條軍中十餘人使促辟之。日磾謂術曰：『卿先代諸公辟士云何？而言促之，謂公府掾可劫得乎？』從術求去，而術不遣，旣以失節屈辱憂恚。」
- id: hhs.70.p29.a2
  anchor: hhs.70.p29
  at: 97
  length: 0
  type: lixian
  text: 直指，無屈撓也。《前書》有繡衣直指。
- id: hhs.70.p29.a3
  anchor: hhs.70.p29
  at: 102
  length: 0
  type: lixian
  text: 輯，和也。
- id: hhs.70.p29.a4
  anchor: hhs.70.p29
  at: 123
  length: 0
  type: lixian
  text: 所上章表及署補用，皆以日磾名爲首也。
- id: hhs.70.p29.a5
  anchor: hhs.70.p29
  at: 128
  length: 0
  type: lixian
  text: 前書曰：「附下罔上者刑。」
- id: hhs.70.p29.a6
  anchor: hhs.70.p29
  at: 133
  length: 0
  type: lixian
  text: 《左傳》叔向曰：「姦以事君者，吾所能禦。」
- id: hhs.70.p29.a7
  anchor: hhs.70.p29
  at: 143
  length: 0
  type: lixian
  text: 《公羊傳》曰：「鞌之戰，齊師大敗。齊侯使國佐如師。郤克曰：『與我紀侯之甗及魯、衞之侵地，使耕者東西其畝，以蕭同叔子爲質，則吾舍子。』國佐曰：『與我紀侯之甗，請諾。使反魯、衞之侵，請諾。使耕者東西其畝，是則土齊也。蕭同叔子者，齊君母也，齊君母猶晉君之母也，曰不可。請戰，一戰而不勝，請再戰，再戰而不勝，請三戰，三戰不勝，則齊國盡子之有也，何必蕭同叔子爲質！』揖而去之。」
- id: hhs.70.p29.a8
  anchor: hhs.70.p29
  at: 152
  length: 0
  type: lixian
  text: 楚白公勝欲爲亂，謂石乞曰：「王卿士皆以五百人當之則可。」乞曰：「不可得也。」曰：「市南有熊相宜僚者，若得之，可以當五百人矣。」乃從白公而見之。與言，恱；告之故，辭；承之以劔，不動。事見左傳。
- id: hhs.70.p29.a9
  anchor: hhs.70.p29
  at: 227
  length: 0
  type: lixian
  text: 《公羊傳》曰：「叔孫得臣卒。」何休注曰：「不日者，知公子遂欲殺君，而爲人臣知賊而不言，明當誅也。」公子遂即襄仲也。
- id: hhs.70.p29.a10
  anchor: hhs.70.p29
  at: 241
  length: 0
  type: lixian
  text: 《左傳》：「鄭子家卒，鄭人討幽公之亂，斲子家之棺而逐其族。」杜預注曰：「斲薄其棺，不使從卿禮。」爲其殺君故也。
- id: hhs.70.p30.a1
  anchor: hhs.70.p30
  at: 26
  length: 0
  type: lixian
  text: 《左傳》楚申叔時曰：「人生敦庬。」杜預注：「庬，厚大也。」
- id: hhs.70.p30.a2
  anchor: hhs.70.p30
  at: 31
  length: 0
  type: lixian
  text: 端，直也。
- id: hhs.70.p30.a3
  anchor: hhs.70.p30
  at: 92
  length: 0
  type: lixian
  text: 殘其支體而弃廢之。
- id: hhs.70.p30.a4
  anchor: hhs.70.p30
  at: 102
  length: 0
  type: lixian
  text: 《易》曰：「天地盈虛，與時消息。」
- id: hhs.70.p30.a5
  anchor: hhs.70.p30
  at: 116
  length: 0
  type: lixian
  text: 《尚書》曰：「紂斮朝涉之脛。」孔安國注曰：「冬日見朝涉水者，謂其脛耐寒，斮而視之。」
- id: hhs.70.p30.a6
  anchor: hhs.70.p30
  at: 127
  length: 0
  type: lixian
  text: 《前書》賈山曰：「昔者周蓋千八百國，以九州之人養千八百君也。」
- id: hhs.70.p30.a7
  anchor: hhs.70.p30
  at: 184
  length: 0
  type: lixian
  text: 左傳曰，靈公廢太子光，立公子牙，使高厚傅牙，夙沙衞爲少傅。崔杼逆光而立之，是爲莊公。莊公以夙沙衞易己，衞奔高唐以叛。
- id: hhs.70.p30.a8
  anchor: hhs.70.p30
  at: 189
  length: 0
  type: lixian
  text: 《左傳》，楚客聘于晉，過宋，太子痤知之，請野享之。公使往，伊戾請從，遣之。至則欿用牲，加書徵之，騁而告曰：「太子將爲亂，旣與楚客盟矣。」公使視之，則信有焉。公囚太子，太子縊死。公徐聞其無罪，乃亨伊戾。
- id: hhs.70.p30.a9
  anchor: hhs.70.p30
  at: 199
  length: 0
  type: lixian
  text: 《史記》，胡亥謂李斯曰：「高，故宮人也。」遂專信任之。後殺李斯，劫殺胡亥，卒亡秦也。《前書》，英布坐法黥，論輸驪山，亡之江中爲羣盜。及屬項羽，常爲先鋒陷陣。後歸漢，爲九江王。謀反，誅之。
- id: hhs.70.p30.a10
  anchor: hhs.70.p30
  at: 223
  length: 0
  type: lixian
  text: 左傳：「初，鬻拳彊諫，楚子弗從。臨之以兵，懼而從之。拳曰：『吾懼君以兵，罪莫大焉。』遂自刖。楚人以爲大閽。君子曰：『鬻拳可謂愛君矣。諫以自納於刑，刑猶不忘納君於善。』」
- id: hhs.70.p30.a11
  anchor: hhs.70.p30
  at: 228
  length: 0
  type: lixian
  text: 《韓子》曰：「楚人和氏得璞玉於楚山之中，獻之武王。武王使玉人相之，曰：『石也。』王以和爲謾己，刖其左足。及文王即位，和又奉其璞，玉人又曰：『石也。』又刖其右足。文王薨，成王即位，和乃抱其璞而哭於楚山之下，三日三夜，泣盡而繼以血。王使玉人攻璞而得寶焉。」琴操曰：「荊王封和爲陵陽侯，和辭不就而去。乃作怨歌曰：『進寶得刑，足離分兮。去封立信，守休芸兮。斷者不續，豈不冤兮！』」
- id: hhs.70.p30.a12
  anchor: hhs.70.p30
  at: 233
  length: 0
  type: lixian
  text: 史記，孫臏與龐涓學兵法，涓事魏惠王爲將軍，自以能不及臏，陰使召臏，斷其兩足而黥之。臏後入齊，威王問兵法，以爲師。魏與趙攻韓，齊使田忌將而往。龐涓聞，去韓而歸。臏謂田忌曰：「三晉之兵素悍勇而輕齊。軍半至。使齊軍入魏地爲十萬竈，明日爲五萬竈，明日爲二萬竈。」龐涓行三日，大喜曰：「我固知齊卒怯，入吾地三日，士卒亡者過半矣。」乃棄其步兵，與其輕銳倍日并行逐之。孫子度其行，暮當至馬陵。馬陵道狹，旁多險阻，可伏兵，乃斫大樹白而書之曰「龐涓死於此木下」。於是令齊軍曰：「善射者萬弩，夾道而伏，期日莫見火舉而俱發。」涓夜至斫木下，見白書，乃攢火燭之，讀書未畢，齊軍萬弩俱發，魏軍大亂相失。龐涓自知智窮兵敗，遂自剄。曰：「遂成豎子之名矣。」
- id: hhs.70.p30.a13
  anchor: hhs.70.p30
  at: 238
  length: 0
  type: lixian
  text: 毛萇注詩云：「巷伯，內小臣也。掌王后之命於宮中，故謂之巷伯。」伯被讒將刑，寺人孟子傷而作詩，以刺幽王也。
- id: hhs.70.p30.a14
  anchor: hhs.70.p30
  at: 243
  length: 0
  type: lixian
  text: 李陵爲匈奴敗，馬遷明陵當必立功以報漢，遂被下蠶室宮刑，後乃著史記。
- id: hhs.70.p30.a15
  anchor: hhs.70.p30
  at: 248
  length: 0
  type: lixian
  text: 劉向字子政。宣帝時，上言黃金可成。上令典尚方鑄作事，費甚多，方不驗，乃下吏，當死。上竒其材，得踰冬減論。班固云：「向博物洽聞，通達古今。」
- id: hhs.70.p30.a16
  anchor: hhs.70.p30
  at: 258
  length: 0
  type: lixian
  text: 《國語》「中刑用刀鋸」也。
- id: hhs.70.p30.a17
  anchor: hhs.70.p30
  at: 265
  length: 0
  type: lixian
  text: 《尚書》：「太甲旣立，不明，伊尹放諸桐。三年，復歸於亳。思庸。」孔注曰：「念常道也。」
- id: hhs.70.p30.a18
  anchor: hhs.70.p30
  at: 271
  length: 0
  type: lixian
  text: 秦穆使孟明、白乙等伐鄭，蹇叔諫，不從。晉襄公敗諸崤，囚孟明等，後歸之。穆公曰：「孤之罪也，夫子何罪！」復使爲政，遂霸西戎。事見《左傳》。
- id: hhs.70.p30.a19
  anchor: hhs.70.p30
  at: 283
  length: 0
  type: lixian
  text: 《韓詩》曰：「賔之初筵，衞武公飲酒悔過也。言賔客初就筵之時，賔主秩秩然，俱謹敬也。賔旣醉止，載號載呶，不知其爲惡也。」
- id: hhs.70.p30.a20
  anchor: hhs.70.p30
  at: 289
  length: 0
  type: lixian
  text: 《前書》，湯字子公。遷西域副校尉，矯制發諸國兵，斬郅支單于於都賴水上。
- id: hhs.70.p30.a21
  anchor: hhs.70.p30
  at: 295
  length: 0
  type: lixian
  text: 文帝時，尚爲雲中守，坐上首虜差六級，下吏削爵。趙人馮唐爲郎，爲言文帝，赦尚復爲雲中守也。
- id: hhs.70.p31.a1
  anchor: hhs.70.p31
  at: 29
  length: 0
  type: lixian
  text: 斥，指也。
- id: hhs.70.p31.a2
  anchor: hhs.70.p31
  at: 93
  length: 0
  type: lixian
  text: 體謂國家之大體也。
- id: hhs.70.p31.a3
  anchor: hhs.70.p31
  at: 116
  length: 0
  type: lixian
  text: 《老子》曰：「天下神器，不可爲也。」
- id: hhs.70.p31.a4
  anchor: hhs.70.p31
  at: 126
  length: 0
  type: lixian
  text: 賈誼曰：「人主之尊譬如堂，羣臣如陛，衆庶如地。故陛乃九級上，廉遠地則堂高也。」
- id: hhs.70.p31.a5
  anchor: hhs.70.p31
  at: 141
  length: 0
  type: lixian
  text: 《論語》曰：「夫子之不可及也，猶天之不可階而升也。」又曰：「仲尼如日月，無得而踰焉。」
- id: hhs.70.p31.a6
  anchor: hhs.70.p31
  at: 158
  length: 0
  type: lixian
  text: 形，見也。
- id: hhs.70.p31.a7
  anchor: hhs.70.p31
  at: 194
  length: 0
  type: lixian
  text: 《前書》賈誼曰：「里諺云『欲投鼠而忌器』，此善諭也。鼠近於器，尚憚不投，恐傷其器，況乎貴臣之近主乎？」
- id: hhs.70.p31.a8
  anchor: hhs.70.p31
  at: 206
  length: 0
  type: lixian
  text: 《左傳》，齊桓伐楚，責以「苞茅不入，王祭不供，無以縮酒」。杜預注曰：「包，裹束也。茅，菁茅也。束茅而灌之以酒，爲縮酒也。」
- id: hhs.70.p31.a9
  anchor: hhs.70.p31
  at: 216
  length: 0
  type: lixian
  text: 《公羊傳》：「成公元年秋，王師敗績于貿戎。孰敗之？蓋晉敗之。曷爲不言晉敗之？王者無敵，莫敢當也。」
- id: hhs.70.p31.a10
  anchor: hhs.70.p31
  at: 249
  length: 0
  type: lixian
  text: 史記李斯曰：「故城高五丈，而樓季不輕犯也；太山之高百仞，而跛牂牧其上。夫樓季而難五丈之限，豈跛牂而易百仞之高哉？峭漸之埶異也。」爾雅曰：「羊牝曰牂。」易曰：「天險不可昇，地險山川丘陵也。」
- id: hhs.70.p31.a11
  anchor: hhs.70.p31
  at: 269
  length: 0
  type: lixian
  text: 鄭玄注儀禮曰：「篚，竹器如筐也。」書曰：「厥篚玄纁璣組。」
- id: hhs.70.p31.a12
  anchor: hhs.70.p31
  at: 289
  length: 0
  type: lixian
  text: 書曰：「今商王受亡道，爲天下逋逃主，萃淵藪。」孔注曰：「天下罪人逃亡者，而紂爲魁主，窟聚泉府藪澤也。」
- id: hhs.70.p31.a13
  anchor: hhs.70.p31
  at: 299
  length: 0
  type: lixian
  text: 左傳：「取郜大鼎于宋，戊申納于太廟。臧哀伯諫曰：『君人者，昭德塞違，以臨照百官，百官於是乎戒懼。郜鼎在廟，彰孰甚焉！』」郜鼎，郜國所作也。
- id: hhs.70.p31.a14
  anchor: hhs.70.p31
  at: 309
  length: 0
  type: lixian
  text: 詩曰：「桑之落矣，其黃而隕。」
- id: hhs.70.p32.t1
  anchor: hhs.70.p32
  at: 0
  length: 2
  type: temporal
  text: 五年
  kind: relative
  resolution: bare_year
  year_ad: 200
  era: 建安
  era_year: 5
  reasoning: 承前文年號「建安」推得，「五年」 = 建安5年 = AD 200
- id: hhs.70.p32.a1
  anchor: hhs.70.p32
  at: 14
  length: 0
  type: lixian
  text: 並獻帝子。
- id: hhs.70.p32.a2
  anchor: hhs.70.p32
  at: 116
  length: 0
  type: lixian
  text: 梁懷王揖，景帝弟也，立十年薨。臨江閔王榮，武帝兄也，爲皇太子，四歲廢爲王，坐侵廟壖地自殺。齊懷王閎，武帝子，昭帝異母兄，立八年薨。臣賢案：齊哀王，悼惠王之子，高帝之孫，非昭帝兄弟，當爲懷王，作「哀」者誤也。臨淮公衡，明帝弟，建武十五年立，未及進爵爲王而薨。融家傳及本傳皆作「公」，此爲「王」者，亦誤也。
- id: hhs.70.p32.a3
  anchor: hhs.70.p32
  at: 167
  length: 0
  type: lixian
  text: 稱音尺證反。
- id: hhs.70.p32.a4
  anchor: hhs.70.p32
  at: 204
  length: 0
  type: lixian
  text: 處猶安也。
- id: hhs.70.p33.a1
  anchor: hhs.70.p33
  at: 30
  length: 0
  type: lixian
  text: 〈袁紹傳〉，熙，紹之中子也。甄氏，中山無極人，漢太保甄邯後也。父逸，上蔡令。《魏略》曰：「熙出在幽州，甄氏侍姑，及鄴城破，文帝入紹舍，后怖，伏姑膝上。帝令舉頭就視，見其顏色非凡。太祖聞其意，爲迎取之。」
- id: hhs.70.p33.a2
  anchor: hhs.70.p33
  at: 51
  length: 0
  type: lixian
  text: 妲音丁末反，又音旦。紂之妃，有蘇氏女也。紂用其言，毒虐衆庶。武王剋殷，斬妲己頭，縣之於小白旗，以爲紂之亡由此女也。出列女傳也。
- id: hhs.70.p33.a3
  anchor: hhs.70.p33
  at: 83
  length: 0
  type: lixian
  text: 建安十二年也。
- id: hhs.70.p33.a4
  anchor: hhs.70.p33
  at: 108
  length: 0
  type: lixian
  text: 國語曰：「昔武王剋商，通于九夷百蠻，於是肅慎氏貢楛矢石砮，其長尺有咫。」《肅慎國記》曰：「肅慎氏，其地在夫餘國北，東濵大海。」《魏略》曰：「挹婁一名肅慎氏。」說文曰「楛，木也。今遼左有楛木，狀如荊，葉如榆」也。
- id: hhs.70.p33.a5
  anchor: hhs.70.p33
  at: 122
  length: 0
  type: lixian
  text: 山海經曰：「北海之內，有丁零之國。」前書蘇武使匈奴，單于徙北海上，丁零盜武牛羊，武遂窮戹也。
- id: hhs.70.p34.a1
  anchor: hhs.70.p34
  at: 24
  length: 0
  type: lixian
  text: 融集與操書云：「酒之爲德乆矣。古先哲王，類帝禋宗，和神定人，以濟萬國，非酒莫以也。故天垂酒星之燿，地列酒泉之郡，人著旨酒之德。堯不千鍾，無以建太平。孔非百觚，無以堪上聖。樊噲解戹鴻門，非豕肩鍾酒，無以奮其怒。趙之廝養，東迎其王，非引巵酒，無以激其氣。高祖非醉斬白蛇，無以暢其靈。景帝非醉幸唐姬，無以開中興。袁盎非醇醪之力，無以脫其命。定國不酣飲一斛，無以決其法。故酈生以高陽酒徒，著功於漢；屈原不餔醩歠醨，取困於楚。由是觀之，酒何負於政哉？」又書曰：「昨承訓荅，陳二代之禍，及衆人之敗，以酒亡者，實如來誨。雖然，徐偃王行仁義而亡，今令不絕仁義；燕噲以讓失社稷，今令不禁謙退；魯因儒而損，今令不棄文學；夏、商亦以婦人失天下，今令不斷婚姻。而將酒獨急者，疑但惜穀耳，非以亡王爲戒也。」
- id: hhs.70.p34.a2
  anchor: hhs.70.p34
  at: 43
  length: 0
  type: lixian
  text: 偏邪跌宕，不拘正理。
- id: hhs.70.p34.a3
  anchor: hhs.70.p34
  at: 71
  length: 0
  type: lixian
  text: 《周禮》：「方千里曰國畿，其外五百里侯畿。」鄭玄注：「畿，限也。」
- id: hhs.70.p34.a4
  anchor: hhs.70.p34
  at: 117
  length: 0
  type: lixian
  text: 續漢書：「慮字鴻豫，山陽高平人，少受學於鄭玄。」虞浦《江表傳》曰：「獻帝甞時見慮及少府孔融。問融曰：『鴻豫何所優長？』融曰：『可與適道，未可與權。』慮舉笏曰：『融昔宰北海，政散人流，其權安在？』遂與融互相長短，以至不穆。曹操以書和解之。」慮從光祿勳遷御史大夫。
- id: hhs.70.p34.a5
  anchor: hhs.70.p34
  at: 153
  length: 0
  type: lixian
  text: 《尚書》曰，舜以伯禹爲司空，禹讓稷、契暨皐陶。以益爲朕虞，益讓于朱虎、熊羆。以伯夷爲秩宗，伯夷讓于夔龍。
- id: hhs.70.p34.a6
  anchor: hhs.70.p34
  at: 163
  length: 0
  type: lixian
  text: 史記曰：「於是禹興九韶之樂，致異物，鳳皇來儀。」
- id: hhs.70.p34.a7
  anchor: hhs.70.p34
  at: 175
  length: 0
  type: lixian
  text: 若齊孟陽代君居床以待賊，西漢紀信乘黃屋誑楚之類也。
- id: hhs.70.p34.a8
  anchor: hhs.70.p34
  at: 180
  length: 0
  type: lixian
  text: 若要離焚妻子以徇吳，李通誅宗族以從漢之類也。
- id: hhs.70.p34.a9
  anchor: hhs.70.p34
  at: 199
  length: 0
  type: lixian
  text: 史記，范雎一餐之德必償，睚眦之怨必報。
- id: hhs.70.p34.a10
  anchor: hhs.70.p34
  at: 211
  length: 0
  type: lixian
  text: 景帝時，錯爲御史大夫，以諸侯國大，請削其土。吳楚七國反，以誅錯爲名。袁盎素與錯不相善，盎乃進說，請斬錯以謝七國，景帝遂斬錯也。
- id: hhs.70.p34.a11
  anchor: hhs.70.p34
  at: 223
  length: 0
  type: lixian
  text: 屈平楚懷王時爲三閭大夫。秦昭王使張儀譎詐懷王，令絕齊交，又誘請會武關，平諫，王不聽其言，卒客死於秦。懷王子子椒、子蘭讒之於襄王，而放逐之。見史記。
- id: hhs.70.p34.a12
  anchor: hhs.70.p34
  at: 233
  length: 0
  type: lixian
  text: 朱浮與寵不相能，數譖之光武，寵遂反。
- id: hhs.70.p34.a13
  anchor: hhs.70.p34
  at: 244
  length: 0
  type: lixian
  text: 鄧禹征赤眉，令宗欽、馮愔守栒邑。二人爭權相攻，遂殺欽，因反擊禹。今流俗本「宗」誤作「宋」也。
- id: hhs.70.p34.a14
  anchor: hhs.70.p34
  at: 264
  length: 0
  type: lixian
  text: 音余。
- id: hhs.70.p34.a15
  anchor: hhs.70.p34
  at: 278
  length: 0
  type: lixian
  text: 趙惠文王與秦昭王會黽池，歸，拜藺相如爲上卿，位在廉頗右。頗曰；「吾不忍爲之下，必辱之。」相如每朝，常避之。頗聞之，肉袒負荊謝之，相與爲刎頸之友。事見《史記》。
- id: hhs.70.p34.a16
  anchor: hhs.70.p34
  at: 309
  length: 0
  type: lixian
  text: 公子糾與桓公爭立，管仲射桓公中鉤。後桓公即位，以管仲爲相也。
- id: hhs.70.p34.a17
  anchor: hhs.70.p34
  at: 336
  length: 0
  type: lixian
  text: 介猶蔕芥也。公法雖平，私情爲蔕芥者也。
- id: hhs.70.p34.a18
  anchor: hhs.70.p34
  at: 357
  length: 0
  type: lixian
  text: 憮音舞。憮，失意貌也。
- id: hhs.70.p34.a19
  anchor: hhs.70.p34
  at: 395
  length: 0
  type: lixian
  text: 史記，齊威王使大夫追論古者司馬法。其法論田及兵之法也。
- id: hhs.70.p35.a1
  anchor: hhs.70.p35
  at: 10
  length: 0
  type: lixian
  text: 猥，曲也。
- id: hhs.70.p35.a2
  anchor: hhs.70.p35
  at: 24
  length: 0
  type: lixian
  text: 山陽與魯郡相鄰比。
- id: hhs.70.p35.a3
  anchor: hhs.70.p35
  at: 92
  length: 0
  type: lixian
  text: 宣子，趙盾謚也。國語曰：「宣子言韓厥於靈公，以爲司馬。河曲之役，趙宣子使人以其乘車干行，韓厥執而戮之。衆咸曰：『韓厥必不沒矣。其主朝升之而暮戮其車，其誰安之？』宣子召而禮之，謂諸大夫曰：『二三子可以賀我矣。吾舉厥也，中吾，乃今知免於罪矣。』」
- id: hhs.70.p35.a4
  anchor: hhs.70.p35
  at: 113
  length: 0
  type: lixian
  text: 即屈原也。掌王族三姓，曰昭、屈、景，故曰「三閭」。
- id: hhs.70.p35.a5
  anchor: hhs.70.p35
  at: 185
  length: 0
  type: lixian
  text: 夏小正云：「昆，衆也。」孫卿子曰：「昆蟲亦有知。」
- id: hhs.70.p35.a6
  anchor: hhs.70.p35
  at: 211
  length: 0
  type: lixian
  text: 左傳「秦伯之弟鍼如晉脩成，叔向命召行人子員。行人子朱曰：『朱也當御。』三云，叔向不應。子朱怒曰：『班爵同，何以黜朱於朝？』撫劔從之。叔向曰：『秦晉不和乆矣。今日之事，幸而集，晉國賴之；不集，三軍暴骨。子員導二國之言無私，子常易之。姦以事君者，吾所能禦也。』拂衣從之。人救之。平公曰：『晉其庶乎！吾臣之所爭者大。』師曠曰：『公室懼卑，臣不心競而力爭』」也。
- id: hhs.70.p35.a7
  anchor: hhs.70.p35
  at: 228
  length: 0
  type: lixian
  text: 韓信貧賤，淮陰少年侮之，令信出跨下。
- id: hhs.70.p35.a8
  anchor: hhs.70.p35
  at: 233
  length: 0
  type: lixian
  text: 史記，荊軻甞游榆次，與蓋聶論劔，蓋聶怒而目之，荊軻出去。
- id: hhs.70.p35.a9
  anchor: hhs.70.p35
  at: 249
  length: 0
  type: lixian
  text: 蚊音文。虻音䖟。言蚊虻之暫過，未以爲害。
- id: hhs.70.p35.a10
  anchor: hhs.70.p35
  at: 258
  length: 0
  type: lixian
  text: 左傳曰，子產謂子皮曰：「人心不同，其如面焉，吾豈敢謂子面如吾面乎？」
- id: hhs.70.p35.a11
  anchor: hhs.70.p35
  at: 289
  length: 0
  type: lixian
  text: 鑪，累土爲之，以居酒瓮，四邊隆起，一面高如鍛鑪，故名鑪。字或作「壚」。韓子曰：「宋人有沽酒者，斗概甚平，遇客甚謹，爲酒甚美，而酒不售，酒酸。怪其故，問所知閭長者楊倩。倩曰：『汝狗猛耶？』曰：『狗猛。』『何故不售？』曰：『人畏焉。』令孺子懷錢挈壺往沽，狗迎齕之，酒所以酸而不售。」
- id: hhs.70.p35.a12
  anchor: hhs.70.p35
  at: 309
  length: 0
  type: lixian
  text: 韓子曰：「齊有居士田仲，宋人屈穀往見之，曰：『穀聞先生之義，不恃仰人而食。今穀有樹瓠之法，堅如石，厚而無竅，願獻先生。』田仲曰：『夫子徒謂我也。凡貴於樹瓠者，爲可以盛也。今厚而無竅，則不可以盛物，而任堅如石，則不可以割而斟，吾無以此瓠爲也。』曰：『然，穀將棄之。』今仲不恃仰人而食，亦無益人國，亦堅瓠之類。」
- id: hhs.70.p35.a13
  anchor: hhs.70.p35
  at: 338
  length: 0
  type: lixian
  text: 左傳，晉文公謀元帥，趙衰曰：「郤縠可。」乃使郤縠將中軍。
- id: hhs.70.p35.a14
  anchor: hhs.70.p35
  at: 347
  length: 0
  type: lixian
  text: 公叔文子，衞大夫，其家臣名僎，行與文子同，升之於公，與之並爲大夫。僎音士眷反，見論語。
- id: hhs.70.p35.a15
  anchor: hhs.70.p35
  at: 357
  length: 0
  type: lixian
  text: 言曹公與己同愛郗慮，故發於中心而訓誨。
- id: hhs.70.p35.a16
  anchor: hhs.70.p35
  at: 368
  length: 0
  type: lixian
  text: 《禮記·檀弓》曰；「滕成公之喪，使子叔敬叔弔，子服惠伯爲介。及郊，爲懿伯之忌不入。惠伯曰：『政也，不可以叔父之私不將公事。』遂入。」鄭玄注曰：「懿伯，惠伯之叔父也。忌，怨也。」
- id: hhs.70.p35.a17
  anchor: hhs.70.p35
  at: 382
  length: 0
  type: lixian
  text: 賢吏謂慮也。
- id: hhs.70.p36.a1
  anchor: hhs.70.p36
  at: 30
  length: 0
  type: lixian
  text: 太中大夫職在言議，故云閑職。
- id: hhs.70.p36.a2
  anchor: hhs.70.p36
  at: 79
  length: 0
  type: lixian
  text: 漢官典職儀曰：「虎賁中郎將，主武賁千五百人。」
- id: hhs.70.p36.a3
  anchor: hhs.70.p36
  at: 104
  length: 0
  type: lixian
  text: 詩大雅曰「雖無老成人，尚有典刑」也。
- id: hhs.70.p37.a1
  anchor: hhs.70.p37
  at: 26
  length: 0
  type: lixian
  text: 《典略》曰：「粹字文蔚，陳留人，少學於蔡邕。建安初，以高第擢拜尚書郎，後爲軍謀祭酒，與陳琳、阮瑀等典記室。融誅之後，人睹粹所作，無不嘉其才而忌其筆也。」
- id: hhs.70.p37.a2
  anchor: hhs.70.p37
  at: 74
  length: 0
  type: lixian
  text: 史記曰，魯大夫孟釐子曰：「孔丘，聖人之後，滅於宋。」服虔注曰；「聖人謂商湯也。孔子六代祖孔父嘉爲宋華督所殺，其子奔魯也。」
- id: hhs.70.p37.a3
  anchor: hhs.70.p37
  at: 98
  length: 0
  type: lixian
  text: 訕音所諫反。訕謂謗毀也。蒼頡篇曰：「訕，非也。」
- id: hhs.70.p37.a4
  anchor: hhs.70.p37
  at: 114
  length: 0
  type: lixian
  text: 謂不加幘。
- id: hhs.70.p37.a5
  anchor: hhs.70.p37
  at: 131
  length: 0
  type: lixian
  text: 跌蕩，無儀檢也。放，縱也。
- id: hhs.70.p37.a6
  anchor: hhs.70.p37
  at: 172
  length: 0
  type: lixian
  text: 《說文》曰：「缻，缶也。」字書曰：「缻似缶而高。」
- id: hhs.70.p39.a1
  anchor: hhs.70.p39
  at: 21
  length: 0
  type: lixian
  text: 《魏略》曰：「曹操爲司空，威德日盛，融故以舊意書疏倨傲，習常責融令改節，融不從之。」
- id: hhs.70.p40.a1
  anchor: hhs.70.p40
  at: 86
  length: 0
  type: lixian
  text: 《前書》曰：「欒布，梁人也，爲梁王彭越大夫，使於齊，未反。漢誅越，梟首雒陽下，布還，奏事越頭下，祠而哭之。」
- id: hhs.70.p41.a1
  anchor: hhs.70.p41
  at: 27
  length: 0
  type: lixian
  text: 宣帝時，司隷校尉蓋寬饒以直言得罪，鄭昌愍傷寬饒忠直憂國，以言事不當意，而爲文吏所詆挫，故上書訟之。
- id: hhs.70.p41.a2
  anchor: hhs.70.p41
  at: 41
  length: 0
  type: lixian
  text: 公羊傳曰：「孔父正色而立于朝，則人莫敢過而致難於其君者，孔父可謂義形於色矣。」
- id: hhs.70.p41.a3
  anchor: hhs.70.p41
  at: 53
  length: 0
  type: lixian
  text: 紓音舒，解也，緩也。盜齊謂田常也。莊子曰：「田成子一旦弒齊君而盜其國。」左傳，齊景公坐於路寢。公歎曰：「美哉室！其誰有此乎？」晏子對曰：「如君之言，其陳氏乎？」公曰：「是可若何？」對曰：「唯禮可以已之。」
- id: hhs.70.p41.a4
  anchor: hhs.70.p41
  at: 74
  length: 0
  type: lixian
  text: 忤，逆也。
- id: hhs.70.p41.a5
  anchor: hhs.70.p41
  at: 87
  length: 0
  type: lixian
  text: 移鼎謂遷漢之鼎也。人存謂曹操身在不得篡位也。左傳曰：「桀有昏德，鼎遷於商；商紂暴虐，鼎遷於周。」
- id: hhs.70.p41.a6
  anchor: hhs.70.p41
  at: 99
  length: 0
  type: lixian
  text: 代終謂代漢祚之終也。身後謂曹丕受禪也。
- id: hhs.70.p41.a7
  anchor: hhs.70.p41
  at: 124
  length: 0
  type: lixian
  text: 「园」即「刓」字，音五丸反。前書音義曰：「刓謂刓團無稜角也。」每，貪也。言寧正直以傾覆摧折，不能委曲以貪生也。賈誼云：「品庶每生。」
- id: hhs.70.p41.a8
  anchor: hhs.70.p41
  at: 143
  length: 0
  type: lixian
  text: 懍懍言勁烈如秋霜也。皜皜言堅貞如白玉也。皜音古老反。
- id: hhs.70.p42.a1
  anchor: hhs.70.p42
  at: 6
  length: 0
  type: lixian
  text: 袁宏《漢紀》「彧」作「郁」。
- id: hhs.70.p42.a2
  anchor: hhs.70.p42
  at: 20
  length: 0
  type: lixian
  text: 朗陵，縣，屬汝南郡，故城在今豫州朗山縣西南。
- id: hhs.70.p42.a3
  anchor: hhs.70.p42
  at: 28
  length: 0
  type: lixian
  text: 緄音古本反。
- id: hhs.70.p42.a4
  anchor: hhs.70.p42
  at: 45
  length: 0
  type: lixian
  text: 《典略》曰：「衡欲以女妻汝南傅公明，公明不取，轉以妻郁。」
- id: hhs.70.p43.t1
  anchor: hhs.70.p43
  at: 0
  length: 4
  type: temporal
  text: 中平六年
  kind: absolute
  resolution: absolute
  year_ad: 189
  era: 中平
  era_year: 6
  reasoning: 原文「中平六年」直接出现年号；解析為 AD 189（回溯前事，不推進章節時間軸）
- id: hhs.70.p43.a1
  anchor: hhs.70.p43
  at: 15
  length: 0
  type: lixian
  text: 亢父屬梁國，故城在今兖州任城縣南。亢音剛，父音甫。
- id: hhs.70.p43.a2
  anchor: hhs.70.p43
  at: 45
  length: 0
  type: lixian
  text: 密縣西山也。
- id: hhs.70.p43.a3
  anchor: hhs.70.p43
  at: 61
  length: 0
  type: lixian
  text: 四面通也。
- id: hhs.70.p43.a4
  anchor: hhs.70.p43
  at: 89
  length: 0
  type: lixian
  text: 亟音紀力反。
- id: hhs.70.p44.a1
  anchor: hhs.70.p44
  at: 29
  length: 0
  type: lixian
  text: 數，計數也。
- id: hhs.70.p44.t1
  anchor: hhs.70.p44
  at: 66
  length: 4
  type: temporal
  text: 初平二年
  kind: absolute
  resolution: absolute
  year_ad: 191
  era: 初平
  era_year: 2
  reasoning: 原文「初平二年」直接出现年号；解析為 AD 191（回溯前事，不推進章節時間軸）
- id: hhs.70.p44.a2
  anchor: hhs.70.p44
  at: 92
  length: 0
  type: lixian
  text: 比之張良。
- id: hhs.70.p44.t2
  anchor: hhs.70.p44
  at: 105
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 201
  era: 建安
  era_year: 6
  reasoning: 「明年」 = 当前年 建安5年 (AD 200) 之次年 = AD 201
- id: hhs.70.p45.t1
  anchor: hhs.70.p45
  at: 0
  length: 4
  type: temporal
  text: 興平元年
  kind: absolute
  resolution: absolute
  year_ad: 194
  era: 興平
  era_year: 1
  reasoning: 原文「興平元年」直接出现年号；解析為 AD 194（回溯前事，不推進章節時間軸）
- id: hhs.70.p45.a1
  anchor: hhs.70.p45
  at: 17
  length: 0
  type: lixian
  text: 縣名，屬濟陰郡，今濮州縣也。「甄」今作「鄄」，音絹。
- id: hhs.70.p45.a2
  anchor: hhs.70.p45
  at: 34
  length: 0
  type: lixian
  text: 《典略》「宮字公臺，東郡人。剛直烈壯，少與海內知名之士皆相連結」也。
- id: hhs.70.p45.a3
  anchor: hhs.70.p45
  at: 58
  length: 0
  type: lixian
  text: 譎，詐也。
- id: hhs.70.p45.a4
  anchor: hhs.70.p45
  at: 130
  length: 0
  type: lixian
  text: 《魏志》曰：「惇字元讓，沛國人。」
- id: hhs.70.p45.a5
  anchor: hhs.70.p45
  at: 206
  length: 0
  type: lixian
  text: 不令其有去就也。
- id: hhs.70.p45.a6
  anchor: hhs.70.p45
  at: 255
  length: 0
  type: lixian
  text: 魏志：「昱字仲德，東郡東阿人。」范，縣，屬東郡，今濮陽縣也。東阿，縣，屬東郡，今濟州縣也。
- id: hhs.70.p45.a7
  anchor: hhs.70.p45
  at: 269
  length: 0
  type: lixian
  text: 三城謂甄、范、東阿也。
- id: hhs.70.p46.t1
  anchor: hhs.70.p46
  at: 0
  length: 2
  type: temporal
  text: 二年
  kind: relative
  resolution: bare_year
  year_ad: 197
  era: 建安
  era_year: 2
  reasoning: 承前文年號「建安」推得，「二年」 = 建安2年 = AD 197
- id: hhs.70.p46.a1
  anchor: hhs.70.p46
  at: 31
  length: 0
  type: lixian
  text: 高祖距項羽，常留蕭何守關中。
- id: hhs.70.p46.a2
  anchor: hhs.70.p46
  at: 88
  length: 0
  type: lixian
  text: 曹操初從東郡守鮑信等迎領兖州牧，遂進兵破黃巾等，故能平定山東也。
- id: hhs.70.p47.t1
  anchor: hhs.70.p47
  at: 0
  length: 4
  type: temporal
  text: 建安元年
  kind: absolute
  resolution: absolute
  year_ad: 196
  era: 建安
  era_year: 1
  reasoning: 原文「建安元年」直接出现年号；解析為 AD 196（回溯前事，不推進章節時間軸）
- id: hhs.70.p47.a1
  anchor: hhs.70.p47
  at: 45
  length: 0
  type: lixian
  text: 恣睢，肆怒貌。睢音火季反，又火佳反。《史記》：「盜跖日殺不辜，暴戾恣睢。」
- id: hhs.70.p47.a2
  anchor: hhs.70.p47
  at: 72
  length: 0
  type: lixian
  text: 《左傳》，卜偃言於晉侯曰：「求諸侯莫如勤王，諸侯信之，且大義也。」晉侯以左師逆王，王入于王城，取太叔於溫，殺之於隰城，遂定霸業，天下服從也。
- id: hhs.70.p47.a3
  anchor: hhs.70.p47
  at: 87
  length: 0
  type: lixian
  text: 項羽殺義帝於郴，高祖爲義帝發喪。高祖大哭，發使告諸侯曰：「天下共立義帝，北面事之。今項羽放殺義帝，大逆無道，寡人親爲發喪，兵皆縞素。」
- id: hhs.70.p47.a4
  anchor: hhs.70.p47
  at: 93
  length: 0
  type: lixian
  text: 蒙，冒也。左傳臧文仲曰：「天子蒙塵於外，敢不奔問官守。」
- id: hhs.70.p47.a5
  anchor: hhs.70.p47
  at: 126
  length: 0
  type: lixian
  text: 《尚書》曰：「雖爾身在外，乃心無不在王室。」乃，汝也。
- id: hhs.70.p47.a6
  anchor: hhs.70.p47
  at: 132
  length: 0
  type: lixian
  text: 鄭玄注《周禮》曰：「軫，輿後橫木也。」
- id: hhs.70.p48.a1
  anchor: hhs.70.p48
  at: 47
  length: 0
  type: lixian
  text: 魏志，荀攸字公達。太祖素聞攸名，與語大恱，謂彧曰：「公達非常人，吾得與計事，天下當何憂哉？」
- id: hhs.70.p48.a2
  anchor: hhs.70.p48
  at: 54
  length: 0
  type: lixian
  text: 《魏志》，嘉字奉孝，潁川人也。戲志才，籌畫士也，太祖甚器之，早卒。太祖與彧書曰：「自志才亡後，莫可與計事者。汝、潁固多竒士，誰可以繼之？」彧薦嘉，召見論天下事，太祖曰：「使孤成大業者，必此人也。」
- id: hhs.70.p48.a3
  anchor: hhs.70.p48
  at: 60
  length: 0
  type: lixian
  text: 襲字子緒，潁川人。荀彧薦襲，太祖以爲丞相軍謀祭酒，魏國建，爲侍中。
- id: hhs.70.p48.a4
  anchor: hhs.70.p48
  at: 64
  length: 0
  type: lixian
  text: 懿字仲達，即晉宣帝。
- id: hhs.70.p48.a5
  anchor: hhs.70.p48
  at: 81
  length: 0
  type: lixian
  text: 《三輔決錄》曰：「象字文則，京兆人。少聦博有膽智，爲楊州刺史。後爲孫策廬江太守李術所殺。」
- id: hhs.70.p48.a6
  anchor: hhs.70.p48
  at: 93
  length: 0
  type: lixian
  text: 康字元將，京兆人。父端，從涼州牧徵爲太僕，康代爲涼州刺史，時人榮之。後爲馬超所圍，堅守歷時，救軍不至，遂爲超所殺。
- id: hhs.70.p49.a1
  anchor: hhs.70.p49
  at: 20
  length: 0
  type: lixian
  text: 魏志，張繡在南陽降，旣而悔之，而復反。操與戰，軍敗爲流矢所中。
- id: hhs.70.p49.a2
  anchor: hhs.70.p49
  at: 27
  length: 0
  type: lixian
  text: 陳琳爲紹作檄書曰：「操祖父騰饕餮放橫，父嵩乞匄攜養，操贅閹遺醜。」並倨慢之詞也。
- id: hhs.70.p49.t1
  anchor: hhs.70.p49
  at: 75
  length: 2
  type: temporal
  text: 三年
  kind: relative
  resolution: bare_year
  year_ad: 198
  era: 建安
  era_year: 3
  reasoning: 承前文年號「建安」推得，「三年」 = 建安3年 = AD 198
- id: hhs.70.p50.t1
  anchor: hhs.70.p50
  at: 0
  length: 2
  type: temporal
  text: 五年
  kind: relative
  resolution: bare_year
  year_ad: 200
  era: 建安
  era_year: 5
  reasoning: 承前文年號「建安」推得，「五年」 = 建安5年 = AD 200
- id: hhs.70.p50.a1
  anchor: hhs.70.p50
  at: 59
  length: 0
  type: lixian
  text: 《先賢行狀》：「豐字元皓，鉅鹿人。天姿瓌傑，權略多竒。」許攸字子遠。
- id: hhs.70.p50.a2
  anchor: hhs.70.p50
  at: 72
  length: 0
  type: lixian
  text: 配字正南，魏郡人。忠烈慷慨，有不可犯之色。紹領兾州，委配腹心之任。《英雄記》曰：「紀字元圖。初，紹去董卓，與許攸及紀俱詣兾州，紹以紀聦達有計策，甚信之。」
- id: hhs.70.p50.a3
  anchor: hhs.70.p50
  at: 160
  length: 0
  type: lixian
  text: 袁紹傳
- id: hhs.70.p51.a1
  anchor: hhs.70.p51
  at: 5
  length: 0
  type: lixian
  text: 官度，即古之鴻溝也。於滎陽下引河東南流，其所保處在今鄭州中牟縣北官度口是也。
- id: hhs.70.p51.a2
  anchor: hhs.70.p51
  at: 30
  length: 0
  type: lixian
  text: 致猶至也。兵法曰：「善戰者，致人不致於人。」
- id: hhs.70.p51.a3
  anchor: hhs.70.p51
  at: 73
  length: 0
  type: lixian
  text: 高祖與項羽於滎陽、成皐閒，乆相持不決，後羽請鴻溝以西爲漢而退，高祖遂乘羽，敗之垓下，追殺之。
- id: hhs.70.p51.a4
  anchor: hhs.70.p51
  at: 82
  length: 0
  type: lixian
  text: 言與紹衆寡相懸也。
- id: hhs.70.p51.a5
  anchor: hhs.70.p51
  at: 88
  length: 0
  type: lixian
  text: 言畫地作限隔也。鄒陽曰：「畫地而不敢犯。」
- id: hhs.70.p51.a6
  anchor: hhs.70.p51
  at: 96
  length: 0
  type: lixian
  text: 搤音戹。搤謂捉持之也。
- id: hhs.70.p52.t1
  anchor: hhs.70.p52
  at: 0
  length: 2
  type: temporal
  text: 六年
  kind: relative
  resolution: bare_year
  year_ad: 201
  era: 建安
  era_year: 6
  reasoning: 承前文年號「建安」推得，「六年」 = 建安6年 = AD 201
- id: hhs.70.p52.a1
  anchor: hhs.70.p52
  at: 69
  length: 0
  type: lixian
  text: 糾，合也。
- id: hhs.70.p53.t1
  anchor: hhs.70.p53
  at: 0
  length: 2
  type: temporal
  text: 九年
  kind: relative
  resolution: bare_year
  year_ad: 204
  era: 建安
  era_year: 9
  reasoning: 承前文年號「建安」推得，「九年」 = 建安9年 = AD 204
- id: hhs.70.p54.t1
  anchor: hhs.70.p54
  at: 0
  length: 3
  type: temporal
  text: 十二年
  kind: relative
  resolution: bare_year
  year_ad: 207
  era: 建安
  era_year: 12
  reasoning: 承前文年號「建安」推得，「十二年」 = 建安12年 = AD 207
- id: hhs.70.p54.a1
  anchor: hhs.70.p54
  at: 53
  length: 0
  type: lixian
  text: 恢，大也。
- id: hhs.70.p54.a2
  anchor: hhs.70.p54
  at: 73
  length: 0
  type: lixian
  text: 徼，邀也，音古堯反。
- id: hhs.70.p54.a3
  anchor: hhs.70.p54
  at: 127
  length: 0
  type: lixian
  text: 《左傳》：「南轅反斾。」杜預曰：「軍門前大旂。」
- id: hhs.70.p54.a4
  anchor: hhs.70.p54
  at: 132
  length: 0
  type: lixian
  text: 謂兾、青、幽、并也。
- id: hhs.70.p54.a5
  anchor: hhs.70.p54
  at: 147
  length: 0
  type: lixian
  text: 鼓行謂鳴鼓而行，言無所畏也。
- id: hhs.70.p54.a6
  anchor: hhs.70.p54
  at: 155
  length: 0
  type: lixian
  text: 各規利，人百其勇也。
- id: hhs.70.p54.a7
  anchor: hhs.70.p54
  at: 163
  length: 0
  type: lixian
  text: 沮，止也。
- id: hhs.70.p54.a8
  anchor: hhs.70.p54
  at: 175
  length: 0
  type: lixian
  text: 捷，勝也。
- id: hhs.70.p54.a9
  anchor: hhs.70.p54
  at: 199
  length: 0
  type: lixian
  text: 沔即漢水也。孔安國曰：「漢上爲沔。」
- id: hhs.70.p54.a10
  anchor: hhs.70.p54
  at: 251
  length: 0
  type: lixian
  text: 搏，擊也。高祖旣殺項羽，論功行封，以蕭何爲最，功臣多不服。高祖曰：「諸君知獵乎？夫獵追殺獸者，狗也，而發縱指示獸者，人也。諸君徒能追得獸耳，功狗也。至如蕭何，發指示，功人也。」「縱」或作「蹤」，兩通。
- id: hhs.70.p54.a11
  anchor: hhs.70.p54
  at: 265
  length: 0
  type: lixian
  text: 張良未甞有戰鬬功，高帝曰：「運策帷幄中，決勝千里外，子房功也。」自擇齊三萬戶以封之。
- id: hhs.70.p54.a12
  anchor: hhs.70.p54
  at: 290
  length: 0
  type: lixian
  text: 侔，等也。
- id: hhs.70.p54.a13
  anchor: hhs.70.p54
  at: 306
  length: 0
  type: lixian
  text: 《前書》曰：「復其後代，疇其爵邑。」音義曰：「疇，等也，使其後常與先人等也。」
- id: hhs.70.p54.a14
  anchor: hhs.70.p54
  at: 336
  length: 0
  type: lixian
  text: 《左傳》介子推，晉文公臣。
- id: hhs.70.p54.a15
  anchor: hhs.70.p54
  at: 354
  length: 0
  type: lixian
  text: 操不專功，欲分之於彧也。
- id: hhs.70.p54.a16
  anchor: hhs.70.p54
  at: 363
  length: 0
  type: lixian
  text: 《史記》曰，趙欲尊秦爲帝，魯連止之，平原君乃欲封魯連。連笑曰：「所貴於天下之士，爲人排患釋難解紛而無取也。即有取者，是商賈之士也，而連不忍爲也。」
- id: hhs.70.p54.a17
  anchor: hhs.70.p54
  at: 374
  length: 0
  type: lixian
  text: 《左傳》曰：「聖達節，次守節。」
- id: hhs.70.p54.a18
  anchor: hhs.70.p54
  at: 394
  length: 0
  type: lixian
  text: 彧先守尚書令，今欲正除也。
- id: hhs.70.p54.a19
  anchor: hhs.70.p54
  at: 467
  length: 0
  type: lixian
  text: 《魏志》，操如彧計，表子琮以州逆降。
- id: hhs.70.p55.t1
  anchor: hhs.70.p55
  at: 0
  length: 3
  type: temporal
  text: 十七年
  kind: relative
  resolution: bare_year
  year_ad: 212
  era: 建安
  era_year: 17
  reasoning: 承前文年號「建安」推得，「十七年」 = 建安17年 = AD 212
- id: hhs.70.p55.a1
  anchor: hhs.70.p55
  at: 7
  length: 0
  type: lixian
  text: 昭字公仁，濟陰人也。
- id: hhs.70.p55.a2
  anchor: hhs.70.p55
  at: 20
  length: 0
  type: lixian
  text: 禮含文嘉曰：「九錫一曰車馬，二曰衣服，三曰樂器，四曰朱戶，五曰納陛，六曰虎賁百人，七曰斧鉞，八曰弓矢，九曰秬鬯，謂之九錫。錫，與也，九錫皆如其德。」《左傳》曰：「分魯公以大路大旂，夏后氏之璜，封父之繁弱，祝宗卜史，備物典策。」
- id: hhs.70.p55.a3
  anchor: hhs.70.p55
  at: 71
  length: 0
  type: lixian
  text: 《禮記》曰「君子之愛人也以德，細人之愛人也以姑息」也。
- id: hhs.70.p55.a4
  anchor: hhs.70.p55
  at: 119
  length: 0
  type: lixian
  text: 《史記》，齊景公以田穰苴爲將軍，扞燕。苴曰：「臣素卑賤，擢之閭伍之中，加之大夫之上，士卒未附，百姓不信，權輕，願得君之寵臣，國之所尊，以監軍，乃可。」景公許之，使莊賈往。即監督之義也。
- id: hhs.70.p55.a5
  anchor: hhs.70.p55
  at: 133
  length: 0
  type: lixian
  text: 《左傳》曰：「謀而鮮過，惠訓不倦。」
- id: hhs.70.p55.a6
  anchor: hhs.70.p55
  at: 264
  length: 0
  type: lixian
  text: 濡須，水名也，在今和州歷陽縣西南。吳錄曰：「孫權聞操來，夾水立塢，狀如偃月，以相拒，月餘乃退。」
- id: hhs.70.p55.a7
  anchor: hhs.70.p55
  at: 270
  length: 0
  type: lixian
  text: 壽春，縣，屬淮南郡，今壽州郡也。
- id: hhs.70.p55.a8
  anchor: hhs.70.p55
  at: 295
  length: 0
  type: lixian
  text: 《獻帝春秋》，董承之誅，伏后與父完書，言司空殺董承，帝方爲報怨。完得書以示彧，彧惡之，隱而不言。完以示其妻弟樊普，普封以呈太祖，太祖陰爲之備。彧恐事覺，欲自發之，因求使至鄴，勸太祖以女配帝。太祖曰：「今朝廷有伏后，吾女何得配上？」彧曰：「伏后無子，性又凶邪，往甞與父書，言詞醜惡，可因此廢也。」太祖曰：「卿昔何不道之？」彧陽驚曰：「昔已甞爲公言也。」太祖曰：「此豈小事，而吾忘之！」太祖以此恨彧，而外含容之。至董昭建魏公議，彧意不同，欲言之於太祖，乃齎璽書犒軍，飲饗禮畢，彧請間，太祖知彧欲言，揖而遣之，遂不得。留之，卒於壽春。
- id: hhs.70.p55.a9
  anchor: hhs.70.p55
  at: 308
  length: 0
  type: lixian
  text: 祖日謂祭祖神之日，因爲讌樂也。《風俗通》曰：「共工氏子曰脩，好遠遊，祀以爲祖神。漢以午日祖。」
- id: hhs.70.p55.t2
  anchor: hhs.70.p55
  at: 313
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 213
  era: 建安
  era_year: 18
  reasoning: 「明年」 = 当前年 建安17年 (AD 212) 之次年 = AD 213
- id: hhs.70.p56.a1
  anchor: hhs.70.p56
  at: 14
  length: 0
  type: lixian
  text: 詩曰：「百川沸騰。」
- id: hhs.70.p56.a2
  anchor: hhs.70.p56
  at: 22
  length: 0
  type: lixian
  text: 趙岐注《孟子》曰：「倒縣猶困苦也。」
- id: hhs.70.p56.a3
  anchor: hhs.70.p56
  at: 37
  length: 0
  type: lixian
  text: 間關猶展轉也。
- id: hhs.70.p56.a4
  anchor: hhs.70.p56
  at: 43
  length: 0
  type: lixian
  text: 措，置也。
- id: hhs.70.p56.a5
  anchor: hhs.70.p56
  at: 72
  length: 0
  type: lixian
  text: 言彧本心不背漢也，
- id: hhs.70.p56.a6
  anchor: hhs.70.p56
  at: 86
  length: 0
  type: lixian
  text: 紓，緩也，音舒。
- id: hhs.70.p56.a7
  anchor: hhs.70.p56
  at: 166
  length: 0
  type: lixian
  text: 兩國謂齊與吳也。端木賜字子貢，衞人也。田常欲伐魯，仲尼令出使勸田常伐吳，常許之。賜又至吳，請夫差伐齊。又之越，說句踐將兵助吳。又之晉，說以兵待吳伐齊之弊。吳旣勝齊，與晉爭彊，晉果敗吳，越襲其後，遂殺夫差。故子貢一出，存魯，亂齊，破吳，彊晉，霸越。
- id: hhs.70.p56.a8
  anchor: hhs.70.p56
  at: 192
  length: 0
  type: lixian
  text: 子貢不欲違仁義而致晉，但其事不兼濟也。言彧豈願彊曹氏令代漢哉？事不得已也。
- id: hhs.70.p56.a9
  anchor: hhs.70.p56
  at: 199
  length: 0
  type: lixian
  text: 《易》曰：「屯如邅如。」邅音竹連反。
- id: hhs.70.p56.a10
  anchor: hhs.70.p56
  at: 220
  length: 0
  type: lixian
  text: 謂魏太祖功業大而神器自歸也。
- id: hhs.70.p57.a1
  anchor: hhs.70.p57
  at: 18
  length: 0
  type: lixian
  text: 謂詭辭以對卓。
- id: hhs.70.p57.a2
  anchor: hhs.70.p57
  at: 23
  length: 0
  type: lixian
  text: 揮，散也。
- id: hhs.70.p57.a3
  anchor: hhs.70.p57
  at: 33
  length: 0
  type: lixian
  text: 逸，縱也。頓挫猶抑揚也。
- id: hhs.70.p57.a4
  anchor: hhs.70.p57
  at: 53
  length: 0
  type: lixian
  text: 直轡，直道也。言其道無所歸，謀謨之高欲誰佐也。
- id: hhs.70.p57.a5
  anchor: hhs.70.p57
  at: 73
  length: 0
  type: lixian
  text: 迹若可疑，心如一心。
