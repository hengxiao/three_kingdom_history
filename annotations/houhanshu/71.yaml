  at: 98
  length: 0
  type: lixian
  text: 《史記》曰：白起，郿人也，善用兵，事秦昭王為大良造。攻魏，拔之。後五年，攻趙，拔光狼城。後七年，攻楚，拔鄢、鄧五城。明年，拔郢，燒夷陵，遂東至竟陵。樂毅，趙人也，賢而好兵，燕昭王以為亞卿，後為上將軍。伐齊，入臨淄，靚齊五歲，下齊七十餘城。
