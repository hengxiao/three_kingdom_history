- id: hhs.71.p2.a4
  anchor: hhs.71.p2
  at: 381
  length: 0
  type: lixian
  text: 蛾音魚綺反，即「蟻」字也。諭賊衆多，故以為名。
- id: hhs.71.p2.a5
  anchor: hhs.71.p2
  at: 503
  length: 0
  type: lixian
  text: 大谷、轘轅在洛陽東南，旋門在汜水之西。
- id: hhs.71.p3.a1
  anchor: hhs.71.p3
  at: 53
  length: 0
  type: lixian
  text: 《孫子兵法》曰：「凡戰者，以正合，以奇勝者也。故善出奇，無窮如天地，無竭如江海。戰勢不過奇正。奇正之變，不可勝也。」
- id: hhs.71.p3.a2
  anchor: hhs.71.p3
  at: 96
  length: 0
  type: lixian
  text: 田單為齊將，守即墨城。燕師攻城，田單取牛千頭，衣以五采，束矛盾於其角，繫火於其尾，穿城而出，城上大噪，燕師大敗。事見《史記》。
- id: hhs.71.p3.a3
  anchor: hhs.71.p3
  at: 114
  length: 0
  type: lixian
  text: 苣音巨。說文云：「束葦燒之。」
- id: hhs.71.p3.h1
  anchor: hhs.71.p3
  at: 154
  length: 2
