  at: 73
  length: 0
  type: lixian
  text: 《獻帝春秋》曰：「初卓為前將軍，嵩為左將軍，俱征邊章、韓遂，爭雄。及嵩拜車下，卓曰：『可以服未？』嵩曰：『安知明公乃至於是？』卓曰：『鴻鵠固有遠志，但燕雀自不知耳。』嵩曰：『昔與明公俱為鴻鵠，但明公今日變為鳳皇耳。』」
