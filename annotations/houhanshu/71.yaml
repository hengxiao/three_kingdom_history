- id: hhs.71.p5.a1
  anchor: hhs.71.p5
  at: 38
  length: 0
  type: lixian
  text: 杜元凱注《左傳》曰：「積屍封土於其上，謂之京觀。」
- id: hhs.71.p5.a2
  anchor: hhs.71.p5
  at: 67
  length: 0
  type: lixian
  text: 並屬扶風。
- id: hhs.71.p7.a1
  anchor: hhs.71.p7
  at: 31
  length: 0
  type: lixian
  text: 干謂冒進。
- id: hhs.71.p7.a2
  anchor: hhs.71.p7
  at: 144
  length: 0
  type: lixian
  text: 老子曰：「天道無親，常與善人。」易曰：「人謀鬼謀，百姓與能。」淮南子曰：「凡命將，主親授鉞，曰：『從此上至天，將軍制之。』」
- id: hhs.71.p8.a1
  anchor: hhs.71.p8
  at: 46
  length: 0
  type: lixian
  text: 前書，項羽使武涉說韓信，信曰：「漢王解衣衣我，推食食我，背之不祥。」又蒯通說信，令信背漢，參分天下，鼎足而立。信曰：「漢王遇我厚，豈可背之哉？」後信謀反，為呂後所執，歎曰：「吾不用蒯通計，為女子所詐，豈非天哉！」
- id: hhs.71.p8.a2
  anchor: hhs.71.p8
  at: 80
  length: 0
  type: lixian
  text: 「撝」即「麾」字，古通用。叱宛，怒聲也。
- id: hhs.71.p8.a3
  anchor: hhs.71.p8
  at: 90
  length: 0
  type: lixian
  text: 扺音紙。扺，擊也。
- id: hhs.71.p8.a4
  anchor: hhs.71.p8
  at: 226
  length: 0
  type: lixian
  text: 寶器猶神器也，謂天位也。
- id: hhs.71.p8.a5
  anchor: hhs.71.p8
  at: 301
  length: 0
  type: lixian
  text: 《左氏傳》韓宣子曰：「同惡相求，如市賈焉。」
- id: hhs.71.p8.a6
  anchor: hhs.71.p8
  at: 321
  length: 0
  type: lixian
  text: 《史記》范蠡曰：「大名之下，難以久居。」
- id: hhs.71.p8.a7
  anchor: hhs.71.p8
  at: 450
  length: 0
  type: lixian
  text: 二句皆《左傳》之辭。
