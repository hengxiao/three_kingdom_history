- id: hhs.71.p41.a6
  anchor: hhs.71.p41
  at: 186
  length: 0
  type: lixian
  text: 斂策，不論其功。
- id: hhs.71.p41.a7
  anchor: hhs.71.p41
  at: 260
  length: 0
  type: lixian
  text: 《論語》曰，顏回曰：「願無伐善，無施勞。」
- id: hhs.71.p42.a1
  anchor: hhs.71.p42
  at: 23
  length: 0
  type: lixian
  text: 老子曰：「功成而不居。」
- id: hhs.71.p42.a2
  anchor: hhs.71.p42
  at: 34
  length: 0
  type: lixian
  text: 謂平許昭也。于，語辭，猶云「句吳」之類矣。
- id: hhs.71.p42.a3
  anchor: hhs.71.p42
  at: 44
  length: 0
  type: lixian
  text: 蹷，猶躓也。
