  type: lixian
  text: 《孫子兵法》曰：「善守者藏於九地之下，善攻者動於九天之上。」玄女三宮戰法曰：「行兵之道，天地之寶。九天九地，各有表裏。九天之上，六甲子也。九地之下，六癸酉也。子能順之，萬全可保。」
