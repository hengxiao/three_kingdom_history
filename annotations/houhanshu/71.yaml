  text: 皇甫嵩
  via: primary
- id: hhs.71.p41.a1
  anchor: hhs.71.p41
  at: 23
  length: 0
  type: lixian
  text: 《春秋左氏傳》曰：「國之大事在祀與戎。祀有執膰，戎有受脤。」脤，宜社之肉也。爾雅曰：「舉大事，動大衆，必先有事於社然後出，謂之宜。」
- id: hhs.71.p41.a2
  anchor: hhs.71.p41
  at: 63
  length: 0
  type: lixian
  text: 新序曰：「楚白公勝既殺令尹、司馬，欲立王子閭為王。王子閭不肯，劫之以刃。王子閭曰：『吾聞辭天下者，非輕其利以明其德也。不為諸侯者，非惡其位以絜其行也。今子告我以利，威我以兵，吾不為也。』白公強之，不可，遂殺之。葉公子高率楚衆以誅白公，而反惠王於國。」投袂，奮袂也，言其怒也。《左氏傳》曰：「楚子聞之，投袂而起。」翟義，方進之子，舉兵將誅王莽，事見前書。詩曰：「陳師鞠旅。」鄭玄注云：「鞠，告也。」
- id: hhs.71.p41.a3
  anchor: hhs.71.p41
  at: 100
  length: 0
  type: lixian
  text: 山東連盟謂上雲腢帥及袁氏也。書稱「伊尹格於皇天」。《論語》曰：「豈若匹夫匹婦之為諒也。」《莊子》云，孔子見盜跖，退曰：「吾幾不免虎口。」
- id: hhs.71.p41.a4
  anchor: hhs.71.p41
  at: 134
  length: 0
  type: lixian
  text: 華嶠譜序曰：「表字偉容，歆之子也。年二十餘，為散騎常侍。」
- id: hhs.71.p41.a5
  anchor: hhs.71.p41
  at: 142
  length: 0
  type: lixian
  text: 《三國志》曰：「歆字子魚。」
- id: hhs.71.p41.h2
  anchor: hhs.71.p41
  at: 147
  length: 3
  type: person
  person_id: huangfusong
  text: 皇甫嵩
  via: primary
