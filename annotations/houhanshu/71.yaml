  length: 0
  type: lixian
  text: 錢塘，今杭州縣也。《錢塘記》云：「昔郡議曹華信義立此塘，以防海水。始開募，有能致土石一斛，與錢一千，旬日之閒，來者雲集。塘未成而譎不復取，皆遂棄土石而去，塘以之成也。」
- id: hhs.71.p30.a1
