- id: hhs.76.p58.a1
  anchor: hhs.76.p58
  at: 31
  length: 0
  type: lixian
  text: 《吳志》曰：「平原陶丘洪薦繇，欲令舉茂才。刺史曰：『前年舉公山，柰何復舉正禮？』洪曰：『若明〔使〕君用公山於前，擢正禮於後，所謂御二龍於長塗，騁騏驥於千里，不亦可乎？』」
