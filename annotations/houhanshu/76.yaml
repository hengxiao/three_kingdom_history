- id: hhs.76.p70.a1
  anchor: hhs.76.p70
  at: 9
  length: 0
  type: lixian
  text: 《韓詩外傳》曰：「水濁則魚喁，令苛則人亂。理國者譬若張琴然，大弦急則小絃絕矣。故急轡銜者，非千里之御也。」
- id: hhs.76.p70.a2
  anchor: hhs.76.p70
  at: 14
  length: 0
  type: lixian
  text: 老子曰「理大國者若亨小鮮」也。
- id: hhs.76.p70.a3
  anchor: hhs.76.p70
  at: 24
  length: 0
  type: lixian
  text: 推忠恕以及於人，則眾病自蠲除。
- id: hhs.76.p70.a4
  anchor: hhs.76.p70
  at: 34
  length: 0
  type: lixian
  text: 一夫謂守長也。千室謂黎庶。言上得化下之情，則其下鳴弦而安樂也。
- id: hhs.76.p70.a5
  anchor: hhs.76.p70
  at: 44
  length: 0
  type: lixian
  text: 沈約《宋書》載曄與其姪及甥書，論撰書之意曰：「吾觀史書，恆覺其不可解。既造後漢，轉得統緒。詳觀古今著述及評論，殆少可得意者。班氏最有高名，既任情無例，不可甲乙。博贍不可及之，整理未必愧也。吾雜傳論皆有精意深旨，至於循吏已下及六夷諸序論，筆埶縱放，實天下之奇作，其中合者，往往不減過秦篇。嘗比方班氏所作，非但不愧之而已。又欲因事發論，以正一代得失，意復未果。贊自是吾文之傑思，殆無一字空設。此書行，故應有賞音者。紀傳例為舉其大略耳。諸細意甚多，自古體大而思精，未有此也。恐俗人不能盡之，多貴古賤今，所以稱情狂言耳。」
