- id: hhs.76.p54.a1
  anchor: hhs.76.p54
  at: 19
  length: 0
  type: lixian
  text: 東平陵，縣名，屬濟南郡也。
- id: hhs.76.p55.a1
  anchor: hhs.76.p55
  at: 33
  length: 0
  type: lixian
  text: 願，謹也。《風俗通》曰「俗說市井者，言至市有所鬻賣，當於井上先濯，乃到市也。謹案《春秋井田記》，人年三十，受田百畝，以食五口。五口為一戶，父母妻子也。公田十畝，廬舍五畝，成田一頃十五畝。八家而九頃二十畝，共為一井。廬舍在內，貴人也。公田次之，重公也。私田在外，賤私也。井田之義，一曰無洩地氣，二曰無費一家，三曰同風俗，四曰合巧拙，五曰通財貨。因井為市，交易而退，故稱市井」也。
- id: hhs.76.p55.a2
  anchor: hhs.76.p55
  at: 77
  length: 0
  type: lixian
  text: 尨，雜也。老者眉雜白黑也。
- id: hhs.76.p55.a3
  anchor: hhs.76.p55
  at: 85
  length: 0
  type: lixian
  text: 若邪，在今越州會稽縣東南也。
