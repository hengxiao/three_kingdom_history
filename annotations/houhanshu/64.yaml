  type: lixian
  text: 決錄註：「襲字符嗣。先是杜伯度、崔子玉以工草書稱於前代，襲與羅暉拙書，見蚩於張伯英。英頗自鄉高，與朱賜書云『上比崔、杜不足，下方羅、趙有餘』」也。
