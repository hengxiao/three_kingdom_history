- id: hhs.64.p43.a1
  anchor: hhs.64.p43
  at: 17
  length: 0
  type: lixian
  text: 蓐，寢蓐也。聲類曰：「蓐，薦也。」
- id: hhs.64.p43.a2
  anchor: hhs.64.p43
  at: 47
  length: 0
  type: lixian
  text: 易曰：「遯而亨，君子以遠小人。」王弼註：「遯之義，避內而之外者也。」箕山，許由所隱處也。
