  anchor: hhs.64.p33
  at: 449
  length: 0
  type: lixian
  text: 後以王甫、程阿所構，憂死，父及兄弟並被誅。靈帝后夢見桓帝怒曰「宋皇後何罪而絕其命？已訴於天，上帝震怒，罪在難救」也。
