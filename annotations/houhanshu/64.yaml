  type: lixian
  text: 魏志曰，建安十二年，操北征烏桓，涉鮮卑，討柳城，登白狼山也。
- id: hhs.64.p39.a3
  anchor: hhs.64.p39
  at: 97
  length: 0
  type: lixian
  text: 左傳曰：「仲尼聞子產死，出涕曰：『古之遺愛也。』」
- id: hhs.64.p39.a4
  anchor: hhs.64.p39
  at: 106
  length: 0
  type: lixian
  text: 公羊傳曰：「君子之善善也長，惡惡也短。惡惡止其身，善善及子孫。賢者子孫，故君子為之諱也。」
- id: hhs.64.p39.a5
  anchor: hhs.64.p39
  at: 116
  length: 0
  type: lixian
  text: 亟，急也。
- id: hhs.64.p39.a6
  anchor: hhs.64.p39
  at: 128
  length: 0
  type: lixian
  text: 醊，祭酹也。音張芮反。
- id: hhs.64.p40.a1
  anchor: hhs.64.p40
  at: 22
  length: 0
  type: lixian
  text: 魏志曰：「毓字子家，十歲而孤，以學行稱，仕魏至侍中、吏部尚書。時舉中書郎，詔曰：『得其人與不，在盧生耳。選舉莫取有名，如畫地為餅，不可啖也。』毓對曰：『名不足以致異人，而可以得常士。常士畏教慕善，然後有名也。』」論曰：風霜以別草木之性，[一]危亂而見貞良之節，[二]則盧公之心可知矣。
- id: hhs.64.p40.a2
  anchor: hhs.64.p40
  at: 32
  length: 0
  type: lixian
  text: 論語曰：「歲寒然後知松柏之後雕也。」
- id: hhs.64.p40.a3
  anchor: hhs.64.p40
  at: 57
  length: 0
  type: lixian
  text: 老子曰：「國家昏亂有忠臣。」
- id: hhs.64.p40.a4
  anchor: hhs.64.p40
  at: 82
  length: 0
  type: lixian
  text: 孟賁，多力者也；夏育，勇者也：並□人。荊，荊軻也。諸，專諸也。
- id: hhs.64.p41.h1
  anchor: hhs.64.p41
  at: 0
  length: 2
  type: person
