  text: 靈帝
  via: alias
- id: hhs.64.p29.a1
  anchor: hhs.64.p29
  at: 57
  length: 0
  type: lixian
  text: 融，明德皇后之從侄也。
- id: hhs.64.p29.a2
  anchor: hhs.64.p29
  at: 65
  length: 0
  type: lixian
  text: 左傳曰，范獻子曰：「人亦有言，嫠不恤其緯而憂宗周之隕，為將及焉。」杜預注曰：「嫠，寡婦也。織者常苦緯少，寡婦所宜憂也。」
- id: hhs.64.p29.a3
  anchor: hhs.64.p29
  at: 75
  length: 0
  type: lixian
  text: 琴操曰：「魯漆室女倚柱悲吟而嘯，□人見其心之不樂也，進而問之曰：
- id: hhs.64.p29.a4
  anchor: hhs.64.p29
  at: 86
  length: 0
  type: lixian
  text: 詩序曰：「憂深思遠，儉而用禮，乃有堯之遺風焉。」
- id: hhs.64.p29.a5
  anchor: hhs.64.p29
  at: 95
  length: 0
  type: lixian
  text: 孝經曰：「士有爭友，身不陷於不義。」詩云：「如切如磋。」鄭玄注云：「骨曰切，像曰磋。言友之相規誡，如骨象之見切磋。」
- id: hhs.64.p29.a6
  anchor: hhs.64.p29
  at: 104
  length: 0
  type: lixian
  text: 尚書洪範曰「謀及卿士，謀及庶人」也。
- id: hhs.64.p29.a7
  anchor: hhs.64.p29
  at: 120
  length: 0
  type: lixian
  text: 詩大雅曰：「先人有言，詢於芻蕘。」毛萇注云：「芻蕘，采薪者也。」
- id: hhs.64.p29.a8
  anchor: hhs.64.p29
  at: 173
  length: 0
  type: lixian
  text: 無目□曰瞽。□音直忍反。
- id: hhs.64.p29.a9
  anchor: hhs.64.p29
  at: 186
  length: 0
  type: lixian
  text: 前書賈山曰「使天下戴目而視，傾耳而聽」也。
- id: hhs.64.p29.a10
  anchor: hhs.64.p29
  at: 215
  length: 0
  type: lixian
  text: 景風，解見和紀。
- id: hhs.64.p29.a11
  anchor: hhs.64.p29
  at: 247
  length: 0
  type: lixian
  text: 左傳王子朝曰：「先王之命，王后無嫡，則擇立長。年鈞以德，德鈞以卜，古之制也。」
- id: hhs.64.p29.a12
  anchor: hhs.64.p29
  at: 264
  length: 0
  type: lixian
  text: 叨，貪也。左傳曰「貪天之功，以為己力」也。
- id: hhs.64.p29.a13
  anchor: hhs.64.p29
  at: 291
  length: 0
  type: lixian
  text: 競，強也。
- id: hhs.64.p29.a14
  anchor: hhs.64.p29
  at: 310
  length: 0
  type: lixian
  text: 勃，勃海也。碣，碣石山也。
- id: hhs.64.p29.a15
  anchor: hhs.64.p29
  at: 365
  length: 0
  type: lixian
  text: 左傳曰，楚公子比，恭王之子也。靈王立，子比奔晉。靈王卒，子比自晉歸楚，立為君。比弟公子□疾欲篡其位，夜乃使人周走呼曰：「王至矣。」國人大驚，子比乃自殺。王子朝，周景王之庶子。景王卒，子猛立。尹氏，周卿士，立子朝，奪猛位也。
- id: hhs.64.p29.t1
  anchor: hhs.64.p29
  at: 395
  length: 4
  type: temporal
