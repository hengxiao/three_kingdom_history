  anchor: hhs.64.p52
  at: 13
  length: 0
  type: lixian
  text: 決錄注曰「岐還至陳倉，復遇亂兵，裸身得免，在草中十二日不食」也。
- id: hhs.64.p52.a2
  anchor: hhs.64.p52
  at: 44
  length: 0
  type: lixian
  text: 壽藏謂塚壙也。稱壽者，取其久遠之意也。猶如壽宮、壽器之類。頤在今荊州古郢城中也。
- id: hhs.64.p52.a3
  anchor: hhs.64.p52
  at: 54
  length: 0
  type: lixian
  text: 決錄序曰：「三輔者，本雍州之地，世世徙公卿吏二千石及高貲，皆以陪諸陵。五方之俗雜會，非一國之風，不但繫於詩秦、豳也。其為士好高尚義，貴於名行。其俗失則趣埶進權，唯利是視。余以不才，生於西土，耳能聽而聞故老之言，目能視*[而]*見衣冠之疇，心能識而觀其賢愚。常以玄冬，夢黃發之士，姓玄名明，字子真，與余寤言，言必有中，善否之閒，無所依違，命操筆者書之。近從建武以來，暨於斯今，其人既亡，行乃可書，玉石朱紫，由此定矣，故謂之決錄矣。」
