chapter: hhs.64
source:
  id: wikisource
  url: https://zh.wikisource.org/wiki/後漢書/卷64
  retrieved: '2026-05-03'
  sha256: 00a31b9b1a4b551030d1c06dee2ea10b4967f7b5c61daa47fd3bfd66dd1e7b61
annotations:
- id: hhs.64.p2.a1
  anchor: hhs.64.p2
  at: 6
  length: 0
  type: lixian
  text: 佑音又。續漢書作「佑」。
- id: hhs.64.p2.a2
  anchor: hhs.64.p2
  at: 22
  length: 0
  type: lixian
  text: 「恢」或作「惔」，音徒濫反。
- id: hhs.64.p2.a3
  anchor: hhs.64.p2
  at: 42
  length: 0
  type: lixian
  text: 殺青者，以火炙簡令汗，取其青易書，復不蠹，謂之殺青，亦謂汗簡。義見劉向別錄也。
- id: hhs.64.p2.a4
  anchor: hhs.64.p2
  at: 55
  length: 0
  type: lixian
  text: 領者，西自衡山之南，東至於海，一山之限耳，別標名則有五焉。裴氏廣*(川)**[州]*記云：「大庾、始安、臨賀、桂陽、揭陽，是為五領。」鄧德明南康記曰：「大庾，一也；桂陽甲騎，二也；九真都龐，三也；臨賀萌渚，四也；始安越城，五也。」裴氏之說則為審矣。
- id: hhs.64.p2.a5
  anchor: hhs.64.p2
  at: 85
  length: 0
  type: lixian
  text: 希望其贈遺也。
- id: hhs.64.p2.a6
  anchor: hhs.64.p2
  at: 96
  length: 0
  type: lixian
  text: 車有兩輪，故稱「兩」也。
- id: hhs.64.p2.a7
  anchor: hhs.64.p2
  at: 113
  length: 0
  type: lixian
  text: 徼，要也，音工堯反。前書曰，王陽好車馬，衣服鮮明，而遷徙轉移，所載不過囊橐。時人怪其奢，伏其儉，故俗傳王陽能作黃金。
- id: hhs.64.p2.a8
  anchor: hhs.64.p2
  at: 146
  length: 0
  type: lixian
  text: 季子謂季札也。
- id: hhs.64.p2.a9
  anchor: hhs.64.p2
  at: 174
  length: 0
  type: lixian
  text: 續漢書曰「年四十餘，乃為郡吏」也。
- id: hhs.64.p3.a1
  anchor: hhs.64.p3
  at: 5
  length: 0
  type: lixian
  text: 陳留耆舊傳曰：「太守冷宏召補文學，宏見異之，擢舉孝廉。」
- id: hhs.64.p3.a2
  anchor: hhs.64.p3
  at: 35
  length: 0
  type: lixian
  text: 祖道之禮，封土為軷□也。五經要義曰：「祖道者，行祭為道路祈也。」周禮太馭：「掌王玉路以祀，及*(祀)**[犯]*軷。」注云：「*[犯]*軷*(祀)*者，封土象山於路側，以*[菩]*芻□□為神主祭之，以車轢軷而去。喻無險難。」
- id: hhs.64.p4.a1
  anchor: hhs.64.p4
  at: 18
  length: 0
  type: lixian
  text: 謝承書曰：「真字夏甫。」
- id: hhs.64.p5.a1
  anchor: hhs.64.p5
  at: 12
  length: 0
  type: lixian
  text: 漢官儀曰「四行，敦厚、質樸、遜讓、節儉」也。
- id: hhs.64.p6.a1
  anchor: hhs.64.p6
  at: 32
  length: 0
  type: lixian
  text: 東夏，東方也。尚書曰「尹茲東夏」也。
- id: hhs.64.p6.a2
  anchor: hhs.64.p6
  at: 39
  length: 0
  type: lixian
  text: 濟北先賢傳曰「宏字符襄，剛縣人也。年二十二，為郡督郵，曾以職事見詰，府君欲撻之。宏曰：『今鄙郡遭明府，鹹以為仲尼之君，國小人少，以宏為顏回，豈聞仲尼有撻顏回之義？』府君異其對，即日教署主簿」也。
- id: hhs.64.p6.a3
  anchor: hhs.64.p6
  at: 110
  length: 0
  type: lixian
  text: 續漢書曰：「賦錢五百，為父市單衣。」
- id: hhs.64.p7.a1
  anchor: hhs.64.p7
  at: 27
  length: 0
  type: lixian
  text: 論語載孔子之言也。
- id: hhs.64.p7.a2
  anchor: hhs.64.p7
  at: 107
  length: 0
  type: lixian
  text: 論語孔子曰：「忿思難。」又曰：「一朝之忿，忘其身以及其親，非惑與？」
- id: hhs.64.p7.a3
  anchor: hhs.64.p7
  at: 114
  length: 0
  type: lixian
  text: 若，汝也。逞，快也。
- id: hhs.64.p7.a4
  anchor: hhs.64.p7
  at: 141
  length: 0
  type: lixian
  text: 在手曰械。
- id: hhs.64.p8.a1
  anchor: hhs.64.p8
  at: 122
  length: 0
  type: lixian
  text: 謂以繩為繯，投之而縊也。繯音胡犬反。
- id: hhs.64.p9.a1
  anchor: hhs.64.p9
  at: 7
  length: 0
  type: lixian
  text: 陳留耆舊傳曰：「佑處同僚，無私書之問，上司無箋檄之敬。在膠東，書不入京師也。」
- id: hhs.64.p9.h1
  anchor: hhs.64.p9
  at: 27
  length: 2
  type: person
  person_id: ligu
  text: 李固
  via: primary
- id: hhs.64.p9.h2
  anchor: hhs.64.p9
  at: 47
  length: 2
  type: person
  person_id: marong
  text: 馬融
  via: primary
- id: hhs.64.p10.a1
  anchor: hhs.64.p10
  at: 28
  length: 0
  type: lixian
  text: 鮦陽，縣，屬汝南郡。音紂。
- id: hhs.64.p10.a2
  anchor: hhs.64.p10
  at: 34
  length: 0
  type: lixian
  text: 陳留耆舊傳曰：「鳳字君雅，馮字子高。」
- id: hhs.64.p11.h1
  anchor: hhs.64.p11
  at: 0
  length: 2
  type: person
  person_id: yandu
  text: 延篤
  via: primary
- id: hhs.64.p11.a1
  anchor: hhs.64.p11
  at: 12
  length: 0
  type: lixian
  text: 犨音昌猶反，故城在汝州魯山縣東南也。
- id: hhs.64.p11.a2
  anchor: hhs.64.p11
  at: 24
  length: 0
  type: lixian
  text: 先賢行狀曰：「典字季度，為西鄂長。」風俗通曰：「吳夫□王奔楚，封堂溪，因以為氏。」典為五官中郎將。「唐」與「堂」同也。
- id: hhs.64.p11.a3
  anchor: hhs.64.p11
  at: 35
  length: 0
  type: lixian
  text: 先賢行狀曰：「篤欲寫左氏傳，無紙，唐溪典以廢箋記與之。篤以箋記紙不可寫傳，乃借本諷之，徹盡辭歸。典曰：『卿欲寫傳，何故辭歸？』篤曰：『已諷之矣。』典聞之歎曰：『嗟乎延生！雖復端木聞一知二，未足為喻。若使尼父更起於洙、泗，君當編名七十，與游、夏爭匹也。』」舉孝廉，為平陽侯相。到官，表龔遂之墓，立銘祭祠，擢用其後於畎畝之閒。[一]以師喪□官奔赴，五府並辟不就。
- id: hhs.64.p11.h2
  anchor: hhs.64.p11
  at: 37
  length: 2
  type: person
  person_id: marong
  text: 馬融
  via: primary
- id: hhs.64.p12.h1
  anchor: hhs.64.p12
  at: 0
  length: 2
  type: person
  person_id: huanhan
  text: 桓帝
  via: alias
- id: hhs.64.p12.a1
  anchor: hhs.64.p12
  at: 40
  length: 0
  type: lixian
  text: 前書龔遂，山陽南平陽人，為勃海太守。南平陽故城*[在]*今兗州鄒縣。
- id: hhs.64.p12.a2
  anchor: hhs.64.p12
  at: 119
  length: 0
  type: lixian
  text: 谷梁傳曰：「故士造辟而言，詭辭而出。」范寧注云：「辟，君也。詭辭而出，不以實告人也。」
- id: hhs.64.p13.a1
  anchor: hhs.64.p13
  at: 32
  length: 0
  type: lixian
  text: 前書，趙廣漢、張敞、王遵、王章、王駿俱為京兆尹也。
- id: hhs.64.p14.a1
  anchor: hhs.64.p14
  at: 25
  length: 0
  type: lixian
  text: 吳普本草曰：「牛黃味苦，無毒，牛出入呻者有之。夜有光走角中。牛死，入膽中，如□子黃。」神農本草曰：「療驚□，除邪逐鬼。」
- id: hhs.64.p14.a2
  anchor: hhs.64.p14
  at: 40
  length: 0
  type: lixian
  text: 辯，爭也。
- id: hhs.64.p14.a3
  anchor: hhs.64.p14
  at: 46
  length: 0
  type: lixian
  text: 代，更也。
- id: hhs.64.p14.a4
  anchor: hhs.64.p14
  at: 58
  length: 0
  type: lixian
  text: 篤，厚也。
- id: hhs.64.p14.a5
  anchor: hhs.64.p14
  at: 81
  length: 0
  type: lixian
  text: 二致，仁、孝也。易系詞曰「殊塗而同歸，百慮而一致」也。
- id: hhs.64.p15.a1
  anchor: hhs.64.p15
  at: 31
  length: 0
  type: lixian
  text: 較猶略也。
- id: hhs.64.p15.a2
  anchor: hhs.64.p15
  at: 57
  length: 0
  type: lixian
  text: 說文曰：「縟，繁彩飾也。」
- id: hhs.64.p17.a1
  anchor: hhs.64.p17
  at: 20
  length: 0
  type: lixian
  text: 四體謂手足也。
- id: hhs.64.p17.a2
  anchor: hhs.64.p17
  at: 45
  length: 0
  type: lixian
  text: 左氏傳趙簡子問子太叔：「何謂禮？」對曰：「聞諸先大夫子產曰：『夫禮，天之經也，地之義也，人之行也。天地之經，人實則之，則天之明，因地之性。』」孔子取為孝經之詞也。
- id: hhs.64.p17.a3
  anchor: hhs.64.p17
  at: 117
  length: 0
  type: lixian
  text: 論語載有若之詞也。
- id: hhs.64.p17.a4
  anchor: hhs.64.p17
  at: 146
  length: 0
  type: lixian
  text: 論語孔子曰：「參也魯，回也其庶乎？」言庶幾於善道也。魯，鈍也。言若先孝後仁，則曾參不得不賢於顏子。
- id: hhs.64.p17.a5
  anchor: hhs.64.p17
  at: 166
  length: 0
  type: lixian
  text: 虞舜、顏回純德既備，或仁或孝，但隨其所稱爾。
- id: hhs.64.p17.a6
  anchor: hhs.64.p17
  at: 177
  length: 0
  type: lixian
  text: 史記，公劉，後稷曾孫也。能修復後稷之業，務耕種，行地宜，百姓懷之，多從而保歸焉。故公劉以仁紀德，曾參以至孝稱賢，此則各自為目，不能總兼其美也。
- id: hhs.64.p17.a7
  anchor: hhs.64.p17
  at: 186
  length: 0
  type: lixian
  text: 曾參、閔損也。
- id: hhs.64.p18.a1
  anchor: hhs.64.p18
  at: 72
  length: 0
  type: lixian
  text: 論語孔子曰：「桓公九合諸侯，不以兵車，管仲之力，如其仁，如其仁。」九合者，謂再會於鄄，兩會於幽，又會檉、首止、戴寧、母洮、葵丘也。
- id: hhs.64.p18.a2
  anchor: hhs.64.p18
  at: 105
  length: 0
  type: lixian
  text: 論語孔子曰：「道之將行也與？命也。道之將廢也與？命也。」
- id: hhs.64.p18.a3
  anchor: hhs.64.p18
  at: 134
  length: 0
  type: lixian
  text: 孔安國注尚書曰：「昧，暝也。爽，明也。」
- id: hhs.64.p18.a4
  anchor: hhs.64.p18
  at: 146
  length: 0
  type: lixian
  text: 周公攝政七年，制禮作樂。班固東都賦曰「今論者但知誦虞、夏之書，詠殷、周之詩，講羲、文之易，論孔氏之春秋」也。
- id: hhs.64.p18.a5
  anchor: hhs.64.p18
  at: 156
  length: 0
  type: lixian
  text: 楚詞：「高堂邃宇，鏤檻層軒。」王逸注云：「軒，樓板也。」
- id: hhs.64.p18.a6
  anchor: hhs.64.p18
  at: 164
  length: 0
  type: lixian
  text: 言誦經典之餘，投射閒隙而翫百氏也。
- id: hhs.64.p18.a7
  anchor: hhs.64.p18
  at: 172
  length: 0
  type: lixian
  text: 洋洋，美也。論語曰：「洋洋乎盈耳哉。」
- id: hhs.64.p18.a8
  anchor: hhs.64.p18
  at: 199
  length: 0
  type: lixian
  text: 渙爛，文章貌也。
- id: hhs.64.p18.a9
  anchor: hhs.64.p18
  at: 223
  length: 0
  type: lixian
  text: 宋玉大言賦曰「方地為輿，員天為蓋」也。
- id: hhs.64.p18.a10
  anchor: hhs.64.p18
  at: 233
  length: 0
  type: lixian
  text: 說文曰：「築，五弦之樂也。」沈約宋書曰：「築不知誰所造也。史記唯雲高漸離擊築。」案：今築形似箏，有項有柱。史記，荊軻至燕，日與屠狗及高漸離擊築，荊軻和而歌於巿中，相樂，已而相泣，傍若無人。
- id: hhs.64.p18.a11
  anchor: hhs.64.p18
  at: 251
  length: 0
  type: lixian
  text: 事具逸人傳也。
- id: hhs.64.p18.a12
  anchor: hhs.64.p18
  at: 279
  length: 0
  type: lixian
  text: 束修謂束帶修飾。鄭玄注論語曰「謂年十五已上」也。
- id: hhs.64.p18.a13
  anchor: hhs.64.p18
  at: 296
  length: 0
  type: lixian
  text: 易系詞之文也。
- id: hhs.64.p18.a14
  anchor: hhs.64.p18
  at: 313
  length: 0
  type: lixian
  text: 色媿曰赧，音女板反。
- id: hhs.64.p20.a1
  anchor: hhs.64.p20
  at: 7
  length: 0
  type: lixian
  text: 史記，有養由基者，善射者也，去柳葉百步而射之，百發而百中之。
- id: hhs.64.p20.t1
  anchor: hhs.64.p20
  at: 7
  length: 4
  type: temporal
  text: 永康元年
  kind: absolute
  resolution: absolute
  year_ad: 167
  era: 永康
  era_year: 1
  reasoning: 原文「永康元年」直接出现年号；解析為 AD 167
- id: hhs.64.p20.a2
  anchor: hhs.64.p20
  at: 27
  length: 0
  type: lixian
  text: 錮謂閉塞。
- id: hhs.64.p21.a1
  anchor: hhs.64.p21
  at: 39
  length: 0
  type: lixian
  text: 屈原，楚大夫，抱忠貞而死。篤有志行文彩，故圖其像而偶之焉。
- id: hhs.64.p22.h1
  anchor: hhs.64.p22
  at: 0
  length: 2
  type: person
  person_id: shibi
  text: 史弼
  via: primary
- id: hhs.64.p22.h2
  anchor: hhs.64.p22
  at: 16
  length: 2
  type: person
  person_id: shunhan
  text: 順帝
  via: alias
- id: hhs.64.p22.a1
  anchor: hhs.64.p22
  at: 29
  length: 0
  type: lixian
  text: 訊，問也。蓋荅客難之類。
- id: hhs.64.p22.a2
  anchor: hhs.64.p22
  at: 43
  length: 0
  type: lixian
  text: 續漢書曰「敞為京兆尹，化有能名，尤善條教，見稱於三輔」也。
- id: hhs.64.p23.h1
  anchor: hhs.64.p23
  at: 2
  length: 2
  type: person
  person_id: huanhan
  text: 桓帝
  via: alias
- id: hhs.64.p23.a1
  anchor: hhs.64.p23
  at: 88
  length: 0
  type: lixian
  text: 謝承書曰：「弼年二十為郡功曹，承前太守宋欣穢濁之後，悉條諸生聚斂奸吏百餘人，皆白太守，埽多還縣，高名由此而興。」
- id: hhs.64.p23.a2
  anchor: hhs.64.p23
  at: 97
  length: 0
  type: lixian
  text: 甘昭公王子帶，周襄王弟也，食邑於甘，謚曰昭。左傳曰，初，甘昭公有寵於惠後，後將立之，未及而卒。昭公奔齊。王復之，遂以狄師攻王，王出適鄭也。
- id: hhs.64.p23.a3
  anchor: hhs.64.p23
  at: 163
  length: 0
  type: lixian
  text: 梁孝王，景帝弟，竇太后少子，愛之，賜天子旌旗，出警入蹕。景帝嘗與王宴太后前，曰：「千秋萬歲後傳王。」爰盎諫不許，遂令人刺殺盎也。
- id: hhs.64.p23.a4
  anchor: hhs.64.p23
  at: 184
  length: 0
  type: lixian
  text: 剽，悍也。逞，快也。謂被侵枉不快之人也。左傳曰：「率腢不逞之人。」剽音疋妙反。
- id: hhs.64.p23.a5
  anchor: hhs.64.p23
  at: 206
  length: 0
  type: lixian
  text: 有虛言無實行也。
- anchor: hhs.64.p23
  at: 220
  length: 2
  type: person
  person_id: huanhan
  text: 陛下
  via: llm
  confidence: 0.92
  reasoning: 史弼上封事論桓帝弟勃海王悝事，「陛下隆於友於」即奏桓帝，對應 huanhan。
  id: hhs.64.p23.h2
- id: hhs.64.p23.a6
  anchor: hhs.64.p23
  at: 232
  length: 0
  type: lixian
  text: 前書羊勝勸梁王求漢嗣，伍被勸准南*(子)**[王]*謀反誅也。
- id: hhs.64.p23.a7
  anchor: hhs.64.p23
  at: 242
  length: 0
  type: lixian
  text: 友，親也。尚書曰：「惟孝友于兄弟。」
- id: hhs.64.p24.a1
  anchor: hhs.64.p24
  at: 19
  length: 0
  type: lixian
  text: 滋，長；蔓，延也。左氏傳：「無使滋蔓，蔓難圖也。」
- id: hhs.64.p24.a2
  anchor: hhs.64.p24
  at: 48
  length: 0
  type: lixian
  text: 鉤謂相連也。
- id: hhs.64.p24.a3
  anchor: hhs.64.p24
  at: 60
  length: 0
  type: lixian
  text: 切，急也。□，退也。
- id: hhs.64.p24.a4
  anchor: hhs.64.p24
  at: 83
  length: 0
  type: lixian
  text: 續漢志每州皆有從事史及諸曹掾史。傳，客舍也，音知戀反。坐傳捨召弼而責。
- id: hhs.64.p24.a5
  anchor: hhs.64.p24
  at: 94
  length: 0
  type: lixian
  text: 濟南、樂安、齊國、東萊、平原、北海六郡，青州所管也。青州在齊國臨淄，見漢官儀。
- id: hhs.64.p24.a6
  anchor: hhs.64.p24
  at: 120
  length: 0
  type: lixian
  text: 桓帝為蠡吾侯，受學於甘陵周福，及帝即位，擢福為尚書。時同郡河南尹房植有名當朝，二家賓客互相譏揣，遂各樹朋徒，漸成尤隙，由是甘陵有南北部。見黨人篇序也。
- id: hhs.64.p24.a7
  anchor: hhs.64.p24
  at: 130
  length: 0
  type: lixian
  text: 疆，界也。理，正也。左傳曰「先王疆理天下，物土之宜而布其利」也。
- id: hhs.64.p24.a8
  anchor: hhs.64.p24
  at: 221
  length: 0
  type: lixian
  text: 前書曰「凡人函五常之性，而其剛柔緩急，音聲不同。系水土之風氣，故謂之風。好惡取捨，動靜無常，隨君上之情慾，故謂之俗」也。
- id: hhs.64.p25.a1
  anchor: hhs.64.p25
  at: 52
  length: 0
  type: lixian
  text: '*(奉)**[俸]*音扶用反。'
- id: hhs.64.p25.a2
  anchor: hhs.64.p25
  at: 260
  length: 0
  type: lixian
  text: 屬音之欲反。
- id: hhs.64.p25.a3
  anchor: hhs.64.p25
  at: 271
  length: 0
  type: lixian
  text: 詩□風也。荼，苦菜也。
- id: hhs.64.p25.a4
  anchor: hhs.64.p25
  at: 328
  length: 0
  type: lixian
  text: 刎，割也。楚詞曰「雖九死其猶未悔」也。
- id: hhs.64.p26.a1
  anchor: hhs.64.p26
  at: 0
  length: 0
  type: lixian
  text: 郡邸，若今之寺邸也。
- id: hhs.64.p26.a2
  anchor: hhs.64.p26
  at: 13
  length: 0
  type: lixian
  text: 青州先賢傳曰：「洪字子林，平原人也。清達博辯，文冠當代。舉孝廉，不行，辟太尉府。年三十卒。」
- id: hhs.64.p26.h1
  anchor: hhs.64.p26
  at: 13
  length: 2
  type: person
  person_id: shibi
  text: 史弼
  via: primary
- id: hhs.64.p26.h2
  anchor: hhs.64.p26
  at: 58
  length: 2
  type: person
  person_id: hexiu
  text: 何休
  via: primary
- id: hhs.64.p26.a3
  anchor: hhs.64.p26
  at: 106
  length: 0
  type: lixian
  text: 牖裡，殷獄名。或作「羑」，亦名羑城，在今相州湯陰縣北。帝王紀：「散宜生、南宮括、閎夭學乎呂尚。尚知三人賢，結朋友之交。及紂囚文王，乃以黃金千鎰與宜生，令求諸物與紂。」史記曰「閎夭之徒乃求有莘美女，驪戎文馬，有熊九駟，它奇怪物，因殷孽臣費仲獻之於紂，紂大說，乃赦之」也。
- id: hhs.64.p27.a1
  anchor: hhs.64.p27
  at: 37
  length: 0
  type: lixian
  text: 先賢行狀曰「瑜字雉璜。聰明敏達，觀物無滯。清論所加，必為成器；丑議所指，沒齒無怨」也。
- id: hhs.64.p27.a2
  anchor: hhs.64.p27
  at: 72
  length: 0
  type: lixian
  text: 烝烝猶仍也。
- id: hhs.64.p27.a3
  anchor: hhs.64.p27
  at: 86
  length: 0
  type: lixian
  text: 法言曰：「君子於仁也柔，於義也剛。」
- id: hhs.64.p27.h1
  anchor: hhs.64.p27
  at: 86
  length: 2
  type: person
  person_id: shibi
  text: 史弼
  via: primary
- id: hhs.64.p27.a4
  anchor: hhs.64.p27
  at: 93
  length: 0
  type: lixian
  text: 前書王翁孺曰：「聞活千人者有封*[子]*孫。吾所活者千人，*[後]*世其興乎？」
- id: hhs.64.p27.a5
  anchor: hhs.64.p27
  at: 106
  length: 0
  type: lixian
  text: 頡頏猶上下也。
- id: hhs.64.p28.h1
  anchor: hhs.64.p28
  at: 0
  length: 2
  type: person
  person_id: luzhi
  text: 盧植
  via: primary
- id: hhs.64.p28.h2
  anchor: hhs.64.p28
  at: 30
  length: 2
  type: person
  person_id: marong
  text: 馬融
  via: primary
- id: hhs.64.p28.a1
  anchor: hhs.64.p28
  at: 54
  length: 0
  type: lixian
  text: 不大謂子孫衰替也。左傳晉卜偃曰：「畢萬之後必大。」
- anchor: hhs.64.p29
  at: 1
  length: 2
  type: person
  person_id: doumiao
  text: 皇后
  via: llm
