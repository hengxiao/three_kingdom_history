- id: hhs.64.p42.a1
  anchor: hhs.64.p42
  at: 60
  length: 0
  type: lixian
  text: 三輔決錄注曰：「岐娶馬敦女宗姜為妻。敦兄子融嘗至岐家，多從賓與從妹宴飲作樂，日夕乃出。過問趙處士所在。岐亦厲節，不以妹拿之故屈志於融也。與其友書曰：『馬季長雖有名當世，而不持士節，三輔高士未曾以衣裾襒其門也。』岐曾讀周官二義不通，一往造之，賤融如此也。」
