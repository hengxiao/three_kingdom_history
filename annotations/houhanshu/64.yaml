  type: lixian
  text: 左氏傳曰：「日過分未至三辰有□，於是乎君不舉，避移時。」杜預注曰：「避正寑，過日食時也。」
- id: hhs.64.p33.a5
  anchor: hhs.64.p33
  at: 239
  length: 0
