- id: hhs.64.p31.a1
  anchor: hhs.64.p31
  at: 11
  length: 0
  type: lixian
  text: 以樹為喻也。謂京師為干，四方為枝。前書曰：「漢興，立都長安，徙齊諸田、楚昭、屈、景及諸功臣家於長陵。蓋以強幹弱枝，非獨為奉山園也。」
- id: hhs.64.p31.h1
  anchor: hhs.64.p31
  at: 43
  length: 2
