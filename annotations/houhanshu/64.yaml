  text: 馬融
  via: primary
- id: hhs.64.p31.a2
  anchor: hhs.64.p31
  at: 60
  length: 0
  type: lixian
  text: 詁，事也。言解其事意。
- id: hhs.64.p31.a3
  anchor: hhs.64.p31
  at: 73
  length: 0
  type: lixian
  text: 回□猶紆曲也。
- id: hhs.64.p31.a4
  anchor: hhs.64.p31
  at: 98
  length: 0
  type: lixian
  text: □，粟不成。諭義之乖僻也。
- id: hhs.64.p31.a5
  anchor: hhs.64.p31
  at: 165
  length: 0
  type: lixian
  text: 繕，善也。言家貧不能善寫而上也。
- id: hhs.64.p31.a6
  anchor: hhs.64.p31
  at: 190
  length: 0
  type: lixian
  text: 古文謂孔子壁中書也。形似科斗，因以為名。前書謂文字為「小學」也。
- id: hhs.64.p31.a7
  anchor: hhs.64.p31
  at: 213
  length: 0
  type: lixian
  text: 興子觿也，自有傳。左傳曰「□縠悅禮樂而敦詩書」也。
- id: hhs.64.p33.h1
  anchor: hhs.64.p33
  at: 20
