  text: 趙岐
  via: primary
- id: hhs.64.p41.a1
  anchor: hhs.64.p41
  at: 28
  length: 0
  type: lixian
  text: 冘，人行貌也，音淫。言冘豫不能自定也。奪謂易其常分者也。
- id: hhs.64.p41.h2
  anchor: hhs.64.p41
