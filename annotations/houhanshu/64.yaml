- id: hhs.64.p41.a2
  anchor: hhs.64.p41
  at: 79
  length: 0
  type: lixian
  text: 事見何進傳。杜預注左傳曰：「戕者，卒暴之名也。」
- id: hhs.64.p41.a3
  anchor: hhs.64.p41
  at: 105
  length: 0
  type: lixian
  text: 孔子曰：「君子無終食之閒違仁，造次必於是，顛沛必於是。」馬融注云：「造次，急遽也。顛沛，僵仆也。雖急遽僵仆，不違仁也。」
- id: hhs.64.p41.h3
