- id: hhs.66.p36.a1
  anchor: hhs.66.p36
  at: 29
  length: 0
  type: lixian
  text: 說文曰：「霽，雨止也。」郭璞曰：「南陽人呼雨止曰霽。」
- id: hhs.66.p36.a2
  anchor: hhs.66.p36
  at: 54
  length: 0
  type: lixian
  text: 執法，星名。史記曰「太微南四星曰執法」也。
- id: hhs.66.p36.a3
  anchor: hhs.66.p36
  at: 126
  length: 0
  type: lixian
  text: 帝時疾愈，故入賀也。
- id: hhs.66.p38.a1
  anchor: hhs.66.p38
  at: 7
  length: 0
  type: lixian
  text: 稜，威稜也，力登反。
- id: hhs.66.p39.a1
  anchor: hhs.66.p39
  at: 271
  length: 0
  type: lixian
  text: 前書音義曰：「以青畫戶邊鏤中，天子制也。」
- id: hhs.66.p39.a2
  anchor: hhs.66.p39
  at: 326
  length: 0
  type: lixian
  text: 朝廷謂天子也。
- id: hhs.66.p41.a1
  anchor: hhs.66.p41
  at: 71
  length: 0
  type: lixian
  text: 戩音翦。
- id: hhs.66.p42.a1
  anchor: hhs.66.p42
  at: 87
  length: 0
  type: lixian
  text: 詬，罵也，音火豆反。
- id: hhs.66.p42.a2
  anchor: hhs.66.p42
  at: 101
  length: 0
  type: lixian
  text: 豎者，言賤劣如僮豎。
