- id: hhs.66.p45.a1
  anchor: hhs.66.p45
  at: 123
  length: 0
  type: lixian
  text: 鐘繇字符常，魏太祖時為相國。
- id: hhs.66.p46.a1
  anchor: hhs.66.p46
  at: 45
  length: 0
  type: lixian
  text: 莊子曰：「斯所謂帝之懸解。」懸解喻安泰也。
- id: hhs.66.p47.a1
  anchor: hhs.66.p47
  at: 23
  length: 0
  type: lixian
  text: 緝，合也。易下系曰：「人謀鬼謀。」言蕃設謀雖合，而冥運未符也。
- id: hhs.66.p47.a2
  anchor: hhs.66.p47
  at: 33
  length: 0
  type: lixian
  text: 殄，盡也。瘁，病也。言國將殄瘁，豈不由賢人云亡乎？詩大雅曰「人之雲亡，邦國殄瘁」也。
- id: hhs.66.p47.a3
  anchor: hhs.66.p47
  at: 43
  length: 0
  type: lixian
  text: 謂矯性屈意於董卓。
- id: hhs.66.p47.a4
  anchor: hhs.66.p47
  at: 63
  length: 0
  type: lixian
  text: 誅卓為工，被殺為拙也。
