  kind: relative
  resolution: next_year
  year_ad: 185
  era: 中平
  era_year: 2
  reasoning: 「明年」 = 当前年 中平元年 (AD 184) 之次年 = AD 185
- id: hhs.66.p29.a2
  anchor: hhs.66.p29
  at: 174
  length: 0
  type: lixian
  text: 傳，逮也。
- id: hhs.66.p30.a1
  anchor: hhs.66.p30
  at: 35
  length: 0
  type: lixian
  text: 更，經也。楚，苦痛。
- id: hhs.66.p30.t1
  anchor: hhs.66.p30
  at: 51
  length: 2
  type: temporal
  text: 一月
  kind: relative
  resolution: bare_month
  year_ad: 185
  era: 中平
  era_year: 2
  month_chinese: 一月
  month_ordinal: 1
  reasoning: 年承前文 中平2年 (AD 185)，月份「一月」
- id: hhs.66.p30.a2
  anchor: hhs.66.p30
  at: 67
  length: 0
  type: lixian
  text: 深計謂令自死。
- id: hhs.66.p30.a3
  anchor: hhs.66.p30
  at: 194
  length: 0
  type: lixian
  text: 內視，自視也。反聽，自聽也。言皆恕己，不責於人也。
- id: hhs.66.p30.a4
  anchor: hhs.66.p30
  at: 204
  length: 0
  type: lixian
  text: 文帝時，魏尚為雲中守，下吏免。馮唐為郎中署長，奏言曰：「臣聞魏尚為雲中守，上功首虜差六級，陛下下之吏，削其爵。愚以為陛下法太明，賞太輕，罰太重。」帝即日赦尚復為雲中太守。
- id: hhs.66.p30.a5
  anchor: hhs.66.p30
  at: 212
  length: 0
  type: lixian
  text: 左傳曰，晉悼公之弟楊干亂行於曲梁，魏絳戮其僕。公怒之。絳曰：「臣聞師觿以順為武，軍事有死無犯為敬。臣懼其死，以及楊干，無所逃罪。」公曰：「寡人有弟不能教訓，使干大命，寡人之過也。子無重寡人之過。」與之禮食，使佐新軍。
- id: hhs.66.p30.a6
  anchor: hhs.66.p30
  at: 298
  length: 0
  type: lixian
  text: 周禮朝士職，三槐、九棘，公卿於下聽訟，故曰「三槐之聽」。
- id: hhs.66.p30.t2
  anchor: hhs.66.p30
  at: 327
  length: 2
  type: temporal
  text: 明年
  kind: relative
  resolution: next_year
  year_ad: 186
  era: 中平
  era_year: 3
  reasoning: 「明年」 = 当前年 中平2年 (AD 185) 之次年 = AD 186
- id: hhs.66.p30.a7
  anchor: hhs.66.p30
  at: 347
  length: 0
  type: lixian
  text: 睚音五懈反。眥音士懈反。前書曰：「原涉好殺，睚眥於塵中，觸死者甚多。」
- id: hhs.66.p30.a8
  anchor: hhs.66.p30
  at: 367
  length: 0
  type: lixian
  text: 轉側猶去來也。
