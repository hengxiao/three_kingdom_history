- id: hhs.66.p2.a1
  anchor: hhs.66.p2
  at: 34
  length: 0
  type: lixian
  text: 續漢志曰：「別駕從事，校尉行部奉引，總錄觿事。」
- id: hhs.66.p2.a2
  anchor: hhs.66.p2
  at: 45
  length: 0
  type: lixian
  text: 投，棄也。傳謂符也，音丁戀反。
- id: hhs.66.p3.a1
  anchor: hhs.66.p3
  at: 20
  length: 0
  type: lixian
  text: 續漢志曰，樂安本名千乘，和帝更名也。
- id: hhs.66.p3.a2
  anchor: hhs.66.p3
  at: 61
  length: 0
  type: lixian
  text: 璆音仇。
- id: hhs.66.p3.a3
  anchor: hhs.66.p3
  at: 118
  length: 0
  type: lixian
  text: 埏隧，今人墓道也。杜預注左傳云：「掘地通路曰隧。」
- id: hhs.66.p3.a4
  anchor: hhs.66.p3
  at: 189
  length: 0
  type: lixian
  text: 禮記曰「三年之喪，可復父母之恩也。賢者俯而就之，不肖者企而及之。」
- id: hhs.66.p3.a5
  anchor: hhs.66.p3
  at: 202
  length: 0
  type: lixian
  text: 黷，媟也。禮記曰：「祭不欲數，數則煩，煩則不敬。」
- id: hhs.66.p6.a1
  anchor: hhs.66.p6
  at: 29
  length: 0
  type: lixian
  text: 尚書曰：「若保赤子，唯人其康乂。」
- id: hhs.66.p7.a1
  anchor: hhs.66.p7
  at: 46
  length: 0
  type: lixian
  text: 蕃喪妻，鄉人畢至，唯許子將不往，曰：「仲舉性峻，峻則少通，故不造也。」
- id: hhs.66.p9.a1
  anchor: hhs.66.p9
  at: 101
  length: 0
  type: lixian
  text: 上象四七，謂二十八宿各主諸侯之分野，故曰下應分土，言皆以輔王室也。
- id: hhs.66.p10.a1
  anchor: hhs.66.p10
  at: 63
  length: 0
  type: lixian
  text: 貲，量也。
- id: hhs.66.p10.a2
  anchor: hhs.66.p10
  at: 103
  length: 0
  type: lixian
  text: 帝王紀曰「紂作傾宮，多采美女以充之。武王伐殷，乃歸傾宮之女於諸侯」也。
- id: hhs.66.p10.a3
  anchor: hhs.66.p10
  at: 111
  length: 0
  type: lixian
  text: 公羊傳曰：「西宮災。」何休注云：「時僖公為齊桓所脅，以齊媵為嫡，楚女廢居西宮，而不見恤，悲愁怨曠所生。」
- id: hhs.66.p11.a1
  anchor: hhs.66.p11
  at: 36
  length: 0
  type: lixian
  text: 尺一謂板長尺一，以寫詔書也。
- id: hhs.66.p12.t1
  anchor: hhs.66.p12
  at: 0
  length: 4
  type: temporal
  text: 延熹六年
  kind: absolute
  resolution: absolute
  year_ad: 163
  era: 延熹
  era_year: 6
  reasoning: 原文「延熹六年」直接出现年号；解析為 AD 163
- id: hhs.66.p12.a1
  anchor: hhs.66.p12
  at: 22
  length: 0
  type: lixian
  text: 廣*(城)**[成]*，苑名，在今汝州梁縣西也。
- id: hhs.66.p12.a2
  anchor: hhs.66.p12
  at: 82
  length: 0
  type: lixian
  text: 尚書咎繇謨曰：「無教逸欲有邦。」
- id: hhs.66.p12.a3
  anchor: hhs.66.p12
  at: 95
  length: 0
  type: lixian
  text: 尚書無逸篇之言。
- id: hhs.66.p12.a4
  anchor: hhs.66.p12
  at: 322
  length: 0
  type: lixian
  text: 祭公，祭國公，為周卿士。謀父，名也。祈招，逸詩也。左傳曰：「昔周穆王欲肆其心，周行天下，將皆必有車轍馬跡焉。祭公謀父作祈招之詩以止王心。其詩曰：『祈招之愔愔，式昭德音，思我王度，式如玉，式如金。刑人之力，而無醉飽之心。』」
- id: hhs.66.p13.t1
  anchor: hhs.66.p13
  at: 53
  length: 2
  type: temporal
  text: 八年
  kind: relative
  resolution: bare_year
  year_ad: 165
  era: 延熹
  era_year: 8
  reasoning: 承前文年號「延熹」推得，「八年」 = 延熹8年 = AD 165
- id: hhs.66.p13.a1
  anchor: hhs.66.p13
  at: 80
  length: 0
  type: lixian
  text: 詩大雅也。言成王令德，不過誤，不遺失，循用舊典文章，謂周公之禮法也。
- id: hhs.66.p14.a1
  anchor: hhs.66.p14
  at: 36
  length: 0
  type: lixian
  text: 音古本反。
- id: hhs.66.p14.a2
  anchor: hhs.66.p14
  at: 278
  length: 0
  type: lixian
  text: 國語曰：「桓帝問管仲曰：『安國可乎？』對曰：『未可。君若正卒伍，修甲兵，大國亦如之。若欲速得志於天下諸侯，則可以隱令，可以寄政。』公曰：『隱令寄政若何？』對曰：『作內政而寄軍令焉。』」
- id: hhs.66.p14.a3
  anchor: hhs.66.p14
  at: 288
  length: 0
  type: lixian
  text: 公羊傳莊公四年，公及齊人狩於郜，譏其與讎狩也。僖公二十年，新作南門，譏其奢也。故曰「小惡必書」也。
- id: hhs.66.p14.a4
  anchor: hhs.66.p14
  at: 365
  length: 0
  type: lixian
  text: 言桓帝以蠡吾侯即位。
- id: hhs.66.p14.a5
  anchor: hhs.66.p14
  at: 433
  length: 0
  type: lixian
  text: 五侯謂胤、讓、淑、忠、戟五人，與冀同時誅。事見冀傳也。
- id: hhs.66.p14.a6
  anchor: hhs.66.p14
  at: 554
  length: 0
  type: lixian
  text: 說文曰：「悁悁，恚忿。」
- id: hhs.66.p14.a7
  anchor: hhs.66.p14
  at: 700
  length: 0
  type: lixian
  text: 文帝時，太中大夫鄧通愛幸，居上旁有怠嫚禮。氶相申屠嘉入朝，因見之，為檄召通。通至，嘉曰：「通小臣，戲殿上，大不敬，當斬。」通頓首，首盡出血。文帝使使召通，而謝丞相曰「吾弄臣，君釋之」也。湖陽公主蒼頭白日殺人，匿主家，吏追不得。公主出，宣駐車叩馬，以刀畫地數主。主言於帝，帝賜宣錢三十萬。語見董宣傳。
- id: hhs.66.p14.a8
  anchor: hhs.66.p14
  at: 774
  length: 0
  type: lixian
  text: 宣帝五日一聽事，自丞相已下，各敷奏其言。
- id: hhs.66.p15.a1
  anchor: hhs.66.p15
  at: 9
  length: 0
  type: lixian
  text: 高唐，縣名，今博州縣也。
- id: hhs.66.p16.t1
  anchor: hhs.66.p16
  at: 0
  length: 2
  type: temporal
  text: 九年
  kind: relative
  resolution: bare_year
  year_ad: 166
  era: 延熹
  era_year: 9
  reasoning: 承前文年號「延熹」推得，「九年」 = 延熹9年 = AD 166
- id: hhs.66.p16.a1
  anchor: hhs.66.p16
  at: 67
  length: 0
  type: lixian
  text: 關龍逢，桀臣。王子比干，紂諸父。二人並諫，悉皆誅死。
- id: hhs.66.p16.a2
  anchor: hhs.66.p16
  at: 94
  length: 0
  type: lixian
  text: 前書曰「君為元首，臣為股肱，明其一體相須而成」也。
- id: hhs.66.p16.a3
  anchor: hhs.66.p16
  at: 174
  length: 0
  type: lixian
  text: 秦始皇時，丞相李斯上言曰：「天下已定，百姓力農。今諸生好古，惑亂黔首，臣請史官非秦記及天下敢有藏詩、書、百家語者，悉燒之。」事見史記。衞宏詔定古文官書序曰：「秦既焚書，患苦天下不從所改更，而諸生到者拜為郎，前後七百人。乃密令種瓜於驪山坑谷中溫處，瓜實，詔博士說之，人人不同。乃令就視，為伏機，諸生賢儒皆至焉，方相難不決，因發機從上填之以土，皆壓之，終乃無聲。」今新豐縣溫湯處號愍儒鄉。湯西有馬谷，西岸有坑，古老相傳以為秦坑儒處也。
- id: hhs.66.p16.a4
  anchor: hhs.66.p16
  at: 185
  length: 0
  type: lixian
  text: 史記武王克殷，命畢公表商容之閭，閎夭封比干之墓也。
- id: hhs.66.p16.a5
  anchor: hhs.66.p16
  at: 217
  length: 0
  type: lixian
  text: 詩小雅曰：「巧言如簧，顏之厚矣。」簧，笙簧也。言讒人之口以喻笙簧也。
- id: hhs.66.p16.a6
  anchor: hhs.66.p16
  at: 347
  length: 0
  type: lixian
  text: 說菀曰：「禹見罪人，下車泣而問之。左右曰：『夫罪人不順，故使殺焉，君王何為痛之至此也！』禹曰：『堯舜之人，皆以堯舜之心為心。今寡人為君也，百姓各自以其心，是以痛之。』」書曰：「百姓有罪，在予一人。」左傳曰：「禹湯罪己，其興也勃焉。桀紂罪人，其亡也忽焉。」杜預注曰：「勃，盛也。」
- id: hhs.66.p16.a7
  anchor: hhs.66.p16
  at: 369
  length: 0
  type: lixian
  text: 廣雅曰：「茹，食也。」
- id: hhs.66.p16.a8
  anchor: hhs.66.p16
  at: 408
  length: 0
  type: lixian
  text: 論語孔子之言也。
- id: hhs.66.p16.a9
  anchor: hhs.66.p16
  at: 434
  length: 0
  type: lixian
  text: 春秋感精符曰：「魯哀公政亂，絕無日食，天不譴告也。」
- id: hhs.66.p16.a10
  anchor: hhs.66.p16
  at: 514
  length: 0
  type: lixian
  text: 谷梁傳曰「公會齊侯於頰谷，齊人使擾施舞於魯之幕下。孔子曰：『笑君者罪當死。』使司馬行法焉，首足異門而出」也。
- id: hhs.66.p18.t1
  anchor: hhs.66.p18
  at: 0
  length: 4
  type: temporal
  text: 永康元年
  kind: absolute
  resolution: absolute
  year_ad: 167
  era: 永康
  era_year: 1
  reasoning: 原文「永康元年」直接出现年号；解析為 AD 167
- id: hhs.66.p18.a1
  anchor: hhs.66.p18
  at: 38
  length: 0
  type: lixian
  text: 前書谷永曰「臣聞天生蒸人，不能相持，為立王者以統理之*(故)*」也。
- id: hhs.66.p18.a2
  anchor: hhs.66.p18
  at: 104
  length: 0
  type: lixian
  text: 言人主雖亡，法度尚存，當行之與不亡時同，故曰「如存」。前書爰盎曰「主在與在，主亡與亡」也。
- id: hhs.66.p18.a3
  anchor: hhs.66.p18
  at: 130
  length: 0
  type: lixian
  text: 詩國風曰：「誰謂荼苦，其甘如薺。」周頌曰：「未堪家多難，予又集於蓼。」
- id: hhs.66.p19.a1
  anchor: hhs.66.p19
  at: 38
  length: 0
  type: lixian
  text: 詩大雅曰：「無言不讎，無德不報。」
- id: hhs.66.p19.a2
  anchor: hhs.66.p19
  at: 53
  length: 0
  type: lixian
  text: 內音納。尚書曰「出納朕命」也。
- id: hhs.66.p19.a3
  anchor: hhs.66.p19
  at: 73
  length: 0
  type: lixian
  text: 齊宣王對閭丘滘曰：「夫士亦華發墮顛而後可用。」見新序。
- id: hhs.66.p19.a4
  anchor: hhs.66.p19
  at: 109
  length: 0
  type: lixian
  text: 既，就也。
- id: hhs.66.p19.a5
  anchor: hhs.66.p19
  at: 204
  length: 0
  type: lixian
  text: 論語孔子曰：「富與貴是人之所欲，不以其道得之，不處也。」
- id: hhs.66.p19.a6
  anchor: hhs.66.p19
  at: 215
  length: 0
  type: lixian
  text: 詩小雅曰「受爵不讓，至於已斯亡。」注云：「爵祿不以相讓，故怨禍及之」也。
- id: hhs.66.p19.a7
  anchor: hhs.66.p19
  at: 251
  length: 0
  type: lixian
  text: 論語孔子曰：「及其老也，血氣既衰，戒之在得。」注云：「得，貪也。」
- id: hhs.66.p20.a1
  anchor: hhs.66.p20
  at: 106
  length: 0
  type: lixian
  text: 嬈音乃了反。
- id: hhs.66.p20.a2
  anchor: hhs.66.p20
  at: 287
  length: 0
  type: lixian
  text: 趙夫人即趙嬈也。女尚書，宮內官也。
- id: hhs.66.p20.a3
  anchor: hhs.66.p20
  at: 299
  length: 0
  type: lixian
  text: 前書劉向上書論王鳳曰「稱譽者登進，忤恨者誅傷」也。
- id: hhs.66.p21.a1
  anchor: hhs.66.p21
  at: 79
  length: 0
  type: lixian
  text: 迕猶遇也。
- id: hhs.66.p22.a1
  anchor: hhs.66.p22
  at: 36
  length: 0
  type: lixian
  text: 騶，騎士也。
- id: hhs.66.p23.a1
  anchor: hhs.66.p23
  at: 13
  length: 0
  type: lixian
  text: 銍，縣，屬沛郡。
- id: hhs.66.p25.a1
  anchor: hhs.66.p25
  at: 45
  length: 0
  type: lixian
  text: 前書班固曰：「相與提衡。」音義云：「衡，平也。言二人齊也。」
- id: hhs.66.p25.a2
  anchor: hhs.66.p25
  at: 66
  length: 0
  type: lixian
  text: 違，避也。
- id: hhs.66.p25.a3
  anchor: hhs.66.p25
  at: 112
  length: 0
  type: lixian
  text: 論語曰：「仁以為己任，不亦重乎！死而後已，不亦遠乎！」
- id: hhs.66.p25.a4
  anchor: hhs.66.p25
  at: 140
  length: 0
  type: lixian
  text: 懍懍，有風采之貌也。
- id: hhs.66.p26.a1
  anchor: hhs.66.p26
  at: 12
  length: 0
  type: lixian
  text: 祁，今并州縣也。
- id: hhs.66.p26.a2
  anchor: hhs.66.p26
  at: 48
  length: 0
  type: lixian
  text: 史記曰，田光謂燕太子丹曰：「臣聞驥壯盛之時，一日千里；至其老也，駑馬先之。」
- id: hhs.66.p29.t1
  anchor: hhs.66.p29
  at: 39
  length: 4
  type: temporal
