  at: 145
  length: 0
  type: lixian
  text: 《禮記》曰「事師無犯無隱，左右就養無方，服勤至心，心喪三年」也。
- id: hhs.62.p2.a4
  anchor: hhs.62.p2
  at: 189
  length: 0
  type: lixian
  text: 緄音昆。燾音道。汪音烏光反。《說文》云：「汪，深廣也。」俗本改作「注」，非。「專」本或作「敷」。
- id: hhs.62.p3.a1
  anchor: hhs.62.p3
  at: 10
  length: 0
  type: lixian
  text: 今許州城內西南有荀淑故宅，相傳云即舊西豪里也。
- id: hhs.62.p3.h1
  anchor: hhs.62.p3
  at: 15
  length: 2
  type: person
  person_id: yuankang
  text: 苑康
  via: primary
- id: hhs.62.p3.a2
  anchor: hhs.62.p3
  at: 29
  length: 0
  type: lixian
  text: 《左傳》曰：「昔高陽氏有才子八人：蒼舒，隤敳，檮戭，大臨，尨降，庭堅，仲容，叔達。」
- id: hhs.62.p4.a1
  anchor: hhs.62.p4
  at: 21
  length: 0
  type: lixian
  text: 皇甫謐《高士傳》曰「靖字叔慈，少有俊才，動止以禮。靖弟爽亦以才顯於當時。或問汝南許章曰：『爽與靖孰賢？』章曰：『皆玉也。慈明外朗，叔慈內潤。』及卒，學士惜之，誄靖者二十六人。穎陰令丘禎追號靖曰玄行先生」也。
- id: hhs.62.p5.h1
