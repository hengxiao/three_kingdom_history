  at: 125
  length: 0
  type: lixian
  text: 喪服曰：「夫為妻齊縗杖開。」禮記曰：「曾子問：『三年之喪吊乎？』孔子曰：『禮以飾情。三年之喪而吊哭，不亦虛乎！』」
