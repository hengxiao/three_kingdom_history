- id: hhs.62.p23.a1
  anchor: hhs.62.p23
  at: 103
  length: 0
  type: lixian
  text: 《孟子》曰：「人無惻隱之心，非人也。無羞惡之心，非人也。無辭讓之心，非人也。無是非之心，非人也。」
- id: hhs.62.p23.a2
  anchor: hhs.62.p23
  at: 140
  length: 0
  type: lixian
  text: 國武子，齊大夫。齊慶克通於齊君之母，國武子知之而責慶克，夫人遂譖武子而逐之。事見《左傳》。
- id: hhs.62.p25.a1
  anchor: hhs.62.p25
  at: 13
  length: 0
  type: lixian
  text: 海內先賢傳曰：「繇字元常，郡主簿迪之子也。」《魏志》曰：「舉孝廉為尚書郎，辟三府為廷尉正、黃門侍郎。」
- id: hhs.62.p26.h1
  anchor: hhs.62.p26
  at: 0
  length: 2
  type: person
  person_id: chenshi
  text: 陳寔
  via: primary
- id: hhs.62.p27.a1
  anchor: hhs.62.p27
  at: 49
  length: 0
  type: lixian
  text: 檄，板書。謂以高倫之教書之於檄而懷之者，懼洩事也。
- id: hhs.62.p27.a2
  anchor: hhs.62.p27
  at: 85
  length: 0
  type: lixian
  text: 請從外署之舉，不欲陷倫於請托也。
- id: hhs.62.p27.a3
  anchor: hhs.62.p27
  at: 120
  length: 0
  type: lixian
  text: 輪氏，縣名，屬穎川郡，今故高陽縣是。
- id: hhs.62.p28.h1
  anchor: hhs.62.p28
  at: 2
  length: 2
  type: person
  person_id: huangqiong
  text: 黃瓊
  via: primary
- id: hhs.62.p28.a1
  anchor: hhs.62.p28
  at: 31
  length: 0
  type: lixian
  text: 太丘，縣，屬沛國，故城在今亳州永城縣西北也。
- id: hhs.62.p28.a2
  anchor: hhs.62.p28
  at: 67
  length: 0
  type: lixian
  text: 司官謂主司之官也。
- id: hhs.62.p29.h1
  anchor: hhs.62.p29
  at: 45
  length: 2
  type: person
  person_id: linghan
  text: 靈帝
  via: alias
- id: hhs.62.p31.h1
  anchor: hhs.62.p31
  at: 44
  length: 2
  type: person
  person_id: hejin
  text: 何進
  via: primary
- id: hhs.62.p31.a1
  anchor: hhs.62.p31
  at: 56
  length: 0
  type: lixian
  text: 敦，勸也。
