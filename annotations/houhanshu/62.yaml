  at: 111
  length: 0
  type: lixian
  text: 《詩周頌》曰：「我求懿德，肆於時夏。」鄭玄注曰：「懿，美也。肆，陳也。我，武王也。求美德之士而任用之，故陳於是夏而歌之也。」
- id: hhs.62.p18.a2
  anchor: hhs.62.p18
  at: 191
  length: 0
  type: lixian
  text: 濟，成也。
