  length: 0
  type: lixian
  text: 濡跡，解見崔駰傳。
- id: hhs.62.p14.a2
  anchor: hhs.62.p14
  at: 139
  length: 0
  type: lixian
  text: 《易》履卦曰：「履道坦坦，幽人貞吉。」又曰：「履虎尾，不咥人亨。」王輔嗣注云：「履虎尾者，言其危也。」
- id: hhs.62.p14.a3
  anchor: hhs.62.p14
  at: 156
  length: 0
  type: lixian
  text: 楊彪、黃琬也。
- id: hhs.62.p14.a4
  anchor: hhs.62.p14
  at: 183
  length: 0
  type: lixian
  text: 《老子》云：「大直若屈，大巧若拙。」逶迤，曲也。
