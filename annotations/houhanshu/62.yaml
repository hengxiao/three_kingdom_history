- id: hhs.62.p34.h1
  anchor: hhs.62.p34
  at: 8
  length: 1
  type: person
  person_id: dongzhuo
  text: 卓
  via: given_name_carry
- id: hhs.62.p34.a1
  anchor: hhs.62.p34
  at: 43
  length: 0
  type: lixian
  text: 《前書》曰，東方朔曰：「三輔之地，南有江、淮，北有河、渭，汧、隴以東，商、洛以西，厥壤肥饒，此所謂天府陸海之地。」
- id: hhs.62.p34.a2
  anchor: hhs.62.p34
  at: 86
  length: 0
  type: lixian
  text: 《左傳》曰，楚沈尹戍曰「古者天子守在四夷。天子卑，守在諸侯」也。
- id: hhs.62.p34.a3
  anchor: hhs.62.p34
  at: 188
  length: 0
  type: lixian
  text: 累卵，解見皇后紀。崢音士耕反。
- id: hhs.62.p34.h2
  anchor: hhs.62.p34
  at: 188
  length: 1
  type: person
  person_id: dongzhuo
  text: 卓
  via: given_name_carry
- id: hhs.62.p34.a4
  anchor: hhs.62.p34
  at: 224
  length: 0
  type: lixian
  text: 嚴讀曰裝也。
- id: hhs.62.p34.h3
  anchor: hhs.62.p34
  at: 247
  length: 2
  type: person
  person_id: yuanshao
  text: 袁紹
  via: primary
- id: hhs.62.p35.a1
  anchor: hhs.62.p35
  at: 8
  length: 0
  type: lixian
  text: 羣字長文。《魏志》曰「魯國孔融才高倨傲，年在羣、紀之閒，先與〔紀友，後與〕羣交，更為紀拜，由是顯名」也。
- id: hhs.62.p36.a1
  anchor: hhs.62.p36
  at: 43
  length: 0
  type: lixian
  text: 古者諸侯朝天子，卿執羔，大夫執鴈，士執雉。成羣言眾多也。
- id: hhs.62.p36.a2
  anchor: hhs.62.p36
  at: 55
  length: 0
  type: lixian
  text: 先賢行狀曰：「豫州百城，皆圖書寔、紀、諶形像焉。」
- id: hhs.62.p37.a1
  anchor: hhs.62.p37
  at: 28
  length: 0
  type: lixian
  text: 放肆其言，不拘節制也。《論語》曰：「隱居放言。」
- id: hhs.62.p37.a2
  anchor: hhs.62.p37
  at: 46
  length: 0
  type: lixian
  text: 叫呼，譏笑之也。芸，除草也。
- id: hhs.62.p38.h1
  anchor: hhs.62.p38
  at: 13
  length: 2
  type: person
  person_id: hanshao
  text: 韓韶
  via: primary
- id: hhs.62.p38.a1
  anchor: hhs.62.p38
  at: 43
  length: 0
  type: lixian
  text: 曾之言則也。
- id: hhs.62.p38.a2
  anchor: hhs.62.p38
  at: 63
  length: 0
  type: lixian
  text: 二方，元方﹑季方也。荀淑八子，皆以慈為字，見《荀氏家傳》也。
