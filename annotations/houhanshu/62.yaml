  anchor: hhs.62.p31
  at: 168
  length: 0
  type: lixian
  text: 先賢行狀曰：「將軍何進遣官屬吊祠為謚。」
- id: hhs.62.p33.h1
  anchor: hhs.62.p33
  at: 118
  length: 2
  type: person
