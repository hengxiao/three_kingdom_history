        to: 悉收其衆
      - op: insert
        at: 36
        text: 將討之，譚乃拔平原，并南皮，自屯龍湊。十二月，太祖軍其門，譚不出，夜遁奔南皮，臨清河而屯。十年正月，攻拔之，斬譚及圖等。熈、尚為其將焦觸、張南所攻，奔遼西烏丸。觸自號幽州刺史，驅率諸郡太守令長，背袁向曹，陳兵數萬，殺白馬盟，令曰：「違命者斬！」衆莫敢語，各以次歃。至別駕韓珩，曰：「吾受袁公父子厚恩，今其破亡，智不能救，勇不能死，於義闕矣；若乃北靣於曹氏，所弗能為也。」一坐為珩失色。觸曰：「夫興大事，當立大義，事之濟否，不待一人，可卒珩志，以勵事君。」高幹叛，執上黨太守，舉兵守壺口關。遣樂
      - op: insert
        at: 37
        text: 、李典擊之，未拔。十一年，太祖征幹。幹乃留其將夏昭、鄧升守城，自詣匈奴單于求救，不得，獨與數騎亡，欲南奔荊州，上洛都尉捕斬之。十二年，太祖至遼西擊烏丸。尚、熈與烏丸逆
