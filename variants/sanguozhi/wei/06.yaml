  wei.6.p24:
    canonical_hash: fe183cd066d0b1a3ef443a4371ada0b15376ea3ace00849460d568e9b90dfebb
    canonical_normalized_hash: 65ab74e77a8dbda8940bbbb49d01595199000b041c682c678786e0ee757b6f52
    diffs:
    - source: ctext
      source_para_no: 26
