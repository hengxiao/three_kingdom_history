        at: 95
        length: 336
        text: 配將馮禮開突門，內太祖兵三百餘人，配覺之，從城上以大石擊突中柵門，柵門閉，入者皆沒。太祖遂圍之，爲塹，周四十里，初令淺，示若可越。配望而笑之，不出爭利。太祖一夜掘之，廣深二丈，決漳水以灌之，自五月至八月，城中餓死者過半。尚聞鄴急，將兵萬餘人還救之，依西山來，東至陽平亭，去鄴十七里，臨滏水，舉火以示城中，城中亦舉火相應。配出兵城北，欲與尚對決圍。太祖逆擊之，敗還，尚亦破走，依曲漳爲營，太祖遂圍之。未合，尚懼，遣陰夔、陳琳乞降，不聽。尚還走濫口，進復圍之急，其將馬延等臨陣降，衆大潰，尚奔中山。盡收其輜重，得尚印綬、節鉞及衣物，以示其家，城中崩沮。配兄子榮守東門，夜開門內太祖兵，與配戰城中，生禽配。配聲氣壯烈，終無撓辭，見者莫不歎息。遂斬之。高幹以并州降，復以幹爲刺史。
