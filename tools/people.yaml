# 人物志：精选灵帝-三国期间核心人物。
#
# given_name（單字名）字段：narrative 中常以 全名引出后再用單字。如「曹操使...操乃引軍還」。
# given_name 不进 name_index 全局搜，而是「段内 contextual」：本段已有 primary_name 出现后，
# 段内剩余文本中的 given_name 才计入此人。避免 操行/權力/雲行 之类的伪命中。
#
# given_name_blockers：常见的二字复合词，命中时该单字不计为人名。
# 形式为「单字+其他」或「其他+单字」的二字组合。
# 在 build 时由 tools/extract_persons.py 应用。
#

#
# 中国史书人名复杂：同一人有姓名/名/字/姓字/官位/爵位/廟號/諡號/小名等多种叫法，
# 同一叫法又可能指不同的人或随时间变化（如「太祖」在魏书指曹操，吴书指孫權）。
# 因此 schema 把名号分两类：
#
#   aliases       —— 高置信度，自动用作字符串搜索匹配。只放唯一、不歧义、跨章节
#                    跨语境都指向本人的形式（多数是「姓字」或独特的字）。
#                    每条 mention 会记录匹配到的具体 alias，便于人工审核假阳。
#
#   other_names   —— 仅作展示/记录，不参与自动搜索。涵盖：
#                      • 廟號/諡號（太祖、武皇帝） — 跨人混用，需上下文
#                      • 官位/爵位（魏王、丞相）   — 多人共用，且本人不同时期不同
#                      • 字（孟德） alone           — 易误识为他人字或寻常词组
#                      • 小名（阿瞞）             — 极少使用，偶尔在裴注
#                    這些以後可加上下文判別后再升级为 aliases。
#
# 后续扩展：新增 entries 用拼音 id 稳定标识；保持 aliases 保守。

