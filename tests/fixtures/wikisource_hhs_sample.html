<p>孝靈皇帝諱宏，肅宗玄孫也。〈《獻帝春秋》曰：靈帝名宏，字辰。〉曾祖河閒孝王開。</p>
<p>建寧元年春正月，太傅陳蕃輔政。〈陳蕃，字仲舉，汝南平輿人也。〉</p>
