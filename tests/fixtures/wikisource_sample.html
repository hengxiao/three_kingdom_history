<p>易稱「男正位乎外，女正位乎內」。古先哲王，莫不明后妃之制。</p>
<p>武宣卞皇后，琅邪開陽人。本倡家，〈《魏書》曰：后以漢延熹三年生齊郡。〉年二十，太祖納為妾。</p>
<p>文昭甄皇后，中山無極人。〈《魏書》曰：甄逸娶常山張氏。〉〈《魏略》曰：后以漢光和五年生。〉后三歲失父。</p>
